    ? { ...cb, ..._scaOverride }
    : {
        ...cb, mode: "longHold",
        disposals: [{ id: "full", areaMode: "ratio", areaPct: 100, catKey: "", year: _dispYear, month: _dispMonth, price: p.uP, enabled: true }],
        rent: { enabled: false }, business: { enabled: false }
      };
  const ceFull = calcCompBenefit({ ...p, compBenefit: fullProbe }, dr);
  // 自 v157 (關鍵修正): 群組的 longHold.disposals 是「各成員處分明細的串接」(line 2798 concat),
  //   有多筆 (每成員一筆)。只取 [0] 只算第一個成員 → 群組收入嚴重低估 → IRR 變負(-1.75%)。
  //   須「加總全部 enabled 處分」, 與 calcT8Snapshot 現金流 (filter(d=>d.enabled).forEach 加總) 完全對齊 → IRR = 23.73%。
  const _fdAll = (ceFull.longHold.disposals || []).filter(d => d.enabled);
  const fd = _fdAll[0] || {};
  const totalRev = _fdAll.reduce((a, d) => a + (Number(d.totalRevenue) || 0), 0);
  const totalTax = _fdAll.reduce((a, d) => a + ((d.taxInfo && Number(d.taxInfo.tax)) || 0), 0);
  // II 用全處分 disposal 的 costShare+landShare 加總 (= 損益分析全處分扣除基礎)
  const totalCost = _fdAll.reduce((a, d) => a + (Number(d.costShare) || 0), 0);
  const totalLand = _fdAll.reduce((a, d) => a + (Number(d.landShare) || 0), 0);
  const II = totalCost + totalLand;
  const baseHoldY = fd.holdYears || 0;
  // 全案統一有效稅率 (= 全處分總稅 ÷ 總課稅基礎), 分攤給各類型/車位確保加總一致
  const totalTaxable = Math.max(totalRev - totalCost - totalLand, 0);
  const effRate = totalTaxable > 0 ? (totalTax / totalTaxable) : 0;
  // 自 v155 (根因②): snap 用全處分 override → 開發期成本(burden/land/結構稅) = 主系統全處分基礎, 且 snap.irr = 主系統全處分IRR
  const snap = calcT8Snapshot(p, dr, _scaOverride);
  const devStartYear = snap.devStartYear, devEndYear = snap.devEndYear;
  const devYears = Math.max(1, devEndYear - devStartYear + 1);
  // 自 v155 (根因②): 全處分售出時點 = scenario A 處分年 (與主系統完全對齊), 下限 devStartYear 防呆
  const saleYear = Math.max(devStartYear, _dispYear);
  const devBurden = snap.burdenCost || 0;          // 開發營造投入 (=myTotalCost, 含土增/契稅, 分年攤)
  const devLandInvest = snap.landInvest || 0;       // 地主土地投入 (期初)
  const devStructTax = (snap.devLVT || 0) + (snap.devDeed || 0);  // 開發期結構性稅 (土增+契稅, 完工年)
  const financeRate = (Number((p.t8 || {}).discountRate) || 0) / 100;  // 投入折現用資金成本 (折現率)
  // 開發期投入現金流 (各策略共用, 負流): 期初土地 + 營造分年攤 + 完工結構性稅
  function devInvestCF() {
    const cf = [];
    if (devLandInvest > 0) cf.push({ year: devStartYear, amt: -devLandInvest });
    for (let y = devStartYear; y <= devEndYear; y++) cf.push({ year: y, amt: -devBurden / devYears });
    if (devStructTax > 0) cf.push({ year: devEndYear, amt: -devStructTax });
    return cf;
  }
  // probe 2 = 各房屋類型 (排除車位) → 取面積 + 各類型收入 (與全處分一致), 成本/土地依價值比例分攤
  const houseProbe = {
    ...cb, mode: "longHold",
    disposals: houseCats.map((c, i) => ({ id: "h_" + i, label: c.label, areaMode: "ratio", areaPct: 100, catKey: c.key, year: _dispYear, month: _dispMonth, price: c.uP, enabled: true })),
    rent: { enabled: false }, business: { enabled: false }
  };
  const ceH = calcCompBenefit({ ...p, compBenefit: houseProbe }, dr);
  const cats = houseCats.map((c, i) => {
    // 自 v157: 群組 disposals 各成員串接, 同 id ("h_"+i) 可能有多筆 → 加總 (與全處分一致)
    const _matches = (ceH.longHold.disposals || []).filter(x => String(x.id) === "h_" + i);
    const baseRev = _matches.reduce((a, d) => a + (Number(d.totalRevenue) || 0), 0);
    const area = _matches.reduce((a, d) => a + (Number(d.areaActual) || 0), 0);
    const prop = totalRev > 0 ? baseRev / totalRev : 0;
    const cost = totalCost * prop, land = totalLand * prop;
    return { ...c, baseRev, area, cost, land, effRate };
  }).filter(c => (c.baseRev > 0 || c.area > 0));
  // 車位殘額 (= 全處分總額 − 房屋類型合計), 一律第0年售出 (sell-only)
  const sumHouseRev = cats.reduce((a, c) => a + c.baseRev, 0);
  const parkRev = Math.max(0, totalRev - sumHouseRev);
  const parkProp = totalRev > 0 ? parkRev / totalRev : 0;
  const parkTaxable = Math.max(parkRev - totalCost * parkProp - totalLand * parkProp, 0);
  const parkNet = parkRev - parkTaxable * effRate;  // 車位第0年售出淨額 (加進每個情境)
  const hasParking = parkRev > 1;
  // 自 v215: 逐類別讀取租金/營業費率與年調幅（優先讀 items[] 裡對應 catKey 的設定，無則用全局預設值）
  //   跟折舊/漲幅參數的精神一致：這裡是內層搜尋用，使用者選擇了逐類別精確搜尋（犧牲一點速度換精度）
  const _rentItems = Array.isArray(cb.rent?.items) ? cb.rent.items : [];
  const _bizItems   = Array.isArray(cb.business?.items) ? cb.business.items : [];
  const getRentRate = (catKey) => {
    const it = _rentItems.find(x => x.catKey === catKey && x.enabled !== false);
    return it ? { rate: Number(it.monthlyRent) || 0, growth: (Number(it.annualGrowthRate) || 0) / 100 }
              : { rate: Number(cb.rent?.monthlyRent) || 0, growth: (Number(cb.rent?.annualGrowthRate) || 0) / 100 };
  };
  const getBizRate = (catKey) => {
    const it = _bizItems.find(x => x.catKey === catKey && x.enabled !== false);
    return it ? { rate: Number(it.perfPerPing) || 0, growth: (Number(it.annualGrowthRate) || 0) / 100 }
              : { rate: Number(cb.business?.perfPerPing) || 0, growth: (Number(cb.business?.annualGrowthRate) || 0) / 100 };
  };
  const H = o.horizon, rr = o.reinvestRate;
  const terminalYear = saleYear + H;  // 出場/再投資終點 (售出年後 H 年)
  const strategies = ["sell", "rent", "business"];
  // 售出淨額 (完工後第 yr 年, 漲價後 − 真實稅率)
  function saleNet(cat, yr) {
    const rev = cat.baseRev * apprFactor(yr);
    const taxable = Math.max(rev - cat.cost - cat.land, 0);
    return rev - taxable * cat.effRate;
  }
  // 各類型×策略×出場年 → 交屋後現金流 (絕對年份, 接在 devEndYear 之後)
  function pieceCF(cat, strat, Y) {
    const cfs = [];
    if (strat === "sell") {
      cfs.push({ year: saleYear, amt: saleNet(cat, 0) });  // 完工即售 → 放在處分年(saleYear), 與主系統全處分對齊
    } else {
      // 自 v215: 逐類別讀取費率+調幅，逐年複利（調幅=0時等價於原本的固定年金）
      const { rate, growth } = strat === "rent" ? getRentRate(cat.key) : getBizRate(cat.key);
      for (let t = 1; t <= Y; t++) {
        const annual = cat.area * rate * Math.pow(1 + growth, t - 1) * 12;
        cfs.push({ year: saleYear + t, amt: annual });
      }
      cfs.push({ year: saleYear + Y, amt: saleNet(cat, Y) });  // 持有到售出年後 Y 年售出
    }
    return cfs;
  }
  // 終值: 僅正流 (收入/租金) 以再投資率複利到 terminalYear
  const tvOf = (cfs) => cfs.reduce((a, c) => a + (c.amt > 0 ? c.amt * Math.pow(1 + rr, terminalYear - c.year) : 0), 0);
  // MIRR (完整生命週期): 正流以再投資率複利到 terminalYear, 負流(投入)以資金成本折現到 devStartYear
  function mirrOf(cfs) {
    let fvPos = 0, pvNeg = 0;
    cfs.forEach(c => {
      if (c.amt > 0) fvPos += c.amt * Math.pow(1 + rr, terminalYear - c.year);
      else pvNeg += (-c.amt) / Math.pow(1 + financeRate, c.year - devStartYear);
    });
    const n = terminalYear - devStartYear;
    return (pvNeg > 0 && n > 0) ? Math.pow(fvPos / pvNeg, 1 / n) - 1 : 0;
  }
  // ROI (完整生命週期, 未折現): (總收入 − 總投入) ÷ 總投入
  function roiOf(cfs) {
    let pos = 0, neg = 0;
    cfs.forEach(c => { if (c.amt > 0) pos += c.amt; else neg += -c.amt; });
    return neg > 0 ? (pos - neg) / neg : 0;
  }
  // 回收年數 (從開發起算): 累計現金由負轉正所需年數
  function paybackOf(cfs) {
    const byYear = {};
    cfs.forEach(c => { byYear[c.year] = (byYear[c.year] || 0) + c.amt; });
    const years = Object.keys(byYear).map(Number).sort((a, b) => a - b);
    let cum = 0, wentNeg = false;
    for (const y of years) {
      const before = cum; cum += byYear[y];
      if (cum < 0) wentNeg = true;
      if (cum >= 0 && (wentNeg || before < 0)) {
        const need = -before; const frac = byYear[y] > 0 ? Math.min(1, Math.max(0, need / byYear[y])) : 0;
        return Math.max(0, (y - 1 + frac) - devStartYear);
      }
    }
    return Infinity;
  }
  // IRR (完整生命週期): 開發期投入(負) + 交屋後收入(正), 有正負 → 有解
  function irrOf(cfs) {
    const byYear = {};
    cfs.forEach(c => { byYear[c.year] = (byYear[c.year] || 0) + c.amt; });
    const cashflows = Object.keys(byYear).map(y => ({ year: Number(y), value: byYear[y] }));
    const v = calcIRR(cashflows);
    return (v == null) ? null : v;
  }
  function comboCF(assign, Y) {
    let cfs = devInvestCF();  // 開發期投入 (各策略共用, 負流)
    cats.forEach(c => { cfs = cfs.concat(pieceCF(c, assign[c.key], Y)); });
    if (parkNet !== 0) cfs.push({ year: saleYear, amt: parkNet });  // 車位售出 (sell-only, 放在處分年)
    return cfs;
  }
  function evalCombo(assign, Y) {
    const cfs = comboCF(assign, Y);
    return { tv: tvOf(cfs), mirr: mirrOf(cfs), roi: roiOf(cfs), payback: paybackOf(cfs), irr: irrOf(cfs), Y, assign: { ...assign } };
  }
  // 自 v162: 選策略與選年期統一用使用者選定的 metric (非 tvOf),
  //   避免 tvOf 只看終值、不折現投入，系統性偏向持有/長租。
  //   scoreOf(cfs): payback 越小越好(取負); 其餘越大越好。
  function scoreOf(cfs) {
    if (o.metric === "payback")   { const v = paybackOf(cfs); return isFinite(v) ? -v : -999; }
    if (o.metric === "roi")       return roiOf(cfs);
    if (o.metric === "irr")       { const v = irrOf(cfs); return v == null ? -99 : v; }
    if (o.metric === "netProfit") return cfs.reduce((s,c) => s+c.amt, 0);  // 自 v189/v191修正: cfs結構是{year,amt}，不是{value}
    return mirrOf(cfs);  // 預設 mirr
  }
  // scoreOfCombo: 對「完整組合現金流(含開發期投入)」算分 — 必須包含負流才能正確算 MIRR/IRR
  function scoreOfCombo(assign, Y) { return scoreOf(comboCF(assign, Y)); }
  function bestMixAtY(Y) {
    // 每個類別獨立選策略：用 scoreOfCombo 對「只換這個類別、其他類別固定」的全組合算分
    // 由於各類別現金流相互獨立(同一個開發期投入)，逐類別貪心選擇是近似最優解
    const assign = Object.fromEntries(cats.map(c => [c.key, "sell"]));  // 初始全 sell
    cats.forEach(c => {
      let best = { s: assign[c.key], score: -Infinity };
      strategies.forEach(s => {
        assign[c.key] = s;
        const score = scoreOfCombo({ ...assign }, Y);
        if (score > best.score) best = { s, score };
      });
      assign[c.key] = best.s;
    });
    return evalCombo(assign, Y);
  }
  let bestMix = bestMixAtY(0);
  for (let Y = 1; Y <= H; Y++) {
    const e = bestMixAtY(Y);
    if (scoreOfCombo(e.assign, e.Y) > scoreOfCombo(bestMix.assign, bestMix.Y)) bestMix = e;
  }
  // 自 v157 (關鍵修正): 全部出售直接用 snap.cashflows (= 主系統 scenario A 全處分那條現金流本身),
  //   保證 全部出售 IRR = snap.irr = KPI 全處分 IRR (23.73%)。snap.cashflows 已含土地+營造+結構稅+處分淨額(全成員加總)。
  const aggSellCF = (snap.cashflows && snap.cashflows.length)
    ? snap.cashflows.map(c => ({ year: c.year, amt: c.value }))
    : devInvestCF().concat([{ year: saleYear, amt: totalRev - totalTax }]);
  const allSell = { tv: tvOf(aggSellCF), mirr: mirrOf(aggSellCF), roi: roiOf(aggSellCF), payback: paybackOf(aggSellCF), irr: irrOf(aggSellCF), Y: 0, assign: Object.fromEntries(cats.map(c => [c.key, "sell"])) };
  // 自 v158: 最佳售出時點 — 純處分情境下, 找「IRR 最大」的售出年 (土地漲幅 vs 建物折舊 vs 拉長時間的權衡)。
  //   Y=0 用 snap.cashflows (= 完工即售, 對齊主系統); Y>0 用漲價後淨額。IRR 是處分當期報酬, 不受年期(H)拉平。
  function aggSellCFatY(Y) {
    if (Y === 0) return aggSellCF;
    const rev = totalRev * apprFactor(Y);
    const taxable = Math.max(rev - totalCost - totalLand, 0);
    const net = rev - taxable * effRate;
    return devInvestCF().concat([{ year: saleYear + Y, amt: net }]);
  }
  let bestSellY = 0, bestSellIrr = irrOf(aggSellCF);
  for (let Y = 1; Y <= H; Y++) {
    const irr = irrOf(aggSellCFatY(Y));
    if (irr != null && (bestSellIrr == null || irr > bestSellIrr)) { bestSellIrr = irr; bestSellY = Y; }
  }
  let allRent = null, allBiz = null;
  for (let Y = 1; Y <= H; Y++) {
    const r = evalCombo(Object.fromEntries(cats.map(c => [c.key, "rent"])), Y);
    if (!allRent || scoreOf(comboCF(Object.fromEntries(cats.map(c => [c.key, "rent"])), Y)) >
                    scoreOf(comboCF(Object.fromEntries(cats.map(c => [c.key, "rent"])), allRent.Y))) allRent = r;
    const b = evalCombo(Object.fromEntries(cats.map(c => [c.key, "business"])), Y);
    if (!allBiz  || scoreOf(comboCF(Object.fromEntries(cats.map(c => [c.key, "business"])), Y)) >
                    scoreOf(comboCF(Object.fromEntries(cats.map(c => [c.key, "business"])), allBiz.Y))) allBiz = b;
  }
  const stratLabel = { sell: "售", rent: "租", business: "營" };
  const describe = (combo) => cats.map(c => c.label + stratLabel[combo.assign[c.key]]).join(" · ") + (hasParking ? " · 車位售" : "");
  // 自 v189: 計算各候選方案的稅後淨利（現金流總和）
  const npOf = (c) => {
    const cfs = comboCF(c.assign, c.Y);
    return cfs.reduce((s, f) => s + f.amt, 0);  // 自 v191修正: cfs結構是{year,amt}，不是{value}
  };
  const candidates = [
    { name: "全部出售", ...allSell, netProfit: npOf(allSell), kind: "pure" },
    { name: "全部長租", ...allRent, netProfit: npOf(allRent), kind: "pure" },
    { name: "全部自營", ...allBiz,  netProfit: npOf(allBiz),  kind: "pure" },
    { name: "最優混合", ...bestMix, netProfit: npOf(bestMix), kind: "mix", detail: describe(bestMix) }
  ];
  // 自 v226: 使用者勾選才把情境E(純售地)/F(容積移轉)納入最優方案比較，
  //   走跟A/B/C/D同一套 calcPureLandSaleScenario/calcVolTransferScenario 已算好的 irr/mirr，
  //   不重新發明算法，確保跟情境收益表格顯示的數字口徑一致。
  const _incl = o.includeSpecialScenarios || {};
  if (_incl.pureLandSale && cb.pureLandSale && cb.pureLandSale.enabled) {
    const PL = calcPureLandSaleScenario(p, dr);
    if (!PL.skipped) {
      candidates.push({
        name: "純售地", kind: "custom", isSpecial: "pureLandSale",
        irr: PL.irr, mirr: PL.mirr, netProfit: PL.totalProfit,
        roi: calcROI(PL.cashflows), payback: calcPayback(PL.cashflows), tv: null
      });
    }
  }
  if (_incl.volTransfer && cb.volTransfer && cb.volTransfer.enabled) {
    const VT = calcVolTransferScenario(p, dr);
    if (!VT.skipped) {
      candidates.push({
        name: "容積移轉", kind: "custom", isSpecial: "volTransfer",
        irr: VT.irr, mirr: VT.mirr, netProfit: VT.totalProfit,
        roi: calcROI(VT.cashflows), payback: calcPayback(VT.cashflows), tv: null
      });
    }
  }
  return {
    II, totalCost, totalLand, totalRev, totalTax, horizon: H, reinvestRate: rr,
    devStartYear, devEndYear, devYears, devBurden, devLandInvest, devStructTax, financeRate,
    totalInvested: devLandInvest + devBurden + devStructTax,
    acqYear: (Number(cb.acquireYear) || eh.year), acqFromTable: !!Number(cb.acquireYear), baseHoldY,
    parkRev, parkNet, hasParking,
    cats: cats.map(c => ({ key: c.key, label: c.label, area: c.area, rev0: c.baseRev, effRate: c.effRate })),
    candidates, bestMix, describe: describe(bestMix),
    // 自 v158: 最佳售出時點 (IRR 最大化) — 純處分「何時賣最有利」
    bestSellY, bestSellIrr,
    sellByYear: Array.from({ length: H + 1 }, (_, Y) => ({ Y, irr: irrOf(aggSellCFatY(Y)) })),
    hasData: (cats.length > 0 || hasParking) && II > 0
  };
}

// 自 v160/v169: 分配組合最優化引擎
// 在「比例模式(價值導向)」下，搜尋各類別的最優分配比例
// × 各類別處分策略(sell/rent/business) × 車位數量，最大化目標函數
// 自 v169: 加入車位獨立搜尋維度；autoCaps 改金額比例；兩層分離優化
function calcComboOptimizer(p, dr, opts) {
  const o = Object.assign({ horizon: 20, reinvestRate: 0.015, step: 5, metric: "irr" }, opts || {});
  const H = o.horizon, rr = o.reinvestRate, metric = o.metric;

  // ── 1. salesMix 各房屋類別 ──
  const sm = dr.salesMix || {};
  const allCats = [
    { key: "res",    label: sm.res?.label    || "住宅", uP: Number(sm.res?.uP)    || 0, smArea: sm.res?.area    || 0 },
    { key: "retail", label: sm.retail?.label || "店面", uP: Number(sm.retail?.uP) || 0, smArea: sm.retail?.area || 0 },
    { key: "office", label: sm.office?.label || "廠辦", uP: Number(sm.office?.uP) || 0, smArea: sm.office?.area || 0 },
    ...(sm.customCategories || []).map(c => ({ key: c.id, label: c.label, uP: Number(c.uP) || 0, smArea: c.area || 0 }))
  ].filter(c => c.smArea > 0 || c.uP > 0);
  if (allCats.length < 2) return { skipped: true, reason: allCats.length === 0 ? "noData" : "singleCat" };

  // ── 2. allocValue（比例模式固定金額）—— 自 v238 提前到 caps 邏輯之前，
  //   讓「物理樓地板面積上限」能換算成對應這位地主分回金額的等效百分比
  const ceFull0 = calcCompBenefit(p, dr);
  const allocValue = ceFull0.myAllocValue || 0;
  const isValueBased = !!ceFull0.isValueBased;
  if (!isValueBased || allocValue <= 0) return { skipped: true, reason: "notValueBased", allocValue };

  // ── 3. autoCaps 改用金額比例（v169：比面積比例更精確）──
  const houseSales = sm.houseSales || allCats.reduce((a, c) => a + c.smArea * c.uP, 0);
  const autoCaps = allCats.map(c => houseSales > 0 ? Math.round(c.smArea * c.uP / houseSales * 100) : 0);
  // 自 v238: 物理樓地板面積上限 — 換算成「這位地主分回金額」的等效百分比。
  //   根因：autoCaps 是用「全案總銷」當分母算出來的百分比，套用在「地主自己的分回金額」
  //   （只是全案的一部分）上，天然會被稀釋、算出偏小的坪數，過去恰好從未真正逼近或超過
  //   三、銷售假設設定的實際樓地板面積上限；但只要上限被放寬（例如鎖定情境），這個從未
  //   被明確檢查過的物理限制就會被突破，搜尋出不可能蓋出來的坪數。這裡新增一層獨立防護：
  //   不管其他規則把上限設成多少，最終都要跟「物理樓地板面積上限」取交集。
  const physicalCapPct = allCats.map(c => {
    if (allocValue <= 0 || c.uP <= 0 || c.smArea <= 0) return 100;  // 缺資料時不限制，避免誤擋合法解
    return Math.min(100, c.smArea * c.uP / allocValue * 100);
  });
  // 自 v211: 鎖定值（locks）— 該類別固定為此比例，不參與搜尋，其餘類別瓜分剩下的額度
  //   跟「上限(caps)」不同：caps 是 0~cap 之間的搜尋範圍，locks 是強制固定的單一值
  //   自 v237: locks/lockSum 提前到 caps 之前計算，讓 caps 能依鎖定狀態調整非鎖定類別的預設上限
  const userLocks = (o.locks || []);
  const locks = allCats.map((_, i) => {
    const v = userLocks[i];
    return (v !== undefined && v !== null && v !== "" && !isNaN(Number(v))) ? Math.max(0, Math.min(100, Math.round(Number(v)))) : null;
  });
  const lockSum = locks.reduce((a, v) => a + (v || 0), 0);
  if (lockSum > 100.5) return { skipped: true, reason: "locksExceed100", lockSum };
  const userCaps = (o.caps || []);
  // 自 v238 修正: 放寬觸發條件不能只看「鎖定」，使用者直接把「上限」手動設成0，
  //   效果上等同鎖定為0（這個類別只能貢獻0%），也該觸發放寬其他類別的預設上限，
  //   否則透過「上限」欄位輸入0，會踩到跟鎖定=0完全一樣的「找不到最優解」問題。
  const hasAnyLock = locks.some(v => v != null);
  const hasAnyZeroCap = allCats.some((_, i) => {
    if (locks[i] != null) return false;  // 已是鎖定，不重複判斷
    const u = userCaps[i];
    return (u !== undefined && u !== null && u !== "" && Number(u) === 0);
  });
  const shouldRelax = hasAnyLock || hasAnyZeroCap;
  const remainingBudget = Math.max(0, 100 - lockSum);
  const caps = allCats.map((_, i) => {
    if (locks[i] != null) return 100;  // 鎖定的類別不需要上限概念(固定值)，給100避免影響minCap計算
    const u = userCaps[i];
    if (u !== undefined && u !== null && u >= 0) {
      // 使用者手動設定的值，優先尊重（含手動設0），但仍要跟物理上限取交集
      return Math.min(Math.min(100, Math.round(Number(u))), Math.round(physicalCapPct[i]));
    }
    const base = shouldRelax ? remainingBudget : autoCaps[i];
    return Math.min(Math.round(base), Math.round(physicalCapPct[i]));
  });
  // 步長只依「未鎖定」類別的上限決定，避免鎖定值（可能很小）過度限制其他類別的網格精度
  const minCap = Math.max(1, caps.filter((c, i) => c > 0 && locks[i] == null).reduce((a, c) => Math.min(a, c), 100));
  const step = Math.max(1, Math.min(minCap, o.step));

  // ── 4. 車位參數（v169）──
  const pm = p.parkingMix || {};
  const flatUP  = Number((pm.flat||{}).uP) || 0;
  const mechUP  = Number((pm.mechanical||{}).uP) || 0;
  const flatC   = Number((pm.flat||{}).count) || 0;
  const mechC   = Number((pm.mechanical||{}).count) || 0;
  const parkTotalSales = Number(sm.parkTotalSales) || 0;
  const hasPark = !p.pip && parkTotalSales > 0;
  const totalSales = Number(sm.totalSales) || (houseSales + parkTotalSales);
  const myParkAlloc = hasPark && totalSales > 0 ? allocValue * parkTotalSales / totalSales : 0;
  const parkTotalCount = flatC + mechC;
  const parkAvgUP = parkTotalCount > 0
    ? (flatC * flatUP + mechC * mechUP) / parkTotalCount
    : (flatUP || mechUP || 0);

  // ── 5. 開發期參數 ──
  const cb = p.compBenefit || {};
  const _defs = makeScenarioDefs(p);
  const _scA = (_defs || []).find(d => d.id === "A") || null;
  const _scaOverride = _scA ? _scA.override : null;
  const snap0 = calcT8Snapshot(p, dr, _scaOverride);
  const devStartYear = snap0.devStartYear, devEndYear = snap0.devEndYear;
  const devBurden = snap0.burdenCost || 0, devLandInvest = snap0.landInvest || 0;
  const devStructTax = (snap0.devLVT || 0) + (snap0.devDeed || 0);
  const financeRate = (Number((p.t8 || {}).discountRate) || 0) / 100;
  const eh = (p.salesSched && p.salesSched.length) ? p.salesSched[p.salesSched.length - 1] : { year: 2028, month: 6 };
  const _scaDisp0 = (_scaOverride && _scaOverride.disposals && _scaOverride.disposals[0]) ? _scaOverride.disposals[0] : null;
  const _baseDisp0 = (cb.disposals && cb.disposals.length) ? cb.disposals[0] : null;
  const _dispYear = (_scaDisp0 && Number(_scaDisp0.year)) ? Number(_scaDisp0.year)
                  : (_baseDisp0 && Number(_baseDisp0.year)) ? Number(_baseDisp0.year) : eh.year;
  const _dispMonth = (_scaDisp0 && Number(_scaDisp0.month)) ? Number(_scaDisp0.month) : eh.month;
  const saleYear = Math.max(devStartYear, _dispYear);
  const terminalYear = saleYear + H;
  const appRate = (Number(cb.landAppRate) || 0) / 100, depRate = (Number(cb.buildingDepRate) || 0) / 100;
  const bRatio = Math.max(0, Math.min(100, Number(cb.buildingRatio) || 45)) / 100, lRatio = 1 - bRatio;
  const apprFactor = (Y) => bRatio * Math.pow(1 - depRate, Y) + lRatio * Math.pow(1 + appRate, Y);
  // 自 v215: 逐類別讀取租金/營業費率與年調幅（同calcOptimizer的邏輯）
  const _rentItems = Array.isArray(cb.rent?.items) ? cb.rent.items : [];
  const _bizItems   = Array.isArray(cb.business?.items) ? cb.business.items : [];
  const getRentRate = (catKey) => {
    const it = _rentItems.find(x => x.catKey === catKey && x.enabled !== false);
    return it ? { rate: Number(it.monthlyRent) || 0, growth: (Number(it.annualGrowthRate) || 0) / 100 }
              : { rate: Number(cb.rent?.monthlyRent) || 0, growth: (Number(cb.rent?.annualGrowthRate) || 0) / 100 };
  };
  const getBizRate = (catKey) => {
    const it = _bizItems.find(x => x.catKey === catKey && x.enabled !== false);
    return it ? { rate: Number(it.perfPerPing) || 0, growth: (Number(it.annualGrowthRate) || 0) / 100 }
              : { rate: Number(cb.business?.perfPerPing) || 0, growth: (Number(cb.business?.annualGrowthRate) || 0) / 100 };
  };
  const devCF = [];
  if (devLandInvest > 0) devCF.push({ year: devStartYear, amt: -devLandInvest });
  const _effDevEndYear = Math.min(devEndYear, saleYear);
  const _effDevYears = Math.max(1, _effDevEndYear - devStartYear + 1);
  for (let y = devStartYear; y <= _effDevEndYear; y++) devCF.push({ year: y, amt: -devBurden / _effDevYears });
  devCF.push({ year: _effDevEndYear, amt: -devStructTax });

  // ── 7. 輕量財務指標 ──
  const tvOf  = (cfs) => cfs.reduce((a, c) => a + (c.amt > 0 ? c.amt * Math.pow(1 + rr, terminalYear - c.year) : 0), 0);
  const irrOf = (cfs) => calcIRR(cfs.map(c => ({ year: c.year, value: c.amt })));
  function mirrOf(cfs) {
    let fvPos = 0, pvNeg = 0;
    cfs.forEach(c => {
      if (c.amt > 0) fvPos += c.amt * Math.pow(1 + rr, terminalYear - c.year);
      else pvNeg += (-c.amt) / Math.pow(1 + financeRate, c.year - devStartYear);
    });
    const n = terminalYear - devStartYear;
    return (pvNeg > 0 && n > 0) ? Math.pow(fvPos / pvNeg, 1 / n) - 1 : 0;
  }
  function roiOf(cfs) {
    let pos = 0, neg = 0;
    cfs.forEach(c => { if (c.amt > 0) pos += c.amt; else neg += -c.amt; });
    return neg > 0 ? (pos - neg) / neg : 0;
  }
  function paybackOf(cfs) {
    const byYear = {};
    cfs.forEach(c => { byYear[c.year] = (byYear[c.year] || 0) + c.amt; });
    const years = Object.keys(byYear).map(Number).sort((a, b) => a - b);
    let cum = 0, wentNeg = false;
    for (const y of years) {
      const before = cum; cum += byYear[y];
      if (cum < 0) wentNeg = true;
      if (cum >= 0 && (wentNeg || before < 0)) {
        const frac = byYear[y] > 0 ? Math.min(1, Math.max(0, -before / byYear[y])) : 0;
        return Math.max(0, (y - 1 + frac) - devStartYear);
      }
    }
    return Infinity;
  }
  const scoreOf = (cfs) => {
    if (metric === "payback")   { const v = paybackOf(cfs); return isFinite(v) ? -v : -999; }
    if (metric === "roi")       return roiOf(cfs);
    if (metric === "irr")       { const v = irrOf(cfs); return v == null ? -99 : v; }
    if (metric === "netProfit") return cfs.reduce((s,c) => s+c.amt, 0);  // 自 v189/v191修正: cfs結構是{year,amt}
    return mirrOf(cfs);
  };

  // ── 8. 兩層分離：外層 ratios × 一次 calcCompBenefit，內層策略×年期×車位四則運算 ──
  function evalRatios(ratios) {
    const myRole = p.myRole || "builder";
    const items = allCats.map((c, i) => ({ catKey: c.key, mode: "ratio", ratio: ratios[i], count: 1, area: 0 }))
                         .filter((_, i) => ratios[i] > 0);
    const pPrime = {
      ...p,
      shareComposition: {
        ...(p.shareComposition || {}),
        byRole: { ...((p.shareComposition || {}).byRole || {}), [myRole]: { mode: "manual", items } }
      },
      compBenefit: { ...cb, ..._scaOverride }
    };
    const drPrime = calcDerived(pPrime);
    const ceFull = calcCompBenefit(pPrime, drPrime);
    const _fdAll = (ceFull.longHold && ceFull.longHold.disposals || []).filter(d => d.enabled);
    const totRev  = _fdAll.reduce((a, d) => a + (Number(d.totalRevenue) || 0), 0);
    const totTax  = _fdAll.reduce((a, d) => a + ((d.taxInfo && Number(d.taxInfo.tax)) || 0), 0);
    const totCost = _fdAll.reduce((a, d) => a + (Number(d.costShare) || 0), 0);
    const totLand = _fdAll.reduce((a, d) => a + (Number(d.landShare) || 0), 0);
    // 自 v211 修正：租金補貼(otherIncome)連動缺口 — evalRatios 之前只從逐筆 disposal 加總
    //   totRev/totCost/totLand/totTax，完全沒讀到 ceFull.myCs.otherIncome（v207/v208 新增的
    //   獨立收入項），導致最優化評分看不到這筆錢，選出的組合可能不是真正最優。
    //   修法：otherIncome 視為額外的一次性收入，直接加進 totRev（跟現金流的認列時點一致，
    //   一次性計入 saleYear，詳見下方 evalInner 加總處）。
    const myOtherIncome = Number(ceFull.myCs && ceFull.myCs.otherIncome) || 0;
    const totTaxable = Math.max(totRev - totCost - totLand, 0);
    const effRate = totTaxable > 0 ? totTax / totTaxable : 0;
    const catAreas = allCats.map((c, i) => ({
      ...c,
      area: (ceFull.myTypeAreas && ceFull.myTypeAreas[c.key]) || 0,
      rev:  totRev * ratios[i],
      cost: totCost * ratios[i],
      land: totLand * ratios[i],
    }));
    // 車位數推算（v169）：用此組合的總房屋面積
    const totalCatArea = catAreas.reduce((a, c) => a + c.area, 0);
    const rawPark  = hasPark ? totalCatArea / 40 : 0;
    const floorPk  = Math.floor(rawPark);
    const ceilPk   = Math.ceil(rawPark);
    const ceilCost = ceilPk * parkAvgUP;
    const autoParkCountMax = hasPark
      ? (ceilCost > myParkAlloc && ceilPk > floorPk ? floorPk : ceilPk)
      : 0;
    // 自 v234: 使用者可設定車位上限/鎖定（支援小數），覆寫自動算出的範圍
    //   鎖定優先於上限（鎖定時上下限收斂成同一個數字，等同不搜尋，只驗算這一個點）
    const parkCountMax = hasPark
      ? (o.parkLock != null ? o.parkLock : (o.parkCap != null ? Math.min(autoParkCountMax, o.parkCap) : autoParkCountMax))
      : 0;
    const parkCountMin = hasPark
      ? (o.parkLock != null ? o.parkLock : Math.max(1, Math.min(parkCountMax, 1)))
      : 0;
    // 車位稅後淨額（按比例近似 effRate）
    const parkNetOf = (cnt) => {
      if (!hasPark || cnt <= 0 || parkAvgUP <= 0) return 0;
      const rev = cnt * parkAvgUP;
      const cost = totCost > 0 && totRev > 0 ? totCost * rev / totRev : 0;
      const land = totLand > 0 && totRev > 0 ? totLand * rev / totRev : 0;
      const taxable = Math.max(rev - cost - land, 0);
      return rev - taxable * effRate;
    };
    return { catAreas, effRate, totRev, totCost, totLand, parkCountMin, parkCountMax, autoParkCountMax, parkNetOf, myOtherIncome };
  }

  function evalInner(ratios, rData, stratAssign, Y, parkCnt) {
    const { catAreas, effRate, parkNetOf, myOtherIncome } = rData;
    const comboByYear = {};
    devCF.forEach(c => { comboByYear[c.year] = (comboByYear[c.year] || 0) + c.amt; });
    catAreas.forEach((cat, i) => {
      if (cat.rev <= 0) return;
      const strat = stratAssign[i];
      const catNet = (yr) => {
        const rev = cat.rev * apprFactor(yr);
        const taxable = Math.max(rev - cat.cost - cat.land, 0);
        return rev - taxable * effRate;
      };
      if (strat === "sell") {
        comboByYear[saleYear] = (comboByYear[saleYear] || 0) + catNet(0);
      } else {
        // 自 v215: 逐類別讀取費率+調幅，逐年複利
        const { rate, growth } = strat === "rent" ? getRentRate(cat.key) : getBizRate(cat.key);
        for (let t = 1; t <= Y; t++) {
          const annual = cat.area * rate * Math.pow(1 + growth, t - 1) * 12;
          comboByYear[saleYear + t] = (comboByYear[saleYear + t] || 0) + annual;
        }
        comboByYear[saleYear + Y] = (comboByYear[saleYear + Y] || 0) + catNet(Y);
      }
    });
    const pNet = parkNetOf(parkCnt);
    if (pNet > 0) comboByYear[saleYear] = (comboByYear[saleYear] || 0) + pNet;
    // 自 v211: 租金補貼一次性計入 saleYear（不隨類別/策略/年期重複，跟 pd_sumNetProfit 處理方式一致）
    if (myOtherIncome > 0) comboByYear[saleYear] = (comboByYear[saleYear] || 0) + myOtherIncome;
    return Object.entries(comboByYear).sort(([a],[b])=>Number(a)-Number(b)).map(([year,amt])=>({ year: Number(year), amt }));
  }

  // ── 9. 網格掃描 ──
  const N = allCats.length;
  const strategies = ["sell", "rent", "business"];
  let best = null;

  function scanStrategies(ratios, rData) {
    const { parkCountMin, parkCountMax, parkNetOf } = rData;
    // 自 v234: parkRange 改為支援小數鎖定/上限——
    //   鎖定時：只有一個測試點（可為小數），等同不搜尋這個維度
    //   非鎖定：整數步進掃描，並強制加入上限本身（可能是小數）當作額外測試點，
    //     確保「剛好卡在上限」這個邊界值有被驗算到（比照類別caps的處理方式）
    let parkRange;
    if (!hasPark) {
      parkRange = [0];
    } else if (o.parkLock != null) {
      parkRange = [parkCountMax];  // 鎖定時 parkCountMin===parkCountMax===鎖定值
    } else {
      const intMin = Math.max(0, Math.ceil(parkCountMin));
      const intMax = Math.floor(parkCountMax);
      const pts = new Set();
      for (let c = intMin; c <= intMax; c++) pts.add(c);
      pts.add(parkCountMax);  // 上限本身(可能是小數)強制納入
      if (pts.size === 0) pts.add(parkCountMax);
      parkRange = [...pts].sort((a, b) => a - b);
    }
    const totalStrats = Math.pow(3, N);
    for (let si = 0; si < totalStrats; si++) {
      const strats = []; let tmp = si;
      for (let k = 0; k < N; k++) { strats.push(strategies[tmp % 3]); tmp = Math.floor(tmp / 3); }
      const hasSellOnly = strats.every(s => s === "sell");
      const yearsToScan = hasSellOnly ? [0] : [0, ...Array.from({length:H}, (_,i)=>i+1)];
      for (const Y of yearsToScan) {
        for (const parkCnt of parkRange) {
          const cfs = evalInner(ratios, rData, strats, Y, parkCnt);
          let s;
          if (metric === "payback")   { const v = paybackOf(cfs); s = isFinite(v) ? -v : -999; }
          else if (metric === "roi")  s = roiOf(cfs);
          else if (metric === "irr")  { const v = irrOf(cfs); s = v == null ? -99 : v; }
          else if (metric === "netProfit") s = cfs.reduce((a,c)=>a+c.amt,0);  // 自 v189/v191修正: cfs結構是{year,amt}
          else s = mirrOf(cfs);
          if (best === null || s > best.score) {
            best = {
              mirr: mirrOf(cfs), irr: irrOf(cfs), roi: roiOf(cfs),
              payback: paybackOf(cfs), tv: tvOf(cfs),
              netProfit: cfs.reduce((a,c)=>a+c.amt,0),  // 自 v209: 稅後淨利，供UI「稅後淨利」指標顯示
              ratios: [...ratios], strats: [...strats], Y, parkCnt,
              totRev: rData.totRev, catAreas: rData.catAreas, score: s,
              autoParkCountMax: rData.autoParkCountMax  // 自 v234: 供UI顯示自動上限對照用
            };
          }
        }
      }
    }
  }

  function scanRatios(idx, remaining, current) {
    if (idx === N - 1) {
      const last = remaining;
      const lockLast = locks[N-1];
      if (lockLast != null) {
        // 自 v211: 最後一個類別若被鎖定，必須剛好等於剩餘額度（否則這組合不合法，跳過）
        if (Math.abs(last - lockLast) > 0.5) return;
        current[N-1] = lockLast / 100;
      } else {
        if (last < 0 || last > caps[N-1] + 0.5) return;
        current[N-1] = Math.max(0, Math.min(caps[N-1], last)) / 100;
      }
      const ratios = [...current];
      const rData = evalRatios(ratios);
      scanStrategies(ratios, rData);
      return;
    }
    const lockHere = locks[idx];
    let pts;
    if (lockHere != null) {
      // 自 v211: 鎖定值 → 只有一個搜尋點（固定值），不做網格掃描
      pts = new Set([Math.max(0, Math.min(remaining, lockHere))]);
    } else {
      const maxHere = Math.min(caps[idx], remaining);
      // 收集掃描點：step 倍數 + cap 值本身（確保上限點被掃到）
      pts = new Set();
      for (let pct = 0; pct <= maxHere + 0.5; pct += step) pts.add(Math.min(Math.round(pct), maxHere));
      pts.add(maxHere);  // 強制加入 cap 值本身
    }
    for (const p_ of [...pts].sort((a,b)=>a-b)) {
      current[idx] = p_ / 100;
      scanRatios(idx + 1, remaining - p_, current);
    }
  }

  const startT = Date.now();
  scanRatios(0, 100, new Array(N).fill(0));
  const elapsed = Date.now() - startT;

  if (!best) return { skipped: true, reason: "noResult" };

  return {
    best, allCats, caps, autoCaps, locks, allocValue, isValueBased,
    hasPark, parkAvgUP, myParkAlloc, autoParkCountMax: best.autoParkCountMax,
    devStartYear, devEndYear, saleYear, elapsed, metric, hasData: true
  };
}

// 自 v94: 整合決策矩陣 (M 價格方案 × N 分配方案 × K 處置情境)
// 給定指定 myRole, 算所有組合的 snapshot
function calcIntegratedMatrix(p, dr, myRoleKey) {
  const sceList = p.scenarios || [];
  const allocList = p.allocScenarios || [];
  const scenarioDefs = makeScenarioDefs(p);

  // 沒有分配方案時, 用一個 null 代表「不調整」
  const allocEffective = allocList.length > 0 ? allocList : [null];

  const rows = [];
  sceList.forEach(sc => {
    allocEffective.forEach(allocSc => {
      // 套用價格方案 (sc.price, sc.cost) + 分配方案 (allocSc 內含 jbLandlordShare 等)
      const priceFactor = (Number(sc.price) || 0) / 10000;  // sc.price 是「售價±%×100」基準, 直接當 price 套用
      // 實際: T2 內 sc 是 {id, label, price, cost} 直接是絕對值
      // 所以套用方式: 設 p.uP = sc.price, p.cC = sc.cost
      let tempP = { ...p, uP: Number(sc.price) || p.uP, cC: Number(sc.cost) || p.cC };
      // 方案影響全部 (Q3=B): 租金/自營單價也按比例調整
      const priceRatio = (Number(sc.price) || 0) / (Number(p.uP) || 1);
      if (tempP.compBenefit && tempP.compBenefit.rent) {
        tempP.compBenefit = {
          ...tempP.compBenefit,
          rent: { ...tempP.compBenefit.rent, monthlyRent: (Number(tempP.compBenefit.rent.monthlyRent) || 0) * priceRatio },
          business: { ...tempP.compBenefit.business, perfPerPing: (Number(tempP.compBenefit.business?.perfPerPing) || 0) * priceRatio }
        };
      }
      // 套用分配方案
      if (allocSc) {
        tempP = applyAllocScenario(tempP, allocSc);
      }
      // 設 myRole
      tempP = { ...tempP, myRole: myRoleKey || "builder" };
      const tempDr = calcDerived(tempP);

      const cells = {};
      scenarioDefs.forEach(scenDef => {
        const snap = calcT8Snapshot(tempP, tempDr, scenDef.override);
        cells[scenDef.id] = {
          totalProfit: snap.totalProfit,
          irr: snap.irr,
          npv: snap.npv,
          roi: snap.roi
        };
      });
      rows.push({
        scId: sc.id,
        scLabel: sc.label,
        allocId: allocSc ? allocSc.id : null,
        allocLabel: allocSc ? allocSc.label : "(原配)",
        cells
      });
    });
  });

  return { rows, scenarioDefs };
}

// 敏感度分析的價格顯示: 統一保留 2 位小數
function formatPriceValue(v) {
  if (v == null || isNaN(v)) return "—";
  return v.toFixed(2);
}

// 敏感度分析: 5x5 矩陣 (售價±X%, 造價±X%) + 具體值 + 彈性指數 + 臨界點
function calcT8Sensitivity(p, dr) {
  const t8 = p.t8 || {};
  const range = Number(t8.sensitivityRange) || 10;
  const steps = [-range, -range/2, 0, range/2, range];  // 5 個變動點
  // 基準值: 售價、造價 (取自 costItems.co 為優先, 沒有則用 p.cC)
  const ci = getCostItems(p);
  // 自 v64: 敏感度只調住宅單價, 店面/辦公固定
  //         basePrice = 住宅單價 (salesMix.res.uP 或 p.uP 後備)
  const basePrice = Number(p.salesMix?.res?.uP) || Number(p.uP) || 0;
  // ─── 計算「co 的換算金額」(不論輸入模式為何) ───
  // 用 calcCostItemValue 取得當前 co 的實際金額
  const totalArea = dr.totalArea || 1;
  const sales = dr.ts || 0;
  // 預估 totalCost 給 pctCost 模式用
  const baseCoVal = Number(ci.co?.value) || 0;
  const ctxBase = { sales, totalArea, totalCost: baseCoVal * totalArea };
  const baseCoAmount = calcCostItemValue(ci.co, ctxBase);  // co 的實際金額(萬)
  // 等效單坪造價 (萬/坪) — 永遠以「金額 ÷ 總銷面積」呈現
  const basePerPing = totalArea > 0 ? baseCoAmount / totalArea : 0;
  // 輸入模式說明 (給驗證對照框用)
  const coMode = ci.co?.mode || "perPing";
  const coRawValue = baseCoVal;
  const baseCost = baseCoAmount;  // 內部仍用「金額」做 ±% 變動

  // 對應具體值
  const priceValues = steps.map(s => basePrice * (1 + s/100));
  const costValues = steps.map(s => baseCost * (1 + s/100));
  // 對應單坪造價值 (給顯示用)
  const costPerPingValues = steps.map(s => basePerPing * (1 + s/100));

  // 售價變動時, 同步調整 compBenefit.disposals 內的所有 price (按比例)
  // 否則長期持有模式下處分價跟 p.uP 解耦, 敏感度失真
  const adjustCompBenefit = (cb, priceFactor) => {
    if (!cb || !cb.disposals) return cb;
    return {
      ...cb,
      disposals: cb.disposals.map(d => ({
        ...d,
        price: (Number(d.price) || 0) * priceFactor
      }))
    };
  };

  const matrix = [];
  for (const priceDelta of steps) {
    const row = [];
    const priceFactor = 1 + priceDelta/100;
    for (const costDelta of steps) {
      // co 的調整: 不論 mode 為何, 把 value 等比例調整即可
      const newCo = {...(ci.co || {}), value: (Number(ci.co?.value) || 0) * (1 + costDelta/100)};
      // 自 v64: 只調住宅單價 (salesMix.res.uP), 店面/辦公不動
      const newResUP = basePrice * priceFactor;
      const newSalesMix = {
        ...(p.salesMix || {}),
        res: {...(p.salesMix?.res || {}), uP: newResUP}
      };
      const pAdj = {...p,
        salesMix: newSalesMix,
        uP: newResUP,  // 同步 p.uP (供向下相容路徑用)
        cC: (p.cC || 0) * (1 + costDelta/100),
        costItems: {...ci, co: newCo},
        compBenefit: adjustCompBenefit(p.compBenefit, priceFactor)
      };
      const drAdj = calcDerived(pAdj);
      const snap = calcT8Snapshot(pAdj, drAdj);
      row.push({ priceDelta, costDelta, irr: snap.irr, profit: snap.totalProfit });
    }
    matrix.push(row);
  }

  // ─── 彈性指數 ───
  // 售價彈性 = (IRR 隨售價 +10% 的變化幅度) / 10%
  // 造價彈性 = (IRR 隨造價 +10% 的變化幅度) / 10%
  // 用 ±range 端點計算 (與 0 比較)
  const centerCell = matrix[2][2];  // ±0%, ±0%
  const baseIRR = centerCell?.irr;
  const baseProfit = centerCell?.profit;

  // 售價彈性 (固定造價 ±0%, 售價 +range%)
  const priceUpCell = matrix[4][2];  // priceDelta = +range, costDelta = 0
  const priceDownCell = matrix[0][2];
  let priceElasticityIRR = null;
  let priceElasticityProfit = null;
  if (baseIRR != null && priceUpCell?.irr != null && baseIRR !== 0) {
    priceElasticityIRR = ((priceUpCell.irr - baseIRR) / Math.abs(baseIRR)) / (range/100);
  }
  if (baseProfit != null && priceUpCell?.profit != null && baseProfit !== 0) {
    priceElasticityProfit = ((priceUpCell.profit - baseProfit) / Math.abs(baseProfit)) / (range/100);
  }

  // 造價彈性 (固定售價 ±0%, 造價 +range%)
  const costUpCell = matrix[2][4];
  const costDownCell = matrix[2][0];
  let costElasticityIRR = null;
  let costElasticityProfit = null;
  if (baseIRR != null && costUpCell?.irr != null && baseIRR !== 0) {
    costElasticityIRR = ((costUpCell.irr - baseIRR) / Math.abs(baseIRR)) / (range/100);
  }
  if (baseProfit != null && costUpCell?.profit != null && baseProfit !== 0) {
    costElasticityProfit = ((costUpCell.profit - baseProfit) / Math.abs(baseProfit)) / (range/100);
  }

  // ─── 臨界點分析 ───
  // metric 選項:
  //   "profit"         = 含長期收益的總淨利 = 0
  //   "devOnlyProfit"  = 純開發評估淨利 = 0 (不含租金/營業)
  //   "irr"            = IRR = 0
  const findBreakPoint = (varType, target = 0, metric = "profit") => {
    // 在較大範圍 (-50%~+50%) 內搜尋
    const wideSteps = [];
    for (let d = -50; d <= 50; d += 2.5) wideSteps.push(d);
    let lastVal = null, lastDelta = null;
    for (const delta of wideSteps) {
      const priceFactor = varType === "price" ? (1 + delta/100) : 1;
      const newCo = varType === "cost"
        ? {...(ci.co || {}), value: (Number(ci.co?.value) || 0) * (1 + delta/100)}
        : (ci.co || {});
      const pAdj = {
        ...p,
        uP: varType === "price" ? basePrice * priceFactor : basePrice,
        cC: varType === "cost" ? (p.cC || 0) * (1 + delta/100) : (p.cC || 0),
        costItems: {...ci, co: newCo},
        compBenefit: varType === "price" ? adjustCompBenefit(p.compBenefit, priceFactor) : p.compBenefit
      };
      const drA = calcDerived(pAdj);
      const sn = calcT8Snapshot(pAdj, drA);
      const v = metric === "irr" ? sn.irr
              : metric === "devOnlyProfit" ? sn.devOnlyProfit
              : sn.totalProfit;
      if (v == null) continue;
      if (lastVal != null && ((lastVal - target) * (v - target) < 0)) {
        // 線性內插
        const ratio = (target - lastVal) / (v - lastVal);
        return lastDelta + ratio * (delta - lastDelta);
      }
      lastVal = v;
      lastDelta = delta;
    }
    return null;
  };

  // 計算兩組臨界點: 純開發 vs 含長期收益
  const breakPriceForProfit_dev = findBreakPoint("price", 0, "devOnlyProfit");   // 純開發: 售價跌到 X% 淨利=0
  const breakCostForProfit_dev = findBreakPoint("cost", 0, "devOnlyProfit");
  const breakPriceForProfit_full = findBreakPoint("price", 0, "profit");          // 含長期: 售價跌到 X% 淨利=0
  const breakCostForProfit_full = findBreakPoint("cost", 0, "profit");
  const breakPriceForIRR = findBreakPoint("price", 0, "irr");
  const breakCostForIRR = findBreakPoint("cost", 0, "irr");

  return {
    steps, matrix,
    basePrice, baseCost, priceValues, costValues,
    basePerPing, costPerPingValues,
    coMode, coRawValue, totalArea,
    elasticity: {
      priceIRR: priceElasticityIRR,
      priceProfit: priceElasticityProfit,
      costIRR: costElasticityIRR,
      costProfit: costElasticityProfit,
    },
    breakPoints: {
      // 純開發模式
      priceForProfit_dev: breakPriceForProfit_dev,
      costForProfit_dev: breakCostForProfit_dev,
      // 含長期收益模式
      priceForProfit_full: breakPriceForProfit_full,
      costForProfit_full: breakCostForProfit_full,
      // IRR (不分模式, 採用完整 cashflows)
      priceForIRR: breakPriceForIRR,
      costForIRR: breakCostForIRR,
      basePrice, baseCost, basePerPing
    }
  };
}

/* ════════════════════════════════════════
   MONTHLY CASHFLOW (using expense distribution)
════════════════════════════════════════ */
function cMCF(p, dr, sc) {
  const c = sc.cs;
  const eps = p.expPeriods || DEF_EXP_PERIODS;
  const ed = p.expDist || DEF_EXP_DIST;

  const absM = ep => ep.year * 12 + (ep.month - 1);
  const firstAbs = absM(eps[0]);
  const lastAbs = absM(eps[eps.length - 1]);
  const totalM = lastAbs - firstAbs + 4;

  // Build expense array
  const mExp = Array.from({length: totalM}, () => ({de:0,co:0,ad:0,tx:0,mg:0,am:0}));
  for (let pi = 0; pi < eps.length; pi++) {
    const pStart = absM(eps[pi]) - firstAbs;
    const pEnd = pi < eps.length - 1 ? absM(eps[pi+1]) - firstAbs : totalM;
    const span = Math.max(pEnd - pStart, 1);
    EXP_CATS.forEach(cat => {
      const pctVal = (ed[cat.k] || [])[pi] || 0;
      const total = c[cat.k] || 0;
      const monthly = total * pctVal / span;
      for (let m = Math.max(0, pStart); m < Math.min(pEnd, totalM); m++) {
        mExp[m][cat.k] += monthly;
      }
    });
  }

  // Loan draws
  const toIdx = (y, mo) => y * 12 + (mo - 1) - firstAbs;
  const llT = sc.ll, clT = sc.cl;
  const lD = new Array(totalM).fill(0);
  (p.landLoanSched || []).forEach(s => {
    const idx = toIdx(s.year, s.month);
    if (idx >= 0 && idx < totalM) lD[idx] += llT * s.ratio;
  });
  const cD = new Array(totalM).fill(0);
  (p.constLoanSched || []).forEach(s => {
    const idx = toIdx(s.year, s.month);
    if (idx >= 0 && idx < totalM) cD[idx] += clT * s.ratio;
  });

  // Sales income
  const ss = p.salesSched || [];
  const tSR = ss.reduce((a,s) => a + s.ratio, 0) || 1;
  const incArr = new Array(totalM).fill(0);
  ss.forEach(s => {
    const r = s.ratio / tSR;
    const sellAmt = sc.sh * r;
    const sIdx = toIdx(s.year, s.month);
    for (let d = 0; d < 3; d++) {
      const idx = sIdx + d;
      if (idx >= 0 && idx < totalM) incArr[idx] += sellAmt * p.depR / 3;
    }
    const cIdx = toIdx(eps[eps.length-1].year, eps[eps.length-1].month);
    for (let d = 0; d < 3; d++) {
      const idx = cIdx + d;
      if (idx >= 0 && idx < totalM) incArr[idx] += sellAmt * p.comR / 3;
    }
  });

  let llBal = 0, clBal = 0, cm = 0;
  const mLR = p.lLR / 12, mCR = p.cLR / 12;
  const months = [];

  for (let m = 0; m < totalM; m++) {
    const a = firstAbs + m;
    const yr = Math.floor(a / 12);
    const mo = a % 12 + 1;
    const label = yr + "/" + String(mo).padStart(2, '0');
    let phase = "";
    for (let pi = eps.length - 1; pi >= 0; pi--) {
      if (m >= absM(eps[pi]) - firstAbs) { phase = eps[pi].label; break; }
    }

    const income = incArr[m] || 0;
    const expenseBase = Object.values(mExp[m] || {}).reduce((a,b) => a+b, 0);
    const ld = lD[m] || 0, cd2 = cD[m] || 0;
    llBal += ld; clBal += cd2;
    const loanDraw = ld + cd2;
    let loanRepay = 0;
    if (m === totalM - 1) { loanRepay = llBal + clBal; }
    const interest = llBal * mLR + clBal * mCR;
    const lastPIdx = absM(eps[eps.length-1]) - firstAbs;
    const taxExp = m === lastPIdx ? sc.itx : 0;
    const totalExp = expenseBase + interest + taxExp;
    const init = m === 0 ? (p.initCash || 3000) : 0;
    const net = init + income - totalExp + loanDraw - loanRepay;
    cm += net;
    months.push({m, label, year: yr, month: mo, phase, income, expense: totalExp, loanDraw, loanRepay, interest, init, net, cm});
  }
  const minBal = Math.min(...months.map(x => x.cm));
  const maxGap = minBal < 0 ? Math.abs(minBal) : 0;
  return {months, minBal, maxGap, totalM};
}

// Lucide icon wrapper. 用 lucide.icons + lucide.createElement 把 SVG 塞進 span ref.
// 使用方式: <Icon name="settings" size={18} className="text-emerald-300"/>
// 名稱使用 kebab-case (對應 https://lucide.dev/icons), 內部自動轉 PascalCase 查詢
function Icon({name, size=14, strokeWidth=2, className=""}) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.split("-").map(s => s.charAt(0).toUpperCase() + s.slice(1)).join("");
    const data = window.lucide.icons && window.lucide.icons[key];
    if (!data) { ref.current.textContent = "?"; return; }
    ref.current.innerHTML = "";
    const svg = window.lucide.createElement(data);
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    svg.setAttribute("stroke-width", strokeWidth);
    ref.current.appendChild(svg);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={"inline-flex items-center justify-center align-middle shrink-0 " + className} style={{width:size, height:size}}/>;
}

// 純字串版 Lucide icon — 給用 innerHTML 字串建立的 dialog/modal 用 (React 內請用 <Icon>)
function licon(name, size=16, color="currentColor") {
  if (!window.lucide || !window.lucide.icons) return "";
  const key = name.split("-").map(s => s.charAt(0).toUpperCase() + s.slice(1)).join("");
  const data = window.lucide.icons[key];
  if (!data) return "";
  const svg = window.lucide.createElement(data);
  svg.setAttribute("width", size);
  svg.setAttribute("height", size);
  svg.setAttribute("stroke", color);
  svg.style.display = "inline-block";
  svg.style.verticalAlign = "-0.15em";
  svg.style.marginRight = "4px";
  return svg.outerHTML;
}

const KPI = ({label, value, unit, color="text-slate-800", bg="bg-white"}) => (

const NI = ({value, onChange, className="", ...r}) => {
  // 內部 state 保留使用者輸入的字串 (含過渡狀態如 "", "0.", "-")
  const [localStr, setLocalStr] = useState(() => String(value ?? 0));
  // 標記是否為「使用者正在輸入中」(focused), 以避免外部更新覆寫
  const [isFocused, setIsFocused] = useState(false);

  // 外部 value 變更時, 同步到 localStr (但僅在非聚焦狀態下)
  useEffect(() => {
    if (!isFocused) {
      const numLocal = parseFloat(localStr);
      const numExternal = Number(value);
      // 數值不同才更新顯示 (避免 0 與 "0.00" 的不必要重設)
      if (isNaN(numLocal) || Math.abs(numLocal - numExternal) > 1e-9) {
        setLocalStr(String(value ?? 0));
      }
    }
  }, [value]);

  const handleChange = (e) => {
    const raw = e.target.value;
    setLocalStr(raw);  // 不論如何先存入 (保留過渡狀態)
    // 嘗試解析為數字並通知外部
    if (raw === "" || raw === "-" || raw === ".") {
      onChange(0);  // 空字串視為 0, 但 localStr 保留為 "" 讓使用者繼續輸入
    } else {
      const n = parseFloat(raw);
      if (!isNaN(n)) onChange(n);
    }
  };

  const handleBlur = () => {
    setIsFocused(false);
    // 失焦時, 把 localStr 規範化為合法數字
    if (localStr === "" || localStr === "-" || localStr === "." || isNaN(parseFloat(localStr))) {
      setLocalStr("0");
      onChange(0);
    } else {
      const n = parseFloat(localStr);
      setLocalStr(String(n));
      onChange(n);
    }
  };

  return (
    <input type="number" value={localStr}
      onChange={handleChange}
      onFocus={() => setIsFocused(true)}
      onBlur={handleBlur}
      className={"field-sizing-content w-full text-right px-2 py-1 border border-sky-300 rounded-lg bg-sky-50 text-emerald-900 font-semibold text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 " + className} {...r}/>
  );
};

// 自 v118: 比例/百分比輸入框 — 顯示四捨五入 2 位; 失焦時若未實際編輯則「不回寫」
//   目的: 1/3 這類無限小數 (均分按鈕存 0.333333) 前端顯示 33.33,
//         但底層精度保留 (聚焦後沒改就失焦 → 不覆寫, 加總仍精確 100%)。
//   value 單位由呼叫端決定 (可傳百分比 33.3333 或分數 0.3333), onChange 回傳 round 2 位值。
const NIpct = ({value, onChange, className="", ...r}) => {
  const round2 = (n) => { const x = Number(n); return isNaN(x) ? 0 : Math.round(x * 100) / 100; };
  const disp = (n) => { const x = Number(n); return isNaN(x) ? "0" : String(round2(x)); };
  const [localStr, setLocalStr] = useState(() => disp(value));
  const [isFocused, setIsFocused] = useState(false);
  const editedRef = React.useRef(false);

  // 外部 value 變更時同步顯示 (僅非聚焦)
  useEffect(() => {
    if (!isFocused) setLocalStr(disp(value));
  }, [value]);

  const handleFocus = () => {
    setIsFocused(true);
    editedRef.current = false;          // 重置「已編輯」標記
    setLocalStr(disp(value));           // 以 round 2 位值為編輯起點
  };
  const handleChange = (e) => {
    const raw = e.target.value;
    setLocalStr(raw);
    editedRef.current = true;           // 使用者實際輸入 → 標記已編輯
    if (raw === "" || raw === "-" || raw === ".") {
      // 過渡狀態, 暫不回寫, 等失焦處理
    } else {
      const n = parseFloat(raw);
      if (!isNaN(n)) onChange(round2(n));
    }
  };
  const handleBlur = () => {
    setIsFocused(false);
    if (!editedRef.current) {
      // 未編輯 → 不回寫 (保護底層精度), 顯示恢復 round 2 位
      setLocalStr(disp(value));
      return;
    }
    if (localStr === "" || localStr === "-" || localStr === "." || isNaN(parseFloat(localStr))) {
      setLocalStr("0");
      onChange(0);
    } else {
      const n = round2(parseFloat(localStr));
      setLocalStr(String(n));
      onChange(n);
    }
  };
  return (
    <input type="number" value={localStr}
      onChange={handleChange} onFocus={handleFocus} onBlur={handleBlur}
      className={"field-sizing-content w-full text-right px-2 py-1 border border-sky-300 rounded-lg bg-sky-50 text-emerald-900 font-semibold text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 " + className} {...r}/>
  );
};

        {formula && <div className={"text-[10px] mt-0.5 " + formulaCls}>{formula}</div>}

  );
};

// PctInput: 百分比輸入框 (stateful, 支援小數點 2 位精度)
// value: 0~1 (decimal); 顯示為 0~100 (%)
const PctInput = ({value, onChange, className="", step="0.01", min=0, max=100, ...r}) => {
  const [localStr, setLocalStr] = useState(() => (((Number(value)||0)*100).toFixed(2)));
  const [isFocused, setIsFocused] = useState(false);

  useEffect(() => {
    if (!isFocused) {
      const target = ((Number(value)||0)*100).toFixed(2);
      const curNum = parseFloat(localStr);
      const targetNum = parseFloat(target);
      if (isNaN(curNum) || Math.abs(curNum - targetNum) > 1e-6) {
        setLocalStr(target);
      }
    }
  }, [value]);

  const handleChange = (e) => {
    const raw = e.target.value;
    setLocalStr(raw);
    if (raw === "" || raw === "-" || raw === ".") { onChange(0); return; }
    const n = parseFloat(raw);
    if (!isNaN(n)) {
      const clamped = Math.max(min, Math.min(max, n));
      onChange(clamped / 100);
    }
  };

  const handleBlur = () => {
    setIsFocused(false);
    const n = parseFloat(localStr);
    if (isNaN(n)) { setLocalStr("0.00"); onChange(0); }
    else {
      const clamped = Math.max(min, Math.min(max, n));
      setLocalStr(clamped.toFixed(2));
      onChange(clamped / 100);
    }
  };

  return (
    <input type="number" value={localStr} step={step} min={min} max={max}
      onChange={handleChange}
      onFocus={() => setIsFocused(true)}
      onBlur={handleBlur}
      className={"field-sizing-content w-full " + className} {...r}/>
  );
};

      const session = { userId: uid, loginAt: Date.now() };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      // 每次登入都從後端拉所有專案, 雲端為主合併本地
      try {

          <p style={{color:"#9C998F",fontSize:10,letterSpacing:"0.3em",marginTop:4}}>TAIWAN DIGITAL CONSTRUCTION BRAIN</p>

        <div style={{background:"#FFFFFF",borderRadius:20,padding:24,border:"1px solid #E2DFD7",boxShadow:"0 4px 24px rgba(95,107,74,0.10)"}}>
          <div style={{marginBottom:16}}>
            <label style={{color:"#6A685F",fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>USERID</label>
            <input type="text" value={userId} autoComplete="username"
              onChange={e=>{setUserId(e.target.value); setErr("")}}

/* ════════════════════════════════════════
   CostItemRow: 單一成本項目編輯列 (外部穩定元件)
   提取為外部元件, 避免每次 render 重建導致 NI 失焦/卡頓
════════════════════════════════════════ */
const COST_MODES = [
  {v:"perPing",  l:"萬/坪"   , unit:"萬/坪", baseLabel:"總銷面積"},
  {v:"pctSales", l:"% 總銷"  , unit:"%",     baseLabel:"總銷金額"},
  {v:"pctCost",  l:"% 造價"  , unit:"%",     baseLabel:"總造價"},
  {v:"fixed",    l:"固定金額" , unit:"萬",    baseLabel:""},
  {v:"auto",     l:"自動"    , unit:"",      baseLabel:""},
];
function CostItemRow({item, label, isCustom, customId, ctx, updStd, updCustom, delCustom}) {
  if (!item) return null;
  const mode = item.mode || "pctSales";
  const value = Number(item.value) || 0;
  const amount = calcCostItemValue(item, ctx);
  const isPercent = mode === "pctSales" || mode === "pctCost";
  const isAuto = mode === "auto";
  const isCo = !isCustom && item._stdKey === "co";
  const floorArea = Number(ctx?.floorArea) || 0;
  const onChangeMode = (newMode) => {
    // 自 v101: co 項目切換 perPing ↔ fixed 時, 用總樓地板面積自動換算 value
    if (isCo && floorArea > 0) {
      let newValue = value;
      if (mode === "perPing" && newMode === "fixed") {
        newValue = value * floorArea;  // 每坪 × 樓地板 = 總金額
      } else if (mode === "fixed" && newMode === "perPing") {
        newValue = value / floorArea;  // 總金額 / 樓地板 = 每坪
      }
      if (newValue !== value) {
        updStd(item._stdKey, {mode: newMode, value: newValue});  // 一次更新兩欄位
        return;
      }
    }
    if (isCustom) updCustom(customId, "mode", newMode);
    else updStd(item._stdKey, "mode", newMode);
  };
  const onChangeValue = (v) => {
    if (isCustom) updCustom(customId, "value", v);
    else updStd(item._stdKey, "value", v);
  };
  const itemType = getItemType(item);
  return (
    <div className="grid grid-cols-14 gap-1 items-center py-1 border-b border-slate-100 text-[12px]" style={{gridTemplateColumns:"repeat(14, minmax(0, 1fr))"}}>
      <div className="col-span-3 text-slate-600 truncate">
        {isCustom ? (
          <input type="text" value={item.label} onChange={e=>updCustom(customId,"label",e.target.value)}
            className="w-full bg-transparent border-b border-dashed border-slate-300 focus:outline-none focus:border-slate-500"/>
        ) : label}
      </div>
      <div className="col-span-3">
        <select value={mode} onChange={e=>onChangeMode(e.target.value)}
          className="w-full text-[10px] border rounded px-1 py-0.5 bg-slate-50">
          {COST_MODES.filter(m => isCustom ? m.v !== "auto" : true).map(m => (
            <option key={m.v} value={m.v}>{m.l}</option>
          ))}
        </select>
      </div>
      <div className="col-span-3">
        {isAuto ? (
          <span className="text-[10px] text-slate-400 italic">系統自動計算</span>
        ) : (
          <div className="flex items-center gap-1">
            <NI value={isPercent ? value*100 : value}
                onChange={v => onChangeValue(isPercent ? v/100 : v)}
                step={isPercent ? 0.5 : (mode === "perPing" ? 1 : 100)}
                className="w-full text-xs"/>
            <span className="text-[10px] text-slate-400 w-8">{COST_MODES.find(m=>m.v===mode)?.unit}</span>
          </div>
        )}
      </div>
      <div className="col-span-2 text-right text-[11px] font-mono text-amber-700">
        {isAuto ? "—" : "= "+fmt(amount)}
        {/* 自 v101: co 項目顯示對照換算值 (用總樓地板面積換算) */}
        {isCo && floorArea > 0 && mode === "perPing" && (
          <div className="text-[9px] text-slate-500 italic">≈ {fmt(value * floorArea)} 萬 (總)</div>
        )}
        {isCo && floorArea > 0 && mode === "fixed" && (
          <div className="text-[9px] text-slate-500 italic">≈ {fmt2(value / floorArea)} 萬/坪</div>
        )}
      </div>
      <div className="col-span-2">
        {isCustom ? (
          <select value={itemType} onChange={e => updCustom(customId, "type", e.target.value)}
            className="w-full text-[9px] border rounded px-1 py-0.5 bg-slate-50">
            <option value="expense">一般費用</option>
            <option value="transfer_to_builder">地主付/建商收</option>
          </select>
        ) : (
          <span className="text-[9px] text-slate-400 italic">一般費用</span>
        )}
      </div>
      <div className="col-span-1 text-center">
        {isCustom && (
          <button onClick={()=>delCustom(customId)}
            className="text-rose-400 hover:text-rose-600"><Icon name="x" size={12}/></button>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   CostItemsEditor: 「四」用的成本項目編輯器
   支援 7 項標準 + 自訂項目, 多種輸入模式
════════════════════════════════════════ */
function CostItemsEditor({p, sP, dr}) {
  const ci = getCostItems(p);
  const cci = getCustomCostItems(p);
  const [customExpanded, setCustomExpanded] = useState(false);

  // 估算總銷、總造價、總面積供「即時換算」顯示
  const sales = dr.ts;
  const totalArea = dr.totalArea;
  // 估算 cf (用 co 的萬/坪估算; 因為 cf 本身就依賴 co)
  const coVal = ci.co?.mode === "perPing" ? (Number(ci.co.value)||0) * totalArea
              : ci.co?.mode === "fixed"   ? (Number(ci.co.value)||0)
              : ci.co?.mode === "pctSales"? (Number(ci.co.value)||0) * sales
              : 0;
  // 自 v101: ctx 加 floorArea (供 co 項目「每坪 ↔ 總金額」互換用)
  const ctx = { sales, totalArea, totalCost: coVal, floorArea: dr.totalFloorArea || totalArea };

  // 更新標準項目
  // 自 v68: 操作 co 時自動同步 p.cC = 等效每坪造價, 並記錄當下面積 (T2/T4 用)
  // 自 v101: 支援多欄位更新 (k 為 object 時, 一次更新多欄位 - 給 co mode 切換用)
  const updStd = (key, k, v) => {
    let newItem;
    if (typeof k === "object" && k !== null) {
      newItem = {...(ci[key]||{}), ...k};  // 多欄位 patch
    } else {
      newItem = {...(ci[key]||{}), [k]: v};  // 單欄位 (向下相容)
    }
    const newCI = {...ci, [key]: newItem};
    if (key === "co") {
      // 自 v103: p.cC 同步 (儲存值, 向下相容; UI 顯示用 dr.cC 即時計算)
      //   仍保留, 因為部分舊邏輯 (cS / T2 / T4) 仍讀 p.cC
      const _floorForCC = dr.totalFloorArea || dr.totalArea || 1;
      const _ctxNow = { sales: dr.ts || 0, totalArea: dr.totalArea || 1, totalCost: 0, floorArea: _floorForCC };
      const _amount = calcCostItemValue({...newItem, _stdKey: "co"}, _ctxNow);
      const newCC = (_floorForCC > 0) ? _amount / _floorForCC : (Number(p.cC) || 0);
      sP({...p, costItems: newCI, cC: newCC, _cCLastSyncArea: _floorForCC});
    } else {
      sP({...p, costItems: newCI});
    }
  };
  // 更新自訂項目
  const updCustom = (id, k, v) => {
    const newCCI = cci.map(c => c.id === id ? {...c, [k]: v} : c);
    sP({...p, customCostItems: newCCI});
  };
  // 新增自訂項目
  const addCustom = () => {
    const newId = uid();
    const newItem = {
      id: newId, key: "cu_"+newId, label: "新項目", mode: "fixed", value: 0,
      expDist: [0, 0, 0, 0, 0, 1.0]  // 預設 100% 在最後階段 (交屋)
    };
    sP({...p, customCostItems: [...cci, newItem]});
  };
  // 刪除自訂項目
  const delCustom = (id) => {
    if (!window.confirm("刪除此自訂項目?")) return;
    sP({...p, customCostItems: cci.filter(c => c.id !== id)});
  };


  // 計算總成本 (供顯示)
  const totalStd = STD_COST_KEYS.reduce((s,k) => s + calcCostItemValue(ci[k], ctx), 0);
  const totalCustom = cci.reduce((s,c) => s + calcCostItemValue(c, ctx), 0);
  const grandTotal = totalStd + totalCustom;

  return (
    <div className="space-y-3">
      {/* 表頭 */}
      <div className="grid grid-cols-14 gap-1 items-center text-[10px] font-bold text-slate-400 border-b-2 pb-1" style={{gridTemplateColumns:"repeat(14, minmax(0, 1fr))"}}>
        <div className="col-span-3">項目</div>
        <div className="col-span-3">計算模式</div>
        <div className="col-span-3">數值</div>
        <div className="col-span-2 text-right">換算金額</div>
        <div className="col-span-2">類型</div>
        <div className="col-span-1 text-center"></div>
      </div>

      {/* 標準 7 項 */}
      <div className="space-y-0">
        {STD_COST_KEYS.map(k => (
          <CostItemRow key={k} item={{...ci[k], _stdKey: k}} label={STD_COST_LABELS[k]} isCustom={false}
            ctx={ctx} updStd={updStd} updCustom={updCustom} delCustom={delCustom}/>
        ))}
      </div>

      {/* 自訂項目 (預設摺疊) */}
      <div className="mt-2">
        <button onClick={()=>setCustomExpanded(!customExpanded)}
          className="text-xs font-bold text-emerald-700 hover:text-emerald-900 flex items-center gap-1">
          {customExpanded ? "▼" : "▶"} 自訂額外成本項目 ({cci.length} 筆)
        </button>
        {customExpanded && (
          <div className="mt-2 ml-3 pl-2 border-l-2 border-sky-300">
            {cci.length === 0 && (
              <div className="text-[11px] text-slate-400 italic mb-2">無自訂項目, 點下方按鈕新增</div>
            )}
            {cci.map(c => (
              <CostItemRow key={c.id} item={c} label={c.label} isCustom={true} customId={c.id}
                ctx={ctx} updStd={updStd} updCustom={updCustom} delCustom={delCustom}/>
            ))}
            <button onClick={addCustom}
              className="mt-2 px-2 py-1 bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-bold rounded">
              + 新增成本項目
            </button>
          </div>
        )}
      </div>

      {/* 自 v68/v103: 等效每坪造價 (顯示 dr.cC 即時值, 不依賴 p.cC 儲存值) */}
      <div className="mt-2 pt-2 border-t border-amber-200 bg-amber-50 rounded-lg p-2 text-[11px]">
        <div className="flex items-center justify-between flex-wrap gap-1">
          <span className="text-amber-700 font-bold">📐 等效每坪造價 (供 T2/T4 用)</span>
          <span className="font-mono font-bold text-amber-800">{(Number(dr.cC)||0).toFixed(2)} 萬/坪</span>
        </div>
        <div className="text-[9px] text-slate-500 mt-1">
          ↑ 即時計算 = 建築工程造價金額 / 總樓地板面積 ({fmt(dr.totalFloorArea,1)} 坪, {dr.areaSrc})
        </div>
      </div>

      {/* 總計 */}
      <div className="mt-2 pt-2 border-t-2 border-slate-300 grid grid-cols-14 gap-1 text-xs" style={{gridTemplateColumns:"repeat(14, minmax(0, 1fr))"}}>

/* ════════════════════════════════════════
   v79: LandValuationSection — 土地價值認列摺疊區
   用於六、合建分回的每個 owner 卡片 (建商 + 各地主)
   3 模式: appraisal=鑑價(自動)/book=帳面(自填)/acquired=取得(自填)
════════════════════════════════════════ */
function LandValuationSection({ valuation, ownerKey, ownerName, p, dr, onUpdate }) {
  const lv = valuation || { mode: "book" };
  let mode = lv.mode || "book";
  if (mode === "appraisal") mode = "announced";  // 舊值正名
  const autoMarket = calcOwnerMarketValue(p, dr, ownerKey);    // 自動市值
  const autoAnnounced = calcOwnerLandValue(p, dr, ownerKey);   // 自動公告總值
  const setMode = (m) => onUpdate({ ...lv, mode: m });
  const setVal = (k, v) => onUpdate({ ...lv, mode, [k]: v });
  // 各模式對應儲存欄位 (決策1=B: 各存一份)
  const fieldKey = { book: "bookValue", acquired: "acquiredValue", market: "marketValue", announced: "announcedValue" }[mode] || "bookValue";
  const stored = Number(lv[fieldKey]) || 0;
  const isAuto = (mode === "market" || mode === "announced");
  const autoVal = mode === "market" ? autoMarket : autoAnnounced;
  // 實際採用 (與 getOwnerLandValue 一致: 手填優先, 未填 fallback 自動)
  let used = stored, fellBack = false;
  if (used <= 0) { used = autoMarket || autoAnnounced; fellBack = used > 0; }
  return (
    <div className="mt-2 pt-2 border-t border-dashed border-slate-300">
      <div className="flex items-center gap-1.5 flex-wrap text-[10px]">
        <span className="font-bold text-emerald-700 inline-flex items-center gap-1"><Icon name="square-stack" size={11}/> 土地價值認列</span>
        <select value={mode} onChange={e=>setMode(e.target.value)} className="text-[10px] px-1 py-0.5 border rounded bg-white">
          <option value="book">帳面成本</option>
          <option value="acquired">取得價值</option>
          <option value="market">市值</option>
          <option value="announced">公告總值</option>
        </select>
        <NI value={stored} onChange={v=>setVal(fieldKey, Math.round((Number(v)||0)*100)/100)} step={100} className="w-24 text-right"/>
        <span className="text-slate-400">萬</span>
        {isAuto && autoVal > 0 && (
          <button onClick={()=>setVal(fieldKey, Math.round(autoVal*100)/100)}
            title={`帶入自動${mode==="market"?"市值":"公告總值"} ${fmt(autoVal)} 萬`}
            className="text-[9px] text-sky-600 hover:text-sky-800 border border-sky-300 rounded px-1 py-0.5">↻ 帶入 {fmt(autoVal)}</button>
        )}
        {stored <= 0 && fellBack && <span className="text-[9px] text-amber-600">(暫代 {fmt(used)} 萬)</span>}
      </div>
      <div className="text-[9px] text-slate-400 mt-0.5">
        參考: 市值 {fmt(autoMarket)}・公告 {fmt(autoAnnounced)} 萬 (自動算自持分×市價/公告現值)。此值為 KPI 投資基準與處分稅基的土地成本。
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 1: 基本假設
════════════════════════════════════════ */
function T1({p, sP}) {
  const dr = calcDerived(p);
  const {zi, totalLandArea, landValue, bp, baseFAR, effectiveFAR, autoArea, totalArea} = dr;
  // 自 v117: 金額/面積類四捨五入到 2 位小數 (容積率/建蔽率/比率類不套用)
  const r2 = (v) => { const n = Number(v); return isNaN(n) ? 0 : Math.round(n * 100) / 100; };
  // 自 v71: 捐贈設定區開合 state
  const [showDonation, setShowDonation] = useState(!!p.donation?.enabled);
  const cd = ZDB[p.city] || {d:[], z:{}};
  const secList = SEC_DB[p.dist] || [];
  const govUrl = cd.url || "";
  const up = (f, v) => sP({...p, [f]:v});
  const updLand = (id, k, v) => sP({...p, lands: p.lands.map(l => l.id===id ? {...l,[k]:v} : l)});
  const updOwner = (id, k, v) => sP({...p, owners: p.owners.map(o => o.id===id ? {...o,[k]:v} : o)});
  // 偵測表 2 是否有「非建商」持分 → 強制合建 (鎖住合建勾選)
  const hasLandlordHolding = (p.ownerHoldings || []).some(x => x.ownerId !== "builder" && (Number(x.share)||0) > 0);
  const updSS = (id, k, v) => sP({...p, salesSched: p.salesSched.map(s => s.id===id ? {...s,[k]:v} : s)});
  const updLS = (key, id, k, v) => sP({...p, [key]: p[key].map(s => s.id===id ? {...s,[k]:v} : s)});
  const updED = (catK, pi, v) => {
    const nd = {...p.expDist};
    nd[catK] = [...nd[catK]];
    nd[catK][pi] = v;
    sP({...p, expDist: nd});
  };
  const updEP_raw = (id, k, v) => sP({...p, expPeriods: p.expPeriods.map(ep => ep.id===id ? {...ep,[k]:v} : ep)});
  // 自 v218: 工期(p.dur) 與 費用支出時程(expPeriods) 雙向強制連動 — 改用「開工/交屋」標記機制
  //   根因：v216 用「expPeriods 全案第一期到最後一期」當跨距，會把規劃/請照期也算進工期，
  //   跟銀行貸款實際計息的「開工~交屋」區間不符。改為：使用者可標記某一期為「開工」、某一期為「交屋」，
  //   只算這兩點之間的跨距當工期；未標記任一點時，fallback 回全案跨距（向下相容，不強迫使用者一定要標記）。
  const _epAbsMonth = (ep) => (Number(ep.year)||0)*12 + (Number(ep.month)||0);
  const _getSyncPoints = (eps) => {
    const cs = eps.find(ep => ep.role === "constStart");
    const ho = eps.find(ep => ep.role === "handover");
    if (cs && ho) return { startEp: cs, endEp: ho, usingMarkers: true };
    const sorted = [...eps].sort((a,b) => _epAbsMonth(a) - _epAbsMonth(b));
    if (sorted.length < 2) return null;
    return { startEp: sorted[0], endEp: sorted[sorted.length-1], usingMarkers: false };
  };
  // 從 dur 正向推算：改「工期」欄位時，把終點期（開工/交屋標記的交屋期，或未標記時的最晚一筆）年月往後推到 起點+dur-1
  const setDurSynced = (newDur) => {
    const eps = p.expPeriods || [];
    const sync = _getSyncPoints(eps);
    if (!sync) { up("dur", newDur); return; }
    const { startEp, endEp } = sync;
    const startAbs = _epAbsMonth(startEp);
    const newEndAbs = startAbs + Math.max(1, Number(newDur) || 1) - 1;
    const newYear = Math.floor(newEndAbs / 12);
    const newMonth = newEndAbs - newYear * 12;
    // 自 v219: 若終點期正是「交屋」標記期別，改 dur 等同手動改動了交屋日 → 關閉自動連動
    const isHandoverEnd = endEp.role === "handover";
    sP({
      ...p, dur: Math.max(1, Number(newDur) || 1),
      expPeriods: p.expPeriods.map(ep => ep.id === endEp.id
        ? {...ep, year: newYear, month: newMonth, ...(isHandoverEnd ? {autoHandoverSync: false} : {})}
        : ep)
    });
  };
  // 從 expPeriods 反向推算：改任一筆的年月或標記時，依當前的開工/交屋標記（或fallback全案跨距）重算 dur
  const updEP = (id, k, v) => {
    if (k === "role") {
      // 標記互斥：設成 constStart/handover 時，先清掉其他筆同標記的值；設成 null（一般）則直接清除
      // 自 v219: 新標記為「交屋」時，立即帶入 effHandoverDate() 的年月，並設為自動連動（可再手動覆寫）
      const willBeHandover = v === "handover";
      const effHD = willBeHandover ? effHandoverDate(p) : null;
      const newExpPeriods = p.expPeriods.map(ep => {
        if (ep.id === id) {
          return {
            ...ep, role: v,
            ...(willBeHandover ? {year: effHD.year, month: effHD.month, autoHandoverSync: true} : {})
          };
        }
        if (v && ep.role === v) return {...ep, role: null};  // 其他筆若已是同標記，讓出
        return ep;
      });
      const sync = _getSyncPoints(newExpPeriods);
      if (!sync) { sP({...p, expPeriods: newExpPeriods}); return; }
      const newDur = Math.max(1, _epAbsMonth(sync.endEp) - _epAbsMonth(sync.startEp) + 1);
      sP({...p, expPeriods: newExpPeriods, dur: newDur});
      return;
    }
    if (k !== "year" && k !== "month") { updEP_raw(id, k, v); return; }
    const targetEp = p.expPeriods.find(ep => ep.id === id);
    const isHandoverEntry = targetEp && targetEp.role === "handover";
    // 自 v219: 使用者直接手動改「交屋」標記期別的年月 → 視為手動覆寫，關閉自動連動
    const newExpPeriods = p.expPeriods.map(ep => ep.id === id
      ? {...ep, [k]: v, ...(isHandoverEntry ? {autoHandoverSync: false} : {})}
      : ep);
    const sync = _getSyncPoints(newExpPeriods);
    if (!sync) { sP({...p, expPeriods: newExpPeriods}); return; }
    const newDur = Math.max(1, _epAbsMonth(sync.endEp) - _epAbsMonth(sync.startEp) + 1);
    sP({...p, expPeriods: newExpPeriods, dur: newDur});
  };

  // 自 v219: 交屋日/銷售時程 → expPeriods[交屋標記] 持續連動（手動輸入後優先，除非使用者按「還原自動」）
  //   根因：p.handoverDate 與 p.salesSched 已有既有的 effHandoverDate() fallback 邏輯，
  //   但 expPeriods 的「交屋」標記期別完全沒有跟它掛勾，使用者要自己確保三處數字一致。
  //   閉環設計：effHandoverDate 的輸入(handoverDate/salesSched)不會被這個機制修改，只單向寫入 expPeriods，
  //   不會產生循環依賴；dur 透過既有的 _getSyncPoints/updEP 邏輯路徑一併重算，維持單一事實來源。
  const applyHandoverSync = (markAuto) => {
    const effHD = effHandoverDate(p);
    const hoEntry = (p.expPeriods || []).find(ep => ep.role === "handover");
    if (!hoEntry) return;
    const newExpPeriods = p.expPeriods.map(ep => ep.id === hoEntry.id
      ? {...ep, year: effHD.year, month: effHD.month, ...(markAuto !== undefined ? {autoHandoverSync: markAuto} : {})}
      : ep);
    const sync = _getSyncPoints(newExpPeriods);
    if (!sync) { sP({...p, expPeriods: newExpPeriods}); return; }
    const newDur = Math.max(1, _epAbsMonth(sync.endEp) - _epAbsMonth(sync.startEp) + 1);
    sP({...p, expPeriods: newExpPeriods, dur: newDur});
  };
  useEffect(() => {
    const hoEntry = (p.expPeriods || []).find(ep => ep.role === "handover");
    if (!hoEntry || hoEntry.autoHandoverSync === false) return;  // 手動覆寫中，不自動同步
    const effHD = effHandoverDate(p);
    const curAbs = _epAbsMonth(hoEntry);
    const effAbs = effHD.year * 12 + effHD.month;
    if (curAbs === effAbs) return;  // 已同步，不重複觸發
    applyHandoverSync();  // 不動 autoHandoverSync 旗標本身（維持目前狀態，通常是 true 或未設）
    // eslint-disable-next-line
  }, [p.handoverDate?.year, p.handoverDate?.month, JSON.stringify(p.salesSched)]);

  const F = ({l, f, u, step=1}) => (
    <div className="flex items-center justify-between py-[7px] border-b border-slate-100">
      <span className="text-slate-600 text-[13px]">{l}</span>
      <div className="flex items-center gap-1">
        <NI value={p[f]} onChange={v => up(f, v)} step={step} className="w-24"/>
        {u && <span className="text-[11px] text-slate-400 w-14">{u}</span>}
      </div>
    </div>
  );

  const LoanSched = ({title, schedKey, color}) => {
    const sched = p[schedKey] || [];
    const tR = sched.reduce((a,s) => a+s.ratio, 0);
    return (
      <div className={"mt-3 p-3 rounded-xl border " + color}>

          <span className="text-xs font-bold text-slate-600">{title}</span>
          <span className={"text-xs font-bold " + (Math.abs(tR-1)<0.01 ? "text-emerald-600" : "text-rose-600")}>合計{(tR*100).toFixed(0)}%</span>
        </div>
        {sched.map(s => (
          <div key={s.id} className="flex items-center gap-1 mb-1">
            <SO v={s.year} fn={v => updLS(schedKey,s.id,"year",+v)} opts={YRS} className="w-16 text-[10px]"/>
            <SO v={s.month} fn={v => updLS(schedKey,s.id,"month",+v)} opts={MOS} className="w-14 text-[10px]"/>
            <NI value={s.ratio} onChange={v => updLS(schedKey,s.id,"ratio",v)} step={0.1} className="w-14 text-[10px] text-center"/>
            <span className="text-[10px] text-slate-400">{(s.ratio*100).toFixed(0)}%</span>
            {sched.length > 1 && <BtnDel onClick={() => sP({...p, [schedKey]: p[schedKey].filter(x => x.id !== s.id)})}/>}
          </div>
        ))}
        <Btn onClick={() => sP({...p, [schedKey]:[...p[schedKey], {id:uid(), year:2027, month:1, ratio:0.2}]})} color="bg-slate-500 hover:bg-slate-600" className="w-full mt-1 text-[10px]">+ 動撥</Btn>
      </div>
    );
  };

  // 自 v112: 自由組合分回摺疊區 (建商/地主卡共用)
  //   roleKey: "builder" | "owner_<id>", ratio: 分回比
  //   展開狀態: 建商存 p._builderCompExpand, 地主存 owner._expandComp

  return (

            <div className="text-2xl font-black text-emerald-800 font-mono">
              {dr.avg_far != null ? (dr.avg_far*100).toFixed(1) : "0.0"}%
            </div>
            <div className="text-[9px] text-emerald-500 mt-1">依基地面積比例加權</div>
          </div>
          <div className="rounded-xl p-3 text-center border border-tan-200 bg-tan-50">
            <div className="text-[10px] text-tan-600 font-bold">加權建蔽率</div>
            <div className="text-2xl font-black text-tan-800 font-mono">
              {dr.avg_bcr != null ? (dr.avg_bcr*100).toFixed(1) : "0.0"}%

            <div className="text-[9px] text-tan-500 mt-1">依基地面積比例加權</div>

        <div className="flex items-center justify-between mb-2 flex-wrap gap-2">

                  const text = await readCsvText(f);

                  if (rows.length === 0) { alert("CSV 無資料列"); return; }
                  const newHoldings = [];
                  const errors = [];
                  let updatedOwners = [...p.owners];
                  const findOrCreateOwner = (name) => {
                    if (!name || name === "建商") return "builder";
                    let owner = updatedOwners.find(o => o.name === name);
                    if (!owner) {
                      owner = {id: Date.now() + Math.random(), name, ratio: 0, invest: false,
                        feeEnabled: {ad:true,tx:true,mg:true},
                        costBearing: {de:0,co:0,ad:0,tx:0,mg:0,am:0,it:0},
                        financing: {enabled:false, amount:0, rate:3.0, durationMonths:84},
                        rentSubsidy: {enabled:false, monthly:0, months:0},
                        lvtExemptOnExchange: false, lvtDiscountOnDisposal: false};
                      updatedOwners.push(owner);
                    }
                    return owner.id;
                  };
                  for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const sec = row["地段"] || "";
                    const num = row["地號"] || "";
                    const ownerName = row["所有權人"] || row["所有權人名"] || "";
                    let shareRaw = (row["持分"] || "").toString().trim();
                    if (!sec || !num) { errors.push(`第 ${i+2} 列: 地段或地號為空, 略過`); continue; }

                    let share;
                    if (shareRaw.endsWith("%")) share = parseFloat(shareRaw) / 100;
                    else share = parseFloat(shareRaw);
                    if (isNaN(share) || share <= 0) { errors.push(`第 ${i+2} 列: 持分格式錯誤 (${shareRaw})`); continue; }
                    const ownerId = findOrCreateOwner(ownerName);
                    // 自 v216: 選填欄位「原規定地價」「取得年月」— 缺欄位或格式錯誤不阻擋匯入，僅留空待手動補
                    const holding = {id: Date.now() + Math.random() + i, sec, num, ownerId, share};
                    const ovRaw = (row["原規定地價"] || "").toString().trim();
                    if (ovRaw) {
                      const ov = parseFloat(ovRaw.replace(/,/g, ""));

                      else errors.push(`第 ${i+2} 列: 原規定地價格式無法解析 (${ovRaw})，已略過此欄`);

                      const nums = ymRaw.match(/\d+/g);
                      if (nums && nums.length >= 2) {
                        const yr = parseInt(nums[0], 10), mo = parseInt(nums[1], 10);
                        if (yr > 0 && mo >= 1 && mo <= 12) {
                          holding.landAcquireYearROC = yr;
                          holding.landAcquireMonth = mo;
                        } else {
                          errors.push(`第 ${i+2} 列: 取得年月數值超出範圍 (${ymRaw})，已略過此欄`);
                        }

                        errors.push(`第 ${i+2} 列: 取得年月格式無法解析，需含年與月兩個數字 (${ymRaw})，已略過此欄`);
                      }
                    }
                    newHoldings.push(holding);
                  }
                  if (newHoldings.length === 0) { alert("沒有有效的持分資料\n" + errors.join("\n")); e.target.value=""; return; }
                  const mode = await pickImportMode({title:"上傳持分清冊 CSV", summary:`解析到 ${newHoldings.length} 筆持分`, errors});

                  const hasLandlord = finalHoldings.some(x => x.ownerId !== "builder" && (x.share||0) > 0);
                  sP({...p,
                    jb: p.jb || hasLandlord,
                    owners: updatedOwners,
                    ownerHoldings: finalHoldings
                  });
                  alert(`✓ 已${mode === "replace" ? "取代" : "附加"} ${newHoldings.length} 筆持分${updatedOwners.length > p.owners.length ? `\n(新增 ${updatedOwners.length - p.owners.length} 位所有權人)` : ""}`);

                  alert("CSV 解析失敗: " + err.message);
                }
                e.target.value = "";
              }}/>

          {/* 持分均分 / 正規化工具 (依地號) */}

            // 取得所有出現在 holdings 的地號
            const landKeys = Array.from(new Set((p.ownerHoldings||[]).map(h => (h.sec||"")+"|"+(h.num||""))));
            if (landKeys.length === 0) return null;
            // 均分: 該地號所有持分列平均 (最後一位補足差額確保剛好 1)
            const equalize = (key) => {
              const [sec, num] = key.split("|");
              const idxs = p.ownerHoldings.map((h,i)=>((h.sec||"")+"|"+(h.num||""))===key ? i : -1).filter(i=>i>=0);
              if (idxs.length === 0) return;
              const base = Math.floor(1/idxs.length * 1e6) / 1e6;  // 高精度均分
              const newHoldings = p.ownerHoldings.map((h,i) => {
                if (!idxs.includes(i)) return h;
                const pos = idxs.indexOf(i);
                // 最後一位補足差額
                const share = pos === idxs.length-1 ? +(1 - base*(idxs.length-1)).toFixed(6) : base;
                return {...h, share};
              });
              sP({...p, ownerHoldings: newHoldings});
            };
            // 正規化: 該地號持分等比例縮放到剛好 1
            const normalize = (key) => {
              const idxs = p.ownerHoldings.map((h,i)=>((h.sec||"")+"|"+(h.num||""))===key ? i : -1).filter(i=>i>=0);
              const sum = idxs.reduce((s,i)=>s+(Number(p.ownerHoldings[i].share)||0),0);
              if (sum <= 0) { alert("持分總和為 0, 無法正規化"); return; }
              const newHoldings = p.ownerHoldings.map((h,i) => {
                if (!idxs.includes(i)) return h;
                const pos = idxs.indexOf(i);
                // 最後一位補足差額確保剛好 1
                if (pos === idxs.length-1) {
                  const others = idxs.slice(0,-1).reduce((s,j)=>s+ +((Number(p.ownerHoldings[j].share)||0)/sum).toFixed(6),0);
                  return {...h, share: +(1-others).toFixed(6)};
                }
                return {...h, share: +((Number(h.share)||0)/sum).toFixed(6)};
              });
              sP({...p, ownerHoldings: newHoldings});
            };
            return (
              <div className="mt-2 flex flex-wrap items-center gap-1.5 text-[10px]">
                <span className="text-slate-500">持分工具:</span>
