  if (myRole === "builder") {
    const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "builder");
    myArea = s ? s.finalArea : dr.totalArea * dr.builderRatio;
    myRoleLabel = "建商" + (p.jb ? "" : " (獨資)");
    myCs = cS(p, dr, dr.weightedUP, p.cC, "b", 0);
  } else if (myRole.startsWith("owner_") && p.jb) {
    const me = p.owners.find(o => ("owner_" + o.id) === myRole);
    if (me) {
      const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "owner" && Math.abs(x.ratio - me.ratio) < 1e-9);
      myArea = s ? s.finalArea : dr.totalArea * me.ratio;
      myRoleLabel = me.name;
      myCs = cS(p, dr, dr.weightedUP, p.cC, "o", me.ratio);
    }
  } else if (myRole.startsWith("group_") && p.jb) {
    // 自 v120 (合併選配): 群組視角 = 成員各自 cS 加總 (Q2=A: 各自算再加總, 不改稀釋)
    const gid = myRole.slice(6);
    const g = (p.selectGroups || []).find(x => x.id === gid);
    if (g && (g.members || []).length > 0) {
      // 自 v136: 成員 id 寬鬆比對 (String) — 修正舊群組 members 存字串、owner.id 存數字時 === 失配導致 myArea=0
      const memberOwners = g.members.map(mid => p.owners.find(o => String(o.id) === String(mid))).filter(Boolean);
      const memberCsList = memberOwners.map(o => {
        const s = dr.shareInfo && dr.shareInfo.find(x => String(x.key) === ("owner_" + o.id));
        const area = s ? s.finalArea : dr.totalArea * o.ratio;
        return { cs: cS(p, dr, dr.weightedUP, p.cC, "o", o.ratio), area, rec: s, ratio: o.ratio };
      });
      myArea = memberCsList.reduce((a, m) => a + (m.area || 0), 0);
      myRoleLabel = g.name || memberOwners.map(o => o.name).join("+");
      // 加總可加性欄位, 比率欄位用加總後重算
      const sum = (k) => memberCsList.reduce((a, m) => a + (Number(m.cs[k]) || 0), 0);
      const _sh = sum("sh"), _tc = sum("tc"), _pbt = sum("pbt"), _pat = sum("pat"), _shareArea = sum("shareArea"), _eq = sum("eq");
      myCs = {
        sh: _sh, cs: sum("cs"), tc: _tc, pbt: _pbt, itx: sum("itx"), pat: _pat, shareArea: _shareArea,
        gm: _sh ? _pbt / _sh : 0, nm: _sh ? _pat / _sh : 0, cr: _tc ? _pat / _tc : 0,
        bep: _shareArea ? _tc / _shareArea : 0,
        ll: sum("ll"), cl: sum("cl"), tl: sum("tl"), eq: _eq, er: _eq > 0 ? _pat / _eq : 0,
        ownerFinanceInterest: sum("ownerFinanceInterest")
      };
      // 自 v138: 群組分回總銷/價值導向 — 直接用同一份 memberCsList 加總 (不再獨立查 shareInfo, 避免失配)
      //   分回總銷 = Σ成員 (shareInfo.allocValue, 無則用 (房屋總銷+車位總銷)×成員比例)
      _groupMemberAlloc = memberCsList.map(m =>
        (m.rec && Number(m.rec.allocValue) > 0)
          ? Number(m.rec.allocValue)
          : (((dr.salesMix && Number(dr.salesMix.houseSales)) || 0) + ((dr.salesMix && Number(dr.salesMix.parkTotalSales)) || 0)) * (Number(m.ratio) || 0)
      );
      _groupMemberRecs = memberCsList.map(m => m.rec).filter(Boolean);
    }
  }
  if (!myCs) myCs = cS(p, dr, dr.weightedUP, p.cC, "b", 0);

  // ─── 自 v114 (階段3a): 分類型可用面積 (manual 自由組合模式才有) ───
  //   myRole 的 shareInfo 紀錄含 compMode / compItems
  //   manual 模式: myTypeAreas = { res:50, retail:20, ... } (房屋類別, 車位不計入坪上限)
  //   auto 模式: myCompMode=false → 下游用單一總量 myArea (Q3=A)
  //   自 v120 (合併選配): 群組視角 → 合併成員的 compItems (Q1=X 經營分析用合併面積)
  let myCompMode = false;
  const myTypeAreas = {};
  // 自 v147: 比例模式 item 無 area (只有 ratio) → 換算面積 = ratio × 該成員分回總銷 / 該類別單價
  const _smRef = dr.salesMix || {};
  const _catUPref = { res: Number(_smRef.res?.uP) || 0, retail: Number(_smRef.retail?.uP) || 0, office: Number(_smRef.office?.uP) || 0 };
  (_smRef.customCategories || []).forEach(c => { _catUPref[c.id] = Number(c.uP) || 0; });
  const _wUP = Number(dr.weightedUP) || 0;
  const _addTypeArea = (it, allocV) => {
    if (!it.catKey || String(it.catKey).startsWith("park_")) return;
    let a;
    if (it.mode === "ratio") {
      const up = _catUPref[it.catKey] > 0 ? _catUPref[it.catKey] : _wUP;
      a = (up > 0 && allocV > 0) ? ((Number(it.ratio) || 0) * allocV) / up : 0;
    } else {
      a = Number(it.area) || 0;
    }
    myTypeAreas[it.catKey] = (myTypeAreas[it.catKey] || 0) + a;
  };
  if (myRole.startsWith("group_")) {
    const gid = myRole.slice(6);
    const g = (p.selectGroups || []).find(x => String(x.id) === String(gid));
    const memberRecs = g ? (g.members || []).map(mid => (dr.shareInfo || []).find(x => String(x.key) === ("owner_" + mid))).filter(Boolean) : [];
    // 只要任一成員是 manual 自由組合, 群組就分類型 (合併各成員 compItems)
    myCompMode = memberRecs.some(r => r.compMode);
    if (myCompMode) {
      memberRecs.forEach(r => {
        const _alloc = Number(r.allocValue) || 0;
        (r.compItems || []).forEach(it => _addTypeArea(it, _alloc));
      });
    }
  } else {
    const _myShareRec = (dr.shareInfo || []).find(x => String(x.key) === myRole);
    myCompMode = !!(_myShareRec && _myShareRec.compMode);
    if (myCompMode && _myShareRec.compItems) {
      const _alloc = Number(_myShareRec.allocValue) || 0;
      _myShareRec.compItems.forEach(it => _addTypeArea(it, _alloc));
    }
  }
  // 類型上限基準: manual + 有標類型 → 該類型面積; 否則 → 總量 myArea
  const typeBaseArea = (catKey) => (myCompMode && catKey) ? (myTypeAreas[catKey] || 0) : myArea;

  // 自 v147: 處分類型基準 — 處分筆有選類型(catKey)且組合模式有該類型面積 → 用該類型面積; 否則用總量 myArea
  //   (車位類別 park_ 不在 myTypeAreas, 不適用; 維持原行為)
  const _dispCatHasArea = (catKey) => !!(catKey && myCompMode && !String(catKey).startsWith("park_") && (Number(myTypeAreas[catKey]) || 0) > 0);
  const _dispBaseArea = (catKey) => _dispCatHasArea(catKey) ? (Number(myTypeAreas[catKey]) || 0) : myArea;

  // ─── 自 v135/v202: 分回總銷(價值) myAllocValue + 價值導向判定 isValueBased ───
  //   概念 (使用者確認): 分回總銷 = (房屋總銷+車位總銷)×分回比, 穩定, 不受自由組合面積影響
  //   自 v202 修正：isValueBased 只要 compMode=true 就成立，不再要求「所有品項都是 ratio 模式」。
  //   根因：sales = compValue + cashAdjust，且 cashAdjust = allocValue - compValue，
  //   數學上恆等於 allocValue，跟品項是 fixed 或 ratio 完全無關（找補機制保證兩者永遠拉平）。
  //   舊版誤判「混用 fixed/ratio → 面積導向(areaActual×price)」，導致「全處分」情境下
  //   totalRevenue 少算成實際處分面積×單價，跟 single 模式的 allocValue 產生落差。
  let myAllocValue = 0;
  let isValueBased = false;
  if (myRole.startsWith("group_")) {
    // 自 v138: 直接用群組 myArea 區算好的成員分回總銷加總 (與 myArea 同一份成員, 不再獨立查 shareInfo)
    myAllocValue = (_groupMemberAlloc || []).reduce((a, v) => a + (Number(v) || 0), 0);
    // 保底: 若 allocValue 加總為 0 (shareInfo 失配或 allocValue 未填), 用成員 cS 分回總銷加總 (myCs.sh)
    if (!(myAllocValue > 0) && myCs && Number(myCs.sh) > 0) myAllocValue = Number(myCs.sh);
    const _recs = _groupMemberRecs || [];
    isValueBased = _recs.length > 0 && _recs.every(r => r.compMode);
  } else {
    const _rec = (dr.shareInfo || []).find(x => String(x.key) === myRole);
    myAllocValue = _rec ? (Number(_rec.allocValue) || 0) : (myCs ? Number(myCs.sh) || 0 : 0);
    isValueBased = !!(_rec && _rec.compMode);
  }

  const mySalesAmount = myCs.sh;
  const myTotalCost   = myCs.tc;
  const myPAT          = myCs.pat;
  // 自 v208: 租金補貼(otherIncome)獨立提出，供 single_netProfit / pd_sumNetProfit 補算
  //   （myPAT 已經含這筆錢，但 single_netProfit/pd_sumNetProfit 是另一條獨立公式，之前漏加）
  const myOtherIncome = Number(myCs.otherIncome) || 0;

  // ─── 土地價值認列 (v79 改: 廢棄 cb.landValuationMode/landBookValue/landAcquiredValue, 改讀 myRole 對應的 owner.landValuation) ───
  // 向下相容: 若沒有 owner.landValuation 設定, fallback 到 cb.landValuationMode 舊欄位
  const _myRoleLV = p.myRole || "builder";
  let landValue = 0, landLabel = "土地價值", lmode = "book";
  if (_myRoleLV === "builder") {
    landValue = getOwnerLandValue(p, dr, "builder");
    const blv = p.builderLandValuation || { mode: "book" };
    lmode = blv.mode || "book";
    landLabel = landValuationLabel(lmode);
  } else if (_myRoleLV.startsWith("group_")) {
    // 自 v120 (合併選配): 群組土地認列 = 成員 landValue 加總
    const gid = _myRoleLV.slice(6);
    const g = (p.selectGroups || []).find(x => x.id === gid);
    const memberOwners = g ? (g.members || []).map(mid => (p.owners || []).find(o => String(o.id) === String(mid))).filter(Boolean) : [];
    landValue = memberOwners.reduce((a, o) => a + getOwnerLandValue(p, dr, o), 0);
    landLabel = "土地價值 (群組合計)";
    lmode = "group";
  } else {
    const ownerId = String(_myRoleLV).replace("owner_", "");
    const owner = (p.owners || []).find(o => String(o.id) === ownerId);
    if (owner) {
      landValue = getOwnerLandValue(p, dr, owner);
      const olv = owner.landValuation || { mode: "book" };
      lmode = olv.mode || "book";
      landLabel = landValuationLabel(lmode);
    } else {
      // 找不到對應 owner, 退回舊 cb 設定 (向下相容)
      lmode = cb.landValuationMode || "book";
      if (lmode === "appraisal" || lmode === "announced") { landValue = dr.landValue; landLabel = "公告總值"; }
      else if (lmode === "book") { landValue = Number(cb.landBookValue) || 0; landLabel = "帳面成本"; }
      else if (lmode === "acquired") { landValue = Number(cb.landAcquiredValue) || 0; landLabel = "取得價值"; }
    }
  }

  // ─── 房地合一稅計算 (依持有年期、納稅人身分) ───
  const taxpayer = cb.taxpayerType || ""; // "" | "individual" | "corp"
  const selfUse = !!cb.selfUse;
  const calcLandHouseTax = (taxableBase, holdY) => {
    if (!taxpayer || taxableBase <= 0) return { rate: 0, exemption: 0, tax: 0, label: taxpayer ? "" : "未指定身分" };
    let rate, label;
    if (taxpayer === "individual") {
      if (selfUse && holdY >= 6) { rate = 0.10; label = "自用住宅 10%"; }
      else if (holdY <= 2)       { rate = 0.45; label = "個人 ≤2年 45%"; }
      else if (holdY <= 5)       { rate = 0.35; label = "個人 2~5年 35%"; }
      else if (holdY <= 10)      { rate = 0.20; label = "個人 5~10年 20%"; }
      else                       { rate = 0.15; label = "個人 >10年 15%"; }
    } else { // corp
      if (holdY <= 2)            { rate = 0.45; label = "營利事業 ≤2年 45%"; }
      else if (holdY <= 5)       { rate = 0.35; label = "營利事業 2~5年 35%"; }
      else                       { rate = 0.20; label = "營利事業 >5年 20%"; }
    }
    const exemption = (taxpayer === "individual" && selfUse && holdY >= 6) ? 400 : 0;
    const taxable = Math.max(0, taxableBase - exemption);
    const tax = taxable * rate;
    return { rate, exemption, tax, taxable, label };
  };

  // ─── 自 v184: 土地稅制逐持分判定 ───
  // 依 ownerHoldings[i].landAcquireYearROC 判定每筆持分新/舊制，結果加總
  // 舊制：yr > 0 && yr < 105 → 土增稅（API 查詢結果）
  // 新制：yr >= 105 || yr = 0 → 房地合一稅（公式計算）
  const lvtUrbanRenewal = !!p.lvtUrbanRenewal;

  // 找當前角色（地主）對應的 ownerHoldings
  const _currentOwnerId = (() => {
    if (!myRole || myRole === "builder") return null;
    if (myRole.startsWith("owner_")) return String(myRole.slice(6));
    return null;
  })();
  const _myHoldingsForTax = _currentOwnerId
    ? (p.ownerHoldings || []).filter(h => String(h.ownerId) === _currentOwnerId)
    : [];
  // 自 v203: 取得當前地主完整物件，供 single_taxInfo 依 invest 狀態切換抵付/處分稅
  const _currentOwner = _currentOwnerId
    ? (p.owners || []).find(o => String(o.id) === _currentOwnerId)
    : null;
  const _ownerInvests = !!(_currentOwner && _currentOwner.invest);
  const _jbLandlordShareForTax = (p.jbLandlordShare != null && p.jbLandlordShare !== "") ? Number(p.jbLandlordShare) : 0.5;

  // 逐持分分類
  const _oldHoldings = _myHoldingsForTax.filter(h => {
    const yr = Number(h.landAcquireYearROC) || 0;
    return yr > 0 && yr < 105;
  });
  const _newHoldings = _myHoldingsForTax.filter(h => {
    const yr = Number(h.landAcquireYearROC) || 0;
    return !(yr > 0 && yr < 105);
  });
  const _hasOldHoldings = _oldHoldings.length > 0;
  const _hasNewHoldings = _newHoldings.length > 0;
  const _isMixed = _hasOldHoldings && _hasNewHoldings;

  // 舊制稅額：加總各舊制持分的 lvtTaxResult（已查詢），都更六折
  // 自 v203: _oldTax 改為原始值（不預先套用全案 lvtUrbanRenewal），
  //   折扣/免徵改為逐地主層級，在後面依 invest 狀態分流時才套用（見 single_taxInfo 純舊制/混合分支）
  const _oldTaxRaw = _oldHoldings.reduce((acc, h) => {
    if (h.lvtTaxResult == null) return acc;
    return acc + (Number(h.lvtTaxResult) || 0);
  }, 0);
  const _oldTax = _oldTaxRaw;  // 向下相容：其他仍引用 _oldTax 的地方維持讀到原始彙總值
  const _oldTaxReady = _oldHoldings.every(h => h.lvtTaxResult != null);

  // 舊制面積比例（用於新制課稅基礎的分攤）
  // 若無法算面積比，用持分數量等分
  const _totalHoldArea = _myHoldingsForTax.reduce((a, h) => {
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    return a + (land ? (land.m2 || 0) * (h.share || 0) : 0);
  }, 0);
  const _oldHoldArea = _oldHoldings.reduce((a, h) => {
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    return a + (land ? (land.m2 || 0) * (h.share || 0) : 0);
  }, 0);
  const _newHoldArea = _newHoldings.reduce((a, h) => {
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    return a + (land ? (land.m2 || 0) * (h.share || 0) : 0);
  }, 0);
  const _newRatio = _totalHoldArea > 0
    ? _newHoldArea / _totalHoldArea
    : (_hasNewHoldings ? (_isMixed ? 0.5 : 1) : 0);

  // 新制持有期：各新制持分各自算 holdY，依面積加權平均
  const _hdFallbackAbs = (() => {
    const hd = p.handoverDate || {};
    const hdY = Number(hd.year) || 0, hdM = Number(hd.month) || 0;
    if (hdY > 0 && hdM > 0) return hdY * 12 + hdM;
    if (p.salesSched && p.salesSched.length > 0) {
      const last = [...p.salesSched].sort((a,b)=>(b.year*12+b.month)-(a.year*12+a.month))[0];
      return last.year * 12 + last.month;
    }
    return 2028 * 12 + 6;
  })();
  // 新制持分的加權平均取得月（供 longHold holdY 計算）
  const _newAcqAbsWt = _newHoldings.reduce((acc, h) => {
    const yr = Number(h.landAcquireYearROC) || 0;
    const mo = Number(h.landAcquireMonth)   || 1;
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    const area = land ? (land.m2 || 0) * (h.share || 0) : 0;
    const absM = (yr > 0) ? (yr + 1911) * 12 + mo  // 民國年轉西元
                          : _hdFallbackAbs;          // yr=0 用交屋日
    return { sumAM: acc.sumAM + absM * area, sumA: acc.sumA + area };
  }, { sumAM: 0, sumA: 0 });
  const _newAcqAbsMonth = _newAcqAbsWt.sumA > 0
    ? Math.round(_newAcqAbsWt.sumAM / _newAcqAbsWt.sumA)
    : _hdFallbackAbs;

  // 全部持分（含舊制）的加權平均取得月（供 longHold acqAbsMonth）
  const _allAcqAbsWt = _myHoldingsForTax.reduce((acc, h) => {
    const yr = Number(h.landAcquireYearROC) || 0;
    const mo = Number(h.landAcquireMonth)   || 1;
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    const area = land ? (land.m2 || 0) * (h.share || 0) : 0;
    const absM = (yr > 0) ? (yr + 1911) * 12 + mo : _hdFallbackAbs;
    return { sumAM: acc.sumAM + absM * area, sumA: acc.sumA + area };
  }, { sumAM: 0, sumA: 0 });
  const _allAcqAbsMonth = _allAcqAbsWt.sumA > 0
    ? Math.round(_allAcqAbsWt.sumAM / _allAcqAbsWt.sumA)
    : _hdFallbackAbs;

  // ─── 模式一：不動產處分效益 (全分回處分) ───
  const single_taxableBase = mySalesAmount - landValue - myTotalCost;
  let single_taxInfo;
  if (!_hasOldHoldings && !_hasNewHoldings) {
    // 建商或無持分資料：fallback 原有全局邏輯
    const landAcqYearROC = Number(cb.landAcquireYearROC) || 0;
    let landRegime = cb.landRegime || "auto";
    if (landRegime === "auto") landRegime = (landAcqYearROC > 0 && landAcqYearROC < 105) ? "old" : "new";
    const lvtRaw = (cb.lvtTaxResult != null && cb.lvtTaxResult !== "") ? Number(cb.lvtTaxResult) : null;
    const lvtTax = lvtRaw != null ? (lvtUrbanRenewal ? lvtRaw * 0.6 : lvtRaw) : null;
    if (landRegime === "old") {
      single_taxInfo = {
        rate: 0, exemption: 0,
        tax: lvtTax != null ? lvtTax : 0,
        taxable: single_taxableBase,
        label: lvtTax != null ? ("舊制土增稅" + (lvtUrbanRenewal ? " (都更六折)" : "")) : "舊制土增稅 (尚未查詢)",
        regime: "old", pending: lvtTax == null
      };
    } else {
      single_taxInfo = { ...calcLandHouseTax(single_taxableBase, holdYears), regime: "new", pending: false };
    }
  } else if (_hasOldHoldings && !_hasNewHoldings) {
    // 自 v203: 純舊制稅額 — 依 invest 狀態分流「處分稅」計算
    //   出資(invest=true)：全額，不稀釋（土地未移轉給建商）
    //   純合建(invest=false)：稀釋為地主保留比例(jbLandlordShare)，可勾選逐地主「處分六折」
    const _retainedTax = _ownerInvests
      ? _oldTax
      : _oldTax * _jbLandlordShareForTax * (_currentOwner && _currentOwner.lvtDiscountOnDisposal ? 0.6 : 1);
    single_taxInfo = {
      rate: 0, exemption: 0,
      tax: _oldTaxReady ? _retainedTax : 0,
      taxable: single_taxableBase,
      label: _oldTaxReady
        ? ("舊制土增稅(處分)" + (!_ownerInvests ? `，保留${(_jbLandlordShareForTax*100).toFixed(0)}%` : "") + (!_ownerInvests && _currentOwner && _currentOwner.lvtDiscountOnDisposal ? " (六折)" : ""))
        : "舊制土增稅 (尚未查詢)",
      regime: "old", pending: !_oldTaxReady
    };
  } else if (!_hasOldHoldings && _hasNewHoldings) {
    // 純新制：用新制持分加權平均取得日算 holdY
    const _singleHoldY = Math.max(0, (_hdFallbackAbs - _newAcqAbsMonth) / 12);
    single_taxInfo = { ...calcLandHouseTax(single_taxableBase, _singleHoldY), regime: "new", pending: false };
  } else {
    // 自 v203: 混合稅制 — 舊制部分同樣依 invest 狀態分流
    const _oldBase = single_taxableBase * (1 - _newRatio);
    const _newBase = single_taxableBase * _newRatio;
    const _singleNewHoldY = Math.max(0, (_hdFallbackAbs - _newAcqAbsMonth) / 12);
    const _newTaxInfo = calcLandHouseTax(_newBase, _singleNewHoldY);
    const _retainedOldTax = _ownerInvests
      ? _oldTax
      : _oldTax * _jbLandlordShareForTax * (_currentOwner && _currentOwner.lvtDiscountOnDisposal ? 0.6 : 1);
    const _mixedTax = (_oldTaxReady ? _retainedOldTax : 0) + _newTaxInfo.tax;
    single_taxInfo = {
      rate: _newTaxInfo.rate, exemption: _newTaxInfo.exemption,
      tax: _mixedTax,
      taxable: single_taxableBase,
      label: `混合稅制 (舊制${_oldTaxReady ? _retainedOldTax.toFixed(1) : "待查"}萬 + 新制${_newTaxInfo.tax.toFixed(1)}萬)`,
      regime: "mixed", pending: !_oldTaxReady
    };
  }
  // 混合情境回傳 "mixed"；純舊/純新制回傳 "old"/"new"；無持分走全局 fallback
  const landRegime = _hasOldHoldings && _hasNewHoldings ? "mixed"
    : _hasOldHoldings ? "old"
    : _hasNewHoldings ? "new"
    : (() => {
        const yr = Number(cb.landAcquireYearROC) || 0;
        const r = cb.landRegime || "auto";
        if (r !== "auto") return r;
        return (yr > 0 && yr < 105) ? "old" : "new";
      })();
  const landAcqYearROC = Number(cb.landAcquireYearROC) || 0;
  // lvtTax/lvtRaw：向下相容（供 UI landRegime==="old" 的舊版路徑顯示用）
  const lvtRaw = (cb.lvtTaxResult != null && cb.lvtTaxResult !== "") ? Number(cb.lvtTaxResult) : null;
  const lvtTax = lvtRaw != null ? (lvtUrbanRenewal ? lvtRaw * 0.6 : lvtRaw) : null;

  const single_grossProfit = mySalesAmount + myOtherIncome - myTotalCost - landValue;
  const single_netProfit   = single_grossProfit - single_taxInfo.tax;
  const single_annual      = single_netProfit / holdYears;

  // ─── 模式二：長期持有 ───
  // 自 v184: acqAbsMonth 改從 ownerHoldings 各持分加權平均取得月計算
  //   建商/無持分：fallback 交屋日（原邏輯）
  //   有持分地主：所有持分（含舊制）的面積加權平均取得月
  let acqAbsMonth;
  let acqYear = 0, acqMonth = 0, acqAuto = true;
  if (_myHoldingsForTax.length > 0 && _allAcqAbsMonth > 0) {
    acqAbsMonth = _allAcqAbsMonth;
    acqYear  = Math.floor(_allAcqAbsMonth / 12);
    acqMonth = _allAcqAbsMonth % 12 || 12;
    acqAuto  = false;
  } else {
    // 建商或無持分資料：用原有交屋日 fallback
    acqYear = Number(cb.acquireYear) || 0;
    acqMonth = Number(cb.acquireMonth) || 0;
    acqAuto = !Number(cb.acquireYear) || !Number(cb.acquireMonth);
    if (!acqYear || !acqMonth) {
      const hd = p.handoverDate || {};
      const hdY = Number(hd.year) || 0, hdM = Number(hd.month) || 0;
      if (hdY > 0 && hdM > 0) {
        acqYear = hdY; acqMonth = hdM;
      } else if (p.salesSched && p.salesSched.length > 0) {
        const last = [...p.salesSched].sort((a,b)=>(b.year*12+b.month)-(a.year*12+a.month))[0];
        acqYear = last.year; acqMonth = last.month;
      }
    }
    if (!acqYear) acqYear = 2028;
    if (!acqMonth) acqMonth = 6;
    acqAbsMonth = acqYear * 12 + acqMonth;
  }

  // (1) 多筆處分計算 (disposals 陣列)
  // 自 v125: 單筆有效面積 helper (ratio 模式 = myArea × areaPct%; fixed = d.area)
  const _dispArea = (d) => (d.areaMode === "ratio") ? (_dispBaseArea(d.catKey || "") * (Number(d.areaPct) || 0) / 100) : (Number(d.area) > 0 ? Number(d.area) : 0);
  const disposalsRaw = (cb.disposals || []).filter(d => d && d.enabled !== false);
  // 原始面積總和 (用於互斥檢查)
  let pd_totalAreaRaw = 0;
  disposalsRaw.forEach(d => { pd_totalAreaRaw += _dispArea(d); });
  // 如果只有 1 筆且面積=0,自動帶入「分回 − 租金 − 營業」剩餘
  let autoFillSingle = false;
  if (disposalsRaw.length === 1 && disposalsRaw[0].areaMode !== "ratio" && (!disposalsRaw[0].area || Number(disposalsRaw[0].area) <= 0)) {
    autoFillSingle = true;
  }

  // 租金、營業使用面積
  const rt = cb.rent || {};
  const bs = cb.business || {};
  const rt_enabled = !!rt.enabled;
  const bs_enabled = !!bs.enabled;

  // ─── 處分時序：每月可用面積 (處分月 < 該月才扣) ───
  // 規則：處分當月房子仍在我身上（月底才移轉），下一個月才扣除
  // 自 v114 (階段3a): 帶 catKey, 分類型時各類型獨立池
  const disposalsForCap = (cb.disposals || []).filter(d => d.enabled !== false).map(d => ({
    absMonth: (Number(d.year)||0)*12 + (Number(d.month)||0),
    area: _dispArea(d),
    catKey: d.catKey || ""
  }));
  // 某月可用 = 基準面積 − Σ(處分月 < 該月 的同範圍處分面積)
  //   catKey 有值且 manual → 用該類型池 (只扣同類型處分)
  //   否則 → 用總量 myArea (扣所有處分, 維持現況)
  const availableAtMonth = (absMonth, catKey) => {
    const useType = myCompMode && catKey;
    let area = useType ? (myTypeAreas[catKey] || 0) : myArea;
    for (const d of disposalsForCap) {
      const inScope = useType ? (d.catKey === catKey) : true;
      if (inScope && d.absMonth < absMonth) area -= d.area;  // 嚴格小於：處分當月仍可用
    }
    return Math.max(0, area);
  };
  // 期間 [startAbs, endAbs] 內最小可用面積 (依 catKey 範圍)
  const minAvailableInPeriod = (startAbs, endAbs, catKey) => {
    if (startAbs > endAbs) return 0;
    let minA = availableAtMonth(startAbs, catKey);
    minA = Math.min(minA, availableAtMonth(endAbs, catKey));
    // 關鍵切換點：每個同範圍處分日後一個月
    const useType = myCompMode && catKey;
    for (const d of disposalsForCap) {
      const inScope = useType ? (d.catKey === catKey) : true;
      if (!inScope) continue;
      const switchMonth = d.absMonth + 1;
      if (switchMonth >= startAbs && switchMonth <= endAbs) {
        minA = Math.min(minA, availableAtMonth(switchMonth, catKey));
      }
    }
    return minA;
  };

  // 租金/營業期間絕對月份
  const rt_startAbs = (Number(rt.startYear)||0)*12 + (Number(rt.startMonth)||0);
  const rt_endAbs   = (Number(rt.endYear)||0)*12 + (Number(rt.endMonth)||0);
  const bs_startAbs = (Number(bs.startYear)||0)*12 + (Number(bs.startMonth)||0);
  const bs_endAbs   = (Number(bs.endYear)||0)*12 + (Number(bs.endMonth)||0);
  // 各自期間最小可用 (依各自 catKey 範圍)
  const rt_periodMin = rt_enabled ? minAvailableInPeriod(rt_startAbs, rt_endAbs, rt.catKey || "") : myArea;
  const bs_periodMin = bs_enabled ? minAvailableInPeriod(bs_startAbs, bs_endAbs, bs.catKey || "") : myArea;
  // 期間是否重疊 — 自 v114: 僅同類型範圍才競爭 (不同類型互不影響)
  //   auto 模式 (myCompMode=false): 視為同池, 永遠競爭 (維持現況)
  const sameTypeScope = !myCompMode || ((rt.catKey || "") === (bs.catKey || ""));
  const periodsOverlap = rt_enabled && bs_enabled && sameTypeScope &&
    rt_startAbs <= bs_endAbs && bs_startAbs <= rt_endAbs;
  // 重疊期間最小可用 (兩者共用上限, 同類型範圍)
  const overlapMin = periodsOverlap
    ? minAvailableInPeriod(Math.max(rt_startAbs, bs_startAbs), Math.min(rt_endAbs, bs_endAbs), rt.catKey || "")
    : 0;

  // 顯示用：當前最終可用面積 (給總計區塊顯示)
  // 用「所有處分完成後」的剩餘 (這是租期/營業期間最差的情況)
  const willAutoFillSingleFullArea = autoFillSingle && !rt_enabled && !bs_enabled;
  const totalDisposedArea = willAutoFillSingleFullArea
    ? myArea
    : disposalsForCap.reduce((sum, d) => sum + d.area, 0);
  const availableArea = Math.max(0, myArea - totalDisposedArea);  // 永久剩餘，僅供顯示

  // 自 v214: 單筆收益項目計算（租金/營業共用），支援逐年調幅複利
  //   取代原本「整期間單一費率」的年金公式，改成逐年累加（調幅=0時數學上完全等價於原公式）
  //   面積上限：只用 minAvailableInPeriod 各自檢查（不做跨項目自動比例截斷，超過則警告，
  //   與「自由組合分回」一致的既有設計哲學：展示但不阻擋，使用者自行調整）
  const calcSingleIncomeItem = (areaInput, catKey, rate, growthRatePct, startYear, startMonth, endYear, endMonth) => {
    const startAbs = (Number(startYear)||0)*12 + (Number(startMonth)||0);
    const endAbs   = (Number(endYear)||0)*12 + (Number(endMonth)||0);
    const months = Math.max(0, endAbs - startAbs + 1);
    const periodMin = minAvailableInPeriod(startAbs, endAbs, catKey || "");
    const areaRaw = Number(areaInput) || 0;
    const areaActual = Math.min(areaRaw, periodMin);  // 上限用可用面積裁切（不足才裁，不做跨項目比例分配）
    const truncated = areaActual < areaRaw - 0.01;
    const overLimit = areaRaw > periodMin + 0.01;  // 供警告顯示：原始輸入是否超過可用面積
    const g = (Number(growthRatePct) || 0) / 100;
    const baseRate = Number(rate) || 0;
    let total = 0, npv = 0, annualYear1 = areaActual * baseRate * 12;
    let remaining = months, yearIdx = 0;
    while (remaining > 0 && areaActual > 0) {
      const mThisYear = Math.min(12, remaining);
      const yearRate = baseRate * Math.pow(1 + g, yearIdx);
      const yearCash = areaActual * yearRate * mThisYear;
      total += yearCash;
      if (r > 0) npv += yearCash / Math.pow(1 + r, yearIdx + 1);
      remaining -= mThisYear;
      yearIdx++;
    }
    if (r <= 0) npv = total;
    return { areaActual, areaRaw, periodMin, truncated, overLimit, total, npv, annual: annualYear1, months, catKey: catKey || "" };
  };

  // 使用者輸入：優先讀 areaInput; 後備 areaPct (% 基準依 catKey 範圍)
  const getInputArea = (obj, catKey) => {
    if (Number(obj?.areaInput) > 0) return Number(obj.areaInput);
    if (Number(obj?.areaPct) > 0) return typeBaseArea(catKey) * Number(obj.areaPct);
    return 0;
  };
  const rt_areaRawInput = rt_enabled ? getInputArea(rt, rt.catKey || "") : 0;
  const bs_areaRawInput = bs_enabled ? getInputArea(bs, bs.catKey || "") : 0;

  // ─── 互斥檢查與自動截斷 ───
  // 規則：
  //   - 各自不超過自己期間最小可用
  //   - 期間重疊時，重疊段 rt + bs ≤ overlapMin
  let rt_areaActual = rt_areaRawInput;
  let bs_areaActual = bs_areaRawInput;

  // 先各自限制
  if (rt_areaActual > rt_periodMin + 0.01) rt_areaActual = rt_periodMin;
  if (bs_areaActual > bs_periodMin + 0.01) bs_areaActual = bs_periodMin;

  // 重疊期間競爭
  if (periodsOverlap) {
    if (rt_areaActual + bs_areaActual > overlapMin + 0.01) {
      const total = rt_areaActual + bs_areaActual;
      if (total > 0) {
        rt_areaActual = overlapMin * (rt_areaActual / total);
        bs_areaActual = overlapMin * (bs_areaActual / total);
      }
    }
  }

  // 截斷標示
  const rt_truncated = rt_enabled && (rt_areaActual < rt_areaRawInput - 0.01);
  const bs_truncated = bs_enabled && (bs_areaActual < bs_areaRawInput - 0.01);

  // % 對應 (基準 = 該項目期間最小可用)
  const rt_areaPctActual = rt_periodMin > 0 ? rt_areaActual / rt_periodMin : 0;
  const bs_areaPctActual = bs_periodMin > 0 ? bs_areaActual / bs_periodMin : 0;

  // ─── 處分面積處理 ───
  // 若處分只 1 筆且面積=0, 且租金/營業都未啟用 (或面積=0), 自動填補為分回面積
  // 一旦有租金/營業, autoFillSingle 不再啟動 (避免雞蛋問題)
  let pd_totalAreaEffective = pd_totalAreaRaw;
  if (autoFillSingle && !rt_enabled && !bs_enabled) {
    pd_totalAreaEffective = myArea;
  } else if (autoFillSingle) {
    // 有租金/營業時, autoFill 那筆設為 0 (使用者需手動)
    pd_totalAreaEffective = 0;
  }
  // 處分面積互斥檢查 (處分加總不能超過分回)
  const areaConflict = pd_totalAreaEffective > myArea + 0.01;
  const scale = areaConflict && pd_totalAreaEffective > 0 ? myArea / pd_totalAreaEffective : 1;
  const sumRaw = pd_totalAreaEffective + rt_areaRawInput + bs_areaRawInput;

  // 計算每筆處分的詳細資料
  // 自 v125: 支援比例模式 (areaMode="ratio" → 面積 = myArea × areaPct%); 售價連動基準處分售價;
  //          空筆 fallback (釐清D=乙): 無處分筆時自動視為「完工即售全部」(100% at 交屋日)
  const _baseDisposalPrice = Number(cb.scenDisposalPrice) || 0;
  // 自 v164: 空筆 fallback 的處分時點改用 effHandoverDate（交屋日），而非 acqYear（土地取得日）
  //   原本 year:acqYear 導致「取得日=處分日」，holdY=0 → 房地合一稅持有期 0 年 → 適用最高稅率(45%)
  //   正確語意：無處分設定時，預設為「交屋當下全數售出」，持有期 = 交屋日 - 取得日（才能正確算稅）
  const _ehForFallback = effHandoverDate(p);
  const _rawDisposals = (cb.disposals && cb.disposals.length > 0)
    ? cb.disposals
    : [{ id: "__autofull__", label: "完工即售 (全部)", areaMode: "ratio", areaPct: 100, year: _ehForFallback.year, month: _ehForFallback.month, price: 0, enabled: true, _synthetic: true }];
  const disposals = _rawDisposals.map((d, idx) => {
    const enabled = d.enabled !== false;
    // 自 v147: 處分筆有選類型(catKey) → 用該類型面積為基準; 否則用總量 myArea
    const _hasCatArea = _dispCatHasArea(d.catKey || "");
    const _baseA = _dispBaseArea(d.catKey || "");
    // 面積: ratio 模式 = 基準面積 × areaPct%; fixed 模式 = d.area (絕對坪)
    let areaRaw;
    if (d.areaMode === "ratio") {
      areaRaw = _baseA * (Number(d.areaPct) || 0) / 100;
    } else {
      areaRaw = Number(d.area) > 0 ? Number(d.area) : 0;
      if (autoFillSingle && idx === 0) areaRaw = pd_totalAreaEffective;
    }
    const areaActual = enabled ? areaRaw * scale : 0;
    // 持有年期 (處分月 − 取得月)
    const disposeAbsMonth = (Number(d.year)||0)*12 + (Number(d.month)||0);
    const holdMonths = Math.max(0, disposeAbsMonth - acqAbsMonth);
    const holdY = holdMonths / 12;
    // 建議價格 = 取得售價 × (建物比重 × (1-折舊)^年 + 土地比重 × (1+漲幅)^年)
    // 自 v161: 比例模式用分回均價 (myAllocValue ÷ myArea) 作基準, 比全案均價更精確
    const _baseUP = (isValueBased && myAllocValue > 0 && myArea > 0)
      ? (myAllocValue / myArea)
      : p.uP;
    const bFactor = Math.pow(1 - depRate, holdY);
    const lFactor = Math.pow(1 + appRate, holdY);
    const suggestedPrice = _baseUP * (bRatio * bFactor + lRatio * lFactor);
    // 使用價格: useSuggested → 建議價; 手動價 > 0 → 手動價; 否則 → 基準處分售價;
    // 自 v161: 再否則 → 分回部位均價 (myAllocValue ÷ myArea, 比例模式最準); 最後 fallback → p.uP
    let price;
    if (d.useSuggested) {
      price = suggestedPrice;
    } else if (Number(d.price) > 0) {
      price = Number(d.price);
    } else if (_baseDisposalPrice > 0) {
      price = _baseDisposalPrice;
    } else if (isValueBased && myAllocValue > 0 && myArea > 0) {
      price = myAllocValue / myArea;  // 分回部位加權均價 (比 p.uP 全案均價更精確)
    } else {
      price = p.uP;
    }
    const totalRevenue = (isValueBased && d.areaMode === "ratio" && !_hasCatArea)
      // 自 v135: 價值導向 (無指定類型) — 收入 = 分回總銷 × 處分比例% (忽略處分單價)
      ? (myAllocValue * (Number(d.areaPct) || 0) / 100 * scale * (enabled ? 1 : 0))
      // 自 v147: 有指定類型 → 該類型面積 × 單價 (面積導向); 或一般面積導向
      : areaActual * price;
    // 成本/土地分攤比例:
    //   自 v147: 有指定類型 → 依「價值比例」分攤 (處分價值 / 總分回總銷)
    //   無類型價值導向 → 處分比例%; 一般面積導向 → 處分面積/分回面積
    const ratio = _hasCatArea
      ? (myAllocValue > 0 ? (totalRevenue / myAllocValue) : (myArea > 0 ? areaActual / myArea : 0))
      : (isValueBased && d.areaMode === "ratio")
        ? ((Number(d.areaPct) || 0) / 100 * scale * (enabled ? 1 : 0))
        : (myArea > 0 ? areaActual / myArea : 0);
    const costShare = myTotalCost * ratio;
    const landShare = landValue * ratio;
    const taxableBase = totalRevenue - landShare - costShare;
    // 自 v184: 逐持分新舊制混合稅額計算
    let taxInfo;
    if (!_hasOldHoldings && !_hasNewHoldings) {
      // 建商/無持分：原有邏輯（全新制，用全局 holdY）
      taxInfo = calcLandHouseTax(taxableBase, holdY);
    } else if (_hasOldHoldings && !_hasNewHoldings) {
      // 自 v203: 純舊制，依 invest 狀態分流「處分稅」— 出資全額，純合建稀釋+可六折
      //   按這筆處分占全部處分收入的比例，分攤 retainedTax（逐持分彙總的真實舊制土增稅，已依 invest 分流）
      const _retainedTaxLH = _ownerInvests
        ? _oldTax
        : _oldTax * _jbLandlordShareForTax * (_currentOwner && _currentOwner.lvtDiscountOnDisposal ? 0.6 : 1);
      const _oldTaxShare = pd_totalAreaEffective > 0 ? (areaActual / pd_totalAreaEffective) : 0;
      const _thisOldTax = (_oldTaxReady ? _retainedTaxLH : 0) * _oldTaxShare;
      taxInfo = {
        rate: 0, exemption: 0, tax: _thisOldTax, taxable: taxableBase,
        label: _oldTaxReady ? "舊制土增稅(處分,按比例分攤)" : "舊制土增稅(尚未查詢)",
        regime: "old"
      };
    } else if (!_hasOldHoldings && _hasNewHoldings) {
      // 純新制
      taxInfo = { ...calcLandHouseTax(taxableBase, holdY), regime: "new" };
    } else {
      // 自 v203: 混合，依 invest 狀態分流舊制部分
      const _newBase = taxableBase * _newRatio;
      const _newHoldY = Math.max(0, (disposeAbsMonth - _newAcqAbsMonth) / 12);
      const _newTI = calcLandHouseTax(_newBase, _newHoldY);
      const _retainedTaxLH2 = _ownerInvests
        ? _oldTax
        : _oldTax * _jbLandlordShareForTax * (_currentOwner && _currentOwner.lvtDiscountOnDisposal ? 0.6 : 1);
      const _oldTaxShare = pd_totalAreaEffective > 0 ? (areaActual / pd_totalAreaEffective) : 0;
      const _thisOldTax = (_oldTaxReady ? _retainedTaxLH2 : 0) * _oldTaxShare;
      taxInfo = {
        rate: _newTI.rate, exemption: _newTI.exemption,
        tax: _thisOldTax + _newTI.tax,
        taxable: taxableBase,
        label: `混合稅制(舊制${_oldTaxReady ? _thisOldTax.toFixed(1) : "待查"}萬 + 新制${_newRatio < 1 ? ((_newRatio*100).toFixed(0)+"%) ") : ""}${_newTI.label})`,
        regime: "mixed"
      };
    }
    const grossProfit = totalRevenue - costShare - landShare;
    const netProfit = enabled ? grossProfit - taxInfo.tax : 0;
    return {
      id: d.id, label: d.label || `第${idx+1}筆`, enabled,
      year: d.year, month: d.month,
      areaRaw, areaActual, price, ratio,
      suggestedPrice, useSuggested: !!d.useSuggested,
      bFactor, lFactor,
      totalRevenue, costShare, landShare, taxableBase,
      holdYears: holdY, taxInfo,
      grossProfit, netProfit
    };
  });

  // 處分合計
  // 自 v208: 租金補貼(myOtherIncome)一次性計入處分合計，不隨處分筆數重複加總
  //   （這筆收入是「施工期間」的一次性補貼，跟哪一筆處分無關，只加一次）
  const pd_sumNetProfit = disposals.reduce((a, d) => a + d.netProfit, 0) + myOtherIncome;
  const pd_sumGrossProfit = disposals.reduce((a, d) => a + d.grossProfit * (d.enabled?1:0), 0);
  const pd_sumTax = disposals.reduce((a, d) => a + (d.enabled ? d.taxInfo.tax : 0), 0);
  const pd_sumRevenue = disposals.reduce((a, d) => a + (d.enabled ? d.totalRevenue : 0), 0);
  const pd_sumArea = disposals.reduce((a, d) => a + (d.enabled ? d.areaActual : 0), 0);

  // (2) 租金收益 — 自 v214: 支援 items[] 細算模式（逐筆含調幅），無 items 則退回粗算模式（向下相容）
  const rt_items = Array.isArray(rt.items) ? rt.items.filter(it => it.enabled !== false) : [];
  let effect2Total, effect2NPV, effect2Annual, rentMonths, rt_itemResults = [];
  if (rt_enabled && rt_items.length > 0) {
    rt_itemResults = rt_items.map(it => calcSingleIncomeItem(
      it.areaInput, it.catKey, it.monthlyRent, it.annualGrowthRate,
      it.startYear, it.startMonth, it.endYear, it.endMonth
    ));
    effect2Total  = rt_itemResults.reduce((a, x) => a + x.total, 0);
    effect2NPV    = rt_itemResults.reduce((a, x) => a + x.npv, 0);
    effect2Annual = rt_itemResults.reduce((a, x) => a + x.annual, 0);
    rentMonths    = Math.max(0, ...rt_itemResults.map(x => x.months), 0);
  } else {
    rentMonths = rt_enabled
      ? Math.max(0, ((Number(rt.endYear)||0)*12 + (Number(rt.endMonth)||0)) - ((Number(rt.startYear)||0)*12 + (Number(rt.startMonth)||0)) + 1)
      : 0;
    const _single = calcSingleIncomeItem(
      rt_areaActual, rt.catKey, rt.monthlyRent, rt.annualGrowthRate,
      rt.startYear, rt.startMonth, rt.endYear, rt.endMonth
    );
    effect2Total  = rt_enabled ? _single.total  : 0;
    effect2NPV    = rt_enabled ? _single.npv    : 0;
    effect2Annual = rt_enabled ? _single.annual : 0;
  }
  const rentYears = rentMonths / 12;

  // (3) 營業收益 — 同上，自 v214 支援 items[]
  const bs_items = Array.isArray(bs.items) ? bs.items.filter(it => it.enabled !== false) : [];
  let effect3Total, effect3NPV, effect3Annual, bizMonths, bs_itemResults = [];
  if (bs_enabled && bs_items.length > 0) {
    bs_itemResults = bs_items.map(it => calcSingleIncomeItem(
      it.areaInput, it.catKey, it.perfPerPing, it.annualGrowthRate,
      it.startYear, it.startMonth, it.endYear, it.endMonth
    ));
    effect3Total  = bs_itemResults.reduce((a, x) => a + x.total, 0);
    effect3NPV    = bs_itemResults.reduce((a, x) => a + x.npv, 0);
    effect3Annual = bs_itemResults.reduce((a, x) => a + x.annual, 0);
    bizMonths     = Math.max(0, ...bs_itemResults.map(x => x.months), 0);
  } else {
    bizMonths = bs_enabled
      ? Math.max(0, ((Number(bs.endYear)||0)*12 + (Number(bs.endMonth)||0)) - ((Number(bs.startYear)||0)*12 + (Number(bs.startMonth)||0)) + 1)
      : 0;
    const _single = calcSingleIncomeItem(
      bs_areaActual, bs.catKey, bs.perfPerPing, bs.annualGrowthRate,
      bs.startYear, bs.startMonth, bs.endYear, bs.endMonth
    );
    effect3Total  = bs_enabled ? _single.total  : 0;
    effect3NPV    = bs_enabled ? _single.npv    : 0;
    effect3Annual = bs_enabled ? _single.annual : 0;
  }
  const bizYears = bizMonths / 12;

  // 模式二總計
  const longHold_total = pd_sumNetProfit + effect2NPV + effect3NPV;
  // 年化分母: 取最後一筆處分日期 − 取得日期 (作為持有期間), 若無則用 holdYears
  const enabledDisposals = disposals.filter(d => d.enabled);
  const lastDispose = enabledDisposals.length > 0
    ? enabledDisposals.reduce((a,b) => ((a.year*12+a.month) > (b.year*12+b.month) ? a : b))
    : null;
  const longHold_periodYears = lastDispose
    ? Math.max(1, ((lastDispose.year*12+lastDispose.month) - acqAbsMonth) / 12)
    : holdYears;
  const longHold_annual = (pd_sumNetProfit / longHold_periodYears) + effect2Annual + effect3Annual;

  // ─── 自 v66: 公保地容積移轉 (情境模擬) ───
  const vt = cb.volTransfer || {};
  const vt_enabled = !!vt.enabled;
  const vt_includeInT8 = !!vt.includeInT8;
  const vt_pricePct = Number(vt.pricePct) || 0;
  // 公告總值自動帶: 我 (myRole) 的持分公告總值加總
  // 自 v230 修正：不再自己維護一套比對邏輯，改直接呼叫 calcOwnerAnnouncedValueRaw
  //   （與「土地價值認列」共用同一套已驗證正確的比對方式，避免各自實作卻結果不一致）
  let vt_announcedAuto = 0;
  if (myRole.startsWith("owner_")) {
    const _me = (p.owners || []).find(o => "owner_" + o.id === myRole);
    if (_me) vt_announcedAuto = calcOwnerAnnouncedValueRaw(p, _me.id);
  } else if (myRole.startsWith("group_")) {
    const _g = (p.selectGroups || []).find(x => ("group_" + x.id) === myRole);
    if (_g) {
      (_g.members || []).forEach(mid => {
        const _mo = (p.owners || []).find(o => o.id === mid);
        if (_mo) vt_announcedAuto += calcOwnerAnnouncedValueRaw(p, _mo.id);
      });
    }
  }
  // 若有手動覆寫值, 用覆寫值
  const vt_announcedValue = (vt.announcedValueOverride != null && vt.announcedValueOverride !== "")
    ? Number(vt.announcedValueOverride) || 0
    : vt_announcedAuto;
  const vt_isOverridden = vt.announcedValueOverride != null && vt.announcedValueOverride !== "";
  const vt_autoRevenue = vt_announcedValue * vt_pricePct / 100;
  const vt_totalCosts = (vt.extraCosts || []).reduce((a, c) => a + (Number(c.amount) || 0), 0);
  const vt_totalRevenues = (vt.extraRevenues || []).reduce((a, r) => a + (Number(r.amount) || 0), 0);
  const vt_netProfit = vt_autoRevenue + vt_totalRevenues - vt_totalCosts;

  // ─── 統一回傳值（依 mode 切換 totalBenefit / totalAnnual）───
  // 自 v87: 容移啟用時, 容移淨收益自動計入 totalBenefit (整合進「經營分析總額」)
  const _vtContribution = (vt.enabled && Number.isFinite(vt_netProfit)) ? vt_netProfit : 0;
  const totalBenefit = (mode === "single" ? single_netProfit : longHold_total) + _vtContribution;
  const totalAnnual  = mode === "single" ? single_annual   : longHold_annual;

  return {
    mode,
    myRole, myRoleLabel, myArea, mySalesAmount, myTotalCost, myPAT, myCs,
    myCompMode, myTypeAreas,
    // 自 v136: 診斷用 — 分回總銷/價值導向旗標/組合項數/總銷面積
    myAllocValue, isValueBased,
    _diagTotalArea: dr.totalArea,
    _diagHouseSales: dr.salesMix ? dr.salesMix.houseSales : 0,
    landValue, landLabel, landMode: lmode,
    useDiscount, discountRate: r, holdYears,
    buildingDepRate: depRate, landAppRate: appRate, buildingRatio: bRatio,
    taxpayer, selfUse,
    acqYear, acqMonth, acqAuto, acqAbsMonth,
    // 自 v56: 土地稅制
    landRegime, landAcqYearROC, lvtUrbanRenewal, lvtTax, lvtRaw,
    // 自 v220: 逐持分彙總舊制稅額 + 持分土地總面積(m2)，供「純售地」情境計算賣地稅額/收入用
    lvtOldTaxTotal: _oldTax, myLandM2: _totalHoldArea,
    // 模式一 (single)
    single: {
      taxableBase: single_taxableBase,
      grossProfit: single_grossProfit,
      taxInfo: single_taxInfo,
      netProfit: single_netProfit,
      annual: single_annual
    },
    // 模式二 (longHold)
    longHold: {
      disposals,
      pd_sumGrossProfit, pd_sumNetProfit, pd_sumTax, pd_sumRevenue, pd_sumArea,
      autoFillSingle, periodYears: longHold_periodYears,
      availableArea, totalDisposedArea, overlapMin,
      rent: {
        enabled: rt_enabled,
        areaRaw: rt_areaRawInput, areaActual: rt_areaActual,
        areaPctActual: rt_areaPctActual,
        periodMin: rt_periodMin,
        truncated: rt_truncated,
        months: rentMonths, years: rentYears,
        total: effect2Total, npv: effect2NPV, annual: effect2Annual,
        items: rt_items, itemResults: rt_itemResults,  // 自 v214
        overLimitAny: rt_itemResults.some(x => x.overLimit)
      },
      business: {
        enabled: bs_enabled,
        areaRaw: bs_areaRawInput, areaActual: bs_areaActual,
        areaPctActual: bs_areaPctActual,
        periodMin: bs_periodMin,
        truncated: bs_truncated,
        months: bizMonths, years: bizYears,
        total: effect3Total, npv: effect3NPV, annual: effect3Annual,
        items: bs_items, itemResults: bs_itemResults,  // 自 v214
        overLimitAny: bs_itemResults.some(x => x.overLimit)
      },
      periodsOverlap,
      areaConflict, scale, sumRaw,
      total: longHold_total,
      annual: longHold_annual
    },
    // 為向下相容保留的欄位
    effect1Total: single_grossProfit,
    effect1Annual: single_annual,
    effect2NPV, effect2Annual, effect2Total,
    effect3NPV, effect3Annual, effect3Total,
    totalBenefit, totalAnnual,
    // 自 v66: 公保地容積移轉
    volTransfer: {
      enabled: vt_enabled,
      includeInT8: vt_includeInT8,
      pricePct: vt_pricePct,
      announcedValue: vt_announcedValue,
      announcedAuto: vt_announcedAuto,
      isOverridden: vt_isOverridden,
      autoRevenue: vt_autoRevenue,
      extraCosts: vt.extraCosts || [],
      extraRevenues: vt.extraRevenues || [],
      totalCosts: vt_totalCosts,
      totalRevenues: vt_totalRevenues,
      netProfit: vt_netProfit
    }
  };
}

/* ════════════════════════════════════════
   T8: IRR & 投資綜合報告計算
════════════════════════════════════════ */

// IRR 計算 (牛頓法/二分法混合)
// cashflows: [{year, value}], value 負為流出, 正為流入
function calcIRR(cashflows) {
  if (!cashflows || cashflows.length < 2) return null;
  const minY = Math.min(...cashflows.map(c => c.year));
  const maxY = Math.max(...cashflows.map(c => c.year));
  // 必須有正有負
  const hasPos = cashflows.some(c => c.value > 0);
  const hasNeg = cashflows.some(c => c.value < 0);
  if (!hasPos || !hasNeg) return null;
  // NPV 函式
  const npv = (rate) => cashflows.reduce((sum, c) => sum + c.value / Math.pow(1+rate, c.year - minY), 0);
  // 二分法 (穩定但慢)
  let lo = -0.99, hi = 10.0;
  if (npv(lo) * npv(hi) > 0) return null; // 無解
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2;
    const v = npv(mid);
    if (Math.abs(v) < 0.0001) return mid;
    if (npv(lo) * v < 0) hi = mid; else lo = mid;
  }
  return (lo + hi) / 2;
}

// 自 v225: 獨立的 MIRR 計算函式（從 calcOptimizer 的區域函式 mirrOf 抽出、參數化），
//   供「純售地」「容積移轉」等新情境重用，不影響 calcOptimizer/calcComboOptimizer 原本的區域版本。
// cashflows: [{year, value}]；reinvestRate: 正現金流再投資率；financeRate: 負現金流(投入)折現率
function calcMIRR(cashflows, reinvestRate, financeRate) {
  if (!cashflows || cashflows.length < 2) return null;
  const years = cashflows.map(c => c.year);
  const startYear = Math.min(...years), terminalYear = Math.max(...years);
  let fvPos = 0, pvNeg = 0;
  cashflows.forEach(c => {
    if (c.value > 0) fvPos += c.value * Math.pow(1 + (reinvestRate||0), terminalYear - c.year);
    else pvNeg += (-c.value) / Math.pow(1 + (financeRate||0), c.year - startYear);
  });
  const n = terminalYear - startYear;
  return (pvNeg > 0 && n > 0) ? Math.pow(fvPos / pvNeg, 1 / n) - 1 : null;
}
// 自 v226: ROI/回收年數 共用函式（{year,value}格式），供純售地/容積移轉情境補齊完整指標，
//   避免候選清單裡 roi/payback 留 null 導致UI格式化函式（pct0/pbk）誤顯示「0%」「即時」。
function calcROI(cashflows) {
  if (!cashflows || cashflows.length === 0) return null;
  let pos = 0, neg = 0;
  cashflows.forEach(c => { if (c.value > 0) pos += c.value; else neg += -c.value; });
  return neg > 0 ? (pos - neg) / neg : null;
}
function calcPayback(cashflows) {
  if (!cashflows || cashflows.length === 0) return null;
  const byYear = {};
  cashflows.forEach(c => { byYear[c.year] = (byYear[c.year] || 0) + c.value; });
  const years = Object.keys(byYear).map(Number).sort((a, b) => a - b);
  let cum = 0, everNegative = false;
  for (const y of years) {
    const prevCum = cum;
    cum += byYear[y];
    if (prevCum < 0 && cum >= 0) {
      const yearDelta = byYear[y] !== 0 ? -prevCum / byYear[y] : 0;
      return (y - years[0]) + yearDelta;
    }
    if (cum < 0) everNegative = true;
  }
  // 自 v226 修正：迴圈跑完仍未觸發「負轉正」代表兩種情況需要區分——
  //   ①現金流從頭到尾都沒變負過(例如賣地收入直接讓第一年就是正的) → 即時回本，回傳0
  //   ②曾經變負但期內始終沒轉正 → 期內未回本，回傳Infinity
  //   原本兩種情況都回傳Infinity，會讓「立即回本」被誤顯示成「期內未回本」，方向完全相反。
  return everNegative ? Infinity : 0;
}


// strategyOverride 可以覆寫 compBenefit 設定來生成不同情境
// 自 v225: 純售地情境 — 開發前先賣掉部分持分土地，剩餘比例繼續參與合建（均價組合）。
//   改為讀取 p.compBenefit.pureLandSale（與①不動產處分同一個對話框收納，含交易年月），
//   不再用外部 opts 參數傳入，讓它能跟 A/B/C/D 一樣被情境按鈕系統直接呼叫。
//   簡化線性模型（使用者確認）：現金流整條依剩餘比例縮放 + 插入一筆賣地現金流（在指定交易年月）
//     → 這在數學上與「先加總再乘比例」完全等價（線性運算的分配律），只是攤開在時間軸上，
//       因此能進一步算出 IRR/MIRR，供最優方案模擬公平比較，不產生新的重複計算風險。
//   賣地稅額 = 表二逐持分彙總舊制稅額 × 賣地比例（僅涵蓋舊制部分，理由同前）。
//   情境層設計：不修改 p.ownerHoldings 等任何永久資料。
function calcPureLandSaleScenario(p, dr) {
  const pls = (p.compBenefit || {}).pureLandSale;
  if (!pls || !pls.enabled) return { skipped: true, reason: "notEnabled" };
  const sellLandRatio = Math.max(0, Math.min(100, Number(pls.sellLandRatio) || 0)) / 100;
  if (sellLandRatio <= 0) return { skipped: true, reason: "noSellRatio" };
  const landSalePrice = Number(pls.landSalePrice) || 0;  // 萬/坪
  const saleYear = Number(pls.year) || 0, saleMonth = Number(pls.month) || 0;

  // 1. 完整開發的正常結果與現金流，當作基準
  // 自 v231 修正：改用情境A(全處分)的強制覆寫當基準，不再用原始 compBenefit 設定。
  //   根因：使用者確認「賣地/容移都會設定交易日期，概念上就是『在那天全部賣掉』」，
  //   所以「剩餘比例開發」部分該對齊「全處分」這個明確定義的策略，而不是使用者原始的
  //   compBenefit.mode/disposals（可能是longHold/其他策略，跟「全處分」是不同基準，
  //   會導致跟情境A並列比較時，兩者的「開發淨利」用不同算法算出來，數字對不上、產生誤導）。
  const _scenA = makeScenarioDefs(p).find(d => d.id === "A");
  const snap = calcT8Snapshot(p, dr, _scenA ? _scenA.override : null);
  const fullProfit = snap.totalProfit;
  const ce = snap.ce;

  // 2. 剩餘比例部分：現金流整條線性縮放（等價於原本的「先加總再乘比例」簡化模型）
  const remainRatio = 1 - sellLandRatio;
  const remainProfit = fullProfit * remainRatio;
  const scaledCF = (snap.cashflows || []).map(c => ({ year: c.year, value: c.value * remainRatio }));

  // 3. 賣地部分：面積(m2→坪) × 賣地比例 × 地價
  const myLandPing = (Number(ce.myLandM2) || 0) * 0.3025;
  const landSaleRevenue = myLandPing * sellLandRatio * landSalePrice;

  // 4. 賣地稅額：表二逐持分彙總舊制稅額 × 賣地比例
  const oldTaxReady = ce.lvtOldTaxTotal != null;
  const landSaleTax = oldTaxReady ? (Number(ce.lvtOldTaxTotal) || 0) * sellLandRatio : 0;
  const landSaleCash = landSaleRevenue - landSaleTax;  // 實際現金金額，維持不變，供現金流/IRR使用

  // 自 v235 修正：補上土地價值認列（按賣地比例）扣除。根因：使用者確認賣地帳上成本
  //   （原始取得的土地價值認列）自然要扣除，才是真正的處分利潤；現有公式只扣了稅，
  //   完全沒扣土地取得成本，等於把「收回自己土地的本金」也算成獲利，高估了利潤。
  //   只按「賣出比例」扣（例如賣50%只扣50%的土地價值認列），因為剩下50%還是你的地，
  //   還沒有處分，不該連那部分的價值也一起扣掉。
  //   只調整「利潤」數字，不動現金流——實際收到的賣地現金不會因此變少。
  const myRole = p.myRole || "builder";
  let landValue = 0;
  if (myRole.startsWith("owner_")) {
    const me = (p.owners || []).find(o => "owner_" + o.id === myRole);
    if (me) landValue = getOwnerLandValue(p, dr, me);
  }
  const landValueDeduction = landValue * sellLandRatio;
  const landSaleNet = landSaleCash - landValueDeduction;  // 利潤數字才扣，現金流不受影響

  // 5. 合併現金流：插入賣地現金流在指定交易年（未指定則落在開發起始年，防呆用）
  //   維持用 landSaleCash（實際現金），不用扣土地價值認列後的 landSaleNet
  const devStartYear = Math.floor((dr.devPeriod && dr.devPeriod.startAbs || 0) / 12);
  const saleCFYear = saleYear > 0 ? saleYear : (scaledCF.length > 0 ? Math.min(...scaledCF.map(c => c.year)) : devStartYear);
  const byYear = {};
  scaledCF.forEach(c => { byYear[c.year] = (byYear[c.year] || 0) + c.value; });
  byYear[saleCFYear] = (byYear[saleCFYear] || 0) + landSaleCash;
  const mergedCF = Object.entries(byYear).map(([y, v]) => ({ year: Number(y), value: v })).sort((a, b) => a.year - b.year);

  // 6. 合計與投報指標
  const totalProfit = remainProfit + landSaleNet;
  const financeRate = (Number((p.t8 || {}).discountRate) || 0) / 100;
  const irr = calcIRR(mergedCF);
  const mirr = calcMIRR(mergedCF, 0.015, financeRate);

  return {
    skipped: false,
    sellLandRatio, landSalePrice, saleYear, saleMonth, remainRatio,
    fullProfit, remainProfit,
    myLandPing, landSaleRevenue, landSaleTax, landSaleCash, landValue, landValueDeduction, landSaleNet, oldTaxReady,
    totalProfit, irr, mirr, cashflows: mergedCF
  };
}

// 自 v228: 容積移轉的角色分潤 — 抽成可指定任意 role/ownerId 的通用版本
//   （原本 _vtMyShare 只綁在 calcT8Snapshot 內部的 ce.myRole，無法用來算「頂部表格」裡
//    builder/每個地主/每個群組各自的欄位，這裡重寫成參數化版本，邏輯完全比照原本）
// 自 v229 修正：容移只在「分析目標地主自己」與「建商」之間分，不再拿去跟其他地主分。
//   根因：vt.autoRevenue(容移主要收入)從一開始就是「myRole自己的持分公告總值」算出來的，
//   不是全體地主共用的池子，所以不該再用「自己在全體地主裡的佔比」去稀釋一次。
//   其他地主（非分析目標）這筆交易不適用，顯示0（跟純售地情境的處理方式一致）。
function getRoleVTShare(p, vtTotalAmount, role, ownerId, myRoleStr) {
  const cb = p.compBenefit || {};
  const vtCfg = cb.volTransfer || {};
  const builderShare = Math.max(0, Math.min(1, Number(vtCfg.builderShareRatio) || 0));
  if (role === "b") return vtTotalAmount * builderShare;
  const colRoleStr = role === "o" ? ("owner_" + ownerId) : role === "group" ? ("group_" + ownerId) : "";
  if (colRoleStr !== myRoleStr) return 0;  // 非分析目標地主：這筆容移交易跟你無關
  return vtTotalAmount * (1 - builderShare);
}

// 自 v228: 為情境E(純售地)/F(容積移轉)建構頂部表格(分回金額/成本合計/✦稅後淨利)專屬資料，
//   取代誤用 cS() 算出的「正常開發總銷/成本」。
//   根因：cS() 完全不知道 scenario 是什麼，對所有情境(A-F)都回傳同一組正常開發數字，
//   對A/B/C/D剛好無傷(同一棟房子，處置策略不同而已)，但對E/F是誤導(容移/賣地是完全不同的交易)。
function buildSpecialColData(p, dr, scenarioKind, role, ownerId, myRoleStr) {
  const zero = {
    sh:0, tc:0, pbt:0, itx:0, pat:0, shareArea:0, otherIncome:0,
    cs:{de:0,co:0,ad:0,tx:0,mg:0,am:0,it:0,lt:0,lex:0,dd:0},
    gm:0, nm:0, cr:0, bep:0, ll:0, cl:0, tl:0, eq:0, er:0, ownerFinanceInterest:0
  };
  if (scenarioKind === "volTransfer") {
    // 容積移轉：可依 builderShareRatio 分潤給建商/地主，每個角色都可能有份額
    const ce = calcCompBenefit({...p, myRole: myRoleStr}, dr);
    const vt = ce.volTransfer || {};
    if (!vt.enabled) return zero;
    // 自 v228 修正：vt.totalRevenues 只是「額外收益」(extraRevenues)的加總，
    //   真正的容移主要收入是 vt.autoRevenue（公告值×比例算出的容積買賣金額），
    //   完整收入 = autoRevenue + totalRevenues，才會等於 netProfit = 完整收入 - totalCosts
    const vtFullRevenue = (Number(vt.autoRevenue) || 0) + (Number(vt.totalRevenues) || 0);
    const myRev = getRoleVTShare(p, vtFullRevenue, role, ownerId, myRoleStr);
    const myCost = getRoleVTShare(p, Number(vt.totalCosts) || 0, role, ownerId, myRoleStr);
    const sh = myRev, tc = myCost, pbt = sh - tc, itx = 0, pat = pbt;
    return {
      sh, tc, pbt, itx, pat, shareArea: 0, otherIncome: 0,
      cs: {de:0,co:0,ad:0,tx:0,mg:0,am:0,it:0,lt:0,lex:0,dd:0, vtCost: tc},
      gm: sh ? pbt/sh : 0, nm: sh ? pat/sh : 0, cr: tc ? pat/tc : 0, bep: 0,
      ll:0, cl:0, tl:0, eq:0, er:0, ownerFinanceInterest:0
    };
  }
  if (scenarioKind === "pureLandSale") {
    // 純售地：目前設計綁定在「分析目標」本人（跟 calcPureLandSaleScenario 的 p.myRole 一致），
    //   其餘角色（建商/其他地主）這筆交易不適用，顯示0（不是誤導，是誠實反映「這不是你的交易」）
    const colRoleStr = role === "b" ? "builder" : role === "o" ? ("owner_"+ownerId) : ("group_"+ownerId);
    if (colRoleStr !== myRoleStr) return zero;
    const PL = calcPureLandSaleScenario({...p, myRole: myRoleStr}, dr);
    if (PL.skipped) return zero;
    // 自 v235 修正：tc(成本合計) 納入土地價值認列(按賣地比例)，讓 pat 自動等於 PL.landSaleNet
    //   （sh - tc = landSaleRevenue - landSaleTax - landValueDeduction = landSaleNet，數學上一致）
    const sh = PL.landSaleRevenue, tc = PL.landSaleTax + (PL.landValueDeduction || 0), pbt = sh - tc, itx = 0, pat = pbt;
    return {
      sh, tc, pbt, itx, pat, shareArea: 0, otherIncome: 0,
      cs: {de:0,co:0,ad:0,tx:0,mg:0,am:0,it:0,lt:0,lex:PL.landSaleTax,dd:0, landValueDeduction: PL.landValueDeduction || 0},
      gm: sh ? pbt/sh : 0, nm: sh ? pat/sh : 0, cr: tc ? pat/tc : 0, bep: 0,
      ll:0, cl:0, tl:0, eq:0, er:0, ownerFinanceInterest:0
    };
  }
  return zero;
}

// 自 v225: 容積移轉情境 — 與「純售地情境」同構的隔離設計，避免污染其他上下游計算。
//   改為讀取 p.compBenefit.volTransfer（既有結構，補上 year/month 交易年月欄位）。
// 自 v232 修正：徹底移除「開發利潤」。根因：容積移轉代表把可建築的容積本身出售/移轉掉，
//   沒有容積就沒有房子可以蓋，不該疊加任何開發淨利（不管是原始設定的還是情境A全處分的）。
//   跟純售地(E)不同——純售地是「部分土地出售，剩餘比例繼續開發」，容移是「容積全部出售，
//   完全沒有剩餘可開發部分」，兩者概念不同，容移不能比照純售地保留開發基準。
//   容移是單一時間點的交易（收入-成本），沒有跨期現金流，IRR/MIRR 這種需要時間軸的指標
//   本來就不適用，正確顯示「—」是誠實反映數學限制，不是計算缺失。
// 自 v235 修正：補上土地價值認列（全額）扣除。根因：使用者確認容積移轉實務上多數情況下
//   整塊土地所有權會移轉給他方或政府（尤其公保地容移），本質上是一種土地處分交易，
//   帳上原始取得成本（土地價值認列）自然要扣除，不能只算容移收入-成本。
//   只調整「利潤」數字，不動現金流——土地價值認列是會計調整，不是實際現金流出，
//   實際收到的容移現金不會因此變少，IRR/MIRR 維持用未扣除的現金金額計算。
function calcVolTransferScenario(p, dr) {
  const snap = calcT8Snapshot(p, dr);  // 不需要任何override：容移的公告總值/成本跟開發策略mode/disposals完全無關
  const ce = snap.ce;
  const vt = ce.volTransfer || {};
  if (!vt.enabled) return { skipped: true, reason: "notEnabled" };
  // 角色分潤（沿用 _vtMyShare 同一套已修正邏輯：只在分析目標地主與建商之間分）
  const volTransferNet = Number(snap.vtMyShare) || 0;  // 實際現金金額，維持不變，供現金流/IRR使用

  // 土地價值認列（全額）— 只有「分析目標是地主」時才有意義，建商沒有自己的土地要扣
  const myRole = p.myRole || "builder";
  let landValue = 0;
  if (myRole.startsWith("owner_")) {
    const me = (p.owners || []).find(o => "owner_" + o.id === myRole);
    if (me) landValue = getOwnerLandValue(p, dr, me);
  }
  const totalProfit = volTransferNet - landValue;  // 利潤數字才扣，現金流不受影響

  const vtCfg = (p.compBenefit || {}).volTransfer || {};
  const vtYear = Number(vtCfg.year) || 0;
  // 現金流：只有容移這筆交易本身，單一時間點，沒有開發期現金流可以合併
  //   維持用 volTransferNet（實際現金），不用扣土地價值認列後的 totalProfit
  const cashflows = vtYear > 0 ? [{ year: vtYear, value: volTransferNet }] : [];

  const financeRate = (Number((p.t8 || {}).discountRate) || 0) / 100;
  // 單筆現金流無法計算 IRR/MIRR（沒有跨期時間軸），正確回傳 null 顯示「—」
  const irr = cashflows.length >= 2 ? calcIRR(cashflows) : null;
  const mirr = cashflows.length >= 2 ? calcMIRR(cashflows, 0.015, financeRate) : null;

  return {
    skipped: false,
    baseProfit: 0, volTransferNet, landValue, totalProfit,
    fullNetProfit: Number(vt.netProfit) || 0,  // 自 v233: 分潤前的100%完整淨利，供其他角色欄位分潤用
    pricePct: vt.pricePct, announcedValue: vt.announcedValue,
    totalRevenues: vt.totalRevenues, totalCosts: vt.totalCosts,
    irr, mirr, cashflows
  };
}

function calcT8Snapshot(p, dr, strategyOverride = null) {
  // 套用情境覆寫
  const cb = strategyOverride
    ? {...(p.compBenefit||{}), ...strategyOverride}
    : (p.compBenefit || {});
  const pAdjusted = {...p, compBenefit: cb};
  const ce = calcCompBenefit(pAdjusted, dr);

  // ─── 期間 ───
  // 開發期: 從 dr.devPeriod (全域統一定義, 來自費用時程或使用者手動)
  const devStartAbs = dr.devPeriod.startAbs;
  const devEndAbs = dr.devPeriod.endAbs;

  // 持有期 end = 最後一筆處分日 (或租金/營業終點)
  let holdEndAbs = devEndAbs;
  if (ce.mode === "longHold") {
    ce.longHold.disposals.filter(d => d.enabled).forEach(d => {
      const dabs = d.year*12 + d.month;
      if (dabs > holdEndAbs) holdEndAbs = dabs;
    });
    if (ce.longHold.rent.enabled) {
      const rEnd = (cb.rent?.endYear||0)*12 + (cb.rent?.endMonth||0);
      if (rEnd > holdEndAbs) holdEndAbs = rEnd;
    }
    if (ce.longHold.business.enabled) {
      const bEnd = (cb.business?.endYear||0)*12 + (cb.business?.endMonth||0);
      if (bEnd > holdEndAbs) holdEndAbs = bEnd;
    }
  }
  const devStartYear = Math.floor(devStartAbs / 12);
  const devEndYear = Math.floor(devEndAbs / 12);
  const holdEndYear = Math.floor(holdEndAbs / 12);

  // ─── 損益 ───
  // 開發期 (來自 cS / myCs)
  const salesRev = ce.mySalesAmount;
  const burdenCost = ce.myTotalCost;  // 已含土增稅、契稅
  const devPAT = ce.myPAT;
  const devPBT = ce.myCs.pbt;
  const devTax = ce.myCs.itx;
  const devLVT = ce.myCs.lt || 0;
  const devDeed = ce.myCs.dd || 0;

  // 持有期 (來自 ce.longHold 或 ce.single)
  let holdRevenue = 0, holdCost = 0, holdTax = 0, holdNet = 0;
  if (ce.mode === "single") {
    // 自 v196 恢復：devPAT (=ce.myPAT) 用的是估算稅率 (calcCompBenefit 不再重算 myCs)，
    //   single.taxInfo.tax（真實精確稅額）只在這裡扣一次，不再有重複扣稅疑慮。
    //   一次處分: 視為延後的銷售收入 - 土地價值認列 - 房地合一稅
    holdRevenue = 0;
    holdCost = 0;
    holdTax = ce.single.taxInfo.tax || 0;
    holdNet = -holdTax;
  } else {
    const lh = ce.longHold;
    holdRevenue = lh.pd_sumRevenue + lh.rent.total + lh.business.total;
    // 持有期成本 = 多次處分按比例分攤的成本 (處分總成本已計入 dev?, 需釐清)
    // 簡化處理: 持有期不再扣分回成本 (分回成本已在 dev 期)
    // 持有期費用: 視為 0 (或可加入折舊維護等, 先簡化)
    holdCost = 0;
    holdTax = lh.pd_sumTax;
    holdNet = lh.pd_sumNetProfit + lh.rent.npv + lh.business.npv - lh.pd_sumNetProfit + lh.pd_sumNetProfit;
    // 持有期淨利 = 處分淨利(已扣稅) + 租金 + 營業
    holdNet = lh.pd_sumNetProfit + lh.rent.total + lh.business.total;
  }

  // ─── 投資基準 (使用者選擇) ───
  const ll = ce.myCs.ll || 0;  // 土地貸款
  const cl = ce.myCs.cl || 0;  // 建築貸款
  const eq = ce.myCs.eq || 0;  // 自有資金
  // 自 v127: 地主/群組視角 — 投資基準計入「土地價值」(乙: 出資承擔 + 土地價值)
  //   合建中地主以土地換屋, 土地是主要投入; 否則 ROI/ROE/IRR 分母≈0 → KPI 全 0
  //   建商不計 (其投入為現金 eq, 已有值)
  const _isLandlordView = (ce.myRole || "").startsWith("owner_") || (ce.myRole || "").startsWith("group_");
  const landInvest = _isLandlordView ? (Number(ce.landValue) || 0) : 0;
  const t8 = p.t8 || {};
  const investBase = t8.investBase || "equity";
  const analysisMode = t8.analysisMode || "disposal";  // 提前定義給 cashflows 用
  // 自 v141: 持有型情境 (該情境有啟用租金/營業) 自動納入租金/營業收益 — 即使全域 analysisMode=disposal
  //   全長租/全營業/半半 等情境的 ★綜合淨利會含租金營業; 純處分情境 (全處分/基準無租營) 仍只算處分
  const _ceLHinc = ce.longHold || {};
  const _includeHoldIncome = (analysisMode === "holdComplete") ||
    (ce.mode === "longHold" && (((_ceLHinc.rent && _ceLHinc.rent.enabled)) || ((_ceLHinc.business && _ceLHinc.business.enabled))));
  let totalInvest = eq + landInvest;  // 自 v127: equity 基準, 地主含土地投入
  if (investBase === "burden") totalInvest = burdenCost + landInvest;
  else if (investBase === "totalCost") totalInvest = burdenCost + ll + cl + landInvest;

  // ─── 投資指標 ───
  const r = (Number(t8.discountRate) || 0) / 100;
  // 構建簡化年度現金流 (用於 IRR & NPV)
  // cashflows 結構: { year, value, category }
  //   category: "dev_cost" (開發期支出), "dev_sales" (開發期銷售收入),
  //             "dev_tax" (開發期稅), "disposal" (處分收入),
  //             "rent" (租金), "business" (營業)
  const cashflows = [];
  const devYears = Math.max(1, devEndYear - devStartYear + 1);
  // 自 v165: longHold 模式下，開發期支出的實際終點 = min(devEndYear, 首筆處分年)
  //   避免 devEndYear > dispYear 時 cashflows 出現「負→正→負」多次變號，導致 calcIRR 回傳 null
  const _firstDispYear = (ce.mode === "longHold" && ce.longHold?.disposals?.length > 0)
    ? Math.min(...ce.longHold.disposals.filter(d => d.enabled && d.year > 0).map(d => d.year))
    : devEndYear;
  const _effDevEndYear = (ce.mode === "longHold") ? Math.min(devEndYear, _firstDispYear) : devEndYear;
  const _effDevYears = Math.max(1, _effDevEndYear - devStartYear + 1);
  // 自 v127: 地主/群組 — 期初投入土地 (−landInvest), 使 IRR 有正負流可解
  if (landInvest > 0) {
    cashflows.push({ year: devStartYear, value: -landInvest, category: "land" });
  }
  // 開發期支出 (負現金流): longHold 模式上限為 _effDevEndYear
  for (let y = devStartYear; y <= _effDevEndYear; y++) {
    cashflows.push({ year: y, value: -burdenCost / _effDevYears, category: "dev_cost" });
  }
  // 開發期銷售收入 (僅 single 模式, longHold 模式由處分產生收入)
  if (ce.mode === "single") {
    cashflows.push({ year: devEndYear, value: salesRev, category: "dev_sales" });
    cashflows.push({ year: devEndYear, value: -(devLVT + devDeed + devTax), category: "dev_tax" });
  } else {
    // longHold: 結構稅也移到 _effDevEndYear（交屋時才繳，不超過處分年）
    cashflows.push({ year: _effDevEndYear, value: -(devLVT + devDeed), category: "dev_tax" });
  }

  // 持有期年度現金流
  if (ce.mode === "longHold") {
    const lh = ce.longHold;
    // 處分: 各筆按年度計入 (兩種模式都計入)
    lh.disposals.filter(d => d.enabled).forEach(d => {
      const yr = d.year;
      cashflows.push({ year: yr, value: d.totalRevenue - d.taxInfo.tax, category: "disposal" });
    });
    // 租金: 按年平均 (持有型情境或 holdComplete 才計入 cashflows)
    if (_includeHoldIncome && lh.rent.enabled && lh.rent.years > 0) {
      const rStartY = cb.rent?.startYear || devEndYear;
      const rEndY = cb.rent?.endYear || devEndYear;
      const annualR = lh.rent.annual;
      for (let y = rStartY; y <= rEndY; y++) {
        cashflows.push({ year: y, value: annualR, category: "rent" });
      }
    }
    // 營業: 按年平均 (持有型情境或 holdComplete 才計入 cashflows)
    if (_includeHoldIncome && lh.business.enabled && lh.business.years > 0) {
      const bStartY = cb.business?.startYear || devEndYear;
      const bEndY = cb.business?.endYear || devEndYear;
      const annualB = lh.business.annual;
      for (let y = bStartY; y <= bEndY; y++) {
        cashflows.push({ year: y, value: annualB, category: "business" });
      }
    }
  }

  // 自 v88: 容移收益「我的份」分潤計算 — 自 v225 修正：不再無條件注入 cashflows。
  //   根因：v221 只移除了 totalProfit 的無條件疊加，但這裡（cfList/IRR/MIRR 用的現金流陣列）
  //   從 v88 起就有一個「只要 volTransfer.enabled 就注入」的獨立路徑，完全沒被 v221 的隔離涵蓋到，
  //   導致 snap.irr（全系統最常用的排序指標，calcOptimizer 預設用它）從一開始就沒有真正隔離乾淨。
  //   分潤計算本身（依建商/地主/群組角色比例）保留給 calcVolTransferScenario 使用（更精確，
  //   比原本簡化版本多考慮了角色分潤），但不再於此處自動注入現金流。
  const _vtMyShare = (() => {
    if (!(ce.volTransfer && ce.volTransfer.enabled)) return 0;
    const _vtNet = Number(ce.volTransfer.netProfit) || 0;
    const _vtCfg = cb.volTransfer || {};
    const _builderShare = Math.max(0, Math.min(1, Number(_vtCfg.builderShareRatio) || 0));
    if (ce.myRole === "builder") return _vtNet * _builderShare;
    // 自 v229 修正：移除多除的 me.ratio/landlordTotal 項。
    //   根因：vt_announcedAuto（容移公告總值）從一開始就已經是「myRole自己的持分」加總
    //   （不是全體地主加總的池子），容積移轉是這位地主自己的土地決定，只需要跟建商分
    //   （依 builderShareRatio），不該再拿「自己在全體地主裡的佔比」重新切一次，
    //   否則會把「已經是自己的錢」再稀釋一次，造成嚴重低估（例如大橋案案例低估到只剩1/4）。
    if (ce.myRole && ce.myRole.startsWith("owner_")) {
      return _vtNet * (1 - _builderShare);
    }
    if (ce.myRole && ce.myRole.startsWith("group_")) {
      return _vtNet * (1 - _builderShare);
    }
    return 0;
  })();

  // 合併同年現金流 (給 IRR/NPV 用)
  const cfByYear = {};
  cashflows.forEach(c => { cfByYear[c.year] = (cfByYear[c.year] || 0) + c.value; });
  const yearKeys = Object.keys(cfByYear).map(k => parseInt(k,10)).sort((a,b) => a-b);
  const cfList = yearKeys.map(y => ({ year: y, value: cfByYear[y] }));

  // 年度收入/支出彙整 (給 T3 用)
  // 自 v144: 合建提供土地非現金支出 → 預設抽離土地 (landPurchased=true 即購地案才計入現金流顯示)
  //          IRR 仍用含土地的 cfList (不跟現金流顯示走, 維持機會成本報酬率意義)
  const _landInCashflow = !!t8.landPurchased;
  const cfByYearDetail = {};
  cashflows.forEach(c => {
    if (c.category === "land" && !_landInCashflow) return;  // 非購地: 土地抽離現金流明細
    const y = c.year;
    if (!cfByYearDetail[y]) cfByYearDetail[y] = { year: y, income: 0, expense: 0, byCat: {} };
    if (c.value >= 0) cfByYearDetail[y].income += c.value;
    else cfByYearDetail[y].expense += -c.value;  // 存正值
    cfByYearDetail[y].byCat[c.category] = (cfByYearDetail[y].byCat[c.category] || 0) + c.value;
  });
  // 確保所有年度都有列 (即使該年被抽離土地後無其他流量)
  yearKeys.forEach(y => { if (!cfByYearDetail[y]) cfByYearDetail[y] = { year: y, income: 0, expense: 0, byCat: {} }; });
  let runningCum = 0;
  const cfDetailedList = yearKeys.map(y => {
    const d = cfByYearDetail[y];
    const net = d.income - d.expense;
    runningCum += net;
    return { ...d, net, cum: runningCum };
  });

  // ─── 現金流彈性指標 ───
  // 1. 早期回收率 (10 年): 前 10 年累計現金流入 / 總投入
  //    反映「投入後 10 年內能拿回多少 %」
  // 2. 現金流多樣性: 1 - 最大收入源佔比 (0~1, 越高越分散越穩健)
  const totalInvested = burdenCost + ll + cl + landInvest;  // 總投入分母 (自 v127: 含地主土地)
  const firstYear = cfList.length > 0 ? cfList[0].year : 0;
  // 計算前 10 年累計現金流入 (只計正流入, 不抵負流出)
  let earlyRecovery10 = null;
  if (totalInvested > 0) {
    const cutoffYear = firstYear + 10 - 1;
    let cumIncome = 0;
    cfDetailedList.forEach(d => {
      if (d.year <= cutoffYear) cumIncome += d.income;  // d.income 已是正值
    });
    earlyRecovery10 = cumIncome / totalInvested;
  }

  // 現金流多樣性: 依 byCat 統計各類別總收入佔比
  // 類別: dev_sales, disposal, rent, business (只看收入面, 不算成本/稅)
  const incomeCats = { dev_sales: 0, disposal: 0, rent: 0, business: 0 };
  cfDetailedList.forEach(d => {
    Object.keys(d.byCat || {}).forEach(cat => {
      const v = d.byCat[cat];
      if (v > 0 && incomeCats.hasOwnProperty(cat)) incomeCats[cat] += v;
    });
  });
  const totalIncomeAll = Object.values(incomeCats).reduce((a, b) => a + b, 0);
  let cashflowDiversity = 0;
  if (totalIncomeAll > 0) {
    const maxShare = Math.max(...Object.values(incomeCats)) / totalIncomeAll;
    cashflowDiversity = 1 - maxShare;  // 0 = 全部來自單一來源, 越接近 1 越分散
  }

  // IRR
  const irr = calcIRR(cfList);
  // NPV
  const npv = cfList.reduce((sum, c) => sum + c.value / Math.pow(1+r, c.year - cfList[0].year), 0);
  // 回收年限
  let payback = null;
  let cum = 0;
  for (const c of cfList) {
    const newCum = cum + c.value;
    if (cum < 0 && newCum >= 0) {
      payback = c.year + (cum < 0 ? -cum / c.value : 0);
      break;
    }
    cum = newCum;
  }

  // 總損益 — 依「分析模式」決定 (處分損益 vs 完整持有)
  //   analysisMode = "disposal":   只計處分收益 (不含營業/租金) - 預設, 與經營分析一致
  //   analysisMode = "holdComplete": 含營業/租金 (整體效益)
  let totalProfit;
  let devOnlyProfit;  // 純開發評估: 不含租金/營業 (永遠存在, 供臨界點分析)
  let fullProfit;     // 完整持有: 含租金/營業 (永遠存在, 供完整比較)
  if (ce.mode === "single") {
    fullProfit = devPAT + holdNet;
    devOnlyProfit = fullProfit;  // single 模式沒有長期收益, 兩者相同
  } else {
    // 自 v126: longHold 修正 — pd_sumNetProfit 已含完整成本分攤 (含土增稅/契稅)、土地、房地合一稅,
    //   不再 −burdenCost / −devLVT / −devDeed (原公式重複扣成本, 導致建商綜合淨利變大負數)
    //   devOnlyProfit = 已處分部分淨利; fullProfit = 處分淨利 + 租金 + 營業 (holdNet)
    const lh = ce.longHold;
    const dispOnlyNet = lh ? (lh.pd_sumNetProfit || 0) : 0;
    devOnlyProfit = dispOnlyNet;
    fullProfit = holdNet;  // = pd_sumNetProfit + rent.total + business.total
  }
  // 依模式選 totalProfit
  totalProfit = _includeHoldIncome ? fullProfit : devOnlyProfit;
  // 自 v66: 公保地容移; 自 v83: 廢棄 includeInT8, 容移啟用即自動計入 totalProfit
  // 自 v221 修正：移除無條件疊加。根因：totalProfit 是全系統核心輸出，被最優方案模擬器、
  //   出資比較、敏感度分析、投資報告、Excel匯出等 10+ 處下游消費，只要全域容移開關打開，
  //   這些全部會被無條件疊加容移收益，無法單獨排除，形成資料汙染。
  //   改法：totalProfit 永遠是「不含容移」的乾淨值；容移效果改由獨立的 calcVolTransferScenario()
  //   函式讀取（沿用 ce.volTransfer 這個既有的獨立子物件，計算公式不變），
  //   只有使用者在損益分析主動勾選「容積移轉情境模擬」才會看到疊加後的數字。
  let volTransferIncluded = 0;
  if (ce.volTransfer && ce.volTransfer.enabled) {
    volTransferIncluded = ce.volTransfer.netProfit || 0;
    // 不再 totalProfit += volTransferIncluded；僅保留變數供下方回傳值向下相容顯示用
  }

  // 自 v127: 分母計入地主土地投入 (建商 landInvest=0, 不影響)
  const roi = (burdenCost + ll + cl + landInvest) > 0 ? totalProfit / (burdenCost + ll + cl + landInvest) : 0;
  const roe = (eq + landInvest) > 0 ? totalProfit / (eq + landInvest) : 0;

  // Cap Rate / 營業收益率
  // 分母 = 處分總價值 (Σ 每筆處分面積 × 處分時售價)
  // 分子 = 年化 (rent.annual, business.annual)
  let capRate = null;
  let businessYieldRate = null;
  if (ce.mode === "longHold") {
    const lh = ce.longHold;
    // 計算處分總價值 (用每筆處分的 area × 該筆售價)
    // 處分價來源: 手動 disposal.price 或 自動建議價 (suggestedPrice)
    const dispTotalValue = (cb.disposals || []).reduce((sum, d) => {
      if (!d.enabled) return sum;
      const area = Number(d.area) || 0;
      // 用 disposal 已執行的售價 (手動 or 自動建議)
      const price = d.useSuggested ? (d._calcPrice || 0) : (Number(d.price) || 0);
      return sum + area * price;
    }, 0);
    // 若計算不到, fallback 用 myArea × uP
    const propValue = dispTotalValue > 0 ? dispTotalValue : (ce.myArea * p.uP);
    if (propValue > 0) {
      const annualRent = lh.rent.annual || 0;
      const annualBusiness = lh.business.annual || 0;
      if (annualRent > 0) capRate = annualRent / propValue;
      if (annualBusiness > 0) businessYieldRate = annualBusiness / propValue;
    }
  }

  // ─── 機會成本 / 經濟利潤 ───
  // 機會成本 = 投入資金 × 資金成本率 × 投資年期 (自 v127: 地主投入含土地)
  const capitalCostRate = (Number(t8.capitalCostRate) || 0) / 100;
  const investYears = Math.max(1, holdEndYear - devStartYear + 1);
  const _eqBase = eq + landInvest;
  const opportunityCost = _eqBase * capitalCostRate * investYears;
  const economicProfit = totalProfit - opportunityCost;
  const economicROE = _eqBase > 0 ? economicProfit / _eqBase : 0;

  return {
    ce, cb,
    devStartYear, devEndYear, holdEndYear,
    salesRev, burdenCost, devPAT, devPBT, devTax, devLVT, devDeed,
    holdRevenue, holdCost, holdTax, holdNet,
    totalProfit, devOnlyProfit, fullProfit, analysisMode, totalInvest, eq, ll, cl, landInvest,
    investBase, discountRate: r,
    irr, npv, payback, roi, roe, capRate, businessYieldRate,
    capitalCostRate, opportunityCost, economicProfit, economicROE, investYears,
    cashflows: cfList,
    cashflowsDetailed: cfDetailedList,
    // 現金流彈性指標
    earlyRecovery10, cashflowDiversity,
    // 自 v66: 容移計入金額 (0 = 未啟用或未勾選計入)
    volTransferIncluded,
    // 自 v225: 容移「我的份」分潤（依角色比例，未注入cashflows，供calcVolTransferScenario精確使用）
    vtMyShare: _vtMyShare
  };
}

// 自 v94: 抽出策略定義 helper (給 calcT8Scenarios 與 calcIntegratedMatrix 共用)
function makeScenarioDefs(p) {
  const cb = p.compBenefit || {};
  const rentMonthly = (cb.rent && Number(cb.rent.monthlyRent)) || 0;
  const bizMonthly = (cb.business && Number(cb.business.perfPerPing)) || 0;
  const baseStartY = (cb.rent && cb.rent.startYear) || (cb.business && cb.business.startYear) || 0;
  // 自 v121: 情境共用處分售價 — 各筆 disposal 若 price<=0, 用共用售價補上 (全處分/半半才有意義)
  const _scenDP = Number(cb.scenDisposalPrice) || 0;
  // 自 v125/126: 空筆 fallback (釐清D=乙) — 無處分筆時用「完工即售全部」(100% at 有效交屋日)
  const _eh = effHandoverDate(p);
  const _baseDisposals = (cb.disposals && cb.disposals.length > 0)
    ? cb.disposals
    : [{ id: "__autofull__", label: "完工即售 (全部)", areaMode: "ratio", areaPct: 100, year: _eh.year, month: _eh.month, price: 0, enabled: true }];
  const _withPrice = (d) => ({...d, price: (Number(d.price) > 0 ? Number(d.price) : _scenDP)});
  // 自 v125: 縮放面積 — ratio 模式縮 areaPct, fixed 模式縮 area
  const _scaleArea = (d, k) => d.areaMode === "ratio"
    ? ({...d, areaPct: (Number(d.areaPct)||0) * k})
    : ({...d, area: (Number(d.area)||0) * k});
  // 自 v149: 全處分/半半 改為「不限類型」單一合成處分筆 (不複製基準 catKey, 避免被類型過濾)
  //   — 移除 catKey → 涵蓋全部類型 (價值導向走 分回總銷×比例%);
  //   — 保留基準「首筆」的處分日期/售價, 維持持有期與稅率不變 (與原本數字一致);
  //   — 強制 areaPct 100%(全) / 50%(半).
  const _firstDisp = (cb.disposals && cb.disposals.length > 0) ? cb.disposals[0] : null;
  const _allYear  = _firstDisp && _firstDisp.year  ? _firstDisp.year  : _eh.year;
  const _allMonth = _firstDisp && _firstDisp.month ? _firstDisp.month : _eh.month;
  const _allPrice = _firstDisp && Number(_firstDisp.price) > 0 ? Number(_firstDisp.price) : _scenDP;
  const _mkAllDisp = (pct, idLabel) => ([{ id: idLabel, label: idLabel, areaMode: "ratio", areaPct: pct, catKey: "", year: _allYear, month: _allMonth, price: _allPrice, enabled: true }]);
  const disposalsAll = _mkAllDisp(100, "全部處分");
  const disposalsNone = _baseDisposals.map(d => ({...d, enabled: false}));
  const disposalsHalf = _mkAllDisp(50, "半處分");

  const makeCustomOverride = (cs) => {
    const dispPct = Math.max(0, Math.min(100, Number(cs.disposalPct)||0));
    const rentPct = Math.max(0, Math.min(100, Number(cs.rentPct)||0));
    const bizPct = Math.max(0, Math.min(100, Number(cs.businessPct)||0));
    const holdY = Math.max(0, Number(cs.holdYears)||0);
    const dispScale = dispPct / 100;
    const disposalsCustom = _baseDisposals.map(d => _withPrice({..._scaleArea(d, dispScale), enabled: dispPct > 0}));
    return {
      mode: "longHold",
      holdYears: holdY,
      disposals: disposalsCustom,
      rent: { ...(cb.rent||{}), enabled: rentPct > 0, areaPct: rentPct, areaInput: 0, monthlyRent: rentMonthly, startYear: baseStartY, endYear: baseStartY + holdY },
      business: { ...(cb.business||{}), enabled: bizPct > 0, areaPct: bizPct, areaInput: 0, perfPerPing: bizMonthly, startYear: baseStartY, endYear: baseStartY + holdY }
    };
  };

  // 自 v148: 移除原「A 基準情境」(=p.compBenefit 直接當情境, 與全處分意義重疊且帶類型選擇器易混淆)
  //          全處分順移為 A, 其餘順移 (B 全長租 / C 全自營 / D 半半)
  //          p.compBenefit 仍是「經營行為共用參數 + 自訂情境範本」, 可編輯, 只是不再單獨當一個比較情境
  const defs = [
    { id: "A", label: "全處分", override: { mode: "longHold", holdYears: 0, disposals: disposalsAll, rent: { ...(cb.rent||{}), enabled: false }, business: { ...(cb.business||{}), enabled: false } } },
    { id: "B", label: "全長租 (10y)", override: { mode: "longHold", holdYears: 10, disposals: disposalsNone, rent: { ...(cb.rent||{}), enabled: true, areaPct: 100, areaInput: 0, monthlyRent: rentMonthly, startYear: baseStartY, endYear: baseStartY + 10 }, business: { ...(cb.business||{}), enabled: false } } },
    { id: "C", label: "全自營 (10y)", override: { mode: "longHold", holdYears: 10, disposals: disposalsNone, rent: { ...(cb.rent||{}), enabled: false }, business: { ...(cb.business||{}), enabled: true, areaPct: 100, areaInput: 0, perfPerPing: bizMonthly, startYear: baseStartY, endYear: baseStartY + 10 } } },
    { id: "D", label: "半半 (5y)", override: { mode: "longHold", holdYears: 5, disposals: disposalsHalf, rent: { ...(cb.rent||{}), enabled: true, areaPct: 50, areaInput: 0, monthlyRent: rentMonthly, startYear: baseStartY, endYear: baseStartY + 5 }, business: { ...(cb.business||{}), enabled: false } } }
  ];
  // 自 v226: 情境E(純售地)/F(容積移轉) — 只在使用者於 CompBenefitDialog 啟用對應開關時才出現，
  //   不需要標準的 compBenefit override（架構上跟A/B/C/D不同源，走 calcPureLandSaleScenario/
  //   calcVolTransferScenario 各自獨立計算，不會反過來污染A/B/C/D，因為A/B/C/D的override
  //   從不提及pureLandSale/volTransfer這兩個欄位，calcT8Snapshot核心也從未讀取它們）。
  //   isSpecial 標記讓消費端（情境收益表格/calcOptimizer）知道要走特殊計算路徑，不能直接呼叫
  //   calcT8Snapshot(p,dr,override)。
  if (cb.pureLandSale && cb.pureLandSale.enabled) {
    defs.push({ id: "E", label: "純售地", isSpecial: "pureLandSale", override: null });
  }
  if (cb.volTransfer && cb.volTransfer.enabled) {
    defs.push({ id: "F", label: "容積移轉", isSpecial: "volTransfer", override: null });
  }
  (cb.customScenarios || []).forEach(cs => {
    // 自 v108: 自訂情境支援「完整結構」(cs._full) 與「舊百分比結構」兩種
    let override;
    if (cs._full) {
      // 完整結構: 直接用儲存的 disposals/rent/business
      override = {
        mode: "longHold",
        holdYears: Math.max(0, Number(cs.holdYears)||0),
        disposals: (cs.disposals || []).map(d => ({...d})),
        rent:     { ...(cs.rent || {}) },
        business: { ...(cs.business || {}) }
      };
      // 全域參數覆寫 (繼承基準情境, 有覆寫才套用)
      if (cs.overrides && typeof cs.overrides === "object") {
        Object.assign(override, cs.overrides);
      }
    } else {
      // 舊百分比結構 (向下相容, 理論上 migrate 已轉換)
      override = makeCustomOverride(cs);
    }
    defs.push({
      id: "custom_" + cs.id,
      label: cs.label || `自訂 ${cs.id}`,
      isCustom: true,
      override
    });
  });
  return defs;
}

// 自 v92: 自動生成五個情境 (A 當前 / B 全處分 / C 全長租 / D 全自營 / E 半處分半長租)
// 自 v93: 擴展支援自訂情境 + 每個 role (builder/各 owners) 各跑一次
function calcT8Scenarios(p, dr) {
  const scenarioDefs = makeScenarioDefs(p);

  // 全 role 清單 (builder + 各 owners + 各選配群組)
  const allRoles = [
    { key: "builder", label: "建商" },
    ...((p.owners||[]).map(o => ({ key: "owner_"+o.id, label: o.name || ("地主"+o.id) }))),
    // 自 v121: 選配群組視角 (A+B 合併)
    ...((p.selectGroups||[]).map(g => ({ key: "group_"+g.id, label: g.name || "群組" })))
  ];

  // 對每情境 × 每 role 跑一次 calcT8Snapshot
  const result = {};
  scenarioDefs.forEach(sc => {
    const byRole = {};
    allRoles.forEach(r => {
      const tempP = { ...p, myRole: r.key };
      byRole[r.key] = calcT8Snapshot(tempP, dr, sc.override);
    });
    // 「我的視角」作為總覽用 (spread 到頂層, 保留 v92 介面 scenarios.A.totalProfit)
    const myKey = p.myRole || "builder";
    const mySnapshot = byRole[myKey] || byRole["builder"];
    result[sc.id] = {
      ...mySnapshot,
      label: sc.label,
      isCustom: !!sc.isCustom,
      byRole,
      roles: allRoles
    };
  });
  return result;
}

// 自 v194: 出資與否決策指標 — 逐個地主比較「出資」vs「純合建」兩種情境的財務指標
//   出資情境：finalRatio = farPct（容積滿額），costBearing = farPct（拿多少面積就承擔多少全成本）
//   純合建情境：finalRatio = pureJbRatio（容積×合建比），costBearing = 0（不額外承擔）
//   重用 calcJbDistribution 算面積比例，重建臨時 p 物件後跑 calcDerived+calcT8Snapshot 取得財務指標
function calcInvestComparison(p, dr, opts) {
  const o = Object.assign({ horizon: 20, reinvestRate: 0.015, metric: "irr" }, opts || {});
  if (!p.jb) return { skipped: true, reason: "notJb" };
  const owners = (p.owners || []).filter(ow => {
    // 只比較有持分的地主（無持分的地主出資與否沒有意義）
    return (p.ownerHoldings || []).some(h => String(h.ownerId) === String(ow.id));
  });
  if (owners.length === 0) return { skipped: true, reason: "noLandlord" };

  const jbDist = calcJbDistribution(p, dr, {});
  const jbLandShare = jbDist.jbLandShare;

  // 建構「指定地主為 invest=X，其餘維持原狀」的臨時 p 物件，回傳 totalProfit/irr/mirr/roi
  const evalScenario = (ownerId, investFlag) => {
    const newOwners = p.owners.map(ow => {
      if (ow.id !== ownerId) return ow;
      const entry = jbDist.entries.find(e => e.ownerId === ow.id);
      const farPct = entry ? entry.farPct : 0;
      const finalRatio = investFlag ? farPct : (entry ? entry.pureJbRatio : 0);
      const costBearing = investFlag
        ? { de: farPct, co: farPct, ad: farPct, tx: farPct, mg: farPct, am: farPct, it: farPct }
        : { de: 0, co: 0, ad: 0, tx: 0, mg: 0, am: 0, it: 0 };
      return { ...ow, invest: investFlag, ratio: finalRatio, costBearing };
    });
    const pPrime = { ...p, owners: newOwners, myRole: "owner_" + ownerId };
    const drPrime = calcDerived(pPrime);
    const snap = calcT8Snapshot(pPrime, drPrime);
    return {
      totalProfit: snap.totalProfit, irr: snap.irr, mirr: snap.mirr,
      roi: snap.roi, ratio: investFlag
        ? (jbDist.entries.find(e => e.ownerId === ownerId)?.farPct || 0)
        : (jbDist.entries.find(e => e.ownerId === ownerId)?.pureJbRatio || 0)
    };
  };

  const scoreOf = (r) => {
    if (o.metric === "roi")       return r.roi;
    if (o.metric === "irr")       return r.irr == null ? -99 : r.irr;
    if (o.metric === "netProfit") return r.totalProfit;
    return r.mirr;  // 預設 mirr
  };

  const results = owners.map(ow => {
    const withInvest = evalScenario(ow.id, true);
    const without    = evalScenario(ow.id, false);
    const better = scoreOf(withInvest) >= scoreOf(without) ? "invest" : "noInvest";
    return { ownerId: ow.id, name: ow.name, currentInvest: !!ow.invest, withInvest, without, better };
  });

  return { results, jbLandShare, horizon: o.horizon, metric: o.metric };
}

// 自 v150 (階段1): 最優方案模擬器 — 在 20 年限制內找出 全售/全租/全營/混合 的最優解
//   • 決策單位: 每房屋類型 → 出售/長租/自營; 車位預設只能出售
//   • MIRR 修正 IRR 偏誤: 早賣現金與租金以「再投資率」複利到出場年
//   • 搜尋最佳出場年 (0~horizon)
//   • 重用 calcCompBenefit 取各類型 base 收入/成本/土地 (稅務一致)
function calcOptimizer(p, dr, opts) {
  const o = Object.assign({ horizon: 20, reinvestRate: 0.015, metric: "irr" }, opts || {});
  const cb = p.compBenefit || {};
  const sm = dr.salesMix || {};
  const houseCats = [
    { key: "res", label: sm.res?.label || "住宅", uP: Number(sm.res?.uP) || 0 },
    { key: "retail", label: sm.retail?.label || "店面", uP: Number(sm.retail?.uP) || 0 },
    { key: "office", label: sm.office?.label || "廠辦", uP: Number(sm.office?.uP) || 0 },
    ...(sm.customCategories || []).map(c => ({ key: c.id, label: c.label, uP: Number(c.uP) || 0 }))
  ];
  const eh = (p.salesSched && p.salesSched.length) ? p.salesSched[p.salesSched.length - 1] : { year: 2028, month: 6 };
  // 自 v155 (根因②): 直接錨定主系統「全處分情境 (scenario A)」— 不再自組探針/base快照, 避免 value-based(比例)群組重建分歧。
  //   scenario A override = makeScenarioDefs 產出的全處分定義 (mode:longHold, holdYears:0, disposals:100% catKey="", rent/biz off)。
  //   snap / 探針 / 售出時點 全部改用此 override → 全部出售 IRR = 主系統全處分 IRR (同函式同override同視角, 必然相等)。
  const _defs = makeScenarioDefs(p);
  const _scA = (_defs || []).find(d => d.id === "A") || null;
  const _scaOverride = _scA ? _scA.override : null;
  const _scaDisp0 = (_scaOverride && _scaOverride.disposals && _scaOverride.disposals[0]) ? _scaOverride.disposals[0] : null;
  const _baseDisp0 = (cb.disposals && cb.disposals.length) ? cb.disposals[0] : null;
  // 處分年/月 = scenario A 的處分時點 (= 主系統全處分用的 dispYear), fallback base首筆 / eh
  const _dispYear = (_scaDisp0 && Number(_scaDisp0.year)) ? Number(_scaDisp0.year)
                  : (_baseDisp0 && Number(_baseDisp0.year)) ? Number(_baseDisp0.year) : eh.year;
  const _dispMonth = (_scaDisp0 && Number(_scaDisp0.month)) ? Number(_scaDisp0.month) : eh.month;
  const appRate = (Number(cb.landAppRate) || 0) / 100, depRate = (Number(cb.buildingDepRate) || 0) / 100;
  const bRatio = Math.max(0, Math.min(100, Number(cb.buildingRatio) || 45)) / 100, lRatio = 1 - bRatio;
  const apprFactor = (Y) => bRatio * Math.pow(1 - depRate, Y) + lRatio * Math.pow(1 + appRate, Y);
  // 自 v155 (根因②): 全處分探針 = scenario A override (與主系統全處分完全相同); fallback 自組 (catKey="" 100% @dispYear)
  const fullProbe = _scaOverride
