// 讀取 CSV 檔: UTF-8 (含 BOM) 優先, 失敗回退 Big5 (Excel/Windows 預設)
async function readCsvText(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  try {
    return new TextDecoder("utf-8", {fatal:true}).decode(bytes);
  } catch {
    return new TextDecoder("big5").decode(bytes);
  }
}

function parseCSV(text) {
  if (!text) return [];
  // 去除 BOM
  text = text.replace(/^\uFEFF/, "");
  // 切行 (支援 \r\n 與 \n), 去除空行
  const lines = text.split(/\r\n|\n|\r/).filter(l => l.trim() !== "");
  if (lines.length < 2) return [];
  // 解析單行 (支援引號包覆的逗號)
  const parseLine = (line) => {
    const result = [];
    let cur = "", inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === "," && !inQuote) {
        result.push(cur.trim()); cur = "";
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  };
  const headers = parseLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = parseLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = cells[idx] !== undefined ? cells[idx] : ""; });
    rows.push(obj);
  }
  return rows;
}

/* ════════════════════════════════════════
   面積精算 (移植自 面積計算表_v3)
   全程以「坪」為單位
   每個中間結果都支援 ac.manualOverride[key] 手動覆寫
═══════════════════════════════════════ */
function calcAreas(p) {
  const ac = p.areaCalc || {};
  const lands = p.lands || [];
  const mo = ac.manualOverride || {};
  /* 取覆寫值；若為 null/undefined 則回退到 auto */
  const ov = (k, auto) => {
    const v = mo[k];
    return (v === undefined || v === null || v === "") ? auto : Number(v);
  };

  /* zone 預設值 (作為土地清冊建蔽率/容積率的繼承基準, 已從 lands 取代 p.farVal/p.bcVal) */
  // 自 v41 起: 廢除 p.farVal/p.bcVal 全案級覆寫, 改用 lands 加權
  // 若 land.bcr/far 為 null → 用該 land 自己的 city/zone 查 ZDB 標準值
  const zi = gzi(p.city, p.zone);
  // 全案級 zoneBCR/zoneFAR 改為「lands 加權」(供下游 baseFAR/effectiveBC 使用)
  // 若 land.bcr/far = null, 用該 land 自己的 city/zone 查 ZDB (而非用 p.farVal)
  // 公設保留地 (isNonBuildable=true) 視為 0% (仍計入分母)

  // ─── 1. 基地面積合計 (m² ↔ 坪 同步; 以 area 坪為計算基準) ───
  const site_total_auto = lands.reduce((s, l) => s + (l.area||0), 0);
  const site_total_m2_auto = lands.reduce((s, l) => s + (l.m2||0), 0);
  const site_total = ov("site_total", site_total_auto);
  const site_total_m2 = site_total_m2_auto;

  // ─── 2. 允建建築面積 (建蔽率) — 每筆 land 用自己的 zone, 公設保留地視為 0 ───
  //       注意單位: land.bcr 是「百分比整數」(0~100), zi.b 是「倍數」(0~1)
  let bcr_total_std = 0;
  const bcrRows = lands.map(l => {
    if (l.isNonBuildable) {
      return {name:l.name, area:l.area, bcr:0, inherited:false, result:0, nonBuildable:true};
    }
    const landZi = gzi(l.city || p.city, l.zone || p.zone);
    const inheritBCR = (landZi.b || 0) * 100;  // 倍數 → %
    const effBCR = (l.bcr === null || l.bcr === undefined || l.bcr === "") ? inheritBCR : l.bcr;  // l.bcr 已是 %
    const r = (l.area||0) * (effBCR/100);
    bcr_total_std += r;
    return {name:l.name, area:l.area, bcr:effBCR, inherited:(l.bcr===null||l.bcr===undefined||l.bcr===""), result:r};
  });
  const avg_bcr = site_total > 0 ? bcr_total_std / site_total : 0;
  const origResult = (ac.origCapArea||0) * (ac.origCapMult||1.2);
  const bcr_total = ov("bcr_total", ac.useOrigCap ? origResult : bcr_total_std);

  // ─── 3. 基準容積 FA — 每筆 land 用自己的 zone, 公設保留地視為 0 ───
  //       注意單位: land.far 是「百分比整數」(0~1000+), zi.f 是「倍數」(0~10)
  let fa_total_auto = 0;
  const farRows = lands.map(l => {
    if (l.isNonBuildable) {
      return {name:l.name, area:l.area, far:0, inherited:false, result:0, nonBuildable:true};
    }
    const landZi = gzi(l.city || p.city, l.zone || p.zone);
    const inheritFAR = (landZi.f || 0) * 100;  // 倍數 → %
    const effFAR = (l.far === null || l.far === undefined || l.far === "") ? inheritFAR : l.far;  // l.far 已是 %
    const r = (l.area||0) * (effFAR/100);
    fa_total_auto += r;
    return {name:l.name, area:l.area, far:effFAR, inherited:(l.far===null||l.far===undefined||l.far===""), result:r};
  });
  const fa_total = ov("fa_total", fa_total_auto);
  const avg_far = site_total > 0 ? fa_total / site_total : 0;

  // 全案級 zoneBCR/zoneFAR (用於下游需要單一值的地方, 例如建築規劃的「繼承顯示」)
  // 改為 lands 加權 (avg_bcr / avg_far 已是加權結果)
  const zoneBCR = avg_bcr;  // 來自 lands 加權, %
  const zoneFAR = avg_far;  // 來自 lands 加權, %

  // ─── 4. 容積獎勵 (階層化：父項 % = Σ 子項 %) ───
  /* 先計算每個父項的「子項加總」，作為該父項的有效 % */
  const childSum = {};   // {parentKey: Σ子項%}
  BI.forEach(c => {
    if (!c.parent) return;
    if (!p.bo[c.k]) return;          // 子項未勾選
    if (!p.bo[c.parent]) return;     // 父項未勾選 → 子項視為無效
    const pct = (p.bop && p.bop[c.k] !== undefined && p.bop[c.k] !== null) ? Number(p.bop[c.k]) : c.mx;
    childSum[c.parent] = (childSum[c.parent] || 0) + pct;
  });

  /* effPct(item): 該項目對 FA 的有效獎勵 %
     - 父項 (parent==null): 若有任何子項勾選 → 用子項加總; 否則用使用者輸入或上限
     - 子項: 直接用該子項的 % (顯示用，但合計 bp 時不重複加，僅透過父項) */
  const effPctOfParent = (it) => {
    if (childSum[it.k] !== undefined) return childSum[it.k];
    return (p.bop && p.bop[it.k] !== undefined && p.bop[it.k] !== null) ? Number(p.bop[it.k]) : it.mx;
  };

  const allBonus = [];
  let isKaohsiungOn = false;
  let kh_bonus_pct = 0;
  BI.forEach(i => {
    if (!p.bo[i.k]) return;
    if (i.special === "kh") { isKaohsiungOn = true; return; }
    if (i.parent) return;            // 子項不獨立計入 bp; 顯示用透過父項
    const pct = effPctOfParent(i);
    const hasChildren = childSum[i.k] !== undefined;
    allBonus.push({src:"BI", key:i.k, name:i.l.trim(), pct, isTOD:!!i.isTOD, parent:null, hasChildren});
  });
  (p.bonusCustom||[]).forEach(c => {
    if (!c) return;
    allBonus.push({src:"custom", id:c.id, name:c.name||"自訂獎勵", pct:Number(c.pct)||0, isTOD:!!c.isTOD});
  });
  let bonus_total_auto = 0, tod_total_auto = 0, bonus_pct = 0;
  const bonusRows = allBonus.map(b => {
    const r = fa_total * (b.pct/100);
    bonus_total_auto += r;
    if (b.isTOD) tod_total_auto += r;
    bonus_pct += b.pct;
    return {...b, result:r};
  });
  const bonus_total = ov("bonus_total", bonus_total_auto);
  const tod_total = ov("tod_total", tod_total_auto);

  // ─── 5. 允建容積合計 Σ FA ───
  const sigma_fa = ov("sigma_fa", fa_total + bonus_total);

  // ─── 6. 機電 162條 ───
  const mech_base = fa_total + tod_total;
  const mech = ov("mech", mech_base * 0.15);

  // ─── 7. 梯廳 ───
  const elevator = ov("elevator", (sigma_fa + mech) / 0.93 * 0.07);
  const above_struct = sigma_fa + mech + elevator;

  // ─── 8. 陽台 (8%) ───
  const balcony = ov("balcony", above_struct * 0.08);
  const afloors = Math.max(1, ac.aboveFloors||1);
  const balcony_per_floor = balcony / afloors;

  // ─── 9. 高雄厝 (從 BI 勾選驅動，預設 12.5% / 2% 兩個子項) ───
  // 高雄厝 % 拆分: 12.5% 景觀 + 2% 通用 = 14.5%，但使用者可調整 kh_bonus_pct 表示總額
  // 採簡化策略：勾選後固定 12.5% 與 2%，並用 kh_bonus_pct 做 FA × pct 加值 (使用者可改)
  let kh_a = 0, kh_b = 0;
  if (isKaohsiungOn) {
    kh_a = above_struct * 0.125 - (ac.noViewBalcony||0);
    if (kh_a < 0) kh_a = 0;
    kh_b = fa_total * 0.02;
  }
  kh_a = ov("kh_a", kh_a);
  kh_b = ov("kh_b", kh_b);
  const kh_total = kh_a + kh_b;

  // ─── 10. 屋頂突出物 ───
  const rooftop = ov("rooftop", bcr_total * 0.15 * 3);

  // ─── 地上層合計 ───
  const above_total = ov("above_total", sigma_fa + mech + elevator + balcony + kh_a + kh_b + rooftop);

  // ─── 11. 地下室開挖 ───
  const drill_ratio_auto = (1 + avg_bcr) / 2;
  const drill_ratio = ov("drill_ratio", drill_ratio_auto);
  const bFloors = Math.max(0, ac.basementFloors||0);
  const basement = ov("basement", site_total * drill_ratio * bFloors);

  // ─── 12. 總樓地板 ───
  const total_floor = ov("total_floor", above_total + basement);

  // ─── 13. 車位面積 ───
  // 透天: 44 m² ≈ 13.31 坪/位
  const M2_TO_PING = 0.3025;
  const parkArea_per_auto = ac.townhouse ? (44 * M2_TO_PING) : (ac.parkingPerUnitArea || 8.5);
  const parking_area = ov("parking_area", (p.parking||0) * parkArea_per_auto);

  // ─── 14. 地下室可銷 ───
  // 一般:           地下可銷 = 地下室 − 車位
  // 透天:           地下可銷 = 0 (不計入 ⑮; 仍保留欄位供使用者參考)
  // 透天+車位納可銷: 地下可銷 = 地下室全部 (車位算入)
  let bsmt_sale_auto;
  if (ac.townhouse) {
    bsmt_sale_auto = ac.townhouseInSalable ? basement : 0;
  } else {
    bsmt_sale_auto = basement - parking_area;
  }
  const bsmt_sale = ov("bsmt_sale", bsmt_sale_auto);

  // ─── 15. 總銷面積 ───
  // 一般: 地上層 + 地下可銷
  // 透天: 地上層 + ⑬ 車位 (地下可銷不加)
  let total_sale_auto;
  if (ac.townhouse) {
    total_sale_auto = above_total + parking_area;
  } else {
    total_sale_auto = above_total + bsmt_sale;
  }
  const total_sale = ov("total_sale", total_sale_auto);

  // ─── 公設比預估 ───
  const pub_above = mech + elevator + rooftop;
  const pub1_tot = pub_above + bsmt_sale;
  const ratio1 = total_sale > 0 ? pub1_tot / total_sale : 0;
  const xtra = ac.extraFacility || 0;
  const pub2_tot = pub_above + xtra + bsmt_sale;
  const ratio2 = total_sale > 0 ? pub2_tot / total_sale : 0;

  // ─── 戶數反算 ───
  const ua = ac.unitArea || 1;
  const units_calc = total_sale / ua;
  const units_floor = Math.floor(units_calc);

  // ─── 停車計算 (法定) ───
  const p_base = sigma_fa + mech + elevator;
  const pa_raw = (p_base - 500) / 150;
  const pa_ceil = Math.max(0, Math.ceil(pa_raw));
  const pb_ceil = Math.ceil(pa_ceil / 50);
  const pc_raw = p_base / 100;
  const pc_ceil = Math.max(0, Math.ceil(pc_raw));
  const pu_ceil = Math.ceil(units_floor * 1.2);
  const pc_final = Math.min(pc_ceil, pu_ceil);

  return {
    zoneBCR, zoneFAR, site_total_m2,
    site_total, bcrRows, bcr_total_std, bcr_total, avg_bcr,
    farRows, fa_total_auto, fa_total, avg_far,
    allBonus, bonusRows, bonus_total, tod_total, bonus_pct, childSum,
    sigma_fa, mech, mech_base, elevator, above_struct,
    balcony, balcony_per_floor, afloors,
    isKaohsiungOn, kh_bonus_pct, kh_a, kh_b, kh_total,
    rooftop, above_total,
    drill_ratio, drill_ratio_auto, bFloors, basement, total_floor,
    parking_area, parkArea_per_auto, bsmt_sale, total_sale,
    pub_above, pub1_tot, ratio1, pub2_tot, ratio2,
    units_calc, units_floor,
    p_base, pa_raw, pa_ceil, pb_ceil, pc_raw, pc_ceil, pu_ceil, pc_final,
    origResult
  };
}

/* ════════════════════════════════════════
   DERIVED + SCENARIO CALCULATIONS
════════════════════════════════════════ */
function calcDerived(p) {
  const zi = gzi(p.city, p.zone);
  const totalLandArea = p.lands.reduce((a,l) => a + l.area, 0);
  // landValue 改用「公告總值」 = Σ (m² × 公告現值元/m²) → 元, 再 ÷10000 換成萬
  // 舊版資料若 announcedValuePerM2 = 0, 回退到 area × price (萬/坪) 作為市值估算
  const landAnnouncedTotal = p.lands.reduce((a,l) => a + (l.m2 || 0) * (l.announcedValuePerM2 || 0), 0) / 10000; // 萬
  const landMarketTotal = p.lands.reduce((a,l) => a + (l.area || 0) * (l.price || 0), 0);  // 萬 (使用者填的市值)
  // landValue 優先用「公告總值」, 若無資料則用「市值估算」
  const landValue = landAnnouncedTotal > 0 ? landAnnouncedTotal : landMarketTotal;

  /* bp (傳統 effectiveFAR 用) — 父項用子項加總；無子項勾選時用使用者輸入或上限 */
  // 先算「每個父項的子項加總」
  const childSumBP = {};
  BI.forEach(c => {
    if (!c.parent) return;
    if (!p.bo[c.k]) return;
    if (!p.bo[c.parent]) return;
    const pct = (p.bop && p.bop[c.k] !== undefined && p.bop[c.k] !== null) ? Number(p.bop[c.k]) : c.mx;
    childSumBP[c.parent] = (childSumBP[c.parent] || 0) + pct;
  });
  let bp = 0;
  BI.forEach(i => {
    if (!p.bo[i.k]) return;
    if (i.special === "kh") return;   // 高雄厝獨立處理
    if (i.parent) return;             // 子項只透過父項加，不獨立加
    const pct = childSumBP[i.k] !== undefined
      ? childSumBP[i.k]
      : ((p.bop && p.bop[i.k] !== undefined && p.bop[i.k] !== null) ? Number(p.bop[i.k]) : i.mx);
    bp += pct;
  });
  (p.bonusCustom||[]).forEach(c => { if (c && c.pct) bp += Number(c.pct)||0; });

  // 面積精算結果 (含 lands 加權的 avg_far / avg_bcr — 0~1 倍數)
  const areaResult = calcAreas(p);
  const avg_far = areaResult.avg_far || 0;  // 倍數 (0~10+)
  const avg_bcr = areaResult.avg_bcr || 0;  // 倍數 (0~1)

  // baseFAR / effectiveBC 改用 lands 加權結果 (areaResult 已算好)
  // 自 v41 起: 廢除 p.farVal/p.bcVal/p.farManual/p.bcManual 全案級覆寫
  const baseFAR = p.useOrigFAR ? p.origFAR : avg_far;  // 倍數
  const effectiveFAR = baseFAR * (1 + bp/100);
  const effectiveBC = avg_bcr;  // 倍數
  const autoArea = Math.round(totalLandArea * effectiveFAR * p.exp * 10) / 10;

  // 決定最終 totalArea: areaCalc.enable > areaAuto > areaOverride
  let totalArea;
  let areaSrc;
  if (p.areaCalc && p.areaCalc.enable && areaResult.total_sale > 0) {
    totalArea = areaResult.total_sale;
    areaSrc = "精算";
  } else if (p.areaAuto) {
    totalArea = autoArea;
    areaSrc = "粗估";
  } else {
    totalArea = p.areaOverride;
    areaSrc = "手動";
  }

  const builderRatio = p.jb ? Math.max(0, 1 - p.owners.reduce((a,o) => a + o.ratio, 0)) : 1;
  const ts = p.pip ? totalArea * p.uP : totalArea * p.uP + p.parking * p.pP;
  // 自 v57: 土增稅已整合到經營分析(七)的土地稅制, 此處保留空殼供向下相容
  const lvt = {tax: 0, dt: null};
  const deedCalc = calcDeedTax(p.deedHouseVal, p.deedType);

  /* ─── 合建分回面積/總銷 ─── */
  // 自動值 = ratio × totalArea (面積) 或 ratio × ts (總銷)
  // 若 shareOverride.builder 或 shareOverride[owner_id] 有值 → 使用覆寫
  // 總銷自動 = 覆寫面積 × 售價 (含車位邏輯比照 ts)
  const so = p.shareOverride || {};
  const calcShare = (role, key, ratio) => {
    const autoArea_ = totalArea * ratio;
    const overArea = (so[key] !== undefined && so[key] !== null && so[key] !== "") ? Number(so[key]) : null;
    const finalArea = overArea !== null ? overArea : autoArea_;
    // 總銷 = 面積 × 售價 (+車位收入 ratio 分配；若不含車位則 +parking*pP*ratio)
    const sales = p.pip ? (finalArea * p.uP)
                        : (finalArea * p.uP + p.parking * p.pP * ratio);
    return { role, key, ratio, autoArea: autoArea_, finalArea, isOverridden: overArea !== null, sales };
  };
  const shareInfo = [];
  shareInfo.push(calcShare("builder", "builder", builderRatio));
  if (p.jb) {
    p.owners.forEach(o => shareInfo.push(calcShare("owner", "owner_" + o.id, o.ratio)));
  }

  // ─── 開發期：取自費用時程（expPeriods）的起迄 ───
  // 預設: 起 = 費用時程第一筆、結束 = 最後一筆
  // 使用者可在 p.devPeriod 手動覆寫 (devPeriod.startYear/startMonth/endYear/endMonth)
  const eps = p.expPeriods || [];
  let devStartAuto = 2025*12 + 1, devEndAuto = 2028*12 + 12;
  if (eps.length > 0) {
    const sorted = [...eps].sort((a,b) => (a.year*12+a.month) - (b.year*12+b.month));
    devStartAuto = sorted[0].year*12 + sorted[0].month;
    devEndAuto = sorted[sorted.length-1].year*12 + sorted[sorted.length-1].month;
  }
  const dp = p.devPeriod || {};
  const devStartAbs = (Number(dp.startYear)>0 && Number(dp.startMonth)>0)
    ? Number(dp.startYear)*12 + Number(dp.startMonth)
    : devStartAuto;
  const devEndAbs = (Number(dp.endYear)>0 && Number(dp.endMonth)>0)
    ? Number(dp.endYear)*12 + Number(dp.endMonth)
    : devEndAuto;
  const devPeriod = {
    startAbs: devStartAbs, endAbs: devEndAbs,
    startYear: Math.floor(devStartAbs/12), startMonth: devStartAbs - Math.floor(devStartAbs/12)*12,
    endYear: Math.floor(devEndAbs/12), endMonth: devEndAbs - Math.floor(devEndAbs/12)*12,
    months: Math.max(1, devEndAbs - devStartAbs + 1),
    isAutoStart: !(Number(dp.startYear)>0 && Number(dp.startMonth)>0),
    isAutoEnd: !(Number(dp.endYear)>0 && Number(dp.endMonth)>0)
  };

  return {zi, totalLandArea, landValue, landAnnouncedTotal, landMarketTotal,
          bp, baseFAR, effectiveFAR, effectiveBC, avg_far, avg_bcr,
          autoArea, totalArea, areaSrc, areaResult,
          builderRatio, ts, lvt, deedCalc, shareInfo, childSumBP, devPeriod};
}

/* ════════════════════════════════════════
   成本項目系統 (Cost Item System)
   - 7 個標準項目 (cs.co/de/ad/tx/mg/am/it) + 自訂項目
   - 每項都支援多種計算模式
   - type 標籤:
     "expense"             = 一般費用 (預設, 雙方均為支出)
     "transfer_to_builder" = 地主付、建商收 (如風險管理費)
                             地主承擔的部分: 地主支出 + 建商收入
                             建商承擔的部分: 取消 (不算成本不算收入)
════════════════════════════════════════ */
const STD_COST_KEYS = ["co","de","ad","tx","mg","am","it"];
const STD_COST_LABELS = {
  co:"建築工程造價", de:"開發設計費", ad:"廣告銷售費",
  tx:"稅雜費", mg:"物管費", am:"管銷費", it:"利息"
};

// 取得項目的類型 (預設 "expense")
function getItemType(item) {
  return (item && item.type) || "expense";
}

// 依 mode 計算單一成本項目的金額
// item: { mode, value }
// ctx: { sales, totalArea, totalCost, builderArea, builderSales }
function calcCostItemValue(item, ctx) {
  if (!item) return 0;
  const mode = item.mode || "pctSales";
  const v = Number(item.value) || 0;
  switch (mode) {
    case "pctSales":  return v * (ctx.sales || 0);
    case "pctCost":   return v * (ctx.totalCost || 0);
    case "perPing":   return v * (ctx.totalArea || 0);
    case "fixed":     return v;
    case "auto":      return 0;  // 自動 (利息) 由外部計算
    default:          return 0;
  }
}

// 從 p 取得 costItems (確保結構完整, 缺值用舊欄位 fallback)
function getCostItems(p) {
  const ci = p.costItems || {};
  const oldVals = {
    co: { mode: "perPing",  value: p.cC   || 0 },
    de: { mode: "pctSales", value: p.desR || 0 },
    ad: { mode: "pctSales", value: p.bAd  || 0 },
    tx: { mode: "pctSales", value: p.bTx  || 0 },
    mg: { mode: "pctSales", value: p.bMg  || 0 },
    am: { mode: (p.bAmMode === "fixed" ? "fixed" : "pctSales"),
          value: (p.bAmMode === "fixed" ? (p.bAm || 0) : (p.bAmR || 0)) },
    it: { mode: "auto", value: 0 }
  };
  const result = {};
  STD_COST_KEYS.forEach(k => {
    result[k] = ci[k] ? {...oldVals[k], ...ci[k]} : oldVals[k];
  });
  return result;
}

// 從 p 取得 customCostItems (確保是陣列)
function getCustomCostItems(p) {
  return Array.isArray(p.customCostItems) ? p.customCostItems : [];
}

function cS(p, dr, price, cost, role, ownerRatio, taxOverride) {
  const {landValue, totalArea} = dr;

  // ─── 取得分回面積 (考慮手動覆寫) ───
  let shareArea;
  if (role === "b") {
    const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "builder");
    shareArea = s ? s.finalArea : totalArea * dr.builderRatio;
  } else {
    const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "owner" && Math.abs(x.ratio - ownerRatio) < 1e-9);
    shareArea = s ? s.finalArea : totalArea * ownerRatio;
  }

  // 收入 = 分回面積 × 售價 (+ 車位收入按比例分配)
  const ratio = role === "b" ? dr.builderRatio : ownerRatio;
  const sh = p.pip ? (shareArea * price)
                   : (shareArea * price + p.parking * p.pP * ratio);

  // 建築工程造價 cf:
  //   合建案中，建商出資蓋整棟房子，承擔全案造價成本。
  //   公式: cf = totalArea × cost  (全案總銷面積 × 各方案造價，無膨脹係數)
  const cfFullProject = totalArea * cost;

  const bAmVal = p.bAmMode === "pct" ? sh * p.bAmR : p.bAm;
  let cs, cf;
  let ownerEq = 0;  // 地主自有資金 (出資承擔的成本合計)
  let ownerLL = 0;  // 地主融資金額 (新)
  let ownerFinanceInterest = 0;  // 地主融資利息 (新)
  if (role === "b") {
    // ─── 建商側成本（含地主出資替建商付的部分扣除）───
    cf = cfFullProject;
    const intr = (landValue*p.lLTV*p.lLR*p.dur/12 + cf*p.cLTV*p.cLR*p.dur/12) / 2;
    // 不勾合建時，建商獨資 → 自付土增稅、契稅
    const builderBearsTax = !p.jb;
    const ltBuilder = builderBearsTax ? (dr.lvt.tax/10000) : 0;
    const ddBuilder = builderBearsTax ? dr.deedCalc.tax : 0;

    // ─── 用 costItems + 自訂項目計算建商成本 ───
    const ci = getCostItems(p);
    const cci = getCustomCostItems(p);
    const ctx = { sales: sh, totalArea: totalArea, totalCost: cf };
    // 標準 7 項
    const builderFull = {
      co: calcCostItemValue(ci.co, ctx),
      de: calcCostItemValue(ci.de, ctx),
      ad: calcCostItemValue(ci.ad, ctx),
      tx: calcCostItemValue(ci.tx, ctx),
      mg: calcCostItemValue(ci.mg, ctx),
      am: calcCostItemValue(ci.am, ctx),
      it: intr,  // 利息一律自動
      lt: ltBuilder, dd: ddBuilder
    };
    // 若 co 用 perPing 模式但模式回傳 0, fallback 用 cf
    if (ci.co && ci.co.mode === "perPing") builderFull.co = (Number(ci.co.value) || 0) * totalArea;
    // 自訂項目: 加入 builderFull 用 key "cu_<id>" 區分
    cci.forEach(c => {
      const v = calcCostItemValue(c, ctx);
      builderFull["cu_" + c.id] = v;
    });

    // 地主出資替建商付掉的成本 (含標準 7 項 + 自訂項目)
    const allCostKeys = [...STD_COST_KEYS, ...cci.map(c => "cu_" + c.id)];
    // 建立 key → type 對應
    const keyType = {};
    STD_COST_KEYS.forEach(k => { keyType[k] = "expense"; });  // 標準項目永遠是 expense
    cci.forEach(c => { keyType["cu_" + c.id] = getItemType(c); });
    let assumedByOwners = {};
    allCostKeys.forEach(k => assumedByOwners[k] = 0);
    if (p.jb) {
      p.owners.forEach(o => {
        const csh = o.costBearing || {};
        allCostKeys.forEach(k => {
          const pctVal = Number(csh[k]) || 0;
          assumedByOwners[k] += (builderFull[k] || 0) * pctVal;
        });
      });
    }
    // 建商實際成本計算:
    //   expense:             建商支付 = 完整 - 地主承擔 (一般情況)
    //   transfer_to_builder: 建商收入 = -完整金額 (建商開立發票的全額)
    //                        (其他地主未設定承擔的部分, 視為「未分配」, 不影響建商收入認列)
    cs = {...builderFull};
    allCostKeys.forEach(k => {
      if (keyType[k] === "transfer_to_builder") {
        cs[k] = -(builderFull[k] || 0);  // 建商收全額 (負值=收入)
      } else {
        cs[k] = (builderFull[k] || 0) - assumedByOwners[k];
      }
    });
  } else {
    // ─── 地主側成本 ───
    cf = 0;
    const ownerShare = ownerRatio / (1 - dr.builderRatio || 1);
    // 找到當前地主物件
    const me = p.owners.find(o => Math.abs(o.ratio - ownerRatio) < 1e-9);
    // 費率啟用（預設都啟用，可在六中關閉）
    const fe = (me && me.feeEnabled) || {ad:true, tx:true, mg:true};
    // 地主原本的成本（純參與分配）─ 各項費率可依 feeEnabled 關閉
    const baseCs = {de:0, co:0,
                    ad: fe.ad !== false ? sh*p.oAdR : 0,
                    tx: fe.tx !== false ? sh*p.oTxR : 0,
                    mg: fe.mg !== false ? sh*p.oMgR : 0,
                    am:0, it:0,
                    lt: dr.lvt.tax/10000 * ownerShare, dd: dr.deedCalc.tax * ownerShare};
    const csh = (me && me.costBearing) || {};
    // 重新計算建商完整成本（以全案造價、利息、設計、廣告等為基準）
    const cf_full = cfFullProject;
    const intr_full = (landValue*p.lLTV*p.lLR*p.dur/12 + cf_full*p.cLTV*p.cLR*p.dur/12) / 2;
    // 建商收入(若無扣除地主出資): 用於計算 bAm/bAd/bTx/bMg 等成本
    const builderArea_full = totalArea * dr.builderRatio;
    const sh_b_full = p.pip ? (builderArea_full * price)
                            : (builderArea_full * price + p.parking * p.pP * dr.builderRatio);

    // ─── 用 costItems + 自訂項目計算建商完整成本 (給地主端基準用) ───
    const ci_owner = getCostItems(p);
    const cci_owner = getCustomCostItems(p);
    const ctx_owner = { sales: sh_b_full, totalArea: totalArea, totalCost: cf_full };
    const builderFull = {
      co: calcCostItemValue(ci_owner.co, ctx_owner),
      de: calcCostItemValue(ci_owner.de, ctx_owner),
      ad: calcCostItemValue(ci_owner.ad, ctx_owner),
      tx: calcCostItemValue(ci_owner.tx, ctx_owner),
      mg: calcCostItemValue(ci_owner.mg, ctx_owner),
      am: calcCostItemValue(ci_owner.am, ctx_owner),
      it: intr_full
    };
    if (ci_owner.co && ci_owner.co.mode === "perPing") builderFull.co = (Number(ci_owner.co.value) || 0) * totalArea;
    // 自訂項目加入
    cci_owner.forEach(c => {
      builderFull["cu_" + c.id] = calcCostItemValue(c, ctx_owner);
    });
    cs = {...baseCs};
    Object.keys(builderFull).forEach(k => {
      const pctVal = Number(csh[k]) || 0;
      cs[k] = (cs[k] || 0) + builderFull[k] * pctVal;
      ownerEq += builderFull[k] * pctVal;  // 累計地主出資承擔金額
    });
    // ─── 地主融資 (如有啟用) ───
    if (me && me.financing && me.financing.enabled) {
      const fa = Number(me.financing.amount) || 0;
      const fr = (Number(me.financing.rate) || 0) / 100;
      const fm = Number(me.financing.durationMonths) || 0;
      if (fa > 0) {
        ownerLL = fa;
        // 簡單利息平均: amount × rate × duration/12 / 2 (假設線性還本)
        ownerFinanceInterest = fa * fr * (fm/12) / 2;
        // 加到成本: 利息列
        cs.it = (cs.it || 0) + ownerFinanceInterest;
      }
    }
  }
  const tc = Object.values(cs).reduce((a,b) => a+b, 0);
  const pbt = sh - tc;
  // itx (房地合一稅 / 舊制土增稅):
  //   - 分析身分 (taxOverride 有值) → 用經營分析的真實稅額
  //   - 其他人 → 用預設稅率 p.itR (15%)
  const itx = taxOverride != null
    ? Math.max(0, Number(taxOverride) || 0)
    : (pbt > 0 ? pbt * p.itR : 0);
  const pat = pbt - itx;
  // 融資與自有資金
  //   建商: ll = 土地 × LTV; cl = 工程 × LTV
  //   地主: ll = 自填融資金額; cl = 0
  const ll = role === "b" ? landValue * p.lLTV : ownerLL;
  const cl = role === "b" ? cf * p.cLTV : 0;
  const tl = ll + cl;
  // 自有資金
  //   建商: 總成本 − 融資
  //   地主: 出資承擔合計 − 融資 (融資視為「替代自有資金」)
  const eq = role === "b" ? Math.max(tc - tl, 0) : Math.max(ownerEq - ownerLL, 0);
  return {sh, cs, tc, pbt, itx, pat, shareArea,
    gm: sh ? pbt/sh : 0, nm: sh ? pat/sh : 0, cr: tc ? pat/tc : 0,
    bep: shareArea ? tc/shareArea : 0, ll, cl, tl, eq, er: eq > 0 ? pat/eq : 0,
    ownerFinanceInterest};
}

/* ════════════════════════════════════════
   經營分析計算 (七、經營分析)
════════════════════════════════════════ */
function calcCompBenefit(p, dr) {
  const cb = p.compBenefit || {};
  const mode = cb.mode || "single";           // "single" | "longHold"
  const useDiscount = !!cb.useDiscount;
  const r = useDiscount ? ((Number(cb.discountRate) || 0) / 100) : 0;
  const holdYears = Math.max(1, Number(cb.holdYears) || 10);
  // 處分價格預估參數
  const depRate = (Number(cb.buildingDepRate) || 0) / 100;   // 建物折舊率
  const appRate = (Number(cb.landAppRate) || 0) / 100;       // 土地年漲幅
  const bRatio = Math.max(0, Math.min(100, Number(cb.buildingRatio) || 45)) / 100;
  const lRatio = 1 - bRatio;

  // ─── 取得「我的身分」對應的取回面積與負擔成本 ───
  const myRole = p.myRole || "builder";
  let myArea = 0, myRoleLabel = "建商", myCs = null;
  if (myRole === "builder") {
    const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "builder");
    myArea = s ? s.finalArea : dr.totalArea * dr.builderRatio;
    myRoleLabel = "建商" + (p.jb ? "" : " (獨資)");
    myCs = cS(p, dr, p.uP, p.cC, "b", 0);
  } else if (myRole.startsWith("owner_") && p.jb) {
    const me = p.owners.find(o => ("owner_" + o.id) === myRole);
    if (me) {
      const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "owner" && Math.abs(x.ratio - me.ratio) < 1e-9);
      myArea = s ? s.finalArea : dr.totalArea * me.ratio;
      myRoleLabel = me.name;
      myCs = cS(p, dr, p.uP, p.cC, "o", me.ratio);
    }
  }
  if (!myCs) myCs = cS(p, dr, p.uP, p.cC, "b", 0);

  const mySalesAmount = myCs.sh;
  const myTotalCost   = myCs.tc;
  const myPAT         = myCs.pat;

  // ─── 土地價值認列 ───
  const lmode = cb.landValuationMode || "appraisal";
  let landValue = 0, landLabel = "鑑價總值";
  if (lmode === "appraisal") { landValue = dr.landValue; landLabel = "鑑價總值"; }
  else if (lmode === "book") { landValue = Number(cb.landBookValue) || 0; landLabel = "帳面現值"; }
  else if (lmode === "acquired") { landValue = Number(cb.landAcquiredValue) || 0; landLabel = "取得價值"; }

  // ─── 房地合一稅計算 (依持有年期、納稅人身分) ───
  const taxpayer = cb.taxpayerType || ""; // "" | "individual" | "corp"
  const selfUse = !!cb.selfUse;
  const calcLandHouseTax = (taxableBase, holdY) => {
    if (!taxpayer || taxableBase <= 0) return { rate: 0, exemption: 0, tax: 0, label: taxpayer ? "" : "未指定身分" };
    let rate, label;
    if (taxpayer === "individual") {
      if (selfUse && holdY >= 6) { rate = 0.10; label = "自用住宅 10%"; }
      else if (holdY <= 2)       { rate = 0.45; label = "個人 ≤2年 45%"; }
      else if (holdY <= 5)       { rate = 0.35; label = "個人 2~5年 35%"; }
      else if (holdY <= 10)      { rate = 0.20; label = "個人 5~10年 20%"; }
      else                       { rate = 0.15; label = "個人 >10年 15%"; }
    } else { // corp
      if (holdY <= 2)            { rate = 0.45; label = "營利事業 ≤2年 45%"; }
      else if (holdY <= 5)       { rate = 0.35; label = "營利事業 2~5年 35%"; }
      else                       { rate = 0.20; label = "營利事業 >5年 20%"; }
    }
    const exemption = (taxpayer === "individual" && selfUse && holdY >= 6) ? 400 : 0;
    const taxable = Math.max(0, taxableBase - exemption);
    const tax = taxable * rate;
    return { rate, exemption, tax, taxable, label };
  };

  // ─── 土地稅制判定 (新制房地合一 / 舊制土增稅) ───
  // landRegime: "auto"(依取得年自動) | "new"(房地合一) | "old"(土增稅)
  // 判定: 取得年 (民國) ≥ 105 為新制; < 105 為舊制
  const landAcqYearROC = Number(cb.landAcquireYearROC) || 0;
  let landRegime = cb.landRegime || "auto";
  if (landRegime === "auto") {
    landRegime = (landAcqYearROC > 0 && landAcqYearROC < 105) ? "old" : "new";
  }
  // 舊制土增稅 (來自 API 查詢, 存於 cb.lvtTaxResult, 單位: 萬)
  // 都更減徵 40% (六折) 在套用時處理 (見下)
  const lvtUrbanRenewal = !!cb.lvtUrbanRenewal;
  const lvtRaw = (cb.lvtTaxResult != null && cb.lvtTaxResult !== "") ? Number(cb.lvtTaxResult) : null;
  const lvtTax = lvtRaw != null ? (lvtUrbanRenewal ? lvtRaw * 0.6 : lvtRaw) : null;

  // ─── 模式一：不動產處分效益 (全分回處分) ───
  // 課稅基礎 = 取回總銷額 − 取得成本(土地價值) − 必要費用(負擔成本)
  const single_taxableBase = mySalesAmount - landValue - myTotalCost;
  // 稅額: 新制 → 房地合一稅; 舊制 → 土增稅 (API, 含都更減徵)
  let single_taxInfo;
  if (landRegime === "old") {
    single_taxInfo = {
      rate: 0, exemption: 0,
      tax: lvtTax != null ? lvtTax : 0,
      taxable: single_taxableBase,
      label: lvtTax != null
        ? ("舊制土增稅" + (lvtUrbanRenewal ? " (都更六折)" : ""))
        : "舊制土增稅 (尚未查詢, 請按查詢鈕)",
      regime: "old"
    };
  } else {
    single_taxInfo = { ...calcLandHouseTax(single_taxableBase, holdYears), regime: "new" };
  }
  const single_grossProfit = mySalesAmount - myTotalCost - landValue;   // 稅前
  const single_netProfit = single_grossProfit - single_taxInfo.tax;     // 稅後
  const single_annual = single_netProfit / holdYears;

  // ─── 模式二：長期持有 ───
  // (0) 取得日期 (預設取銷售時程最後一期)
  let acqYear = Number(cb.acquireYear) || 0;
  let acqMonth = Number(cb.acquireMonth) || 0;
  let acqAuto = !acqYear || !acqMonth;
  if (acqAuto && p.salesSched && p.salesSched.length > 0) {
    const last = [...p.salesSched].sort((a,b) => (b.year*12+b.month) - (a.year*12+a.month))[0];
    acqYear = last.year;
    acqMonth = last.month;
  }
  if (!acqYear) acqYear = 2028;
  if (!acqMonth) acqMonth = 6;
  const acqAbsMonth = acqYear * 12 + acqMonth;

  // (1) 多筆處分計算 (disposals 陣列)
  const disposalsRaw = (cb.disposals || []).filter(d => d && d.enabled !== false);
  // 原始面積總和 (用於互斥檢查)
  let pd_totalAreaRaw = 0;
  disposalsRaw.forEach(d => {
    const a = Number(d.area) > 0 ? Number(d.area) : 0;  // 0 不再自動帶分回面積 (多筆情境下無意義)
    pd_totalAreaRaw += a;
  });
  // 如果只有 1 筆且面積=0,自動帶入「分回 − 租金 − 營業」剩餘
  let autoFillSingle = false;
  if (disposalsRaw.length === 1 && (!disposalsRaw[0].area || Number(disposalsRaw[0].area) <= 0)) {
    autoFillSingle = true;
  }

  // 租金、營業使用面積
  const rt = cb.rent || {};
  const bs = cb.business || {};
  const rt_enabled = !!rt.enabled;
  const bs_enabled = !!bs.enabled;

  // ─── 處分時序：每月可用面積 (處分月 < 該月才扣) ───
  // 規則：處分當月房子仍在我身上（月底才移轉），下一個月才扣除
  const disposalsForCap = (cb.disposals || []).filter(d => d.enabled !== false).map(d => ({
    absMonth: (Number(d.year)||0)*12 + (Number(d.month)||0),
    area: Number(d.area) > 0 ? Number(d.area) : 0
  }));
  // 某月可用 = 分回 − Σ(處分月 < 該月 的處分面積)
  const availableAtMonth = (absMonth) => {
    let area = myArea;
    for (const d of disposalsForCap) {
      if (d.absMonth < absMonth) area -= d.area;  // 嚴格小於：處分當月仍可用
    }
    return Math.max(0, area);
  };
  // 期間 [startAbs, endAbs] 內最小可用面積
  const minAvailableInPeriod = (startAbs, endAbs) => {
    if (startAbs > endAbs) return 0;
    let minA = availableAtMonth(startAbs);
    minA = Math.min(minA, availableAtMonth(endAbs));
    // 關鍵切換點：每個處分日後一個月
    for (const d of disposalsForCap) {
      const switchMonth = d.absMonth + 1;
      if (switchMonth >= startAbs && switchMonth <= endAbs) {
        minA = Math.min(minA, availableAtMonth(switchMonth));
      }
    }
    return minA;
  };

  // 租金/營業期間絕對月份
  const rt_startAbs = (Number(rt.startYear)||0)*12 + (Number(rt.startMonth)||0);
  const rt_endAbs   = (Number(rt.endYear)||0)*12 + (Number(rt.endMonth)||0);
  const bs_startAbs = (Number(bs.startYear)||0)*12 + (Number(bs.startMonth)||0);
  const bs_endAbs   = (Number(bs.endYear)||0)*12 + (Number(bs.endMonth)||0);
  // 各自期間最小可用
  const rt_periodMin = rt_enabled ? minAvailableInPeriod(rt_startAbs, rt_endAbs) : myArea;
  const bs_periodMin = bs_enabled ? minAvailableInPeriod(bs_startAbs, bs_endAbs) : myArea;
  // 期間是否重疊
  const periodsOverlap = rt_enabled && bs_enabled &&
    rt_startAbs <= bs_endAbs && bs_startAbs <= rt_endAbs;
  // 重疊期間最小可用 (兩者共用上限)
  const overlapMin = periodsOverlap
    ? minAvailableInPeriod(Math.max(rt_startAbs, bs_startAbs), Math.min(rt_endAbs, bs_endAbs))
    : 0;

  // 顯示用：當前最終可用面積 (給總計區塊顯示)
  // 用「所有處分完成後」的剩餘 (這是租期/營業期間最差的情況)
  const willAutoFillSingleFullArea = autoFillSingle && !rt_enabled && !bs_enabled;
  const totalDisposedArea = willAutoFillSingleFullArea
    ? myArea
    : disposalsForCap.reduce((sum, d) => sum + d.area, 0);
  const availableArea = Math.max(0, myArea - totalDisposedArea);  // 永久剩餘，僅供顯示

  // 使用者輸入：優先讀 areaInput; 後備 areaPct
  const getInputArea = (obj) => {
    if (Number(obj?.areaInput) > 0) return Number(obj.areaInput);
    if (Number(obj?.areaPct) > 0) return myArea * Number(obj.areaPct);
    return 0;
  };
  const rt_areaRawInput = rt_enabled ? getInputArea(rt) : 0;
  const bs_areaRawInput = bs_enabled ? getInputArea(bs) : 0;

  // ─── 互斥檢查與自動截斷 ───
  // 規則：
  //   - 各自不超過自己期間最小可用
  //   - 期間重疊時，重疊段 rt + bs ≤ overlapMin
  let rt_areaActual = rt_areaRawInput;
  let bs_areaActual = bs_areaRawInput;

  // 先各自限制
  if (rt_areaActual > rt_periodMin + 0.01) rt_areaActual = rt_periodMin;
  if (bs_areaActual > bs_periodMin + 0.01) bs_areaActual = bs_periodMin;

  // 重疊期間競爭
  if (periodsOverlap) {
    if (rt_areaActual + bs_areaActual > overlapMin + 0.01) {
      const total = rt_areaActual + bs_areaActual;
      if (total > 0) {
        rt_areaActual = overlapMin * (rt_areaActual / total);
        bs_areaActual = overlapMin * (bs_areaActual / total);
      }
    }
  }

  // 截斷標示
  const rt_truncated = rt_enabled && (rt_areaActual < rt_areaRawInput - 0.01);
  const bs_truncated = bs_enabled && (bs_areaActual < bs_areaRawInput - 0.01);

  // % 對應 (基準 = 該項目期間最小可用)
  const rt_areaPctActual = rt_periodMin > 0 ? rt_areaActual / rt_periodMin : 0;
  const bs_areaPctActual = bs_periodMin > 0 ? bs_areaActual / bs_periodMin : 0;

  // ─── 處分面積處理 ───
  // 若處分只 1 筆且面積=0, 且租金/營業都未啟用 (或面積=0), 自動填補為分回面積
  // 一旦有租金/營業, autoFillSingle 不再啟動 (避免雞蛋問題)
  let pd_totalAreaEffective = pd_totalAreaRaw;
  if (autoFillSingle && !rt_enabled && !bs_enabled) {
    pd_totalAreaEffective = myArea;
  } else if (autoFillSingle) {
    // 有租金/營業時, autoFill 那筆設為 0 (使用者需手動)
    pd_totalAreaEffective = 0;
  }
  // 處分面積互斥檢查 (處分加總不能超過分回)
  const areaConflict = pd_totalAreaEffective > myArea + 0.01;
  const scale = areaConflict && pd_totalAreaEffective > 0 ? myArea / pd_totalAreaEffective : 1;
  const sumRaw = pd_totalAreaEffective + rt_areaRawInput + bs_areaRawInput;

  // 計算每筆處分的詳細資料
  const disposals = (cb.disposals || []).map((d, idx) => {
    const enabled = d.enabled !== false;
    // 原始面積 (autoFillSingle 時, 用補足後的面積)
    let areaRaw = Number(d.area) > 0 ? Number(d.area) : 0;
    if (autoFillSingle && idx === 0) areaRaw = pd_totalAreaEffective;
    const areaActual = enabled ? areaRaw * scale : 0;
    // 持有年期 (處分月 − 取得月)
    const disposeAbsMonth = (Number(d.year)||0)*12 + (Number(d.month)||0);
    const holdMonths = Math.max(0, disposeAbsMonth - acqAbsMonth);
    const holdY = holdMonths / 12;
    // 建議價格 = 取得售價 × (建物比重 × (1-折舊)^年 + 土地比重 × (1+漲幅)^年)
    const bFactor = Math.pow(1 - depRate, holdY);
    const lFactor = Math.pow(1 + appRate, holdY);
    const suggestedPrice = p.uP * (bRatio * bFactor + lRatio * lFactor);
    // 使用價格：useSuggested 或 手動價 或 取得售價
    let price;
    if (d.useSuggested) {
      price = suggestedPrice;
    } else if (Number(d.price) > 0) {
      price = Number(d.price);
    } else {
      price = p.uP;
    }
    const totalRevenue = areaActual * price;
    const ratio = myArea > 0 ? areaActual / myArea : 0;
    const costShare = myTotalCost * ratio;
    const landShare = landValue * ratio;
    const taxableBase = totalRevenue - landShare - costShare;
    const taxInfo = calcLandHouseTax(taxableBase, holdY);
    const grossProfit = totalRevenue - costShare - landShare;
    const netProfit = enabled ? grossProfit - taxInfo.tax : 0;
    return {
      id: d.id, label: d.label || `第${idx+1}筆`, enabled,
      year: d.year, month: d.month,
      areaRaw, areaActual, price, ratio,
      suggestedPrice, useSuggested: !!d.useSuggested,
      bFactor, lFactor,
      totalRevenue, costShare, landShare, taxableBase,
      holdYears: holdY, taxInfo,
      grossProfit, netProfit
    };
  });

  // 處分合計
  const pd_sumNetProfit = disposals.reduce((a, d) => a + d.netProfit, 0);
  const pd_sumGrossProfit = disposals.reduce((a, d) => a + d.grossProfit * (d.enabled?1:0), 0);
  const pd_sumTax = disposals.reduce((a, d) => a + (d.enabled ? d.taxInfo.tax : 0), 0);
  const pd_sumRevenue = disposals.reduce((a, d) => a + (d.enabled ? d.totalRevenue : 0), 0);
  const pd_sumArea = disposals.reduce((a, d) => a + (d.enabled ? d.areaActual : 0), 0);

  // (2) 租金收益
  const rentMonths = rt_enabled
    ? Math.max(0, ((Number(rt.endYear)||0)*12 + (Number(rt.endMonth)||0)) - ((Number(rt.startYear)||0)*12 + (Number(rt.startMonth)||0)) + 1)
    : 0;
  const rentYears = rentMonths / 12;
  const annualRent = rt_areaActual * (Number(rt.monthlyRent) || 0) * 12;
  const effect2Total = rt_areaActual * (Number(rt.monthlyRent) || 0) * rentMonths;
  const effect2NPV = (r > 0 && rentYears > 0)
    ? annualRent * (1 - Math.pow(1+r, -rentYears)) / r
    : effect2Total;
  const effect2Annual = annualRent;

  // (3) 營業收益
  const bizMonths = bs_enabled
    ? Math.max(0, ((Number(bs.endYear)||0)*12 + (Number(bs.endMonth)||0)) - ((Number(bs.startYear)||0)*12 + (Number(bs.startMonth)||0)) + 1)
    : 0;
  const bizYears = bizMonths / 12;
  const annualBiz = bs_areaActual * (Number(bs.perfPerPing) || 0) * 12;
  const effect3Total = bs_areaActual * (Number(bs.perfPerPing) || 0) * bizMonths;
  const effect3NPV = (r > 0 && bizYears > 0)
    ? annualBiz * (1 - Math.pow(1+r, -bizYears)) / r
    : effect3Total;
  const effect3Annual = annualBiz;

  // 模式二總計
  const longHold_total = pd_sumNetProfit + effect2NPV + effect3NPV;
  // 年化分母: 取最後一筆處分日期 − 取得日期 (作為持有期間), 若無則用 holdYears
  const enabledDisposals = disposals.filter(d => d.enabled);
  const lastDispose = enabledDisposals.length > 0
    ? enabledDisposals.reduce((a,b) => ((a.year*12+a.month) > (b.year*12+b.month) ? a : b))
    : null;
  const longHold_periodYears = lastDispose
    ? Math.max(1, ((lastDispose.year*12+lastDispose.month) - acqAbsMonth) / 12)
    : holdYears;
  const longHold_annual = (pd_sumNetProfit / longHold_periodYears) + effect2Annual + effect3Annual;

  // ─── 統一回傳值（依 mode 切換 totalBenefit / totalAnnual）───
  const totalBenefit = mode === "single" ? single_netProfit : longHold_total;
  const totalAnnual  = mode === "single" ? single_annual   : longHold_annual;

  return {
    mode,
    myRole, myRoleLabel, myArea, mySalesAmount, myTotalCost, myPAT, myCs,
    landValue, landLabel, landMode: lmode,
    useDiscount, discountRate: r, holdYears,
    buildingDepRate: depRate, landAppRate: appRate, buildingRatio: bRatio,
    taxpayer, selfUse,
    acqYear, acqMonth, acqAuto, acqAbsMonth,
    // 自 v56: 土地稅制
    landRegime, landAcqYearROC, lvtUrbanRenewal, lvtTax, lvtRaw,
    // 模式一 (single)
    single: {
      taxableBase: single_taxableBase,
      grossProfit: single_grossProfit,
      taxInfo: single_taxInfo,
      netProfit: single_netProfit,
      annual: single_annual
    },
    // 模式二 (longHold)
    longHold: {
      disposals,
      pd_sumGrossProfit, pd_sumNetProfit, pd_sumTax, pd_sumRevenue, pd_sumArea,
      autoFillSingle, periodYears: longHold_periodYears,
      availableArea, totalDisposedArea, overlapMin,
      rent: {
        enabled: rt_enabled,
        areaRaw: rt_areaRawInput, areaActual: rt_areaActual,
        areaPctActual: rt_areaPctActual,
        periodMin: rt_periodMin,
        truncated: rt_truncated,
        months: rentMonths, years: rentYears,
        total: effect2Total, npv: effect2NPV, annual: effect2Annual
      },
      business: {
        enabled: bs_enabled,
        areaRaw: bs_areaRawInput, areaActual: bs_areaActual,
        areaPctActual: bs_areaPctActual,
        periodMin: bs_periodMin,
        truncated: bs_truncated,
        months: bizMonths, years: bizYears,
        total: effect3Total, npv: effect3NPV, annual: effect3Annual
      },
      periodsOverlap,
      areaConflict, scale, sumRaw,
      total: longHold_total,
      annual: longHold_annual
    },
    // 為向下相容保留的欄位
    effect1Total: single_grossProfit,
    effect1Annual: single_annual,
    effect2NPV, effect2Annual, effect2Total,
    effect3NPV, effect3Annual, effect3Total,
    totalBenefit, totalAnnual
  };
}

/* ════════════════════════════════════════
   T8: IRR & 投資綜合報告計算
════════════════════════════════════════ */

// IRR 計算 (牛頓法/二分法混合)
// cashflows: [{year, value}], value 負為流出, 正為流入
function calcIRR(cashflows) {
  if (!cashflows || cashflows.length < 2) return null;
  const minY = Math.min(...cashflows.map(c => c.year));
  const maxY = Math.max(...cashflows.map(c => c.year));
  // 必須有正有負
  const hasPos = cashflows.some(c => c.value > 0);
  const hasNeg = cashflows.some(c => c.value < 0);
  if (!hasPos || !hasNeg) return null;
  // NPV 函式
  const npv = (rate) => cashflows.reduce((sum, c) => sum + c.value / Math.pow(1+rate, c.year - minY), 0);
  // 二分法 (穩定但慢)
  let lo = -0.99, hi = 10.0;
  if (npv(lo) * npv(hi) > 0) return null; // 無解
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2;
    const v = npv(mid);
    if (Math.abs(v) < 0.0001) return mid;
    if (npv(lo) * v < 0) hi = mid; else lo = mid;
  }
  return (lo + hi) / 2;
}

// 計算 T8 快照: 一個策略對應的所有指標
// strategyOverride 可以覆寫 compBenefit 設定來生成不同情境
function calcT8Snapshot(p, dr, strategyOverride = null) {
  // 套用情境覆寫
  const cb = strategyOverride
    ? {...(p.compBenefit||{}), ...strategyOverride}
    : (p.compBenefit || {});
  const pAdjusted = {...p, compBenefit: cb};
  const ce = calcCompBenefit(pAdjusted, dr);

  // ─── 期間 ───
  // 開發期: 從 dr.devPeriod (全域統一定義, 來自費用時程或使用者手動)
  const devStartAbs = dr.devPeriod.startAbs;
  const devEndAbs = dr.devPeriod.endAbs;

  // 持有期 end = 最後一筆處分日 (或租金/營業終點)
  let holdEndAbs = devEndAbs;
  if (ce.mode === "longHold") {
    ce.longHold.disposals.filter(d => d.enabled).forEach(d => {
      const dabs = d.year*12 + d.month;
      if (dabs > holdEndAbs) holdEndAbs = dabs;
    });
    if (ce.longHold.rent.enabled) {
      const rEnd = (cb.rent?.endYear||0)*12 + (cb.rent?.endMonth||0);
      if (rEnd > holdEndAbs) holdEndAbs = rEnd;
    }
    if (ce.longHold.business.enabled) {
      const bEnd = (cb.business?.endYear||0)*12 + (cb.business?.endMonth||0);
      if (bEnd > holdEndAbs) holdEndAbs = bEnd;
    }
  }
  const devStartYear = Math.floor(devStartAbs / 12);
  const devEndYear = Math.floor(devEndAbs / 12);
  const holdEndYear = Math.floor(holdEndAbs / 12);

  // ─── 損益 ───
  // 開發期 (來自 cS / myCs)
  const salesRev = ce.mySalesAmount;
  const burdenCost = ce.myTotalCost;  // 已含土增稅、契稅
  const devPAT = ce.myPAT;
  const devPBT = ce.myCs.pbt;
  const devTax = ce.myCs.itx;
  const devLVT = ce.myCs.lt || 0;
  const devDeed = ce.myCs.dd || 0;

  // 持有期 (來自 ce.longHold 或 ce.single)
  let holdRevenue = 0, holdCost = 0, holdTax = 0, holdNet = 0;
  if (ce.mode === "single") {
    // 一次處分: 視為延後的銷售收入 - 土地價值認列 - 房地合一稅
    // 但模式一通常等同立即處分, 已涵蓋在 dev 期, 此處置 0
    holdRevenue = 0;
    holdCost = 0;
    holdTax = ce.single.taxInfo.tax || 0;
    holdNet = -holdTax;
  } else {
    const lh = ce.longHold;
    holdRevenue = lh.pd_sumRevenue + lh.rent.total + lh.business.total;
    // 持有期成本 = 多次處分按比例分攤的成本 (處分總成本已計入 dev?, 需釐清)
    // 簡化處理: 持有期不再扣分回成本 (分回成本已在 dev 期)
    // 持有期費用: 視為 0 (或可加入折舊維護等, 先簡化)
    holdCost = 0;
    holdTax = lh.pd_sumTax;
    holdNet = lh.pd_sumNetProfit + lh.rent.npv + lh.business.npv - lh.pd_sumNetProfit + lh.pd_sumNetProfit;
    // 持有期淨利 = 處分淨利(已扣稅) + 租金 + 營業
    holdNet = lh.pd_sumNetProfit + lh.rent.total + lh.business.total;
  }

  // ─── 投資基準 (使用者選擇) ───
  const ll = ce.myCs.ll || 0;  // 土地貸款
  const cl = ce.myCs.cl || 0;  // 建築貸款
  const eq = ce.myCs.eq || 0;  // 自有資金
  const t8 = p.t8 || {};
  const investBase = t8.investBase || "equity";
  const analysisMode = t8.analysisMode || "disposal";  // 提前定義給 cashflows 用
  let totalInvest = eq;
  if (investBase === "burden") totalInvest = burdenCost;
  else if (investBase === "totalCost") totalInvest = burdenCost + ll + cl;

  // ─── 投資指標 ───
  const r = (Number(t8.discountRate) || 0) / 100;
  // 構建簡化年度現金流 (用於 IRR & NPV)
  // cashflows 結構: { year, value, category }
  //   category: "dev_cost" (開發期支出), "dev_sales" (開發期銷售收入),
  //             "dev_tax" (開發期稅), "disposal" (處分收入),
  //             "rent" (租金), "business" (營業)
  const cashflows = [];
  const devYears = Math.max(1, devEndYear - devStartYear + 1);
  // 開發期支出 (負現金流)
  for (let y = devStartYear; y <= devEndYear; y++) {
    cashflows.push({ year: y, value: -burdenCost / devYears, category: "dev_cost" });
  }
  // 開發期銷售收入 (僅 single 模式, longHold 模式由處分產生收入)
  if (ce.mode === "single") {
    cashflows.push({ year: devEndYear, value: salesRev, category: "dev_sales" });
    cashflows.push({ year: devEndYear, value: -(devLVT + devDeed + devTax), category: "dev_tax" });
  } else {
    cashflows.push({ year: devEndYear, value: -(devLVT + devDeed), category: "dev_tax" });
  }

  // 持有期年度現金流
  if (ce.mode === "longHold") {
    const lh = ce.longHold;
    // 處分: 各筆按年度計入 (兩種模式都計入)
    lh.disposals.filter(d => d.enabled).forEach(d => {
      const yr = d.year;
      cashflows.push({ year: yr, value: d.totalRevenue - d.taxInfo.tax, category: "disposal" });
    });
    // 租金: 按年平均 (僅完整持有模式才計入 cashflows)
    if (analysisMode === "holdComplete" && lh.rent.enabled && lh.rent.years > 0) {
      const rStartY = cb.rent?.startYear || devEndYear;
      const rEndY = cb.rent?.endYear || devEndYear;
      const annualR = lh.rent.annual;
      for (let y = rStartY; y <= rEndY; y++) {
        cashflows.push({ year: y, value: annualR, category: "rent" });
      }
    }
    // 營業: 按年平均 (僅完整持有模式才計入 cashflows)
    if (analysisMode === "holdComplete" && lh.business.enabled && lh.business.years > 0) {
      const bStartY = cb.business?.startYear || devEndYear;
      const bEndY = cb.business?.endYear || devEndYear;
      const annualB = lh.business.annual;
      for (let y = bStartY; y <= bEndY; y++) {
        cashflows.push({ year: y, value: annualB, category: "business" });
      }
    }
  }

  // 合併同年現金流 (給 IRR/NPV 用)
  const cfByYear = {};
  cashflows.forEach(c => { cfByYear[c.year] = (cfByYear[c.year] || 0) + c.value; });
  const yearKeys = Object.keys(cfByYear).map(k => parseInt(k,10)).sort((a,b) => a-b);
  const cfList = yearKeys.map(y => ({ year: y, value: cfByYear[y] }));

  // 年度收入/支出彙整 (給 T3 用)
  const cfByYearDetail = {};
  cashflows.forEach(c => {
    const y = c.year;
    if (!cfByYearDetail[y]) cfByYearDetail[y] = { year: y, income: 0, expense: 0, byCat: {} };
    if (c.value >= 0) cfByYearDetail[y].income += c.value;
    else cfByYearDetail[y].expense += -c.value;  // 存正值
    cfByYearDetail[y].byCat[c.category] = (cfByYearDetail[y].byCat[c.category] || 0) + c.value;
  });
  let runningCum = 0;
  const cfDetailedList = yearKeys.map(y => {
    const d = cfByYearDetail[y];
    const net = d.income - d.expense;
    runningCum += net;
    return { ...d, net, cum: runningCum };
  });

  // ─── 現金流彈性指標 ───
  // 1. 早期回收率 (10 年): 前 10 年累計現金流入 / 總投入
  //    反映「投入後 10 年內能拿回多少 %」
  // 2. 現金流多樣性: 1 - 最大收入源佔比 (0~1, 越高越分散越穩健)
  const totalInvested = burdenCost + ll + cl;  // 總投入分母
  const firstYear = cfList.length > 0 ? cfList[0].year : 0;
  // 計算前 10 年累計現金流入 (只計正流入, 不抵負流出)
  let earlyRecovery10 = null;
  if (totalInvested > 0) {
    const cutoffYear = firstYear + 10 - 1;
    let cumIncome = 0;
    cfDetailedList.forEach(d => {
      if (d.year <= cutoffYear) cumIncome += d.income;  // d.income 已是正值
    });
    earlyRecovery10 = cumIncome / totalInvested;
  }

  // 現金流多樣性: 依 byCat 統計各類別總收入佔比
  // 類別: dev_sales, disposal, rent, business (只看收入面, 不算成本/稅)
  const incomeCats = { dev_sales: 0, disposal: 0, rent: 0, business: 0 };
  cfDetailedList.forEach(d => {
    Object.keys(d.byCat || {}).forEach(cat => {
      const v = d.byCat[cat];
      if (v > 0 && incomeCats.hasOwnProperty(cat)) incomeCats[cat] += v;
    });
  });
  const totalIncomeAll = Object.values(incomeCats).reduce((a, b) => a + b, 0);
  let cashflowDiversity = 0;
  if (totalIncomeAll > 0) {
    const maxShare = Math.max(...Object.values(incomeCats)) / totalIncomeAll;
    cashflowDiversity = 1 - maxShare;  // 0 = 全部來自單一來源, 越接近 1 越分散
  }

  // IRR
  const irr = calcIRR(cfList);
  // NPV
  const npv = cfList.reduce((sum, c) => sum + c.value / Math.pow(1+r, c.year - cfList[0].year), 0);
  // 回收年限
  let payback = null;
  let cum = 0;
  for (const c of cfList) {
    const newCum = cum + c.value;
    if (cum < 0 && newCum >= 0) {
      payback = c.year + (cum < 0 ? -cum / c.value : 0);
      break;
    }
    cum = newCum;
  }

  // 總損益 — 依「分析模式」決定 (處分損益 vs 完整持有)
  //   analysisMode = "disposal":   只計處分收益 (不含營業/租金) - 預設, 與經營分析一致
  //   analysisMode = "holdComplete": 含營業/租金 (整體效益)
  let totalProfit;
  let devOnlyProfit;  // 純開發評估: 不含租金/營業 (永遠存在, 供臨界點分析)
  let fullProfit;     // 完整持有: 含租金/營業 (永遠存在, 供完整比較)
  if (ce.mode === "single") {
    fullProfit = devPAT + holdNet;
    devOnlyProfit = fullProfit;  // single 模式沒有長期收益, 兩者相同
  } else {
    // longHold: 應扣完整開發成本 + 分回時的土增稅、契稅 + 持有期淨利
    fullProfit = -burdenCost - devLVT - devDeed + holdNet;
    const lh = ce.longHold;
    const dispOnlyNet = lh ? (lh.pd_sumNetProfit || 0) : 0;
    devOnlyProfit = -burdenCost - devLVT - devDeed + dispOnlyNet;
  }
  // 依模式選 totalProfit
  totalProfit = analysisMode === "disposal" ? devOnlyProfit : fullProfit;

  const roi = (burdenCost + ll + cl) > 0 ? totalProfit / (burdenCost + ll + cl) : 0;
  const roe = eq > 0 ? totalProfit / eq : 0;

  // Cap Rate / 營業收益率
  // 分母 = 處分總價值 (Σ 每筆處分面積 × 處分時售價)
  // 分子 = 年化 (rent.annual, business.annual)
  let capRate = null;
  let businessYieldRate = null;
  if (ce.mode === "longHold") {
    const lh = ce.longHold;
    // 計算處分總價值 (用每筆處分的 area × 該筆售價)
    // 處分價來源: 手動 disposal.price 或 自動建議價 (suggestedPrice)
    const dispTotalValue = (cb.disposals || []).reduce((sum, d) => {
      if (!d.enabled) return sum;
      const area = Number(d.area) || 0;
      // 用 disposal 已執行的售價 (手動 or 自動建議)
      const price = d.useSuggested ? (d._calcPrice || 0) : (Number(d.price) || 0);
      return sum + area * price;
    }, 0);
    // 若計算不到, fallback 用 myArea × uP
    const propValue = dispTotalValue > 0 ? dispTotalValue : (ce.myArea * p.uP);
    if (propValue > 0) {
      const annualRent = lh.rent.annual || 0;
      const annualBusiness = lh.business.annual || 0;
      if (annualRent > 0) capRate = annualRent / propValue;
      if (annualBusiness > 0) businessYieldRate = annualBusiness / propValue;
    }
  }

  // ─── 機會成本 / 經濟利潤 ───
  // 機會成本 = 自有資金 × 資金成本率 × 投資年期
  const capitalCostRate = (Number(t8.capitalCostRate) || 0) / 100;
  const investYears = Math.max(1, holdEndYear - devStartYear + 1);
  const opportunityCost = eq * capitalCostRate * investYears;
  const economicProfit = totalProfit - opportunityCost;
  const economicROE = eq > 0 ? economicProfit / eq : 0;

  return {
    ce, cb,
    devStartYear, devEndYear, holdEndYear,
    salesRev, burdenCost, devPAT, devPBT, devTax, devLVT, devDeed,
    holdRevenue, holdCost, holdTax, holdNet,
    totalProfit, devOnlyProfit, fullProfit, analysisMode, totalInvest, eq, ll, cl,
    investBase, discountRate: r,
    irr, npv, payback, roi, roe, capRate, businessYieldRate,
    capitalCostRate, opportunityCost, economicProfit, economicROE, investYears,
    cashflows: cfList,
    cashflowsDetailed: cfDetailedList,
    // 現金流彈性指標
    earlyRecovery10, cashflowDiversity
  };
}

// 自動生成三個情境 (A 純銷售 / B 當前 / C 全持有)
function calcT8Scenarios(p, dr) {
  // A: 純銷售 (mode = single, 不啟用持有)
  const scenA = calcT8Snapshot(p, dr, {
    mode: "single"
  });
  // B: 當前設定 (照原 compBenefit)
  const scenB = calcT8Snapshot(p, dr);
  // C: 全持有 (mode = longHold)
  //    純持有概念: 完全不處分, 只計算營業 + 租金總收益
  //    - 依使用者「有啟用」的項目 (rent / business) 自動分配 myArea 全部面積
  //    - disposals 為空 → 不會有變現現金流
  //    - IRR 可能無解 (純流入沒回收), 顯示為「—」
  const myArea = scenB.ce.myArea;
  const cb = p.compBenefit || {};
  const rentEnabled = !!cb.rent?.enabled;
  const bizEnabled = !!cb.business?.enabled;

  // 分配面積
  let rentArea = 0, bizArea = 0;
  if (rentEnabled && bizEnabled) {
    const oldRentArea = Number(cb.rent.areaInput) || 0;
    const oldBizArea = Number(cb.business.areaInput) || 0;
    const sum = oldRentArea + oldBizArea;
    if (sum > 0) {
      rentArea = myArea * (oldRentArea / sum);
      bizArea = myArea * (oldBizArea / sum);
    } else {
      rentArea = myArea * 0.5;
      bizArea = myArea * 0.5;
    }
  } else if (rentEnabled) {
    rentArea = myArea;
  } else if (bizEnabled) {
    bizArea = myArea;
  } else {
    // 都沒啟用 → 預設全租 (沿用 cb.rent 設定或預設值)
    rentArea = myArea;
  }

  const scenC = calcT8Snapshot(p, dr, {
    mode: "longHold",
    disposals: [],  // ← 純持有: 不處分
    rent: {
      ...(cb.rent || {}),
      enabled: rentArea > 0,
      areaInput: rentArea,
      areaPct: myArea > 0 ? rentArea / myArea : 0
    },
    business: {
      ...(cb.business || {}),
      enabled: bizArea > 0,
      areaInput: bizArea,
      areaPct: myArea > 0 ? bizArea / myArea : 0
    }
  });
  return { A: scenA, B: scenB, C: scenC };
}

// 敏感度分析的價格顯示: 統一保留 2 位小數
function formatPriceValue(v) {
  if (v == null || isNaN(v)) return "—";
  return v.toFixed(2);
}

// 敏感度分析: 5x5 矩陣 (售價±X%, 造價±X%) + 具體值 + 彈性指數 + 臨界點
function calcT8Sensitivity(p, dr) {
  const t8 = p.t8 || {};
  const range = Number(t8.sensitivityRange) || 10;
  const steps = [-range, -range/2, 0, range/2, range];  // 5 個變動點
  // 基準值: 售價、造價 (取自 costItems.co 為優先, 沒有則用 p.cC)
  const ci = getCostItems(p);
  const basePrice = p.uP || 0;
  // ─── 計算「co 的換算金額」(不論輸入模式為何) ───
  // 用 calcCostItemValue 取得當前 co 的實際金額
  const totalArea = dr.totalArea || 1;
  const sales = dr.ts || 0;
  // 預估 totalCost 給 pctCost 模式用
  const baseCoVal = Number(ci.co?.value) || 0;
  const ctxBase = { sales, totalArea, totalCost: baseCoVal * totalArea };
  const baseCoAmount = calcCostItemValue(ci.co, ctxBase);  // co 的實際金額(萬)
  // 等效單坪造價 (萬/坪) — 永遠以「金額 ÷ 總銷面積」呈現
  const basePerPing = totalArea > 0 ? baseCoAmount / totalArea : 0;
  // 輸入模式說明 (給驗證對照框用)
  const coMode = ci.co?.mode || "perPing";
  const coRawValue = baseCoVal;
  const baseCost = baseCoAmount;  // 內部仍用「金額」做 ±% 變動

  // 對應具體值
  const priceValues = steps.map(s => basePrice * (1 + s/100));
  const costValues = steps.map(s => baseCost * (1 + s/100));
  // 對應單坪造價值 (給顯示用)
  const costPerPingValues = steps.map(s => basePerPing * (1 + s/100));

  // 售價變動時, 同步調整 compBenefit.disposals 內的所有 price (按比例)
  // 否則長期持有模式下處分價跟 p.uP 解耦, 敏感度失真
  const adjustCompBenefit = (cb, priceFactor) => {
    if (!cb || !cb.disposals) return cb;
    return {
      ...cb,
      disposals: cb.disposals.map(d => ({
        ...d,
        price: (Number(d.price) || 0) * priceFactor
      }))
    };
  };

  const matrix = [];
  for (const priceDelta of steps) {
    const row = [];
    const priceFactor = 1 + priceDelta/100;
    for (const costDelta of steps) {
      // co 的調整: 不論 mode 為何, 把 value 等比例調整即可
      const newCo = {...(ci.co || {}), value: (Number(ci.co?.value) || 0) * (1 + costDelta/100)};
      const pAdj = {...p,
        uP: basePrice * priceFactor,
        cC: (p.cC || 0) * (1 + costDelta/100),
        costItems: {...ci, co: newCo},
        compBenefit: adjustCompBenefit(p.compBenefit, priceFactor)
      };
      const drAdj = calcDerived(pAdj);
      const snap = calcT8Snapshot(pAdj, drAdj);
      row.push({ priceDelta, costDelta, irr: snap.irr, profit: snap.totalProfit });
    }
    matrix.push(row);
  }

  // ─── 彈性指數 ───
  // 售價彈性 = (IRR 隨售價 +10% 的變化幅度) / 10%
  // 造價彈性 = (IRR 隨造價 +10% 的變化幅度) / 10%
  // 用 ±range 端點計算 (與 0 比較)
  const centerCell = matrix[2][2];  // ±0%, ±0%
  const baseIRR = centerCell?.irr;
  const baseProfit = centerCell?.profit;

  // 售價彈性 (固定造價 ±0%, 售價 +range%)
  const priceUpCell = matrix[4][2];  // priceDelta = +range, costDelta = 0
  const priceDownCell = matrix[0][2];
  let priceElasticityIRR = null;
  let priceElasticityProfit = null;
  if (baseIRR != null && priceUpCell?.irr != null && baseIRR !== 0) {
    priceElasticityIRR = ((priceUpCell.irr - baseIRR) / Math.abs(baseIRR)) / (range/100);
  }
  if (baseProfit != null && priceUpCell?.profit != null && baseProfit !== 0) {
    priceElasticityProfit = ((priceUpCell.profit - baseProfit) / Math.abs(baseProfit)) / (range/100);
  }

  // 造價彈性 (固定售價 ±0%, 造價 +range%)
  const costUpCell = matrix[2][4];
  const costDownCell = matrix[2][0];
  let costElasticityIRR = null;
  let costElasticityProfit = null;
  if (baseIRR != null && costUpCell?.irr != null && baseIRR !== 0) {
    costElasticityIRR = ((costUpCell.irr - baseIRR) / Math.abs(baseIRR)) / (range/100);
  }
  if (baseProfit != null && costUpCell?.profit != null && baseProfit !== 0) {
    costElasticityProfit = ((costUpCell.profit - baseProfit) / Math.abs(baseProfit)) / (range/100);
  }

  // ─── 臨界點分析 ───
  // metric 選項:
  //   "profit"         = 含長期收益的總淨利 = 0
  //   "devOnlyProfit"  = 純開發評估淨利 = 0 (不含租金/營業)
  //   "irr"            = IRR = 0
  const findBreakPoint = (varType, target = 0, metric = "profit") => {
    // 在較大範圍 (-50%~+50%) 內搜尋
    const wideSteps = [];
    for (let d = -50; d <= 50; d += 2.5) wideSteps.push(d);
    let lastVal = null, lastDelta = null;
    for (const delta of wideSteps) {
      const priceFactor = varType === "price" ? (1 + delta/100) : 1;
      const newCo = varType === "cost"
        ? {...(ci.co || {}), value: (Number(ci.co?.value) || 0) * (1 + delta/100)}
        : (ci.co || {});
      const pAdj = {
        ...p,
        uP: varType === "price" ? basePrice * priceFactor : basePrice,
        cC: varType === "cost" ? (p.cC || 0) * (1 + delta/100) : (p.cC || 0),
        costItems: {...ci, co: newCo},
        compBenefit: varType === "price" ? adjustCompBenefit(p.compBenefit, priceFactor) : p.compBenefit
      };
      const drA = calcDerived(pAdj);
      const sn = calcT8Snapshot(pAdj, drA);
      const v = metric === "irr" ? sn.irr
              : metric === "devOnlyProfit" ? sn.devOnlyProfit
              : sn.totalProfit;
      if (v == null) continue;
      if (lastVal != null && ((lastVal - target) * (v - target) < 0)) {
        // 線性內插
        const ratio = (target - lastVal) / (v - lastVal);
        return lastDelta + ratio * (delta - lastDelta);
      }
      lastVal = v;
      lastDelta = delta;
    }
    return null;
  };

  // 計算兩組臨界點: 純開發 vs 含長期收益
  const breakPriceForProfit_dev = findBreakPoint("price", 0, "devOnlyProfit");   // 純開發: 售價跌到 X% 淨利=0
  const breakCostForProfit_dev = findBreakPoint("cost", 0, "devOnlyProfit");
  const breakPriceForProfit_full = findBreakPoint("price", 0, "profit");          // 含長期: 售價跌到 X% 淨利=0
  const breakCostForProfit_full = findBreakPoint("cost", 0, "profit");
  const breakPriceForIRR = findBreakPoint("price", 0, "irr");
  const breakCostForIRR = findBreakPoint("cost", 0, "irr");

  return {
    steps, matrix,
    basePrice, baseCost, priceValues, costValues,
    basePerPing, costPerPingValues,
    coMode, coRawValue, totalArea,
    elasticity: {
      priceIRR: priceElasticityIRR,
      priceProfit: priceElasticityProfit,
      costIRR: costElasticityIRR,
      costProfit: costElasticityProfit,
    },
    breakPoints: {
      // 純開發模式
      priceForProfit_dev: breakPriceForProfit_dev,
      costForProfit_dev: breakCostForProfit_dev,
      // 含長期收益模式
      priceForProfit_full: breakPriceForProfit_full,
      costForProfit_full: breakCostForProfit_full,
      // IRR (不分模式, 採用完整 cashflows)
      priceForIRR: breakPriceForIRR,
      costForIRR: breakCostForIRR,
      basePrice, baseCost, basePerPing
    }
  };
}

/* ════════════════════════════════════════
   MONTHLY CASHFLOW (using expense distribution)
════════════════════════════════════════ */
function cMCF(p, dr, sc) {
  const c = sc.cs;
  const eps = p.expPeriods || DEF_EXP_PERIODS;
  const ed = p.expDist || DEF_EXP_DIST;

  const absM = ep => ep.year * 12 + (ep.month - 1);
  const firstAbs = absM(eps[0]);
  const lastAbs = absM(eps[eps.length - 1]);
  const totalM = lastAbs - firstAbs + 4;

  // Build expense array
  const mExp = Array.from({length: totalM}, () => ({de:0,co:0,ad:0,tx:0,mg:0,am:0}));
  for (let pi = 0; pi < eps.length; pi++) {
    const pStart = absM(eps[pi]) - firstAbs;
    const pEnd = pi < eps.length - 1 ? absM(eps[pi+1]) - firstAbs : totalM;
    const span = Math.max(pEnd - pStart, 1);
    EXP_CATS.forEach(cat => {
      const pctVal = (ed[cat.k] || [])[pi] || 0;
      const total = c[cat.k] || 0;
      const monthly = total * pctVal / span;
      for (let m = Math.max(0, pStart); m < Math.min(pEnd, totalM); m++) {
        mExp[m][cat.k] += monthly;
      }
    });
  }

  // Loan draws
  const toIdx = (y, mo) => y * 12 + (mo - 1) - firstAbs;
  const llT = sc.ll, clT = sc.cl;
  const lD = new Array(totalM).fill(0);
  (p.landLoanSched || []).forEach(s => {
    const idx = toIdx(s.year, s.month);
    if (idx >= 0 && idx < totalM) lD[idx] += llT * s.ratio;
  });
  const cD = new Array(totalM).fill(0);
  (p.constLoanSched || []).forEach(s => {
    const idx = toIdx(s.year, s.month);
    if (idx >= 0 && idx < totalM) cD[idx] += clT * s.ratio;
  });

  // Sales income
  const ss = p.salesSched || [];
  const tSR = ss.reduce((a,s) => a + s.ratio, 0) || 1;
  const incArr = new Array(totalM).fill(0);
  ss.forEach(s => {
    const r = s.ratio / tSR;
    const sellAmt = sc.sh * r;
    const sIdx = toIdx(s.year, s.month);
    for (let d = 0; d < 3; d++) {
      const idx = sIdx + d;
      if (idx >= 0 && idx < totalM) incArr[idx] += sellAmt * p.depR / 3;
    }
    const cIdx = toIdx(eps[eps.length-1].year, eps[eps.length-1].month);
    for (let d = 0; d < 3; d++) {
      const idx = cIdx + d;
      if (idx >= 0 && idx < totalM) incArr[idx] += sellAmt * p.comR / 3;
    }
  });

  let llBal = 0, clBal = 0, cm = 0;
  const mLR = p.lLR / 12, mCR = p.cLR / 12;
  const months = [];

  for (let m = 0; m < totalM; m++) {
    const a = firstAbs + m;
    const yr = Math.floor(a / 12);
    const mo = a % 12 + 1;
    const label = yr + "/" + String(mo).padStart(2, '0');
    let phase = "";
    for (let pi = eps.length - 1; pi >= 0; pi--) {
      if (m >= absM(eps[pi]) - firstAbs) { phase = eps[pi].label; break; }
    }

    const income = incArr[m] || 0;
    const expenseBase = Object.values(mExp[m] || {}).reduce((a,b) => a+b, 0);
    const ld = lD[m] || 0, cd2 = cD[m] || 0;
    llBal += ld; clBal += cd2;
    const loanDraw = ld + cd2;
    let loanRepay = 0;
    if (m === totalM - 1) { loanRepay = llBal + clBal; }
    const interest = llBal * mLR + clBal * mCR;
    const lastPIdx = absM(eps[eps.length-1]) - firstAbs;
    const taxExp = m === lastPIdx ? sc.itx : 0;
    const totalExp = expenseBase + interest + taxExp;
    const init = m === 0 ? (p.initCash || 3000) : 0;
    const net = init + income - totalExp + loanDraw - loanRepay;
    cm += net;
    months.push({m, label, year: yr, month: mo, phase, income, expense: totalExp, loanDraw, loanRepay, interest, init, net, cm});
  }
  const minBal = Math.min(...months.map(x => x.cm));
  const maxGap = minBal < 0 ? Math.abs(minBal) : 0;
  return {months, minBal, maxGap, totalM};
}

   UI COMPONENT HELPERS

const Card = ({title, accent="bg-slate-700", icon, extra, children, className=""}) => (
  <div className={"rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden bg-white " + className}>
    {title && <div className={"px-4 py-2.5 " + accent + " flex items-center gap-2"}>
      {icon && (typeof icon === "string" ? <Icon name={icon} size={16} className="text-white"/> : icon)}
      <h3 className="font-bold text-white text-sm flex-1">{title}</h3>
      {extra}
    </div>}
    <div className="px-4 py-3">{children}</div>
  </div>
);
// Lucide icon wrapper. 用 lucide.icons + lucide.createElement 把 SVG 塞進 span ref.
// 使用方式: <Icon name="settings" size={18} className="text-sky-300"/>
// 名稱使用 kebab-case (對應 https://lucide.dev/icons), 內部自動轉 PascalCase 查詢
function Icon({name, size=14, strokeWidth=2, className=""}) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.split("-").map(s => s.charAt(0).toUpperCase() + s.slice(1)).join("");
    const data = window.lucide.icons && window.lucide.icons[key];
    if (!data) { ref.current.textContent = "?"; return; }
    ref.current.innerHTML = "";
    const svg = window.lucide.createElement(data);
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    svg.setAttribute("stroke-width", strokeWidth);
    ref.current.appendChild(svg);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={"inline-flex items-center justify-center align-middle shrink-0 " + className} style={{width:size, height:size}}/>;
}

const KPI = ({label, value, unit, color="text-slate-800", bg="bg-white"}) => (
  <div className={bg + " rounded-2xl p-4 border shadow-sm"}>
    <div className="text-[11px] text-slate-500 mb-0.5">{label}</div>
    <div className={"text-2xl font-black " + color}>{value}{unit && <span className="text-xs ml-1 opacity-60">{unit}</span>}</div>
  </div>
);
const NI = ({value, onChange, className="", ...r}) => {
  // 內部 state 保留使用者輸入的字串 (含過渡狀態如 "", "0.", "-")
  const [localStr, setLocalStr] = useState(() => String(value ?? 0));
  // 標記是否為「使用者正在輸入中」(focused), 以避免外部更新覆寫
  const [isFocused, setIsFocused] = useState(false);

  // 外部 value 變更時, 同步到 localStr (但僅在非聚焦狀態下)
  useEffect(() => {
    if (!isFocused) {
      const numLocal = parseFloat(localStr);
      const numExternal = Number(value);
      // 數值不同才更新顯示 (避免 0 與 "0.00" 的不必要重設)
      if (isNaN(numLocal) || Math.abs(numLocal - numExternal) > 1e-9) {
        setLocalStr(String(value ?? 0));
      }
    }
  }, [value]);

  const handleChange = (e) => {
    const raw = e.target.value;
    setLocalStr(raw);  // 不論如何先存入 (保留過渡狀態)
    // 嘗試解析為數字並通知外部
    if (raw === "" || raw === "-" || raw === ".") {
      onChange(0);  // 空字串視為 0, 但 localStr 保留為 "" 讓使用者繼續輸入
    } else {
      const n = parseFloat(raw);
      if (!isNaN(n)) onChange(n);
    }
  };

  const handleBlur = () => {
    setIsFocused(false);
    // 失焦時, 把 localStr 規範化為合法數字
    if (localStr === "" || localStr === "-" || localStr === "." || isNaN(parseFloat(localStr))) {
      setLocalStr("0");
      onChange(0);
    } else {
      const n = parseFloat(localStr);
      setLocalStr(String(n));
      onChange(n);
    }
  };

  return (
    <input type="number" value={localStr}
      onChange={handleChange}
      onFocus={() => setIsFocused(true)}
      onBlur={handleBlur}
      className={"field-sizing-content w-full text-right px-2 py-1 border border-sky-300 rounded-lg bg-sky-50 text-sky-900 font-semibold text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 " + className} {...r}/>
  );
};

// PctInput: 百分比輸入框 (stateful, 支援小數點 2 位精度)
// value: 0~1 (decimal); 顯示為 0~100 (%)
const PctInput = ({value, onChange, className="", step="0.01", min=0, max=100, ...r}) => {
  const [localStr, setLocalStr] = useState(() => (((Number(value)||0)*100).toFixed(2)));
  const [isFocused, setIsFocused] = useState(false);

  useEffect(() => {
    if (!isFocused) {
      const target = ((Number(value)||0)*100).toFixed(2);
      const curNum = parseFloat(localStr);
      const targetNum = parseFloat(target);
      if (isNaN(curNum) || Math.abs(curNum - targetNum) > 1e-6) {
        setLocalStr(target);
      }
    }
  }, [value]);

  const handleChange = (e) => {
    const raw = e.target.value;
    setLocalStr(raw);
    if (raw === "" || raw === "-" || raw === ".") { onChange(0); return; }
    const n = parseFloat(raw);
    if (!isNaN(n)) {
      const clamped = Math.max(min, Math.min(max, n));
      onChange(clamped / 100);
    }
  };

  const handleBlur = () => {
    setIsFocused(false);
    const n = parseFloat(localStr);
    if (isNaN(n)) { setLocalStr("0.00"); onChange(0); }
    else {
      const clamped = Math.max(min, Math.min(max, n));
      setLocalStr(clamped.toFixed(2));
      onChange(clamped / 100);
    }
  };

  return (
    <input type="number" value={localStr} step={step} min={min} max={max}
      onChange={handleChange}
      onFocus={() => setIsFocused(true)}
      onBlur={handleBlur}
      className={"field-sizing-content w-full " + className} {...r}/>
  );
};
const Chk = ({ck, onChange, l, sub, disabled=false}) => (
  <label className={"flex items-start gap-2 " + (disabled ? "opacity-50 cursor-not-allowed" : "cursor-pointer")}>
    <input type="checkbox" checked={ck} disabled={disabled} onChange={e => onChange(e.target.checked)} className="mt-0.5 w-4 h-4 rounded border-slate-300 text-sky-600"/>
    <div><span className="text-sm font-semibold text-slate-700">{l}</span>{sub && <div className="text-[10px] text-slate-400">{sub}</div>}</div>
  </label>
);
const SO = ({v, fn, opts, className=""}) => (
  <select value={v} onChange={e => fn(e.target.value)}
    className={"px-2 py-1.5 border border-sky-300 rounded-lg bg-sky-50 text-sky-900 font-semibold text-sm w-full focus:outline-none focus:ring-2 focus:ring-sky-400 " + className}>
    {opts.map(o => <option key={typeof o==="string"?o:o.v} value={typeof o==="string"?o:o.v}>{typeof o==="string"?o:o.l}</option>)}
  </select>
);
const Btn = ({onClick, children, color="bg-sky-600 hover:bg-sky-700", className=""}) => (
  <button onClick={onClick} className={"px-3 py-1.5 rounded-lg text-white text-xs font-bold shadow-sm transition-colors " + color + " " + className}>{children}</button>
);
const BtnDel = ({onClick}) => (
  <button onClick={onClick} className="text-slate-400 hover:text-rose-500 leading-none transition-colors inline-flex items-center" title="刪除"><Icon name="x" size={14}/></button>

const ExtLink = ({href, children}) => (

function AuthScreen({onAuthed}) {
  const [userId, setUserId] = useState("");

  const [busy, setBusy] = useState(false);

  // 隨機產生建議 USERID
  const genSuggested = () => "user_" + Math.random().toString(36).slice(2, 8);

  const submit = async () => {
    setErr("");
    if (busy) return;
    const uid = (userId || "").trim();
    if (!uid) { setErr("請輸入 USERID"); return; }
    if (uid.length < 3) { setErr("USERID 至少 3 個字元"); return; }
    if (!/^[A-Za-z0-9_-]+$/.test(uid)) { setErr("USERID 只能包含英數字、底線、連字號"); return; }
    setBusy(true);
    try {
      // 首次使用此 USERID → 嘗試從後端載入既有專案 (若有)
      const session = { userId: uid, loginAt: Date.now() };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      // 每次登入都從後端拉所有專案, 雲端為主合併本地
      try {
        const cloud = await apiClient.listProjects(uid);
        if (cloud && cloud.length > 0) {
          const localProjs = store.listProjects(uid);
          cloud.forEach(c => {
            const existing = localProjs.find(pr => pr.cloudPid === c.pid);
            const name = (c.data && c.data._name) || existing?.name || ("雲端專案_" + c.pid.slice(0,6));
            store.saveProject(uid, {
              id: existing?.id,
              name,
              data: c.data,
              cloudPid: c.pid
            });
          });
        } else if (store.listProjects(uid).length === 0) {
          // 雲端與本地都空 → 撒範例
          seedSampleProject(uid);
        }
      } catch (e) {
        // 後端取不到 (可能斷網) → 若本地也空才撒範例
        if (store.listProjects(uid).length === 0) seedSampleProject(uid);
      }
      onAuthed(session);

          <p style={{color:"rgba(125,211,252,0.5)",fontSize:10,letterSpacing:"0.3em",marginTop:4}}>TAIWAN DIGITAL CONSTRUCTION BRAIN</p>
        </div>

        <div style={{background:"rgba(255,255,255,0.08)",borderRadius:16,padding:24,border:"1px solid rgba(255,255,255,0.15)"}}>
          <div style={{marginBottom:16}}>

            <input type="text" value={userId} autoComplete="username"

/* ════════════════════════════════════════
   CostItemRow: 單一成本項目編輯列 (外部穩定元件)
   提取為外部元件, 避免每次 render 重建導致 NI 失焦/卡頓
════════════════════════════════════════ */
const COST_MODES = [
  {v:"perPing",  l:"萬/坪"   , unit:"萬/坪", baseLabel:"總銷面積"},
  {v:"pctSales", l:"% 總銷"  , unit:"%",     baseLabel:"總銷金額"},
  {v:"pctCost",  l:"% 造價"  , unit:"%",     baseLabel:"總造價"},
  {v:"fixed",    l:"固定金額" , unit:"萬",    baseLabel:""},
  {v:"auto",     l:"自動"    , unit:"",      baseLabel:""},
];
function CostItemRow({item, label, isCustom, customId, ctx, updStd, updCustom, delCustom}) {
  if (!item) return null;
  const mode = item.mode || "pctSales";
  const value = Number(item.value) || 0;
  const amount = calcCostItemValue(item, ctx);
  const isPercent = mode === "pctSales" || mode === "pctCost";
  const isAuto = mode === "auto";
  const onChangeMode = (newMode) => {
    if (isCustom) updCustom(customId, "mode", newMode);
    else updStd(item._stdKey, "mode", newMode);
  };
  const onChangeValue = (v) => {
    if (isCustom) updCustom(customId, "value", v);
    else updStd(item._stdKey, "value", v);
  };
  const itemType = getItemType(item);
  return (
    <div className="grid grid-cols-14 gap-1 items-center py-1 border-b border-slate-100 text-[12px]" style={{gridTemplateColumns:"repeat(14, minmax(0, 1fr))"}}>
      <div className="col-span-3 text-slate-600 truncate">
        {isCustom ? (
          <input type="text" value={item.label} onChange={e=>updCustom(customId,"label",e.target.value)}
            className="w-full bg-transparent border-b border-dashed border-slate-300 focus:outline-none focus:border-slate-500"/>
        ) : label}
      </div>
      <div className="col-span-3">
        <select value={mode} onChange={e=>onChangeMode(e.target.value)}
          className="w-full text-[10px] border rounded px-1 py-0.5 bg-slate-50">
          {COST_MODES.filter(m => isCustom ? m.v !== "auto" : true).map(m => (
            <option key={m.v} value={m.v}>{m.l}</option>
          ))}
        </select>
      </div>
      <div className="col-span-3">
        {isAuto ? (
          <span className="text-[10px] text-slate-400 italic">系統自動計算</span>
        ) : (
          <div className="flex items-center gap-1">
            <NI value={isPercent ? value*100 : value}
                onChange={v => onChangeValue(isPercent ? v/100 : v)}
                step={isPercent ? 0.5 : (mode === "perPing" ? 1 : 100)}
                className="w-full text-xs"/>
            <span className="text-[10px] text-slate-400 w-8">{COST_MODES.find(m=>m.v===mode)?.unit}</span>
          </div>
        )}
      </div>
      <div className="col-span-2 text-right text-[11px] font-mono text-amber-700">
        {isAuto ? "—" : "= "+fmt(amount)}
      </div>
      <div className="col-span-2">
        {isCustom ? (
          <select value={itemType} onChange={e => updCustom(customId, "type", e.target.value)}
            className="w-full text-[9px] border rounded px-1 py-0.5 bg-slate-50">
            <option value="expense">一般費用</option>
            <option value="transfer_to_builder">地主付/建商收</option>
          </select>
        ) : (
          <span className="text-[9px] text-slate-400 italic">一般費用</span>
        )}
      </div>
      <div className="col-span-1 text-center">
        {isCustom && (
          <button onClick={()=>delCustom(customId)}
            className="text-rose-400 hover:text-rose-600"><Icon name="x" size={12}/></button>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   CostItemsEditor: 「四」用的成本項目編輯器
   支援 7 項標準 + 自訂項目, 多種輸入模式
════════════════════════════════════════ */
function CostItemsEditor({p, sP, dr}) {
  const ci = getCostItems(p);
  const cci = getCustomCostItems(p);
  const [customExpanded, setCustomExpanded] = useState(false);

  // 估算總銷、總造價、總面積供「即時換算」顯示
  const sales = dr.ts;
  const totalArea = dr.totalArea;
  // 估算 cf (用 co 的萬/坪估算; 因為 cf 本身就依賴 co)
  const coVal = ci.co?.mode === "perPing" ? (Number(ci.co.value)||0) * totalArea
              : ci.co?.mode === "fixed"   ? (Number(ci.co.value)||0)
              : ci.co?.mode === "pctSales"? (Number(ci.co.value)||0) * sales
              : 0;
  const ctx = { sales, totalArea, totalCost: coVal };

  // 更新標準項目
  const updStd = (key, k, v) => {
    const newCI = {...ci, [key]: {...(ci[key]||{}), [k]: v}};
    sP({...p, costItems: newCI});
  };
  // 更新自訂項目
  const updCustom = (id, k, v) => {
    const newCCI = cci.map(c => c.id === id ? {...c, [k]: v} : c);
    sP({...p, customCostItems: newCCI});
  };
  // 新增自訂項目
  const addCustom = () => {
    const newId = uid();
    const newItem = {
      id: newId, key: "cu_"+newId, label: "新項目", mode: "fixed", value: 0,
      expDist: [0, 0, 0, 0, 0, 1.0]  // 預設 100% 在最後階段 (交屋)
    };
    sP({...p, customCostItems: [...cci, newItem]});
  };
  // 刪除自訂項目
  const delCustom = (id) => {
    if (!window.confirm("刪除此自訂項目?")) return;
    sP({...p, customCostItems: cci.filter(c => c.id !== id)});
  };


  // 計算總成本 (供顯示)
  const totalStd = STD_COST_KEYS.reduce((s,k) => s + calcCostItemValue(ci[k], ctx), 0);
  const totalCustom = cci.reduce((s,c) => s + calcCostItemValue(c, ctx), 0);
  const grandTotal = totalStd + totalCustom;

  return (
    <div className="space-y-3">
      {/* 表頭 */}
      <div className="grid grid-cols-14 gap-1 items-center text-[10px] font-bold text-slate-400 border-b-2 pb-1" style={{gridTemplateColumns:"repeat(14, minmax(0, 1fr))"}}>
        <div className="col-span-3">項目</div>
        <div className="col-span-3">計算模式</div>
        <div className="col-span-3">數值</div>
        <div className="col-span-2 text-right">換算金額</div>
        <div className="col-span-2">類型</div>
        <div className="col-span-1 text-center"></div>
      </div>

      {/* 標準 7 項 */}
      <div className="space-y-0">
        {STD_COST_KEYS.map(k => (
          <CostItemRow key={k} item={{...ci[k], _stdKey: k}} label={STD_COST_LABELS[k]} isCustom={false}
            ctx={ctx} updStd={updStd} updCustom={updCustom} delCustom={delCustom}/>
        ))}
      </div>

      {/* 自訂項目 (預設摺疊) */}
      <div className="mt-2">
        <button onClick={()=>setCustomExpanded(!customExpanded)}
          className="text-xs font-bold text-sky-700 hover:text-sky-900 flex items-center gap-1">
          {customExpanded ? "▼" : "▶"} 自訂額外成本項目 ({cci.length} 筆)
        </button>
        {customExpanded && (
          <div className="mt-2 ml-3 pl-2 border-l-2 border-sky-300">
            {cci.length === 0 && (
              <div className="text-[11px] text-slate-400 italic mb-2">無自訂項目, 點下方按鈕新增</div>
            )}
            {cci.map(c => (
              <CostItemRow key={c.id} item={c} label={c.label} isCustom={true} customId={c.id}
                ctx={ctx} updStd={updStd} updCustom={updCustom} delCustom={delCustom}/>
            ))}
            <button onClick={addCustom}
              className="mt-2 px-2 py-1 bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-bold rounded">
              + 新增成本項目
            </button>
          </div>
        )}
      </div>

      {/* 總計 */}
      <div className="mt-2 pt-2 border-t-2 border-slate-300 grid grid-cols-14 gap-1 text-xs" style={{gridTemplateColumns:"repeat(14, minmax(0, 1fr))"}}>
        <div className="col-span-3 font-bold text-slate-700">建商成本合計</div>
        <div className="col-span-3"></div>
        <div className="col-span-3 text-[10px] text-slate-500">(不含利息, 利息自動)</div>
        <div className="col-span-2 text-right font-mono font-bold text-amber-700">= {fmt(grandTotal)} 萬</div>
        <div className="col-span-3"></div>
      </div>
    </div>
  );
}

                      });

                      sP({...p, jb: true, ownerHoldings: p.ownerHoldings.map(x => x.id === h.id ? {...x, ownerId: val} : x)});
                    }
                  };

                  };

                      <td className="px-1 py-1">
                        <div className="flex items-center gap-0.5">
