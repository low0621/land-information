/* ════════════════════════════════════════
   經營行為編輯 Dialog (自 v109, 階段 2)
   - 純輸入元件 (不顯示即時計算, 結果看 T2 cell)
   - 基準情境 (compBenefit) 與自訂情境共用
   - data: compBenefit-like 物件 { disposals[], rent{}, business{}, holdYears, 全域參數, volTransfer{} }
   - onChange(newData): 回傳更新後的完整物件
   - onClose(): 關閉
════════════════════════════════════════ */
function CompBenefitDialog({ title, data, defaultPrice, catOptions, typeDetail, onChange, onClose, inline }) {
  const d = data || {};
  const disposals = d.disposals || [];
  const rent = d.rent || {};
  const business = d.business || {};
  const vt = d.volTransfer || {};
  // 自 v114 (階段3a): 類型選項 (房屋類別, 供處分/租金/營業標記)
  const cats = catOptions || [];
  const catUPof = (k) => { const c = cats.find(x => x.catKey === k); return c ? Number(c.uP)||0 : 0; };

  // 自 v224: 輸入時畫面自動上跳修正 — 根因是這個表單很長，任一欄位變動都會觸發整個 T2 重算，
  //   上方其他區塊（建議價、警告訊息等）的內容高度可能跟著變化，把使用者正在打字的欄位擠上去/下去。
  //   修法：用事件捕獲（onInputCapture）記錄目前聚焦欄位在畫面上的位置，
  //   DOM 更新完成後（useLayoutEffect，畫面重繪前）立即補償捲動高度差，讓輸入框視覺上維持原位，
  //   不論是哪一段內容造成高度變化都能抵銷，不需要逐一排查每個警告區塊。
  const _cbdContainerRef = React.useRef(null);
  const _cbdFocusRectRef = React.useRef(null);
  const _cbdCaptureFocusRect = () => {
    const active = document.activeElement;
    if (active && _cbdContainerRef.current && _cbdContainerRef.current.contains(active)) {
      _cbdFocusRectRef.current = active.getBoundingClientRect();
    }
  };
  React.useLayoutEffect(() => {
    if (!_cbdFocusRectRef.current) return;
    const active = document.activeElement;
    if (active && _cbdContainerRef.current && _cbdContainerRef.current.contains(active)) {
      const newRect = active.getBoundingClientRect();
      const delta = newRect.top - _cbdFocusRectRef.current.top;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
      _cbdFocusRectRef.current = newRect;
    }
  });

  // ── 更新 helpers ──
  const patch = (k, v) => onChange({...d, [k]: v});
  const patchRent = (k, v) => onChange({...d, rent: {...rent, [k]: v}});
  const patchBiz = (k, v) => onChange({...d, business: {...business, [k]: v}});
  const patchVT = (k, v) => onChange({...d, volTransfer: {...vt, [k]: v}});
  // 自 v225: 純售地情境 — 與 rent/business/volTransfer 同構的 patch helper
  const pls = d.pureLandSale || {};
  const patchPLS = (k, v) => onChange({...d, pureLandSale: {...pls, [k]: v}});

  // 處分多筆
  const updDisposal = (id, k, v) => {
    // 自 v114: _setCatPrice 複合動作 (同時設 catKey + 帶預設單價)
    if (k === "_setCatPrice") {
      onChange({...d, disposals: disposals.map(x => x.id === id ? {...x, catKey: v.catKey, price: (Number(v.price)>0 ? v.price : x.price)} : x)});
      return;
    }
    onChange({...d, disposals: disposals.map(x => x.id === id ? {...x, [k]: v} : x)});
  };
  const addDisposal = () => {
    const maxId = disposals.reduce((a,x) => Math.max(a, x.id||0), 0);
    onChange({...d, disposals: [...disposals, {id: maxId+1, label: `第${disposals.length+1}筆`, year: 2030, month: 6, areaMode: "ratio", areaPct: 100, area: 0, price: 0, enabled: true, useSuggested: false}]});
  };
  const delDisposal = (id) => {
    const list = disposals.filter(x => x.id !== id);
    onChange({...d, disposals: list.length>0 ? list : [{id:1, label:"完工出售", year:2028, month:6, area:0, price:0, enabled:true, useSuggested:false}]});
  };

  // 容移額外成本/收益
  const addVTCost = () => {
    const list = vt.extraCosts || [];
    const maxId = list.reduce((a,c) => Math.max(a, c.id||0), 0);
    patchVT("extraCosts", [...list, {id: maxId+1, label: "", amount: 0}]);
  };
  const updVTCost = (id, k, v) => patchVT("extraCosts", (vt.extraCosts||[]).map(c => c.id===id?{...c,[k]:v}:c));
  const delVTCost = (id) => patchVT("extraCosts", (vt.extraCosts||[]).filter(c => c.id!==id));
  const addVTRev = () => {
    const list = vt.extraRevenues || [];
    const maxId = list.reduce((a,c) => Math.max(a, c.id||0), 0);
    patchVT("extraRevenues", [...list, {id: maxId+1, label: "", amount: 0}]);
  };
  const updVTRev = (id, k, v) => patchVT("extraRevenues", (vt.extraRevenues||[]).map(c => c.id===id?{...c,[k]:v}:c));
  const delVTRev = (id) => patchVT("extraRevenues", (vt.extraRevenues||[]).filter(c => c.id!==id));

  const stop = (e) => e.stopPropagation();

  // 自 v223 修正：移除 Wrapper 內部元件定義。
  //   根因：Wrapper 在 CompBenefitDialog 函式內部宣告，每次 render（每打一個字就會觸發一次）
  //   都會產生一個全新的函式參照，React 依函式參照判斷元件類型，誤判為「不同元件」，
  //   導致 <Wrapper> 包住的整個內容（所有輸入欄位）被完整卸載再重新掛載，
  //   使用中的輸入框因此失去焦點，瀏覽器捲動位置隨之重置，造成畫面「自動上跳」。
  //   修法：不再用獨立的元件函式包裝，改成直接用變數存內容，最後依 inline 條件決定外殼，
  //   內容本身的 DOM 結構在每次 render 之間保持穩定，不會被卸載重掛。
  const dialogContent = (
    <>
          {/* 自 v145: 自由組合分類型部位明細 (分析目標; 群組則加總) */}
          {typeDetail && (typeDetail.areas.length > 0 || typeDetail.counts.length > 0) && (
            <div className="bg-indigo-50 rounded-xl border-2 border-indigo-200 p-3">
              <div className="text-sm font-bold text-indigo-800 mb-2 inline-flex items-center gap-1.5">
                <Icon name="grid-3x3" size={13}/> 分回部位明細 (自由組合)
                {typeDetail.isGroup && <span className="text-[10px] font-normal text-indigo-500">· 群組 {typeDetail.memberCount} 位成員加總</span>}
              </div>
              <div className="flex flex-wrap gap-2">
                {typeDetail.areas.map((x, i) => (
                  <div key={"a"+i} className="bg-white rounded-lg border border-indigo-200 px-2.5 py-1.5">
                    <div className="text-[10px] text-slate-500">{x.label}</div>
                    <div className="text-sm font-black font-mono text-indigo-700">{fmt2(x.area)} <span className="text-[10px] font-normal text-slate-400">坪</span></div>
                  </div>
                ))}
                {typeDetail.counts.map((x, i) => (
                  <div key={"c"+i} className="bg-white rounded-lg border border-amber-200 px-2.5 py-1.5">
                    <div className="text-[10px] text-slate-500">{x.label}</div>

/* ════════════════════════════════════════
   分配方案·自由組合編輯 Dialog (自 v113, 階段 2)
   - 編輯某分配方案的 shareComposition (各角色 byRole)
   - p, asc: 用於算該方案的角色比例與獲配價值基準
   - onChange(newByRole): 回傳更新後的 byRole
   - onClose()
════════════════════════════════════════ */
function ShareCompositionDialog({ title, p, asc, onChange, onClose }) {
  // 用 applyAllocScenario 算該方案的角色比例 + shareInfo (含 allocValue/組合統計)
  const tempP = applyAllocScenario(p, asc);
  const drTemp = calcDerived(tempP);
  const sm = drTemp.salesMix;
  const byRole = (asc.shareComposition && asc.shareComposition.byRole) || {};

  const houseCats = [
    { catKey: "res",    label: sm.res.label    || "住宅", uP: sm.res.uP },
    { catKey: "retail", label: sm.retail.label || "店面", uP: sm.retail.uP },
    { catKey: "office", label: sm.office.label || "辦公", uP: sm.office.uP },
    ...(sm.customCategories || []).map(c => ({ catKey: c.id, label: c.label, uP: c.uP }))
  ];
  const parkCats = [
    { catKey: "park_flat", label: "平面車位", uP: sm.flat.uP },
    { catKey: "park_mech", label: "機械車位", uP: sm.mechanical.uP }
  ];
  const allCats = [...houseCats, ...parkCats];
  const catInfo = (k) => allCats.find(c => c.catKey === k);

  // 角色清單 (建商 + 各地主)
  const roles = [{ key: "builder", label: "建商", ratio: drTemp.builderRatio }];
  if (p.jb) (tempP.owners||[]).forEach(o => roles.push({ key: "owner_"+o.id, label: o.name, ratio: o.ratio }));

  const getComp = (key) => byRole[key] || { mode: "auto", items: [] };
  const setComp = (key, comp) => onChange({ ...byRole, [key]: comp });
  const setMode = (key, mode) => setComp(key, { ...getComp(key), mode });
  const addItem = (key, catKey) => {
    const c = getComp(key);
    const isPark = catKey.startsWith("park_");
    setComp(key, { ...c, mode: "manual", items: [...(c.items||[]), isPark ? {catKey, mode:"fixed", count:0} : {catKey, mode:"fixed", area:0}] });
  };
  const updItem = (key, idx, field, val) => {
    const c = getComp(key);
    setComp(key, { ...c, items: (c.items||[]).map((it,i)=>i===idx?{...it,[field]:val}:it) });
  };
  const delItem = (key, idx) => {
    const c = getComp(key);
    setComp(key, { ...c, items: (c.items||[]).filter((_,i)=>i!==idx) });
  };
  const stop = (e) => e.stopPropagation();

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:9000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 12px"}}>

          </div>

            const comp = getComp(r.key);
            const isManual = comp.mode === "manual";
            const rec = (drTemp.shareInfo||[]).find(x => x.key === r.key);
            const allocValue = rec ? rec.allocValue : 0;
            // 自 v122: ratio 模式 → 價值 = ratio × allocValue, 面積 = 價值 ÷ 單價
            const itemCalc = (it) => {
              const ci = catInfo(it.catKey); const up = Number(ci?.uP)||0;
              const isPark = it.catKey.startsWith("park_");
              if (it.mode === "ratio") { const val = (Number(it.ratio)||0)*allocValue; return { qty: up>0?val/up:0, val, isPark }; }
              const qty = isPark ? (Number(it.count)||0) : (Number(it.area)||0);
              return { qty, val: qty*up, isPark };
            };
            let compArea = 0, compValue = 0;
            (comp.items||[]).forEach(it => {
              const ci = catInfo(it.catKey); if (!ci) return;
              const rr = itemCalc(it);
              if (!rr.isPark) compArea += rr.qty;
              compValue += rr.val;

                    <button onClick={()=>setMode(r.key,"manual")}
                      className={"px-2 py-0.5 text-[10px] font-bold border rounded-r border-l-0 "+(isManual?"bg-violet-500 text-white border-violet-600":"bg-white text-slate-600 border-slate-300")}>自由組合</button>

                </div>
                {!isManual ? (
                  <div className="text-[10px] text-slate-500 italic bg-white rounded p-2 border">

                ) : (
                  <div className="space-y-2">
                    {(comp.items||[]).length === 0 ? (
                      <div className="text-[10px] text-slate-400 italic text-center py-1">尚未加入部位</div>
                    ) : (
                      (comp.items||[]).map((it, idx) => {
                        const ci = catInfo(it.catKey);
                        const isPark = it.catKey.startsWith("park_");
                        const isRatioItem = it.mode === "ratio";
                        const rr = itemCalc(it);
                        return (
                          <div key={idx} className="flex items-center gap-1.5 text-[10px] bg-white rounded p-1 border flex-wrap">
                            <span className="font-bold text-slate-700 w-14">{ci ? ci.label : it.catKey}</span>

                              <option value="fixed">{isPark?"固定數":"固定坪"}</option>
                              <option value="ratio">比例</option>
                            </select>
                            {isRatioItem ? (
                              <>
                                <NI value={Math.round((Number(it.ratio)||0)*1000)/10} onChange={v=>updItem(r.key,idx,"ratio",(Number(v)||0)/100)} step={1} className="w-12 text-center"/>
                                <span className="text-[9px] text-slate-400">% → {fmt(rr.qty,1)}{isPark?"個":"坪"}</span>
                              </>
                            ) : (
                              <>
                                <NI value={rr.qty} onChange={v=>updItem(r.key, idx, isPark?"count":"area", Number(v)||0)} step={isPark?1:5} className="w-14 text-center"/>
                                <span className="text-[9px] text-slate-400">{isPark?"個":"坪"}</span>
                              </>
                            )}
                            <span className="text-[9px] text-slate-400">× {fmt2(Number(ci?.uP)||0)}</span>
                            <span className="text-[9px] text-slate-400">=</span>
                            <span className="font-mono font-bold text-violet-700 flex-1 text-right">{fmt(rr.val)} 萬</span>
                            <BtnDel onClick={()=>delItem(r.key, idx)}/>
                          </div>
                        );
                      })
                    )}
                    <div className="flex flex-wrap gap-1">
                      {allCats.map(c => (
                        <button key={c.catKey} onClick={()=>addItem(r.key, c.catKey)}
                          className="px-1.5 py-0.5 text-[9px] bg-violet-100 hover:bg-violet-200 text-violet-700 rounded border border-violet-200">+ {c.label}</button>
                      ))}
                    </div>
                    <div className="grid grid-cols-2 gap-2 pt-1 border-t border-violet-200 text-[10px]">
                      <div><div className="text-slate-500">組合房屋面積</div><div className="font-mono font-bold text-violet-800">{fmt(compArea)} 坪</div></div>
                      <div><div className="text-slate-500">分回單元價值</div><div className="font-mono font-bold text-violet-800">{fmt(compValue)} 萬</div></div>
                      <div><div className="text-slate-500">現金找補 {cashAdjust>=0?"(收)":"(付)"}</div><div className={"font-mono font-bold "+(Math.abs(cashAdjust)<0.5?"text-slate-400":(cashAdjust>0?"text-emerald-600":"text-rose-600"))}>{cashAdjust>0?"+":""}{fmt(cashAdjust)} 萬</div></div>
                      <div><div className="text-slate-500">收益合計 (=應得)</div><div className="font-mono font-bold text-emerald-700">{fmt(compValue+cashAdjust)} 萬</div></div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="flex items-center justify-end gap-2 px-4 py-3 border-t sticky bottom-0 bg-white rounded-b-2xl">
          <div className="flex-1 text-[10px] text-slate-400">變更即時生效於此分配方案</div>
          <button onClick={onClose} className="px-4 py-1.5 bg-slate-700 hover:bg-slate-800 text-white text-sm font-bold rounded-lg">完成</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB: 最優方案模擬 (自 v159 從 T8 投資綜合報告獨立, 計算邏輯不變)
════════════════════════════════════════ */
function TOpt({p, sP}) {
  const dr = calcDerived(p);
  const t8 = p.t8 || { discountRate: 4.0, investBase: "equity", sensitivityRange: 10 };
  const snap = calcT8Snapshot(p, dr);
  // 自 v150 (階段1): 最優方案模擬器設定 (字串狀態, 計算時才夾範圍, 避免輸入跳動)
  const [optHorizon, setOptHorizon] = useState("20");
  const [optReinvestPct, setOptReinvestPct] = useState(String(Number(t8.capitalCostRate) || 1.5));
  const [optMetric, setOptMetric] = useState("irr");  // 自 v158: 預設 IRR (各策略自身報酬, 對齊 KPI 全處分)；僅控制排序與最優解高亮, 不影響候選計算
  // 自 v226: 使用者自選是否把情境E(純售地)/F(容積移轉)納入最優方案比較，預設關閉（避免預期外多出候選）
  const [includePureLandSale, setIncludePureLandSale] = useState(false);
  const [includeVolTransfer, setIncludeVolTransfer] = useState(false);
  const _optH = Math.max(1, Math.min(50, parseInt(optHorizon, 10) || 20));
  const _optRR = Math.max(0, (parseFloat(optReinvestPct) || 0) / 100);
  const optResult = useMemo(() => calcOptimizer(p, dr, {
    horizon: _optH, reinvestRate: _optRR, metric: optMetric,
    includeSpecialScenarios: { pureLandSale: includePureLandSale, volTransfer: includeVolTransfer }
  }), [p, _optH, _optRR, optMetric, includePureLandSale, includeVolTransfer]);

  // 自 v160: 分配組合最優化 state
  const [comboMetric, setComboMetric] = useState("irr");
  const [comboStep, setComboStep] = useState("5");          // 已確認的步長值（onBlur後更新，不跟輸入搶render）
  const [comboStepInput, setComboStepInput] = useState("5"); // 即時顯示用draft
  const [comboCaps, setComboCaps] = useState({});    // { catKey: pct } 已確認的上限值（onBlur後才更新，不跟輸入搶render）
  const [comboCapsInput, setComboCapsInput] = useState({});  // 即時顯示用draft（onChange更新，不觸發重算）
  const [comboCapsMode, setComboCapsMode] = useState({});    // 自 v210: { catKey: "pct"|"area" } 每類別的上限輸入模式，預設"pct"
  const [comboLocked, setComboLocked] = useState({});         // 自 v211: { catKey: true } 該類別是否為「鎖定值」而非「上限」
  // 自 v234: 車位上限/鎖定（數量，允許小數）
  const [parkCapInput, setParkCapInput] = useState("");
  const [parkLockInput, setParkLockInput] = useState("");
  const [parkIsLocked, setParkIsLocked] = useState(false);
  const [showApplyConfirm, setShowApplyConfirm] = useState(false);
  const _comboStep = Math.max(1, Math.min(20, parseInt(comboStep, 10) || 5));
  const comboResult = useMemo(() => {
    const sm = dr.salesMix || {};
    const allCatKeys = ["res","retail","office",...(sm.customCategories||[]).map(c=>c.id)];
    // 自 v211: 依 comboLocked[k] 決定這個值要當「上限(caps)」還是「鎖定值(locks)」傳入
    const caps = allCatKeys.map(k => {
      if (comboLocked[k]) return undefined;  // 鎖定的類別不當上限用
      const v = comboCaps[k];
      return (v !== undefined && v !== "" && !isNaN(Number(v))) ? Number(v) : undefined;
    });
    const locks = allCatKeys.map(k => {
      if (!comboLocked[k]) return undefined;
      const v = comboCaps[k];  // 沿用同一個輸入值（已換算成百分比）
      return (v !== undefined && v !== "" && !isNaN(Number(v))) ? Number(v) : undefined;
    });
    // 自 v234: 車位上限/鎖定（數量，允許小數）
    const parkCap = (!parkIsLocked && parkCapInput !== "" && !isNaN(Number(parkCapInput))) ? Number(parkCapInput) : null;
    const parkLock = (parkIsLocked && parkLockInput !== "" && !isNaN(Number(parkLockInput))) ? Number(parkLockInput) : null;
    return calcComboOptimizer(p, dr, {
      horizon: _optH, reinvestRate: _optRR,
      step: _comboStep, metric: comboMetric,
      caps, locks, parkCap, parkLock
    });
  }, [p, _optH, _optRR, _comboStep, comboMetric, comboCaps, comboLocked, parkCapInput, parkLockInput, parkIsLocked]);
  // 自 v194: 出資與否決策指標
  const [investMetric, setInvestMetric] = useState("irr");
  const investResult = useMemo(() => calcInvestComparison(p, dr, { horizon: _optH, reinvestRate: _optRR, metric: investMetric }), [p, _optH, _optRR, investMetric]);

  // 自 v194: 三區塊可拖拉排序
  const panelOrder = p.optPanelOrder || ["fund", "combo", "scenario"];
  const [dragIdx, setDragIdx] = useState(null);
  const reorderPanels = (fromIdx, toIdx) => {
    const next = [...panelOrder];
    const [moved] = next.splice(fromIdx, 1);
    next.splice(toIdx, 0, moved);
    sP({...p, optPanelOrder: next});
  };
  return (
    <div className="space-y-4">
      {panelOrder.map((key, idx) => {
        const dragProps = {
          draggable: true,
          onDragStart: () => setDragIdx(idx),
          onDragOver: (e) => e.preventDefault(),
          onDrop: () => { if (dragIdx !== null && dragIdx !== idx) reorderPanels(dragIdx, idx); setDragIdx(null); },
          onDragEnd: () => setDragIdx(null),
          style: { cursor: "grab", opacity: dragIdx === idx ? 0.4 : 1 }
        };
        if (key === "fund")     return <div key="fund" {...dragProps}>{renderFundPanel()}</div>;
        if (key === "combo")    return <div key="combo" {...dragProps}>{renderComboPanel()}</div>;
        if (key === "scenario") return <div key="scenario" {...dragProps}>{renderScenarioPanel()}</div>;
        return null;
      })}
    </div>
  );

  // ─── 自 v194: 出資與否決策指標面板 ───
  function renderFundPanel() {

                      <th className={"text-right py-1.5 px-2 cursor-pointer select-none "+(optMetric==="irr"?"text-indigo-700 font-bold":"hover:text-indigo-600")} onClick={()=>setOptMetric("irr")}>IRR {optMetric==="irr"?"▼":""}</th>
                      <th className={"text-right py-1.5 px-2 cursor-pointer select-none "+(optMetric==="roi"?"text-indigo-700 font-bold":"hover:text-indigo-600")} onClick={()=>setOptMetric("roi")}>ROI {optMetric==="roi"?"▼":""}</th>

  // 自 v160: 分配組合最優化
  function renderComboPanel() {
    return (() => {
        const CR = comboResult;
        const irrTxt = (v) => v == null ? "—" : (v*100).toFixed(2) + "%";
        const pct0   = (x) => (x*100).toFixed(0) + "%";
        const pbk    = (y) => !isFinite(y) ? "期內未回本" : y.toFixed(1) + " 年";
        const metricLabel = { mirr:"MIRR", irr:"IRR", roi:"ROI", netProfit:"稅後淨利", payback:"回收年數" };
        const metricVal   = (res) => {
          if (!res) return "—";
          if (comboMetric==="payback")   return pbk(res.payback);
          if (comboMetric==="roi")       return pct0(res.roi);
          if (comboMetric==="irr")       return irrTxt(res.irr);
          if (comboMetric==="netProfit") return fmt(res.netProfit) + " 萬";
          return (res.mirr*100).toFixed(2)+"%";
        };
        const stratLabel  = { sell:"售出", rent:"長租", business:"自營" };
        const stratColor  = { sell:"bg-sky-100 text-sky-800", rent:"bg-amber-100 text-amber-800", business:"bg-violet-100 text-violet-800" };

        // 套用最優組合到 shareComposition
        // 自 v212: applyBest 完整重寫 — 把最優解的四個維度（ratios/strats/Y/parkCnt）
        //   完整轉換進 compBenefit，不再只套用 ratios 導致「套用後損益跟最優化承諾的數字對不上」。
        //   轉換規則：
        //   ① mode 改為 "longHold"（必須，才能同時容納多筆disposals+rent+business）
        //   ② strats[i]==="sell" → 立即出售，加一筆 disposals（saleYear）
        //   ③ strats[i]==="rent"/"business" → 面積歸入對應 rent/business 設定（catKey留空=不限類型，
        //      因為 rent/business 各只有一組設定，若多類別同選rent，只能合併，用「不限類型」處理）
        //      + 持有期滿(saleYear+Y)後再加一筆 disposals 出售
        //   ④ 車位(parkCnt) → 立即出售 parkCnt 個，加一筆 disposals（catKey="park_flat"優先）
        const applyBest = () => {
          if (!CR || CR.skipped || !CR.best) return;
          const myRole = p.myRole || "builder";
          const { ratios, strats, Y, parkCnt } = CR.best;
          const saleYear = CR.saleYear;
          const disposals = [];
          let dispId = 1;
          const rentCats = [], bizCats = [];

          CR.allCats.forEach((c, i) => {
            if (!(ratios[i] > 0)) return;
            const strat = strats[i];
            if (strat === "sell") {
              disposals.push({
                id: dispId++, label: `${c.label}(立即出售)`,
                year: saleYear, month: 6, areaMode: "ratio", areaPct: ratios[i] * 100,
                area: 0, price: 0, enabled: true, useSuggested: false, catKey: c.key
              });
            } else if (strat === "rent") {
              rentCats.push({ ...c, ratio: ratios[i] });
            } else if (strat === "business") {
              bizCats.push({ ...c, ratio: ratios[i] });
            }
          });

          // 自 v212修正: rent/business 持有期滿後的處分 — 各類別各自獨立開一筆 disposal（同一年份saleYear+Y），
          //   不合併成一筆。根因：合併會用「加權平均單價」算增值，稀釋掉高單價類別（如店面）的個別增值效果，
          //   跟 calcComboOptimizer 逐類別分開計算 apprFactor 的邏輯不一致，導致套用後數字與最優化承諾值有落差。
          rentCats.forEach(c => {
            disposals.push({
              id: dispId++, label: `${c.label}(出租期滿出售)`,
              year: saleYear + Y, month: 6, areaMode: "ratio", areaPct: c.ratio * 100,
              area: 0, price: 0, enabled: true, useSuggested: true, catKey: c.key
            });
          });
          bizCats.forEach(c => {
            disposals.push({
              id: dispId++, label: `${c.label}(自營期滿出售)`,
              year: saleYear + Y, month: 6, areaMode: "ratio", areaPct: c.ratio * 100,
              area: 0, price: 0, enabled: true, useSuggested: true, catKey: c.key
            });
          });
          // 車位：立即出售 parkCnt 個
          if (parkCnt > 0 && CR.hasPark) {
            disposals.push({
              id: dispId++, label: "車位(立即出售)",
              year: saleYear, month: 6, areaMode: "fixed", areaPct: 0,
              area: parkCnt, price: 0, enabled: true, useSuggested: false, catKey: "park_flat"
            });
          }

          const cb = p.compBenefit || {};

          // 自 v215: rent/business 改寫入 items[]（逐類別保留獨立面積/費率/調幅），
          //   不再合併成一筆 catKey="" 的物件。
          //   若該類別在 items[] 裡已有既有設定（使用者先前手動細調過），保留其 monthlyRent/annualGrowthRate，
          //   只更新 areaInput/起訖年月（反映最優化選中的面積與持有期）；
          //   若無既有設定，新建一筆，費率/調幅沿用 cb.rent/cb.business 的全局預設值
          //   （因為最優化引擎逐類別搜尋時，沒有既有項目的類別本來就是用全局預設值去評分的，此處寫回保持一致）。
          const buildItems = (cats, existingItems, defaultRate, defaultGrowth, rateKey) => {
            const existing = Array.isArray(existingItems) ? existingItems : [];
            return cats.map(c => {
              const found = existing.find(x => x.catKey === c.key);
              const areaVal = (() => {
                const up = Number(c.uP) || 0;
                return up > 0 ? (c.ratio * (Number(CR.allocValue) || 0)) / up : 0;
              })();
              return found
                ? { ...found, areaInput: areaVal, startYear: saleYear + 1, startMonth: 1, endYear: saleYear + Y, endMonth: 12, enabled: true }
                : { catKey: c.key, areaInput: areaVal, [rateKey]: defaultRate, annualGrowthRate: defaultGrowth,
                    startYear: saleYear + 1, startMonth: 1, endYear: saleYear + Y, endMonth: 12, enabled: true };
            });
          };
          const newRent = {
            ...(cb.rent || {}), enabled: rentCats.length > 0,
            items: rentCats.length > 0
              ? buildItems(rentCats, cb.rent?.items, Number(cb.rent?.monthlyRent) || 0, Number(cb.rent?.annualGrowthRate) || 0, "monthlyRent")
              : (cb.rent?.items || [])
          };
          const newBiz = {

          };

          const items = CR.allCats.map((c, i) => ({
            catKey: c.key, mode: "ratio", ratio: ratios[i], count: 1, area: 0
          })).filter((_, i) => ratios[i] > 0);
          const newSC = {
            ...(p.shareComposition || {}),
            byRole: {

            }
          };

          sP({

            shareComposition: newSC,

            }

                      個（可小數）

                        (自動上限約{CR.autoParkCountMax != null ? CR.autoParkCountMax.toFixed(1) : "—"}個，依組合總面積÷40坪推算)

              <div className="bg-gradient-to-r from-violet-600 to-purple-600 rounded-xl p-3 mb-3 text-white">
                <div className="flex items-center justify-between flex-wrap gap-2">
                  <div>
                    <div className="text-[10px] opacity-80">最優分配組合 (依 {metricLabel[comboMetric]})</div>
                    <div className="text-lg font-black">
                      {CR.allCats.map((c, i) => {
                        const areaPing = (Number(CR.allocValue) > 0 && Number(c.uP) > 0)
                          ? (CR.best.ratios[i] * CR.allocValue / c.uP) : 0;
                        return (
                          <span key={c.key} className="mr-2">
                            {c.label} {Math.round(CR.best.ratios[i]*100)}%<span className="text-[10px] opacity-70">(價值占比)</span>
                            <span className="text-[10px] opacity-90">={areaPing.toFixed(1)}坪</span>
                            <span className="text-[10px] opacity-80 ml-0.5">→{stratLabel[CR.best.strats[i]]}</span>
                          </span>
                        );

                      {CR.hasPark && CR.best.parkCnt > 0 && (
                        <span className="mr-2">車位 {CR.best.parkCnt} 個<span className="text-[10px] opacity-80 ml-0.5">→售出</span></span>
                      )}
                    </div>
                    <div className="text-[10px] opacity-90">
                      出場年：第 {CR.best.Y} 年 {CR.best.Y===0?"(完工即售)":""}
                    </div>

                  <div className="text-right">

              {/* 最優組合各類別明細 */}

                        </td>
                        <td className="text-center py-1.5 px-2">
                          <span className="text-[9px] px-1.5 py-0.5 rounded font-bold bg-sky-100 text-sky-800">售出</span>

                  </tbody>
                </table>
              </div>

              {/* 套用按鈕 */}
              {!showApplyConfirm ? (
                <button onClick={()=>setShowApplyConfirm(true)}
                  className="w-full py-2 rounded-xl bg-violet-600 hover:bg-violet-700 text-white text-[12px] font-bold transition-colors inline-flex items-center justify-center gap-1.5">

                </button>

                <div className="rounded-xl border-2 border-rose-300 bg-rose-50 p-3 space-y-2">

                  <div className="text-[10px] text-rose-600">可隨時至分配模擬頁手動修改，或重新執行組合最優化。</div>
                  <div className="flex gap-2">
                    <button onClick={applyBest} className="flex-1 py-1.5 rounded-lg bg-rose-600 hover:bg-rose-700 text-white text-[11px] font-bold">確定套用</button>
                    <button onClick={()=>setShowApplyConfirm(false)} className="flex-1 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-700 text-[11px]">取消</button>
                  </div>
                </div>
              )}

              <div className="text-[9px] text-slate-500 italic mt-2 space-y-0.5">
                <div>※ 固定分回總金額 {Math.round(CR.allocValue).toLocaleString()} 萬，在各類別上限內搜尋最優比例配置。各類別面積 = 分回金額比例 × 總分回 ÷ 各類單價。{CR.hasPark && `車位應得金額 ${Math.round(CR.myParkAlloc).toLocaleString()} 萬（加權單價 ${CR.parkAvgUP} 萬/個），數量依組合總面積 ÷ 40 坪推算，補差不進位。`}</div>
                <div>※ 網格掃描：每 {CR.elapsed < 500 ? comboStep : "已調整"} % 一格，與「處分策略 × 出場年」聯合優化。縮小步長可提升精度但計算更慢。</div>
                <div className="text-amber-600 font-bold">※ 套用最優解後，會自動把策略/年期/車位完整轉換進經營分析（分回比例、處分批次、租金/營業設定）。
                  上方顯示的{metricLabel[comboMetric]}是搜尋階段用簡化算法快速估算的分數，用來比較「哪個組合比較好」；
                  套用後請以「七、經營分析」或「損益分析」實際算出的數字為準（兩者會有落差，方向一致但金額不完全相同，這是搜尋速度與精算精度的取捨，非錯誤）。</div>
              </div>
            </>) : (
              <div className="text-[11px] text-slate-400 italic py-4 text-center">計算中...</div>
            )}
          </div>
        );
      })();
  }
}

/* ════════════════════════════════════════
   TAB 2: 損益分析

function T2({p, sP}) {
  const dr = calcDerived(p);
  const _scResP = (s) => (s.resPrice != null ? s.resPrice : (s.price != null ? s.price : 0));
  const sorted = [...p.scenarios].sort((a,b) => _scResP(a)-_scResP(b) || a.cost-b.cost);
  const cols = [];

  // 自 v95: 情境選擇器 + 自訂情境管理 + 其他成本摺疊
  // 自 v97: 情境改為「複選」(陣列), 支援多情境並列對比
  const [selectedScenarioIds, setSelectedScenarioIds] = useState(["A"]);  // 預設選 A
  // 自 v140: 比較角色篩選 — 分析目標強制顯示, 建商預設顯示, 其他可勾選加入
  //   visibleRoleKeys 存「額外要顯示」的角色 key (builder/owner_<id>/group_<id>); 分析目標永遠顯示
  const [visibleRoleKeys, setVisibleRoleKeys] = useState(null);  // null = 尚未初始化 (用預設: 建商)
  const [showCustomMgr, setShowCustomMgr] = useState(false);
  const [showOtherCosts, setShowOtherCosts] = useState(false);
  // 自 v109 (階段2): dialog 編輯狀態
  //   editTarget = { type: "base" } 編輯基準情境 (compBenefit)
  //              | { type: "custom", id } 編輯自訂情境
  //              | null 關閉
  const [editTarget, setEditTarget] = useState(null);
  // 自 v213: 全域設定摺頁展開狀態
  const [showGlobalSettings, setShowGlobalSettings] = useState(false);
  // 自 v113 (階段2): 編輯哪個分配方案的自由組合 (allocScenario.id), null 關閉
  const [editCompAllocId, setEditCompAllocId] = useState(null);
  const allScenarioDefs = makeScenarioDefs(p);  // 5 預設 + N 自訂
  const selectedScenarios = allScenarioDefs.filter(s => selectedScenarioIds.includes(s.id));
  // 確保至少選一個情境
  const effectiveScenarios = selectedScenarios.length > 0 ? selectedScenarios : [allScenarioDefs[0]];

  // 判斷「我」的角色 key 與標籤
  const myRole = p.myRole || "builder";
  const isMyBuilder = (myRole === "builder");

  // 自 v57/v200: 分析身分的真實稅額 (來自經營分析)
  //   自 v200 修正：統一改用 ce_t2.single.taxInfo.tax，不再依 landRegime 分岔讀 ce_t2.lvtTax。
  //   根因：ce_t2.lvtTax 讀的是 cb.lvtTaxResult（v170 之前的全局單一欄位，現在 UI 已無入口填寫），
  //   永遠是 null；真正的逐持分彙總稅額（新/舊制個別判定、都更減徵、混合稅制）已經在
  //   calcCompBenefit 的 single.taxInfo.tax 裡正確算好（v184 起），直接沿用即可，不用再分岔判斷。
  //   pending=true（舊制土增稅尚未查詢）時回傳 null，維持原本 fallback 估算稅率的行為，
  //   避免把「尚未查詢」誤當成「稅額=0」而低估稅負。
  const ce_t2 = calcCompBenefit(p, dr);
  const myAnalysisTax = (() => {
    if (!ce_t2 || !ce_t2.single || !ce_t2.single.taxInfo) return null;
    if (ce_t2.single.taxInfo.pending) return null;
    return ce_t2.single.taxInfo.tax;
  })();

  // 自 v74: 分配方案列表 (若空, 用「基準」維持既有行為)
  // 自 v77 修正: baseAlloc.jbLandlordShare 應為「您輸入的開價合建比」(p.jbLandlordShare),
  //              非「owners.ratio 加總」(後者是實際分配, 失去對照意義)
  const baseAlloc = {
    id: "_base",
    label: "基準",
    isBase: true,
    jbLandlordShare: p.jbLandlordShare != null ? Number(p.jbLandlordShare) : 0.5,
    costBearingMode: "uniform",
    costBearingPct: 0,
  };
  const sortedAlloc = (p.allocScenarios && p.allocScenarios.length > 0)
    ? [baseAlloc, ...p.allocScenarios]
    : [baseAlloc];

  // 雙層迴圈: 分配方案 × 價格方案 × 情境 (v97 加情境維度)
  // 自 v99: isMe 比對加 String() 防護, 避免 owner.id 型別不一致造成「我」標記亂跳
  const myRoleStr = String(myRole);
  // 自 v124: 先套基準參數覆寫 (全類別單價 + 造價), 售價方案再於其上變動住宅+造價
  const pBaseline = applyT2Baseline(p);
  const drBaseline = calcDerived(pBaseline);
  // 自 v125 (建議2): 基準售價方案 (scenarios[0]) 鎖定 = 基準面板住宅+造價
  const _baseScenarioId = (p.scenarios && p.scenarios[0]) ? p.scenarios[0].id : null;
  sortedAlloc.forEach(allocSc => {
    const tempPbase = applyAllocScenario(pBaseline, allocSc);
    sorted.forEach(sc => {
      // 自 v123/124/125: 售價方案 — 浮動住宅單價; 基準筆鎖定用基準面板值
      const _isBase = sc.id === _baseScenarioId;
      const _resP = _isBase ? (Number(pBaseline.salesMix?.res?.uP)||0)
                            : (sc.resPrice != null ? sc.resPrice : (sc.price != null ? sc.price : (Number(pBaseline.salesMix?.res?.uP)||0)));
      const _cost = _isBase ? (Number(pBaseline.cC)||0)
                            : (sc.cost != null ? Number(sc.cost) : (Number(pBaseline.cC) || 0));
      const tempP = {
        ...tempPbase,
        salesMix: { ...(tempPbase.salesMix||{}), res: { ...((tempPbase.salesMix||{}).res||{}), uP: _resP } },
        cC: _cost
      };
      const tempDr = calcDerived(tempP);
      const _scPrice = tempDr.weightedUP;  // auto 模式用加權均價 (已反映新住宅單價)
      effectiveScenarios.forEach(scenario => {
        // 自 v228: 情境E(純售地)/F(容積移轉) 的頂部表格資料改走 buildSpecialColData，
        //   不再誤用 cS() 算出的正常開發總銷/成本（那對A-D是對的，對E/F是誤導）
        const _isSpecial = !!scenario.isSpecial;
        // 建商欄
        const builderLabel = isMyBuilder ? "👤 建商 (我)" : "建商";
        const builderTax = isMyBuilder ? myAnalysisTax : null;
        const builderData = _isSpecial
          ? buildSpecialColData(tempP, tempDr, scenario.isSpecial, "b", "builder", myRoleStr)
          : cS(tempP,tempDr,_scPrice,_cost,"b",0,builderTax);
        cols.push({sc, allocSc, scenario, role:"b", label:builderLabel, ratio:tempDr.builderRatio, isMe:isMyBuilder, ownerId:"builder", data:builderData});

        if (tempP.jb) tempP.owners.forEach(o => {
          const isMe = (String("owner_" + o.id) === myRoleStr);  // 自 v99: String() 強化比對
          const lbl = isMe ? "👤 " + o.name + " (我)" : o.name;
          const ownerTax = isMe ? myAnalysisTax : null;
          const ownerData = _isSpecial
            ? buildSpecialColData(tempP, tempDr, scenario.isSpecial, "o", o.id, myRoleStr)
            : cS(tempP,tempDr,_scPrice,_cost,"o",o.ratio,ownerTax);
          cols.push({sc, allocSc, scenario, role:"o", label:lbl, ratio:o.ratio, isMe, ownerId:o.id, data:ownerData});
        });

        // 自 v121: 選配群組欄 (合併視角) — 成員 cS 各自算後加總
        if (tempP.jb) (tempP.selectGroups || []).forEach(g => {
          const isMeG = (myRoleStr === "group_" + g.id);
          const members = (g.members || []).map(mid => tempP.owners.find(o => o.id === mid)).filter(Boolean);
          if (members.length === 0) return;
          if (_isSpecial) {
            const gData = buildSpecialColData(tempP, tempDr, scenario.isSpecial, "group", g.id, myRoleStr);
            const gRatio = members.reduce((a, o) => a + (Number(o.ratio)||0), 0);
            cols.push({sc, allocSc, scenario, role:"g", label:(isMeG?"👥 ":"👥 ")+(g.name||"群組")+(isMeG?" (我)":""), ratio:gRatio, isMe:isMeG, ownerId:"group_"+g.id, data:gData});
            return;
          }
          const memData = members.map(o => cS(tempP, tempDr, _scPrice, _cost, "o", o.ratio, null));
          const gRatio = members.reduce((a, o) => a + (Number(o.ratio)||0), 0);
          const sumK = (k) => memData.reduce((a, m) => a + (Number(m[k])||0), 0);
          // 自 v131: cs 是「各成本項物件」, 須逐項加總 (原 sumK('cs') 對物件取 Number→NaN→0, 導致群組成本明細全 0)
          const sumCs = () => {
            const out = {};
            memData.forEach(m => {
              const c = m.cs || {};
              Object.keys(c).forEach(k => { out[k] = (out[k] || 0) + (Number(c[k]) || 0); });
            });
            return out;
          };
          const _sh = sumK("sh"), _tc = sumK("tc"), _pbt = sumK("pbt"), _pat = sumK("pat"), _shareArea = sumK("shareArea"), _eq = sumK("eq");
          const gData = {
            sh:_sh, cs:sumCs(), tc:_tc, pbt:_pbt, itx:sumK("itx"), pat:_pat, shareArea:_shareArea,
            gm:_sh?_pbt/_sh:0, nm:_sh?_pat/_sh:0, cr:_tc?_pat/_tc:0, bep:_shareArea?_tc/_shareArea:0,
            ll:sumK("ll"), cl:sumK("cl"), tl:sumK("tl"), eq:_eq, er:_eq>0?_pat/_eq:0,
            ownerFinanceInterest:sumK("ownerFinanceInterest")
          };
          cols.push({sc, allocSc, scenario, role:"g", label:(isMeG?"👥 ":"👥 ")+(g.name||"群組")+(isMeG?" (我)":""), ratio:gRatio, isMe:isMeG, ownerId:"group_"+g.id, data:gData});
        });
      });
    });
  });

  // 將「我」的欄位排在每個 (allocSc, sc, scenario) 組合的最前
  // 自 v99: filter 比對加 String() 防護
  const reordered = [];
  sortedAlloc.forEach(allocSc => {
    sorted.forEach(sc => {
      effectiveScenarios.forEach(scenario => {
        const combCols = cols.filter(c =>
          String(c.sc.id) === String(sc.id) &&
          String(c.allocSc.id) === String(allocSc.id) &&
          String(c.scenario.id) === String(scenario.id));
        const myCols = combCols.filter(c => c.isMe);
        const otherCols = combCols.filter(c => !c.isMe);
        reordered.push(...myCols, ...otherCols);
      });
    });
  });
  // 用 reordered 取代 cols
  cols.length = 0;
  cols.push(...reordered);

  // ─── 自 v140: 比較角色篩選 ───
  //   全部可選角色 (依出現順序去重): 分析目標 / 建商 / 各地主 / 各群組
  const allRoleOptions = [];
  const _seenRole = new Set();
  cols.forEach(c => {
    const key = c.role === "b" ? "builder" : c.role === "g" ? String(c.ownerId) : ("owner_" + c.ownerId);
    if (!_seenRole.has(key)) { _seenRole.add(key); allRoleOptions.push({ key, label: c.label.replace(/^👤 |^👥 /, "").replace(/ \(我\)$/, ""), isMe: c.isMe }); }
  });
  // 預設顯示集合: 分析目標 (強制) + 建商
  const _defaultVisible = new Set([myRoleStr, "builder"]);
  // 實際顯示集合 = 分析目標(強制) ∪ (使用者勾選, 未初始化則用預設)
  const _visibleSet = new Set(visibleRoleKeys || _defaultVisible);
  _visibleSet.add(myRoleStr);  // 分析目標永遠顯示
  // 過濾 cols (只保留要顯示的角色); 至少保留分析目標欄
  const _colRoleKey = (c) => c.role === "b" ? "builder" : c.role === "g" ? String(c.ownerId) : ("owner_" + c.ownerId);
  const _filteredCols = cols.filter(c => _visibleSet.has(_colRoleKey(c)));
  if (_filteredCols.length > 0) { cols.length = 0; cols.push(..._filteredCols); }
  // 切換角色顯示 (分析目標不可關)
  const toggleRole = (key) => {
    if (key === myRoleStr) return;  // 分析目標強制顯示, 不可關
    const cur = new Set(visibleRoleKeys || _defaultVisible);
    if (cur.has(key)) cur.delete(key); else cur.add(key);
    cur.add(myRoleStr);
    setVisibleRoleKeys(cur);
  };

  // 自 v95/v97: 為每 col 計算情境 snapshot (用於 KPI 列, 用 col 各自的 scenario)
  // 自 v100: 用 spread 創建新物件 pForSnap, 不直接 mutate tempP (避免 base case 下 tempP=p 造成 p.myRole 污染)
  cols.forEach(col => {
    const baseTempP = applyAllocScenario(pBaseline, col.allocSc);
    const ownerMyRole = col.role === "b" ? "builder"
      : col.role === "g" ? col.ownerId          // 自 v121: 群組欄 ownerId 即 "group_<id>"
      : "owner_" + col.ownerId;
    // 自 v123/124/125: snapshot 套用售價方案; 基準筆鎖定用基準面板值
    const _isBaseSc = col.sc.id === _baseScenarioId;
    const _resP = _isBaseSc ? (Number(pBaseline.salesMix?.res?.uP)||0)
                            : (col.sc.resPrice != null ? col.sc.resPrice : (col.sc.price != null ? col.sc.price : (Number(pBaseline.salesMix?.res?.uP)||0)));
    const _cost = _isBaseSc ? (Number(pBaseline.cC)||0)
                            : (col.sc.cost != null ? Number(col.sc.cost) : (Number(pBaseline.cC) || 0));
    const pForSnap = {
      ...baseTempP,
      salesMix: { ...(baseTempP.salesMix||{}), res: { ...((baseTempP.salesMix||{}).res||{}), uP: _resP } },
      cC: _cost,
      myRole: ownerMyRole
    };
    const tempDr = calcDerived(pForSnap);
    // 自 v226: 情境E(純售地)/F(容積移轉) 走獨立計算路徑，不能直接用 calcT8Snapshot(p,dr,override)
    //   （因為它們的 override 是 null，不是標準的 compBenefit 覆寫物件）
    // 自 v233 修正：不再用「這一欄自己的角色」當 myRole 重新試算一次容移/純售地。
    //   根因：容移的固定成本(extraCosts)跟角色無關，但收入(autoRevenue)是綁在myRole身上算的，
    //   拿「非目標角色」重算時，收入歸零但固定成本還在，會產生「0收入-固定成本」的錯誤負值，
    //   而且每一欄都會冒出來（不只分析目標本人）。
    //   改法：只用「真正的分析目標」(p.myRole，不受這一欄role/ownerId影響)算一次完整結果，
    //   容移再依角色分潤比例(getRoleVTShare)分配到各欄；純售地本來就只對分析目標本人有意義，
    //   其他角色顯示0（不重算）。
    const _realMyRole = p.myRole || "builder";
    const pForReal = { ...pForSnap, myRole: _realMyRole };
    if (col.scenario.isSpecial === "pureLandSale") {
      const PL = calcPureLandSaleScenario(pForReal, tempDr);
      const _isTarget = (ownerMyRole === _realMyRole);
      col.scenarioData = (PL.skipped || !_isTarget)
        ? { totalProfit: 0, irr: null, ce: null, _special: "pureLandSale", _skipped: PL.skipped }
        : { totalProfit: PL.totalProfit, irr: PL.irr, mirr: PL.mirr, cashflows: PL.cashflows, ce: null, _special: "pureLandSale", _detail: PL };
    } else if (col.scenario.isSpecial === "volTransfer") {
      const VT = calcVolTransferScenario(pForReal, tempDr);
      if (VT.skipped) {
        col.scenarioData = { totalProfit: 0, irr: null, ce: null, _special: "volTransfer", _skipped: true };
      } else {
        // 依角色分潤：跟頂部表格 buildSpecialColData 用同一套 getRoleVTShare，只有建商與
        // 分析目標地主會有份額，其他角色正確顯示0，不會有「重算後多出負值」的問題
        const _roleForShare = col.role === "b" ? "b" : col.role === "g" ? "group" : "o";
        const _ownerIdForShare = col.role === "b" ? "builder" : col.ownerId;
        const _colRoleStr = col.role === "b" ? "builder" : col.role === "g" ? ("group_"+col.ownerId) : ("owner_"+col.ownerId);
        // 自 v236 修正：分析目標本人的欄位直接用 VT.totalProfit（已扣土地價值認列），
        //   不再用 getRoleVTShare(VT.fullNetProfit,...) 重算一次分潤——後者是分潤前、
        //   完全沒扣土地價值的原始100%淨利，跟 VT.totalProfit 是兩條不同計算路徑，
        //   先前誤用了沒扣土地的那一條，導致「★綜合淨利」看起來完全沒扣土地價值。
        //   建商欄位維持用 getRoleVTShare(fullNetProfit,...)：建商沒有這塊地的取得成本，
        //   不該扣「地主的」土地價值認列，這條路徑對建商來說本來就是對的，不用改。
        const isTargetOwner = _colRoleStr === _realMyRole;
        const myShare = isTargetOwner
          ? VT.totalProfit
          : getRoleVTShare(p, VT.fullNetProfit, _roleForShare, _ownerIdForShare, _realMyRole);
        col.scenarioData = {
          totalProfit: myShare,
          irr: isTargetOwner ? VT.irr : null,
          mirr: isTargetOwner ? VT.mirr : null,
          cashflows: isTargetOwner ? VT.cashflows : [],
          ce: null, _special: "volTransfer", _detail: VT
        };
      }
    } else {
      col.scenarioData = calcT8Snapshot(pForSnap, tempDr, col.scenario.override);
    }
  });

  // 自 v99: col 唯一識別 (用於 React key, 避免 owner.id 浮點/型別問題造成顯示錯位)
  const colKey = (c) => `k_${c.allocSc.id}_${c.sc.id}_${c.scenario.id}_${c.role}_${c.ownerId}`;

  // 自 v141: colSpan 用「實際顯示角色數」(經比較角色篩選後), 否則表頭 colSpan 比資料欄寬 → 多情境並列錯位
  const _visibleRoleCount = allRoleOptions.filter(o => _visibleSet.has(o.key)).length;
  const _nGroups = allRoleOptions.filter(o => o.key.startsWith("group_") && _visibleSet.has(o.key)).length;  // 實際顯示的群組數
  const cPS = _visibleRoleCount * effectiveScenarios.length;  // 每組合欄數 = 實際顯示角色數 × 情境數
  const R = ({l, gV, bold, isPct, bg="", className=""}) => (
    <tr className={(bg?" "+bg:"")+(bold?" font-bold":"")+" border-b border-slate-100 "+className}>
      <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-inherit z-10 whitespace-nowrap">{l}</td>
      {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono tn "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{isPct?pct(gV(c.data, c)):fmt(gV(c.data, c))}</td>)}
    </tr>
  );
  const Sec = ({l, c}) => <tr><td colSpan={1+cols.length} className={"py-[6px] px-3 text-[11px] font-bold tracking-widest "+c}>{l}</td></tr>;

  return (
    <div className="space-y-3">
      {/* 自 v213: 全域設定（可摺疊）— 原「七、經營分析」的核心設定移至此處統一管理，
          因主導覽已無獨立分頁可編輯 disposals/rent/business/折舊漲幅參數等欄位。
          內嵌 CompBenefitDialog 的 inline 模式，跟原本彈窗共用同一套邏輯，不重複維護。 */}
      {(() => {
        const cb = p.compBenefit || {};
        const sm = dr.salesMix || {};
        const catOptions = [
          { catKey: "res",    label: sm.res?.label    || "住宅", uP: sm.res?.uP    || 0 },
          { catKey: "retail", label: sm.retail?.label || "店面", uP: sm.retail?.uP || 0 },
          { catKey: "office", label: sm.office?.label || "辦公", uP: sm.office?.uP || 0 },
          ...(sm.customCategories || []).map(c => ({ catKey: c.id, label: c.label, uP: c.uP || 0 }))
        ];
        return (
          <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
            <button onClick={() => setShowGlobalSettings(!showGlobalSettings)}
              className="w-full flex items-center justify-between px-4 py-2.5 hover:bg-slate-50">
              <div className="text-sm font-bold text-slate-700 inline-flex items-center gap-2">
                <Icon name="settings" size={15}/> 全域設定
                <span className="text-[10px] font-normal text-slate-400">折現率·持有年期·處分價格預估參數·容積移轉·處分批次·租金/營業</span>
              </div>
              <Icon name={showGlobalSettings ? "chevron-up" : "chevron-down"} size={16} className="text-slate-400"/>
            </button>
            {showGlobalSettings && (
              <div className="px-4 pb-4 border-t">
                <div className="pt-4">
                  <CompBenefitDialog
                    inline
                    data={cb}
                    defaultPrice={Number(p.salesMix?.res?.uP) || Number(p.uP) || 0}
                    catOptions={catOptions}
                    onChange={(nd) => sP({...p, compBenefit: nd})}
                  />
                </div>
              </div>
            )}
          </div>
        );
      })()}
      {/* 自 v131: 🐛 診斷面板 (定位情境收益/KPI=0 問題) */}
      <DiagPanel cols={cols} colKey={colKey} />
      {/* 自 v161: 最優模擬就緒度狀態列 */}
      {(() => {
        const cb = p.compBenefit || {};
        const sm = dr.salesMix || {};
        const hasMultiCat = [sm.res, sm.retail, sm.office, ...(sm.customCategories||[])].filter(c => c && (c.area > 0 || c.uP > 0)).length >= 2;
        const monthlyRent = Number(cb.rent?.monthlyRent) || 0;
        const perfPerPing = Number(cb.business?.perfPerPing) || 0;
        const dispPrice = Number(cb.scenDisposalPrice) || (cb.disposals||[]).some(d => Number(d.price) > 0);
        const ce_chk = ce_t2;
        const myAllocV = ce_chk?.myAllocValue || 0;
        const isVB = !!ce_chk?.isValueBased;

        const items = [
          {
            ok: monthlyRent > 0,
            label: "月租金",
            desc: monthlyRent > 0 ? `${monthlyRent} 萬/坪/月` : "未設定",
            warn: "長租策略收益將以 0 計算，結果僅供參考",
            icon: "home"
          },
          {
            ok: perfPerPing > 0,
            label: "營業坪效",
            desc: perfPerPing > 0 ? `${perfPerPing} 萬/坪/月` : "未設定",
            warn: "自營策略收益將以 0 計算，結果僅供參考",
            icon: "briefcase"
          },
          {
            ok: true,  // 自 v167: 處分售價永遠自動帶入，不需使用者手動設定
            label: "處分售價",
            desc: isVB && myAllocV > 0
              ? `自動：分回均價 ${(myAllocV / (ce_chk?.myArea||1)).toFixed(1)} 萬/坪`
              : `自動：全案均價 ${p.uP} 萬/坪`,
            warn: null,
            icon: "tag"
          },
          {
            ok: hasMultiCat,
            label: "多類別組合",
            desc: hasMultiCat ? "可進行分配組合最優化" : "單一類別，無組合空間",
            warn: hasMultiCat ? null : "組合最優化需要 salesMix 包含多個類別",
            icon: "layers"
          }
        ];
        const allOk = items.every(i => i.ok);
        const warnCount = items.filter(i => !i.ok && i.warn).length;
        return (
          <div className={`rounded-xl border p-3 ${allOk ? "bg-emerald-50 border-emerald-200" : "bg-amber-50 border-amber-200"}`}>
            <div className="flex items-center gap-2 mb-2">
              <Icon name={allOk ? "check-circle" : "alert-triangle"} size={13} className={allOk ? "text-emerald-600" : "text-amber-600"}/>
              <span className={`text-[11px] font-bold ${allOk ? "text-emerald-800" : "text-amber-800"}`}>
                最優模擬就緒度 {allOk ? "— 所有設定已完備" : `— ${warnCount} 項未設定，持有策略結果可能偏差`}
              </span>
            </div>
            <div className="grid grid-cols-2 gap-1.5 sm:grid-cols-4">
              {items.map(item => (
                <div key={item.label} className={`rounded-lg px-2 py-1.5 text-[10px] flex items-start gap-1.5 ${item.ok ? "bg-white border border-emerald-100" : item.warn ? "bg-white border border-amber-200" : "bg-white border border-slate-100"}`}>
                  <span className={`mt-0.5 ${item.ok ? "text-emerald-500" : item.warn ? "text-amber-500" : "text-slate-400"}`}>
                    {item.ok ? "✓" : item.warn ? "!" : "—"}
                  </span>
                  <div>
                    <div className={`font-bold ${item.ok ? "text-emerald-700" : item.warn ? "text-amber-700" : "text-slate-500"}`}>{item.label}</div>
                    <div className="text-slate-500">{item.desc}</div>
                    {!item.ok && item.warn && <div className="text-amber-600 mt-0.5">{item.warn}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
      {/* 自 v124: 基準參數面板 (最上層) — 各類別單價/造價連動基本假設, 可覆寫 what-if; 租金/坪效/處分售價使用者填 */}
      {(() => {
        const tb = p.t2Baseline || { prices: {}, constructCost: null };
        const tbPrices = tb.prices || {};
        const setTbPrice = (cat, val) => sP({ ...p, t2Baseline: { ...tb, prices: { ...tbPrices, [cat]: val } } });
        const clearTbPrice = (cat) => { const np = { ...tbPrices }; delete np[cat]; sP({ ...p, t2Baseline: { ...tb, prices: np } }); };
        const setTbCost = (val) => sP({ ...p, t2Baseline: { ...tb, constructCost: val } });
        const clearTbCost = () => sP({ ...p, t2Baseline: { ...tb, constructCost: null } });
        const cb = p.compBenefit || {};

                </div>
              </div>
            </div>
            {/* 造價 + 總成本 */}

                  <span className="text-[10px] text-slate-600 whitespace-nowrap">總成本</span>

                  <span className="text-[8px] text-slate-400">萬/坪樓地板</span>
                  <span title="建商全部成本(造價+設計+廣銷+稅+管理+利息) ÷ 總樓地板(含車位), 計算值" className="text-[9px] text-slate-300">∑</span>
