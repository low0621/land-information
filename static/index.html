/* ════════════════════════════════════════
   MAIN APP (已登入後的主介面)
════════════════════════════════════════ */
function MainApp({session, onLogout}) {
  /* ─── 載入此使用者的所有專案 ─── */
  // TODO: 暫時只顯示已同步到雲端 (有 cloudPid) 的專案; 未來會處理地端/雲端同步策略後再放開
  const [projects, setProjects] = useState(() => store.listProjects(session.userId).filter(pr => pr.cloudPid));
  const [currentId, setCurrentId] = useState(null);  // 進入時工作區為空白
  const [p, _sP] = useState(BLANK);
  const [projectName, _setProjectName] = useState("新專案");
  const [dirty, setDirty] = useState(false);
  // 包裝 sP / setProjectName, 使任何工作區變更自動標記為「未儲存」
  // 載入/儲存/新建後再呼叫 setDirty(false) 覆蓋
  const sP = (next) => { _sP(next); setDirty(true); };
  const setProjectName = (next) => { _setProjectName(next); setDirty(true); };

  const [tab, setTab] = useState("a");
  const [mm, sMM] = useState(false);

  /* ─── 重新整理專案列表 ─── */
  const refreshProjects = () => setProjects(store.listProjects(session.userId).filter(pr => pr.cloudPid));

  /* ─── 初次進入: 若已有專案則自動載入最新一筆 (依 updatedAt 排序) ─── */
  React.useEffect(() => {
    if (projects.length === 0) return;
    const latest = [...projects].sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0))[0];
    sP(migrateProject(latest.data));
    setCurrentId(latest.id);
    setProjectName(latest.name);
    setDirty(false);
  }, []);

  /* ─── 專案操作 ─── */
  const saveCurrent = async () => {
    const name = (projectName || "").trim() || "未命名專案";
    const existing = currentId ? projects.find(pr => pr.id === currentId) : null;
    const saved = store.saveProject(session.userId, {
      id: currentId,
      name,
      data: p,
      cloudPid: existing?.cloudPid
    });
    setCurrentId(saved.id);
    setProjectName(saved.name);
    refreshProjects();
    setDirty(false);
    // 同步推到後端
    const dataWithName = {...p, _name: name};
    const createNew = async () => {
      const r = await apiClient.createProject(session.userId, dataWithName);
      store.saveProject(session.userId, {...saved, cloudPid: r.pid});
      refreshProjects();
      return r;
    };
    try {
      if (saved.cloudPid) {
        try {
          await apiClient.updateProject(session.userId, saved.cloudPid, dataWithName);
          alert(`✓ 已儲存「${name}」並同步雲端`);
        } catch (err) {
          // 雲端找不到對應專案 → 改起一個新的
          if (/找不到對應的專案|404/.test(err.message)) {
            const r = await createNew();
            alert(`✓ 已儲存「${name}」, 雲端原專案不存在, 已新建 (pid: ${r.pid.slice(0,8)})`);
          } else { throw err; }
        }
      } else {
        const r = await createNew();
        alert(`✓ 已儲存「${name}」並上傳雲端 (pid: ${r.pid.slice(0,8)})`);
      }
    } catch (err) {
      alert(`✓ 已儲存「${name}」(本地)\n⚠️ 雲端同步失敗: ${err.message}`);
    }
  };

  // ⌘/Ctrl + S → 儲存
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === "s" || e.key === "S")) {
        e.preventDefault();
        saveCurrent();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  // ─── 資料模型遷移 (升級舊版專案 schema) ─────────
  // 自 v40 起 lands 加 city/district/urbanPlan/zone/announcedValuePerM2/isNonBuildable
  // 確保載入舊專案時自動補齊欄位, 避免 UI undefined 錯誤
  // 自 v41 起 lands 內 far/bcr 必須填入, 廢除 p.farVal/p.bcVal 的全案級覆寫
  const migrateProject = (data) => {
    if (!data) return data;
    const d = {...data};
    // 1. lands 補欄位 + 把 p.farVal/p.bcVal 寫進 land.far/bcr
    if (Array.isArray(d.lands)) {
      d.lands = d.lands.map(l => {
        const newL = {
          city: d.city || "",
          district: d.dist || "",
          urbanPlan: (d.city || "") + "都市計畫",
          zone: d.zone || "",
          announcedValuePerM2: 0,
          isNonBuildable: false,
          ...l  // ← 既有欄位優先, 不覆蓋已有資料
        };
        // 🔑 自 v41: 把舊版 p.farVal/p.bcVal 寫進 lands
        //         注意單位轉換: p.farVal/p.bcVal 是「倍數」(0.6103 = 61.03%);
        //                       land.bcr/far 是「百分比整數」(61.03 = 61.03%)
        //         所以需要乘以 100
        if ((newL.far == null || newL.far === "") && d.farManual && d.farVal) {
          newL.far = Number(d.farVal) * 100;
        }
        if ((newL.bcr == null || newL.bcr === "") && d.bcManual && d.bcVal) {
          newL.bcr = Number(d.bcVal) * 100;
        }
        // 自 v186: area（坪）若為 0 或缺失但 m2 有值，自動補算
        if ((Number(newL.area) <= 0) && Number(newL.m2) > 0) {
          newL.area = +(Number(newL.m2) * 0.3025).toFixed(2);
        }
        return newL;
      });
    }
    // 2. ownerHoldings 預設生成 (依舊 owners[].ratio 對每筆地號生成)
    //    觸發條件: ownerHoldings 不存在 (舊版資料) 或為空 array (BLANK/SAMPLE 預設)
    if (!Array.isArray(d.ownerHoldings) || d.ownerHoldings.length === 0) {
      d.ownerHoldings = [];
      const lands = d.lands || [];
      const owners = d.owners || [];
      lands.forEach(land => {
        const ownerSum = owners.reduce((s, o) => s + (Number(o.ratio) || 0), 0);
        const builderShare = Math.max(0, 1 - ownerSum);
        if (builderShare > 0) {
          d.ownerHoldings.push({id: Date.now() + Math.random(), sec: land.sec, num: land.num, ownerId: "builder", share: builderShare});
        }
        owners.forEach(o => {
          if (Number(o.ratio) > 0) {
            d.ownerHoldings.push({id: Date.now() + Math.random(), sec: land.sec, num: land.num, ownerId: o.id, share: Number(o.ratio)});
          }
        });
      });
    }
    // 3. 自 v56: compBenefit 補「土地稅制 (新制/舊制土增稅)」欄位
    if (d.compBenefit && typeof d.compBenefit === "object") {
      const cb = d.compBenefit;
      // 自 v83: 廢棄 cb.mode = "single", 改為 "longHold" + holdYears 強制 0
      if (cb.mode === "single") {
        cb.mode = "longHold";
        cb.holdYears = 0;  // single 等同 holdYears=0 的 longHold
      }
      if (cb.landRegime == null) cb.landRegime = "auto";        // "auto" | "new" | "old"
      if (cb.landAcquireYearROC == null) cb.landAcquireYearROC = 0;  // 取得年(民國), 0=未填
      if (cb.landAcquireMonth == null) cb.landAcquireMonth = 1;     // 取得月份, 預設 1
      if (cb.lvtUrbanRenewal == null) cb.lvtUrbanRenewal = false; // 舊制都更減徵40%
      if (cb.lvtOrigVal == null) cb.lvtOrigVal = 0;              // 原規定地價(元/m²)
      if (cb.lvtLandType == null) cb.lvtLandType = "1";          // 土地類別代碼
      if (cb.lvtTaxResult == null) cb.lvtTaxResult = null;       // API 回傳土增稅(萬), null=未查
      // 自 v66: 公保地容積移轉; 自 v83: 加 subMode + builderShareRatio, 廢棄 includeInT8
      if (!cb.volTransfer || typeof cb.volTransfer !== "object") {
        cb.volTransfer = { enabled: false, subMode: "combined", pricePct: 200, announcedValueOverride: null, builderShareRatio: 0, extraCosts: [], extraRevenues: [] };
      } else {
        if (cb.volTransfer.enabled == null) cb.volTransfer.enabled = false;
        if (cb.volTransfer.subMode == null) cb.volTransfer.subMode = "combined";  // v83
        if (cb.volTransfer.pricePct == null) cb.volTransfer.pricePct = 200;
        if (cb.volTransfer.announcedValueOverride === undefined) cb.volTransfer.announcedValueOverride = null;
        if (cb.volTransfer.builderShareRatio == null) cb.volTransfer.builderShareRatio = 0;  // v83
        if (!Array.isArray(cb.volTransfer.extraCosts)) cb.volTransfer.extraCosts = [];
        if (!Array.isArray(cb.volTransfer.extraRevenues)) cb.volTransfer.extraRevenues = [];
        // includeInT8 不刪 (向下相容), 但新邏輯不再使用
      }
      // 自 v93: customScenarios 自訂情境
      if (!Array.isArray(cb.customScenarios)) cb.customScenarios = [];
      // 自 v125: 處分筆補 areaMode (既有絕對面積筆視為 fixed)
      if (Array.isArray(cb.disposals)) {
        cb.disposals.forEach(d => { if (d && d.areaMode == null) d.areaMode = "fixed"; });
      }
      // 自 v215 修正: 移除 v167 遺留的「cb.disposals 強制清空」邏輯。
      //   根因：v167 當時「處分排程UI已移除」，所以每次載入強制清空讓系統走 fallback。
      //   但現在 T2 的「全域設定」摺頁已恢復完整編輯能力（含 disposals[]/rent.items[]/business.items[]），
      //   且 applyBest（分配組合最優化套用）會寫入完整的 disposals，若每次載入都被強制清空，
      //   使用者手動設定或套用最優解的處分批次會在重新整理/重新載入後全部消失，造成嚴重資料遺失。
      //   scenDisposalPrice 維持原值，不再強制歸零。
      // 自 v186: p.exp 若未設定，給預設值 1.1（地板容積係數）
      if (!data.exp || Number(data.exp) <= 0) data.exp = 1.1;
      // 自 v218: 工期(p.dur)與費用支出時程(expPeriods)強制連動 — 既有案件載入時也要校正一致
      //   改用「開工/交屋」標記優先（若兩者都有標記），否則 fallback 全案第一期到最後一期的跨距
      //   （沿用 v216 的校正時機，只是換算基準改為標記優先）
      // 自 v218: expPeriods 補 role 欄位預設值（舊資料缺這個新欄位時給 null，等同「一般期別」）
      if (Array.isArray(data.expPeriods)) {
        data.expPeriods = data.expPeriods.map(ep => ({...ep, role: ep.role || null}));
      }
      // 自 v219: 舊案件若已有「交屋」標記期別但缺 autoHandoverSync 欄位，預設為 true（自動同步）
      //   避免舊案件載入後突然被沒有預期到的自動同步覆寫年月：只在「欄位不存在」時補 true，
      //   若欄位已明確是 false（使用者用過新版並手動覆寫過），保留 false 不變。
      if (Array.isArray(data.expPeriods)) {
        data.expPeriods = data.expPeriods.map(ep =>
          (ep.role === "handover" && ep.autoHandoverSync === undefined)
            ? {...ep, autoHandoverSync: true}
            : ep
        );
      }
      if (Array.isArray(data.expPeriods) && data.expPeriods.length >= 2) {
        const _epAbs = (ep) => (Number(ep.year)||0)*12 + (Number(ep.month)||0);
        const _cs = data.expPeriods.find(ep => ep.role === "constStart");
        const _ho = data.expPeriods.find(ep => ep.role === "handover");
        let _startEp, _endEp;
        if (_cs && _ho) { _startEp = _cs; _endEp = _ho; }
        else {
          const _sorted = [...data.expPeriods].sort((a,b) => _epAbs(a) - _epAbs(b));
          _startEp = _sorted[0]; _endEp = _sorted[_sorted.length-1];
        }
        const _correctDur = Math.max(1, _epAbs(_endEp) - _epAbs(_startEp) + 1);
        if (Number(data.dur) !== _correctDur) data.dur = _correctDur;
      }
      if (data.lvtUrbanRenewal == null) data.lvtUrbanRenewal = !!cb.lvtUrbanRenewal;
      // 自 v185: 優先選配排序（跨角色全案設定）
      if (!data.shareComposition) data.shareComposition = { byRole: {} };
      if (!data.shareComposition.priority) data.shareComposition.priority = {};
      // 自 v203: owners[] 補齊租金補貼/抵付免徵/處分六折 新欄位（舊資料缺這些欄位時給預設值）
      if (data.owners) {
        data.owners = data.owners.map(o => ({
          ...o,
          rentSubsidy: o.rentSubsidy || {enabled:false, monthly:0, months:0},
          lvtExemptOnExchange: o.lvtExemptOnExchange || false,
          lvtDiscountOnDisposal: o.lvtDiscountOnDisposal || false
        }));
      }
      // 自 v121: 情境共用處分售價 (預設 0 = 用各筆 price; 全處分情境用此補沒填的)
      if (cb.scenDisposalPrice == null) cb.scenDisposalPrice = 0;
      // 自 v114 (階段3a): disposals/rent/business 補 catKey ("" = 全部/不限)
      if (Array.isArray(cb.disposals)) cb.disposals.forEach(d => { if (d.catKey == null) d.catKey = ""; });
      if (cb.rent && typeof cb.rent === "object" && cb.rent.catKey == null) cb.rent.catKey = "";
      if (cb.business && typeof cb.business === "object" && cb.business.catKey == null) cb.business.catKey = "";
      // 自 v140: 統一租金/營業欄位 → canonical monthlyRent/perfPerPing (萬/坪/月)
      //   舊專案若曾用 monthlyUnit (元/坪/月) 設過租金/坪效但 canonical 未設, 換算保留 (÷10000); 換算後移除 monthlyUnit 避免重複轉換
      if (cb.rent && typeof cb.rent === "object") {
        if (!(Number(cb.rent.monthlyRent) > 0) && Number(cb.rent.monthlyUnit) > 0) cb.rent.monthlyRent = Number(cb.rent.monthlyUnit) / 10000;
        delete cb.rent.monthlyUnit;
      }
      if (cb.business && typeof cb.business === "object") {
        if (!(Number(cb.business.perfPerPing) > 0) && Number(cb.business.monthlyUnit) > 0) cb.business.perfPerPing = Number(cb.business.monthlyUnit) / 10000;
        delete cb.business.monthlyUnit;
      }
      // 自 v215: rent/business 補 items[] 陣列與 annualGrowthRate 預設值（舊資料缺這些新欄位時）
      if (cb.rent && typeof cb.rent === "object") {
        if (!Array.isArray(cb.rent.items)) cb.rent.items = [];
        if (cb.rent.annualGrowthRate == null) cb.rent.annualGrowthRate = 0;
      }
      if (cb.business && typeof cb.business === "object") {
        if (!Array.isArray(cb.business.items)) cb.business.items = [];
        if (cb.business.annualGrowthRate == null) cb.business.annualGrowthRate = 0;
      }
      // 自 v226: 純售地(pureLandSale)物件預設值 + 容積移轉補交易年月欄位（舊資料缺這些新欄位時）
      if (!cb.pureLandSale || typeof cb.pureLandSale !== "object") {
        cb.pureLandSale = { enabled: false, sellLandRatio: 0, landSalePrice: 0, year: 0, month: 0 };
      } else {
        if (cb.pureLandSale.enabled == null) cb.pureLandSale.enabled = false;
        if (cb.pureLandSale.sellLandRatio == null) cb.pureLandSale.sellLandRatio = 0;
        if (cb.pureLandSale.landSalePrice == null) cb.pureLandSale.landSalePrice = 0;
        if (cb.pureLandSale.year == null) cb.pureLandSale.year = 0;
        if (cb.pureLandSale.month == null) cb.pureLandSale.month = 0;
      }
      if (cb.volTransfer && typeof cb.volTransfer === "object") {
        if (cb.volTransfer.year == null) cb.volTransfer.year = 0;
        if (cb.volTransfer.month == null) cb.volTransfer.month = 0;
      }
      (cb.customScenarios || []).forEach(cs => {
        if (cs.rent && typeof cs.rent === "object") {
          if (!(Number(cs.rent.monthlyRent) > 0) && Number(cs.rent.monthlyUnit) > 0) cs.rent.monthlyRent = Number(cs.rent.monthlyUnit) / 10000;
          delete cs.rent.monthlyUnit;
        }
        if (cs.business && typeof cs.business === "object") {
          if (!(Number(cs.business.perfPerPing) > 0) && Number(cs.business.monthlyUnit) > 0) cs.business.perfPerPing = Number(cs.business.monthlyUnit) / 10000;
          delete cs.business.monthlyUnit;
        }
      });
      // 自訂情境內的也補
      (cb.customScenarios || []).forEach(cs => {
        if (Array.isArray(cs.disposals)) cs.disposals.forEach(d => { if (d.catKey == null) d.catKey = ""; });
        if (cs.rent && typeof cs.rent === "object" && cs.rent.catKey == null) cs.rent.catKey = "";
        if (cs.business && typeof cs.business === "object" && cs.business.catKey == null) cs.business.catKey = "";
      });
      // 自 v108: customScenarios 從「百分比」結構升級為「完整經營行為」結構
      //   舊: { id, label, disposalPct, rentPct, businessPct, holdYears, volTransferEnabled }
      //   新: { id, label, holdYears, disposals:[], rent:{}, business:{}, volTransferEnabled, _full:true }
      //   展開邏輯比照 makeCustomOverride: 用基準情境 (cb) 的 disposals/rent/business 當範本, 套百分比
      cb.customScenarios = cb.customScenarios.map(cs => {
        if (cs._full) return cs;  // 已是新結構, 不重複展開
        const dispPct = Math.max(0, Math.min(100, Number(cs.disposalPct)||0));
        const rentPct = Math.max(0, Math.min(100, Number(cs.rentPct)||0));
        const bizPct  = Math.max(0, Math.min(100, Number(cs.businessPct)||0));
        const holdY   = Math.max(0, Number(cs.holdYears)||0);
        const dispScale = dispPct / 100;
        const baseDisposals = cb.disposals || [];
        const rentMonthly = (cb.rent && Number(cb.rent.monthlyRent)) || 0;
        const bizMonthly  = (cb.business && Number(cb.business.perfPerPing)) || 0;
        const baseStartY  = (cb.rent && cb.rent.startYear) || (cb.business && cb.business.startYear) || 0;
        return {
          id: cs.id,
          label: cs.label || `自訂 ${cs.id}`,
          _full: true,
          holdYears: holdY,
          // 自 v146: ratio 模式縮 areaPct, fixed 模式縮 area (原本只縮 area, 對價值導向比例模式無效)
          disposals: baseDisposals.map(d => d.areaMode === "ratio"
            ? ({...d, enabled: dispPct > 0, areaPct: (Number(d.areaPct)||0) * dispScale})
            : ({...d, enabled: dispPct > 0, area: (Number(d.area)||0) * dispScale})),
          rent:     { ...(cb.rent||{}),     enabled: rentPct > 0, areaPct: rentPct, areaInput: 0, monthlyRent: rentMonthly, startYear: baseStartY, endYear: baseStartY + holdY },
          business: { ...(cb.business||{}), enabled: bizPct > 0,  areaPct: bizPct,  areaInput: 0, perfPerPing: bizMonthly,  startYear: baseStartY, endYear: baseStartY + holdY },
          volTransferEnabled: !!cs.volTransferEnabled,
          // 全域參數覆寫 (null = 繼承基準情境); 階段 2 dialog 才會用到
          overrides: cs.overrides || null
        };
      });
    }
    // 自 v111: 自由組合分回
    if (!d.shareComposition || typeof d.shareComposition !== "object") {
      d.shareComposition = { enabled: false, byRole: {} };
    } else {
      if (d.shareComposition.enabled == null) d.shareComposition.enabled = false;
      if (!d.shareComposition.byRole || typeof d.shareComposition.byRole !== "object") d.shareComposition.byRole = {};
    }
    // 自 v122: 自由組合 item 補 mode (既有 item 視為 fixed); 含分配方案內的組合
    {
      const _fixItems = (byRole) => {
        if (!byRole || typeof byRole !== "object") return;
        Object.values(byRole).forEach(c => {
          if (c && Array.isArray(c.items)) c.items.forEach(it => { if (it && it.mode == null) it.mode = "fixed"; });
        });
      };
      _fixItems(d.shareComposition.byRole);
      (d.allocScenarios || []).forEach(asc => { if (asc.shareComposition) _fixItems(asc.shareComposition.byRole); });
    }
    // 自 v67: 交屋日 (預估完工/移轉所有權日)
    if (!d.handoverDate || typeof d.handoverDate !== "object") {
      d.handoverDate = { year: 0, month: 0 };
    }
    // 自 v71: 捐贈土地
    if (!d.donation || typeof d.donation !== "object") {
      d.donation = { enabled: false, mode: "ratio", ratio: 0, area: 0 };
    } else {
      if (d.donation.enabled == null) d.donation.enabled = false;
      if (!d.donation.mode) d.donation.mode = "ratio";
      if (d.donation.ratio == null) d.donation.ratio = 0;
      if (d.donation.area == null) d.donation.area = 0;
    }
    // 自 v128: 土地價值認列 — 舊 "appraisal" 正名為 "announced" (公告總值)
    {
      const _fixLV = (lvObj) => { if (lvObj && lvObj.mode === "appraisal") lvObj.mode = "announced"; };
      _fixLV(d.builderLandValuation);
      (d.owners || []).forEach(o => _fixLV(o.landValuation));
    }
    // 自 v74: 分配方案
    if (!Array.isArray(d.allocScenarios)) d.allocScenarios = [];
    // 自 v124: T2 基準參數覆寫
    if (!d.t2Baseline || typeof d.t2Baseline !== "object") d.t2Baseline = { prices: {}, constructCost: null };
    else { if (!d.t2Baseline.prices || typeof d.t2Baseline.prices !== "object") d.t2Baseline.prices = {}; if (d.t2Baseline.constructCost === undefined) d.t2Baseline.constructCost = null; }
    // 自 v123: 售價方案補 resPrice (舊 price → resPrice; 都沒有 → 住宅單價)
    if (Array.isArray(d.scenarios)) {
      const _resUP = (d.salesMix && d.salesMix.res && Number(d.salesMix.res.uP)) || Number(d.uP) || 0;
      const _baseCost = Number(d.cC) || 0;
      d.scenarios.forEach((s, idx) => {
        if (s.resPrice == null) s.resPrice = (s.price != null ? s.price : _resUP);
        if (s.price == null) s.price = s.resPrice;  // 保留 price 相容
        // 自 v142: 第一筆 = 基準方案 — label 正規化為「基準」, 並連動基準值 (若為 0/未設則補基準單價/造價)
        if (idx === 0) {
          s.label = "基準";
          if (!(Number(s.resPrice) > 0) && _resUP > 0) { s.resPrice = _resUP; s.price = _resUP; }
          if (!(Number(s.cost) > 0) && _baseCost > 0) s.cost = _baseCost;
        }
      });
    }
    // 自 v120: 選配群組 (members 過濾掉已不存在的 owner; 成員<2 的群組視為無效移除)
    if (!Array.isArray(d.selectGroups)) d.selectGroups = [];
    {
      // 自 v136: 成員 id 正規化 — 對齊 owner.id 的型別 (修正舊群組 members 存字串、owner.id 數字時被誤過濾/加總失配)
      const _ownerById = {};
      (d.owners || []).forEach(o => { _ownerById[String(o.id)] = o.id; });
      d.selectGroups = d.selectGroups
        .map(g => ({
          ...g,
          // 用字串比對找到對應 owner, 取回 owner.id 的原型別存入 (型別統一)
          members: (g.members || []).map(mid => _ownerById[String(mid)]).filter(v => v !== undefined)
        }))
        .filter(g => (g.members || []).length >= 2);
      // 若目前 myRole 指向已不存在的群組, 退回建商
      if (typeof d.myRole === "string" && d.myRole.startsWith("group_")) {
        const gid = d.myRole.slice(6);
        if (!d.selectGroups.some(g => g.id === gid)) d.myRole = "builder";
      }
    }
    // 自 v113: 各分配方案補 shareComposition (複製當時基準, 保留既有行為)
    const _baseComp = (d.shareComposition && d.shareComposition.byRole) ? d.shareComposition.byRole : {};
    d.allocScenarios = d.allocScenarios.map(asc => {
      if (asc.shareComposition && asc.shareComposition.byRole) return asc;
      return { ...asc, shareComposition: { byRole: JSON.parse(JSON.stringify(_baseComp)) } };
    });
    // 自 v79: 建商土地價值認列
    if (!d.builderLandValuation || typeof d.builderLandValuation !== "object") {
      d.builderLandValuation = { mode: "appraisal", bookValue: 0, acquiredValue: 0 };
    } else {
      if (!d.builderLandValuation.mode) d.builderLandValuation.mode = "appraisal";
      if (d.builderLandValuation.bookValue == null) d.builderLandValuation.bookValue = 0;
      if (d.builderLandValuation.acquiredValue == null) d.builderLandValuation.acquiredValue = 0;
    }
    // 各地主 owner.landValuation
    if (Array.isArray(d.owners)) {
      d.owners.forEach(o => {
        if (!o.landValuation || typeof o.landValuation !== "object") {
          o.landValuation = { mode: "appraisal", bookValue: 0, acquiredValue: 0 };
        } else {
          if (!o.landValuation.mode) o.landValuation.mode = "appraisal";
          if (o.landValuation.bookValue == null) o.landValuation.bookValue = 0;
          if (o.landValuation.acquiredValue == null) o.landValuation.acquiredValue = 0;
        }
      });
    }
    // 自 v64: salesMix/parkingMix 補欄位 (舊專案: 100% 住宅 + 全平面車位)
    if (!d.salesMix || typeof d.salesMix !== "object") {
      d.salesMix = {
        res:    { mode: "ratio", ratio: 1.0, area: 0, uP: Number(d.uP) || 0 },
        retail: { mode: "ratio", ratio: 0,   area: 0, uP: 0 },
        office: { mode: "ratio", ratio: 0,   area: 0, uP: 0 },
      };
    } else {
      if (!d.salesMix.res)    d.salesMix.res    = { mode: "ratio", ratio: 1.0, area: 0, uP: Number(d.uP) || 0 };
      if (!d.salesMix.retail) d.salesMix.retail = { mode: "ratio", ratio: 0,   area: 0, uP: 0 };
      if (!d.salesMix.office) d.salesMix.office = { mode: "ratio", ratio: 0,   area: 0, uP: 0 };
    }
    if (!d.parkingMix || typeof d.parkingMix !== "object") {
      d.parkingMix = {
        flat:       { count: Number(d.parking) || 0, uP: Number(d.pP) || 0 },
        mechanical: { count: 0, uP: 0 },
      };
    } else {
      if (!d.parkingMix.flat)       d.parkingMix.flat       = { count: Number(d.parking) || 0, uP: Number(d.pP) || 0 };
      if (!d.parkingMix.mechanical) d.parkingMix.mechanical = { count: 0, uP: 0 };
    }
    // 自 v68/v103: 載入時一次性同步 p.cC = 等效每坪 (依目前 ci.co.mode)
    //   v103: 分母改用 totalFloorArea (與 cS / dr.cC 一致)
    try {
      const _co = d.costItems && d.costItems.co;
      if (_co) {
        const _dr = calcDerived(d);
        const _floor = _dr.totalFloorArea || _dr.totalArea || 0;
        if (_floor > 0) {
          const _ctx = { sales: _dr.ts || 0, totalArea: _dr.totalArea || 1, totalCost: 0, floorArea: _floor };
          const _amount = calcCostItemValue({..._co, _stdKey: "co"}, _ctx);
          const _newCC = _amount / _floor;
          if (_newCC > 0) {
            d.cC = +_newCC.toFixed(2);
            d._cCLastSyncArea = _floor;
          }
        }
      }
    } catch (e) { /* 容錯: 不阻擋載入 */ }
    return d;
  };

  const loadProject = (id) => {
    const pr = projects.find(x => x.id === id);
    if (!pr) return;
    if (currentId !== id) {
      if (!window.confirm(`要載入「${pr.name}」嗎？\n若目前工作區尚有未儲存變更，請先按「儲存」。`)) return;
    }
    sP(migrateProject(pr.data));
    setCurrentId(id);
    setProjectName(pr.name);
    setDirty(false);
  };

  const newProject = () => {
    if (!window.confirm("建立新專案？\n目前工作區將清空為空白範本 (未儲存變更會遺失)。")) return;
    sP(BLANK);
    setCurrentId(null);
    setDirty(false);
    setProjectName("新專案");
  };

  const deleteProject = async (id, name) => {
    if (!window.confirm(`確定要刪除「${name}」嗎？\n此操作無法復原 (若已同步到雲端, 也會一併刪除雲端版本)。`)) return;
    // 若有 cloudPid → 同步刪雲端
    const proj = projects.find(p => p.id === id);
    if (proj && proj.cloudPid) {
      try {
        await apiClient.deleteProject(session.userId, proj.cloudPid);
      } catch (err) {
        // 雲端刪除失敗不阻擋本地刪除, 但提示
        console.warn("雲端刪除失敗:", err.message);
      }
    }
    store.deleteProject(session.userId, id);
    if (currentId === id) {
      sP(BLANK); setCurrentId(null); setProjectName("新專案");
    }
    refreshProjects();
  };


  const exportProjects = () => {
    const payload = { version: "v8", exportedAt: new Date().toISOString(), projects };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `建設開發智腦_專案備份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importProjects = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const incoming = Array.isArray(parsed?.projects) ? parsed.projects : null;
        if (!incoming) { alert("❌ 檔案格式錯誤"); return; }
        if (!window.confirm(`匯入 ${incoming.length} 個專案？\n按確定合併至您的列表 (同名稱自動更名, 並同步上傳到雲端)。`)) return;
        const existingNames = new Set(projects.map(x => x.name));
        let count = 0, cloudOk = 0, cloudErr = 0;
        const errs = [];
        for (const pr of incoming) {
          let n = pr.name;
          let i = 2;
          while (existingNames.has(n)) { n = pr.name + "(" + (i++) + ")"; }
          existingNames.add(n);
          const saved = store.saveProject(session.userId, { name: n, data: pr.data });
          count++;
          try {
            const r = await apiClient.createProject(session.userId, {...pr.data, _name: n});
            store.saveProject(session.userId, {...saved, cloudPid: r.pid});
            cloudOk++;
          } catch (err) {
            cloudErr++;
            errs.push(`${n}: ${err.message}`);
          }
        }
        refreshProjects();
        alert(`✓ 已匯入 ${count} 個專案\n☁️ 雲端上傳: 成功 ${cloudOk} / 失敗 ${cloudErr}${errs.length>0?"\n\n錯誤:\n"+errs.slice(0,5).join("\n"):""}`);
      } catch (err) {
        alert("❌ 匯入失敗：" + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  /* ─── Excel 匯出 ─── */
  // 兩種用法：
  //  - exportExcel()        => 匯出目前工作區
  //  - exportExcel(project) => 匯出列表上指定的專案
  const exportExcel = (project) => {
    try {
      if (project && project.data) {
        exportProjectToExcel(project);
      } else {
        exportProjectToExcel({ name: projectName || "新專案", data: p });
      }
    } catch (e) {
      alert("❌ 匯出 Excel 失敗：" + e.message);
      console.error(e);
    }
  };

  /* ─── 衍生計算 (供 Header / 快速摘要使用) ─── */
  const dr = calcDerived(p);
  const base = useMemo(() => {
    const myRole = p.myRole || "builder";
    const myOwner = (myRole.startsWith("owner_") && p.jb)
      ? p.owners.find(o => ("owner_"+o.id) === myRole)
      : null;
    return myOwner
      ? cS(p, dr, dr.weightedUP, p.cC, "o", myOwner.ratio)
      : cS(p, dr, dr.weightedUP, p.cC, "b", 0);
  }, [p]);
  // snap: 完整投資綜合報告快照 (依分析模式), 給頂部 ROI 用
  const baseSnap = useMemo(() => calcT8Snapshot(p, dr), [p]);
  const headerROI = (baseSnap.burdenCost + baseSnap.ll + baseSnap.cl) > 0
    ? (baseSnap.roi * 100).toFixed(1) + "%"
    : "—";

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-100 via-sky-50/20 to-slate-100" style={{fontFamily:"'Noto Sans TC',system-ui,sans-serif"}}>
      {/* Header */}
      <header className="sticky top-0 z-50 bg-slate-50/95 backdrop-blur border-b border-slate-200 text-slate-900">
        <div className="max-w-[1440px] mx-auto px-5 py-3 flex items-center justify-between gap-4">
          {/* Left: Logo + 問候 */}
          <div className="flex items-center gap-3">
            <button className="lg:hidden p-1 text-slate-700" onClick={()=>sMM(!mm)}><svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
            <div className="w-11 h-11 rounded-2xl bg-logo-leasing bg-center bg-cover flex items-center justify-center font-black text-base shrink-0"></div>
            <div className="hidden sm:block">
              <div className="font-bold text-base text-slate-900">Hello, {session.userId}!</div>
              <div className="text-[11px] text-slate-500">Explore information and activity about your projects.</div>
            </div>
          </div>
          {/* Right: 目前專案 + KPI + 設定 + 帳號 */}
          <div className="hidden md:flex items-center gap-3">
            <div className="flex gap-5">
              {[{l:"總銷",v:fmt(dr.ts)},{l:"淨利",v:fmt(base.pat),c:base.pat>0?"text-emerald-700":"text-rose-600"},{l:"淨利率",v:pct(base.nm)},{l:"ROI",v:headerROI,c:"text-tan-700"}].map((m,i)=>(
                <div key={i} className="text-center">
                  <div className="text-[9px] text-slate-500 uppercase tracking-wide">{m.l}</div>
                  <div className={"font-bold text-sm font-mono "+(m.c||"text-slate-900")}>{m.v}</div>
                </div>
              ))}
            </div>
            <div className="h-8 w-px bg-slate-300"/>
            {/* 系統設定 */}
            <button onClick={openSystemSettings} title="系統資料維護"
              className="p-2 text-slate-500 hover:text-slate-900 hover:bg-slate-200/70 rounded-xl transition-colors">
              <Icon name="settings" size={18}/>
            </button>
            {/* 登出 */}
            <button onClick={() => { if (window.confirm("確定要登出？\n未儲存的變更會遺失 (但已同步到雲端的資料仍可用同 USERID 取回)。")) onLogout(); }}
              title="登出"
              className="p-2 text-slate-500 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors">
              <Icon name="log-out" size={16}/>
            </button>
          </div>
          {/* 行動版簡易使用者狀態 */}
          <div className="md:hidden flex items-center gap-2">
            <button onClick={openSystemSettings} title="系統資料維護" className="p-1 text-slate-500">
              <Icon name="settings" size={16}/>
            </button>
            <span className="text-[10px] text-slate-600 font-mono max-w-[100px] truncate">{session.userId}</span>
            <button onClick={() => { if (window.confirm("登出？")) onLogout(); }}
              className="px-2 py-1 text-[10px] text-rose-600 border border-rose-300 rounded">登出</button>
          </div>
        </div>
      </header>

      <div className="max-w-[1440px] mx-auto flex relative">
        {mm && <div className="fixed inset-0 bg-black/30 z-30 lg:hidden" onClick={()=>sMM(false)}/>}
        {/* Sidebar */}
        <aside className={"fixed lg:sticky lg:self-start top-[68px] left-0 z-40 lg:z-0 h-[calc(100dvh-68px)] w-64 shrink-0 bg-white lg:bg-transparent border-r lg:border-r-0 transition-transform duration-300 overflow-y-auto "+(mm?"translate-x-0":"-translate-x-full lg:translate-x-0")}>
          <nav className="p-3 space-y-2 lg:pt-5">
            {/* 專案管理 */}
            <ProjectManager
              projects={projects}
              currentId={currentId}
              dirty={dirty}
              projectName={projectName}
              setProjectName={setProjectName}
              onSave={saveCurrent}
              onLoad={loadProject}
              onNew={newProject}
              onDelete={deleteProject}
              onExport={exportProjects}
              onImport={importProjects}
              onExportExcel={exportExcel}
              onCloudPush={async () => {
                if (projects.length === 0) { alert("沒有本地專案可上傳"); return; }
                if (!window.confirm(`將把 ${projects.length} 個本地專案推送到雲端 (USERID: ${session.userId})\n\n• 已有對應 pid 的專案: 更新\n• 沒有 pid 的專案: 新增 (後端配發 pid)\n\n繼續?`)) return;
                let okCnt = 0, errCnt = 0;
                const errs = [];
                for (const pr of projects) {
                  try {
                    const dataWithName = {...pr.data, _name: pr.name};  // 把名字塞 data 裡, 後端無 name 欄位
                    if (pr.cloudPid) {
                      await apiClient.updateProject(session.userId, pr.cloudPid, dataWithName);
                    } else {
                      const r = await apiClient.createProject(session.userId, dataWithName);
                      // 把 cloudPid 寫回本地
                      store.saveProject(session.userId, {...pr, cloudPid: r.pid});
                    }
                    okCnt++;
                  } catch (err) {
                    errCnt++;
                    errs.push(`${pr.name}: ${err.message}`);
                  }
                }
                refreshProjects();
                alert(`☁️↑ 雲端上傳完成\n成功 ${okCnt} / 失敗 ${errCnt}${errs.length>0?"\n\n錯誤:\n"+errs.slice(0,5).join("\n"):""}`);
              }}
              onCloudPull={async () => {
                if (!window.confirm(`從雲端載入 USERID「${session.userId}」的所有專案?\n\n• 雲端有但本地無的 → 新增到本地\n• 本地與雲端同 pid → 以雲端為主覆寫本地\n• 純本地專案 → 保留不動\n\n繼續?`)) return;
                try {
                  const cloud = await apiClient.listProjects(session.userId);
                  if (!cloud || cloud.length === 0) { alert("雲端沒有此 USERID 的專案"); return; }
                  let added = 0, updated = 0;
                  cloud.forEach(c => {
                    const name = (c.data && c.data._name) || ("雲端_" + c.pid.slice(0,6));
                    const existing = projects.find(pr => pr.cloudPid === c.pid);
                    if (existing) {
                      store.saveProject(session.userId, {...existing, name, data: c.data, cloudPid: c.pid});
                      updated++;
                    } else {
                      store.saveProject(session.userId, {name, data: c.data, cloudPid: c.pid});
                      added++;
                    }
                  });
                  refreshProjects();
                  alert(`☁️↓ 雲端載入完成\n新增 ${added} / 更新 ${updated} 個專案`);
                } catch (err) {
                  alert("雲端載入失敗: " + err.message);
                }
              }}
            />
            {/* 分頁 */}
            <div className="space-y-1">
              {TABS.map(t=>(
                <button key={t.k} onClick={()=>{setTab(t.k);sMM(false)}} className={"w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-all "+(tab===t.k?"bg-sky-700 text-white shadow-lg font-bold":"text-slate-600 hover:bg-white hover:shadow-sm")}>
                  <Icon name={t.i} size={18}/>
                  <div className="text-left"><div>{t.l}</div><div className={"text-[10px] "+(tab===t.k?"text-emerald-200":"text-slate-400")}>{t.d}</div></div>
                </button>
              ))}
            </div>
            {/* 快速摘要 */}
            <div className="p-3 bg-white rounded-2xl border shadow-sm">
              <div className="text-[10px] text-slate-400 font-bold mb-2">快速摘要</div>
              <div className="space-y-1.5 text-xs">
                {(() => {
                  // 從表 1 取使用分區, 去重, 過濾空值
                  const zones = Array.from(new Set((p.lands || []).map(l => l.zone).filter(z => z && z.trim())));
                  const zoneStr = zones.length === 0 ? "未設定"
                    : zones.length === 1 ? zones[0] + " " + (dr.baseFAR*100).toFixed(0) + "%"
                    : zones.join("、") + " (加權 " + (dr.baseFAR*100).toFixed(0) + "%)";
                  return [["分區", zoneStr], ["面積", fmt(dr.totalArea)+"坪"], ["售價", fmt2(p.uP)+"萬"], ["造價", fmt2(p.cC)+"萬"]].map(([l,v],i)=>(
                    <div key={i} className="flex justify-between gap-2"><span className="text-slate-500 whitespace-nowrap">{l}</span><span className="font-bold text-right break-words">{v}</span></div>
                  ));
                })()}
                <div className="border-t my-1.5"/>
                <div className="flex justify-between"><span className="text-slate-500">建商淨利</span><span className={"font-black text-sm "+(base.pat>0?"text-emerald-600":"text-rose-600")}>{fmt(base.pat)}</span></div>
              </div>
            </div>
          </nav>
        </aside>

        {/* Main content */}
        <main className="flex-1 min-w-0 py-5 px-3 lg:px-6">
          <div className="mb-5">
            <div className="text-xs text-slate-400 mb-0.5">{projectName || "新專案"} / {TABS.find(t=>t.k===tab)?.l}</div>
            <h1 className="text-xl font-black text-slate-800 flex items-center gap-2">
              <Icon name={TABS.find(t=>t.k===tab)?.i || "circle"} size={24}/>
              <span>{TABS.find(t=>t.k===tab)?.l}</span>
            </h1>
          </div>
          {tab==="a" && <T1 p={p} sP={sP}/>}
          {tab==="b" && <T6 p={p} sP={sP}/>}
          {tab==="j" && <TJb p={p} sP={sP}/>}
          {tab==="p" && <T2 p={p} sP={sP}/>}
          {tab==="o" && <TOpt p={p} sP={sP}/>}
          {tab==="c" && <T3 p={p} sP={sP}/>}
          {tab==="s" && <T4 p={p} sP={sP}/>}
          {tab==="u" && <T5 p={p} sP={sP}/>}
          {/* 自 v110 (階段3): T7 經營分析 tab 已移除, 經營行為設定收進 T2 損益分析的「處置情境」dialog */}
          <div className="mt-10 text-center text-[11px] text-slate-400 py-4 border-t">台灣建設開發智腦 v12.0 · 登入 · 多專案 · Excel 匯出 · 面積精算 · 父子獎勵 · 合建分回面積 · 土增稅§33 · 契稅條例§3</div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
</script>
</body>
</html>
