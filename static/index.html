   Sage / 暖奶油 設計系統 — 色階覆寫 (全面和諧化)
   參考: sage-green + warm-cream dashboard
   做法: 覆寫 Tailwind 內建色階，全站既有 utility class 自動換色
   結構 DNA 沿用 Soft Glass: 大圓角 / 雙光源柔光陰影 / 克制強調色 / 400·600 字重 / 不用純黑
════════════════════════════════════════════════════════════ */
tailwind.config = {
  theme: {
    extend: {
      colors: {
        /* ── 系 1：暖灰中性骨幹 ── 收斂後 amber/sky/violet 全部併入此系 */
        slate:  {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        gray:   {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        amber:  {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        yellow: {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        orange: {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        /* sky = sage 但整體往淺移兩階 (使用者覺得太重) */
        sky:    {50:"#F4F6F2",100:"#F4F6F2",200:"#F4F6F2",300:"#E7ECE2",400:"#CFD9C7",500:"#B0C0A4",600:"#8FA47F",700:"#728B5F",800:"#5E7350",900:"#4D5E42",950:"#3D4B36"},
        blue:   {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        cyan:   {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        indigo: {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        violet: {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        purple: {50:"#F5F3EE",100:"#ECEAE3",200:"#E2DFD7",300:"#CCC8BD",400:"#9C998F",500:"#807D73",600:"#6A685F",700:"#54524A",800:"#393730",900:"#262420",950:"#171511"},
        /* ── 系 2：主色 sage 綠 + 正向 ── 偏黃綠/橄欖 (取代 emerald / green / teal) */
        emerald: {50:"#F4F6F2",100:"#E7ECE2",200:"#CFD9C7",300:"#B0C0A4",400:"#8FA47F",500:"#728B5F",600:"#5E7350",700:"#4D5E42",800:"#3D4B36",900:"#2F3A2B",950:"#1E2519"},
        green:   {50:"#F4F6F2",100:"#E7ECE2",200:"#CFD9C7",300:"#B0C0A4",400:"#8FA47F",500:"#728B5F",600:"#5E7350",700:"#4D5E42",800:"#3D4B36",900:"#2F3A2B",950:"#1E2519"},
        teal:    {50:"#F4F6F2",100:"#E7ECE2",200:"#CFD9C7",300:"#B0C0A4",400:"#8FA47F",500:"#728B5F",600:"#5E7350",700:"#4D5E42",800:"#3D4B36",900:"#2F3A2B",950:"#1E2519"},
        /* ── 系 3：負向陶土紅 ── (取代 rose / red) */
        rose: {50:"#F8EDE9",100:"#F0DAD2",200:"#E4BCAF",300:"#D69C8B",400:"#C87A66",500:"#BC6149",600:"#A9543D",700:"#8E4633",800:"#723829",900:"#5A2C20",950:"#3C1D15"},
        red:  {50:"#F8EDE9",100:"#F0DAD2",200:"#E4BCAF",300:"#D69C8B",400:"#C87A66",500:"#BC6149",600:"#A9543D",700:"#8E4633",800:"#723829",900:"#5A2C20",950:"#3C1D15"},
        /* ── 系 4：暖駝強調色 tan ── 跟 sage 形成暖冷對比 (highlight / 未儲存提示 / 強調) */
        tan: {50:"#FAF4EC",100:"#F2E5D2",200:"#E6CDA8",300:"#D9B582",400:"#CFA275",500:"#C49A6C",600:"#A67E54",700:"#856641",800:"#644D31",900:"#483823",950:"#2E2415"}
      },
      boxShadow: {
        /* 雙光源柔光陰影 (環境暖光 + sage 主光) */
        sm: "0px 0px 2px rgba(255,255,255,0.6), 0px 1px 4px rgba(95,107,74,0.10)",
        DEFAULT: "0px 0px 2px rgba(255,255,255,0.6), 0px 2px 8px rgba(95,107,74,0.12)",
        md: "0px 0px 2px rgba(255,255,255,0.6), 0px 4px 14px rgba(95,107,74,0.14)",
        lg: "0px 2px 6px rgba(95,107,74,0.10), 0px 10px 28px rgba(95,107,74,0.16)"
      },
      backgroundImage: {
        'logo-leasing': 'url("./assets/logo-leasing.png")'
      }
    }
  }
};

<script>
// 自 v187: 全局錯誤捕獲，讓 React render 錯誤顯示在頁面上（而非只在 console）
window.__LAST_ERROR__ = null;
window.addEventListener("error", (e) => {
  window.__LAST_ERROR__ = e.message + "\n" + (e.error?.stack || "");
  const el = document.getElementById("__error_overlay__");
  if (el) { el.style.display = "block"; el.textContent = "JS Error:\n" + window.__LAST_ERROR__; }
});
window.addEventListener("unhandledrejection", (e) => {
  window.__LAST_ERROR__ = "Unhandled Promise:\n" + (e.reason?.message || e.reason);
  const el = document.getElementById("__error_overlay__");
  if (el) { el.style.display = "block"; el.textContent = window.__LAST_ERROR__; }
});
</script>
<div id="__error_overlay__" style="display:none;position:fixed;top:0;left:0;right:0;background:#fee2e2;color:#991b1b;padding:16px;z-index:99999;font-family:monospace;font-size:12px;white-space:pre-wrap;border-bottom:2px solid #ef4444;max-height:40vh;overflow-y:auto"></div>
<script type="text/babel">
const {useState, useMemo, useEffect} = React;
const fmt = (n, d=0) => {
  if (n == null || isNaN(n)) return "—";
  return n.toLocaleString("zh-TW", {minimumFractionDigits:d, maximumFractionDigits:d});
};
// 自 v69: 無條件捨去到 2 位小數, 用於造價/比率類的顯示 (避免四捨五入產生誤差)
const fmt2 = (n) => {
  if (n == null || isNaN(n)) return "—";
  const floored = Math.floor(Number(n) * 100) / 100;
  return floored.toLocaleString("zh-TW", {minimumFractionDigits:2, maximumFractionDigits:2});
};
const pct = n => (n == null || isNaN(n)) ? "—" : (n*100).toFixed(1)+"%";
let _uid = 100;
const uid = () => ++_uid;

/* ════════════════════════════════════════
   API 抽象層 (對接後端 OpenAPI)
   設計成「介面」: 未來後端通了, useMockData = false 即可
════════════════════════════════════════ */
const API_CONFIG = {
  baseURL: "https://land-information-fthtdzgtf8b8cdgb.canadacentral-01.azurewebsites.net",  // 後端 URL (Azure)
  useMockData: false,       // true = 用假資料 (本機開發); false = 呼叫真實 API
  timeout: 10000,           // 請求逾時 (ms)
  // Azure 不需要 ngrok-skip-browser-warning, 保留空物件給 fetch 用
  extraHeaders: {},
};

// ── 假資料生成器 ──
function _mockGetProject(uuid) {
  // 模擬延遲
  return new Promise((res) => setTimeout(() => {
    res({
      uuid,
      data: {
        // 假資料: 回傳空專案結構, 實際應從 localStorage 撈
        _mock: true,
        _note: "假資料 (後端 API 未連線)"
      }
    });
  }, 300));
}

function _mockQueryParcel(payload) {
  // 根據縣市/分區推斷合理的建蔽率、容積率假值
  const ZONE_DEFAULTS = {
    "第一種住宅區": { bcr: 30, far: 60 },
    "第二種住宅區": { bcr: 35, far: 120 },
    "第三種住宅區": { bcr: 45, far: 225 },
    "第四種住宅區": { bcr: 50, far: 300 },
    "第一種商業區": { bcr: 55, far: 360 },
    "第二種商業區": { bcr: 65, far: 630 },
    "第三種商業區": { bcr: 65, far: 560 },
    "第四種商業區": { bcr: 75, far: 800 },
    "商業區":       { bcr: 65, far: 560 },
    "工業區":       { bcr: 70, far: 210 },
  };
  const zone = ZONE_DEFAULTS[payload.land_use_zone] || { bcr: 60, far: 240 };
  // 假面積 (m²): 隨機合理範圍
  const area = 500 + Math.floor(Math.random() * 1500);
  // 公告現值 (元/m²): 假設台幣 50,000~200,000
  const PRICE_BY_COUNTY = {
    "臺北市": 200000, "台北市": 200000,
    "新北市": 80000,  "桃園市": 50000,  "新竹市": 60000,
    "臺中市": 60000,  "台中市": 60000,
    "臺南市": 35000,  "台南市": 35000,
    "高雄市": 40000,
  };
  const announcedValue = (PRICE_BY_COUNTY[payload.county] || 50000) * 0.4;  // 公告現值約市價 40%
  // 套用持分
  const share = Number(payload.share) || 1;
  return new Promise((res) => setTimeout(() => {
    res({
      building_coverage: zone.bcr,
      floor_area_ratio: zone.far,
      area: area * share,
      announced_value: announcedValue * share,
    });
  }, 500));
}

function _mockQueryHousePrice(payload) {
  // 依縣市 / 行政區回傳合理的單價 (元/m²) — 對應市價, 約市價的萬/坪
  // 1 坪 ≈ 3.30579 m²; 換算: 萬/坪 → 元/m² 約 = X × 10000 / 3.30579
  const PRICE_BY_COUNTY = {  // 萬/坪
    "臺北市": 200, "台北市": 200,
    "新北市": 80,  "桃園市": 50,  "新竹市": 60,
    "臺中市": 60,  "台中市": 60,
    "臺南市": 35,  "台南市": 35,
    "高雄市": 40,
  };
  const wanPerPing = PRICE_BY_COUNTY[payload.county] || 50;
  // 加一點隨機 ±15%
  const adj = wanPerPing * (0.85 + Math.random() * 0.30);
  const unitPrice = adj * 10000 / 3.30579;  // 換算回元/m²
  return new Promise((res) => setTimeout(() => {
    res({ unit_price: unitPrice });
  }, 600));
}

function _mockUploadZoning(file) {
  return new Promise((res) => setTimeout(() => {
    res({
      inserted: 12,
      updated: 5,
      skipped: 1,
      errors: ["line 7: 縣市欄位為空 (跳過)"]
    });
  }, 800));
}

// ── API client ──
// 對應後端 OpenAPI 規格 (Land Information Backend, 2026-05-28)
const apiClient = {
  // GET /api/users/{user_id}/projects — 取得使用者所有專案
  async listProjects(userId) {
    if (API_CONFIG.useMockData) return [];
    const url = `${API_CONFIG.baseURL}/api/users/${encodeURIComponent(userId)}/projects`;
    const resp = await fetch(url, { headers: { ...(API_CONFIG.extraHeaders||{}) } });
    if (!resp.ok) throw new Error(`API 失敗 (${resp.status})`);
    return await resp.json();  // [{pid, user_id, data}, ...]
  },
  // POST /api/projects — 新增專案 → 回 {pid, user_id, data}
  async createProject(userId, data) {
    if (API_CONFIG.useMockData) return { pid: "mock-" + Date.now(), user_id: userId, data };
    const url = `${API_CONFIG.baseURL}/api/projects`;
    const data_enc = await aesEncryptJSON(data);  // 自 v179: 送出前 AES-GCM 加密
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(API_CONFIG.extraHeaders||{}) },
      body: JSON.stringify({ user_id: userId, data_enc })
    });
    if (!resp.ok) throw new Error(`新增專案失敗 (${resp.status})`);
    return await resp.json();
  },
  // PUT /api/projects — 更新專案 (整包覆寫 data)
  async updateProject(userId, pid, data) {
    if (API_CONFIG.useMockData) return { pid, user_id: userId, data };
    const url = `${API_CONFIG.baseURL}/api/projects`;
    const data_enc = await aesEncryptJSON(data);  // 自 v179: 送出前 AES-GCM 加密
    const resp = await fetch(url, {
      method: "PUT",
      headers: { "Content-Type": "application/json", ...(API_CONFIG.extraHeaders||{}) },
      body: JSON.stringify({ user_id: userId, pid, data_enc })
    });
    if (!resp.ok) {
      if (resp.status === 404) throw new Error("找不到對應的專案");
      if (resp.status === 403) throw new Error("無權限 (使用者與專案擁有者不符)");
      throw new Error(`更新專案失敗 (${resp.status})`);
    }
    return await resp.json();
  },
  // POST /api/parcels — 查詢地號相關資訊 (建蔽率/容積率/面積/公告現值)
  // 注意: house_price 已分離到單獨端點 /api/house-price
  async queryParcel(payload) {
    if (API_CONFIG.useMockData) return _mockQueryParcel(payload);
    const url = `${API_CONFIG.baseURL}/api/parcels`;
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(API_CONFIG.extraHeaders||{}) },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      if (resp.status === 404) throw new Error("找不到符合條件的使用分區資料");
      if (resp.status === 502) throw new Error("地政資料服務暫時無法回應, 請稍後再試");
      throw new Error(`API 失敗 (${resp.status})`);
    }
    return await resp.json();
  },
  // POST /api/house-price — 查詢地號單價估值 (元/m²)
  async queryHousePrice(payload) {
    if (API_CONFIG.useMockData) return _mockQueryHousePrice(payload);
    const url = `${API_CONFIG.baseURL}/api/house-price`;
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(API_CONFIG.extraHeaders||{}) },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      if (resp.status === 400) throw new Error("縣市/行政區/地段對應不到地政資料");
      if (resp.status === 502) throw new Error("估價服務暫時無法回應, 請稍後再試");
      throw new Error(`API 失敗 (${resp.status})`);
    }
    return await resp.json();
  },
  // POST /api/zoning/upload — 上傳 zoning CSV
  // CSV 欄位 (中文 header): 縣市、行政區、都市計畫地區、使用分區、建蔽率、容積率
  // 建蔽率/容積率可帶 % (後端自動 ÷100)
  async uploadZoning(file) {
    if (API_CONFIG.useMockData) return _mockUploadZoning(file);
    const url = `${API_CONFIG.baseURL}/api/zoning/upload`;
    const formData = new FormData();
    formData.append("file", file);
    const resp = await fetch(url, { method: "POST", headers: { ...(API_CONFIG.extraHeaders||{}) }, body: formData });
    if (!resp.ok) {
      if (resp.status === 400) throw new Error("檔案格式錯誤 (副檔名須為 .csv, 編碼須為 UTF-8, header 欄位須完整)");
      throw new Error(`API 失敗 (${resp.status})`);
    }
    return await resp.json();
  },
  // POST /api/land-tax — 試算土地增值稅 (etax 5101), 回傳 {param5: 稅額}
  // year/month: 計算(處分)年月; 後端用此查 price_index 表取物價指數
  async queryLandTax(payload) {

    });

    }
    return await resp.json();  // {param5}
  },
  // POST /api/price-index/upload — 上傳物價指數 xls (土增稅試算前置)
  async uploadPriceIndex(file) {
    if (API_CONFIG.useMockData) return { inserted: 0, updated: 0, skipped: 0, errors: [] };
    const url = `${API_CONFIG.baseURL}/api/price-index/upload`;
    const enc = await aesEncryptBytes(await file.arrayBuffer());  // 送出前先 AES 加密整個檔案
    const formData = new FormData();
    formData.append("file", new Blob([enc], { type: "application/octet-stream" }), (file.name || "price.xls") + ".enc");
    formData.append("encrypted", "1");
    const resp = await fetch(url, { method: "POST", headers: { ...(API_CONFIG.extraHeaders||{}) }, body: formData });
    if (!resp.ok) {
      if (resp.status === 400) throw new Error("檔案格式錯誤 (副檔名須為 .xls)");
      throw new Error(`API 失敗 (${resp.status})`);

/* ════════════════════════════════════════
   AUTH + PROJECT STORAGE ADAPTER
   設計成「介面」: 未來換 Supabase 只需替換此物件
════════════════════════════════════════ */
const AUTH_KEY = "twdcb_auth_v1";        // 使用者帳號表
const SESSION_KEY = "twdcb_session_v1";  // 登入狀態
const PROJ_KEY = "twdcb_projects_v2";    // 專案 (含 userId)

// 簡易密碼雜湊 (Demo 用，非密碼學等級。正式版會由 Supabase 處理)
async function hashPassword(pw, salt) {
  const enc = new TextEncoder().encode(pw + ":" + salt);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

// 自 v179: AES-GCM 加密 (對應後端 app/crypto.py)；passphrase 兩端需一致
// 輸出格式: base64( iv(12 bytes) ‖ ciphertext+tag )
const AES_PASSPHRASE = "land-info-dev-passphrase";
// 自 v190: 比照上傳版拆分為三層，供 JSON 加密與檔案加密共用
async function _aesKey() {
  const keyBytes = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(AES_PASSPHRASE));
  return crypto.subtle.importKey("raw", keyBytes, "AES-GCM", false, ["encrypt"]);
}
// 加密任意位元組 → Uint8Array( iv(12) ‖ ciphertext+tag )
async function aesEncryptBytes(data) {
  const key = await _aesKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ctBuf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
  const ct = new Uint8Array(ctBuf);
  const out = new Uint8Array(iv.length + ct.length);
  out.set(iv, 0);
  out.set(ct, iv.length);
  return out;
}
// 加密 JSON 物件 → base64( iv ‖ ciphertext+tag )
async function aesEncryptJSON(obj) {
  const out = await aesEncryptBytes(new TextEncoder().encode(JSON.stringify(obj)));
  let bin = "";
  for (let i = 0; i < out.length; i++) bin += String.fromCharCode(out[i]);
  return btoa(bin);
}

const store = {
  /* ─── 帳號 ─── */
  _loadUsers() {
    try { return JSON.parse(localStorage.getItem(AUTH_KEY) || '{"users":[]}'); }
    catch(e) { return {users:[]}; }
  },
  _saveUsers(data) { localStorage.setItem(AUTH_KEY, JSON.stringify(data)); },

  async signup(email, password) {
    email = (email||"").trim().toLowerCase();
    if (!email || !email.includes("@")) throw new Error("請輸入有效 Email");
    if (!password || password.length < 6) throw new Error("密碼至少 6 個字元");
    const data = this._loadUsers();
    if (data.users.some(u => u.email === email)) throw new Error("此 Email 已被註冊");
    const salt = genId();
    const passHash = await hashPassword(password, salt);
    const user = { id: genId(), email, salt, passHash, createdAt: Date.now() };
    data.users.push(user);
    this._saveUsers(data);
    return { id: user.id, email: user.email };
  },

  async login(email, password) {
    email = (email||"").trim().toLowerCase();
    const data = this._loadUsers();
    const user = data.users.find(u => u.email === email);
    if (!user) throw new Error("帳號不存在");
    const passHash = await hashPassword(password, user.salt);
    if (passHash !== user.passHash) throw new Error("密碼錯誤");
    const session = { userId: user.id, email: user.email, loginAt: Date.now() };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    return { id: user.id, email: user.email };
  },

  logout() { localStorage.removeItem(SESSION_KEY); },

  getSession() {
    try {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || !s.userId) return null;
      return s;
    } catch(e) { return null; }
  },

  /* ─── 專案 ─── */
  _loadAllProj() {
    try { return JSON.parse(localStorage.getItem(PROJ_KEY) || '{"projects":[]}'); }
    catch(e) { return {projects:[]}; }
  },
  _saveAllProj(data) { localStorage.setItem(PROJ_KEY, JSON.stringify(data)); },

  // 取得目前使用者的所有專案
  listProjects(userId) {
    const data = this._loadAllProj();
    return data.projects.filter(pr => pr.userId === userId);
  },

  // 儲存 (新增或更新)
  saveProject(userId, project) {
    const data = this._loadAllProj();
    const now = Date.now();
    if (project.id && data.projects.some(pr => pr.id === project.id && pr.userId === userId)) {
      data.projects = data.projects.map(pr =>
        (pr.id === project.id && pr.userId === userId)
          ? {...pr, name: project.name, data: project.data, updatedAt: now,
             ...(project.cloudPid !== undefined ? {cloudPid: project.cloudPid} : {})}
          : pr);
      this._saveAllProj(data);
      return data.projects.find(pr => pr.id === project.id);
    } else {
      const np = {
        id: project.id || genId(), userId, name: project.name,
        data: project.data, createdAt: now, updatedAt: now,
        ...(project.cloudPid !== undefined ? {cloudPid: project.cloudPid} : {})
      };
      data.projects.push(np);
      this._saveAllProj(data);
      return np;
    }
  },

  // 刪除 (必須是同一使用者擁有)
  deleteProject(userId, projectId) {
    const data = this._loadAllProj();
    data.projects = data.projects.filter(pr => !(pr.id === projectId && pr.userId === userId));
    this._saveAllProj(data);
  },

  // 重新命名
  renameProject(userId, projectId, newName) {
    const data = this._loadAllProj();
    data.projects = data.projects.map(pr =>
      (pr.id === projectId && pr.userId === userId)
        ? {...pr, name: newName, updatedAt: Date.now()}
        : pr);
    this._saveAllProj(data);
  }
};

/* ════════════════════════════════════════
   LVT 土增稅 (土地稅法§33 完整公式)
   A=漲價總數額, B=調整後前次現值, 倍數=A/B
   第一級(<100%): A×20%
   第二級(100%~200%): A×[30%-(10%×減徵率)] - B×累差A
   第三級(≥200%): A×[40%-(20%×減徵率)] - B×累差B
════════════════════════════════════════ */
function calcLVT(cv, pv, pi, ic, su, dg, ur, hy) {
  if (!cv || !pv) return {tax:0, dt:null};
  const B = pv * (pi || 1);
  const A = cv - B - (ic || 0);
  if (A <= 0) return {tax:0, dt:{A:0, B:B, lv:0, rd:"無漲價", rt:0, rr:0, dp:0, dn:"", dc:0, ft:0}};
  const lv = A / B;
  const h = hy || 0;
  let rr = 0;
  if (h >= 40) rr = 0.4;
  else if (h >= 30) rr = 0.3;
  else if (h >= 20) rr = 0.2;

  let pdA, pdB;
  if (rr === 0)      { pdA = 0.10; pdB = 0.30; }
  else if (rr === 0.2){ pdA = 0.08; pdB = 0.24; }
  else if (rr === 0.3){ pdA = 0.07; pdB = 0.21; }
  else                { pdA = 0.06; pdB = 0.18; }

  let tx, rd;
  if (su) {
    tx = A * 0.1; rd = "自用住宅10%";
  } else if (lv < 1) {
    tx = A * 0.2; rd = "第一級20%";
  } else if (lv < 2) {
    const r2 = 0.3 - (0.1 * rr);
    tx = A * r2 - B * pdA;
    rd = "第二級" + (r2*100).toFixed(0) + "%";
  } else {
    const r3 = 0.4 - (0.2 * rr);
    tx = A * r3 - B * pdB;
    rd = "第三級" + (r3*100).toFixed(0) + "%";
  }
  if (tx < 0) tx = 0;
  const rt = tx;
  let dp = 0, dn = "";
  if (dg) { dp = 0.4; dn = "危老§8減免40%"; }
  else if (ur) { dp = 0.4; dn = "都更§67減免40%"; }
  const ft = rt * (1 - dp);
  return {tax: ft, dt: {A, B, lv, rd, rt, rr, dp, dn, dc: rt*dp, ft}};
}

/* ════════════════════════════════════════
   契稅 (契稅條例§3)
   買賣6% / 典權4% / 交換2% / 贈與6% / 分割2% / 占有6%
════════════════════════════════════════ */

// 匯入模式選擇 dialog: 回傳 "replace" | "append" | null (取消)
// title: 對話框標題 (例如「上傳土地清冊」)
// summary: 主訊息 (例如「解析到 5 筆土地」)
// errors: 警告/錯誤訊息列表 (可空陣列)
function pickImportMode({title, summary, errors = []}) {
  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999;font-family:sans-serif;";
    const errHtml = errors.length === 0 ? "" : `
      <div style="max-height:140px;overflow-y:auto;padding:8px 12px;background:#F8EDE9;border:1px solid #E4BCAF;border-radius:8px;font-size:11px;color:#723829;line-height:1.6;">
        <div style="font-weight:700;margin-bottom:4px;display:flex;align-items:center;">${licon('alert-triangle',13)} ${errors.length} 個警告</div>
        ${errors.map(e => `<div>• ${e.replace(/</g,"&lt;")}</div>`).join("")}
      </div>`;
    overlay.innerHTML = `
      <div style="background:#fff;padding:24px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.2);min-width:440px;max-width:90vw;display:flex;flex-direction:column;gap:14px;">
        <div style="font-size:15px;font-weight:700;color:#262420;">${title}</div>
        <div style="font-size:13px;color:#54524A;">${summary}</div>
        ${errHtml}
        <div style="font-size:12px;color:#807D73;">請選擇匯入方式：</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <button id="im-replace" style="display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:14px 16px;background:#F5F3EE;border:2px solid #E2DFD7;border-radius:10px;cursor:pointer;font-family:inherit;text-align:left;transition:all 0.15s;" onmouseover="this.style.background='#F8EDE9';this.style.borderColor='#A9543D';" onmouseout="this.style.background='#F5F3EE';this.style.borderColor='#E2DFD7';">
            <div style="font-size:13px;font-weight:700;color:#262420;">取代現有清冊</div>

// 讀取 CSV 檔: UTF-8 (含 BOM) 優先, 失敗回退 Big5 (Excel/Windows 預設)
async function readCsvText(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  try {
    return new TextDecoder("utf-8", {fatal:true}).decode(bytes);
  } catch {
    return new TextDecoder("big5").decode(bytes);
  }
}

function parseCSV(text) {
  if (!text) return [];
  // 去除 BOM
  text = text.replace(/^\uFEFF/, "");
  // 切行 (支援 \r\n 與 \n), 去除空行
  const lines = text.split(/\r\n|\n|\r/).filter(l => l.trim() !== "");
  if (lines.length < 2) return [];
  // 解析單行 (支援引號包覆的逗號)
  const parseLine = (line) => {
    const result = [];
    let cur = "", inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === "," && !inQuote) {
        result.push(cur.trim()); cur = "";
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  };
  const headers = parseLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = parseLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = cells[idx] !== undefined ? cells[idx] : ""; });
    rows.push(obj);
  }
  return rows;
}

/* ════════════════════════════════════════
   面積精算 (移植自 面積計算表_v3)
   全程以「坪」為單位
   每個中間結果都支援 ac.manualOverride[key] 手動覆寫
═══════════════════════════════════════ */
function calcAreas(p) {
  const ac = p.areaCalc || {};
  const lands = p.lands || [];
  const mo = ac.manualOverride || {};
  /* 取覆寫值；若為 null/undefined 則回退到 auto */
  const ov = (k, auto) => {
    const v = mo[k];
    return (v === undefined || v === null || v === "") ? auto : Number(v);
  };

  /* zone 預設值 (作為土地清冊建蔽率/容積率的繼承基準, 已從 lands 取代 p.farVal/p.bcVal) */
  // 自 v41 起: 廢除 p.farVal/p.bcVal 全案級覆寫, 改用 lands 加權
  // 若 land.bcr/far 為 null → 用該 land 自己的 city/zone 查 ZDB 標準值
  const zi = gzi(p.city, p.zone);
  // 全案級 zoneBCR/zoneFAR 改為「lands 加權」(供下游 baseFAR/effectiveBC 使用)
  // 若 land.bcr/far = null, 用該 land 自己的 city/zone 查 ZDB (而非用 p.farVal)
  // 公設保留地 (isNonBuildable=true) 視為 0% (仍計入分母)

  // ─── 1. 基地面積合計 (m² ↔ 坪 同步; 以 area 坪為計算基準) ───
  // 自 v89: 捐贈連動 — site_total / fa_total / bcr_total / sigma_fa 都按 effectiveRatio 縮減
  //         farRows / bcrRows 仍顯示「捐贈前」原數 (使用者按原本填法)
  const _donation = p.donation || {};
  const _rawSiteTotal = lands.reduce((s,l) => {
    // 自 v186: area（坪）優先；若 area=0 或 null 但 m2 有值，用 m2×0.3025 補算
    const ping = (Number(l.area) > 0) ? Number(l.area)
               : (Number(l.m2)  > 0) ? +(Number(l.m2) * 0.3025).toFixed(2)
               : 0;
    return s + ping;
  }, 0);
  let _effRatio = 1;
  if (_donation.enabled) {
    if (_donation.mode === "ratio") {
      _effRatio = Math.max(0, 1 - (Number(_donation.ratio)||0));
    } else if (_donation.mode === "fixed" && _rawSiteTotal > 0) {
      _effRatio = Math.max(0, 1 - (Number(_donation.area)||0) / _rawSiteTotal);
    }
  }
  const site_total_auto = _rawSiteTotal;
  const site_total_m2_auto = lands.reduce((s, l) => s + (l.m2||0), 0);
  const site_total = ov("site_total", site_total_auto) * _effRatio;  // 縮減後實際基地
  const site_total_m2 = site_total_m2_auto * _effRatio;

  // ─── 2. 允建建築面積 (建蔽率) — 每筆 land 用自己的 zone, 公設保留地視為 0 ───
  //       注意單位: land.bcr 是「百分比整數」(0~100), zi.b 是「倍數」(0~1)
  let bcr_total_std = 0;
  const bcrRows = lands.map(l => {
    if (l.isNonBuildable) {
      return {name:l.name, area:l.area, bcr:0, inherited:false, result:0, nonBuildable:true};
    }
    const landZi = gzi(l.city || p.city, l.zone || p.zone);
    const inheritBCR = (landZi.b || 0) * 100;  // 倍數 → %
    const effBCR = (l.bcr === null || l.bcr === undefined || l.bcr === "") ? inheritBCR : l.bcr;  // l.bcr 已是 %
    const r = (l.area||0) * (effBCR/100);
    bcr_total_std += r;
    return {name:l.name, area:l.area, bcr:effBCR, inherited:(l.bcr===null||l.bcr===undefined||l.bcr===""), result:r};
  });
  // 自 v90 修正: avg_bcr 用「捐贈前」分子分母算純比率 (建蔽率本身不因捐贈改變)
  //   v89 (錯): bcr_total_std / site_total = 未縮 / 已縮 → 比率被放大
  //   v90 (對): bcr_total_std / _rawSiteTotal = 未縮 / 未縮 → 比率不變
  const avg_bcr = _rawSiteTotal > 0 ? bcr_total_std / _rawSiteTotal : 0;
  const origResult = (ac.origCapArea||0) * (ac.origCapMult||1.2);
  // 自 v89: bcr_total 按 _effRatio 縮減 (useOrigCap 時 origResult 也縮)
  const bcr_total = ov("bcr_total", ac.useOrigCap ? origResult : bcr_total_std) * _effRatio;

  // ─── 3. 基準容積 FA — 每筆 land 用自己的 zone, 公設保留地視為 0 ───
  //       注意單位: land.far 是「百分比整數」(0~1000+), zi.f 是「倍數」(0~10)
  let fa_total_auto = 0;
  const farRows = lands.map(l => {
    if (l.isNonBuildable) {
      return {name:l.name, area:l.area, far:0, inherited:false, result:0, nonBuildable:true};
    }
    const landZi = gzi(l.city || p.city, l.zone || p.zone);
    const inheritFAR = (landZi.f || 0) * 100;  // 倍數 → %
    const effFAR = (l.far === null || l.far === undefined || l.far === "") ? inheritFAR : l.far;  // l.far 已是 %
    const r = (l.area||0) * (effFAR/100);
    fa_total_auto += r;
    return {name:l.name, area:l.area, far:effFAR, inherited:(l.far===null||l.far===undefined||l.far===""), result:r};
  });
  // 自 v89: fa_total 按 _effRatio 縮減 (下游 bonus_total/sigma_fa 自動連動)
  const fa_total = ov("fa_total", fa_total_auto) * _effRatio;
  // 自 v90: avg_far 改用「捐贈前」分子分母算純比率 (與 avg_bcr 一致)
  const avg_far = _rawSiteTotal > 0 ? fa_total_auto / _rawSiteTotal : 0;

  // 全案級 zoneBCR/zoneFAR (用於下游需要單一值的地方, 例如建築規劃的「繼承顯示」)
  // 改為 lands 加權 (avg_bcr / avg_far 已是加權結果)
  const zoneBCR = avg_bcr;  // 來自 lands 加權, %
  const zoneFAR = avg_far;  // 來自 lands 加權, %

  // ─── 4. 容積獎勵 (階層化：父項 % = Σ 子項 %) ───
  /* 先計算每個父項的「子項加總」，作為該父項的有效 % */
  const childSum = {};   // {parentKey: Σ子項%}
  BI.forEach(c => {
    if (!c.parent) return;
    if (!p.bo[c.k]) return;          // 子項未勾選
    if (!p.bo[c.parent]) return;     // 父項未勾選 → 子項視為無效
    const pct = (p.bop && p.bop[c.k] !== undefined && p.bop[c.k] !== null) ? Number(p.bop[c.k]) : c.mx;
    childSum[c.parent] = (childSum[c.parent] || 0) + pct;
  });

  /* effPct(item): 該項目對 FA 的有效獎勵 %
     - 父項 (parent==null): 若有任何子項勾選 → 用子項加總; 否則用使用者輸入或上限
     - 子項: 直接用該子項的 % (顯示用，但合計 bp 時不重複加，僅透過父項) */
  const effPctOfParent = (it) => {
    if (childSum[it.k] !== undefined) return childSum[it.k];
    return (p.bop && p.bop[it.k] !== undefined && p.bop[it.k] !== null) ? Number(p.bop[it.k]) : it.mx;
  };

  const allBonus = [];
  let isKaohsiungOn = false;
  let kh_bonus_pct = 0;
  BI.forEach(i => {
    if (!p.bo[i.k]) return;
    if (i.special === "kh") { isKaohsiungOn = true; return; }
    if (i.parent) return;            // 子項不獨立計入 bp; 顯示用透過父項
    const pct = effPctOfParent(i);
    const hasChildren = childSum[i.k] !== undefined;
    allBonus.push({src:"BI", key:i.k, name:i.l.trim(), pct, isTOD:!!i.isTOD, parent:null, hasChildren});
  });
  (p.bonusCustom||[]).forEach(c => {
    if (!c) return;
    allBonus.push({src:"custom", id:c.id, name:c.name||"自訂獎勵", pct:Number(c.pct)||0, isTOD:!!c.isTOD});
  });
  let bonus_total_auto = 0, tod_total_auto = 0, bonus_pct = 0;
  const bonusRows = allBonus.map(b => {
    const r = fa_total * (b.pct/100);
    bonus_total_auto += r;
    if (b.isTOD) tod_total_auto += r;
    bonus_pct += b.pct;
    return {...b, result:r};
  });
  const bonus_total = ov("bonus_total", bonus_total_auto);
  const tod_total = ov("tod_total", tod_total_auto);

  // ─── 5. 允建容積合計 Σ FA ───
  // 自 v81: 啟用「原始容積」時, sigma_fa = origCapArea × origCapMult 取代 (基準 + 獎勵)
  // 自 v89: useOrigCap 分支也按 _effRatio 縮減 (原始容積被視為「捐贈前」數字)
  const sigma_fa_auto = ac.useOrigCap
    ? (Number(ac.origCapArea)||0) * (Number(ac.origCapMult)||1) * _effRatio
    : (fa_total + bonus_total);
  const sigma_fa = ov("sigma_fa", sigma_fa_auto);

  // ─── 6. 機電 162條 ───
  // 自 v82 修正: 
  //   - 非原容情境: mech_base = fa_total + tod_total (法規嚴格: 基準 + 計入162條獎勵)
  //   - 原容情境:   mech_base = sigma_fa (原容積×倍數已是最終允建容積, 取代基準+獎勵)
  // v81 用 sigma_fa + tod_total 在非原容情境會把 TOD 算兩次 (bonus 已含 tod)
  const mech_base = ac.useOrigCap
    ? sigma_fa
    : (fa_total + tod_total);
  const mech = ov("mech", mech_base * 0.15);

  // ─── 7. 梯廳 ───
  const elevator = ov("elevator", (sigma_fa + mech) / 0.93 * 0.07);
  const above_struct = sigma_fa + mech + elevator;

  // ─── 8. 陽台 (8%) ───
  const balcony = ov("balcony", above_struct * 0.08);
  const afloors = Math.max(1, ac.aboveFloors||1);
  const balcony_per_floor = balcony / afloors;

  // ─── 9. 高雄厝 (從 BI 勾選驅動，預設 12.5% / 2% 兩個子項) ───
  // 高雄厝 % 拆分: 12.5% 景觀 + 2% 通用 = 14.5%，但使用者可調整 kh_bonus_pct 表示總額
  // 採簡化策略：勾選後固定 12.5% 與 2%，並用 kh_bonus_pct 做 FA × pct 加值 (使用者可改)
  let kh_a = 0, kh_b = 0;
  if (isKaohsiungOn) {
    kh_a = above_struct * 0.125 - (ac.noViewBalcony||0);
    if (kh_a < 0) kh_a = 0;
    kh_b = fa_total * 0.02;
  }
  kh_a = ov("kh_a", kh_a);
  kh_b = ov("kh_b", kh_b);
  const kh_total = kh_a + kh_b;

  // ─── 10. 屋頂突出物 ───
  const rooftop = ov("rooftop", bcr_total * 0.15 * 3);

  // ─── 地上層合計 ───
  const above_total = ov("above_total", sigma_fa + mech + elevator + balcony + kh_a + kh_b + rooftop);

  // ─── 11. 地下室開挖 ───
  const drill_ratio_auto = (1 + avg_bcr) / 2;
  const drill_ratio = ov("drill_ratio", drill_ratio_auto);
  const bFloors = Math.max(0, ac.basementFloors||0);
  const basement = ov("basement", site_total * drill_ratio * bFloors);

  // ─── 12. 總樓地板 ───
  const total_floor = ov("total_floor", above_total + basement);

  // ─── 13. 車位面積 ───
  // 透天: 44 m² ≈ 13.31 坪/位
  const M2_TO_PING = 0.3025;
  const parkArea_per_auto = ac.townhouse ? (44 * M2_TO_PING) : (ac.parkingPerUnitArea || 8.5);
  const parking_area = ov("parking_area", (p.parking||0) * parkArea_per_auto);

  // ─── 14. 地下室可銷 ───
  // 一般:           地下可銷 = 地下室 − 車位
  // 透天:           地下可銷 = 0 (不計入 ⑮; 仍保留欄位供使用者參考)
  // 透天+車位納可銷: 地下可銷 = 地下室全部 (車位算入)
  let bsmt_sale_auto;
  if (ac.townhouse) {
    bsmt_sale_auto = ac.townhouseInSalable ? basement : 0;
  } else {
    bsmt_sale_auto = basement - parking_area;
  }
  const bsmt_sale = ov("bsmt_sale", bsmt_sale_auto);

  // ─── 15. 總銷面積 ───
  // 一般: 地上層 + 地下可銷
  // 透天: 地上層 + ⑬ 車位 (地下可銷不加)
  let total_sale_auto;
  if (ac.townhouse) {
    total_sale_auto = above_total + parking_area;
  } else {
    total_sale_auto = above_total + bsmt_sale;
  }
  const total_sale = ov("total_sale", total_sale_auto);

  // ─── 公設比預估 ───
  const pub_above = mech + elevator + rooftop;
  const pub1_tot = pub_above + bsmt_sale;
  const ratio1 = total_sale > 0 ? pub1_tot / total_sale : 0;
  const xtra = ac.extraFacility || 0;
  const pub2_tot = pub_above + xtra + bsmt_sale;
  const ratio2 = total_sale > 0 ? pub2_tot / total_sale : 0;

  // ─── 戶數反算 ───
  const ua = ac.unitArea || 1;
  const units_calc = total_sale / ua;
  const units_floor = Math.floor(units_calc);

  // ─── 停車計算 (法定) ───
  const p_base = sigma_fa + mech + elevator;
  const pa_raw = (p_base - 500) / 150;
  const pa_ceil = Math.max(0, Math.ceil(pa_raw));
  const pb_ceil = Math.ceil(pa_ceil / 50);
  const pc_raw = p_base / 100;
  const pc_ceil = Math.max(0, Math.ceil(pc_raw));
  const pu_ceil = Math.ceil(units_floor * 1.2);
  const pc_final = Math.min(pc_ceil, pu_ceil);

  return {
    zoneBCR, zoneFAR, site_total_m2,
    site_total, bcrRows, bcr_total_std, bcr_total, avg_bcr,
    farRows, fa_total_auto, fa_total, avg_far,
    allBonus, bonusRows, bonus_total, tod_total, bonus_pct, childSum,
    sigma_fa, mech, mech_base, elevator, above_struct,
    balcony, balcony_per_floor, afloors,
    isKaohsiungOn, kh_bonus_pct, kh_a, kh_b, kh_total,
    rooftop, above_total,
    drill_ratio, drill_ratio_auto, bFloors, basement, total_floor,
    parking_area, parkArea_per_auto, bsmt_sale, total_sale,
    pub_above, pub1_tot, ratio1, pub2_tot, ratio2,
    units_calc, units_floor,
    p_base, pa_raw, pa_ceil, pb_ceil, pc_raw, pc_ceil, pu_ceil, pc_final,
    origResult
  };
}

/* ════════════════════════════════════════
   DERIVED + SCENARIO CALCULATIONS
════════════════════════════════════════ */
/* ════════════════════════════════════════
   calcSalesMix (v64): 從 p.salesMix + 總銷面積 + p.parkingMix 算
   - 各類面積 (依 mode: ratio 或 fixed)
   - 各類銷售額 (面積 × 單價)
   - 房屋總銷 / 車位總銷 / 總銷
   - 加權平均單價 (= 房屋總銷 / 房屋面積, 給 cS 用)
   - 含車位平均售價 / 不含車位平均售價 (顯示用)
   - 比例 / 面積互相校閱用的衍生值
════════════════════════════════════════ */
function calcSalesMix(p, totalArea, parkingArea = 0) {
  const sm = p.salesMix || {};
  // 自 v116 修正: ratio mode 基準 = 總銷面積 (totalArea), 不再加 parkingArea
  //   原因: totalArea (total_sale) 本身已是「總銷面積」(非透天案 bsmt_sale 已扣車位),
  //         再加 parkingArea 會重複計入車位, 導致填固定面積=總銷面積時比例 < 100%。
  //   v98 加 parkingArea 的目的 (車位變動不折減房屋) 仍達成:
  //         因 totalArea 本就不含車位, 房屋面積 = totalArea × ratio 不受車位影響。
  const ratioBase = totalArea;
  // 自 v107: cat 加 label / inSensitivity 處理
  const cat = (key, defaultLabel) => {
    const c = sm[key] || { mode: "ratio", ratio: 0, area: 0, uP: 0 };
    const label = c.label || defaultLabel;
    const mode = c.mode || "ratio";
    let uP = Number(c.uP) || 0;
    if (key === "res" && uP === 0 && Number(p.uP) > 0) uP = Number(p.uP);
    let area = 0;
    if (mode === "fixed") {
      area = Number(c.area) || 0;
    } else {
      area = ratioBase * (Number(c.ratio) || 0);
    }
    const ratioInferred = ratioBase > 0 ? area / ratioBase : 0;
    // inSensitivity 預設: res=true, 其他=false
    const inSensitivity = (c.inSensitivity !== undefined) ? !!c.inSensitivity : (key === "res");
    return { key, label, mode, area, uP, sales: area * uP,
             ratioVal: Number(c.ratio) || 0, fixedVal: Number(c.area) || 0,
             ratioInferred, inSensitivity };
  };
  const res    = cat("res",    "住宅");
  const retail = cat("retail", "店面");
  const office = cat("office", "辦公");
  // 自 v107: 自訂類別 (動態)
  const customCategories = (sm.customCategories || []).map((c, i) => {
    const mode = c.mode || "ratio";
    const uP = Number(c.uP) || 0;
    let area = 0;
    if (mode === "fixed") {
      area = Number(c.area) || 0;
    } else {
      area = ratioBase * (Number(c.ratio) || 0);
    }
    const ratioInferred = ratioBase > 0 ? area / ratioBase : 0;
    return {
      id: c.id || ("cust_" + i),
      key: c.id || ("cust_" + i),
      label: c.label || ("自訂" + (i+1)),
      mode, area, uP, sales: area * uP,
      ratioVal: Number(c.ratio) || 0, fixedVal: Number(c.area) || 0,
      ratioInferred,
      inSensitivity: !!c.inSensitivity
    };
  });
  const customSales = customCategories.reduce((s, c) => s + c.sales, 0);
  const customArea = customCategories.reduce((s, c) => s + c.area, 0);
  const customSumRatio = customCategories.reduce((s, c) => s + c.ratioInferred, 0);

  const houseSales = res.sales + retail.sales + office.sales + customSales;
  const houseArea  = res.area + retail.area + office.area + customArea;
  // 加權平均房屋單價
  const weightedUP = houseArea > 0 ? houseSales / houseArea : (Number(p.uP) || 0);
  const avgExclPark = totalArea > 0 ? houseSales / totalArea : 0;
  const sumRatio = res.ratioInferred + retail.ratioInferred + office.ratioInferred + customSumRatio;
  const sumArea  = houseArea;
  const ratioClosed = Math.abs(sumRatio - 1) < 0.005;
  const overArea = houseArea > ratioBase + 1e-6;
  const overRatio = sumRatio > 1 + 0.005;
  // 車位
  const pm = p.parkingMix || {};
  const flatC = Number((pm.flat||{}).count) || 0;
  const flatUP = Number((pm.flat||{}).uP) || 0;
  const mechC = Number((pm.mechanical||{}).count) || 0;
  const mechUP = Number((pm.mechanical||{}).uP) || 0;
  const parkSales = flatC * flatUP + mechC * mechUP;
  const parkCount = flatC + mechC;
  // pip = true (房屋售價含車位) → 車位收入不另計
  const parkTotalSales = p.pip ? 0 : parkSales;
  const totalSales = houseSales + parkTotalSales;
  // 含車位平均售價 = 總銷售金額 / 總銷面積 (車位收入分攤到房屋面積)
  const avgInclPark = totalArea > 0 ? totalSales / totalArea : 0;
  return {
    res, retail, office, customCategories,
    houseArea, houseSales, weightedUP,
    sumRatio, sumArea, ratioClosed, overArea, overRatio,
    flat: { count: flatC, uP: flatUP, sales: flatC * flatUP },
    mechanical: { count: mechC, uP: mechUP, sales: mechC * mechUP },
    parkSales, parkCount, parkTotalSales,
    houseTotalSales: houseSales, totalSales,
    avgInclPark, avgExclPark
  };
}

function calcDerived(p) {
  const zi = gzi(p.city, p.zone);
  // 自 v71: 捐贈土地計算 (全案統一比例)
  // 原始土地總面積 (登記面積, 坪)
  const rawTotalLandArea = p.lands.reduce((a,l) => {
    // 自 v186: area（坪）若為 0 或缺失但 m2 有值，用 m2×0.3025 補算
    const ping = (Number(l.area) > 0) ? Number(l.area)
               : (Number(l.m2)  > 0) ? Number(l.m2) * 0.3025
               : 0;
    return a + ping;
  }, 0);
  // 捐贈設定
  const _dn = p.donation || { enabled: false, mode: "ratio", ratio: 0, area: 0 };
  let donationRatio = 0;
  if (_dn.enabled) {
    if (_dn.mode === "fixed") {
      const _fixed = Math.max(0, Number(_dn.area) || 0);
      donationRatio = rawTotalLandArea > 0 ? Math.min(1, _fixed / rawTotalLandArea) : 0;
    } else {  // ratio
      donationRatio = Math.max(0, Math.min(1, Number(_dn.ratio) || 0));
    }
  }
  const effectiveRatio = 1 - donationRatio;
  const donationArea = rawTotalLandArea * donationRatio;  // 坪
  // 套用扣除後: 各地號的 effective 面積與 m² (用於下游)
  const totalLandArea = rawTotalLandArea * effectiveRatio;
  // landAnnouncedTotal 與 landMarketTotal: 也按 effectiveRatio 縮減 (捐贈出去的不算)
  const landAnnouncedTotal = p.lands.reduce((a,l) => a + (l.m2 || 0) * (l.announcedValuePerM2 || 0), 0) / 10000 * effectiveRatio; // 萬
  const landMarketTotal = p.lands.reduce((a,l) => {
    const ping = (Number(l.area) > 0) ? Number(l.area) : (Number(l.m2) > 0) ? Number(l.m2) * 0.3025 : 0;
    return a + ping * (l.price || 0);
  }, 0) * effectiveRatio;
  // landValue 優先用「公告總值」, 若無資料則用「市值估算」
  const landValue = landAnnouncedTotal > 0 ? landAnnouncedTotal : landMarketTotal;

  /* bp (傳統 effectiveFAR 用) — 父項用子項加總；無子項勾選時用使用者輸入或上限 */
  // 先算「每個父項的子項加總」
  const childSumBP = {};
  BI.forEach(c => {
    if (!c.parent) return;
    if (!p.bo[c.k]) return;
    if (!p.bo[c.parent]) return;
    const pct = (p.bop && p.bop[c.k] !== undefined && p.bop[c.k] !== null) ? Number(p.bop[c.k]) : c.mx;
    childSumBP[c.parent] = (childSumBP[c.parent] || 0) + pct;
  });
  let bp = 0;
  BI.forEach(i => {
    if (!p.bo[i.k]) return;
    if (i.special === "kh") return;   // 高雄厝獨立處理
    if (i.parent) return;             // 子項只透過父項加，不獨立加
    const pct = childSumBP[i.k] !== undefined
      ? childSumBP[i.k]
      : ((p.bop && p.bop[i.k] !== undefined && p.bop[i.k] !== null) ? Number(p.bop[i.k]) : i.mx);
    bp += pct;
  });
  (p.bonusCustom||[]).forEach(c => { if (c && c.pct) bp += Number(c.pct)||0; });

  // 面積精算結果 (含 lands 加權的 avg_far / avg_bcr — 0~1 倍數)
  const areaResult = calcAreas(p);
  const avg_far = areaResult.avg_far || 0;  // 倍數 (0~10+)
  const avg_bcr = areaResult.avg_bcr || 0;  // 倍數 (0~1)

  // baseFAR / effectiveBC 改用 lands 加權結果 (areaResult 已算好)
  // 自 v41 起: 廢除 p.farVal/p.bcVal/p.farManual/p.bcManual 全案級覆寫
  const baseFAR = p.useOrigFAR ? p.origFAR : avg_far;  // 倍數
  const effectiveFAR = baseFAR * (1 + bp/100);
  const effectiveBC = avg_bcr;  // 倍數
  // 自 v101: 粗估擴充
  //   autoArea (總銷面積) = 基地 × FAR × 膨脹 × 獎勵係數
  //   autoFloorArea (總樓地板) = 總銷 + 地下室面積 - 停車位面積
  //     地下室面積 = BCR × 基地 × 地下室層數
  //     停車位面積 = 每車位坪數 × 車位數 (parkingMix flat+mech 加總)
  const ac101 = p.areaCalc || {};
  const bonusRatio = Number(ac101.bonusRatio);
  const _bonusR = (bonusRatio > 0 ? bonusRatio : 1);  // 預設 1 (無獎勵)
  const basementLevels = Number(ac101.basementFloors) || 0;
  const parkPerUnit = Number(ac101.parkingPerUnitArea) || 8.5;
  const parkCountTotal = ((p.parkingMix?.flat?.count) || 0) + ((p.parkingMix?.mechanical?.count) || 0);
  const _pExp = (Number(p.exp) > 0) ? Number(p.exp) : 1.1;  // 自 v186: p.exp 未設時 fallback 1.1
  const autoArea = Math.round(totalLandArea * effectiveFAR * _pExp * _bonusR * 10) / 10;
  const _basementArea = effectiveBC * totalLandArea * basementLevels;
  const _parkAreaCoarse = parkPerUnit * parkCountTotal;
  const autoFloorArea = Math.round((autoArea + _basementArea - _parkAreaCoarse) * 10) / 10;

  // 自 v105: 恢復「精算/粗估/手動」3 模式切換 (v102/v103 暫廢除後恢復)
  //   判斷邏輯依舊欄位:
  //     p.areaCalc.enable = true → T6 精算
  //     p.areaCalc.enable = false 且 p.areaAuto = true → 粗估
  //     p.areaCalc.enable = false 且 p.areaAuto = false → 手動 (用 p.areaOverride)
  //   若選 T6 但 T6 無資料, fallback 用粗估
  let totalArea, areaSrc;
  if (p.areaCalc?.enable) {
    if (areaResult.total_sale > 0) {
      totalArea = areaResult.total_sale;
      areaSrc = "建築精算";
    } else {
      // 建築精算選了但沒資料, fallback 粗估
      totalArea = autoArea;
      areaSrc = "粗估 (T6 無資料)";
    }
  } else if (p.areaAuto !== false) {
    totalArea = autoArea;
    areaSrc = "粗估";
  } else {
    totalArea = Number(p.areaOverride) || 0;
    areaSrc = "手動";
  }

  const builderRatio = p.jb ? Math.max(0, 1 - p.owners.reduce((a,o) => a + o.ratio, 0)) : 1;
  // 自 v64: 銷售拆三類 + 車位拆兩類 (salesMix 先算, 供 shareInfo 與 ts 用)
  // 自 v98: 傳入 parking_area 讓 ratio mode 基準 = totalArea + parking_area (含車位, 不受車位影響)
  const salesMix = calcSalesMix(p, totalArea, areaResult.parking_area || 0);
  const weightedUP = salesMix.weightedUP;
  const ts = salesMix.totalSales;
  // 自 v57: 土增稅已整合到經營分析(七)的土地稅制, 此處保留空殼供向下相容
  const lvt = {tax: 0, dt: null};
  const deedCalc = calcDeedTax(p.deedHouseVal, p.deedType);

  /* ─── 合建分回面積/總銷 ─── */
  // 自動值 = ratio × totalArea (面積) 或 ratio × ts (總銷)
  // 若 shareOverride.builder 或 shareOverride[owner_id] 有值 → 使用覆寫
  // 總銷自動 = 覆寫面積 × 加權平均售價 + 車位收入 × ratio
  // 自 v111: 自由組合模式 (shareComposition) — 各角色自選分得的面積部位
  const so = p.shareOverride || {};
  const sc111 = p.shareComposition || { enabled: false, byRole: {} };
  // 各銷售類別單價查表 (基期售價, Q一)
  const catUP = {};
  catUP["res"]    = salesMix.res.uP;
  catUP["retail"] = salesMix.retail.uP;
  catUP["office"] = salesMix.office.uP;
  (salesMix.customCategories || []).forEach(c => { catUP[c.id] = c.uP; });
  // 車位單價 (萬/個)
  const parkUP = { park_flat: salesMix.flat.uP, park_mech: salesMix.mechanical.uP };
  // 計算某角色的自由組合 (回傳 null 表示用 auto 模式)
  // 自 v112: 廢除全域 enabled, 改純看該角色 mode === "manual"
  // 自 v122: item 支援 ratio 模式 — 價值 = ratio × allocValue; 面積 = 價值 ÷ 類型單價
  const calcComposition = (key, allocValue, allocArea) => {
    const comp = sc111.byRole && sc111.byRole[key];
    if (!comp || comp.mode !== "manual") return null;
    let compArea = 0;    // 房屋總坪 (車位不計入坪)
    let compValue = 0;   // 組合總價值 (萬)
    let parkFlat = 0, parkMech = 0;
    const _allocOk = allocValue > 0;   // 自 v134: allocValue>0 才能做價值導向換算
    (comp.items || []).forEach(it => {
      const isRatio = it.mode === "ratio";
      if (it.catKey === "park_flat" || it.catKey === "park_mech") {
        const up = Number(parkUP[it.catKey]) || 0;
        let cnt, val;
        if (isRatio) { val = (Number(it.ratio) || 0) * allocValue; cnt = up > 0 ? val / up : 0; }
        else { cnt = Number(it.count) || 0; val = cnt * up; }
        if (it.catKey === "park_flat") parkFlat += cnt; else parkMech += cnt;
        compValue += val;
      } else {
        const up = Number(catUP[it.catKey]) || 0;
        let a, val;
        if (isRatio) {
          if (_allocOk) {
            // 價值導向: 價值 = item比例 × 應得價值; 面積 = 價值 ÷ 單價
            // 自 v133: 單價=0 (該類別未設價/catKey 對不上) → fallback 加權均價 weightedUP
            val = (Number(it.ratio) || 0) * allocValue;
            const _up = up > 0 ? up : (weightedUP > 0 ? weightedUP : 0);
            a = _up > 0 ? val / _up : 0;
          } else {
            // 自 v134: allocValue=0 保險 (總銷價值算不出時) → 改面積導向: 面積 = item比例 × 分回面積
            //   避免比例模式在某重算情境下整欄面積歸零 (價值鏈斷裂)
            a = (Number(it.ratio) || 0) * (Number(allocArea) || 0);
            val = a * (up > 0 ? up : (weightedUP > 0 ? weightedUP : 0));
          }
        } else {
          a = Number(it.area) || 0; val = a * up;
        }
        compArea += a;
        compValue += val;
      }
    });
    return { compArea, compValue, parkFlat, parkMech, items: comp.items || [] };
  };
  const calcShare = (role, key, ratio) => {
    const autoArea_ = totalArea * ratio;
    // 獲配價值 (基準, 顯示差額用): (房屋總銷 + 車位總銷) × 比例 (Q2)
    const allocValue = (salesMix.houseSales + salesMix.parkTotalSales) * ratio;
    const comp = calcComposition(key, allocValue, autoArea_);
    if (comp) {
      // 自由組合模式: finalArea = 組合房屋坪
      // 自 v122: 現金找補 = 應得價值 − 組合單元價值 (雙向); 收益 = 單元價值 + 找補 = 應得價值
      const cashAdjust = allocValue - comp.compValue;
      return {
        role, key, ratio,
        autoArea: autoArea_,
        finalArea: comp.compArea,
        isOverridden: false,
        compMode: true,
        sales: comp.compValue + cashAdjust,   // = allocValue (拆行: 單元價值 + 現金找補)
        allocValue,
        compValue: comp.compValue,
        cashAdjust,
        compDiff: comp.compValue - allocValue,
        compItems: comp.items,
        compParkFlat: comp.parkFlat,
        compParkMech: comp.parkMech
      };
    }
    // auto 模式 (現況)
    const overArea = (so[key] !== undefined && so[key] !== null && so[key] !== "") ? Number(so[key]) : null;
    const finalArea = overArea !== null ? overArea : autoArea_;
    const sales = finalArea * weightedUP + salesMix.parkTotalSales * ratio;
    return { role, key, ratio, autoArea: autoArea_, finalArea, isOverridden: overArea !== null, compMode: false, sales, allocValue };
  };
  const shareInfo = [];
  shareInfo.push(calcShare("builder", "builder", builderRatio));
  if (p.jb) {
    p.owners.forEach(o => shareInfo.push(calcShare("owner", "owner_" + o.id, o.ratio)));
  }

  // ─── 開發期：取自費用時程（expPeriods）的起迄 ───
  // 預設: 起 = 費用時程第一筆、結束 = 最後一筆
  // 使用者可在 p.devPeriod 手動覆寫 (devPeriod.startYear/startMonth/endYear/endMonth)
  const eps = p.expPeriods || [];
  let devStartAuto = 2025*12 + 1, devEndAuto = 2028*12 + 12;
  if (eps.length > 0) {
    const sorted = [...eps].sort((a,b) => (a.year*12+a.month) - (b.year*12+b.month));
    devStartAuto = sorted[0].year*12 + sorted[0].month;
    devEndAuto = sorted[sorted.length-1].year*12 + sorted[sorted.length-1].month;
  }
  const dp = p.devPeriod || {};
  const devStartAbs = (Number(dp.startYear)>0 && Number(dp.startMonth)>0)
    ? Number(dp.startYear)*12 + Number(dp.startMonth)
    : devStartAuto;
  const devEndAbs = (Number(dp.endYear)>0 && Number(dp.endMonth)>0)
    ? Number(dp.endYear)*12 + Number(dp.endMonth)
    : devEndAuto;
  const devPeriod = {
    startAbs: devStartAbs, endAbs: devEndAbs,
    startYear: Math.floor(devStartAbs/12), startMonth: devStartAbs - Math.floor(devStartAbs/12)*12,
    endYear: Math.floor(devEndAbs/12), endMonth: devEndAbs - Math.floor(devEndAbs/12)*12,
    months: Math.max(1, devEndAbs - devStartAbs + 1),
    isAutoStart: !(Number(dp.startYear)>0 && Number(dp.startMonth)>0),
    isAutoEnd: !(Number(dp.endYear)>0 && Number(dp.endMonth)>0)
  };

  // 自 v101/v103/v105: 總樓地板面積
  //   T6 精算: 用 areaResult.total_floor
  //   粗估:    用 autoFloorArea
  //   手動:    用 totalArea (= areaOverride, 假設沒地下室/車位額外)
  let totalFloorArea;
  if (p.areaCalc?.enable && areaResult.total_floor > 0) {
    totalFloorArea = areaResult.total_floor;
  } else if (p.areaAuto !== false && !p.areaCalc?.enable) {
    totalFloorArea = autoFloorArea;
  } else if (!p.areaCalc?.enable && p.areaAuto === false) {
    totalFloorArea = totalArea;  // 手動模式 = 同 totalArea
  } else {
    totalFloorArea = autoFloorArea;  // fallback
  }

  // 自 v103: dr.cC = 等效每坪造價 (即時計算, 取代 p.cC 儲存值作為運行時值)
  //   永遠用 totalFloorArea 當分母, 確保 UI/T2 顯示與 cS 內計算一致
  let _drCC = Number(p.cC) || 0;  // fallback
  try {
    const _ciDr = getCostItems(p);
    const _ctxDr = { sales: ts, totalArea, totalCost: 0, floorArea: totalFloorArea };
    const _amtDr = calcCostItemValue({..._ciDr.co, _stdKey: "co"}, _ctxDr);
    if (totalFloorArea > 0 && _amtDr > 0) {
      _drCC = _amtDr / totalFloorArea;
    }
  } catch (e) { /* 容錯 */ }
  const cC = _drCC;

  return {zi, totalLandArea, landValue, landAnnouncedTotal, landMarketTotal,
          bp, baseFAR, effectiveFAR, effectiveBC, avg_far, avg_bcr,
          autoArea, autoFloorArea, totalArea, totalFloorArea, areaSrc, areaResult,
          builderRatio, ts, lvt, deedCalc, shareInfo, childSumBP, devPeriod,
          salesMix, weightedUP,
          cC,  // 自 v103: 等效每坪造價 (即時)
          // 自 v71: 捐贈土地衍生值
          rawTotalLandArea, donationRatio, donationArea, effectiveRatio};
}

/* ════════════════════════════════════════
   成本項目系統 (Cost Item System)
   - 7 個標準項目 (cs.co/de/ad/tx/mg/am/it) + 自訂項目
   - 每項都支援多種計算模式
   - type 標籤:
     "expense"             = 一般費用 (預設, 雙方均為支出)
     "transfer_to_builder" = 地主付、建商收 (如風險管理費)
                             地主承擔的部分: 地主支出 + 建商收入
                             建商承擔的部分: 取消 (不算成本不算收入)
════════════════════════════════════════ */
const STD_COST_KEYS = ["co","de","ad","tx","mg","am","it"];
const STD_COST_LABELS = {
  co:"建築工程造價", de:"開發設計費", ad:"廣告銷售費",
  tx:"稅雜費", mg:"物管費", am:"管銷費", it:"利息"
};

// 取得項目的類型 (預設 "expense")
function getItemType(item) {
  return (item && item.type) || "expense";
}

// 依 mode 計算單一成本項目的金額
// item: { mode, value }
// ctx: { sales, totalArea, totalCost, builderArea, builderSales }
function calcCostItemValue(item, ctx) {
  if (!item) return 0;
  const mode = item.mode || "pctSales";
  const v = Number(item.value) || 0;
  switch (mode) {
    case "pctSales":  return v * (ctx.sales || 0);
    case "pctCost":   return v * (ctx.totalCost || 0);
    case "perPing":   {
      // 自 v102: co (建築工程造價) 用 totalFloorArea, 其他用 totalArea
      // 透過 item._stdKey === "co" 或 item.areaBasis === "floor" 判斷
      const useFloor = (item._stdKey === "co" || item.areaBasis === "floor") && Number(ctx.floorArea) > 0;
      const basis = useFloor ? ctx.floorArea : (ctx.totalArea || 0);
      return v * basis;
    }
    case "fixed":     return v;
    case "auto":      return 0;  // 自動 (利息) 由外部計算
    default:          return 0;
  }
}

// 從 p 取得 costItems (確保結構完整, 缺值用舊欄位 fallback)
function getCostItems(p) {
  const ci = p.costItems || {};
  const oldVals = {
    co: { mode: "perPing",  value: p.cC   || 0 },
    de: { mode: "pctSales", value: p.desR || 0 },
    ad: { mode: "pctSales", value: p.bAd  || 0 },
    tx: { mode: "pctSales", value: p.bTx  || 0 },
    mg: { mode: "pctSales", value: p.bMg  || 0 },
    am: { mode: (p.bAmMode === "fixed" ? "fixed" : "pctSales"),
          value: (p.bAmMode === "fixed" ? (p.bAm || 0) : (p.bAmR || 0)) },
    it: { mode: "auto", value: 0 }
  };
  const result = {};
  STD_COST_KEYS.forEach(k => {
    result[k] = ci[k] ? {...oldVals[k], ...ci[k]} : oldVals[k];
  });
  return result;
}

// 從 p 取得 customCostItems (確保是陣列)
function getCustomCostItems(p) {
  return Array.isArray(p.customCostItems) ? p.customCostItems : [];
}

/* ════════════════════════════════════════
   v76: calcJbDistribution — 核心分屋計算 helper
   抽自「六、合建分回 → 分屋計算 IIFE」, 讓 T2 與分屋計算 UI 用同一公式
   ──────────────────────────────────────
   邏輯:
   1. 每位 owner 算容積加權佔比 farPct
   2. 依 jbMode 算 jbLandShare (negotiated 用 opts.jbLandlordShare; rightsConversion 用 (V-C)/V)
   3. 每位 owner 算 finalRatio:
      - invest=true (出資地主): finalRatio = farPct (滿額)
      - invest=false (純合建):  finalRatio = farPct × jbLandShare
   4. builderRatio = 1 - Σ ownersFinalRatio
   ──────────────────────────────────────
   opts: {
     jbMode?: "negotiated" | "rightsConversion",
     jbLandlordShare?: 0~1 (協議模式用, 開價合建比),
     rcTotalValue?, rcCommonBurden?: 權利變換用,
     investOverrides?: {"owner_<id>": true|false} — 覆寫 owner.invest 狀態
   }
   返回 { jbLandShare, landlordTotalRatio, builderRatio, ownerRatios, entries }
════════════════════════════════════════ */
function calcJbDistribution(p, dr, opts) {
  opts = opts || {};
  const summary = {};
  (p.ownerHoldings || []).forEach(h => {
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    if (!land) return;
    const key = h.ownerId;
    let name, isBuilder = false, ownerId = null;
    if (h.ownerId === "builder") {
      name = "建商"; isBuilder = true;
    } else {
      const owner = (p.owners || []).find(o => o.id === h.ownerId);
      name = owner ? owner.name : "(未知)";
      ownerId = h.ownerId;
    }
    if (!summary[key]) summary[key] = { name, isBuilder, ownerId, m2: 0, value: 0, farW: 0 };
    const sM2 = (land.m2 || 0) * (h.share || 0);
    summary[key].m2 += sM2;
    summary[key].value += sM2 * (land.announcedValuePerM2 || 0) / 10000;
    let landFar = 0;
    if (!land.isNonBuildable) {
      if (land.far != null && land.far !== "") landFar = land.far / 100;
      else {
        const lz = (typeof gzi === "function") ? gzi(land.city || p.city, land.zone || p.zone) : null;
        landFar = lz ? (lz.f || 0) : 0;
      }
    }
    summary[key].farW += (sM2 * 0.3025) * landFar;
  });
  const entries = Object.values(summary);
  const totalFarW = entries.reduce((s, e) => s + e.farW, 0);
  const totalM2 = entries.reduce((s, e) => s + e.m2, 0);
  entries.forEach(e => {
    e.farPct = totalFarW > 0 ? e.farW / totalFarW : 0;
    e.areaPct = totalM2 > 0 ? e.m2 / totalM2 : 0;
  });
  const jbMode = opts.jbMode || p.jbMode || "negotiated";
  let jbLandShare;
  if (jbMode === "rightsConversion") {
    const rcTotalValue = opts.rcTotalValue != null ? Number(opts.rcTotalValue)
                       : (p.rcTotalValue != null && p.rcTotalValue !== "") ? Number(p.rcTotalValue)
                       : (dr ? dr.ts || 0 : 0);
    const rcCommonBurden = opts.rcCommonBurden != null ? Number(opts.rcCommonBurden)
                         : (p.rcCommonBurden != null && p.rcCommonBurden !== "") ? Number(p.rcCommonBurden)
                         : 0;
    jbLandShare = rcTotalValue > 0 ? Math.max(0, Math.min(1, (rcTotalValue - rcCommonBurden) / rcTotalValue)) : 0;
  } else {
    jbLandShare = opts.jbLandlordShare != null ? Number(opts.jbLandlordShare)
                : (p.jbLandlordShare != null ? Number(p.jbLandlordShare) : 0.5);
  }
  jbLandShare = Math.max(0, Math.min(1, jbLandShare));
  const investOverrides = opts.investOverrides || {};
  entries.forEach(e => {
    if (e.isBuilder) return;
    const owner = (p.owners || []).find(o => o.id === e.ownerId);
    const overrideKey = "owner_" + e.ownerId;
    let invest;
    if (Object.prototype.hasOwnProperty.call(investOverrides, overrideKey)) {
      invest = !!investOverrides[overrideKey];
    } else {
      invest = !!(owner && owner.invest);
    }
    e.invest = invest;
    e.pureJbRatio = e.farPct * jbLandShare;
    e.finalRatio = invest ? e.farPct : e.pureJbRatio;
  });
  const ownerRatios = {};
  let landlordTotalRatio = 0;
  entries.forEach(e => {
    if (e.isBuilder || e.ownerId == null) return;
    const key = "owner_" + e.ownerId;
    ownerRatios[key] = e.finalRatio;
    landlordTotalRatio += e.finalRatio;
  });
  const builderRatio = Math.max(0, 1 - landlordTotalRatio);
  return { jbLandShare, landlordTotalRatio, builderRatio, ownerRatios, entries };
}

/* ════════════════════════════════════════
   v76: applyAllocScenario — 把分配方案套用到 p 並返回 tempP
   分配方案 (v76 修訂):
     { id, label,
       jbLandlordShare: 開價合建比 (0~1, 純地主 vs 建商方協議),
       investOverrides?: {"owner_<id>": true|false} 覆寫主設定的 invest,
       costBearingMode: "uniform" | "detail",
       costBearingPct, costBearingDetail
     }
   ──────────────────────────────────────
   核心改變: 用 calcJbDistribution 計算 owners[].ratio (含出資稀釋)
   不再用「按比例縮放」舊邏輯
════════════════════════════════════════ */
/* ════════════════════════════════════════
   v79: 土地價值認列 helper
   - calcOwnerLandValue: 從 ownerHoldings + lands 算「該角色實際持有的土地公告總值」(萬)
   - getOwnerLandValue: 依 owner.landValuation.mode 取值 (appraisal/book/acquired)
   套用範圍: T2 損益分析、T7 經營分析
════════════════════════════════════════ */
function calcOwnerLandValue(p, dr, ownerKey) {
  let total = 0;
  const effRatio = (dr && typeof dr.effectiveRatio === "number") ? dr.effectiveRatio : 1;
  (p.ownerHoldings || []).forEach(h => {
    if (h.ownerId !== ownerKey) return;
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    if (!land) return;
    total += (land.m2 || 0) * (land.announcedValuePerM2 || 0) * (h.share || 0) * effRatio / 10000;
  });
  return total;  // 萬元 (公告總值)
}
// 自 v230: 地主持分「原始」公告總值，不含 effRatio 縮減。
//   給容積移轉用——容移的價金基礎是土地登記謄本上的原始公告現值，跟建築容積的捐地比例(effRatio)
//   是兩件不相干的事，不該套用縮減。跟 calcOwnerLandValue 共用同一套已驗證正確的比對邏輯，
//   只是拿掉 effRatio 這個乘項，避免各自維護一份比對邏輯，導致兩邊算出不同結果卻找不到原因。
function calcOwnerAnnouncedValueRaw(p, ownerKey) {
  let total = 0;
  (p.ownerHoldings || []).forEach(h => {
    if (h.ownerId !== ownerKey) return;
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    if (!land) return;
    total += (land.m2 || 0) * (land.announcedValuePerM2 || 0) * (h.share || 0) / 10000;
  });
  return total;  // 萬元 (原始公告總值，不含effRatio)
}

// 自 v128: 市值 = Σ 持分土地 area(坪) × price(萬/坪) × 持分 × 有效比例
function calcOwnerMarketValue(p, dr, ownerKey) {
  let total = 0;
  const effRatio = (dr && typeof dr.effectiveRatio === "number") ? dr.effectiveRatio : 1;
  (p.ownerHoldings || []).forEach(h => {
    if (h.ownerId !== ownerKey) return;
    const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
    if (!land) return;
    total += (land.area || 0) * (land.price || 0) * (h.share || 0) * effRatio;
  });
  return total;  // 萬元 (市值)
}

// 自 v128/129: 土地價值認列 4 模式, 各模式各存一份手填值 (決策1=B)
//   announced=公告總值 / book=帳面成本 / acquired=取得價值 / market=市值
//   手填值優先; 未填(=0) → 自動 fallback (市值優先 → 公告), 避免 KPI 分母為 0
//   舊 "appraisal" 視為 "announced"
function getOwnerLandValue(p, dr, ownerArg) {
  let lv, ownerKey;
  if (ownerArg === "builder" || (ownerArg && ownerArg.isBuilder)) {
    lv = p.builderLandValuation || { mode: "book" };
    ownerKey = "builder";
  } else {
    lv = (ownerArg && ownerArg.landValuation) || { mode: "book" };
    ownerKey = ownerArg ? ownerArg.id : null;
  }
  let mode = lv.mode || "book";
  if (mode === "appraisal") mode = "announced";
  const fieldKey = { book: "bookValue", acquired: "acquiredValue", market: "marketValue", announced: "announcedValue" }[mode] || "bookValue";
  let v = Number(lv[fieldKey]) || 0;
  if (v <= 0) {
    // 未填 → 自動 fallback (市值優先 → 公告總值)
    v = calcOwnerMarketValue(p, dr, ownerKey) || calcOwnerLandValue(p, dr, ownerKey);
  }
  return v;
}

// 自 v128: 土地價值認列模式中文標籤
function landValuationLabel(mode) {
  const m = mode === "appraisal" ? "announced" : (mode || "book");
  return m === "announced" ? "公告總值" : m === "book" ? "帳面成本" : m === "acquired" ? "取得價值" : m === "market" ? "市值" : "土地價值";
}

// 自 v126: 計算「有效交屋日」(handoverDate 有設用它, 否則用銷售時程最後一期, 再否則 2028/6)
//   與 calcCompBenefit 的 acqYear 邏輯一致, 供處分排程 UI 與 makeScenarioDefs 預設時間用
function effHandoverDate(p) {
  const hd = p.handoverDate || {};
  const hy = Number(hd.year) || 0, hm = Number(hd.month) || 0;
  if (hy > 0 && hm > 0) return { year: hy, month: hm };
  const ss = p.salesSched || [];
  if (ss.length > 0) {
    const last = [...ss].sort((a, b) => (b.year * 12 + b.month) - (a.year * 12 + a.month))[0];
    return { year: Number(last.year) || 2028, month: Number(last.month) || 6 };
  }
  return { year: 2028, month: 6 };
}

// 自 v124: 套用 T2 基準參數覆寫 (what-if, 不改基本假設)
//   t2Baseline.prices.<cat> != null → 覆寫該類別單價; constructCost != null → 覆寫造價
//   回傳套用覆寫後的 p (無覆寫則回傳原 p)
function applyT2Baseline(p) {
  const tb = p.t2Baseline || {};
  const prices = tb.prices || {};
  const hasPriceOverride = Object.keys(prices).some(k => prices[k] != null);
  const hasCostOverride = tb.constructCost != null;
  if (!hasPriceOverride && !hasCostOverride) return p;
  const sm = p.salesMix || {};
  const newSm = { ...sm };
  ["res", "retail", "office"].forEach(k => {
    if (prices[k] != null) newSm[k] = { ...(sm[k] || {}), uP: Number(prices[k]) || 0 };
  });
  if (Array.isArray(sm.customCategories)) {
    newSm.customCategories = sm.customCategories.map(c => prices[c.id] != null ? { ...c, uP: Number(prices[c.id]) || 0 } : c);
  }
  const result = { ...p, salesMix: newSm };
  if (hasCostOverride) {
    const cc = Number(tb.constructCost) || 0;
    result.cC = cc;
    if (p.costItems && p.costItems.co) {
      result.costItems = { ...p.costItems, co: { ...p.costItems.co, value: cc } };
    }
  }
  return result;
}

function applyAllocScenario(p, sc) {
  // 自 v100: base case 改回 spread copy, 避免後續 mutate 汙染 p
  if (!sc || sc.isBase) return {...p};
  // 用 calcJbDistribution 算 finalRatio (含容積加權 + 出資稀釋)
  const tempDr = calcDerived(p);
  const dist = calcJbDistribution(p, tempDr, {
    jbMode: "negotiated",  // 分配方案統一用協議合建模式
    jbLandlordShare: sc.jbLandlordShare,
    investOverrides: sc.investOverrides || {}
  });
  // 計算 costBearing
  let cb;
  if (sc.costBearingMode === "detail") {
    const d = sc.costBearingDetail || {};
    cb = {
      co: (Number(d.co)||0)/100, de: (Number(d.de)||0)/100, ad: (Number(d.ad)||0)/100,
      tx: (Number(d.tx)||0)/100, mg: (Number(d.mg)||0)/100, am: (Number(d.am)||0)/100,
    };
  } else {
    const pct = (Number(sc.costBearingPct) || 0) / 100;
    cb = { co: pct, de: pct, ad: pct, tx: pct, mg: pct, am: pct };
  }
  // 寫入 owners[].ratio + costBearing
  // 自 v113: 套用該分配方案的自由組合 (Q5=A, 各方案各存一套)
  return {
    ...p,
    owners: (p.owners || []).map(o => ({
      ...o,
      ratio: dist.ownerRatios["owner_" + o.id] || 0,
      costBearing: cb,
      // 注意: invest 不寫入 tempP, 避免污染主設定的視角邏輯
    })),
    shareComposition: sc.shareComposition || { byRole: {} }
  };
}

function cS(p, dr, price, cost, role, ownerRatio, taxOverride) {
  const {landValue, totalArea} = dr;

  // ─── 取得分回面積 (考慮手動覆寫 / 自由組合) ───
  let shareArea;
  let _shareRec = null;  // 自 v111: 該角色的 shareInfo 紀錄 (含 compMode)
  if (role === "b") {
    const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "builder");
    _shareRec = s || null;
    shareArea = s ? s.finalArea : totalArea * dr.builderRatio;
  } else {
    const s = dr.shareInfo && dr.shareInfo.find(x => x.role === "owner" && Math.abs(x.ratio - ownerRatio) < 1e-9);
    _shareRec = s || null;
    shareArea = s ? s.finalArea : totalArea * ownerRatio;
  }

  // 收入 = 分回面積 × 售價 (+ 車位收入按比例分配)
  // 自 v64: price = 加權平均房屋單價 (dr.weightedUP), 車位收入 = dr.salesMix.parkTotalSales (pip=true 時為 0)
  const ratio = role === "b" ? dr.builderRatio : ownerRatio;
  const parkSales = (dr.salesMix && dr.salesMix.parkTotalSales) || 0;
  // 自 v83: 容積移轉收益直接進總銷 (廢棄 includeInT8 邏輯)
  // 自 v86: 廢棄 subMode 區分 (純粹 vs 結合), 蓋房售屋永遠計算
  //   - 純粹型 (沒蓋房): 使用者把分回面積/容積率設 0, 蓋房售屋自然 = 0
  //   - 結合型 (蓋房 + 賣容積): 蓋房售屋 X + 容移收益 Y = 總銷
  //   分配: 容移收益依 builderShareRatio 分給建商, 其餘給地主
  // 自 v225 修正：移除這裡對 sh 的無條件注入。
  //   根因：這是三個容移污染注入點裡最深層的一個——sh(總銷)是幾乎所有損益計算的最底層基礎，
  //   污染 sh 不只多算收入，連依總銷比例計算的廣告費/稅雜費/管理費(ad/tx/mg)等成本項也一併失真，
  //   影響範圍比 totalProfit(v221已修) 或 cashflows(剛修) 更深更廣。
  //   v221/v225 已經把容移改成獨立的 calcVolTransferScenario 情境層讀取，這裡不應該再參與 sh 計算。
  let vtRevenueForThisRole = 0;
  // v86: 蓋房售屋永遠計算 (不再受 subMode 影響)
  // 自 v111: 自由組合模式 → houseSales = 組合總價值 (基期售價, 各部位單價加總)
  //          auto 模式 → houseSales = 分回面積 × 加權均價 + 車位收入 × 比例 (現況)
  let houseSales;
  if (_shareRec && _shareRec.compMode) {
    // 自 v122: 含現金找補 (sales = 組合單元價值 + 現金找補 = 應得價值)
    houseSales = (_shareRec.sales != null) ? _shareRec.sales : _shareRec.compValue;
  } else {
    houseSales = shareArea * price + parkSales * ratio;
  }
  const sh = houseSales + vtRevenueForThisRole;

  // 建築工程造價 cf:
  //   合建案中，建商出資蓋整棟房子，承擔全案造價成本。
  //   自 v101: cfFullProject 直接用 cost 參數 (每坪造價), 不再用 costItems.co.mode
  //   自 v102: 分母用 totalFloorArea (總樓地板, 含車位/地下室), 不用 totalArea (總銷, 扣車位)
  //            原因: 建築造價的「萬/坪」傳統指「每坪樓地板」(整棟樓含地下都要花錢蓋)
  const _floorArea = Number(dr.totalFloorArea) || totalArea;
  const cfFullProject = _floorArea * cost;

  const bAmVal = p.bAmMode === "pct" ? sh * p.bAmR : p.bAm;
  let cs, cf;
  let ownerEq = 0;  // 地主自有資金 (出資承擔的成本合計)
  let ownerLL = 0;  // 地主融資金額 (新)
  let ownerFinanceInterest = 0;  // 地主融資利息 (新)
  let otherIncome = 0;  // 自 v207: 租金補貼等額外收入，獨立於cs/tc之外，只加進pbt
  if (role === "b") {
    // ─── 建商側成本（含地主出資替建商付的部分扣除）───
    cf = cfFullProject;
    const intr = (landValue*p.lLTV*p.lLR*p.dur/12 + cf*p.cLTV*p.cLR*p.dur/12) / 2;
    // 不勾合建時，建商獨資 → 自付土增稅、契稅
    const builderBearsTax = !p.jb;
    const ltBuilder = builderBearsTax ? (dr.lvt.tax/10000) : 0;
    const ddBuilder = builderBearsTax ? dr.deedCalc.tax : 0;

    // ─── 用 costItems + 自訂項目計算建商成本 ───
    const ci = getCostItems(p);
    const cci = getCustomCostItems(p);
    const ctx = { sales: sh, totalArea: totalArea, totalCost: cf };
    // 標準 7 項
    const builderFull = {
      co: calcCostItemValue(ci.co, ctx),
      de: calcCostItemValue(ci.de, ctx),
      ad: calcCostItemValue(ci.ad, ctx),
      tx: calcCostItemValue(ci.tx, ctx),
      mg: calcCostItemValue(ci.mg, ctx),
      am: calcCostItemValue(ci.am, ctx),
      it: intr,  // 利息一律自動
      lt: ltBuilder, dd: ddBuilder
    };
    // 自 v67: builderFull.co 與 cfFullProject 邏輯一致 (避免顯示與利息分母不同步)
    builderFull.co = cfFullProject;
    // 自訂項目: 加入 builderFull 用 key "cu_<id>" 區分
    cci.forEach(c => {
      const v = calcCostItemValue(c, ctx);
      builderFull["cu_" + c.id] = v;
    });

    // 地主出資替建商付掉的成本 (含標準 7 項 + 自訂項目)
    const allCostKeys = [...STD_COST_KEYS, ...cci.map(c => "cu_" + c.id)];
    // 建立 key → type 對應
    const keyType = {};
    STD_COST_KEYS.forEach(k => { keyType[k] = "expense"; });  // 標準項目永遠是 expense
    cci.forEach(c => { keyType["cu_" + c.id] = getItemType(c); });
    let assumedByOwners = {};
    allCostKeys.forEach(k => assumedByOwners[k] = 0);
    if (p.jb) {
      p.owners.forEach(o => {
        const csh = o.costBearing || {};
        allCostKeys.forEach(k => {
          const pctVal = Number(csh[k]) || 0;
          assumedByOwners[k] += (builderFull[k] || 0) * pctVal;
        });
      });
    }
    // 建商實際成本計算:
    //   expense:             建商支付 = 完整 - 地主承擔 (一般情況)
    //   transfer_to_builder: 建商收入 = -完整金額 (建商開立發票的全額)
    //                        (其他地主未設定承擔的部分, 視為「未分配」, 不影響建商收入認列)
    cs = {...builderFull};
    allCostKeys.forEach(k => {
      if (keyType[k] === "transfer_to_builder") {
        cs[k] = -(builderFull[k] || 0);  // 建商收全額 (負值=收入)
      } else {
        cs[k] = (builderFull[k] || 0) - assumedByOwners[k];
      }
    });
  } else {
    // ─── 地主側成本 ───
    cf = 0;
    const ownerShare = ownerRatio / (1 - dr.builderRatio || 1);
    // 找到當前地主物件
    const me = p.owners.find(o => Math.abs(o.ratio - ownerRatio) < 1e-9);
    // 費率啟用（預設都啟用，可在六中關閉）
    const fe = (me && me.feeEnabled) || {ad:true, tx:true, mg:true};
    // ─── 自 v170: 土增稅個別化 ───
    // 自 v199: 土增稅統一改在「稅」（itx/single_taxInfo.tax）扣除，成本(tc)不再重複扣。
    //   根因：本來這裡逐持分加總（_ltFromHoldings）算出的舊制土增稅，跟 calcCompBenefit 主體
    //   的 _oldTax 是同一筆錢、同一套邏輯，一個算進 tc（成本），一個算進 single_taxInfo.tax（稅），
    //   造成重複扣稅。確定方向：土增稅只在稅額（itx）扣一次，成本裡的 lt 固定為 0。
    const _lt = 0;
    // ─── 自 v203: 土增稅(抵付/互易稅) — 純合建(未出資)時，移轉給建商部分的土地要立即課土增稅 ───
    //   出資(invest=true)：土地未移轉給建商，抵付稅=0
    //   純合建(invest=false)：抵付稅 = 該地主逐持分彙總舊制稅額 × 建商分回比例(1-jbLandlordShare)
    //     可勾選 lvtExemptOnExchange 全免（都更/危老互易常見全免）
    let _lvtExchange = 0;
    if (me && !me.invest) {
      const _myHoldingsForExchange = (p.ownerHoldings || []).filter(h =>
        h.ownerId !== "builder" && String(h.ownerId) === String(me.id)
      );
      const _oldTaxForExchange = _myHoldingsForExchange.reduce((acc, h) => {
        const yr = Number(h.landAcquireYearROC) || 0;
        const isOld = yr > 0 && yr < 105;
        if (isOld && h.lvtTaxResult != null) {
          const raw = Number(h.lvtTaxResult) || 0;
          return acc + raw;  // 抵付稅不受「處分六折」影響，只受自己的「抵付免徵」影響
        }
        return acc;
      }, 0);
      const _jbLandlordShare = (p.jbLandlordShare != null && p.jbLandlordShare !== "") ? Number(p.jbLandlordShare) : 0.5;
      _lvtExchange = me.lvtExemptOnExchange ? 0 : (_oldTaxForExchange * (1 - _jbLandlordShare));
    }
    const baseCs = {de:0, co:0,
                    ad: fe.ad !== false ? sh*p.oAdR : 0,
                    tx: fe.tx !== false ? sh*p.oTxR : 0,
                    mg: fe.mg !== false ? sh*p.oMgR : 0,
                    am:0, it:0,
                    lt: _lt, dd: dr.deedCalc.tax * ownerShare,
                    lex: _lvtExchange};  // 自 v203: 土增稅(抵付/互易稅)
    const csh = (me && me.costBearing) || {};
    // 重新計算建商完整成本（以全案造價、利息、設計、廣告等為基準）
    const cf_full = cfFullProject;
    const intr_full = (landValue*p.lLTV*p.lLR*p.dur/12 + cf_full*p.cLTV*p.cLR*p.dur/12) / 2;
    // 建商收入(若無扣除地主出資): 用於計算 bAm/bAd/bTx/bMg 等成本
    const builderArea_full = totalArea * dr.builderRatio;
    const _parkSales_b = (dr.salesMix && dr.salesMix.parkTotalSales) || 0;
    const sh_b_full = builderArea_full * price + _parkSales_b * dr.builderRatio;

    // ─── 用 costItems + 自訂項目計算建商完整成本 (給地主端基準用) ───
    const ci_owner = getCostItems(p);
    const cci_owner = getCustomCostItems(p);
    const ctx_owner = { sales: sh_b_full, totalArea: totalArea, totalCost: cf_full };
    const builderFull = {
      co: calcCostItemValue(ci_owner.co, ctx_owner),
      de: calcCostItemValue(ci_owner.de, ctx_owner),
      ad: calcCostItemValue(ci_owner.ad, ctx_owner),
      tx: calcCostItemValue(ci_owner.tx, ctx_owner),
      mg: calcCostItemValue(ci_owner.mg, ctx_owner),
      am: calcCostItemValue(ci_owner.am, ctx_owner),
      it: intr_full
    };
    // 自 v67: builderFull.co 與 cf_full 一致
    builderFull.co = cf_full;
    // 自訂項目加入
    cci_owner.forEach(c => {
      builderFull["cu_" + c.id] = calcCostItemValue(c, ctx_owner);
    });
    cs = {...baseCs};
    Object.keys(builderFull).forEach(k => {
      const pctVal = Number(csh[k]) || 0;
      cs[k] = (cs[k] || 0) + builderFull[k] * pctVal;
      ownerEq += builderFull[k] * pctVal;  // 累計地主出資承擔金額
    });
    // ─── 地主融資 (如有啟用) ───
    if (me && me.financing && me.financing.enabled) {
      const fa = Number(me.financing.amount) || 0;
      const fr = (Number(me.financing.rate) || 0) / 100;
      const fm = Number(me.financing.durationMonths) || 0;
      if (fa > 0) {
        ownerLL = fa;
        // 簡單利息平均: amount × rate × duration/12 / 2 (假設線性還本)
        ownerFinanceInterest = fa * fr * (fm/12) / 2;
        // 加到成本: 利息列
        cs.it = (cs.it || 0) + ownerFinanceInterest;
      }
    }
    // ─── 自 v207 修正：租金補貼收入 — 純合建(未出資)時，建商施工期間補貼地主房租 ───
    //   出資(invest=true)：地主自建，不列入這筆補貼收入
    //   純合建(invest=false)：計入地主收入
    //   根因修正：v203 原本以「負成本」方式併入 cs（cs.rentSub = -amt），
    //     若補貼金額大於其他成本總和，會讓 tc（成本合計）整個變成負數，
    //     污染所有以 tc 為分母/乘數的公式（cr成本報酬率、costShare處分成本分攤、bep損益兩平點）。
    //   修法：改為獨立的 otherIncome（收入），不計入 cs/tc，只在 pbt 計算時額外加上，
    //     讓 tc 永遠維持「純成本」（恆為正常成本加總），pbt/pat 損益金額不變。
    if (me && !me.invest && me.rentSubsidy && me.rentSubsidy.enabled) {
      otherIncome = (Number(me.rentSubsidy.monthly) || 0) * (Number(me.rentSubsidy.months) || 0);
    }
  }
  const tc = Object.values(cs).reduce((a,b) => a+b, 0);
  const pbt = sh + otherIncome - tc;
  // itx (房地合一稅 / 舊制土增稅):
  //   - 分析身分 (taxOverride 有值) → 用經營分析的真實稅額
  //   - 其他人 → 用預設稅率 p.itR (15%)
  const itx = taxOverride != null
    ? Math.max(0, Number(taxOverride) || 0)
    : (pbt > 0 ? pbt * p.itR : 0);
  const pat = pbt - itx;
  // 融資與自有資金
  //   建商: ll = 土地 × LTV; cl = 工程 × LTV
  //   地主: ll = 自填融資金額; cl = 0
  const ll = role === "b" ? landValue * p.lLTV : ownerLL;
  const cl = role === "b" ? cf * p.cLTV : 0;
  const tl = ll + cl;
  // 自有資金
  //   建商: 總成本 − 融資
  //   地主: 出資承擔合計 − 融資 (融資視為「替代自有資金」)
  const eq = role === "b" ? Math.max(tc - tl, 0) : Math.max(ownerEq - ownerLL, 0);
  return {sh, cs, tc, pbt, itx, pat, shareArea, otherIncome,
    gm: sh ? pbt/sh : 0, nm: sh ? pat/sh : 0, cr: tc ? pat/tc : 0,
    bep: shareArea ? tc/shareArea : 0, ll, cl, tl, eq, er: eq > 0 ? pat/eq : 0,
    ownerFinanceInterest};
}

/* ════════════════════════════════════════
   經營分析計算 (七、經營分析)
════════════════════════════════════════ */
function calcCompBenefit(p, dr) {
  const cb = p.compBenefit || {};
  const mode = cb.mode || "single";           // "single" | "longHold"
  const useDiscount = !!cb.useDiscount;
  const r = useDiscount ? ((Number(cb.discountRate) || 0) / 100) : 0;
  const holdYears = Math.max(1, Number(cb.holdYears) || 10);
  // 處分價格預估參數
  const depRate = (Number(cb.buildingDepRate) || 0) / 100;   // 建物折舊率
  const appRate = (Number(cb.landAppRate) || 0) / 100;       // 土地年漲幅
  const bRatio = Math.max(0, Math.min(100, Number(cb.buildingRatio) || 45)) / 100;
  const lRatio = 1 - bRatio;

  // ─── 取得「我的身分」對應的取回面積與負擔成本 ───
  const myRole = p.myRole || "builder";

  // ═══ 自 v139: 群組視角 = 各成員「各自完整計算 calcCompBenefit」再加總 (使用者確認: 稅各自算最精確, 群組各欄 = 個別地主相加) ═══
  if (myRole.startsWith("group_") && p.jb) {
    const gid = myRole.slice(6);
    const g = (p.selectGroups || []).find(x => String(x.id) === String(gid));
    // 成員 id 寬鬆比對 (String) — 對齊 owner.id, 避免浮點 id 精度失配
    const memberOwners = g ? (g.members || []).map(mid => (p.owners || []).find(o => String(o.id) === String(mid))).filter(Boolean) : [];
    if (memberOwners.length > 0) {
      // 各成員各自完整計算 (遞迴, 成員是 owner 不會再遞迴)
      const memberCEs = memberOwners.map(o => calcCompBenefit({ ...p, myRole: "owner_" + o.id }, dr));
      const sumF = (fn) => memberCEs.reduce((a, ce) => a + (Number(fn(ce)) || 0), 0);
      // 加總可加性欄位
      const myArea = sumF(ce => ce.myArea);
      const myAllocValue = sumF(ce => ce.myAllocValue);
      const mySalesAmount = sumF(ce => ce.mySalesAmount);
      const myTotalCost = sumF(ce => ce.myTotalCost);
      const myPAT = sumF(ce => ce.myPAT);
      const landValue = sumF(ce => ce.landValue);
      // myCs 各欄加總 (cs 物件逐項加總)
      const csKeys = ["sh","tc","pbt","itx","pat","shareArea","ll","cl","tl","eq","ownerFinanceInterest","lt","dd"];
      const myCs = {};
      csKeys.forEach(k => { myCs[k] = sumF(ce => ce.myCs ? ce.myCs[k] : 0); });
      myCs.cs = {};
      memberCEs.forEach(ce => {
        const c = (ce.myCs && ce.myCs.cs) || {};
        Object.keys(c).forEach(k => { myCs.cs[k] = (myCs.cs[k] || 0) + (Number(c[k]) || 0); });
      });
      myCs.gm = myCs.sh ? myCs.pbt / myCs.sh : 0;
      myCs.nm = myCs.sh ? myCs.pat / myCs.sh : 0;
      myCs.cr = myCs.tc ? myCs.pat / myCs.tc : 0;
      myCs.bep = myCs.shareArea ? myCs.tc / myCs.shareArea : 0;
      myCs.er = myCs.eq > 0 ? myCs.pat / myCs.eq : 0;
      // 各成員類型面積加總 (myTypeAreas)
      const myTypeAreas = {};
      memberCEs.forEach(ce => {
        const t = ce.myTypeAreas || {};
        Object.keys(t).forEach(k => { myTypeAreas[k] = (myTypeAreas[k] || 0) + (Number(t[k]) || 0); });
      });
      // single 模式加總
      const single = {
        taxableBase: sumF(ce => ce.single && ce.single.taxableBase),
        grossProfit: sumF(ce => ce.single && ce.single.grossProfit),
        netProfit: sumF(ce => ce.single && ce.single.netProfit),
        annual: sumF(ce => ce.single && ce.single.annual),
        taxInfo: { tax: sumF(ce => ce.single && ce.single.taxInfo && ce.single.taxInfo.tax) }
      };
      // longHold 模式加總 (處分淨利/收入/稅/面積、租金、營業 各成員各自算後加總)
      const lh0 = memberCEs[0].longHold || {};
      const longHold = {
        disposals: [],   // 群組層不展開個別處分明細 (各成員已各自算), 僅供 filter 用
        pd_sumGrossProfit: sumF(ce => ce.longHold && ce.longHold.pd_sumGrossProfit),
        pd_sumNetProfit: sumF(ce => ce.longHold && ce.longHold.pd_sumNetProfit),
        pd_sumTax: sumF(ce => ce.longHold && ce.longHold.pd_sumTax),
        pd_sumRevenue: sumF(ce => ce.longHold && ce.longHold.pd_sumRevenue),
        pd_sumArea: sumF(ce => ce.longHold && ce.longHold.pd_sumArea),
        rent: { enabled: memberCEs.some(ce => ce.longHold && ce.longHold.rent && ce.longHold.rent.enabled),
                npv: sumF(ce => ce.longHold && ce.longHold.rent && ce.longHold.rent.npv),
                total: sumF(ce => ce.longHold && ce.longHold.rent && ce.longHold.rent.total),
                years: lh0.rent ? lh0.rent.years : 0,
                annual: sumF(ce => ce.longHold && ce.longHold.rent && ce.longHold.rent.annual) },
        business: { enabled: memberCEs.some(ce => ce.longHold && ce.longHold.business && ce.longHold.business.enabled),
                npv: sumF(ce => ce.longHold && ce.longHold.business && ce.longHold.business.npv),
                total: sumF(ce => ce.longHold && ce.longHold.business && ce.longHold.business.total),
                years: lh0.business ? lh0.business.years : 0,
                annual: sumF(ce => ce.longHold && ce.longHold.business && ce.longHold.business.annual) },
        total: sumF(ce => ce.longHold && ce.longHold.total),
        annual: sumF(ce => ce.longHold && ce.longHold.annual),
        periodYears: lh0.periodYears || 0,
        availableArea: sumF(ce => ce.longHold && ce.longHold.availableArea),
        totalDisposedArea: sumF(ce => ce.longHold && ce.longHold.totalDisposedArea),
        autoFillSingle: false, overlapMin: 0
      };
      // 合併各成員處分明細 (供顯示 / filter(d=>d.enabled))
      memberCEs.forEach(ce => { if (ce.longHold && Array.isArray(ce.longHold.disposals)) longHold.disposals.push(...ce.longHold.disposals); });
      // volTransfer 加總
      const vt0 = memberCEs[0].volTransfer || {};
      const volTransfer = { ...vt0, enabled: memberCEs.some(ce => ce.volTransfer && ce.volTransfer.enabled),
                            netProfit: sumF(ce => ce.volTransfer && ce.volTransfer.netProfit) };
      // 價值導向: 全部成員都是價值導向才成立
      const isValueBased = memberCEs.length > 0 && memberCEs.every(ce => ce.isValueBased);
      const base0 = memberCEs[0];
      return {
        ...base0,
        myRole,
        myRoleLabel: g.name || memberOwners.map(o => o.name).join("+"),
        myArea, mySalesAmount, myTotalCost, myPAT, myCs,
        myCompMode: memberCEs.some(ce => ce.myCompMode), myTypeAreas,
        myAllocValue, isValueBased,
        _diagTotalArea: dr.totalArea,
        _diagHouseSales: dr.salesMix ? dr.salesMix.houseSales : 0,
        landValue, landLabel: "土地價值 (群組合計)", landMode: "group",
        single, longHold, volTransfer
      };
    }
  }

  let myArea = 0, myRoleLabel = "建商", myCs = null;
  let _groupMemberAlloc = null, _groupMemberRecs = null;   // 自 v138: 群組成員分回總銷/紀錄 (供 myAllocValue 加總)
