  const ce_t2 = calcCompBenefit(p, dr);
  const myAnalysisTax = (() => {
    if (!ce_t2) return null;
    if (ce_t2.landRegime === "old") {
      return ce_t2.lvtTax != null ? ce_t2.lvtTax : null;
    }
    // 新制: 需有納稅人身分才算
    return (ce_t2.taxpayer && ce_t2.single && ce_t2.single.taxInfo)
      ? ce_t2.single.taxInfo.tax : null;
  })();

  sorted.forEach(sc => {
    // 建商欄
    const builderLabel = isMyBuilder ? "👤 建商 (我)" : "建商";
    const builderTax = isMyBuilder ? myAnalysisTax : null;
    cols.push({sc, role:"b", label:builderLabel, ratio:dr.builderRatio, isMe:isMyBuilder, data:cS(p,dr,sc.price,sc.cost,"b",0,builderTax)});

    if (p.jb) p.owners.forEach(o => {
      const isMe = (("owner_" + o.id) === myRole);
      const lbl = isMe ? "👤 " + o.name + " (我)" : o.name;
      const ownerTax = isMe ? myAnalysisTax : null;
      cols.push({sc, role:"o", label:lbl, ratio:o.ratio, isMe, data:cS(p,dr,sc.price,sc.cost,"o",o.ratio,ownerTax)});
    });
  });

  // 將「我」的欄位排在每個情境的最前
  const reordered = [];
  sorted.forEach(sc => {
    const scCols = cols.filter(c => c.sc.id === sc.id);
    const myCols = scCols.filter(c => c.isMe);
    const otherCols = scCols.filter(c => !c.isMe);
    reordered.push(...myCols, ...otherCols);
  });
  // 用 reordered 取代 cols
  cols.length = 0;
  cols.push(...reordered);

  const cPS = p.jb ? 1+p.owners.length : 1;
  const R = ({l, gV, bold, isPct, bg="", className=""}) => (
    <tr className={(bg?" "+bg:"")+(bold?" font-bold":"")+" border-b border-slate-100 "+className}>
      <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-inherit z-10 whitespace-nowrap">{l}</td>
      {cols.map((c,i) => <td key={i} className={"py-[6px] px-2 text-right text-[13px] font-mono tn "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{isPct?pct(gV(c.data, c)):fmt(gV(c.data, c))}</td>)}
    </tr>
  );
  const Sec = ({l, c}) => <tr><td colSpan={1+cols.length} className={"py-[6px] px-3 text-[11px] font-bold tracking-widest "+c}>{l}</td></tr>;

  return (
    <div className="space-y-3">
      <div className="bg-white rounded-2xl border shadow-sm p-4">
        <div className="text-xs font-bold text-slate-500 mb-2 inline-flex items-center gap-1.5"><Icon name="clipboard-edit" size={12}/> 情境設定 (同售價排一起)</div>
        <div className="flex flex-wrap gap-2">
          {p.scenarios.map(sc=>(
            <div key={sc.id} className="bg-slate-50 rounded-lg p-2 border flex items-center gap-2">
              <input type="text" value={sc.label} onChange={e=>sP({...p,scenarios:p.scenarios.map(s=>s.id===sc.id?{...s,label:e.target.value}:s)})} className="w-16 text-sm font-bold text-slate-700 bg-transparent border-b focus:outline-none"/>
              <span className="text-[10px] text-slate-400">售</span><NI value={sc.price} onChange={v=>sP({...p,scenarios:p.scenarios.map(s=>s.id===sc.id?{...s,price:v}:s)})} className="w-14 text-center"/>
              <span className="text-[10px] text-slate-400">造</span><NI value={sc.cost} onChange={v=>sP({...p,scenarios:p.scenarios.map(s=>s.id===sc.id?{...s,cost:v}:s)})} className="w-14 text-center"/>
              {p.scenarios.length>1&&<BtnDel onClick={()=>sP({...p,scenarios:p.scenarios.filter(s=>s.id!==sc.id)})}/>}
            </div>
          ))}
          <Btn onClick={()=>sP({...p,scenarios:[...p.scenarios,{id:uid(),label:"方案"+(p.scenarios.length+1),price:52,cost:24}]})}>+ 新增</Btn>
        </div>
      </div>
      <div className="rounded-xl border-l-4 border-amber-500 bg-amber-50 p-3 text-[11px]">
        <div className="font-bold text-amber-900 mb-1">【立即處分基準】損益分析方案表</div>
        <div className="text-amber-800 leading-relaxed">
          此表為「<b>立即處分</b>」情境下的固定售價多方案對照，主要用於檢核建商提供的參數合理性與多情境比較。
          完整經營策略（含長期持有/處分時程）的投資指標請看下方「<b>投資綜合報告</b>」，
          IRR、ROI、ROE、Cap Rate 等指標會依「分析模式」(處分損益 / 完整持有) 自動切換。
        </div>
      </div>
      <div className="rounded-2xl border shadow-sm bg-white overflow-hidden"><div className="overflow-x-auto">
        <table className="w-full text-sm" style={{minWidth:Math.max(600,cols.length*100+150)}}>
          <thead>
            <tr className="bg-slate-700"><th className="py-2.5 px-3 text-left text-white font-bold text-xs sticky left-0 bg-slate-700 z-20" style={{minWidth:130}}>項目</th>{sorted.map(sc=><th key={sc.id} colSpan={cPS} className="py-2.5 px-2 text-center text-white border-l border-slate-600"><div className="font-bold text-xs">{sc.label}</div><div className="text-[10px] opacity-60">售{sc.price}/造{sc.cost}</div></th>)}</tr>
            <tr className="bg-slate-100 border-b"><th className="py-1.5 px-3 sticky left-0 bg-slate-100 z-20 text-xs text-slate-500">萬元</th>{cols.map((c,i)=><th key={i} className={"py-1.5 px-2 text-center text-[11px] font-bold "+(c.isMe?"text-amber-800 bg-amber-100":c.role==="b"?"text-emerald-700 bg-emerald-50/60":"text-sky-700 bg-sky-50/60")}>{c.label} {(c.ratio*100).toFixed(0)}%</th>)}</tr>
          </thead>
          <tbody>
            <Sec l="【收入】" c="text-emerald-700 bg-emerald-100/50"/><R l="分回金額" gV={s=>s.sh} bold/>
            <Sec l="【成本/費用】" c="text-rose-700 bg-rose-100/50"/>
            <R l="開發設計" gV={s=>s.cs.de}/><R l="建築工程" gV={s=>s.cs.co}/><R l="廣告銷售" gV={s=>s.cs.ad}/><R l="土增稅" gV={s=>s.cs.lt}/><R l="稅雜費" gV={s=>s.cs.tx}/><R l="契稅" gV={s=>s.cs.dd}/><R l="物管" gV={s=>s.cs.mg}/><R l="管銷" gV={s=>s.cs.am}/><R l="利息" gV={s=>s.cs.it}/>
            {/* 自訂成本項目 (動態顯示) */}
            {getCustomCostItems(p).map(c => (
              <R key={c.id} l={c.label || "自訂"} gV={s=>s.cs["cu_"+c.id] || 0}/>
            ))}
            <R l="成本合計" gV={s=>s.tc} bold bg="bg-slate-50"/>
            <Sec l="【損益】" c="text-amber-700 bg-amber-100/50"/>
            {/* 土地價值認列 (與經營分析一致) */}
            <R l="土地價值認列" gV={(s,c)=> c.role==="b" ? 0 : dr.landValue * (c.ratio||0)} className="text-amber-700"/>
            <R l="稅前利潤 (扣土地)" gV={(s,c)=> s.pbt - (c.role==="b" ? 0 : dr.landValue * (c.ratio||0))} bold/>
            <R l={ce_t2.landRegime === "old" ? "房地合一稅 (含土增稅)" : "房地合一稅"} gV={s=>s.itx}/>
            <R l="✦稅後淨利" gV={(s,c)=> s.pat - (c.role==="b" ? 0 : dr.landValue * (c.ratio||0))} bold bg="bg-amber-50/60"/>
            <R l="毛利率" gV={s=>s.gm} isPct/><R l="淨利率" gV={s=>s.nm} isPct/><R l="成本報酬率" gV={s=>s.cr} isPct/>
            <Sec l="【融資】" c="text-sky-700 bg-sky-100/50"/>
            <R l="土融" gV={s=>s.ll}/><R l="建融" gV={s=>s.cl}/><R l="融資合計" gV={s=>s.tl} bold/><R l="自有資金" gV={s=>s.eq} bold bg="bg-slate-50"/>
          </tbody>
        </table>
      </div></div>

      {/* ─── 經營分析摘要區塊 ─── */}
      {(() => {
        const ce = calcCompBenefit(p, dr);
        const myColData = cols.find(c => c.isMe)?.data;
        const salesPAT = myColData ? myColData.pat : ce.myPAT;
        const isSingle = ce.mode === "single";
        const lhTax = isSingle ? (ce.single.taxInfo.tax || 0) : (ce.longHold.pd_sumTax || 0);
        // single: 銷售淨利 + 不動產處分效益(已扣稅) (處分效益是「全部處分」概念, 與銷售淨利為對照,實際取較高者)
        //         此處仍兩者加總呈現「總體效益」, 因 single 表示「全處分=立即賣」, 視為等同
        // longHold: 銷售淨利已被處分淨利取代, 不重複計入
        const useDisc = ce.useDiscount;
        const compTotal = isSingle
          ? salesPAT + ce.single.netProfit
          : ce.longHold.pd_sumNetProfit
            + (useDisc ? ce.longHold.rent.npv : ce.longHold.rent.total)
            + (useDisc ? ce.longHold.business.npv : ce.longHold.business.total);
        return (
          <div className="bg-gradient-to-br from-amber-50 via-amber-50 to-amber-50 rounded-2xl border-2 border-amber-300 shadow-sm p-4">
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <div>
                <div className="text-sm font-bold text-amber-900 inline-flex items-center gap-1.5"><Icon name="bar-chart-3" size={13}/> 經營分析摘要 ({isSingle ? "不動產處分效益" : "長期持有不動產效益"})</div>
                <div className="text-[10px] text-amber-600">以「{ce.myRoleLabel}」為主視角 · 詳細設定請至「七、經營分析」</div>
              </div>
            </div>
            {isSingle ? (
              <>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                  <div className="bg-white/80 rounded-xl p-3 border-2 border-emerald-300">
                    <div className="text-[10px] text-emerald-600 font-bold">①銷售淨利</div>
                    <div className={"text-lg font-black font-mono "+(salesPAT>=0?"text-emerald-700":"text-rose-600")}>{fmt(salesPAT)} 萬</div>
                    <div className="text-[9px] text-slate-400">(來自損益分析)</div>
                  </div>
                  <div className="bg-white/80 rounded-xl p-3 border-2 border-sky-300">
                    <div className="text-[10px] text-sky-600 font-bold">②不動產處分淨利 (稅後)</div>
                    <div className={"text-lg font-black font-mono "+(ce.single.netProfit>=0?"text-sky-700":"text-rose-600")}>{fmt(ce.single.netProfit)} 萬</div>
                    <div className="text-[9px] text-slate-400">已扣{ce.landRegime==="old"?"土地增值稅":"房地合一稅"}</div>
                  </div>
                  <div className="bg-white/80 rounded-xl p-3 border-2 border-rose-300">
                    <div className="text-[10px] text-rose-600 font-bold inline-flex items-center gap-1">{ce.landRegime==="old" ? <><Icon name="landmark" size={11}/> 土地增值稅</> : <><Icon name="sparkles" size={11}/> 房地合一稅</>}</div>
                    <div className="text-lg font-black font-mono text-rose-700">-{fmt(lhTax)} 萬</div>
                    <div className="text-[9px] text-slate-400">{ce.single.taxInfo.label || "未指定身分"}</div>
                  </div>
                </div>
              </>
            ) : (
              <>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                  <div className="bg-white/80 rounded-xl p-3 border-2 border-sky-300">
                    <div className="text-[10px] text-sky-600 font-bold">①處分淨利合計 (稅後)</div>
                    <div className={"text-lg font-black font-mono "+(ce.longHold.pd_sumNetProfit>=0?"text-sky-700":"text-rose-600")}>{fmt(ce.longHold.pd_sumNetProfit)} 萬</div>
                    <div className="text-[9px] text-slate-400">{ce.longHold.disposals.filter(d=>d.enabled).length} 筆處分, 含稅 -{fmt(lhTax)}</div>
                  </div>
                  <div className="bg-white/80 rounded-xl p-3 border-2 border-violet-300">
                    <div className="text-[10px] text-violet-600 font-bold">②租金收益 {ce.useDiscount ? "(NPV)" : "(總額)"}</div>
                    <div className="text-lg font-black font-mono text-violet-700">{fmt(ce.useDiscount ? ce.longHold.rent.npv : ce.longHold.rent.total)} 萬</div>
                    <div className="text-[9px] text-slate-400">年化 {fmt(ce.longHold.rent.annual)}/年</div>
                  </div>
                  <div className="bg-white/80 rounded-xl p-3 border-2 border-amber-300">
                    <div className="text-[10px] text-amber-600 font-bold">③營業收益 {ce.useDiscount ? "(NPV)" : "(總額)"}</div>
                    <div className="text-lg font-black font-mono text-amber-700">{fmt(ce.useDiscount ? ce.longHold.business.npv : ce.longHold.business.total)} 萬</div>
                    <div className="text-[9px] text-slate-400">年化 {fmt(ce.longHold.business.annual)}/年</div>
                  </div>
                </div>
                <div className="text-[9px] text-slate-500 italic mt-2">
                  ※ 長期持有模式下，「銷售淨利」已由「處分淨利合計」取代，不重複計入。
                </div>
              </>
            )}
            <div className="mt-3 pt-3 border-t-2 border-amber-300 flex items-center justify-between flex-wrap gap-2">
              <span className="text-sm font-bold text-amber-900">經營分析總額</span>
              <span className={"text-2xl font-black font-mono "+(compTotal>=0?"text-amber-900":"text-rose-700")}>{fmt(compTotal)} 萬</span>
            </div>
          </div>
        );
      })()}

      {/* ─── 整合投資綜合報告 ─── */}
      <div className="mt-8 border-t-4 border-double border-amber-400 pt-6">
        <div className="bg-gradient-to-r from-amber-100 to-amber-100 rounded-xl p-3 mb-4 border-2 border-amber-300">
          <div className="text-base font-black text-amber-900 inline-flex items-center gap-2"><Icon name="files" size={16}/> 投資綜合報告 (整合視角)</div>
          <div className="text-[11px] text-amber-700 mt-1">
            ※ 上方損益表為「<b>立即處分</b>」情境下的固定售價試算，主要用於檢核建商提供的參數真假。<br/>
            ※ 下方投資綜合報告整合了「七、經營分析」的長期持有/處分策略、未來價格變動，提供完整投資指標。
          </div>
        </div>
        <T8 p={p} sP={sP}/>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 3: 現金流 (年度視圖, Chart.js 圖表, 重要時間點)
   - 銀行視角(地主): 只看年度收支與時間點, 隱藏資金破口
   - 建商視角: 同上 + 月度資金破口分析 (可展開)
════════════════════════════════════════ */
function T3({p}) {
  const dr = calcDerived(p);
  // 根據「我的身分」決定 sc 用哪個視角
  const myRole = p.myRole || "builder";
  const isMyBuilder = (myRole === "builder");
  const myOwner = (myRole.startsWith("owner_") && p.jb)
    ? p.owners.find(o => ("owner_"+o.id) === myRole)
    : null;
  const sc = useMemo(() => {
    return myOwner
      ? cS(p, dr, p.uP, p.cC, "o", myOwner.ratio)
      : cS(p, dr, p.uP, p.cC, "b", 0);
  }, [p]);
  const mcf = useMemo(() => cMCF(p, dr, sc), [p, sc]);
  const {months, minBal, maxGap, totalM} = mcf;

  // T8 整合指標 (從 calcT8Snapshot 拿 IRR、ROI、回收期、完整年度現金流)
  const snap = useMemo(() => calcT8Snapshot(p, dr), [p]);

  // 年度現金流: 來自 snap.cashflowsDetailed (含開發期 + 處分 + 租金 + 營業)
  // 與舊 cMCF 月度資料不同, 涵蓋完整投資週期 (含長期持有 20 年)
  // 視角依「我的身分」: snap 已套用 ce.myCs (建商或地主)
  // 注意: 融資撥款/還款不在 snap.cashflows 內 (僅用於開發期月度資金破口分析)
  //       T3 上方 KPI 與年度圖以「經營分析期」為基準, 不含融資週轉
  const yearly = useMemo(() => {
    const list = snap.cashflowsDetailed || [];
    // 對應到 T3 期望的欄位 (補 loanDraw, loanRepay = 0)
    return list.map(d => ({
      year: d.year,
      income: d.income,
      expense: d.expense,
      loanDraw: 0,
      loanRepay: 0,
      net: d.net,
      cum: d.cum,
      byCat: d.byCat || {}
    }));
  }, [snap]);

  // 重要時間點: 費用時程階段 + 處分時點
  const milestones = useMemo(() => {
    const list = [];
    // 費用時程階段 (建商視角才看得到開發支出時點)
    (p.expPeriods || []).forEach(ep => {
      list.push({
        date: `${ep.year}/${String(ep.month).padStart(2,"0")}`,
        absDate: ep.year * 12 + ep.month,
        label: ep.label || "費用階段",
        type: "expense",
        icon: "upload",
        note: "開發階段付款"
      });
    });
    // 處分時點
    const cb = p.compBenefit || {};
    if (cb.mode === "longHold" && cb.disposals) {
      cb.disposals.filter(d => d.enabled).forEach(d => {
        list.push({
          date: `${d.year}/${String(d.month).padStart(2,"0")}`,
          absDate: d.year * 12 + d.month,
          label: d.label || "處分",
          type: "income",
          icon: "download",
          note: `面積 ${d.area} 坪 × ${d.useSuggested ? "自動建議價" : (d.price + " 萬/坪")}`
        });
      });
    }
    // 取得日期 (single 模式)
    if (cb.mode === "single" && p.salesSched && p.salesSched.length > 0) {
      const last = [...p.salesSched].sort((a,b) => (b.year*12+b.month) - (a.year*12+a.month))[0];
      list.push({
        date: `${last.year}/${String(last.month).padStart(2,"0")}`,
        absDate: last.year * 12 + last.month,
        label: "成屋/取得",
        type: "income",
        icon: "home",
        note: "一次處分日期"
      });
    }
    return list.sort((a,b) => a.absDate - b.absDate);
  }, [p]);

  // Chart.js: 年度收支長條圖 + 累計折線
  const chartRef = React.useRef(null);
  const chartInstance = React.useRef(null);
  useEffect(() => {
    if (!chartRef.current || !window.Chart || yearly.length === 0) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const ctx = chartRef.current.getContext("2d");
    chartInstance.current = new window.Chart(ctx, {
      type: "bar",
      data: {
        labels: yearly.map(y => y.year),
        datasets: [
          {
            label: "收入",
            data: yearly.map(y => y.income),
            backgroundColor: "rgba(16, 185, 129, 0.7)",
            borderColor: "rgba(16, 185, 129, 1)",
            borderWidth: 1,
            order: 2,
          },
          {
            label: "支出",
            data: yearly.map(y => -y.expense),
            backgroundColor: "rgba(244, 63, 94, 0.7)",
            borderColor: "rgba(244, 63, 94, 1)",
            borderWidth: 1,
            order: 2,
          },
          {
            label: "累計餘額",
            type: "line",
            data: yearly.map(y => y.cum),
            borderColor: "rgba(139, 92, 246, 1)",
            backgroundColor: "rgba(139, 92, 246, 0.1)",
            borderWidth: 2,
            fill: false,
            tension: 0.2,
            pointRadius: 4,
            order: 1,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "top", labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString(undefined, {maximumFractionDigits: 0})} 萬`
            }
          }
        },
        scales: {
          x: { stacked: true, grid: { display: false } },
          y: { stacked: false, ticks: { callback: (v) => v.toLocaleString() + "萬" } }
        }
      }
    });
    return () => {
      if (chartInstance.current) chartInstance.current.destroy();
    };
  }, [yearly]);

  // 投資年期 (年數) — 來自 cashflows 完整週期
  const investYears = yearly.length;
  // 分析模式 (依使用者在投資綜合報告中的選擇)
  const analysisMode = (p.t8 && p.t8.analysisMode) || "disposal";
  const modeLabel = analysisMode === "holdComplete" ? "完整持有" : "處分損益";

  // KPI: 統一用 snap (依分析模式), 與投資綜合報告儀表板一致
  return (
    <div className="space-y-5">
      {/* 上方 KPI — 統一用 snap 系列指標 (依「分析模式」變動) */}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <KPI label="稅後淨利" value={fmt(snap.totalProfit)} unit="萬" color={snap.totalProfit<0?"text-rose-700":"text-emerald-700"} bg={snap.totalProfit<0?"bg-rose-50/80":"bg-emerald-50/80"}/>
        <KPI label="ROI" value={(snap.burdenCost+snap.ll+snap.cl)>0 ? (snap.roi*100).toFixed(1)+"%" : "—"} color="text-violet-700" bg="bg-violet-50/80"/>
        <KPI label="IRR" value={snap.irr==null?"—":(snap.irr*100).toFixed(2)+"%"} color="text-violet-700" bg="bg-violet-50/80"/>
        <KPI label="還本期" value={snap.payback==null?"—":Math.ceil(snap.payback)+" 年"} color="text-sky-700" bg="bg-sky-50/80"/>
        <KPI label="投資年期" value={investYears} unit="年" color="text-slate-800" bg="bg-slate-50/80"/>
      </div>
      <div className="text-[10px] text-slate-500 italic -mt-2">
        ※ 指標以「{modeLabel}」模式計算 (與投資綜合報告儀表板一致, 可在投資綜合報告「分析模式」下拉切換)
      </div>

      {/* 年度現金流圖 */}
      <Card title="年度現金流圖" accent="bg-violet-700" icon="trending-up">
        <div className="text-[10px] text-slate-500 italic mb-2">
          視角: <b>{myOwner ? myOwner.name : "建商"}</b>
          {myOwner && <span> (分回 {(myOwner.ratio*100).toFixed(2)}%)</span>}
          ・ 綠色長條=年度收入(處分/租金/營業)・紅色長條=年度支出(開發成本/稅費)・紫線=累計餘額
        </div>
        <div style={{height: "320px", position: "relative"}}>
          <canvas ref={chartRef}/>
        </div>
      </Card>

      {/* 年度現金流明細表 */}
      <Card title="年度現金流明細" accent="bg-slate-700" icon="clipboard">
        <div className="text-[10px] text-slate-500 italic mb-2">
          完整投資週期年度資料 (依分析模式自動含/不含營業及租金)。融資撥款還款不在此處列示, 請見下方資金破口分析 (僅建商視角)。
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-700 text-white">
                <th className="py-2 px-2 text-center">年度</th>
                <th className="py-2 px-2 text-right">開發支出</th>
                <th className="py-2 px-2 text-right">處分收入</th>
                <th className="py-2 px-2 text-right">租金</th>
                <th className="py-2 px-2 text-right">營業</th>
                <th className="py-2 px-2 text-right border-l">當年淨流量</th>
                <th className="py-2 px-2 text-right">累計餘額</th>
              </tr>
            </thead>
            <tbody>
              {yearly.map((y, i) => {
                const cat = y.byCat || {};
                const devOut = (cat.dev_cost || 0) + (cat.dev_tax || 0);  // 都是負值
                const disp = (cat.dev_sales || 0) + (cat.disposal || 0);
                const rent = cat.rent || 0;
                const biz = cat.business || 0;
                return (
                  <tr key={y.year} className="border-b border-slate-100">
                    <td className="py-1.5 px-2 text-center font-bold">{y.year}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-rose-700">{Math.abs(devOut) > 0.5 ? fmt(devOut) : "—"}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-emerald-700">{disp > 0.5 ? fmt(disp) : "—"}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-emerald-600">{rent > 0.5 ? fmt(rent) : "—"}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-emerald-600">{biz > 0.5 ? fmt(biz) : "—"}</td>
                    <td className={"py-1.5 px-2 text-right font-mono font-bold border-l "+(y.net<0?"text-rose-700":"text-emerald-700")}>{fmt(y.net)}</td>
                    <td className={"py-1.5 px-2 text-right font-mono font-bold "+(y.cum<0?"text-rose-700 bg-rose-50":"text-emerald-700")}>{fmt(y.cum)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {/* 重要時間點 */}
      <Card title="重要時間點" accent="bg-amber-700" icon="calendar">
        <div className="text-[10px] text-slate-500 italic mb-3">
          列出所有需付款的時間點與處分收入時點。
        </div>
        <div className="space-y-1.5">
          {milestones.map((m, i) => (
            <div key={i} className={"flex items-center gap-3 p-2 rounded border "+(m.type==="income"?"bg-emerald-50 border-emerald-200":"bg-rose-50 border-rose-200")}>
              <Icon name={m.icon} size={18}/>
              <span className="font-mono font-bold text-slate-700 w-20">{m.date}</span>
              <span className="flex-1 font-bold text-slate-800">{m.label}</span>
              <span className="text-[11px] text-slate-500">{m.note}</span>
            </div>
          ))}
          {milestones.length === 0 && (
            <div className="text-xs text-slate-400 italic text-center py-4">無時間點 (請至「基本假設」設定費用時程)</div>
          )}
        </div>
      </Card>

      {/* 資金破口分析 (僅建商視角顯示) */}
      {isMyBuilder && (
        <Card title="自有資金破口分析 (建商視角)" accent="bg-rose-700" icon="alarm-circle">
          <div className="text-[10px] text-slate-500 italic mb-3">
            月度資金流量分析, 用於檢視建商各月份是否有資金缺口。地主視角已自動隱藏此區塊。
          </div>
          <div className="flex flex-wrap gap-3 mb-3">
            {[
              ["期初資金",fmt(p.initCash)+"萬","text-slate-800","bg-slate-50"],
              ["最低餘額",fmt(minBal)+"萬",minBal<0?"text-rose-700":"text-emerald-700","bg-slate-50"],
              ["資金缺口",maxGap>0?fmt(maxGap)+"萬":"無缺口",maxGap>0?"text-rose-800":"text-emerald-700",maxGap>0?"bg-rose-50":"bg-emerald-50"],
              ["建議資金",fmt(Math.max(maxGap,0)+(p.initCash||3000))+"萬","text-sky-800","bg-sky-50"]
            ].map(([l,v,c,bg],i) => (
              <div key={i} className={"flex-1 min-w-[120px] "+bg+" rounded-xl p-3 border"}><div className="text-[10px] text-slate-400">{l}</div><div className={"font-black text-lg "+c}>{v}</div></div>
            ))}
          </div>
          <div className="text-xs font-bold text-slate-500 mb-1">月度累計餘額走勢</div>
          <div className="h-24 flex items-end gap-px overflow-x-auto">
            {months.map((m,i) => {
              const mx = Math.max(...months.map(x=>Math.abs(x.cm)), 1);
              return <div key={i} className={"rounded-t-sm "+(m.cm<0?"bg-rose-400":"bg-emerald-400")} style={{width:(100/totalM)+"%",minWidth:3,height:Math.max(Math.abs(m.cm)/mx*100,2)+"%"}} title={m.label+": "+fmt(m.cm)+"萬"}/>
            })}
          </div>
          <div className="flex justify-between text-[9px] text-slate-400 mt-1"><span>{months[0]?.label}</span><span>{months[totalM-1]?.label}</span></div>
        </Card>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 4: 敏感度 (動態跨度矩陣 + 雙滑桿即時對照 + 彈性指數 + 臨界點)
════════════════════════════════════════ */
function T4({p, sP}) {
  const dr = calcDerived(p);

  // 我的身分 & 對應 cS 計算函式
  const myRole = p.myRole || "builder";
  const myOwner = (myRole.startsWith("owner_") && p.jb)
    ? p.owners.find(o => ("owner_"+o.id) === myRole)
    : null;
  const csFor = (price, cost) => myOwner
    ? cS(p, dr, price, cost, "o", myOwner.ratio)
    : cS(p, dr, price, cost, "b", 0);

  // 基準
  const basePrice = Number(p.uP) || 0;
  const baseCost = Number(p.cC) || 0;
  const baseProfit = useMemo(() => csFor(basePrice, baseCost).pat, [p]);

  // 動態跨度: 預設 ±10%, 可新增/移除
  const [ranges, setRanges] = useState([10]);  // 跨度百分比陣列, 例如 [10, 20] 表示 ±10% + ±20%
  const addRange = (r) => {
    if (!ranges.includes(r)) setRanges([...ranges, r].sort((a,b) => a-b));
  };
  const removeRange = (r) => {
    if (ranges.length > 1) setRanges(ranges.filter(x => x !== r));
  };
  const [customRange, setCustomRange] = useState(15);

  // 矩陣計算 (動態跨度)
  // 步長: 跨度 / 2, 5 個點 (-X, -X/2, 0, +X/2, +X)
  const matrices = useMemo(() => {
    return ranges.map(range => {
      const steps = [-range, -range/2, 0, range/2, range];
      const priceSteps = steps.map(s => basePrice * (1 + s/100));
      const costSteps = steps.map(s => baseCost * (1 + s/100));
      const matrix = priceSteps.map(pr => costSteps.map(cc => csFor(pr, cc).pat));
      return { range, steps, priceSteps, costSteps, matrix };
    });
  }, [ranges, p]);

  // 色階閾值: 依基準淨利動態分檔
  const baseAbs = Math.max(Math.abs(baseProfit), 1);
  const colorFor = (v) => {
    const ratio = v / baseAbs;
    if (v < 0) {
      if (ratio < -0.5) return "bg-rose-700 text-white";
      if (ratio < -0.2) return "bg-rose-500 text-white";
      return "bg-rose-200 text-rose-900";
    }
    if (ratio > 1.5) return "bg-emerald-700 text-white";
    if (ratio > 1.0) return "bg-emerald-500 text-white";
    if (ratio > 0.5) return "bg-emerald-300 text-emerald-950";
    if (ratio > 0.2) return "bg-emerald-100 text-emerald-800";
    return "bg-amber-100 text-amber-900";
  };

  return (
    <div className="space-y-5">
      {/* ─── 設定列 ─── */}
      <div className="bg-gradient-to-r from-violet-50 to-violet-50 rounded-2xl border-2 border-violet-300 p-4">
        <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
          <div>
            <div className="text-sm font-bold text-violet-800 inline-flex items-center gap-1.5"><Icon name="target" size={13}/> 敏感度分析</div>
            <div className="text-[11px] text-violet-600 mt-0.5">
              基準: 售價 <b>{basePrice.toFixed(2)}</b> 萬/坪 · 造價 <b>{baseCost.toFixed(2)}</b> 萬/坪 · 基準淨利 <b className={baseProfit<0?"text-rose-700":"text-emerald-700"}>{fmt(baseProfit)}</b> 萬
            </div>
          </div>
          <div className="text-[10px] text-slate-500 italic">
            視角: <b>{myOwner ? myOwner.name : "建商"}</b>
            {myOwner && <span> (分回 {(myOwner.ratio*100).toFixed(2)}%)</span>}
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-[11px] text-slate-600 font-bold">已啟用跨度:</span>
          {ranges.map(r => (
            <span key={r} className="inline-flex items-center gap-1 bg-violet-200 text-violet-800 text-[11px] font-bold px-2 py-1 rounded-full">
              ±{r}%
              {ranges.length > 1 && (
                <button onClick={() => removeRange(r)} className="ml-1 hover:text-rose-600 inline-flex items-center"><Icon name="x" size={10}/></button>
              )}
            </span>
          ))}
          <span className="text-[10px] text-slate-400 mx-1">|</span>
          <span className="text-[11px] text-slate-600">快速新增:</span>
          {[5, 15, 20, 25, 30, 50].filter(r => !ranges.includes(r)).map(r => (
            <button key={r} onClick={() => addRange(r)}
              className="text-[11px] bg-white hover:bg-violet-100 border border-violet-300 text-violet-700 font-bold px-2 py-1 rounded-full">
              +±{r}%
            </button>
          ))}
          <span className="text-[10px] text-slate-400 mx-1">|</span>
          <span className="text-[11px] text-slate-600">自訂:</span>
          <input type="number" value={customRange} onChange={e => setCustomRange(parseFloat(e.target.value)||0)}
            min="1" max="100" step="1"
            className="field-sizing-content w-full w-14 text-[11px] border border-violet-300 rounded px-1 py-0.5 text-center"/>
          <span className="text-[10px] text-slate-500">%</span>
          <button onClick={() => addRange(customRange)}
            className="text-[11px] bg-violet-600 hover:bg-violet-700 text-white font-bold px-2 py-1 rounded-full">
            + 新增
          </button>
        </div>
      </div>

      {/* ─── 矩陣 (一個跨度一個) ─── */}
      {matrices.map(({range, steps, priceSteps, costSteps, matrix}) => (
        <div key={range} className="bg-white rounded-2xl border shadow-sm overflow-hidden">
          <div className="px-4 py-3 bg-gradient-to-r from-violet-100 to-violet-100 border-b">
            <div className="text-sm font-bold text-violet-800 inline-flex items-center gap-1.5"><Icon name="bar-chart-3" size={13}/> 跨度 ±{range}% 矩陣 (稅後淨利, 萬元)</div>
            <div className="text-[10px] text-slate-500 italic mt-0.5">
              縱軸=售價變動, 橫軸=造價變動。中央粗框為基準值。
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-slate-700 text-white">
                  <th className="py-2 px-2 text-center sticky left-0 bg-slate-700 z-10 font-bold" style={{minWidth:90}}>售價↓ \ 造價→</th>
                  {steps.map((s, i) => (
                    <th key={i} className={"py-2 px-2 text-center font-bold "+(s===0?"bg-sky-600":"")} style={{minWidth:80}}>
                      <div>{costSteps[i].toFixed(2)}</div>
                      <div className="text-[9px] opacity-70">{s>0?"+":""}{s.toFixed(1)}%</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {steps.map((sp, ri) => (
                  <tr key={ri}>
                    <td className={"py-2 px-2 text-center font-bold sticky left-0 z-10 "+(sp===0?"bg-sky-100 text-sky-800":"bg-slate-100 text-slate-600")}>
                      <div>{priceSteps[ri].toFixed(2)}</div>
                      <div className="text-[9px] opacity-70">{sp>0?"+":""}{sp.toFixed(1)}%</div>
                    </td>
                    {matrix[ri].map((v, ci) => (
                      <td key={ci} className={"py-2 px-1 text-center font-mono font-bold text-[12px] "+colorFor(v)+(steps[ci]===0&&sp===0?" ring-2 ring-sky-500 ring-inset":"")}>
                        {fmt(v)}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-4 py-2 bg-slate-50 border-t flex flex-wrap gap-2">
            <span className="text-[10px] font-bold text-slate-600">色階 (相對基準淨利):</span>
            {[
              ["bg-emerald-700","> 150%"],
              ["bg-emerald-500","100~150%"],
              ["bg-emerald-300","50~100%"],
              ["bg-emerald-100","20~50%"],
              ["bg-amber-100","0~20%"],
              ["bg-rose-200","虧損 0~20%"],
              ["bg-rose-500","虧損 20~50%"],
              ["bg-rose-700","虧損 > 50%"]
            ].map(([b,l],i) => (
              <span key={i} className="flex items-center gap-1 text-[10px] text-slate-500">
                <span className={"w-3 h-3 rounded "+b+" border border-slate-300"}/>{l}
              </span>
            ))}
          </div>
        </div>
      ))}

      {/* ─── 雙滑桿即時對照 + 彈性 + 臨界點 ─── */}
      <SliderAndElasticityBlock p={p} sP={sP} dr={dr} basePrice={basePrice} baseCost={baseCost}/>
    </div>
  );
}

// 包裝: 雙滑桿即時對照 + 彈性指數 + 臨界點 (從原 T8 內搬過來)
function SliderAndElasticityBlock({p, sP, dr, basePrice, baseCost}) {
  const snap = calcT8Snapshot(p, dr);
  // 敏感度計算用 debounce 延後 500ms (避免拖滑桿時卡頓)
  const [sensitivity, setSensitivity] = useState(() => calcT8Sensitivity(p, dr));
  useEffect(() => {
    const timer = setTimeout(() => {
      setSensitivity(calcT8Sensitivity(p, dr));
    }, 500);
    return () => clearTimeout(timer);
  }, [p]);

  const [includeLongHold, setIncludeLongHold] = useState(false);

  // 取對應臨界點
  const bp = sensitivity.breakPoints;
  const pp = includeLongHold ? bp.priceForProfit_full : bp.priceForProfit_dev;
  const cp = includeLongHold ? bp.costForProfit_full : bp.costForProfit_dev;
  const ppIRR = bp.priceForIRR;
  const cpIRR = bp.costForIRR;
  const allNull = pp == null && cp == null && ppIRR == null && cpIRR == null;

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
      {/* 雙滑桿即時對照 (橫跨 2 欄) */}
      <div className="lg:col-span-2 bg-gradient-to-br from-rose-50 to-amber-50 rounded-xl p-3 border-2 border-rose-300">
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs font-bold text-rose-700 inline-flex items-center gap-1.5"><Icon name="target" size={12}/> 即時情境試算 (拖動滑桿)</div>
          <label className="flex items-center gap-1 text-[10px] cursor-pointer bg-white/60 px-2 py-0.5 rounded border border-rose-300">
            <input type="checkbox" checked={includeLongHold} onChange={e => setIncludeLongHold(e.target.checked)} className="w-3 h-3"/>
            <span className="text-rose-700 font-bold">含長期收益</span>
          </label>
        </div>
        <div className="text-[10px] text-slate-500 italic mb-3">
          {includeLongHold ? "含租金/營業收益, 評估「整體案件」淨利" : "純開發評估: 處分收益 vs 開發成本 (推薦)"}
        </div>
        <SliderPlayground
          p={p} dr={dr}
          basePrice={sensitivity.basePrice}
          basePerPing={sensitivity.basePerPing}
          baseCost={sensitivity.baseCost}
          baseProfit={snap.totalProfit}
          baseDevOnlyProfit={snap.devOnlyProfit}
          baseIRR={snap.irr}
          includeLongHold={includeLongHold}
        />
      </div>

      {/* 彈性 + 臨界點 (右欄) */}
      <div className="space-y-3">
        {/* 彈性指數 */}
        <div className="bg-gradient-to-br from-violet-50 to-violet-50 rounded-xl p-3 border-2 border-violet-300">
          <div className="text-xs font-bold text-violet-700 mb-2 inline-flex items-center gap-1.5"><Icon name="ruler" size={12}/> 彈性指數</div>
          <div className="text-[10px] text-slate-500 italic mb-2">
            彈性 = 「目標%變化」÷「售價/造價%變化」
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="border-b border-violet-200">
                <th className="text-left py-1 text-violet-600">變數</th>
                <th className="text-right py-1 text-violet-600">對 IRR</th>
                <th className="text-right py-1 text-violet-600">對淨利</th>
              </tr>
            </thead>
            <tbody>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-700">售價</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.priceIRR == null ? "—" : sensitivity.elasticity.priceIRR.toFixed(2)}</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.priceProfit == null ? "—" : sensitivity.elasticity.priceProfit.toFixed(2)}</td>
              </tr>
              <tr>
                <td className="py-1 text-slate-700">造價</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.costIRR == null ? "—" : sensitivity.elasticity.costIRR.toFixed(2)}</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.costProfit == null ? "—" : sensitivity.elasticity.costProfit.toFixed(2)}</td>
              </tr>
            </tbody>
          </table>
          <div className="mt-2 text-[10px] text-violet-700 bg-white/60 rounded p-2 leading-relaxed">
            絕對值 &gt; 1 = 高敏感 ✦ &lt; 1 = 低敏感
          </div>
        </div>

        {/* 臨界點 */}
        <div className="bg-white rounded-xl p-3 border-2 border-rose-300">
          <div className="text-xs font-bold text-rose-700 mb-2 inline-flex items-center gap-1"><Icon name="alert-triangle" size={12}/> 臨界點分析</div>
          <table className="w-full text-[11px]">
            <tbody>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-600">售價跌至→淨利=0</td>
                <td className="text-right font-mono font-bold text-rose-700">
                  {pp == null ? "—" : (pp>0?"+":"")+pp.toFixed(1)+"%"}
                </td>
              </tr>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-600">造價漲至→淨利=0</td>
                <td className="text-right font-mono font-bold text-rose-700">
                  {cp == null ? "—" : (cp>0?"+":"")+cp.toFixed(1)+"%"}
                </td>
              </tr>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-600">售價跌至→IRR=0</td>
                <td className="text-right font-mono font-bold text-amber-700">
                  {ppIRR == null ? "—" : (ppIRR>0?"+":"")+ppIRR.toFixed(1)+"%"}

              </tr>
              <tr>
                <td className="py-1 text-slate-600">造價漲至→IRR=0</td>
                <td className="text-right font-mono font-bold text-amber-700">
                  {cpIRR == null ? "—" : (cpIRR>0?"+":"")+cpIRR.toFixed(1)+"%"}
                </td>
              </tr>
            </tbody>
          </table>
          {allNull && (
            <div className="mt-2 text-[10px] text-emerald-700 bg-emerald-50 rounded p-2 leading-relaxed border border-emerald-200">
              ℹ 案件結構穩健: ±50% 範圍內找不到臨界點
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 5: 戶別明細
════════════════════════════════════════ */
function T5({p, sP}) {
  const [prs, sPrs] = useState([50, 52, 55, 57, 60]);
  const UNITS = p.unitList || [];
  // 依 s 欄位分組 (支援任意基地代碼)
  const groups = UNITS.reduce((acc, u) => {
    const k = u.s || "其他";
    (acc[k] = acc[k] || []).push(u);
    return acc;
  }, {});
  const groupKeys = Object.keys(groups).sort();

  const updU = (id, k, v) => sP({...p, unitList: UNITS.map(u => u.id===id ? {...u, [k]:v} : u)});
  const addU = () => {
    const nextG = groupKeys[0] || "A";
    const existInG = groups[nextG] || [];
    const idx = existInG.length + 1;
    const newId = nextG + idx;
    sP({...p, unitList: [...UNITS, {id:newId, s:nextG, m:0, p:0, g:0}]});
  };
  const delU = (id) => sP({...p, unitList: UNITS.filter(u => u.id !== id)});

  const Row = ({u}) => (
    <tr className="border-b border-slate-100 hover:bg-slate-50/80">
      <td className="py-[6px] px-2">
        <input type="text" value={u.id} onChange={e=>updU(u.id,"id",e.target.value)} className="font-bold text-[13px] w-14 bg-transparent border-b border-slate-200 focus:outline-none focus:border-sky-400"/>
      </td>
      <td className="py-[6px] px-2">
        <input type="text" value={u.s} onChange={e=>updU(u.id,"s",e.target.value)} className="text-[12px] w-10 text-center bg-transparent border-b border-slate-200 focus:outline-none focus:border-sky-400"/>
      </td>
      <td className="py-[6px] px-2 text-right"><NI value={u.m} onChange={v=>updU(u.id,"m",v)} step={0.1} className="w-20 text-right text-xs"/></td>
      <td className="py-[6px] px-2 text-right"><NI value={u.p} onChange={v=>updU(u.id,"p",v)} step={0.01} className="w-20 text-right text-xs"/></td>
      <td className="py-[6px] px-2 text-right"><NI value={u.g} onChange={v=>updU(u.id,"g",v)} step={0.1} className="w-20 text-right text-xs"/></td>
      {prs.map((pr,pi) => {const t=u.p*pr;return <td key={pi} className={"py-[6px] px-2 text-right font-mono font-semibold text-[13px] "+(t>6000?"bg-rose-100 text-rose-700":"")}>{fmt(t)}</td>})}
      <td className="py-[6px] px-2 text-center"><BtnDel onClick={()=>delU(u.id)}/></td>
    </tr>
  );
  const Sub = ({l, us, bg}) => {const tp=us.reduce((a,u)=>a+u.p,0),tm=us.reduce((a,u)=>a+u.m,0);return <tr className={bg+" font-bold border-b-2"}><td className="py-2 px-2" colSpan={2}>{l}</td><td className="py-2 px-2 text-right font-mono text-xs">{tm.toFixed(1)}</td><td className="py-2 px-2 text-right font-mono">{tp.toFixed(2)}</td><td/>{prs.map((pr,pi)=><td key={pi} className="py-2 px-2 text-right font-mono">{fmt(tp*pr)}</td>)}<td/></tr>};

  return (
    <div className="space-y-4">
      <div className="flex flex-wrap items-center gap-2 bg-white p-3 rounded-2xl border shadow-sm">
        <span className="text-sm font-bold text-slate-700 mr-1">單價：</span>
        {prs.map((pr,i)=><NI key={i} value={pr} onChange={v=>{const np=[...prs];np[i]=v;sPrs(np)}} className="w-16 text-center"/>)}
        <span className="text-xs text-slate-400">萬/坪</span>
        <div className="flex-1"/>
        <Btn onClick={addU} color="bg-emerald-600 hover:bg-emerald-700">+ 新增戶別</Btn>
      </div>
      {UNITS.length === 0
        ? <div className="rounded-2xl border shadow-sm bg-white p-8 text-center">
            <Icon name="home" size={48} className="mb-2 text-slate-300 mx-auto"/>
            <div className="text-slate-500 text-sm mb-3">尚未建立戶別資料</div>
            <Btn onClick={addU} color="bg-emerald-600 hover:bg-emerald-700">+ 新增第一筆戶別</Btn>
          </div>
        : <div className="rounded-2xl border shadow-sm bg-white overflow-hidden"><div className="overflow-x-auto">
            <table className="w-full text-sm" style={{minWidth:900}}>
              <thead><tr className="bg-slate-700 text-white"><th className="py-2 px-2 text-left text-xs">戶別</th><th className="py-2 px-2 text-center text-xs">基地</th><th className="py-2 px-2 text-right text-xs">m²</th><th className="py-2 px-2 text-right text-xs">坪</th><th className="py-2 px-2 text-right text-xs">綠地</th>{prs.map((pr,i)=><th key={i} className="py-2 px-2 text-right text-xs">@{pr}萬</th>)}<th className="py-2 px-2 text-center text-xs">×</th></tr></thead>
              <tbody>
                {groupKeys.map(gk => (
                  <React.Fragment key={gk}>
                    <tr className="bg-emerald-100/60"><td colSpan={5+prs.length+1} className="py-1.5 px-2 font-bold text-emerald-800 text-xs">{gk}基地 ({groups[gk].length}戶)</td></tr>
                    {groups[gk].map(u=><Row key={u.id} u={u}/>)}
                    <Sub l={gk+"小計"} us={groups[gk]} bg="bg-sky-50"/>
                  </React.Fragment>
                ))}
                <Sub l="✦全案" us={UNITS} bg="bg-amber-100/80"/>
              </tbody>
            </table>
          </div></div>
      }
    </div>
  );
}

        "IRR = 0"],

    s1Rows.push(

  }

  const ws1 = XLSX.utils.aoa_to_sheet(s1Rows);
  ws1["!cols"] = [{wch:30},{wch:18},{wch:18},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, "基本假設");

  /* ── Sheet 1.5: 建築規劃 (面積精算) ── */
  const ar = dr.areaResult;
  const ac = p.areaCalc || {};
  const aRows = [
    ["建築規劃精算 — " + name],
    ["精算是否啟用 (覆蓋總銷面積)", ac.enable ? "是" : "否"],
    ["總銷面積來源", dr.areaSrc],
    [],
    ["① 基地面積"],
    ["土地名稱", "面積(坪)", "建蔽率(%)", "容積率(%)"],
    ...p.lands.map(l => [l.name, l.area, l.bcr || 0, l.far || 0]),
    ["合計", ar.site_total, "平均建蔽率 " + (ar.avg_bcr*100).toFixed(2) + "%", "平均容積率 " + (ar.avg_far*100).toFixed(2) + "%"],

    ["② 允建建築面積 (建蔽率)"],
    ["標準計算合計", ar.bcr_total_std, "坪"],
    ...(ac.useOrigCap ? [
      ["原始容積面積", ac.origCapArea || 0, "坪"],
      ["原始容積倍數", ac.origCapMult],
      ["原始容積結果", ar.origResult, "坪 (採用此值取代標準計算)"],
    ] : []),
    ["最終採用 (bcr_total)", ar.bcr_total, "坪"],
    [],
    ["③ 基準容積面積 FA"],
    ...ar.farRows.map(r => [r.name, r.area + " × " + (r.far/100).toFixed(2) + " (" + r.far + "%)", r.result, "坪"]),
    ["FA 合計", "", ar.fa_total, "坪"],
    [],
    ["④ 容積獎勵明細"],
    ["項目名稱", "比例 %", "面積(坪)", "計入162條"],
    ...ar.bonusRows.map(b => [b.name, b.pct + "%", b.result, b.isTOD ? "✓" : ""]),
    ["獎勵合計", ar.bonus_pct + "%", ar.bonus_total, ""],
    ["其中計入162條合計", "", ar.tod_total, ""],
    [],
    ["⑤ 允建容積合計 Σ FA", "= FA + 獎勵", ar.sigma_fa, "坪"],
    ["⑥ 機電空間 (15%)", "= (FA + TOD獎勵) × 15%", ar.mech, "坪"],
    ["⑦ 地上梯廳", "= (ΣFA + 機電) ÷ 0.93 × 0.07", ar.elevator, "坪"],
    ["⑧ 陽台面積 (8%)", "= 地面層以上 × 8%", ar.balcony, "坪"],
    ["  每層陽台", "÷ " + (ac.aboveFloors || 1) + " 層", ar.balcony_per_floor, "坪/層"],
    ...(ac.enableKaohsiungHouse ? [
      ["⑨A 高雄厝景觀陽台", "地上層×12.5% − " + (ac.noViewBalcony||0), ar.kh_a, "坪"],

      ["⑨ 高雄厝合計", "A + B", ar.kh_total, "坪"],
    ] : []),
    ["⑩ 屋頂突出物", "= 允建建築 × 15% × 3", ar.rooftop, "坪"],
    [],
    ["Σ 地上層面積合計", "", ar.above_total, "坪"],
    [],
    ["⑪ 地下室開挖", "= 基地 × " + ar.drill_ratio.toFixed(4) + " × " + (ac.basementFloors||0) + "層", ar.basement, "坪"],
    ["⑫ 總樓地板面積", "= 地上 + 地下", ar.total_floor, "坪"],
    [],
    ["⑬ 車位面積", "= " + (p.parking||0) + " 輛 × " + (ac.parkingPerUnitArea||8.5) + " 坪", ar.parking_area, "坪"],
    ["⑭ 地下可銷售坪數", "= 地下室 − 車位", ar.bsmt_sale, "坪"],
    ["⑮ 總銷面積 (不含車位)", "= 地上層 + 地下可銷", ar.total_sale, "坪"],
    [],
    ["📊 公設比預估"],
    ["公設1 — 基本", "(機電+梯廳+屋頂) + 地下可銷 ÷ 總銷 = " + fmt(ar.pub1_tot) + " ÷ " + fmt(ar.total_sale), (ar.ratio1*100).toFixed(2) + "%"],

    [],
    ["🏠 戶數反算"],
    ["平均每戶坪數", ac.unitArea || 50, "坪/戶"],

    [],
    ["🅿️ 法定停車計算"],
    ["A. 法定汽車位", "(允建+機電+梯廳 − 500) ÷ 150", ar.pa_ceil, "輛"],
    ["B. 無障礙汽車位", "法車 ÷ 50", ar.pb_ceil, "輛 (併入法車)"],
    ["C. 法定機車位 (取較小)", "min(允建+機電+梯廳÷100, 戶數×1.2)", ar.pc_final, "輛"],
  ];
  const wsA = XLSX.utils.aoa_to_sheet(aRows);
  wsA["!cols"] = [{wch:28},{wch:34},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb, wsA, "建築規劃");

  /* ── Sheet 2: 損益分析 ── */
  const sorted = [...p.scenarios].sort((a,b) => a.price-b.price || a.cost-b.cost);
  const cols = [];
  sorted.forEach(sc => {
    cols.push({sc, role:"b", label:"建商", ratio:dr.builderRatio, data:cS(p,dr,sc.price,sc.cost,"b",0)});

  });
  const headerLine = ["項目", ...cols.map(c => c.sc.label + " " + c.label + " (售" + c.sc.price + "/造" + c.sc.cost + ")")];
  const ratioLine  = ["分回比例 %", ...cols.map(c => (c.ratio*100).toFixed(1) + "%")];

  const rowsP = [
    ["損益分析 — " + name],
    [],
    headerLine,
    ratioLine,
    ["分回面積 (坪)", ...cols.map(c => c.data.shareArea || 0)],
    [],
    ["【收入】"],
    ["分回金額 (萬)", ...cols.map(c => c.data.sh)],
    [],
    ["【成本/費用】(萬)"],
    ["開發設計", ...cols.map(c => c.data.cs.de)],
    ["建築工程", ...cols.map(c => c.data.cs.co)],
    ["廣告銷售", ...cols.map(c => c.data.cs.ad)],
    ["土增稅",  ...cols.map(c => c.data.cs.lt)],
    ["稅雜費",  ...cols.map(c => c.data.cs.tx)],
    ["契稅",    ...cols.map(c => c.data.cs.dd)],
    ["物管",    ...cols.map(c => c.data.cs.mg)],
    ["管銷",    ...cols.map(c => c.data.cs.am)],

    ["成本合計",...cols.map(c => c.data.tc)],
    [],
    ["【損益】(萬)"],
    ["稅前利潤",   ...cols.map(c => c.data.pbt)],
    ["房地合一稅", ...cols.map(c => c.data.itx)],

    ["淨利率",     ...cols.map(c => (c.data.nm*100).toFixed(2) + "%")],
    ["成本報酬率", ...cols.map(c => (c.data.cr*100).toFixed(2) + "%")],
    [],
    ["【融資】(萬)"],
    ["土融",         ...cols.map(c => c.data.ll)],
    ["建融",         ...cols.map(c => c.data.cl)],
    ["融資合計",     ...cols.map(c => c.data.tl)],
    ["自有資金",     ...cols.map(c => c.data.eq)],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(rowsP);
  ws2["!cols"] = [{wch:20}, ...cols.map(()=>({wch:18}))];
  XLSX.utils.book_append_sheet(wb, ws2, "損益分析");

  /* ── Sheet 3: 現金流 ── */
  const sc = cS(p, dr, p.uP, p.cC, "b", 0);
  const mcf = cMCF(p, dr, sc);
  const monthRows = [
    ["現金流分析 — " + name + " (建商視角)"],
    [],
    ["售價 (萬/坪)", p.uP, "造價 (萬/坪)", p.cC],

    [],
    ["月份", "階段", "期初", "收入", "支出", "融資撥款", "融資償還", "利息", "當月淨流", "累計餘額"],
    ...mcf.months.map(m => [
      m.label, m.phase, m.init, m.income, m.expense, m.loanDraw, m.loanRepay,
      m.interest, m.net, m.cm
    ]),
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(monthRows);
  ws3["!cols"] = [{wch:10},{wch:14},{wch:11},{wch:11},{wch:11},{wch:11},{wch:11},{wch:10},{wch:11},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws3, "現金流");

  /* ── Sheet 4: 敏感度 ── */
  const prs4 = [];
  for (let i = 50; i <= 65; i++) prs4.push(i);
  const cos4 = [22, 24, 25, 26, 27, 28, 30];
  const senRows = [
    ["敏感度分析 — " + name],
    ["建商稅後淨利矩陣 (萬元)"],
    [],
    ["售價↓ / 造價→", ...cos4.map(c => c + "萬")],
    ...prs4.map(pr => [
      pr + "萬",
      ...cos4.map(cc => Math.round(cS(p, dr, pr, cc, "b", 0).pat))

  const ws4 = XLSX.utils.aoa_to_sheet(senRows);
  ws4["!cols"] = [{wch:15}, ...cos4.map(()=>({wch:11}))];
  XLSX.utils.book_append_sheet(wb, ws4, "敏感度");

  /* ── Sheet 5: 戶別明細 ── */
  const UL = p.unitList || [];
  const groupsU = UL.reduce((acc, u) => {
    const k = u.s || "其他";
    (acc[k] = acc[k] || []).push(u);
    return acc;
  }, {});
  const grpKeys = Object.keys(groupsU).sort();
  const exPrices = [50, 52, 55, 57, 60];
  const unitHeader = ["戶別", "基地", "m²", "坪", "綠地", ...exPrices.map(pr => "@" + pr + "萬 (總價)")];
  const unitRows = [
    ["戶別明細 — " + name],
    [],
    unitHeader,
  ];
  grpKeys.forEach(gk => {
    unitRows.push([gk + "基地 (" + groupsU[gk].length + "戶)"]);
    groupsU[gk].forEach(u => {
      unitRows.push([u.id, u.s, u.m, u.p, u.g, ...exPrices.map(pr => Math.round(u.p * pr))]);
    });
    const tp = groupsU[gk].reduce((a,u)=>a+u.p,0);
    const tm = groupsU[gk].reduce((a,u)=>a+u.m,0);
    unitRows.push([gk + "小計", "", +tm.toFixed(1), +tp.toFixed(2), "", ...exPrices.map(pr => Math.round(tp * pr))]);
    unitRows.push([]);
  });
  if (UL.length > 0) {
    const tp = UL.reduce((a,u)=>a+u.p,0);
    const tm = UL.reduce((a,u)=>a+u.m,0);
    unitRows.push(["全案合計", "", +tm.toFixed(1), +tp.toFixed(2), "", ...exPrices.map(pr => Math.round(tp * pr))]);
  } else {
    unitRows.push(["(本專案尚未建立戶別資料)"]);
  }
  const ws5 = XLSX.utils.aoa_to_sheet(unitRows);
  ws5["!cols"] = [{wch:14},{wch:8},{wch:10},{wch:10},{wch:10}, ...exPrices.map(()=>({wch:13}))];
  XLSX.utils.book_append_sheet(wb, ws5, "戶別明細");

  /* ── 觸發下載 ── */
  const datePart = new Date().toISOString().slice(0,10);
  const safeName = name.replace(/[\\/:"*?<>|]/g, "_");
  XLSX.writeFile(wb, safeName + "_" + datePart + ".xlsx");
}

              <div style="background:#fff;padding:24px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.2);min-width:420px;max-width:90vw;display:flex;flex-direction:column;gap:16px;">
                <div style="font-size:15px;font-weight:700;color:#111;">新增專案</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                  <button id="np-blank" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 16px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:all 0.15s;font-family:inherit;" onmouseover="this.style.background='#f0f9ff';this.style.borderColor='#0284c7';" onmouseout="this.style.background='#f8fafc';this.style.borderColor='#e2e8f0';">
                    <div style="font-size:32px;line-height:1;">✨</div>
                    <div style="font-size:13px;font-weight:700;color:#0f172a;">從空白開始</div>
                    <div style="font-size:11px;color:#64748b;text-align:center;line-height:1.4;">建立一份全新的空白專案</div>
                  </button>
                  <label id="np-import" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 16px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.background='#f0f9ff';this.style.borderColor='#0284c7';" onmouseout="this.style.background='#f8fafc';this.style.borderColor='#e2e8f0';">
                    <div style="font-size:32px;line-height:1;">📥</div>
                    <div style="font-size:13px;font-weight:700;color:#0f172a;">從 JSON 匯入</div>
                    <div style="font-size:11px;color:#64748b;text-align:center;line-height:1.4;">讀取備份檔還原專案</div>
                    <input id="np-file" type="file" accept=".json" style="display:none;"/>
                  </label>
                </div>
                <div style="display:flex;justify-content:flex-end;">
                  <button id="np-cancel" style="padding:6px 14px;border:1px solid #cbd5e1;background:#fff;color:#475569;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">取消</button>
                </div>
              </div>`;
            document.body.appendChild(overlay);
            const cleanup = () => overlay.remove();
            const blankBtn = overlay.querySelector("#np-blank");
            blankBtn.onclick = () => { cleanup(); onNew(); };
            overlay.querySelector("#np-cancel").onclick = cleanup;
            overlay.querySelector("#np-file").onchange = (e) => { cleanup(); onImport(e); };
            overlay.onclick = (e) => { if (e.target === overlay) cleanup(); };
            blankBtn.focus();
          }} title="新增專案" className="text-[11px] text-sky-600 hover:text-sky-800 hover:bg-sky-50 rounded px-1.5 py-0.5 font-bold">＋ 新增</button>
        </div>
        {listExpanded && projects.length > 0 && (
          <>
            <div className="max-h-64 overflow-y-auto space-y-1 pr-1">
              {sorted.map(pr => {
                const d = pr.updatedAt ? new Date(pr.updatedAt) : null;
                const ds = d ? `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : "";
                const active = currentId === pr.id;
                if (editingId === pr.id) {
                  return (
                    <div key={pr.id} className="flex items-center gap-1 p-1.5 rounded-lg border-2 border-amber-400 bg-amber-50">
                      <input
                        type="text" value={editName}
                        onChange={e=>sEN(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")commitRename(); if(e.key==="Escape")sEI(null)}}
                        className="flex-1 px-1 py-0.5 text-[11px] border rounded bg-white"
                        autoFocus/>
                      <button onClick={commitRename} className="text-emerald-600 leading-none inline-flex items-center" title="確認"><Icon name="check" size={14}/></button>
                      <button onClick={()=>sEI(null)} className="text-rose-500 leading-none inline-flex items-center" title="取消"><Icon name="x" size={14}/></button>
                    </div>
                  );
                }
                return (
                  <div key={pr.id} className={"flex items-center gap-1 p-1.5 rounded-lg border transition-colors "+(active?"border-sky-400 bg-sky-100":"border-slate-200 bg-slate-50/60 hover:bg-slate-100")}>
                    <button onClick={()=>onLoad(pr.id)} className={"flex-1 text-left text-[11px] truncate "+(active?"font-bold text-sky-800":"font-semibold text-slate-700")} title={pr.name}>
                      {active && "▸ "}{pr.name}
                      {ds && <div className="text-[8px] text-slate-400 font-normal">{ds}</div>}
                    </button>
                    <button onClick={()=>onExportExcel(pr)} className="text-slate-400 hover:text-amber-600 px-1 inline-flex items-center" title="匯出此專案 Excel"><Icon name="bar-chart-3" size={12}/></button>
                    <button onClick={()=>startRename(pr)} className="text-slate-400 hover:text-sky-500 px-1" title="重新命名"><Icon name="pencil" size={12}/></button>
                    <button onClick={()=>onDelete(pr.id, pr.name)} className="text-slate-400 hover:text-rose-500 text-lg leading-none px-1" title="刪除">×</button>
                  </div>
                );
              })}
            </div>
          </>
        )}
    </div>
  );
}

const TABS = [
  {k:"a", l:"基本假設", i:"settings",        d:"參數設定"},
  {k:"b", l:"建築規劃", i:"landmark",        d:"面積精算"},
