                            <option value="builder">建商</option>
                            {(p.owners || []).map(o => (
                              <option key={o.id} value={o.id}>{o.name}</option>
                            ))}
                            <option value="__new__">➕ 新增所有權人</option>
                          </select>
                          {h.ownerId !== "builder" && (
                            <button onClick={renameOwner} title="改名"
                              className="px-1 text-slate-400 hover:text-violet-600"><Icon name="pencil" size={11}/></button>
                          )}
                        </div>
                      </td>
                      <td className="px-1 py-1">
                        <select value={h.sec} onChange={e => {
                          const sel = e.target.value;
                          // 連動更新 num: 取該 sec 的第一筆 land.num (若不在則清空)
                          const matchedLands = p.lands.filter(l => l.sec === sel);
                          const newNum = matchedLands[0]?.num || "";
                          sP({...p, ownerHoldings: p.ownerHoldings.map(x => x.id === h.id ? {...x, sec: sel, num: newNum} : x)});
                        }} className="w-16 px-1 py-0.5 border rounded bg-white text-[11px]">
                          {Array.from(new Set(p.lands.map(l => l.sec))).map(s => <option key={s} value={s}>{s || "(空)"}</option>)}
                        </select>
                      </td>
                      <td className="px-1 py-1">
                        <select value={h.num} onChange={e => updHolding("num", e.target.value)}
                          className="w-16 px-1 py-0.5 border rounded bg-white text-[11px]">
                          {p.lands.filter(l => l.sec === h.sec).map(l => <option key={l.id} value={l.num}>{l.num || "(空)"}</option>)}
                        </select>
                      </td>
                      <td className="px-1 py-1 text-right">
                        <NI value={(h.share || 0) * 100}
                          onChange={v => updHolding("share", v / 100)}
                          step={0.1} className="w-20" />
                      </td>
                      <td className="px-1 py-1 text-right font-mono text-slate-700">{fmt(shareM2, 2)}</td>
                      <td className="px-1 py-1 text-right font-mono text-slate-700">{fmt(sharePing, 2)}</td>
                      <td className="px-1 py-1 text-right font-mono font-bold text-violet-700">{fmt(shareValue, 1)}</td>
                      <td className="px-1 py-1 text-right font-mono font-bold text-emerald-700">{fmt(farWeighted, 1)}</td>
                      <td className="px-1 py-1 text-right">
                        <NI value={h.lvtOrigVal || 0}
                          onChange={v => sP({...p, ownerHoldings: p.ownerHoldings.map(x => x.id===h.id ? {...x, lvtOrigVal: v} : x)})}
                          step={100} className="w-20 text-[10px]"/>
                      </td>
                      <td className="px-1 py-1 text-center">
                        <button onClick={() => sP({...p, ownerHoldings: p.ownerHoldings.filter(x => x.id !== h.id)})}
                          className="px-1.5 py-0.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded inline-flex items-center">
                          <Icon name="x" size={12}/>
                        </button>
                      </td>
                    </tr>
                  );
                })}
                {/* 同地號持分加總驗證 */}
                {(() => {
                  // 依地號分組計算持分加總, 顯示警告
                  const groupByLand = {};
                  (p.ownerHoldings || []).forEach(h => {
                    const key = (h.sec || "") + "|" + (h.num || "");
                    groupByLand[key] = (groupByLand[key] || 0) + (Number(h.share) || 0);
                  });
                  const warnings = Object.entries(groupByLand).filter(([, sum]) => Math.abs(sum - 1) > 0.005);
                  if (warnings.length === 0) return null;
                  return (
                    <tr className="bg-rose-50 border-t-2 border-rose-300">
                      <td colSpan={10} className="px-2 py-1.5 text-[10px] text-rose-700">
                        <span className="inline-flex items-center gap-1"><Icon name="alert-triangle" size={11}/> 同一地號的持分加總應為 100%:</span>
                        {warnings.map(([k, sum]) => {
                          const [sec, num] = k.split("|");
                          return <span key={k} className="ml-2"><b>{sec}/{num}</b> = {(sum*100).toFixed(1)}%</span>;
                        })}
                      </td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
          {/* 新增持分 + 上傳 CSV */}
          <div className="flex gap-2 mt-2">
            <Btn onClick={() => {
              const firstLand = p.lands[0];
              if (!firstLand) { alert("請先在表 1 新增土地"); return; }
              sP({...p, ownerHoldings: [...(p.ownerHoldings || []), {
                id: Date.now() + Math.random(),
                sec: firstLand.sec || "",
                num: firstLand.num || "",
                ownerId: "builder",
                share: 0
              }]});
            }} className="flex-1">+ 新增持分</Btn>
            <label className="flex-1 cursor-pointer">
              <input type="file" accept=".csv" className="hidden" onChange={async (e) => {
                const f = e.target.files[0];
                if (!f) return;
                if (!f.name.endsWith(".csv")) { alert("請選 CSV 檔"); return; }
                try {
                  const text = await readCsvText(f);
                  const rows = parseCSV(text);
                  if (rows.length === 0) { alert("CSV 無資料列"); return; }
                  const newHoldings = [];
                  const errors = [];
                  let updatedOwners = [...p.owners];
                  const findOrCreateOwner = (name) => {
                    if (!name || name === "建商") return "builder";
                    let owner = updatedOwners.find(o => o.name === name);
                    if (!owner) {
                      owner = {id: Date.now() + Math.random(), name, ratio: 0, invest: false,
                        feeEnabled: {ad:true,tx:true,mg:true},
                        costBearing: {de:0,co:0,ad:0,tx:0,mg:0,am:0,it:0},
                        financing: {enabled:false, amount:0, rate:3.0, durationMonths:84}};
                      updatedOwners.push(owner);
                    }
                    return owner.id;
                  };
                  for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const sec = row["地段"] || "";
                    const num = row["地號"] || "";
                    const ownerName = row["所有權人"] || row["所有權人名"] || "";
                    let shareRaw = (row["持分"] || "").toString().trim();
                    if (!sec || !num) { errors.push(`第 ${i+2} 列: 地段或地號為空, 略過`); continue; }
                    const land = p.lands.find(l => l.sec === sec && l.num === num);
                    if (!land) { errors.push(`第 ${i+2} 列 (${sec}/${num}): 表 1 找不到對應地號`); }
                    let share;
                    if (shareRaw.endsWith("%")) share = parseFloat(shareRaw) / 100;
                    else share = parseFloat(shareRaw);
                    if (isNaN(share) || share <= 0) { errors.push(`第 ${i+2} 列: 持分格式錯誤 (${shareRaw})`); continue; }
                    const ownerId = findOrCreateOwner(ownerName);
                    newHoldings.push({id: Date.now() + Math.random() + i, sec, num, ownerId, share});
                  }
                  if (newHoldings.length === 0) { alert("沒有有效的持分資料\n" + errors.join("\n")); e.target.value=""; return; }
                  const mode = await pickImportMode({title:"上傳持分清冊 CSV", summary:`解析到 ${newHoldings.length} 筆持分`, errors});
                  if (!mode) { e.target.value=""; return; }
                  const finalHoldings = mode === "replace" ? newHoldings : [...(p.ownerHoldings||[]), ...newHoldings];
                  const hasLandlord = finalHoldings.some(x => x.ownerId !== "builder" && (x.share||0) > 0);
                  sP({...p,
                    jb: p.jb || hasLandlord,
                    owners: updatedOwners,
                    ownerHoldings: finalHoldings
                  });
                  alert(`✓ 已${mode === "replace" ? "取代" : "附加"} ${newHoldings.length} 筆持分${updatedOwners.length > p.owners.length ? `\n(新增 ${updatedOwners.length - p.owners.length} 位所有權人)` : ""}`);
                } catch (err) {
                  alert("CSV 解析失敗: " + err.message);
                }
                e.target.value = "";
              }}/>
              <div className="px-3 py-1.5 bg-white border-2 border-sky-300 text-sky-700 hover:bg-sky-50 text-xs font-bold rounded-lg shadow-sm transition-colors flex items-center justify-center gap-1.5">
                <Icon name="upload" size={14}/> 新增持分(多筆)
              </div>
            </label>
          </div>

          {/* 持分均分 / 正規化工具 (依地號) */}
          {(() => {
            // 取得所有出現在 holdings 的地號
            const landKeys = Array.from(new Set((p.ownerHoldings||[]).map(h => (h.sec||"")+"|"+(h.num||""))));
            if (landKeys.length === 0) return null;
            // 均分: 該地號所有持分列平均 (最後一位補足差額確保剛好 1)
            const equalize = (key) => {
              const [sec, num] = key.split("|");
              const idxs = p.ownerHoldings.map((h,i)=>((h.sec||"")+"|"+(h.num||""))===key ? i : -1).filter(i=>i>=0);
              if (idxs.length === 0) return;
              const base = Math.floor(1/idxs.length * 1e6) / 1e6;  // 高精度均分
              const newHoldings = p.ownerHoldings.map((h,i) => {
                if (!idxs.includes(i)) return h;
                const pos = idxs.indexOf(i);
                // 最後一位補足差額
                const share = pos === idxs.length-1 ? +(1 - base*(idxs.length-1)).toFixed(6) : base;
                return {...h, share};
              });
              sP({...p, ownerHoldings: newHoldings});
            };
            // 正規化: 該地號持分等比例縮放到剛好 1
            const normalize = (key) => {
              const idxs = p.ownerHoldings.map((h,i)=>((h.sec||"")+"|"+(h.num||""))===key ? i : -1).filter(i=>i>=0);
              const sum = idxs.reduce((s,i)=>s+(Number(p.ownerHoldings[i].share)||0),0);
              if (sum <= 0) { alert("持分總和為 0, 無法正規化"); return; }
              const newHoldings = p.ownerHoldings.map((h,i) => {
                if (!idxs.includes(i)) return h;
                const pos = idxs.indexOf(i);
                // 最後一位補足差額確保剛好 1
                if (pos === idxs.length-1) {
                  const others = idxs.slice(0,-1).reduce((s,j)=>s+ +((Number(p.ownerHoldings[j].share)||0)/sum).toFixed(6),0);
                  return {...h, share: +(1-others).toFixed(6)};
                }
                return {...h, share: +((Number(h.share)||0)/sum).toFixed(6)};
              });
              sP({...p, ownerHoldings: newHoldings});
            };
            return (
              <div className="mt-2 flex flex-wrap items-center gap-1.5 text-[10px]">
                <span className="text-slate-500">持分工具:</span>
                {landKeys.map(key => {
                  const [sec, num] = key.split("|");
                  const sum = (p.ownerHoldings||[]).filter(h=>((h.sec||"")+"|"+(h.num||""))===key).reduce((s,h)=>s+(Number(h.share)||0),0);
                  const closed = Math.abs(sum-1) <= 0.005;
                  return (
                    <div key={key} className={"inline-flex items-center gap-1 rounded-lg px-1.5 py-1 border " + (closed ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200")}>
                      <span className="font-bold text-slate-600">{sec}/{num}</span>
                      <span className={closed ? "text-emerald-600" : "text-rose-600 font-bold"}>{(sum*100).toFixed(1)}%</span>
                      <button onClick={()=>equalize(key)} title="均分 (平均分配, 自動補足 100%)"
                        className="px-1 bg-sky-600 hover:bg-sky-700 text-white rounded inline-flex items-center gap-0.5"><Icon name="scale" size={10}/>均分</button>
                      <button onClick={()=>normalize(key)} title="正規化 (等比例縮放到 100%)"
                        className="px-1 bg-violet-500 hover:bg-violet-600 text-white rounded">正規化</button>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* 各所有權人分配概況 + 容積加權佔比 */}
          {(() => {
            // 統計每位所有權人: 持分面積 / 公告值 / 容積加權值
            // ownerKey: builder 或 owner_<id> (供匯入用)
            const summary = {};  // {ownerKey: {name, isBuilder, ownerId, m2, value, farW}}
            (p.ownerHoldings || []).forEach(h => {
              const land = p.lands.find(l => l.sec === h.sec && l.num === h.num);
              if (!land) return;
              const key = h.ownerId;
              let name, isBuilder = false, ownerId = null;
              if (h.ownerId === "builder") {
                name = "建商"; isBuilder = true;
              } else {
                const owner = (p.owners || []).find(o => o.id === h.ownerId);
                name = owner ? owner.name : "(未知)";
                ownerId = h.ownerId;
              }
              if (!summary[key]) summary[key] = {name, isBuilder, ownerId, m2: 0, value: 0, farW: 0};
              const sM2 = (land.m2 || 0) * (h.share || 0);
              summary[key].m2 += sM2;
              summary[key].value += sM2 * (land.announcedValuePerM2 || 0) / 10000;
              // 容積加權值 = 持分坪 × 容積率
              let landFar = 0;
              if (!land.isNonBuildable) {
                if (land.far != null && land.far !== "") landFar = land.far / 100;
                else { const lz = gzi(land.city || p.city, land.zone || p.zone); landFar = lz.f || 0; }
              }
              summary[key].farW += (sM2 * 0.3025) * landFar;
            });
            const entries = Object.values(summary);
            const totalFarW = entries.reduce((s, e) => s + e.farW, 0);
            const totalM2 = entries.reduce((s, e) => s + e.m2, 0);
            // 容積加權佔比 / 純面積佔比
            entries.forEach(e => {
              e.farPct = totalFarW > 0 ? e.farW / totalFarW : 0;
              e.areaPct = totalM2 > 0 ? e.m2 / totalM2 : 0;
            });

            // ─── 合建比 (地主分回成數) — 依分屋模式決定 ───
            const jbMode = p.jbMode || "negotiated";
            // 全案總開發成本 (供權利變換的共同負擔自動帶值)
            const _ci_rc = getCostItems(p);
            const _cci_rc = getCustomCostItems(p);
            const _builderArea_rc = dr.totalArea * dr.builderRatio;
            const _shB_rc = p.pip ? _builderArea_rc*p.uP : (_builderArea_rc*p.uP + p.parking*p.pP*dr.builderRatio);
            const _cf_rc = (_ci_rc.co?.mode === "perPing") ? (Number(_ci_rc.co.value)||0) * dr.totalArea : dr.totalArea * (p.cC || 0);
            const _intr_rc = (dr.landValue*p.lLTV*p.lLR*p.dur/12 + _cf_rc*p.cLTV*p.cLR*p.dur/12)/2;
            const _ctx_rc = { sales: _shB_rc, totalArea: dr.totalArea, totalCost: _cf_rc };
            let totalDevCost = 0;
            ["co","de","ad","tx","mg","am"].forEach(k => { totalDevCost += calcCostItemValue(_ci_rc[k], _ctx_rc) || 0; });
            if (_ci_rc.co && _ci_rc.co.mode === "perPing") {
              totalDevCost = totalDevCost - calcCostItemValue(_ci_rc.co, _ctx_rc) + (Number(_ci_rc.co.value)||0) * dr.totalArea;
            }
            totalDevCost += _intr_rc;
            _cci_rc.forEach(c => { totalDevCost += calcCostItemValue(c, _ctx_rc) || 0; });
            // 風險利潤率加成 → 共同負擔自動值
            const rcProfitRate = (p.rcProfitRate != null ? p.rcProfitRate : 0) / 100;
            const rcCommonBurdenAuto = totalDevCost * (1 + rcProfitRate);
            // 更新後總價值自動值 = 全案總銷
            const rcTotalValueAuto = p.pip ? (dr.totalArea * p.uP) : (dr.totalArea * p.uP + p.parking * p.pP);
            // 取手動覆寫或自動值
            const rcCommonBurden = (p.rcCommonBurden != null && p.rcCommonBurden !== "") ? Number(p.rcCommonBurden) : rcCommonBurdenAuto;
            const rcTotalValue = (p.rcTotalValue != null && p.rcTotalValue !== "") ? Number(p.rcTotalValue) : rcTotalValueAuto;
            // 等效合建比
            let jbLandShare;
            if (jbMode === "rightsConversion") {
              // 地主分回成數 = (更新後總價值 − 共同負擔) / 更新後總價值
              jbLandShare = rcTotalValue > 0 ? Math.max(0, Math.min(1, (rcTotalValue - rcCommonBurden) / rcTotalValue)) : 0;
            } else {
              jbLandShare = p.jbLandlordShare != null ? p.jbLandlordShare : 0.5;
            }
            // 為每位地主計算: 出資狀態 / 純合建分回 / 最終分回
            entries.forEach(e => {
              if (e.isBuilder) return;
              const owner = (p.owners || []).find(o => o.id === e.ownerId);
              e.invest = !!(owner && owner.invest);
              // 純合建分回 = 容積加權佔比 × 合建比
              e.pureJbRatio = e.farPct * jbLandShare;
              // 最終分回: 出資 → 拿滿容積加權佔比; 純合建 → × 合建比
              e.finalRatio = e.invest ? e.farPct : e.pureJbRatio;
            });

            // 切換出資狀態
            const toggleInvest = (ownerId) => {
              sP({...p, owners: p.owners.map(o => o.id === ownerId ? {...o, invest: !o.invest} : o)});
            };

            // 匯入合建分回: 寫入 owners[].ratio (最終分回) + 自動連動 costBearing
            // 並移除「無持分」的殘留地主 (保留有持分者的 invest/costBearing/feeEnabled)
            const importToShare = () => {
              const landlordEntries = entries.filter(e => !e.isBuilder && e.ownerId != null);
              if (landlordEntries.length === 0) { alert("沒有地主持分可匯入"); return; }
              const detail = landlordEntries.map(e =>
                `${e.name}: ${(e.finalRatio*100).toFixed(2)}% ${e.invest ? "(出資)" : "(純合建)"}`
              ).join("\n");
              const builderPct = 1 - landlordEntries.reduce((s, e) => s + e.finalRatio, 0);
              // 找出將被移除的殘留地主 (在 owners 但不在 landlordEntries)
              const keepIds = new Set(landlordEntries.map(e => e.ownerId));
              const removed = (p.owners||[]).filter(o => !keepIds.has(o.id));
              const removedNote = removed.length > 0 ? `\n\n將移除 ${removed.length} 位無持分地主: ${removed.map(o=>o.name).join("、")}` : "";
              if (!window.confirm(
                `將以下列分回比匯入六、合建分回 (合建比: 地主 ${(jbLandShare*100).toFixed(0)}%):\n\n${detail}\n建商 (餘額): ${(builderPct*100).toFixed(2)}%\n\n` +
                `出資者會自動設定 costBearing (承擔多出權益對應的開發成本, 可在六手動微調)。${removedNote}\n\n確定匯入? (會覆寫現有 owners 分回比與出資承擔)`
              )) return;
              // 只保留有持分的地主, 更新其 ratio/costBearing
              const newOwners = (p.owners||[]).filter(o => keepIds.has(o.id)).map(o => {
                const match = landlordEntries.find(e => e.ownerId === o.id);
                const newO = {...o, ratio: +match.finalRatio.toFixed(6)};
                if (match.invest) {
                  const extraEquity = +(match.farPct * (1 - jbLandShare)).toFixed(6);
                  newO.costBearing = {
                    de: extraEquity, co: extraEquity, ad: extraEquity, tx: extraEquity,
                    mg: extraEquity, am: extraEquity, it: extraEquity
                  };
                } else {
                  newO.costBearing = {de:0, co:0, ad:0, tx:0, mg:0, am:0, it:0};
                }
                return newO;
              });
              // 若目前「我的身分」指向被移除的地主, 切回建商
              let newRole = p.myRole || "builder";
              if (newRole.startsWith("owner_")) {
                const curId = newRole.slice(6);
                if (!newOwners.find(o => String(o.id) === curId)) {
                  newRole = newOwners.length > 0 ? "owner_" + newOwners[0].id : "builder";
                }
              }
              sP({...p, owners: newOwners, myRole: newRole});
              alert(`✓ 已匯入合建分回比例 + 出資承擔成本${removed.length>0 ? `\n(已移除 ${removed.length} 位無持分地主)` : ""}`);
            };

            return (
              <>
                {/* 分屋模式設定 */}
                {p.jb && (
                  <div className="mt-3 bg-emerald-50 rounded-xl p-2.5 border border-emerald-200">
                    {/* 模式切換 */}
                    <div className="flex items-center gap-1 mb-2">
                      <span className="text-[11px] font-bold text-emerald-700 mr-1">分屋模式</span>
                      <button onClick={() => sP({...p, jbMode: "negotiated"})}
                        className={"px-2 py-1 text-[10px] font-bold rounded-lg border " + (jbMode==="negotiated" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300 hover:border-emerald-400")}>
                        協議合建
                      </button>
                      <button onClick={() => sP({...p, jbMode: "rightsConversion"})}
                        className={"px-2 py-1 text-[10px] font-bold rounded-lg border " + (jbMode==="rightsConversion" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300 hover:border-emerald-400")}>
                        權利變換
                      </button>
                    </div>
                    {jbMode === "negotiated" ? (
                      /* 協議合建: 手動合建比 */
                      <div className="flex items-center gap-2">
                        <span className="text-[11px] font-bold text-emerald-700">合建比 (地主分回成數)</span>
                        <NI value={jbLandShare * 100}
                          onChange={v => sP({...p, jbLandlordShare: v / 100})}
                          step={1} className="w-20" />
                        <span className="text-[11px] text-emerald-600">% (建商 {((1-jbLandShare)*100).toFixed(0)}%)</span>
                      </div>
                    ) : (
                      /* 權利變換: V/C 輸入 + 算出等效合建比 */
                      <div className="space-y-1.5">
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <div className="text-[10px] text-emerald-600 mb-0.5 flex items-center justify-between">
                              <span>更新後總價值 V (萬)</span>
                              {(p.rcTotalValue != null && p.rcTotalValue !== "")
                                ? <button onClick={() => sP({...p, rcTotalValue: null})} className="text-rose-500 hover:text-rose-700 text-[10px]" title="回復自動(總銷)">↻</button>
                                : <button onClick={() => sP({...p, rcTotalValue: +rcTotalValueAuto.toFixed(0)})} className="text-emerald-500 hover:text-emerald-700" title="改手動"><Icon name="pencil" size={11}/></button>}
                            </div>
                            {(p.rcTotalValue != null && p.rcTotalValue !== "")
                              ? <NI value={p.rcTotalValue} onChange={v => sP({...p, rcTotalValue: v})} step={100} className="w-full" />
                              : <div className="px-2 py-1 bg-white rounded text-[11px] font-mono font-bold text-slate-700">{fmt(rcTotalValue, 0)} <span className="text-[9px] text-slate-400">(自動=總銷)</span></div>}
                          </div>
                          <div>

                const list = lands.map((l, i) => `${i+1}. ${l.sec||"(空段)"}/${l.num||"(空號)"} [${l.zone||"-"}]`).join("\n");
                const pick = window.prompt(`選擇查詢的地號 (輸入編號 1~${lands.length}, 或輸入 0 手動輸入):\n\n${list}`, "1");
                if (pick === null) return;
                const idx = parseInt(pick, 10);
                if (idx >= 1 && idx <= lands.length) {
                  const L = lands[idx-1];
                  county = L.city || p.city; district = L.district || p.dist;
                  sectionNo = L.sec; landNo = L.num;
                } else if (idx !== 0) { alert("編號超出範圍"); return; }
              }
              // 手動輸入 (無表1地號 或 選 0)
              if (!sectionNo || !landNo) {
                county = window.prompt("縣市:", county || p.city || "新北市"); if (!county) return;
                district = window.prompt("行政區:", district || p.dist || "林口區"); if (!district) return;
                sectionNo = window.prompt("地段號:", sectionNo || ""); if (!sectionNo) return;
                landNo = window.prompt("地號:", landNo || ""); if (!landNo) return;

              if (!totalFloors || totalFloors <= 0) { alert("總樓層數必須是正整數"); return; }
              // 3. 查詢
              const loadingEl = document.createElement("div");
              loadingEl.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999;font-family:sans-serif;";

                alert("房價查詢失敗: " + err.message);

                loadingEl.remove();
              }

                                    <input type="range" min="0" max="1" step="0.005" value={v}
                                      onChange={e => updOwner(o.id, "costBearing", {...csh, [ci.k]: Number(e.target.value)})}
                                      className="flex-1"/>

                                    <span className="text-[9px] text-slate-400">%</span>
                                  </div>
                                  <span className={"col-span-3 text-right font-mono font-bold "+(bearAmt>0?"text-amber-700":"text-slate-300")}>{fmt(bearAmt)}</span>
                                </div>

                                    <div className="flex items-center justify-between mb-2">
                                      <div className="text-[11px] font-bold text-sky-700 flex items-center gap-1">
                                        <Icon name="building" size={12}/> 地主融資 (向銀行借款承擔出資)
                                      </div>
                                      <label className="flex items-center gap-1 text-[10px] cursor-pointer">
                                        <input type="checkbox" checked={fin.enabled} onChange={e=>updFin("enabled", e.target.checked)}
                                               className="w-3 h-3"/>
                                        <span className="text-slate-600">啟用</span>
                                      </label>
                                    </div>
                                    {fin.enabled && (
                                      <div className="bg-sky-50/50 rounded p-2 space-y-1 border border-sky-200">
                                        <div className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                          <span className="col-span-4 text-slate-600">融資金額</span>
                                          <NI value={Number(fin.amount)||0} onChange={v=>updFin("amount", v)} step={100} className="col-span-5 text-xs"/>
                                          <span className="col-span-3 text-slate-400 text-right">萬</span>
                                        </div>
                                        <div className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                          <span className="col-span-4 text-slate-600">年利率</span>
                                          <NI value={Number(fin.rate)||0} onChange={v=>updFin("rate", v)} step={0.25} className="col-span-5 text-xs"/>
                                          <span className="col-span-3 text-slate-400 text-right">%/年</span>
                                        </div>
                                        <div className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                          <span className="col-span-4 text-slate-600">融資期間</span>
                                          <NI value={Number(fin.durationMonths)||0} onChange={v=>updFin("durationMonths", v)} step={6} className="col-span-5 text-xs"/>
                                          <span className="col-span-3 text-slate-400 text-right">月</span>
                                        </div>
                                        <div className="pt-1 mt-1 border-t border-sky-200 text-[10px] space-y-0.5">
                                          {(() => {
                                            const fa = Number(fin.amount) || 0;
                                            const fr = (Number(fin.rate) || 0) / 100;
                                            const fm = Number(fin.durationMonths) || 0;
                                            const interest = fa * fr * (fm/12) / 2;
                                            return (
                                              <>
                                                <div className="flex justify-between">
                                                  <span className="text-slate-600">預估利息支出</span>
                                                  <span className="font-mono text-rose-700">-{fmt(interest)} 萬</span>
                                                </div>
                                                <div className="text-[9px] text-slate-400 italic">
                                                  簡單利息: 金額 × 利率 × 年數 ÷ 2 (假設線性還本)
                                                </div>
                                              </>
                                            );
                                          })()}
                                        </div>
                                        <button onClick={()=>updOwner(o.id, "financing", {enabled:false, amount:0, rate:3.0, durationMonths:84})}
                                                className="text-[10px] text-rose-500 hover:text-rose-700">
                                          ↻ 關閉並歸零
                                        </button>
                                      </div>
                                    )}
                                    {!fin.enabled && (
                                      <div className="text-[10px] text-slate-400 italic">
                                        勾選「啟用」後可填入向銀行融資的金額，將計入土地貸款 (ll) 並從自有資金 (eq) 扣除。
                                        利息成本會自動加到地主成本中。
                                      </div>
                                    )}
                                  </>
                                );
                              })()}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              );
            })}

            <div className="text-[10px] text-slate-500 italic bg-slate-50 rounded-lg px-3 py-2 border border-slate-200">
              ℹ️ 所有權人的新增與命名請至「一、土地資料 → 表 2 基地所有權人權屬概況表」操作。此處的地主清單由表 2 自動帶入，僅能設定分回比例、費率與出資。
            </div>

            {/* 加總驗證 */}
            <div className="mt-2 p-2 bg-amber-50 rounded text-[11px] border border-amber-200 flex justify-between">
              <span className="text-amber-700">面積分回合計</span>
              <span className="font-mono font-bold text-amber-800">
                {fmt((dr.shareInfo||[]).reduce((a,x)=>a+x.finalArea,0), 2)} / {fmt(dr.totalArea, 2)} 坪
              </span>
            </div>
          </div>}
        </div>
        {p.jb && <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div>
            <div className="text-xs font-bold text-slate-500 mb-2">費率（地主端）</div>
            <F l="廣告銷售費率" f="oAdR" step={0.005}/><F l="稅雜費率" f="oTxR" step={0.005}/><F l="物管費率" f="oMgR" step={0.001}/>
            <div className="mt-2 text-[10px] text-slate-500 italic bg-slate-50 rounded p-2 border border-slate-200">
              ℹ️ 土地增值稅已整合至「七、經營分析」的土地稅制設定 (依新/舊制自動計算)。
            </div>
          </div>
          <div>
            <div className="text-xs font-bold text-slate-500 mb-2 inline-flex items-center gap-1.5"><Icon name="scroll" size={12}/> 契稅 <ExtLink href="https://www.etax.nat.gov.tw/etwmain/etw158w/53">財政部驗證</ExtLink></div>
            <div className="bg-slate-50 rounded-xl p-3 border space-y-2">
              <div className="flex items-center justify-between"><span className="text-[11px]">類型</span><SO v={p.deedType} fn={v=>up("deedType",v)} opts={DEED_TYPES.map(d=>({v:d.k,l:d.l+(d.r*100)+"%"}))} className="w-28 text-xs"/></div>
              <div className="flex items-center justify-between"><span className="text-[11px]">房屋評定現值</span><NI value={p.deedHouseVal} onChange={v=>up("deedHouseVal",v)} className="w-20 text-xs"/></div>
            </div>
            <div className="mt-2 bg-violet-50 rounded-xl p-3 border border-violet-200">
              <div className="flex justify-between text-[11px]"><span>稅率</span><span className="font-bold">{dr.deedCalc.label} {(dr.deedCalc.rate*100)}%</span></div>
              <div className="border-t mt-1 pt-1 flex justify-between"><span className="font-bold text-violet-700">應繳契稅</span><span className="font-black text-violet-800">{fmt(dr.deedCalc.tax)} 萬</span></div>
            </div>
          </div>
        </div>}
      </Card>
    </div>
  );
}

/* 容積獎勵 % 下拉 (放外部避免每次 T6 重渲染重置 state) */
function BonusPctSelect({val, onChange, max}) {
  const isPresetMatch = BONUS_PCT_OPTS.some(o => o.v === val && o.v > 0);
  const [showCustom, setShowCustom] = useState(!isPresetMatch && val !== 0);
  const handleSelect = (e) => {
    const v = parseFloat(e.target.value);
    if (v === -1) { setShowCustom(true); }
    else { setShowCustom(false); onChange(v); }
  };
  const selectVal = showCustom ? -1 : val;
  return (
    <div className="flex items-center gap-1">
      <select value={selectVal} onChange={handleSelect}
        className="px-1.5 py-0.5 text-[11px] border border-sky-300 rounded bg-sky-50 text-sky-900 font-semibold focus:outline-none focus:ring-1 focus:ring-sky-400">
        {BONUS_PCT_OPTS.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
      {showCustom && <NI value={val} onChange={onChange} max={max||100} step={1} className="w-14 text-center"/>}
      <span className="text-[10px] text-slate-400">%</span>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 6: 建築規劃 (面積計算精算)
   v10:
   - 土地清冊 m² primary, 坪 自動換算 (×0.3025)
   - 建蔽率/容積率 預設繼承 zone (顯示淡色字), 手動輸入則覆寫
   - 容積獎勵階層化, 高雄厝為勾選項之一
   - 每個公式結果可手動覆寫 (☐ → 編輯框 / ↻)
   - 13~15 增加 透天住宅 勾選 (車位 44m² + 可選擇納入可銷)
════════════════════════════════════════ */
function T6({p, sP}) {
  const dr = calcDerived(p);
  const ar = dr.areaResult;
  const ac = p.areaCalc || {};
  const mo = ac.manualOverride || {};
  const up = (f, v) => sP({...p, [f]: v});
  const upAC = (k, v) => sP({...p, areaCalc: {...ac, [k]: v}});
  const updLand = (id, k, v) => sP({...p, lands: p.lands.map(l => l.id===id ? {...l,[k]:v} : l)});

  /* 手動覆寫 helpers */
  const isOver = (k) => mo[k] !== undefined && mo[k] !== null && mo[k] !== "";
  const setOver = (k, v) => sP({...p, areaCalc: {...ac, manualOverride: {...mo, [k]: v}}});
  const clrOver = (k) => {
    const nm = {...mo}; delete nm[k];
    sP({...p, areaCalc: {...ac, manualOverride: nm}});
  };

  /* 容積獎勵 */
  const toggleBI = (k, on) => {
    const nb = {...p.bo};
    if (on) nb[k] = true; else delete nb[k];
    sP({...p, bo: nb});
  };
  const setBIPct = (k, v) => sP({...p, bop: {...p.bop, [k]: v}});
  const addCustomBonus = () => sP({...p, bonusCustom: [...(p.bonusCustom||[]), {id:uid(), name:"自訂獎勵", pct:10, isTOD:false}]});
  const updCustom = (id, k, v) => sP({...p, bonusCustom: (p.bonusCustom||[]).map(c => c.id===id ? {...c,[k]:v} : c)});
  const delCustom = (id) => sP({...p, bonusCustom: (p.bonusCustom||[]).filter(c => c.id!==id)});

  /* Row 元件：支援手動覆寫 */
  const Row = ({k, label, formula, result, unit="坪", note, accent="navy"}) => {
    const overridden = k && isOver(k);
    const accentCls =
      accent==="gold" ? "bg-amber-50 border-amber-300" :
      accent==="result" ? "bg-slate-700 border-slate-700 text-white" :
      "bg-slate-50 border-slate-200";
    const labelCls = accent==="result"?"text-amber-200":"text-slate-700";
    const formulaCls = accent==="result"?"text-slate-300":"text-slate-400";
    const numCls = accent==="gold"?"text-amber-800":accent==="result"?"text-amber-200":"text-slate-700";
    return (
      <div className={"flex items-center justify-between py-2 px-3 rounded-lg border " + accentCls + (overridden ? " ring-2 ring-rose-300" : "")}>
        <div className="flex-1 min-w-0">
          <div className={"text-xs font-bold " + labelCls}>{label}{overridden && <span className="ml-2 text-[9px] bg-rose-200 text-rose-800 px-1 py-0.5 rounded">手動覆寫</span>}</div>
          {formula && <div className={"text-[10px] mt-0.5 " + formulaCls}>{formula}</div>}
          {note && <div className="text-[10px] text-slate-400 italic mt-0.5">{note}</div>}
        </div>
        <div className="flex items-center gap-1 ml-2 shrink-0">
          {overridden ? (
            <>
              <NI value={mo[k]} onChange={v=>setOver(k,v)} step={0.01} className={"w-24 text-right "+(accent==="result"?"text-slate-900":"")}/>
              <span className={"text-[10px] " + (accent==="result"?"text-slate-300":"text-slate-400")}>{unit}</span>
              <button onClick={()=>clrOver(k)} title="回復公式自動值" className="text-rose-400 hover:text-rose-600 text-sm leading-none px-1">↻</button>
            </>
          ) : (
            <>
              <span className={"font-mono font-black text-base "+numCls}>{fmt(result, 2)}</span>
              <span className={"text-[10px] opacity-70 "+numCls}>{unit}</span>
              {k && <button onClick={()=>setOver(k, +result.toFixed(2))} title="手動覆寫此值" className={"leading-none px-1 " + (accent==="result"?"text-slate-300 hover:text-white":"text-slate-300 hover:text-slate-600")}><Icon name="pencil" size={12}/></button>}
            </>
          )}
        </div>
      </div>
    );
  };

  /* zone 預設顯示提示 */
  const zoneNote = <span className="text-[10px] text-slate-400 italic">加權繼承基準: 建蔽率 {((ar.zoneBCR||0)*100).toFixed(1)}% / 容積率 {((ar.zoneFAR||0)*100).toFixed(1)}%</span>;

  return (
    <div className="space-y-4">
      {/* 啟用開關 */}
      <Card title="建築規劃精算開關" accent="bg-sky-700" icon="settings">
        <Chk ck={!!ac.enable} onChange={v=>upAC("enable", v)}
          l="啟用此分頁精算結果作為總銷面積來源"
          sub="勾選後，T1 基本假設、損益分析、現金流、敏感度都會使用以下計算的『總銷面積』、『戶數』、『車位』數值"/>
        {ac.enable && <div className="mt-2 p-2 bg-emerald-50 rounded-lg border border-emerald-200 text-[11px] text-emerald-700 inline-flex items-center gap-1">
          <Icon name="check" size={12}/> 已啟用 — 修改下方任何欄位將即時影響全系統計算
        </div>}
        <div className="mt-3 pt-3 border-t">
          <div className="text-[11px] text-slate-500 mb-1 font-bold inline-flex items-center gap-1.5"><Icon name="ruler" size={11}/> 損益分析建築工程造價公式</div>
          <div className="p-2 bg-slate-50 rounded text-[11px] text-slate-700 font-mono">
            cf = 總銷面積 × 各方案造價
          </div>
          <div className="mt-1 text-[10px] text-slate-400">
            合建情況下，建商出資蓋全棟，造價成本以全案總銷面積為計算基準（與膨脹係數無關）
          </div>
        </div>
      </Card>

      {/* 1. 基地面積 */}
      <Card title="① 基地面積" accent="bg-slate-700" icon="map-pin">
        <div className="text-[10px] text-slate-400 mb-2 italic">提示：{zoneNote}。每筆建蔽率/容積率留白 = 採用本區預設值；輸入數字則覆寫</div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-100 text-slate-600">
                <th className="py-2 px-2 text-left">土地名稱</th>
                <th className="py-2 px-2 text-right">m²</th>
                <th className="py-2 px-2 text-right">坪 (自動)</th>
                <th className="py-2 px-2 text-right">建蔽率(%)</th>
                <th className="py-2 px-2 text-right">容積率(%)</th>
              </tr>
            </thead>
            <tbody>
              {p.lands.map(l => {
                const m2v = l.m2 || 0;
                const pingv = +(m2v * 0.3025).toFixed(2);
                const bcrEmpty = l.bcr === null || l.bcr === undefined || l.bcr === "";
                const farEmpty = l.far === null || l.far === undefined || l.far === "";
                return (
                  <tr key={l.id} className="border-b hover:bg-sky-50/40">
                    <td className="py-1.5 px-2 text-slate-700">{l.name}</td>
                    <td className="py-1.5 px-2 text-right">
                      <NI value={m2v}
                        onChange={v => sP({...p, lands: p.lands.map(x => x.id===l.id ? {...x, m2:v, area:+(v*0.3025).toFixed(2)} : x)})}
                        step={0.01} className="w-24 text-right"/>
                    </td>
                    <td className="py-1.5 px-2 text-right">
                      <span className="px-2 py-1 bg-slate-100 rounded text-slate-700 font-mono font-semibold">{fmt(pingv,2)}</span>
                    </td>
                    <td className="py-1.5 px-2 text-right">
                      <input type="number" step="1"
                        value={bcrEmpty ? "" : l.bcr}
                        placeholder={String(((ar.zoneBCR||0)*100).toFixed(0))}
                        onChange={e => updLand(l.id, "bcr", e.target.value === "" ? null : parseFloat(e.target.value))}
                        className={"field-sizing-content w-full w-20 text-right px-2 py-1 border rounded text-sm "+(bcrEmpty?"text-slate-400 italic bg-slate-50":"text-slate-700 bg-white")}/>
                    </td>
                    <td className="py-1.5 px-2 text-right">
                      <input type="number" step="1"
                        value={farEmpty ? "" : l.far}
                        placeholder={String(((ar.zoneFAR||0)*100).toFixed(0))}
                        onChange={e => updLand(l.id, "far", e.target.value === "" ? null : parseFloat(e.target.value))}
                        className={"field-sizing-content w-full w-20 text-right px-2 py-1 border rounded text-sm "+(farEmpty?"text-slate-400 italic bg-slate-50":"text-slate-700 bg-white")}/>
                    </td>
                  </tr>
                );
              })}
              <tr className="bg-amber-50 border-t-2 border-amber-300 font-bold">
                <td className="py-2 px-2 text-amber-800">合計</td>
                <td className="py-2 px-2 text-right text-amber-800 font-mono">{fmt(ar.site_total_m2,2)} m²</td>
                <td className="py-2 px-2 text-right text-amber-800 font-mono">{fmt(ar.site_total,2)} 坪</td>
                <td colSpan={2} className="py-2 px-2 text-right text-[10px] text-amber-700">平均 BCR {(ar.avg_bcr*100).toFixed(2)}% / FAR {(ar.avg_far*100).toFixed(2)}%</td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>

      {/* 2. 允建建築面積 */}
      <Card title="② 允建建築面積 (建蔽率)" accent="bg-slate-700">
        <div className="space-y-1 mb-2">
          {ar.bcrRows.map((r,i) => (
            <div key={i} className="flex items-center justify-between text-[12px] px-2 py-1 bg-slate-50 rounded">
              <span className="text-slate-600">{r.name}: {fmt(r.area,2)} × {r.bcr}%{r.inherited && <span className="ml-1 text-[9px] text-slate-400">(繼承)</span>}</span>
              <span className="font-mono font-semibold">{fmt(r.result, 2)} 坪</span>
            </div>
          ))}
        </div>
        <Row k="bcr_total" label="允建建築合計" formula={`Σ(基地 × 建蔽率)`} result={ar.bcr_total} accent="gold"/>

        <div className="mt-3 p-3 bg-sky-50 rounded-lg border border-sky-200">
          <Chk ck={!!ac.useOrigCap} onChange={v=>upAC("useOrigCap",v)} l="使用原始容積計算 (替代建蔽率合計)"/>
          {ac.useOrigCap && (
            <div className="mt-2 grid grid-cols-2 gap-2">
              <div className="flex items-center gap-1">
                <span className="text-[11px] text-slate-600">原始容積面積</span>
                <NI value={ac.origCapArea||0} onChange={v=>upAC("origCapArea",v)} className="w-24"/>
                <span className="text-[10px] text-slate-400">坪</span>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-[11px] flex items-center gap-1"><input type="radio" checked={ac.origCapMult===1.2} onChange={()=>upAC("origCapMult",1.2)}/> ×1.2</label>
                <label className="text-[11px] flex items-center gap-1"><input type="radio" checked={ac.origCapMult===1.3} onChange={()=>upAC("origCapMult",1.3)}/> ×1.3</label>
              </div>
              <div className="col-span-2 mt-1 p-2 bg-white rounded border text-[12px]">
                結果: {fmt(ac.origCapArea||0)} × {ac.origCapMult} = <span className="font-bold text-amber-700">{fmt(ar.origResult,2)} 坪</span>
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* 3. 基準容積 */}
      <Card title="③ 基準容積面積 (FA)" accent="bg-slate-700">
        <div className="space-y-1 mb-2">
          {ar.farRows.map((r,i) => (
            <div key={i} className="flex items-center justify-between text-[12px] px-2 py-1 bg-slate-50 rounded">
              <span className="text-slate-600">{r.name}: {fmt(r.area,2)} × {(r.far/100).toFixed(2)} ({r.far}%){r.inherited && <span className="ml-1 text-[9px] text-slate-400">(繼承)</span>}</span>
              <span className="font-mono font-semibold">{fmt(r.result, 2)} 坪</span>
            </div>
          ))}
        </div>
        <Row k="fa_total" label="基準容積合計 FA" formula="Σ(基地 × 容積率)" result={ar.fa_total} accent="gold"/>
      </Card>

      {/* 4. 容積獎勵 (階層化) */}
      <Card title="④ 容積獎勵" accent="bg-violet-700" icon="trophy">
        <div className="text-[11px] text-slate-500 mb-3">勾選獎勵項目並設定 %；子項目縮排顯示，需父項勾選後才會列入計算。<span className="text-violet-600 font-bold">若父項下有任一子項已勾選 → 父項的 % 將自動 = Σ 子項加總 (父項 % 變不可手動調整)</span>。高雄厝勾選後啟用 ⑨A/⑨B 計算。</div>

        <div className="space-y-1.5">
          {BI.map(item => {
            const on = !!p.bo[item.k];
            const isChild = !!item.parent;
            const parentOn = !isChild || !!p.bo[item.parent];
            const isKH = item.special === "kh";
            const hasChildren = !isChild && ar.childSum && ar.childSum[item.k] !== undefined;
            // 顯示用 %
            const effectivePct = hasChildren
              ? ar.childSum[item.k]
              : ((p.bop && p.bop[item.k] !== undefined && p.bop[item.k] !== null) ? p.bop[item.k] : item.mx);
            return (
              <div key={item.k}
                className={"rounded-lg border p-2 " +
                  (on?(isKH?"border-amber-300 bg-amber-50":"border-violet-300 bg-violet-50"):"border-slate-200") +
                  (isChild?" ml-6":"") +
                  (isChild && !parentOn?" opacity-50":"")}>
                <div className="flex items-center justify-between gap-2">
                  <Chk ck={on}
                    onChange={v => toggleBI(item.k, v)}
                    disabled={isChild && !parentOn}
                    l={<span className={isChild?"text-[12px]":"font-semibold"}>{item.l.trim()}{isKH && " 🌴"}</span>}

/* ════════════════════════════════════════
   TAB 7: 經營分析 (不動產處分效益 / 長期持有)
════════════════════════════════════════ */
function T7({p, sP}) {
  const dr = calcDerived(p);
  const cb = p.compBenefit || {};
  const ce = calcCompBenefit(p, dr);
  const [showCostDetail, setShowCostDetail] = useState(false);
  const upCB = (k, v) => sP({...p, compBenefit: {...cb, [k]: v}});
  const upRent = (k, v) => sP({...p, compBenefit: {...cb, rent: {...(cb.rent||{}), [k]: v}}});
  const upBiz = (k, v) => sP({...p, compBenefit: {...cb, business: {...(cb.business||{}), [k]: v}}});
  const upPD = (k, v) => sP({...p, compBenefit: {...cb, partialDispose: {...(cb.partialDispose||{}), [k]: v}}});
  // ── 多筆處分 helpers ──
  const updDisposal = (id, k, v) => {
    const list = (cb.disposals || []).map(d => d.id === id ? {...d, [k]: v} : d);
    sP({...p, compBenefit: {...cb, disposals: list}});
  };
  const addDisposal = () => {
    const list = cb.disposals || [];
    const maxId = list.reduce((a,d) => Math.max(a, d.id||0), 0);
    const newD = {id: maxId+1, label: `第${list.length+1}筆`, year: 2030, month: 6, area: 0, price: 0, enabled: true};
    sP({...p, compBenefit: {...cb, disposals: [...list, newD]}});
  };
  const delDisposal = (id) => {
    const list = (cb.disposals || []).filter(d => d.id !== id);
    sP({...p, compBenefit: {...cb, disposals: list.length>0 ? list : [{id:1, label:"完工出售", year:2028, month:6, area:0, price:0, enabled:true}]}});
  };

  const YearSel = ({v, onChange, className=""}) => (
    <select value={v||2028} onChange={e=>onChange(parseInt(e.target.value,10))}
      className={"text-xs border rounded px-1 py-0.5 bg-slate-50 "+className}>
      {Array.from({length:61}, (_,i)=>2020+i).map(y => <option key={y} value={y}>{y}</option>)}
    </select>
  );
  const MonSel = ({v, onChange, className=""}) => (
    <select value={v||1} onChange={e=>onChange(parseInt(e.target.value,10))}
      className={"text-xs border rounded px-1 py-0.5 bg-slate-50 "+className}>
      {Array.from({length:12}, (_,i)=>i+1).map(m => <option key={m} value={m}>{m}月</option>)}
    </select>
  );

  const mode = cb.mode || "single";
  const isOwner = (ce.myRole || "").startsWith("owner_");
  const isSingle = mode === "single";

  // 房地合一稅試算區塊 (共用元件)
  const TaxBlock = ({holdY, taxableBase, taxInfo, prefix="", multiMode=false}) => {
    const regime = ce.landRegime;  // 已由 calcCompBenefit 解析 (auto→new/old)
    const rawRegimeSetting = cb.landRegime || "auto";
    // 舊制土增稅查詢: 從表 2 自動帶「我的持分」, 多地號加總
    const queryLVT = async () => {
      const myRoleStr = p.myRole || "builder";
      if (!myRoleStr.startsWith("owner_")) {
        alert("請先在「我的身分」選擇某位地主, 才能查詢該地主的土增稅");
        return;
      }
      const myId = myRoleStr.slice(6);
      // 從表 2 篩出我的持分列
      const myHoldings = (p.ownerHoldings || []).filter(h => String(h.ownerId) === myId && (Number(h.share)||0) > 0);
      if (myHoldings.length === 0) {
        alert("表 2 中沒有此地主的持分資料, 請先到表 2 新增持分");
        return;
      }
      // year/month = 取得年月 (民國年, 後端用此查 price_index 取「取得時的物價指數」)
      //              後端再交給 etax 計算物價漲幅 (etax 自動以當下時間為分子)
      const yr = Number(cb.landAcquireYearROC) || 0;
      const mo = Number(cb.landAcquireMonth) || 1;
      if (!yr) {
        alert("請先填寫「取得年月 (民國)」, 土增稅計算需要此資訊");
        return;
      }
      const landType = cb.lvtLandType || "1";
      // 逐筆呼叫 API
      let totalTax = 0;
      const detail = [];
      try {
        for (const h of myHoldings) {
          const land = (p.lands || []).find(l => (l.sec||"")===(h.sec||"") && (l.num||"")===(h.num||""));
          if (!land) { detail.push(`✕ ${h.sec}/${h.num}: 表1找不到對應土地`); continue; }
          if (!land.announcedValuePerM2) { detail.push(`✕ ${h.sec}/${h.num}: 表1未填「公告現值」`); continue; }
          if (!h.lvtOrigVal) { detail.push(`✕ ${h.sec}/${h.num}: 表2未填「原規定地價」`); continue; }
          if (!land.m2) { detail.push(`✕ ${h.sec}/${h.num}: 表1未填面積`); continue; }
          const r = await apiClient.queryLandTax({
            year: yr, month: mo,
            curr_val: String(land.announcedValuePerM2),
            orig_val: String(h.lvtOrigVal),
            area: String(land.m2),
            land_type: String(landType),
            share: String(h.share)
          });
          const taxWan = (Number(r.param5) || 0) / 10000;
          totalTax += taxWan;
          detail.push(`✓ ${h.sec}/${h.num} (持分${(h.share*100).toFixed(1)}%): ${taxWan.toFixed(2)} 萬`);
        }
        const final = +totalTax.toFixed(2);
        sP({...p, compBenefit: {...cb, lvtTaxResult: final}});
        alert(`土地增值稅查詢完成 (取得時間: 民國 ${yr}/${mo}, ${myHoldings.length} 筆地號):\n\n${detail.join("\n")}\n\n──────────\n合計: ${final.toFixed(2)} 萬${cb.lvtUrbanRenewal ? `\n都更減徵 40% 後: ${(final*0.6).toFixed(2)} 萬` : ""}`);
      } catch (err) {
        alert("土增稅查詢失敗: " + err.message + "\n\n已完成: " + detail.join("\n"));
      }
    };
    return (
    <div className="bg-rose-50 rounded-lg p-3 border-2 border-rose-200">
      {/* 土地稅制選擇 */}
      <div className="bg-white rounded-lg p-2 border border-slate-200 mb-2">
        <div className="flex items-center gap-2 flex-wrap mb-1.5">
          <span className="text-xs font-bold text-slate-700">土地稅制</span>
          <label className="flex items-center gap-1 cursor-pointer">
            <input type="radio" name={"regime"+prefix} checked={rawRegimeSetting==="auto"} onChange={()=>upCB("landRegime","auto")}/>
            <span className="text-[11px]">自動 ({regime==="old"?"舊制":"新制"})</span>
          </label>
          <label className="flex items-center gap-1 cursor-pointer">
            <input type="radio" name={"regime"+prefix} checked={rawRegimeSetting==="new"} onChange={()=>upCB("landRegime","new")}/>
            <span className="text-[11px]">新制 (房地合一)</span>
          </label>
          <label className="flex items-center gap-1 cursor-pointer">
            <input type="radio" name={"regime"+prefix} checked={rawRegimeSetting==="old"} onChange={()=>upCB("landRegime","old")}/>
            <span className="text-[11px]">舊制 (土增稅)</span>
          </label>
        </div>
        <div className="flex items-center gap-2 text-[11px]">
          <span className="text-slate-600">取得年月 (民國)</span>
          <NI value={cb.landAcquireYearROC || 0} onChange={v=>upCB("landAcquireYearROC", v)} step={1} className="w-16"/>
          <span className="text-slate-400">年</span>
          <NI value={cb.landAcquireMonth || 1} onChange={v=>upCB("landAcquireMonth", Math.max(1, Math.min(12, v|0)))} step={1} className="w-12"/>
          <span className="text-slate-400">月</span>
          <span className="text-slate-400">(≥105 為新制；&lt;105 為舊制)</span>
        </div>
        {regime === "old" && (
          <div className="flex items-center gap-2 text-[11px] mt-1">
            <span className="text-slate-600">土地類別</span>
            <select value={cb.lvtLandType || "1"} onChange={e=>upCB("lvtLandType", e.target.value)} className="text-[11px] border rounded px-1 py-0.5 bg-white">
              <option value="1">都市土地</option>
              <option value="2">非都市土地</option>
              <option value="3">工業區土地</option>
            </select>
            <span className="text-slate-400">(送 API 的 land_type)</span>
          </div>
        )}
      </div>
      {regime === "old" ? (
        /* ─── 舊制: 土地增值稅 ─── */
        <div>
          <div className="text-xs font-bold text-amber-800 mb-2 inline-flex items-center gap-1.5"><Icon name="landmark" size={12}/> 土地增值稅 (舊制, 105年前取得)</div>
          <label className="flex items-center gap-1 cursor-pointer mb-2">
            <input type="checkbox" checked={!!cb.lvtUrbanRenewal} onChange={e=>upCB("lvtUrbanRenewal", e.target.checked)}/>
            <span className="text-[11px] text-amber-700">都更案減徵 40% (六折優惠)</span>
          </label>
          {!multiMode && (
            <button onClick={queryLVT}
              className="w-full mb-2 px-2 py-1.5 bg-sky-600 hover:bg-sky-700 text-white text-[11px] font-bold rounded-lg inline-flex items-center justify-center gap-1.5">
              <Icon name="search" size={14}/> 查詢土增稅
            </button>

          <div className="border-t border-amber-200 pt-2 space-y-1 text-[11px]">
            {ce.lvtRaw != null ? (
              <>
                <div className="flex items-center justify-between">
                  <span className="text-slate-600">原始土增稅 (API)</span>
                  <span className="font-mono text-slate-800">{fmt(ce.lvtRaw)} 萬</span>
                </div>
                {cb.lvtUrbanRenewal && (
                  <div className="flex items-center justify-between">
                    <span className="text-slate-600">− 都更減徵 40%</span>
                    <span className="font-mono text-emerald-700">-{fmt(ce.lvtRaw*0.4)} 萬</span>
                  </div>
                )}
                <div className="flex items-center justify-between border-t-2 border-amber-300 pt-1 mt-1">
                  <span className="font-bold text-amber-700">土地增值稅{cb.lvtUrbanRenewal?" (六折)":""}</span>
                  <span className="font-mono font-black text-amber-700">-{fmt(ce.lvtTax||0)} 萬</span>
                </div>
              </>
            ) : (
              <div className="text-[11px] text-amber-700 bg-amber-50 rounded p-2 border border-amber-200 inline-flex items-center gap-1">
                <Icon name="alert-triangle" size={12}/> 尚未查詢土增稅，請按上方「查詢土增稅」鈕 (需後端已上傳物價指數)。
              </div>
            )}
          </div>
        </div>
      ) : (
        /* ─── 新制: 房地合一稅 (原內容) ─── */
        <div>
      <div className="text-xs font-bold text-rose-800 mb-2">🆕 房地合一稅試算 {prefix} {multiMode && <span className="text-[9px] text-rose-600 font-normal ml-1">(設定全域、各筆獨立套用)</span>}</div>
      <div className="space-y-2">
        <div className="grid grid-cols-12 gap-1 items-center">
          <span className="col-span-3 text-xs text-slate-600">納稅人身分</span>
          <div className="col-span-9 flex items-center gap-2">
            <label className="flex items-center gap-1 cursor-pointer">
              <input type="radio" name={"taxpayer"+prefix} checked={ce.taxpayer===""} onChange={()=>upCB("taxpayerType","")}/>
              <span className="text-xs text-slate-600">未指定</span>
            </label>
            <label className="flex items-center gap-1 cursor-pointer">
              <input type="radio" name={"taxpayer"+prefix} checked={ce.taxpayer==="individual"} onChange={()=>upCB("taxpayerType","individual")}/>
              <span className="text-xs">個人</span>
            </label>
            <label className="flex items-center gap-1 cursor-pointer">
              <input type="radio" name={"taxpayer"+prefix} checked={ce.taxpayer==="corp"} onChange={()=>upCB("taxpayerType","corp")}/>
              <span className="text-xs">營利事業</span>
            </label>
          </div>
        </div>
        {ce.taxpayer === "individual" && (
          <div className="grid grid-cols-12 gap-1 items-center">
            <span className="col-span-3 text-xs text-slate-600">自用住宅</span>
            <label className="col-span-9 flex items-center gap-1 cursor-pointer">
              <input type="checkbox" checked={ce.selfUse} onChange={e=>upCB("selfUse",e.target.checked)}/>
              <span className="text-[11px] text-slate-600">滿 6 年, 一生一次, 400 萬免稅, 10% 稅率</span>
            </label>
          </div>
        )}
        {ce.taxpayer ? (
          multiMode ? (
            <div className="border-t border-rose-200 pt-2 flex items-center justify-between text-[11px]">
              <span className="text-slate-600">所有批次房地合一稅合計</span>
              <span className="font-mono font-black text-rose-700">-{fmt(taxInfo.tax)} 萬</span>
            </div>
          ) : (
            <>
              <div className="grid grid-cols-12 gap-1 items-center text-[11px]">
                <span className="col-span-3 text-slate-600">適用稅率</span>
                <span className="col-span-9 font-bold text-rose-800">{taxInfo.label} ({(taxInfo.rate*100).toFixed(0)}%)</span>
              </div>
              <div className="border-t border-rose-200 pt-2 space-y-1 text-[11px]">
                <div className="flex items-center justify-between">
                  <span className="text-slate-600">課稅基礎 (處分價 − 取得成本 − 必要費用)</span>
                  <span className="font-mono text-slate-800">{fmt(taxableBase)} 萬</span>
                </div>
                {taxInfo.exemption > 0 && (
                  <div className="flex items-center justify-between">
                    <span className="text-slate-600">− 自用住宅免稅額</span>
                    <span className="font-mono text-emerald-700">-{fmt(taxInfo.exemption)} 萬</span>
                  </div>
                )}
                <div className="flex items-center justify-between">
                  <span className="text-slate-600">應稅所得</span>
                  <span className="font-mono text-slate-800">{fmt(taxInfo.taxable||0)} 萬</span>
                </div>
                <div className="flex items-center justify-between border-t-2 border-rose-300 pt-1 mt-1">
                  <span className="font-bold text-rose-700">房地合一稅</span>
                  <span className="font-mono font-black text-rose-700">-{fmt(taxInfo.tax)} 萬</span>
                </div>
              </div>
            </>
          )
        ) : (
          <div className="text-[11px] text-amber-700 bg-amber-50 rounded p-2 border border-amber-200 inline-flex items-center gap-1"><Icon name="alert-triangle" size={12}/> 請先選擇納稅人身分，否則房地合一稅將不計入。</div>
        )}
      </div>
        </div>
      )}
    </div>
    );
  };

  return (
    <div className="space-y-4">
      {/* 我的身分顯示 */}
      <div className="bg-gradient-to-r from-amber-50 to-amber-50 rounded-2xl border-2 border-amber-300 p-4">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div>
            <div className="text-[10px] text-amber-600 font-bold inline-flex items-center gap-1.5"><Icon name="user" size={11}/> 我的身分（連動「六、合建分回」）</div>
            <div className="text-lg font-black text-amber-900">{ce.myRoleLabel}</div>
          </div>
          <div className="grid grid-cols-3 gap-3 text-right">
            <div>
              <div className="text-[10px] text-slate-500">分回面積</div>
              <div className="text-base font-black text-slate-800 font-mono">{fmt(ce.myArea,2)} 坪</div>
            </div>
            <div>
              <div className="text-[10px] text-slate-500">取回總銷額</div>
              <div className="text-base font-black text-emerald-700 font-mono">{fmt(ce.mySalesAmount)} 萬</div>
            </div>
            <div>
              <div className="text-[10px] text-slate-500">負擔成本</div>
              <div className="text-base font-black text-rose-700 font-mono">-{fmt(ce.myTotalCost)} 萬</div>
            </div>
          </div>
        </div>
      </div>

      {/* Tab 切換 */}
      <div className="bg-white rounded-2xl border shadow-sm p-3">
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>upCB("mode","single")}
            className={"p-3 rounded-xl border-2 transition text-left "+(
              isSingle
                ? "bg-emerald-500 border-emerald-600 text-white shadow-md"
                : "bg-white border-slate-200 text-slate-700 hover:border-emerald-400"
            )}>
            <div className="text-sm font-bold inline-flex items-center gap-1.5"><Icon name="tag" size={13}/> 不動產處分效益</div>
            <div className={"text-[10px] mt-0.5 "+(isSingle?"text-emerald-100":"text-slate-500")}>全分回處分變現，計算房地合一稅後淨利</div>
          </button>
          <button onClick={()=>upCB("mode","longHold")}
            className={"p-3 rounded-xl border-2 transition text-left "+(
              !isSingle
                ? "bg-violet-500 border-violet-600 text-white shadow-md"
                : "bg-white border-slate-200 text-slate-700 hover:border-violet-400"
            )}>
            <div className="text-sm font-bold inline-flex items-center gap-1.5"><Icon name="landmark" size={13}/> 長期持有不動產效益</div>
            <div className={"text-[10px] mt-0.5 "+(!isSingle?"text-violet-100":"text-slate-500")}>部分處分 + 租金 + 營業組合效益</div>
          </button>
        </div>
      </div>

      {/* 全域設定 */}
      <div className="bg-white rounded-2xl border shadow-sm p-4">
        <div className="text-xs font-bold text-slate-500 mb-2 inline-flex items-center gap-1.5"><Icon name="settings" size={12}/> 全域設定</div>
        
        {/* 折現率 (可開啟) */}
        <div className="mb-3 p-3 bg-slate-50 rounded-lg border">
          <label className="flex items-center gap-2 cursor-pointer mb-1">
            <input type="checkbox" checked={!!cb.useDiscount} onChange={e=>upCB("useDiscount", e.target.checked)} className="w-4 h-4"/>
            <span className="text-xs font-bold text-slate-700">啟用折現計算 (進階)</span>
            <span className="text-[10px] text-slate-400">勾選後可對租金/營業效益做 NPV 折現</span>
          </label>
          {cb.useDiscount && (
            <div className="ml-6 flex items-center gap-2 mt-2">
              <span className="text-xs text-slate-600">折現率</span>
              <NI value={cb.discountRate||0} onChange={v=>upCB("discountRate",v)} step={0.1} className="w-20"/>
              <span className="text-[11px] text-slate-400">% / 年</span>
            </div>
          )}
        </div>

        {/* 持有年期 */}
        <div className="mb-3 flex items-center justify-between p-2 bg-slate-50 rounded-lg border">
          <span className="text-xs text-slate-600">持有年期 (僅模式一年化用)</span>
          <div className="flex items-center gap-1">
            <NI value={cb.holdYears||10} onChange={v=>upCB("holdYears",v)} step={1} className="w-20"/>
            <span className="text-[11px] text-slate-400">年</span>
          </div>

        {/* 處分價格預估參數 */}
        <div className="p-3 bg-amber-50 rounded-lg border border-amber-200">
          <div className="text-xs font-bold text-amber-800 mb-2 inline-flex items-center gap-1.5"><Icon name="ruler" size={12}/> 處分價格預估參數 (用於計算建議處分價)</div>
          <div className="grid grid-cols-3 gap-2 text-xs">
            <div className="bg-white rounded p-2 border">
              <div className="text-slate-600 text-[10px] mb-1">建物折舊率 (% / 年)</div>
              <div className="flex items-center gap-1">
                <NI value={cb.buildingDepRate||0} onChange={v=>upCB("buildingDepRate",v)} step={0.1} className="w-full"/>

              </div>
              <div className="text-[9px] text-slate-400 mt-0.5">依建物類型自填 (RC≈2%)</div>
            </div>
            <div className="bg-white rounded p-2 border">
              <div className="text-slate-600 text-[10px] mb-1">土地年漲幅 (% / 年)</div>
              <div className="flex items-center gap-1">

              {k:"ad", l:"廣告銷售費",   group:"sale"},
              {k:"tx", l:"稅雜費",       group:"sale"},
              {k:"mg", l:"物管費",       group:"sale"},

            ];
            const groupColor = {build:"text-amber-700", sale:"text-emerald-700", tax:"text-rose-700"};

              <div className="mb-3 p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs">

                {["sale","build","tax"].map(g => {

                  const sum = items.reduce((a,b)=>a+b.v, 0);
                  return (
                    <div key={g} className="mb-2 pb-2 border-b border-slate-200 last:border-b-0 last:pb-0 last:mb-0">
                      <div className={"text-[10px] font-bold mb-1 "+groupColor[g]}>{groupLabel[g]}</div>

                        <div key={it.k} className="flex items-center justify-between py-0.5">

// 雙滑桿即時對照: 售價 ± 造價 兩個獨立滑桿, 即時顯示對應淨利、IRR
function SliderPlayground({p, dr, basePrice, basePerPing, baseCost, baseProfit, baseDevOnlyProfit, baseIRR, includeLongHold}) {
  const [priceDelta, setPriceDelta] = useState(0);
  const [costDelta, setCostDelta] = useState(0);

  // 即時計算 (拖滑桿時)
  const result = useMemo(() => {
    const ci = getCostItems(p);
    const newCo = {...(ci.co || {}), value: (Number(ci.co?.value) || 0) * (1 + costDelta/100)};
    const priceFactor = 1 + priceDelta/100;
    const adjustCB = (cb) => {
      if (!cb || !cb.disposals) return cb;
      return {...cb, disposals: cb.disposals.map(d => ({...d, price: (Number(d.price)||0) * priceFactor}))};
    };
    const pAdj = {...p,
      uP: basePrice * priceFactor,
      cC: (p.cC || 0) * (1 + costDelta/100),
      costItems: {...ci, co: newCo},
      compBenefit: adjustCB(p.compBenefit)
    };
    const drAdj = calcDerived(pAdj);
    const snap = calcT8Snapshot(pAdj, drAdj);
    return snap;
  }, [priceDelta, costDelta, p]);

  // 取對應淨利 (依模式)
  const curProfit = includeLongHold ? result.totalProfit : result.devOnlyProfit;
  const curBaseProfit = includeLongHold ? baseProfit : baseDevOnlyProfit;
  const curIRR = result.irr;
  const profitDelta = curBaseProfit !== 0 ? ((curProfit - curBaseProfit) / Math.abs(curBaseProfit)) * 100 : 0;
  const irrDelta = baseIRR != null && curIRR != null ? (curIRR - baseIRR) * 100 : null;
  const newPrice = basePrice * (1 + priceDelta/100);
  const newCostPerPing = basePerPing * (1 + costDelta/100);

  // 色彩判斷
  const profitColor = curProfit < 0 ? "text-rose-700 bg-rose-50"
                    : curProfit < curBaseProfit * 0.5 ? "text-amber-700 bg-amber-50"
                    : curProfit < curBaseProfit ? "text-amber-700 bg-amber-50"
                    : "text-emerald-700 bg-emerald-50";
  const irrColor = curIRR == null ? "text-slate-400 bg-slate-50"
                 : curIRR < 0 ? "text-rose-700 bg-rose-50"
                 : curIRR < 0.05 ? "text-amber-700 bg-amber-50"
                 : curIRR < 0.10 ? "text-amber-700 bg-amber-50"
                 : "text-emerald-700 bg-emerald-50";

  return (
    <div className="space-y-3">
      {/* 售價滑桿 */}
      <div>
        <div className="flex items-center justify-between mb-1">
          <span className="text-xs font-bold text-slate-700 inline-flex items-center gap-1.5"><Icon name="trending-up" size={12}/> 售價變動</span>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500">當前:</span>
            <span className="font-mono font-bold text-emerald-700 text-sm">{newPrice.toFixed(2)} 萬/坪</span>
            <span className={"text-[11px] font-mono font-bold px-1.5 py-0.5 rounded "+(priceDelta>=0?"text-emerald-700 bg-emerald-100":"text-rose-700 bg-rose-100")}>
              {priceDelta>0?"+":""}{priceDelta.toFixed(1)}%
            </span>
          </div>
        </div>
        <input type="range" min="-50" max="50" step="0.5" value={priceDelta}
          onChange={e => setPriceDelta(parseFloat(e.target.value))}
          className="w-full accent-emerald-500"/>
        <div className="flex justify-between text-[9px] text-slate-400">
          <span>-50%</span>
          <span className="text-emerald-600 font-bold">基準 ({basePrice.toFixed(2)})</span>
          <span>+50%</span>
        </div>
      </div>

      {/* 造價滑桿 */}
      <div>
        <div className="flex items-center justify-between mb-1">
          <span className="text-xs font-bold text-slate-700 inline-flex items-center gap-1.5"><Icon name="hammer" size={12}/> 造價變動</span>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500">當前:</span>
            <span className="font-mono font-bold text-sky-700 text-sm">{newCostPerPing.toFixed(2)} 萬/坪</span>
            <span className={"text-[11px] font-mono font-bold px-1.5 py-0.5 rounded "+(costDelta<=0?"text-emerald-700 bg-emerald-100":"text-rose-700 bg-rose-100")}>
              {costDelta>0?"+":""}{costDelta.toFixed(1)}%
            </span>
          </div>
        </div>
        <input type="range" min="-50" max="50" step="0.5" value={costDelta}
          onChange={e => setCostDelta(parseFloat(e.target.value))}
          className="w-full accent-sky-500"/>
        <div className="flex justify-between text-[9px] text-slate-400">
          <span>-50%</span>
          <span className="text-sky-600 font-bold">基準 ({basePerPing.toFixed(2)})</span>
          <span>+50%</span>
        </div>
      </div>

      {/* 即時結果 */}
      <div className="grid grid-cols-2 gap-2 pt-2 border-t-2 border-rose-200">
        <div className={"rounded-lg p-2 border "+profitColor}>
          <div className="text-[10px] font-bold opacity-70">{includeLongHold ? "整體淨利" : "純開發淨利"}</div>
          <div className="font-mono font-black text-sm">{fmt(curProfit)} 萬</div>
          <div className="text-[9px] opacity-60">
            基準: {fmt(curBaseProfit)} | 變動: {profitDelta>0?"+":""}{profitDelta.toFixed(1)}%
          </div>
        </div>
        <div className={"rounded-lg p-2 border "+irrColor}>
          <div className="text-[10px] font-bold opacity-70">IRR</div>
          <div className="font-mono font-black text-sm">{curIRR == null ? "—" : (curIRR*100).toFixed(2)+"%"}</div>
          <div className="text-[9px] opacity-60">
            基準: {baseIRR == null ? "—" : (baseIRR*100).toFixed(2)+"%"}
            {irrDelta != null && <span> | {irrDelta>0?"+":""}{irrDelta.toFixed(2)}pp</span>}
          </div>
        </div>
      </div>

      {/* 快速重設 */}
      <div className="flex items-center justify-center gap-2">
        <button onClick={() => {setPriceDelta(0); setCostDelta(0);}}
          className="text-[10px] text-slate-500 hover:text-slate-800 underline">
          ↻ 重設為基準
        </button>
        <span className="text-[10px] text-slate-300">|</span>
        <button onClick={() => {setPriceDelta(-10); setCostDelta(10);}}
          className="text-[10px] text-rose-600 hover:text-rose-800 underline inline-flex items-center gap-1">
          <Icon name="alert-triangle" size={11}/> 悲觀情境 (-10% / +10%)
        </button>
        <span className="text-[10px] text-slate-300">|</span>
        <button onClick={() => {setPriceDelta(10); setCostDelta(-10);}}
          className="text-[10px] text-emerald-600 hover:text-emerald-800 underline inline-flex items-center gap-1">
          <Icon name="sparkles" size={11}/> 樂觀情境 (+10% / -10%)
        </button>
      </div>

      {/* 提示 */}
      {curProfit < 0 && (
        <div className="text-[10px] text-rose-700 bg-rose-50 rounded p-2 border border-rose-200 inline-flex items-start gap-1">
          <Icon name="alert-triangle" size={11} className="mt-0.5"/>
          <span><strong>當前條件下，{includeLongHold ? "整體" : "純開發"}淨利已為負</strong> (虧損 {fmt(Math.abs(curProfit))} 萬)。試著拖回基準或調整變動幅度。</span>
        </div>
      )}
      {curProfit >= 0 && curBaseProfit > 0 && curProfit < curBaseProfit * 0.2 && (
        <div className="text-[10px] text-amber-700 bg-amber-50 rounded p-2 border border-amber-200 inline-flex items-start gap-1">
          <Icon name="alert-triangle" size={11} className="mt-0.5"/>
          <span><strong>淨利已大幅縮水</strong>，當前 {fmt(curProfit)} 萬 (僅基準的 {(curProfit/curBaseProfit*100).toFixed(0)}%)。</span>
        </div>
      )}
    </div>
  );
}
