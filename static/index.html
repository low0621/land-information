                landValue 算法與原本「稅前利潤(扣土地)」那一行完全相同，只是不再中途停下顯示。 */}
            <R l="✦稅後淨利" gV={(s,c)=> {
              // 自 v235 修正: 純售地(E) 的土地價值認列已按比例扣除並內建進 s.pat（透過 cs.landValueDeduction
              //   併入 tc），這裡直接回傳 s.pat，不再額外扣一次全額 landValue，避免重複/過度扣除。
              //   容積移轉(F)與A-D維持原公式不變（全額扣除是正確的，使用者已確認）。
              if (c.scenario && c.scenario.isSpecial === "pureLandSale") return s.pat;
              // 自 v198: pat = pbt - landValue - itx（landValue=土地價值認列，itx=房地合一稅/土增稅真實或估算）
              //   landValue 算法承接原「稅前利潤(扣土地)」那一行：建商用 getOwnerLandValue(p,dr,"builder")，
              //   地主用對應 owner 的 getOwnerLandValue。itx 仍是這一個 col 的 cS() 已算好的稅額（s.itx）。
              const lv = c.role === "b"
                ? getOwnerLandValue(p, dr, "builder")
                : (() => {
                    const owner = (p.owners || []).find(o => o.id === c.ownerId);
                    return owner ? getOwnerLandValue(p, dr, owner) : 0;
                  })();
              return s.pbt - lv - s.itx;
            }} bold bg="bg-amber-50/60"/>
            <R l="毛利率" gV={s=>s.gm} isPct/><R l="淨利率" gV={s=>s.nm} isPct/><R l="成本報酬率" gV={s=>s.cr} isPct/>

            {/* 自 v225: 純售地/容積移轉改收納進「全域設定」的經營行為共用設定對話框（比照①不動產處分），
                並在【情境收益】表格裡以情境按鈕方式選取比較，這裡不再放獨立面板，只留入口提示 */}
            {((p.compBenefit?.pureLandSale?.enabled) || (p.compBenefit?.volTransfer?.enabled)) && (
              <div className="px-3 py-2 bg-slate-50 text-[10px] text-slate-500 italic">
                純售地／容積移轉的設定與交易年月，已收納到上方「全域設定」的經營行為共用設定裡；
                請到下方【情境收益】勾選對應情境即可並列比較。
              </div>
            )}

            {/* v96/v97: 情境收益 section (每 col 用 col.scenario 算; 多情境時加差值副標) */}
            <Sec l={effectiveScenarios.length === 1 ? `【情境收益 — ${effectiveScenarios[0].label}】` : `【情境收益 — ${effectiveScenarios.length} 情境並列對比, 副標差值 vs 第一情境】`} c="text-emerald-700 bg-emerald-100/50"/>
            {(() => {
              // 差值計算 helper: 找該 col 同 (allocSc, sc, role/owner) 的第一個 scenario 作為基準
              const findBaseCol = (col) => cols.find(c =>
                c.allocSc.id === col.allocSc.id &&
                c.sc.id === col.sc.id &&
                c.role === col.role &&
                c.ownerId === col.ownerId &&
                c.scenario.id === effectiveScenarios[0].id
              );
              // 取值 helper
              const getVal = (col, key) => {
                const ce = col.scenarioData?.ce;
                if (key === "pd") {
                  if (ce?.mode === "single") return ce.single?.netProfit || 0;
                  return ce?.longHold?.pd_sumNetProfit || 0;
                }
                if (key === "rent") return ce?.longHold?.rent?.npv || 0;
                if (key === "biz") return ce?.longHold?.business?.npv || 0;
                if (key === "total") return col.scenarioData?.totalProfit || 0;
                return 0;
              };
              // 差值副標渲染 (僅當多情境時)
              const renderCell = (col, i, key, isBold) => {
                const val = getVal(col, key);
                const isFirstScenario = col.scenario.id === effectiveScenarios[0].id;
                const showDiff = effectiveScenarios.length > 1 && !isFirstScenario;
                const baseCol = showDiff ? findBaseCol(col) : null;
                const baseVal = baseCol ? getVal(baseCol, key) : 0;
                const diff = val - baseVal;
                const diffPct = baseVal !== 0 ? (diff / Math.abs(baseVal)) * 100 : 0;
                return (
                  <td key={colKey(col)} className={"py-[6px] px-2 text-right "+(isBold?"font-black text-[13px]":"text-[13px]")+" font-mono "+(col.isMe?"bg-amber-50/60":col.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>
                    <div>{fmt(val)}</div>
                    {showDiff && Math.abs(diff) > 0.1 && (
                      <div className={"text-[9px] font-normal "+(diff>=0?"text-emerald-600":"text-rose-600")}>
                        {diff>=0?"+":""}{fmt(diff)} ({diff>=0?"+":""}{diffPct.toFixed(1)}%)
                      </div>
                    )}
                  </td>
                );
              };
              return (
                <>
                  <tr className="border-b border-slate-100">
                    <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">① 處分淨利 (稅後)</td>
                    {cols.map((c,i) => renderCell(c, i, "pd", false))}
                  </tr>
                  <tr className="border-b border-slate-100">
                    <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">② 租金 NPV</td>
                    {cols.map((c,i) => renderCell(c, i, "rent", false))}
                  </tr>
                  <tr className="border-b border-slate-100">
                    <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">③ 自營 NPV</td>
                    {cols.map((c,i) => renderCell(c, i, "biz", false))}
                  </tr>
                  {/* 自 v226 移除：④容移收益列。容積移轉現已是獨立情境F（可在情境按鈕勾選），
                      不再作為附加在每個情境旁邊的旁支資訊列，避免造成「這筆錢算不算進總額」的困惑。 */}
                  <tr className="border-b-2 border-slate-300 bg-emerald-50/50">
                    <td className="py-[7px] px-3 text-[13px] text-emerald-800 sticky left-0 bg-emerald-50/50 z-10 font-black">★ 綜合淨利 (情境)</td>
                    {cols.map((c,i) => renderCell(c, i, "total", true))}
                  </tr>
                </>
              );
            })()}
            {/* v95: KPI 指標列 (依所選情境算, 來源 col.scenarioData) */}
            <Sec l={effectiveScenarios.length === 1 ? `【KPI 指標 — ${effectiveScenarios[0].label}】` : `【KPI 指標 — ${effectiveScenarios.length} 情境並列】`} c="text-violet-700 bg-violet-100/50"/>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10 font-bold">IRR</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono font-bold "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{c.scenarioData?.irr==null?"—":(c.scenarioData.irr*100).toFixed(1)+"%"}</td>)}
            </tr>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">ROI</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{c.scenarioData?.roi==null?"—":(c.scenarioData.roi*100).toFixed(1)+"%"}</td>)}
            </tr>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">ROE</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{c.scenarioData?.roe==null?"—":(c.scenarioData.roe*100).toFixed(1)+"%"}</td>)}
            </tr>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">還本期</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{c.scenarioData?.payback==null?"—":Math.ceil(c.scenarioData.payback)+" 年"}</td>)}
            </tr>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">早期回收(10y)</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{c.scenarioData?.earlyRecovery10==null?"—":(c.scenarioData.earlyRecovery10*100).toFixed(1)+"%"}</td>)}
            </tr>
            <Sec l="【投資基準 (KPI 分母)】" c="text-violet-700 bg-violet-100/50"/>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">土地價值</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{fmt(c.scenarioData?.landInvest||0)}</td>)}
            </tr>
            <tr className="border-b border-slate-100">
              <td className="py-[6px] px-3 text-[13px] text-slate-700 sticky left-0 bg-white z-10">負擔成本 (出資/稅費/廣告/融資)</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono "+(c.isMe?"bg-amber-50/60":c.role==="b"?"bg-emerald-50/30":"bg-sky-50/30")}>{fmt((c.scenarioData?.burdenCost||0)+(c.scenarioData?.ll||0)+(c.scenarioData?.cl||0))}</td>)}
            </tr>
            <tr className="border-b-2 border-slate-300 bg-violet-50/40">
              <td className="py-[6px] px-3 text-[13px] text-violet-800 sticky left-0 bg-violet-50/40 z-10 font-bold">投資基準合計</td>
              {cols.map((c,i) => <td key={colKey(c)} className={"py-[6px] px-2 text-right text-[13px] font-mono font-bold "+(c.isMe?"bg-amber-50/60":"text-violet-800")}>{fmt((c.scenarioData?.landInvest||0)+(c.scenarioData?.burdenCost||0)+(c.scenarioData?.ll||0)+(c.scenarioData?.cl||0))}</td>)}
            </tr>
            <Sec l="【融資】" c="text-emerald-700 bg-sky-100/50"/>
            <R l="土融" gV={s=>s.ll}/><R l="建融" gV={s=>s.cl}/><R l="融資合計" gV={s=>s.tl} bold/><R l="自有資金" gV={s=>s.eq} bold bg="bg-slate-50"/>
          </tbody>
        </table>
      </div></div>

      {/* ─── 經營分析摘要區塊已移至 T8 內投資指標儀表板上方 (v143) ─── */}


      <div className="mt-8 border-t-4 border-double border-amber-400 pt-6">
        <div className="bg-gradient-to-r from-amber-100 to-amber-100 rounded-xl p-3 mb-4 border-2 border-amber-300">
          <div className="text-base font-black text-amber-900 inline-flex items-center gap-2"><Icon name="files" size={16}/> 投資綜合報告 (整合視角)</div>
          <div className="text-[11px] text-amber-700 mt-1">
            ※ 上方損益表為「<b>立即處分</b>」情境下的固定售價試算，主要用於檢核建商提供的參數真假。<br/>
            ※ 下方投資綜合報告整合了「處置情境」的長期持有/處分策略、未來價格變動，提供完整投資指標。
          </div>
        </div>
        <T8 p={p} sP={sP}/>
      </div>

      {/* 自 v109 (階段2): 經營行為編輯 dialog */}
      {editTarget && (() => {
        const cb = p.compBenefit || {};
        // 自 v114 (階段3a): 房屋類型選項 (供處分/租金/營業標記類型 + 帶預設單價)
        const sm = dr.salesMix;
        const catOptions = [
          { catKey: "res",    label: sm.res.label    || "住宅", uP: sm.res.uP },
          { catKey: "retail", label: sm.retail.label || "店面", uP: sm.retail.uP },
          { catKey: "office", label: sm.office.label || "辦公", uP: sm.office.uP },
          ...(sm.customCategories || []).map(c => ({ catKey: c.id, label: c.label, uP: c.uP }))
        ];
        // ── 自 v145: 計算「分析目標」自由組合的分類型部位明細 (房屋面積 + 車位數); 群組則加總 ──
        const _myRole = p.myRole || "builder";
        const _catLabel = (k) => {
          if (k === "res") return sm.res.label || "住宅";
          if (k === "retail") return sm.retail.label || "店面";
          if (k === "office") return sm.office.label || "辦公";
          if (k === "park_flat") return "平面車位";
          if (k === "park_mech") return "機械車位";
          const c = (sm.customCategories || []).find(x => x.id === k);
          return c ? c.label : k;
        };
        const _parkUP = { park_flat: sm.flat?.uP || 0, park_mech: sm.mechanical?.uP || 0 };
        const _catUP = { res: sm.res.uP, retail: sm.retail.uP, office: sm.office.uP };
        (sm.customCategories || []).forEach(c => { _catUP[c.id] = c.uP; });
        // 收集要計算的 shareInfo 紀錄 (個別=1筆; 群組=成員多筆)
        let _recs = [];
        if (_myRole.startsWith("group_")) {
          const _gid = _myRole.slice(6);
          const _g = (p.selectGroups || []).find(x => String(x.id) === String(_gid));
          _recs = _g ? (_g.members || []).map(mid => (dr.shareInfo || []).find(x => String(x.key) === ("owner_" + mid))).filter(Boolean) : [];
        } else {
          const _r = (dr.shareInfo || []).find(x => String(x.key) === _myRole);
          if (_r) _recs = [_r];
        }
        // 加總各類型: 房屋類別累加面積(坪); 車位類別累加數量(位)
        const _areaByCat = {};   // 房屋: 坪
        const _countByCat = {};  // 車位: 位
        let _hasComp = false;
        _recs.forEach(r => {
          if (!r.compMode || !Array.isArray(r.compItems)) return;
          _hasComp = true;
          const _alloc = Number(r.allocValue) || 0;
          r.compItems.forEach(it => {
            const isRatio = it.mode === "ratio";
            if (it.catKey === "park_flat" || it.catKey === "park_mech") {
              const up = Number(_parkUP[it.catKey]) || 0;
              const cnt = isRatio ? (up > 0 ? ((Number(it.ratio)||0) * _alloc) / up : 0) : (Number(it.count) || 0);
              _countByCat[it.catKey] = (_countByCat[it.catKey] || 0) + cnt;
            } else if (it.catKey) {
              let a;
              if (isRatio) {
                const up = Number(_catUP[it.catKey]) || 0;
                const _up = up > 0 ? up : (Number(dr.weightedUP) || 0);
                a = (_alloc > 0 && _up > 0) ? ((Number(it.ratio)||0) * _alloc) / _up : 0;
              } else { a = Number(it.area) || 0; }
              _areaByCat[it.catKey] = (_areaByCat[it.catKey] || 0) + a;
            }
          });
        });
        const _typeDetail = _hasComp ? {
          isGroup: _myRole.startsWith("group_"),
          memberCount: _recs.length,
          areas: Object.keys(_areaByCat).map(k => ({ label: _catLabel(k), area: _areaByCat[k] })).filter(x => x.area > 0.01),
          counts: Object.keys(_countByCat).map(k => ({ label: _catLabel(k), count: _countByCat[k] })).filter(x => x.count > 0.01)
        } : null;
        if (editTarget.type === "base") {
          return (
            <CompBenefitDialog
              title="經營行為共用設定 (租金/營業/處分售價 · 自訂情境範本)"
              data={cb}
              defaultPrice={Number(p.salesMix?.res?.uP) || Number(p.uP) || 0}
              catOptions={catOptions}
              typeDetail={_typeDetail}
              onChange={(nd) => sP({...p, compBenefit: nd})}
              onClose={() => setEditTarget(null)}
            />
          );
        }
        // custom
        const cs = (cb.customScenarios || []).find(c => c.id === editTarget.id);
        if (!cs) { return null; }
        return (
          <CompBenefitDialog
            title={`自訂情境「${cs.label}」— 經營行為設定`}
            data={cs}
            defaultPrice={Number(p.salesMix?.res?.uP) || Number(p.uP) || 0}
            catOptions={catOptions}
            typeDetail={_typeDetail}
            onChange={(nd) => sP({...p, compBenefit: {...cb, customScenarios: (cb.customScenarios||[]).map(c => c.id === editTarget.id ? {...nd, id: c.id, label: c.label, _full: true} : c)}})}
            onClose={() => setEditTarget(null)}
          />
        );
      })()}

      {/* 自 v113 (階段2): 分配方案自由組合編輯 dialog */}
      {editCompAllocId && (() => {
        const asc = (p.allocScenarios || []).find(a => a.id === editCompAllocId);
        if (!asc) return null;
        return (
          <ShareCompositionDialog
            title={`分配方案「${asc.label}」— 自由組合分回`}
            p={p}
            asc={asc}
            onChange={(newByRole) => sP({...p, allocScenarios: p.allocScenarios.map(a => a.id === editCompAllocId ? {...a, shareComposition: { byRole: newByRole }} : a)})}
            onClose={() => setEditCompAllocId(null)}
          />
        );
      })()}
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 3: 現金流 (年度視圖, Chart.js 圖表, 重要時間點)
   - 銀行視角(地主): 只看年度收支與時間點, 隱藏資金破口
   - 建商視角: 同上 + 月度資金破口分析 (可展開)
════════════════════════════════════════ */
function T3({p, sP}) {
  const dr = calcDerived(p);
  const _t8 = p.t8 || {};
  const setLandPurchased = (v) => sP && sP({ ...p, t8: { ..._t8, landPurchased: v } });
  // 根據「我的身分」決定 sc 用哪個視角
  const myRole = p.myRole || "builder";
  const isMyBuilder = (myRole === "builder");
  const myOwner = (myRole.startsWith("owner_") && p.jb)
    ? p.owners.find(o => ("owner_"+o.id) === myRole)
    : null;
  const sc = useMemo(() => {
    return myOwner
      ? cS(p, dr, dr.weightedUP, p.cC, "o", myOwner.ratio)
      : cS(p, dr, dr.weightedUP, p.cC, "b", 0);
  }, [p]);
  const mcf = useMemo(() => cMCF(p, dr, sc), [p, sc]);
  const {months, minBal, maxGap, totalM} = mcf;

  // T8 整合指標 (從 calcT8Snapshot 拿 IRR、ROI、回收期、完整年度現金流)
  const snap = useMemo(() => calcT8Snapshot(p, dr), [p]);

  // 年度現金流: 來自 snap.cashflowsDetailed (含開發期 + 處分 + 租金 + 營業)
  // 與舊 cMCF 月度資料不同, 涵蓋完整投資週期 (含長期持有 20 年)
  // 視角依「我的身分」: snap 已套用 ce.myCs (建商或地主)
  // 注意: 融資撥款/還款不在 snap.cashflows 內 (僅用於開發期月度資金破口分析)
  //       T3 上方 KPI 與年度圖以「經營分析期」為基準, 不含融資週轉
  const yearly = useMemo(() => {
    const list = snap.cashflowsDetailed || [];
    // 對應到 T3 期望的欄位 (補 loanDraw, loanRepay = 0)
    return list.map(d => ({
      year: d.year,
      income: d.income,
      expense: d.expense,
      loanDraw: 0,
      loanRepay: 0,
      net: d.net,
      cum: d.cum,
      byCat: d.byCat || {}
    }));
  }, [snap]);

  // 重要時間點: 費用時程階段 + 處分時點
  const milestones = useMemo(() => {
    const list = [];
    // 費用時程階段 (建商視角才看得到開發支出時點)
    (p.expPeriods || []).forEach(ep => {
      list.push({
        date: `${ep.year}/${String(ep.month).padStart(2,"0")}`,
        absDate: ep.year * 12 + ep.month,
        label: ep.label || "費用階段",
        type: "expense",
        icon: "upload",
        note: "開發階段付款"
      });
    });
    // 處分時點
    const cb = p.compBenefit || {};
    if (cb.mode === "longHold" && cb.disposals) {
      cb.disposals.filter(d => d.enabled).forEach(d => {
        list.push({
          date: `${d.year}/${String(d.month).padStart(2,"0")}`,
          absDate: d.year * 12 + d.month,
          label: d.label || "處分",
          type: "income",
          icon: "download",
          note: `面積 ${d.area} 坪 × ${d.useSuggested ? "自動建議價" : (d.price + " 萬/坪")}`
        });
      });
    }
    // 取得日期 (single 模式)
    // 自 v67: 優先用交屋日, fallback 銷售時程最後一期
    if (cb.mode === "single") {
      const hd = p.handoverDate || {};
      const hdY = Number(hd.year) || 0;
      const hdM = Number(hd.month) || 0;
      let useY, useM, useLabel;
      if (hdY > 0 && hdM > 0) {
        useY = hdY; useM = hdM; useLabel = "成屋/交屋";
      } else if (p.salesSched && p.salesSched.length > 0) {
        const last = [...p.salesSched].sort((a,b) => (b.year*12+b.month) - (a.year*12+a.month))[0];
        useY = last.year; useM = last.month; useLabel = "成屋/取得 (依銷售時程)";
      }
      if (useY && useM) {
        list.push({
          date: `${useY}/${String(useM).padStart(2,"0")}`,
          absDate: useY * 12 + useM,
          label: useLabel,
          type: "income",
          icon: "key",
          note: hdY > 0 ? "交屋日 (基本假設三)" : "未設定交屋日, 用銷售時程末期"
        });
      }
    }
    // 自 v67: longHold 模式也顯示交屋日 (若設定)
    if (cb.mode === "longHold") {
      const hd = p.handoverDate || {};
      const hdY = Number(hd.year) || 0;
      const hdM = Number(hd.month) || 0;
      if (hdY > 0 && hdM > 0) {
        list.push({
          date: `${hdY}/${String(hdM).padStart(2,"0")}`,
          absDate: hdY * 12 + hdM,
          label: "交屋",
          type: "income",
          icon: "key",
          note: "交屋日 (基本假設三)"
        });
      }
    }
    return list.sort((a,b) => a.absDate - b.absDate);
  }, [p]);

  // Chart.js: 年度收支長條圖 + 累計折線
  const chartRef = React.useRef(null);
  const chartInstance = React.useRef(null);
  useEffect(() => {
    if (!chartRef.current || !window.Chart || yearly.length === 0) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const ctx = chartRef.current.getContext("2d");
    chartInstance.current = new window.Chart(ctx, {
      type: "bar",
      data: {
        labels: yearly.map(y => y.year),
        datasets: [
          {
            label: "收入",
            data: yearly.map(y => y.income),
            backgroundColor: "rgba(139,155,110,0.65)",
            borderColor: "rgba(139,155,110,1)",
            borderWidth: 1,
            order: 2,
          },
          {
            label: "支出",
            data: yearly.map(y => -y.expense),
            backgroundColor: "rgba(188,97,73,0.65)",
            borderColor: "rgba(188,97,73,1)",
            borderWidth: 1,
            order: 2,
          },
          {
            label: "累計餘額",
            type: "line",
            data: yearly.map(y => y.cum),
            borderColor: "rgba(106,104,95,1)",
            backgroundColor: "rgba(106,104,95,0.12)",
            borderWidth: 2,
            fill: false,
            tension: 0.2,
            pointRadius: 4,
            order: 1,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "top", labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString(undefined, {maximumFractionDigits: 0})} 萬`
            }
          }
        },
        scales: {
          x: { stacked: true, grid: { display: false } },
          y: { stacked: false, ticks: { callback: (v) => v.toLocaleString() + "萬" } }
        }
      }
    });
    return () => {
      if (chartInstance.current) chartInstance.current.destroy();
    };
  }, [yearly]);

  // 投資年期 (年數) — 來自 cashflows 完整週期
  const investYears = yearly.length;
  // 分析模式 (依使用者在投資綜合報告中的選擇)
  const analysisMode = (p.t8 && p.t8.analysisMode) || "disposal";
  const modeLabel = analysisMode === "holdComplete" ? "完整持有" : "處分損益";

  // KPI: 統一用 snap (依分析模式), 與投資綜合報告儀表板一致
  return (
    <div className="space-y-5">
      {/* 上方 KPI — 統一用 snap 系列指標 (依「分析模式」變動) */}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <KPI label="稅後淨利" value={fmt(snap.totalProfit)} unit="萬" color={snap.totalProfit<0?"text-rose-700":"text-emerald-700"} bg={snap.totalProfit<0?"bg-rose-50/80":"bg-emerald-50/80"}/>
        <KPI label="ROI" value={(snap.burdenCost+snap.ll+snap.cl)>0 ? (snap.roi*100).toFixed(1)+"%" : "—"} color="text-tan-700" bg="bg-tan-50/80"/>
        <KPI label="IRR" value={snap.irr==null?"—":(snap.irr*100).toFixed(2)+"%"} color="text-tan-700" bg="bg-tan-50/80"/>
        <KPI label="還本期" value={snap.payback==null?"—":Math.ceil(snap.payback)+" 年"} color="text-emerald-700" bg="bg-sky-50/80"/>
        <KPI label="投資年期" value={investYears} unit="年" color="text-slate-800" bg="bg-slate-50/80"/>
      </div>
      <div className="text-[10px] text-slate-500 italic -mt-2">
        ※ 指標以「{modeLabel}」模式計算 (與投資綜合報告儀表板一致, 可在投資綜合報告「分析模式」下拉切換)
      </div>

      {/* 年度現金流圖 */}
      <Card title="年度現金流圖" accent="bg-violet-700" icon="trending-up">
        <div className="text-[10px] text-slate-500 italic mb-2">
          視角: <b>{myOwner ? myOwner.name : "建商"}</b>
          {myOwner && <span> (分回 {(myOwner.ratio*100).toFixed(2)}%)</span>}
          ・ 綠色長條=年度收入(處分/租金/營業)・紅色長條=年度支出(開發成本/稅費)・紫線=累計餘額
        </div>
        <div style={{height: "320px", position: "relative"}}>
          <canvas ref={chartRef}/>
        </div>
      </Card>

      {/* 年度現金流明細表 */}
      <Card title="年度現金流明細" accent="bg-slate-700" icon="clipboard">
        {!isMyBuilder && (
          <div className="mb-3 bg-amber-50 rounded-lg border border-amber-200 p-2.5">
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div className="text-[11px] text-amber-800">
                <span className="font-bold">土地價值是否計入現金流?</span><br/>
                <span className="text-[10px] text-amber-600">合建提供土地 (非購地) 實質未投入現金 → 預設抽離; 若為購地案再勾選計入</span>
              </div>
              <div className="flex gap-1.5">
                <button onClick={()=>setLandPurchased(false)}
                  className={"px-2.5 py-1.5 rounded-lg border text-[11px] font-bold "+(!_t8.landPurchased?"bg-emerald-600 text-white border-emerald-600":"bg-white text-slate-500 border-slate-300")}>
                  提供土地 (抽離)
                </button>
                <button onClick={()=>setLandPurchased(true)}
                  className={"px-2.5 py-1.5 rounded-lg border text-[11px] font-bold "+(_t8.landPurchased?"bg-sky-600 text-white border-sky-600":"bg-white text-slate-500 border-slate-300")}>
                  購地案 (計入)
                </button>
              </div>
            </div>
            <div className="text-[9px] text-slate-500 mt-1.5 italic">
              ※ IRR 仍以「含土地」算法計算 (土地視為機會成本投入), 不受此設定影響; 此設定僅影響現金流明細表的逐年支出顯示。
            </div>
          </div>
        )}
        <div className="text-[10px] text-slate-500 italic mb-2">
          完整投資週期年度資料 (依分析模式自動含/不含營業及租金)。融資撥款還款不在此處列示, 請見下方資金破口分析 (僅建商視角)。
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-emerald-600 text-white">
                <th className="py-2 px-2 text-center">年度</th>
                <th className="py-2 px-2 text-right">開發支出</th>
                <th className="py-2 px-2 text-right">處分收入</th>
                <th className="py-2 px-2 text-right">租金</th>
                <th className="py-2 px-2 text-right">營業</th>
                <th className="py-2 px-2 text-right border-l">當年淨流量</th>
                <th className="py-2 px-2 text-right">累計餘額</th>
              </tr>
            </thead>
            <tbody>
              {yearly.map((y, i) => {
                const cat = y.byCat || {};
                const devOut = (cat.dev_cost || 0) + (cat.dev_tax || 0);  // 都是負值
                const disp = (cat.dev_sales || 0) + (cat.disposal || 0);
                const rent = cat.rent || 0;
                const biz = cat.business || 0;
                return (
                  <tr key={y.year} className="border-b border-slate-100">
                    <td className="py-1.5 px-2 text-center font-bold">{y.year}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-rose-700">{Math.abs(devOut) > 0.5 ? fmt(devOut) : "—"}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-emerald-700">{disp > 0.5 ? fmt(disp) : "—"}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-emerald-600">{rent > 0.5 ? fmt(rent) : "—"}</td>
                    <td className="py-1.5 px-2 text-right font-mono text-emerald-600">{biz > 0.5 ? fmt(biz) : "—"}</td>
                    <td className={"py-1.5 px-2 text-right font-mono font-bold border-l "+(y.net<0?"text-rose-700":"text-emerald-700")}>{fmt(y.net)}</td>
                    <td className={"py-1.5 px-2 text-right font-mono font-bold "+(y.cum<0?"text-rose-700 bg-rose-50":"text-emerald-700")}>{fmt(y.cum)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {/* 重要時間點 */}
      <Card title="重要時間點" accent="bg-amber-700" icon="calendar">
        <div className="text-[10px] text-slate-500 italic mb-3">
          列出所有需付款的時間點與處分收入時點。
        </div>
        <div className="space-y-1.5">
          {milestones.map((m, i) => (
            <div key={i} className={"flex items-center gap-3 p-2 rounded border "+(m.type==="income"?"bg-emerald-50 border-emerald-200":"bg-rose-50 border-rose-200")}>
              <Icon name={m.icon} size={18}/>
              <span className="font-mono font-bold text-slate-700 w-20">{m.date}</span>
              <span className="flex-1 font-bold text-slate-800">{m.label}</span>
              <span className="text-[11px] text-slate-500">{m.note}</span>
            </div>
          ))}
          {milestones.length === 0 && (
            <div className="text-xs text-slate-400 italic text-center py-4">無時間點 (請至「基本假設」設定費用時程)</div>
          )}
        </div>
      </Card>

      {/* 資金破口分析 (僅建商視角顯示) */}
      {isMyBuilder && (
        <Card title="自有資金破口分析 (建商視角)" accent="bg-rose-700" icon="alarm-circle">
          <div className="text-[10px] text-slate-500 italic mb-3">
            月度資金流量分析, 用於檢視建商各月份是否有資金缺口。地主視角已自動隱藏此區塊。
          </div>
          <div className="flex flex-wrap gap-3 mb-3">
            {[
              ["期初資金",fmt(p.initCash)+"萬","text-slate-800","bg-slate-50"],
              ["最低餘額",fmt(minBal)+"萬",minBal<0?"text-rose-700":"text-emerald-700","bg-slate-50"],
              ["資金缺口",maxGap>0?fmt(maxGap)+"萬":"無缺口",maxGap>0?"text-rose-800":"text-emerald-700",maxGap>0?"bg-rose-50":"bg-emerald-50"],
              ["建議資金",fmt(Math.max(maxGap,0)+(p.initCash||3000))+"萬","text-emerald-800","bg-sky-50"]
            ].map(([l,v,c,bg],i) => (
              <div key={i} className={"flex-1 min-w-[120px] "+bg+" rounded-xl p-3 border"}><div className="text-[10px] text-slate-400">{l}</div><div className={"font-black text-lg "+c}>{v}</div></div>
            ))}
          </div>
          <div className="text-xs font-bold text-slate-500 mb-1">月度累計餘額走勢</div>
          <div className="h-24 flex items-end gap-px overflow-x-auto">
            {months.map((m,i) => {
              const mx = Math.max(...months.map(x=>Math.abs(x.cm)), 1);
              return <div key={i} className={"rounded-t-sm "+(m.cm<0?"bg-rose-400":"bg-emerald-400")} style={{width:(100/totalM)+"%",minWidth:3,height:Math.max(Math.abs(m.cm)/mx*100,2)+"%"}} title={m.label+": "+fmt(m.cm)+"萬"}/>
            })}
          </div>
          <div className="flex justify-between text-[9px] text-slate-400 mt-1"><span>{months[0]?.label}</span><span>{months[totalM-1]?.label}</span></div>
        </Card>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 4: 敏感度 (動態跨度矩陣 + 雙滑桿即時對照 + 彈性指數 + 臨界點)
════════════════════════════════════════ */
function T4({p, sP}) {
  const dr = calcDerived(p);

  // 我的身分 & 對應 cS 計算函式
  const myRole = p.myRole || "builder";
  const myOwner = (myRole.startsWith("owner_") && p.jb)
    ? p.owners.find(o => ("owner_"+o.id) === myRole)
    : null;
  // 自 v64/v107: 敏感度套用範圍 = inSensitivity=true 的類別 (預設僅住宅)
  //   resToWeighted: 對 inSens 類別套用 factor (= newResPrice / oldResPrice), 其他保持原 uP
  //   basePrice 仍是 res.uP (T4 控制軸固定為住宅單價, 為向下相容)
  const _isInSens = (c, defaultKey) => (c?.inSensitivity !== undefined) ? !!c.inSensitivity : (defaultKey === "res");
  const _resCat    = dr.salesMix.res;
  const _retailCat = dr.salesMix.retail;
  const _officeCat = dr.salesMix.office;
  const _customCats = dr.salesMix.customCategories || [];
  const _houseArea = dr.salesMix.houseArea;
  const _basePriceForFactor = Number(p.salesMix?.res?.uP) || Number(p.uP) || 0;
  const resToWeighted = (resPrice) => {
    if (_houseArea <= 0) return resPrice;
    const factor = _basePriceForFactor > 0 ? resPrice / _basePriceForFactor : 1;
    const apply = (catParam, mixCat, defaultKey) => {
      const adjUP = _isInSens(catParam, defaultKey) ? mixCat.uP * factor : mixCat.uP;
      return adjUP * mixCat.area;
    };
    let totalSales = 0;
    totalSales += apply(p.salesMix?.res,    _resCat,    "res");
    totalSales += apply(p.salesMix?.retail, _retailCat, "retail");
    totalSales += apply(p.salesMix?.office, _officeCat, "office");
    _customCats.forEach((c, i) => {
      const cParam = p.salesMix?.customCategories?.[i];
      totalSales += apply(cParam, c, c.id);
    });
    return totalSales / _houseArea;
  };
  const csFor = (resPrice, cost) => {
    const eqWeightedUP = resToWeighted(resPrice);
    return myOwner
      ? cS(p, dr, eqWeightedUP, cost, "o", myOwner.ratio)
      : cS(p, dr, eqWeightedUP, cost, "b", 0);
  };

  // 基準: 住宅單價
  const basePrice = Number(p.salesMix?.res?.uP) || Number(p.uP) || 0;
  const baseCost = Number(p.cC) || 0;
  const baseProfit = useMemo(() => csFor(basePrice, baseCost).pat, [p]);

  // 動態跨度: 預設 ±10%, 可新增/移除
  const [ranges, setRanges] = useState([10]);  // 跨度百分比陣列, 例如 [10, 20] 表示 ±10% + ±20%
  const addRange = (r) => {
    if (!ranges.includes(r)) setRanges([...ranges, r].sort((a,b) => a-b));
  };
  const removeRange = (r) => {
    if (ranges.length > 1) setRanges(ranges.filter(x => x !== r));
  };
  const [customRange, setCustomRange] = useState(15);

  // 矩陣計算 (動態跨度)
  // 步長: 跨度 / 2, 5 個點 (-X, -X/2, 0, +X/2, +X)
  const matrices = useMemo(() => {
    return ranges.map(range => {
      const steps = [-range, -range/2, 0, range/2, range];
      const priceSteps = steps.map(s => basePrice * (1 + s/100));
      const costSteps = steps.map(s => baseCost * (1 + s/100));
      const matrix = priceSteps.map(pr => costSteps.map(cc => csFor(pr, cc).pat));
      return { range, steps, priceSteps, costSteps, matrix };
    });
  }, [ranges, p]);

  // 色階閾值: 依基準淨利動態分檔
  const baseAbs = Math.max(Math.abs(baseProfit), 1);
  const colorFor = (v) => {
    const ratio = v / baseAbs;
    if (v < 0) {
      if (ratio < -0.5) return "bg-rose-700 text-white";
      if (ratio < -0.2) return "bg-rose-500 text-white";
      return "bg-rose-200 text-rose-900";
    }
    if (ratio > 1.5) return "bg-emerald-700 text-white";
    if (ratio > 1.0) return "bg-emerald-500 text-white";
    if (ratio > 0.5) return "bg-emerald-300 text-emerald-950";
    if (ratio > 0.2) return "bg-emerald-100 text-emerald-800";
    return "bg-amber-100 text-amber-900";
  };

  return (
    <div className="space-y-5">
      {/* ─── 設定列 ─── */}
      <div className="bg-gradient-to-r from-violet-50 to-violet-50 rounded-2xl border-2 border-violet-300 p-4">
        <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
          <div>
            <div className="text-sm font-bold text-violet-800 inline-flex items-center gap-1.5"><Icon name="target" size={13}/> 敏感度分析</div>
            <div className="text-[11px] text-violet-600 mt-0.5">
              基準: 住宅售價 <b>{basePrice.toFixed(2)}</b> 萬/坪 · 造價 <b>{baseCost.toFixed(2)}</b> 萬/坪 · 基準淨利 <b className={baseProfit<0?"text-rose-700":"text-emerald-700"}>{fmt(baseProfit)}</b> 萬
              <span className="ml-1 text-[10px] text-amber-700">(僅住宅單價變動, 店面/辦公售價固定)</span>
            </div>
          </div>
          <div className="text-[10px] text-slate-500 italic">
            視角: <b>{myOwner ? myOwner.name : "建商"}</b>
            {myOwner && <span> (分回 {(myOwner.ratio*100).toFixed(2)}%)</span>}
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-[11px] text-slate-600 font-bold">已啟用跨度:</span>
          {ranges.map(r => (
            <span key={r} className="inline-flex items-center gap-1 bg-violet-200 text-violet-800 text-[11px] font-bold px-2 py-1 rounded-full">
              ±{r}%
              {ranges.length > 1 && (
                <button onClick={() => removeRange(r)} className="ml-1 hover:text-rose-600 inline-flex items-center"><Icon name="x" size={10}/></button>
              )}
            </span>
          ))}
          <span className="text-[10px] text-slate-400 mx-1">|</span>
          <span className="text-[11px] text-slate-600">快速新增:</span>
          {[5, 15, 20, 25, 30, 50].filter(r => !ranges.includes(r)).map(r => (
            <button key={r} onClick={() => addRange(r)}
              className="text-[11px] bg-white hover:bg-violet-100 border border-violet-300 text-violet-700 font-bold px-2 py-1 rounded-full">
              +±{r}%
            </button>
          ))}
          <span className="text-[10px] text-slate-400 mx-1">|</span>
          <span className="text-[11px] text-slate-600">自訂:</span>
          <input type="number" value={customRange} onChange={e => setCustomRange(parseFloat(e.target.value)||0)}
            min="1" max="100" step="1"
            className="field-sizing-content w-full w-14 text-[11px] border border-violet-300 rounded px-1 py-0.5 text-center"/>
          <span className="text-[10px] text-slate-500">%</span>
          <button onClick={() => addRange(customRange)}
            className="text-[11px] bg-violet-600 hover:bg-violet-700 text-white font-bold px-2 py-1 rounded-full">
            + 新增
          </button>
        </div>
      </div>

      {/* ─── 矩陣 (一個跨度一個) ─── */}
      {matrices.map(({range, steps, priceSteps, costSteps, matrix}) => (
        <div key={range} className="bg-white rounded-2xl border shadow-sm overflow-hidden">
          <div className="px-4 py-3 bg-gradient-to-r from-violet-100 to-violet-100 border-b">
            <div className="text-sm font-bold text-violet-800 inline-flex items-center gap-1.5"><Icon name="bar-chart-3" size={13}/> 跨度 ±{range}% 矩陣 (稅後淨利, 萬元)</div>
            <div className="text-[10px] text-slate-500 italic mt-0.5">
              縱軸=售價變動, 橫軸=造價變動。中央粗框為基準值。
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-emerald-600 text-white">
                  <th className="py-2 px-2 text-center sticky left-0 bg-emerald-600 z-10 font-bold" style={{minWidth:90}}>售價↓ \ 造價→</th>
                  {steps.map((s, i) => (
                    <th key={i} className={"py-2 px-2 text-center font-bold "+(s===0?"bg-sky-600":"")} style={{minWidth:80}}>
                      <div>{costSteps[i].toFixed(2)}</div>
                      <div className="text-[9px] opacity-70">{s>0?"+":""}{s.toFixed(1)}%</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {steps.map((sp, ri) => (
                  <tr key={ri}>
                    <td className={"py-2 px-2 text-center font-bold sticky left-0 z-10 "+(sp===0?"bg-sky-100 text-emerald-800":"bg-slate-100 text-slate-600")}>
                      <div>{priceSteps[ri].toFixed(2)}</div>
                      <div className="text-[9px] opacity-70">{sp>0?"+":""}{sp.toFixed(1)}%</div>
                    </td>
                    {matrix[ri].map((v, ci) => (
                      <td key={ci} className={"py-2 px-1 text-center font-mono font-bold text-[12px] "+colorFor(v)+(steps[ci]===0&&sp===0?" ring-2 ring-sky-500 ring-inset":"")}>
                        {fmt(v)}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-4 py-2 bg-slate-50 border-t flex flex-wrap gap-2">
            <span className="text-[10px] font-bold text-slate-600">色階 (相對基準淨利):</span>
            {[
              ["bg-emerald-700","> 150%"],
              ["bg-emerald-500","100~150%"],
              ["bg-emerald-300","50~100%"],
              ["bg-emerald-100","20~50%"],
              ["bg-amber-100","0~20%"],
              ["bg-rose-200","虧損 0~20%"],
              ["bg-rose-500","虧損 20~50%"],
              ["bg-rose-700","虧損 > 50%"]
            ].map(([b,l],i) => (
              <span key={i} className="flex items-center gap-1 text-[10px] text-slate-500">
                <span className={"w-3 h-3 rounded "+b+" border border-slate-300"}/>{l}
              </span>
            ))}
          </div>
        </div>
      ))}

      {/* ─── 雙滑桿即時對照 + 彈性 + 臨界點 ─── */}
      <SliderAndElasticityBlock p={p} sP={sP} dr={dr} basePrice={basePrice} baseCost={baseCost}/>
    </div>
  );
}

// 包裝: 雙滑桿即時對照 + 彈性指數 + 臨界點 (從原 T8 內搬過來)
function SliderAndElasticityBlock({p, sP, dr, basePrice, baseCost}) {
  const snap = calcT8Snapshot(p, dr);
  // 敏感度計算用 debounce 延後 500ms (避免拖滑桿時卡頓)
  const [sensitivity, setSensitivity] = useState(() => calcT8Sensitivity(p, dr));
  useEffect(() => {
    const timer = setTimeout(() => {
      setSensitivity(calcT8Sensitivity(p, dr));
    }, 500);
    return () => clearTimeout(timer);
  }, [p]);

  const [includeLongHold, setIncludeLongHold] = useState(false);

  // 取對應臨界點
  const bp = sensitivity.breakPoints;
  const pp = includeLongHold ? bp.priceForProfit_full : bp.priceForProfit_dev;
  const cp = includeLongHold ? bp.costForProfit_full : bp.costForProfit_dev;
  const ppIRR = bp.priceForIRR;
  const cpIRR = bp.costForIRR;
  const allNull = pp == null && cp == null && ppIRR == null && cpIRR == null;

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
      {/* 雙滑桿即時對照 (橫跨 2 欄) */}
      <div className="lg:col-span-2 bg-gradient-to-br from-rose-50 to-amber-50 rounded-xl p-3 border-2 border-rose-300">
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs font-bold text-rose-700 inline-flex items-center gap-1.5"><Icon name="target" size={12}/> 即時情境試算 (拖動滑桿)</div>
          <label className="flex items-center gap-1 text-[10px] cursor-pointer bg-white/60 px-2 py-0.5 rounded border border-rose-300">
            <input type="checkbox" checked={includeLongHold} onChange={e => setIncludeLongHold(e.target.checked)} className="w-3 h-3"/>
            <span className="text-rose-700 font-bold">含長期收益</span>
          </label>
        </div>
        <div className="text-[10px] text-slate-500 italic mb-3">
          {includeLongHold ? "含租金/營業收益, 評估「整體案件」淨利" : "純開發評估: 處分收益 vs 開發成本 (推薦)"}
        </div>
        <SliderPlayground
          p={p} dr={dr}
          basePrice={sensitivity.basePrice}
          basePerPing={sensitivity.basePerPing}
          baseCost={sensitivity.baseCost}
          baseProfit={snap.totalProfit}
          baseDevOnlyProfit={snap.devOnlyProfit}
          baseIRR={snap.irr}
          includeLongHold={includeLongHold}
        />
      </div>

      {/* 彈性 + 臨界點 (右欄) */}
      <div className="space-y-3">
        {/* 彈性指數 */}
        <div className="bg-gradient-to-br from-violet-50 to-violet-50 rounded-xl p-3 border-2 border-violet-300">
          <div className="text-xs font-bold text-violet-700 mb-2 inline-flex items-center gap-1.5"><Icon name="ruler" size={12}/> 彈性指數</div>
          <div className="text-[10px] text-slate-500 italic mb-2">
            彈性 = 「目標%變化」÷「售價/造價%變化」
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="border-b border-violet-200">
                <th className="text-left py-1 text-violet-600">變數</th>
                <th className="text-right py-1 text-violet-600">對 IRR</th>
                <th className="text-right py-1 text-violet-600">對淨利</th>
              </tr>
            </thead>
            <tbody>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-700">售價</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.priceIRR == null ? "—" : sensitivity.elasticity.priceIRR.toFixed(2)}</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.priceProfit == null ? "—" : sensitivity.elasticity.priceProfit.toFixed(2)}</td>
              </tr>
              <tr>
                <td className="py-1 text-slate-700">造價</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.costIRR == null ? "—" : sensitivity.elasticity.costIRR.toFixed(2)}</td>
                <td className="text-right font-mono font-bold text-violet-800">{sensitivity.elasticity.costProfit == null ? "—" : sensitivity.elasticity.costProfit.toFixed(2)}</td>
              </tr>
            </tbody>
          </table>
          <div className="mt-2 text-[10px] text-violet-700 bg-white/60 rounded p-2 leading-relaxed">
            絕對值 &gt; 1 = 高敏感 ✦ &lt; 1 = 低敏感
          </div>
        </div>

        {/* 臨界點 */}
        <div className="bg-white rounded-xl p-3 border-2 border-rose-300">
          <div className="text-xs font-bold text-rose-700 mb-2 inline-flex items-center gap-1"><Icon name="alert-triangle" size={12}/> 臨界點分析</div>
          <table className="w-full text-[11px]">
            <tbody>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-600">售價跌至→淨利=0</td>
                <td className="text-right font-mono font-bold text-rose-700">
                  {pp == null ? "—" : (pp>0?"+":"")+pp.toFixed(1)+"%"}
                </td>
              </tr>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-600">造價漲至→淨利=0</td>
                <td className="text-right font-mono font-bold text-rose-700">
                  {cp == null ? "—" : (cp>0?"+":"")+cp.toFixed(1)+"%"}
                </td>
              </tr>
              <tr className="border-b border-slate-100">
                <td className="py-1 text-slate-600">售價跌至→IRR=0</td>
                <td className="text-right font-mono font-bold text-amber-700">
                  {ppIRR == null ? "—" : (ppIRR>0?"+":"")+ppIRR.toFixed(1)+"%"}
                </td>
              </tr>
              <tr>
                <td className="py-1 text-slate-600">造價漲至→IRR=0</td>
                <td className="text-right font-mono font-bold text-amber-700">
                  {cpIRR == null ? "—" : (cpIRR>0?"+":"")+cpIRR.toFixed(1)+"%"}
                </td>
              </tr>
            </tbody>
          </table>
          {allNull && (
            <div className="mt-2 text-[10px] text-emerald-700 bg-emerald-50 rounded p-2 leading-relaxed border border-emerald-200">
              ℹ 案件結構穩健: ±50% 範圍內找不到臨界點
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 5: 戶別明細
════════════════════════════════════════ */
function T5({p, sP}) {
  const [prs, sPrs] = useState([50, 52, 55, 57, 60]);
  const UNITS = p.unitList || [];
  // 依 s 欄位分組 (支援任意基地代碼)
  const groups = UNITS.reduce((acc, u) => {
    const k = u.s || "其他";
    (acc[k] = acc[k] || []).push(u);
    return acc;
  }, {});
  const groupKeys = Object.keys(groups).sort();

  const updU = (id, k, v) => sP({...p, unitList: UNITS.map(u => u.id===id ? {...u, [k]:v} : u)});
  const addU = () => {
    const nextG = groupKeys[0] || "A";
    const existInG = groups[nextG] || [];
    const idx = existInG.length + 1;
    const newId = nextG + idx;
    sP({...p, unitList: [...UNITS, {id:newId, s:nextG, m:0, p:0, g:0}]});
  };
  const delU = (id) => sP({...p, unitList: UNITS.filter(u => u.id !== id)});

  const Row = ({u}) => (
    <tr className="border-b border-slate-100 hover:bg-slate-50/80">
      <td className="py-[6px] px-2">
        <input type="text" value={u.id} onChange={e=>updU(u.id,"id",e.target.value)} className="font-bold text-[13px] w-14 bg-transparent border-b border-slate-200 focus:outline-none focus:border-sky-400"/>
      </td>
      <td className="py-[6px] px-2">
        <input type="text" value={u.s} onChange={e=>updU(u.id,"s",e.target.value)} className="text-[12px] w-10 text-center bg-transparent border-b border-slate-200 focus:outline-none focus:border-sky-400"/>
      </td>
      <td className="py-[6px] px-2 text-right"><NI value={u.m} onChange={v=>updU(u.id,"m",v)} step={0.1} className="w-20 text-right text-xs"/></td>
      <td className="py-[6px] px-2 text-right"><NI value={u.p} onChange={v=>updU(u.id,"p",v)} step={0.01} className="w-20 text-right text-xs"/></td>
      <td className="py-[6px] px-2 text-right"><NI value={u.g} onChange={v=>updU(u.id,"g",v)} step={0.1} className="w-20 text-right text-xs"/></td>
      {prs.map((pr,pi) => {const t=u.p*pr;return <td key={pi} className={"py-[6px] px-2 text-right font-mono font-semibold text-[13px] "+(t>6000?"bg-rose-100 text-rose-700":"")}>{fmt(t)}</td>})}
      <td className="py-[6px] px-2 text-center"><BtnDel onClick={()=>delU(u.id)}/></td>
    </tr>
  );
  const Sub = ({l, us, bg}) => {const tp=us.reduce((a,u)=>a+u.p,0),tm=us.reduce((a,u)=>a+u.m,0);return <tr className={bg+" font-bold border-b-2"}><td className="py-2 px-2" colSpan={2}>{l}</td><td className="py-2 px-2 text-right font-mono text-xs">{tm.toFixed(1)}</td><td className="py-2 px-2 text-right font-mono">{tp.toFixed(2)}</td><td/>{prs.map((pr,pi)=><td key={pi} className="py-2 px-2 text-right font-mono">{fmt(tp*pr)}</td>)}<td/></tr>};

  return (
    <div className="space-y-4">
      <div className="flex flex-wrap items-center gap-2 bg-white p-3 rounded-2xl border shadow-sm">
        <span className="text-sm font-bold text-slate-700 mr-1">單價：</span>
        {prs.map((pr,i)=><NI key={i} value={pr} onChange={v=>{const np=[...prs];np[i]=v;sPrs(np)}} className="w-16 text-center"/>)}
        <span className="text-xs text-slate-400">萬/坪</span>
        <div className="flex-1"/>
        <Btn onClick={addU} color="bg-emerald-600 hover:bg-emerald-700">+ 新增戶別</Btn>
      </div>
      {UNITS.length === 0
        ? <div className="rounded-2xl border shadow-sm bg-white p-8 text-center">
            <Icon name="home" size={48} className="mb-2 text-slate-300 mx-auto"/>
            <div className="text-slate-500 text-sm mb-3">尚未建立戶別資料</div>
            <Btn onClick={addU} color="bg-emerald-600 hover:bg-emerald-700">+ 新增第一筆戶別</Btn>
          </div>
        : <div className="rounded-2xl border shadow-sm bg-white overflow-hidden"><div className="overflow-x-auto">
            <table className="w-full text-sm" style={{minWidth:900}}>
              <thead><tr className="bg-emerald-600 text-white"><th className="py-2 px-2 text-left text-xs">戶別</th><th className="py-2 px-2 text-center text-xs">基地</th><th className="py-2 px-2 text-right text-xs">m²</th><th className="py-2 px-2 text-right text-xs">坪</th><th className="py-2 px-2 text-right text-xs">綠地</th>{prs.map((pr,i)=><th key={i} className="py-2 px-2 text-right text-xs">@{pr}萬</th>)}<th className="py-2 px-2 text-center text-xs">×</th></tr></thead>
              <tbody>
                {groupKeys.map(gk => (
                  <React.Fragment key={gk}>
                    <tr className="bg-emerald-100/60"><td colSpan={5+prs.length+1} className="py-1.5 px-2 font-bold text-emerald-800 text-xs">{gk}基地 ({groups[gk].length}戶)</td></tr>
                    {groups[gk].map(u=><Row key={u.id} u={u}/>)}
                    <Sub l={gk+"小計"} us={groups[gk]} bg="bg-sky-50"/>
                  </React.Fragment>
                ))}
                <Sub l="✦全案" us={UNITS} bg="bg-amber-100/80"/>
              </tbody>
            </table>
          </div></div>
      }
    </div>
  );
}

  /* ── Sheet 1: 基本假設 ── */

  const zi = dr.zi;
  const s1Rows = [

    ["利息",    ...cols.map(c => c.data.cs.it)],
    ["成本合計",...cols.map(c => c.data.tc)],
    [],
    ["【損益】(萬)"],
    ["稅前利潤",   ...cols.map(c => c.data.pbt)],
    // 自 v198: 稅後淨利改為 pbt-landValue-itx，與畫面公式同步（landValue 算法承接原「稅前利潤(扣土地)」邏輯）
    ["稅後淨利",   ...cols.map(c => {
      const lv = c.role === "b"
        ? getOwnerLandValue(p, dr, "builder")
        : (() => { const owner = (p.owners||[]).find(o => o.id === c.ownerId); return owner ? getOwnerLandValue(p, dr, owner) : 0; })();
      return c.data.pbt - lv - c.data.itx;
    })],
    ["毛利率",     ...cols.map(c => (c.data.gm*100).toFixed(2) + "%")],
    ["淨利率",     ...cols.map(c => (c.data.nm*100).toFixed(2) + "%")],
    ["成本報酬率", ...cols.map(c => (c.data.cr*100).toFixed(2) + "%")],
    [],
    ["【融資】(萬)"],
    ["土融",         ...cols.map(c => c.data.ll)],
    ["建融",         ...cols.map(c => c.data.cl)],
    ["融資合計",     ...cols.map(c => c.data.tl)],
    ["自有資金",     ...cols.map(c => c.data.eq)],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(rowsP);
  ws2["!cols"] = [{wch:20}, ...cols.map(()=>({wch:18}))];
  XLSX.utils.book_append_sheet(wb, ws2, "損益分析");

  /* ── Sheet 3: 現金流 ── */
  const sc = cS(p, dr, dr.weightedUP, p.cC, "b", 0);
  const mcf = cMCF(p, dr, sc);
  const monthRows = [
    ["現金流分析 — " + name + " (建商視角)"],
    [],
    ["售價 (萬/坪)", p.uP, "造價 (萬/坪)", p.cC],
    ["期初資金 (萬)", p.initCash, "工期月數", mcf.totalM],
    ["最低餘額 (萬)", mcf.minBal, "資金缺口 (萬)", mcf.maxGap > 0 ? mcf.maxGap : "無"],
    ["建議資金 (萬)", Math.max(mcf.maxGap, 0) + (p.initCash || 0)],
    [],
    ["月份", "階段", "期初", "收入", "支出", "融資撥款", "融資償還", "利息", "當月淨流", "累計餘額"],
    ...mcf.months.map(m => [
      m.label, m.phase, m.init, m.income, m.expense, m.loanDraw, m.loanRepay,
      m.interest, m.net, m.cm
    ]),
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(monthRows);
  ws3["!cols"] = [{wch:10},{wch:14},{wch:11},{wch:11},{wch:11},{wch:11},{wch:11},{wch:10},{wch:11},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws3, "現金流");

  /* ── Sheet 4: 敏感度 ── */
  const prs4 = [];
  for (let i = 50; i <= 65; i++) prs4.push(i);
  const cos4 = [22, 24, 25, 26, 27, 28, 30];
  const senRows = [
    ["敏感度分析 — " + name],
    ["建商稅後淨利矩陣 (萬元)"],
    [],
    ["售價↓ / 造價→", ...cos4.map(c => c + "萬")],
    ...prs4.map(pr => [
      pr + "萬",
      ...cos4.map(cc => Math.round(cS(p, dr, pr, cc, "b", 0).pat))
    ]),
  ];
  const ws4 = XLSX.utils.aoa_to_sheet(senRows);
  ws4["!cols"] = [{wch:15}, ...cos4.map(()=>({wch:11}))];
  XLSX.utils.book_append_sheet(wb, ws4, "敏感度");

  /* ── Sheet 5: 戶別明細 ── */
  const UL = p.unitList || [];
  const groupsU = UL.reduce((acc, u) => {
    const k = u.s || "其他";
    (acc[k] = acc[k] || []).push(u);
    return acc;
  }, {});
  const grpKeys = Object.keys(groupsU).sort();
  const exPrices = [50, 52, 55, 57, 60];
  const unitHeader = ["戶別", "基地", "m²", "坪", "綠地", ...exPrices.map(pr => "@" + pr + "萬 (總價)")];
  const unitRows = [
    ["戶別明細 — " + name],
    [],
    unitHeader,
  ];
  grpKeys.forEach(gk => {
    unitRows.push([gk + "基地 (" + groupsU[gk].length + "戶)"]);
    groupsU[gk].forEach(u => {
      unitRows.push([u.id, u.s, u.m, u.p, u.g, ...exPrices.map(pr => Math.round(u.p * pr))]);
    });
    const tp = groupsU[gk].reduce((a,u)=>a+u.p,0);
    const tm = groupsU[gk].reduce((a,u)=>a+u.m,0);
    unitRows.push([gk + "小計", "", +tm.toFixed(1), +tp.toFixed(2), "", ...exPrices.map(pr => Math.round(tp * pr))]);
    unitRows.push([]);
  });
  if (UL.length > 0) {
    const tp = UL.reduce((a,u)=>a+u.p,0);
    const tm = UL.reduce((a,u)=>a+u.m,0);
    unitRows.push(["全案合計", "", +tm.toFixed(1), +tp.toFixed(2), "", ...exPrices.map(pr => Math.round(tp * pr))]);
  } else {
    unitRows.push(["(本專案尚未建立戶別資料)"]);
  }
  const ws5 = XLSX.utils.aoa_to_sheet(unitRows);
  ws5["!cols"] = [{wch:14},{wch:8},{wch:10},{wch:10},{wch:10}, ...exPrices.map(()=>({wch:13}))];
  XLSX.utils.book_append_sheet(wb, ws5, "戶別明細");

  /* ── 觸發下載 ── */
  const datePart = new Date().toISOString().slice(0,10);
  const safeName = name.replace(/[\\/:"*?<>|]/g, "_");
  XLSX.writeFile(wb, safeName + "_" + datePart + ".xlsx");
}

// 自 v188: React Error Boundary — 捕獲 render 時錯誤並顯示在頁面，取代「Script error.」
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  componentDidCatch(error, info) {
    this.setState({ error, info });
    const el = document.getElementById("__error_overlay__");
    if (el) {
      el.style.display = "block";
      el.textContent = "🔴 React Error: " + error.message + "\n\nComponent Stack:\n" + (info?.componentStack || "");
    }
  }
  render() {
    if (this.state.error) {
      return React.createElement("div", {
        style: {padding:16, background:"#fee2e2", color:"#991b1b", fontFamily:"monospace",
                fontSize:11, whiteSpace:"pre-wrap", maxHeight:"60vh", overflow:"auto"}
      }, "🔴 Render Error: " + this.state.error.message + "\n\n" + (this.state.info?.componentStack || ""));
    }
    return this.props.children;
  }
}
