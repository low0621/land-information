                  const sum = (p.ownerHoldings||[]).filter(h=>((h.sec||"")+"|"+(h.num||""))===key).reduce((s,h)=>s+(Number(h.share)||0),0);
                  const closed = Math.abs(sum-1) <= 0.005;
                  return (
                    <div key={key} className={"inline-flex items-center gap-1 rounded-lg px-1.5 py-1 border " + (closed ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200")}>
                      <span className="font-bold text-slate-600">{sec}/{num}</span>
                      <span className={closed ? "text-emerald-600" : "text-rose-600 font-bold"}>{(sum*100).toFixed(1)}%</span>
                      <button onClick={()=>equalize(key)} title="均分 (平均分配, 自動補足 100%)"
                        className="px-1 bg-sky-600 hover:bg-sky-700 text-white rounded inline-flex items-center gap-0.5"><Icon name="scale" size={10}/>均分</button>
                      <button onClick={()=>normalize(key)} title="正規化 (等比例縮放到 100%)"
                        className="px-1 bg-violet-500 hover:bg-violet-600 text-white rounded">正規化</button>
                    </div>
                  );
                })}
              </div>
            );
          })()}

                      <span className="text-[8px] bg-sky-200 text-emerald-800 px-1 rounded mr-1">自訂</span>
                      {c.label || "自訂"}
                    </td>
                    {p.expPeriods.map((_,i)=>(
                      <td key={i} className="py-1.5 px-1 text-center">
                        <input type="number" value={((vals[i]||0)*100).toFixed(0)}
                          onChange={e=>updCustDist(i, parseFloat(e.target.value||0)/100)}
                          step={5} className="field-sizing-content w-full w-12 text-center text-xs border rounded py-0.5 bg-sky-50 font-bold"/>
                        <span className="text-[9px] text-slate-400 ml-0.5">%</span>
                      </td>
                    ))}
                    <td className={"py-1.5 px-2 text-center font-black "+(Math.abs(sum-1)<0.01?"text-emerald-600":"text-rose-600")}>{(sum*100).toFixed(0)}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="mt-3 text-xs font-bold text-slate-500 mb-1 inline-flex items-center gap-1.5"><Icon name="calendar" size={12}/> 時間節點設定</div>
        <div className="flex flex-wrap gap-2">{p.expPeriods.map(ep=>(
          <div key={ep.id} className={"flex items-center gap-1 rounded-lg p-1.5 border text-[10px] "+(ep.role==="constStart"?"bg-amber-50 border-amber-300":ep.role==="handover"?"bg-emerald-50 border-emerald-300":"bg-slate-50")}>
            <SO v={ep.year} fn={v=>updEP(ep.id,"year",+v)} opts={YRS} className="w-16 text-[10px]"/>
            <SO v={ep.month} fn={v=>updEP(ep.id,"month",+v)} opts={MOS} className="w-14 text-[10px]"/>
            <input type="text" value={ep.label} onChange={e=>updEP(ep.id,"label",e.target.value)} className="w-28 text-[10px] border rounded px-1 py-0.5 bg-white"/>
            <div className="flex gap-0.5">
              <button onClick={()=>updEP(ep.id,"role", ep.role==="constStart"?null:"constStart")}
                title="標記為開工（工期起算點）"
                className={"px-1.5 py-0.5 rounded text-[9px] font-bold "+(ep.role==="constStart"?"bg-amber-500 text-white":"bg-white text-amber-600 border border-amber-300")}>開工</button>
              <button onClick={()=>updEP(ep.id,"role", ep.role==="handover"?null:"handover")}
                title="標記為交屋（工期終點）"
                className={"px-1.5 py-0.5 rounded text-[9px] font-bold "+(ep.role==="handover"?"bg-emerald-500 text-white":"bg-white text-emerald-600 border border-emerald-300")}>交屋</button>
            </div>
            {/* 自 v219: 交屋標記期別 — 顯示自動/手動連動狀態，手動時可還原自動 */}
            {ep.role==="handover" && (
              ep.autoHandoverSync===false ? (
                <button onClick={()=>applyHandoverSync(true)} title="已手動覆寫，點此還原為自動連動「預定交屋日/銷售時程」"
                  className="text-[9px] text-rose-500 hover:text-rose-700 underline whitespace-nowrap">手動 ↻還原自動</button>
              ) : (
                <span className="text-[9px] text-emerald-500 whitespace-nowrap">自動同步交屋日</span>
              )
            )}
          </div>
        ))}</div>
        <div className="text-[9px] text-slate-500 italic mt-1.5">
          ※ 標記「開工」與「交屋」後，工期只計算這兩點間的跨距（貸款實際計息期間）；未標記時 fallback 為全案第一期到最後一期的跨距。<br/>
          ※ 「交屋」標記期別預設持續同步「一、基本假設」的預定交屋日/銷售時程最後一期；手動改動該期年月後會停止同步，可點「還原自動」恢復。
        </div>
      </Card>

    </div>
  );
}

/* 容積獎勵 % 下拉 (放外部避免每次 T6 重渲染重置 state) */

/* ════════════════════════════════════════
   TAB: 分配模擬 (自 v115, 從 T1 六、合建分回 完整搬出)
   - 我的身分選擇器 + 合建勾選
   - 分屋計算 (容積加權/合建比/個別出資/匯入)
   - 建商/地主分回卡 (自由組合/出資承擔/土地價值認列)
   - 費率(地主端) + 契稅
════════════════════════════════════════ */
function TJb({p, sP}) {
  const dr = calcDerived(p);
  const up = (f, v) => sP({...p, [f]:v});
  // 自 v120: 選配群組「勾選中」暫存 (不持久化)
  const [groupPick, setGroupPick] = useState([]);
  const updOwner = (id, k, v) => sP({...p, owners: p.owners.map(o => o.id===id ? {...o,[k]:v} : o)});
  const hasLandlordHolding = (p.ownerHoldings || []).some(x => x.ownerId !== "builder" && (Number(x.share)||0) > 0);
  // 自 v119: 比例顯示四捨五入 (避免浮點+截斷誤差, 如 1-0.55=0.44999 被 floor 成 44.9%)
  //   pctR1: 分數(0~1) → 百分比 round 1 位; pctR2: round 2 位
  //   建商側一律用 (100 − 地主側) 確保加總精確 100%
  const pctR1 = (frac) => Math.round((Number(frac)||0) * 1000) / 10;
  const pctR2 = (frac) => Math.round((Number(frac)||0) * 10000) / 100;
  const F = ({l, f, u, step=1}) => (
    <div className="flex items-center justify-between py-[7px] border-b border-slate-100">
      <span className="text-slate-600 text-[13px]">{l}</span>
      <div className="flex items-center gap-1">
        <NI value={p[f]} onChange={v => up(f, v)} step={step} className="w-24"/>
        {u && <span className="text-[11px] text-slate-400 w-14">{u}</span>}
      </div>
    </div>
  );
  const renderShareComp = (roleKey, ratio, expanded, setExpanded) => {
    const sc = p.shareComposition || { byRole: {} };
    const comp = (sc.byRole && sc.byRole[roleKey]) || { mode: "auto", items: [] };
    const isManual = comp.mode === "manual";
    const sm = dr.salesMix;
    const houseCats = [
      { catKey: "res",    label: sm.res?.label    || "住宅", uP: sm.res?.uP    || 0 },
      { catKey: "retail", label: sm.retail?.label || "店面", uP: sm.retail?.uP || 0 },
      { catKey: "office", label: sm.office?.label || "辦公", uP: sm.office?.uP || 0 },
      ...(sm.customCategories || []).map(c => ({ catKey: c.id, label: c.label, uP: c.uP || 0 }))
    ];
    const parkCats = [
      { catKey: "park_flat", label: "平面車位", uP: sm.flat?.uP       || 0 },
      { catKey: "park_mech", label: "機械車位", uP: sm.mechanical?.uP || 0 }
    ];
    const allCats = [
      ...houseCats.filter(c => c.uP > 0 || (sm[c.catKey]?.area || 0) > 0),
      ...(!p.pip && (sm.flat?.uP || 0) > 0    ? [parkCats[0]] : []),
      ...(!p.pip && (sm.mechanical?.uP || 0) > 0 ? [parkCats[1]] : [])
    ];
    const catInfo = (k) => allCats.find(c => c.catKey === k);
    const setComp = (newComp) => sP({...p, shareComposition: {...sc, byRole: {...(sc.byRole||{}), [roleKey]: newComp}}});
    const setMode = (mode) => setComp({...comp, mode});
    const addItem = (catKey) => {
      const isPark = catKey.startsWith("park_");
      // 自 v122: 預設 fixed 模式
      setComp({...comp, mode: "manual", items: [...(comp.items||[]), isPark ? {catKey, mode:"fixed", count: 0} : {catKey, mode:"fixed", area: 0}]});
    };
    const updItem = (idx, field, val) => setComp({...comp, items: (comp.items||[]).map((it,i)=>i===idx?{...it,[field]:val}:it)});
    const delItem = (idx) => setComp({...comp, items: (comp.items||[]).filter((_,i)=>i!==idx)});
    // 統計
    const shareRec = (dr.shareInfo||[]).find(x => x.key === roleKey);
    const allocValue = shareRec ? shareRec.allocValue : 0;
    // 自 v122: ratio 模式 → 價值 = ratio × allocValue, 面積 = 價值 ÷ 單價
    let compArea = 0, compValue = 0;
    const itemCalc = (it) => {
      const ci = catInfo(it.catKey); const up = Number(ci?.uP)||0;
      const isPark = it.catKey.startsWith("park_");
      if (it.mode === "ratio") {
        const val = (Number(it.ratio)||0) * allocValue;
        const qty = up > 0 ? val / up : 0;
        return { qty, val, isPark };
      }
      const qty = isPark ? (Number(it.count)||0) : (Number(it.area)||0);
      return { qty, val: qty * up, isPark };
    };
    (comp.items||[]).forEach(it => {
      const ci = catInfo(it.catKey); if (!ci) return;
      const r = itemCalc(it);
      if (!r.isPark) compArea += r.qty;
      compValue += r.val;
    });
    // ── 自 v185: 面積上限 & 優先選配 ──────────────────────────────────────
    // 各類別全案總量（salesMix 來源）
    const catMaxQty = (catKey) => {
      if (catKey === "park_flat")   return Number(p.parkingMix?.flat?.count)        || 0;
      if (catKey === "park_mech")   return Number(p.parkingMix?.mechanical?.count)  || 0;
      if (catKey === "res")         return sm.res?.area    || 0;
      if (catKey === "retail")      return sm.retail?.area || 0;
      if (catKey === "office")      return sm.office?.area || 0;
      const cc = (sm.customCategories || []).find(c => c.id === catKey);
      return cc?.area || 0;
    };
    // 各角色各類別已選量（不含自己）
    const otherUsed = (excludeRole, catKey) => {
      const sc2 = p.shareComposition || {};
      let used = 0;
      Object.entries(sc2.byRole || {}).forEach(([rk, comp]) => {
        if (rk === excludeRole || comp.mode !== "manual") return;
        const shareRec2 = (dr.shareInfo || []).find(x => x.key === rk);
        const av2 = shareRec2 ? shareRec2.allocValue : 0;
        (comp.items || []).forEach(it => {
          if (it.catKey !== catKey) return;
          const ci2 = catInfo(it.catKey);
          const up2 = Number(ci2?.uP) || 0;
          const isPk = it.catKey.startsWith("park_");
          if (it.mode === "ratio") {
            const qty = up2 > 0 ? (Number(it.ratio) || 0) * av2 / up2 : 0;
            used += qty;
          } else {
            used += isPk ? (Number(it.count) || 0) : (Number(it.area) || 0);
          }
        });
      });
      return used;
    };
    // 優先排序邏輯：排序較小的角色先選，剩餘量依序扣減
    const priority = p.shareComposition?.priority || {};
    const myPriority = priority[roleKey] || null;
    // 算「在我之前的角色（排序 < 我）已選量」
    const priorUsed = (catKey) => {
      const sc2 = p.shareComposition || {};
      let used = 0;
      if (!myPriority) return used; // 未設排序 = 最後
      Object.entries(sc2.byRole || {}).forEach(([rk, comp]) => {
        if (rk === roleKey || comp.mode !== "manual") return;
        const theirPri = priority[rk] || null;
        if (!theirPri || theirPri >= myPriority) return; // 只計排序比我小的
        const shareRec2 = (dr.shareInfo || []).find(x => x.key === rk);
        const av2 = shareRec2 ? shareRec2.allocValue : 0;
        (comp.items || []).forEach(it => {
          if (it.catKey !== catKey) return;
          const ci2 = catInfo(it.catKey);
          const up2 = Number(ci2?.uP) || 0;
          const isPk = it.catKey.startsWith("park_");
          if (it.mode === "ratio") {
            used += up2 > 0 ? (Number(it.ratio) || 0) * av2 / up2 : 0;
          } else {
            used += isPk ? (Number(it.count) || 0) : (Number(it.area) || 0);
          }
        });
      });
      return used;
    };
    // 我的上限：全案總量 - 排序比我小的角色已選量
    const myMaxQty = (catKey) => Math.max(0, catMaxQty(catKey) - priorUsed(catKey));
    // 我目前已選某類別的量
    const myUsed = (catKey) => {
      let used = 0;
      (comp.items || []).forEach(it => {
        if (it.catKey !== catKey) return;
        const r = itemCalc(it);
        used += r.qty;
      });
      return used;
    };
    // 超量判定
    const isOver = (catKey) => myUsed(catKey) > myMaxQty(catKey) + 0.01;
    const hasAnyOver = allCats.some(c => isOver(c.catKey));
    // 自由組合角色數（用於決定是否顯示優先排序）
    const manualRoles = Object.entries(p.shareComposition?.byRole || {})
      .filter(([, comp]) => comp.mode === "manual")
      .map(([rk]) => rk);
    const showPriority = manualRoles.length >= 2;
    const setPriority = (val) => {
      const newPri = val ? Number(val) : null;
      sP({...p, shareComposition: {
        ...(p.shareComposition || {}),
        priority: { ...(priority), [roleKey]: newPri }
      }});
    };
    // ─────────────────────────────────────────────────────────────────────
    const cashAdjust = allocValue - compValue;  // 現金找補：正=收、負=付（自 v185 重寫時遺漏，v188 補回）
    const diff = compValue - allocValue;
    return (
      <div className="mt-2 border-t border-sky-200 pt-2">
        <button onClick={() => setExpanded(!expanded)}
          className="w-full flex items-center justify-between text-[11px] font-bold text-violet-700 hover:text-violet-900">
          <span className="inline-flex items-center gap-1.5"><Icon name="shuffle" size={12}/> 自由組合分回{isManual && <span className="ml-2 text-[9px] bg-violet-200 text-violet-800 px-1 py-0.5 rounded">自由</span>}</span>
          <span className="text-violet-500">{expanded ? "▾ 收合" : "▸ 展開"}</span>
        </button>
        {expanded && (
          <div className="mt-2 bg-white rounded-lg p-2 border border-violet-100 space-y-2">
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div className="text-[10px] text-slate-600">
                獲配價值 (基準) = (房屋總銷+車位總銷) × {(ratio*100).toFixed(1)}% = <span className="font-mono font-bold text-violet-700">{fmt(allocValue)} 萬</span>
              </div>
              <div className="flex items-center gap-0">
                <button onClick={()=>setMode("auto")}
                  className={"px-2 py-0.5 text-[10px] font-bold border rounded-l "+(!isManual?"bg-violet-500 text-white border-violet-600":"bg-white text-slate-600 border-slate-300")}>均價分配</button>
                <button onClick={()=>setMode("manual")}
                  className={"px-2 py-0.5 text-[10px] font-bold border rounded-r border-l-0 "+(isManual?"bg-violet-500 text-white border-violet-600":"bg-white text-slate-600 border-slate-300")}>自由組合</button>
              </div>
            </div>
            {/* 優先選配（≥2 角色自由組合時顯示）*/}
            {isManual && showPriority && (
              <div className="flex items-center gap-2 bg-amber-50 rounded px-2 py-1 border border-amber-200">
                <Icon name="arrow-up-circle" size={12} className="text-amber-600"/>
                <span className="text-[10px] text-amber-800 font-bold">優先選配順序</span>
                <select value={myPriority || ""} onChange={e => setPriority(e.target.value)}
                  className="text-[10px] border border-amber-300 rounded bg-white px-1 py-0.5 ml-1">
                  <option value="">未設定（最後）</option>
                  <option value="1">1（最優先）</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
                <span className="text-[9px] text-amber-600">排序較小者先選，後者上限依序扣減</span>
              </div>
            )}
            {/* 超量警告 */}
            {isManual && hasAnyOver && (
              <div className="flex items-center gap-1.5 bg-rose-50 border border-rose-300 rounded px-2 py-1">
                <Icon name="alert-triangle" size={12} className="text-rose-600"/>
                <span className="text-[10px] text-rose-700 font-bold">
                  部分類別超出可選上限，請調整數量
                  {showPriority && !myPriority && "（建議設定優先選配順序）"}
                </span>
              </div>
            )}
            {!isManual ? (
              <div className="text-[10px] text-slate-500 italic">
                均價分配: 分回面積 = {(ratio*100).toFixed(1)}% × {fmt(dr.totalArea)} 坪 = {fmt(dr.totalArea*ratio)} 坪 (用加權均價回推總銷)
              </div>
            ) : (
              <>
                {(comp.items||[]).length === 0 ? (
                  <div className="text-[10px] text-slate-400 italic text-center py-1">尚未加入部位, 點下方按鈕新增</div>
                ) : (
                  (comp.items||[]).map((it, idx) => {
                    const ci = catInfo(it.catKey);
                    const isPark = it.catKey.startsWith("park_");
                    const isRatioItem = it.mode === "ratio";
                    const r = itemCalc(it);
                    const maxQ = myMaxQty(it.catKey);
                    const usedQ = myUsed(it.catKey);
                    const over = usedQ > maxQ + 0.01;
                    return (
                      <div key={idx} className={"flex items-center gap-1.5 text-[10px] rounded p-1 border flex-wrap "+(over?"bg-rose-50 border-rose-300":"bg-violet-50/50 border-violet-100")}>
                        <span className="font-bold text-slate-700 w-14">{ci ? ci.label : it.catKey}</span>
                        {/* 自 v189: 種類後顯示「已選量/上限」*/}
                        <span className={"text-[10px] font-mono "+(over?"text-rose-600 font-bold":"text-slate-400")}>
                          {fmt(usedQ,1)}/{fmt(maxQ,1)}{isPark?"個":"坪"}
                        </span>
                        <select value={it.mode==="ratio"?"ratio":"fixed"} onChange={e=>updItem(idx,"mode",e.target.value)}
                          className="text-[9px] border rounded bg-white px-0.5 py-0.5">
                          <option value="fixed">{isPark?"固定數":"固定坪"}</option>
                          <option value="ratio">比例</option>
                        </select>
                        {isRatioItem ? (
                          <>
                            <NI value={Math.round((Number(it.ratio)||0)*1000)/10} onChange={v=>updItem(idx,"ratio",(Number(v)||0)/100)} step={1} className={"w-14 text-center"+(over?" border-rose-400":"")}/>
                            <span className="text-[9px] text-slate-400">% 獲配 →</span>
                            <span className={"text-[9px] "+(over?"text-rose-600 font-bold":"text-slate-500")}>{fmt(r.qty, 1)}{isPark?"個":"坪"}</span>
                          </>
                        ) : (
                          <>
                            <NI value={r.qty} onChange={v=>updItem(idx, isPark?"count":"area", Number(v)||0)} step={isPark?1:5} className={"w-14 text-center"+(over?" border-rose-400":"")}/>
                            <span className={"text-[9px] "+(over?"text-rose-600":"text-slate-400")}>{isPark?"個":"坪"}</span>
                          </>
                        )}
                        {/* 上限提示 */}
                        <span className={"text-[9px] "+(over?"text-rose-600 font-bold":"text-slate-400")}>
                          /{fmt(maxQ,1)}{isPark?"個":"坪"}{over?" ⚠️":""}
                        </span>
                        <span className="text-[9px] text-slate-400">× {fmt2(Number(ci?.uP)||0)}</span>
                        <span className="text-[9px] text-slate-400">=</span>
                        <span className="font-mono font-bold text-violet-700 flex-1 text-right">{fmt(r.val)} 萬</span>
                        <BtnDel onClick={()=>delItem(idx)}/>
                      </div>
                    );
                  })
                )}
                <div className="flex flex-wrap gap-1">
                  {allCats.map(c => (
                    <button key={c.catKey} onClick={()=>addItem(c.catKey)}
                      className="px-1.5 py-0.5 text-[9px] bg-violet-100 hover:bg-violet-200 text-violet-700 rounded border border-violet-200">+ {c.label}</button>
                  ))}
                </div>
                <div className="grid grid-cols-2 gap-2 pt-1 border-t border-violet-200 text-[10px]">
                  <div><div className="text-slate-500">組合房屋面積</div><div className="font-mono font-bold text-violet-800">{fmt(compArea)} 坪</div></div>
                  <div><div className="text-slate-500">分回單元價值</div><div className="font-mono font-bold text-violet-800">{fmt(compValue)} 萬</div></div>
                  <div><div className="text-slate-500">現金找補 {cashAdjust>=0?"(收)":"(付)"}</div><div className={"font-mono font-bold "+(Math.abs(cashAdjust)<0.5?"text-slate-400":(cashAdjust>0?"text-emerald-600":"text-rose-600"))}>{cashAdjust>0?"+":""}{fmt(cashAdjust)} 萬</div></div>
                  <div><div className="text-slate-500">收益合計 (=應得)</div><div className="font-mono font-bold text-emerald-700">{fmt(compValue + cashAdjust)} 萬</div></div>
                </div>
                {Math.abs(cashAdjust) >= 0.5 && (
                  <div className="text-[9px] text-slate-500 italic">
                    {cashAdjust>0 ? `分回單元價值少於應得 ${fmt(Math.abs(cashAdjust))} 萬 → 收現金找補 (計為收入)` : `分回單元價值超過應得 ${fmt(Math.abs(cashAdjust))} 萬 → 付現金找補 (計為支出)`}
                  </div>
                )}
                <div className="text-[9px] text-slate-400 italic">分回面積 = 組合房屋坪 (車位另計個數); 收益 = 單元價值 + 現金找補 = 應得價值。比例模式: 價值 = 比例 × 獲配價值, 面積 = 價值 ÷ 單價。</div>
              </>
            )}
          </div>
        )}
      </div>
    );
  };

  return (
    <div className="flex flex-col gap-4">
      {/* ── 六、合建分回·地主費用·土增稅·契稅 ── */}
      <Card title="六、合建分回·地主費用·土增稅·契稅" accent="bg-sky-800" icon="user" className="lg:col-span-2">
        <div className="bg-slate-50 -mx-4 -mt-3 px-4 py-3 border-b mb-3">
          {/* 我的身分選擇器（兩層式） */}
          <div className="mb-3 p-3 bg-gradient-to-r from-amber-50 to-amber-50 rounded-lg border border-amber-300">

            <div className="grid grid-cols-2 gap-1.5 mb-2">
              <button onClick={()=>up("myRole","builder")}
                className={"text-left p-2 rounded-lg border-2 transition "+(
                  (p.myRole||"builder")==="builder"
                    ? "bg-emerald-500 border-emerald-600 text-white shadow-md"
                    : "bg-white border-slate-200 text-slate-700 hover:border-emerald-400"
                )}>
                <div className="text-xs font-bold inline-flex items-center gap-1"><Icon name="construction" size={12}/> 建商</div>
                <div className={"text-[9px] mt-0.5 "+((p.myRole||"builder")==="builder"?"text-emerald-100":"text-slate-500")}>
                  {p.jb ? "合建出資方，扛造價/利息/銷售" : "獨資開發，自付土增稅與契稅"}
                </div>
              </button>
              <button onClick={()=>{
                // 點地主後，預設選「有持分(ratio>0)的第一位」; 否則第一位; 沒有則提示
                if (p.jb && p.owners.length>0) {

                  alert("請先勾選「合建案」才能切換為地主身分");

                className={"text-left p-2 rounded-lg border-2 transition "+(
                  (p.myRole||"").startsWith("owner_")
                    ? "bg-sky-500 border-sky-600 text-white shadow-md"
                    : "bg-white border-slate-200 text-slate-700 hover:border-sky-400"
                )+(!p.jb?" opacity-50 cursor-not-allowed":"")}>
                <div className="text-xs font-bold inline-flex items-center gap-1"><Icon name="home" size={12}/> 地主</div>
                <div className={"text-[9px] mt-0.5 "+((p.myRole||"").startsWith("owner_")?"text-emerald-100":"text-slate-500")}>
                  {!p.jb ? "需先勾選合建案" : "提供土地，可純參與或出資參與"}
                </div>

            </div>
            {/* 地主身分下顯示選哪一個地主 (永遠顯示完整清單) */}
            {(p.myRole||"").startsWith("owner_") && p.jb && p.owners.length>0 && (
              <div className="mt-2 flex items-center gap-2 flex-wrap">
                <span className="text-[10px] text-slate-500">選擇分析對象 (我是哪一位地主)：</span>
                {p.owners.map(o => {
                  const noRatio = (Number(o.ratio)||0) <= 0;
                  return (
                    <button key={o.id} onClick={()=>up("myRole","owner_"+o.id)}
                      className={"text-[10px] px-2 py-1 rounded border "+(p.myRole==="owner_"+o.id ? "bg-sky-500 text-white border-sky-600" : "bg-white text-slate-600 border-slate-200 hover:border-sky-300")}>
                      {o.name} ({(o.ratio*100).toFixed(1)}%){noRatio && <span className="ml-0.5 text-rose-400">·無分回</span>}
                    </button>
                  );
                })}
              </div>
            )}
            {/* 自 v120: 選配群組視角 (A+B 合併) */}
            {p.jb && (p.selectGroups||[]).length > 0 && (
              <div className="mt-2 flex items-center gap-2 flex-wrap">
                <span className="text-[10px] text-violet-600 font-bold inline-flex items-center gap-1"><Icon name="users" size={11}/> 選配群組視角：</span>
                {(p.selectGroups||[]).map(g => {
                  const memNames = (g.members||[]).map(mid => { const o=p.owners.find(x=>x.id===mid); return o?o.name:"?"; }).join("+");
                  const gRatio = (g.members||[]).reduce((s,mid)=>{ const o=p.owners.find(x=>x.id===mid); return s+(o?(Number(o.ratio)||0):0); },0);
                  const sel = p.myRole === "group_"+g.id;
                  return (
                    <button key={g.id} onClick={()=>up("myRole","group_"+g.id)}
                      className={"text-[10px] px-2 py-1 rounded border "+(sel ? "bg-violet-500 text-white border-violet-600" : "bg-white text-violet-600 border-violet-200 hover:border-violet-400")}>
                      {g.name || memNames} ({(gRatio*100).toFixed(1)}%)
                    </button>
                  );
                })}
              </div>
            )}
            <div className="mt-2 text-[10px] text-slate-500 italic">
              ※ 切換身分會影響損益分析、現金流與頂部 KPI 的視角。地主可在下方各自設定出資承擔的成本項目。
            </div>
          </div>
          {hasLandlordHolding ? (
            <div className="flex items-center gap-2 bg-violet-50 border border-violet-200 rounded-lg px-3 py-2">
              <input type="checkbox" checked={true} disabled className="w-4 h-4 opacity-60"/>
              <span className="text-sm font-bold text-violet-700 inline-flex items-center gap-1.5">合建案 <Icon name="lock" size={12}/></span>
              <span className="text-[10px] text-violet-500">已偵測表 2 有地主持分，自動鎖定為合建案 (如需取消，請至表 2 移除地主持分)</span>
            </div>
          ) : (
            <Chk ck={p.jb} onChange={v=>{
              // 取消合建時，自動把身分切回建商
              const newRole = !v ? "builder" : (p.myRole||"builder");
              sP({...p, jb:v, myRole:newRole});
            }} l="合建案 (勾選後顯示地主分回與相關費用)"/>
          )}
          {p.jb && <div className="mt-3 space-y-2">
            <div className="text-[10px] text-slate-500 italic">
              提示：分回面積自動 = 比例 × 總銷面積；總銷 = 分回面積 × 售價。可手動覆寫面積，總銷會自動跟著更新。覆寫值會傳遞到損益分析頁面。
            </div>

            {/* 自 v120: 選配群組 (A+B 合併選配) */}
            {p.owners.length >= 2 && (() => {
              const groups = p.selectGroups || [];
              // 已在群組內的成員 id
              const groupedIds = new Set(groups.flatMap(g => g.members || []));
              const pick = groupPick;
              const togglePick = (id) => {
                setGroupPick(pick.includes(id) ? pick.filter(x=>x!==id) : [...pick, id]);
              };
              const createGroup = () => {
                if (pick.length < 2) { alert("請至少勾選 2 位地主才能合併選配"); return; }
                const names = pick.map(id => { const o=p.owners.find(x=>x.id===id); return o?o.name:"?"; });
                const g = { id: uid(), name: names.join("+"), members: [...pick] };
                sP({...p, selectGroups: [...groups, g]});
                setGroupPick([]);
              };
              const delGroup = (gid) => {
                const wasMy = p.myRole === "group_"+gid;
                sP({...p, selectGroups: groups.filter(g=>g.id!==gid), ...(wasMy ? {myRole:"builder"} : {})});
              };
              return (
                <div className="bg-fuchsia-50 border border-fuchsia-200 rounded-xl p-3 my-2">
                  <div className="text-xs font-bold text-fuchsia-800 mb-1.5 inline-flex items-center gap-1.5">
                    <Icon name="users" size={13}/> 選配群組 (地主合併選配)
                  </div>
                  <div className="text-[10px] text-fuchsia-700 mb-2 italic">
                    多位地主決定「一起選屋」時可合併為群組。各地主分回比/費率/成本仍個別計算後加總；損益/現金流/敏感度可選此群組視角，經營分析以合併面積進行。
                  </div>
                  {/* 既有群組 */}
                  {groups.length > 0 && (
                    <div className="space-y-1 mb-2">
                      {groups.map(g => {
                        const memNames = (g.members||[]).map(mid => { const o=p.owners.find(x=>x.id===mid); return o?o.name:"?"; });
                        const gRatio = (g.members||[]).reduce((s,mid)=>{ const o=p.owners.find(x=>x.id===mid); return s+(o?(Number(o.ratio)||0):0); },0);
                        return (
                          <div key={g.id} className="flex items-center gap-2 bg-white rounded-lg px-2 py-1.5 border border-fuchsia-200">
                            <Icon name="users" size={12} className="text-fuchsia-500"/>
                            <span className="text-[11px] font-bold text-fuchsia-800">{g.name}</span>
                            <span className="text-[10px] text-slate-500">({memNames.join(" + ")})</span>
                            <span className="text-[10px] text-fuchsia-600 font-mono">合併分回 {(gRatio*100).toFixed(1)}%</span>
                            <div className="flex-1"/>
                            <BtnDel onClick={()=>delGroup(g.id)}/>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {/* 建立新群組: 勾選地主 */}
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <span className="text-[10px] text-slate-600">勾選地主合併：</span>
                    {p.owners.map(o => {
                      const inGroup = groupedIds.has(o.id);
                      const checked = pick.includes(o.id);
                      return (
                        <button key={o.id} disabled={inGroup}
                          onClick={()=>togglePick(o.id)}
                          className={"text-[10px] px-2 py-1 rounded border "+(
                            inGroup ? "bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed line-through"
                            : checked ? "bg-fuchsia-500 text-white border-fuchsia-600"
                            : "bg-white text-slate-600 border-slate-300 hover:border-fuchsia-400")}
                          title={inGroup ? "已在其他群組" : ""}>
                          {checked && "✓ "}{o.name}
                        </button>
                      );
                    })}
                    <button onClick={createGroup} disabled={pick.length<2}
                      className={"text-[10px] px-2.5 py-1 rounded font-bold "+(pick.length>=2 ? "bg-fuchsia-600 hover:bg-fuchsia-700 text-white" : "bg-slate-200 text-slate-400 cursor-not-allowed")}>
                      + 建立群組
                    </button>
                  </div>
                </div>
              );
            })()}

            {/* 自 v72: 分屋計算區 (從二、土地資料搬來) */}
            <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 my-2">
              <div className="text-xs font-bold text-violet-800 mb-2 inline-flex items-center gap-1.5">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                分屋計算 (容積加權 / 合建比 / 個別出資 / 匯入分回)
              </div>
              <div className="text-[10px] text-violet-700 mb-2 italic">
                此區由表 1/表 2 的權屬資料自動計算，並可選擇分屋模式 (協議合建 / 權利變換) 與設定各地主出資狀態，最後一鍵匯入下方「最終分回」。
              </div>
          {(() => {
            // 統計每位所有權人: 持分面積 / 公告值 / 容積加權值
            // ownerKey: builder 或 owner_<id> (供匯入用)
            const summary = {};  // {ownerKey: {name, isBuilder, ownerId, m2, value, farW}}
            (p.ownerHoldings || []).forEach(h => {
              const land = p.lands.find(l => l.sec === h.sec && l.num === h.num);
              if (!land) return;
              const key = h.ownerId;
              let name, isBuilder = false, ownerId = null;
              if (h.ownerId === "builder") {
                name = "建商"; isBuilder = true;
              } else {
                const owner = (p.owners || []).find(o => o.id === h.ownerId);
                name = owner ? owner.name : "(未知)";
                ownerId = h.ownerId;
              }
              if (!summary[key]) summary[key] = {name, isBuilder, ownerId, m2: 0, value: 0, farW: 0};
              const sM2 = (land.m2 || 0) * (h.share || 0);
              summary[key].m2 += sM2;
              summary[key].value += sM2 * (land.announcedValuePerM2 || 0) / 10000;
              // 容積加權值 = 持分坪 × 容積率
              let landFar = 0;
              if (!land.isNonBuildable) {
                if (land.far != null && land.far !== "") landFar = land.far / 100;
                else { const lz = gzi(land.city || p.city, land.zone || p.zone); landFar = lz.f || 0; }
              }
              summary[key].farW += (sM2 * 0.3025) * landFar;
            });
            const entries = Object.values(summary);
            const totalFarW = entries.reduce((s, e) => s + e.farW, 0);
            const totalM2 = entries.reduce((s, e) => s + e.m2, 0);
            // 容積加權佔比 / 純面積佔比
            entries.forEach(e => {
              e.farPct = totalFarW > 0 ? e.farW / totalFarW : 0;
              e.areaPct = totalM2 > 0 ? e.m2 / totalM2 : 0;
            });

            // ─── 合建比 (地主分回成數) — 依分屋模式決定 ───
            const jbMode = p.jbMode || "negotiated";
            // 全案總開發成本 (供權利變換的共同負擔自動帶值)
            const _ci_rc = getCostItems(p);
            const _cci_rc = getCustomCostItems(p);
            const _builderArea_rc = dr.totalArea * dr.builderRatio;
            const _shB_rc = _builderArea_rc * dr.weightedUP + (dr.salesMix.parkTotalSales||0) * dr.builderRatio;
            const _cf_rc = (_ci_rc.co?.mode === "perPing") ? (Number(_ci_rc.co.value)||0) * dr.totalArea : dr.totalArea * (p.cC || 0);
            const _intr_rc = (dr.landValue*p.lLTV*p.lLR*p.dur/12 + _cf_rc*p.cLTV*p.cLR*p.dur/12)/2;
            const _ctx_rc = { sales: _shB_rc, totalArea: dr.totalArea, totalCost: _cf_rc };
            let totalDevCost = 0;
            ["co","de","ad","tx","mg","am"].forEach(k => { totalDevCost += calcCostItemValue(_ci_rc[k], _ctx_rc) || 0; });
            if (_ci_rc.co && _ci_rc.co.mode === "perPing") {
              totalDevCost = totalDevCost - calcCostItemValue(_ci_rc.co, _ctx_rc) + (Number(_ci_rc.co.value)||0) * dr.totalArea;
            }
            totalDevCost += _intr_rc;
            _cci_rc.forEach(c => { totalDevCost += calcCostItemValue(c, _ctx_rc) || 0; });
            // 風險利潤率加成 → 共同負擔自動值
            const rcProfitRate = (p.rcProfitRate != null ? p.rcProfitRate : 0) / 100;
            const rcCommonBurdenAuto = totalDevCost * (1 + rcProfitRate);
            // 更新後總價值自動值 = 全案總銷
            const rcTotalValueAuto = dr.ts;
            // 取手動覆寫或自動值
            const rcCommonBurden = (p.rcCommonBurden != null && p.rcCommonBurden !== "") ? Number(p.rcCommonBurden) : rcCommonBurdenAuto;
            const rcTotalValue = (p.rcTotalValue != null && p.rcTotalValue !== "") ? Number(p.rcTotalValue) : rcTotalValueAuto;
            // 等效合建比
            let jbLandShare;
            if (jbMode === "rightsConversion") {
              // 地主分回成數 = (更新後總價值 − 共同負擔) / 更新後總價值
              jbLandShare = rcTotalValue > 0 ? Math.max(0, Math.min(1, (rcTotalValue - rcCommonBurden) / rcTotalValue)) : 0;
            } else {
              jbLandShare = p.jbLandlordShare != null ? p.jbLandlordShare : 0.5;
            }
            // 為每位地主計算: 出資狀態 / 純合建分回 / 最終分回
            entries.forEach(e => {
              if (e.isBuilder) return;
              const owner = (p.owners || []).find(o => o.id === e.ownerId);
              e.invest = !!(owner && owner.invest);
              // 純合建分回 = 容積加權佔比 × 合建比
              e.pureJbRatio = e.farPct * jbLandShare;
              // 最終分回: 出資 → 拿滿容積加權佔比; 純合建 → × 合建比
              e.finalRatio = e.invest ? e.farPct : e.pureJbRatio;
            });

            // 切換出資狀態
            const toggleInvest = (ownerId) => {
              sP({...p, owners: p.owners.map(o => o.id === ownerId ? {...o, invest: !o.invest} : o)});
            };

            // 匯入合建分回: 寫入 owners[].ratio (最終分回) + 自動連動 costBearing
            // 並移除「無持分」的殘留地主 (保留有持分者的 invest/costBearing/feeEnabled)
            const importToShare = () => {
              const landlordEntries = entries.filter(e => !e.isBuilder && e.ownerId != null);
              if (landlordEntries.length === 0) { alert("沒有地主持分可匯入"); return; }
              const detail = landlordEntries.map(e =>
                `${e.name}: ${(e.finalRatio*100).toFixed(2)}% ${e.invest ? "(出資)" : "(純合建)"}`
              ).join("\n");
              const builderPct = 1 - landlordEntries.reduce((s, e) => s + e.finalRatio, 0);
              // 找出將被移除的殘留地主 (在 owners 但不在 landlordEntries)
              const keepIds = new Set(landlordEntries.map(e => e.ownerId));
              const removed = (p.owners||[]).filter(o => !keepIds.has(o.id));
              const removedNote = removed.length > 0 ? `\n\n將移除 ${removed.length} 位無持分地主: ${removed.map(o=>o.name).join("、")}` : "";
              if (!window.confirm(
                `將以下列分回比匯入六、合建分回 (合建比: 地主 ${(jbLandShare*100).toFixed(0)}%):\n\n${detail}\n建商 (餘額): ${(builderPct*100).toFixed(2)}%\n\n` +
                `出資者會自動設定 costBearing (承擔多出權益對應的開發成本, 可在六手動微調)。${removedNote}\n\n確定匯入? (會覆寫現有 owners 分回比與出資承擔)`
              )) return;
              // 只保留有持分的地主, 更新其 ratio/costBearing
              const newOwners = (p.owners||[]).filter(o => keepIds.has(o.id)).map(o => {
                const match = landlordEntries.find(e => e.ownerId === o.id);
                const newO = {...o, ratio: +match.finalRatio.toFixed(6)};
                if (match.invest) {
                  // 自 v194 修正：出資地主的 costBearing 應為完整 farPct（拿多少面積就承擔多少成本）
                  //   原本誤用 extraEquity = farPct×(1-jbLandShare)，只算了「多拿部分」的成本，
                  //   導致出資地主拿了 10% 面積卻只付 5% 成本，財務上不一致。
                  const fullEquity = +match.farPct.toFixed(6);
                  newO.costBearing = {
                    de: fullEquity, co: fullEquity, ad: fullEquity, tx: fullEquity,
                    mg: fullEquity, am: fullEquity, it: fullEquity
                  };
                } else {
                  newO.costBearing = {de:0, co:0, ad:0, tx:0, mg:0, am:0, it:0};
                }
                return newO;
              });
              // 若目前「我的身分」指向被移除的地主, 切回建商
              let newRole = p.myRole || "builder";
              if (newRole.startsWith("owner_")) {
                const curId = newRole.slice(6);
                if (!newOwners.find(o => String(o.id) === curId)) {
                  newRole = newOwners.length > 0 ? "owner_" + newOwners[0].id : "builder";
                }
              }
              sP({...p, owners: newOwners, myRole: newRole});
              alert(`✓ 已匯入合建分回比例 + 出資承擔成本${removed.length>0 ? `\n(已移除 ${removed.length} 位無持分地主)` : ""}`);
            };

            return (
              <>
                {/* 分屋模式設定 */}
                {p.jb && (
                  <div className="mt-3 bg-emerald-50 rounded-xl p-2.5 border border-emerald-200">
                    {/* 模式切換 */}
                    <div className="flex items-center gap-1 mb-2">
                      <span className="text-[11px] font-bold text-emerald-700 mr-1">分屋模式</span>
                      <button onClick={() => sP({...p, jbMode: "negotiated"})}
                        className={"px-2 py-1 text-[10px] font-bold rounded-lg border " + (jbMode==="negotiated" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300 hover:border-emerald-400")}>
                        協議合建
                      </button>
                      <button onClick={() => sP({...p, jbMode: "rightsConversion"})}
                        className={"px-2 py-1 text-[10px] font-bold rounded-lg border " + (jbMode==="rightsConversion" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300 hover:border-emerald-400")}>
                        權利變換
                      </button>
                    </div>
                    {jbMode === "negotiated" ? (
                      /* 協議合建: 手動合建比 */
                      <div className="flex items-center gap-2">
                        <span className="text-[11px] font-bold text-emerald-700">合建比 (地主分回成數)</span>
                        <NIpct value={jbLandShare * 100}
                          onChange={v => sP({...p, jbLandlordShare: v / 100})}
                          step={1} className="w-20" />
                        <span className="text-[11px] text-emerald-600">% (建商 {(100 - pctR1(jbLandShare)).toFixed(1)}%)</span>
                      </div>
                    ) : (
                      /* 權利變換: V/C 輸入 + 算出等效合建比 */
                      <div className="space-y-1.5">
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <div className="text-[10px] text-emerald-600 mb-0.5 flex items-center justify-between">
                              <span>更新後總價值 V (萬)</span>
                              {(p.rcTotalValue != null && p.rcTotalValue !== "")
                                ? <button onClick={() => sP({...p, rcTotalValue: null})} className="text-rose-500 hover:text-rose-700 text-[10px]" title="回復自動(總銷)">↻</button>
                                : <button onClick={() => sP({...p, rcTotalValue: +rcTotalValueAuto.toFixed(0)})} className="text-emerald-500 hover:text-emerald-700" title="改手動"><Icon name="pencil" size={11}/></button>}
                            </div>
                            {(p.rcTotalValue != null && p.rcTotalValue !== "")
                              ? <NI value={p.rcTotalValue} onChange={v => sP({...p, rcTotalValue: v})} step={100} className="w-full" />
                              : <div className="px-2 py-1 bg-white rounded text-[11px] font-mono font-bold text-slate-700">{fmt(rcTotalValue, 0)} <span className="text-[9px] text-slate-400">(自動=總銷)</span></div>}
                          </div>
                          <div>
