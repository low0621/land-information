                          <div>
                            <div className="text-teal-600">月補貼 (萬)</div>
                            <NI value={Number(o.rentSubsidy.monthly)||0}
                              onChange={v => sP({...p, owners: p.owners.map(x => x.id === o.id ? {...x, rentSubsidy: {...(x.rentSubsidy||{}), monthly: Number(v)||0}} : x)})}
                              step={0.5} className="w-full mt-0.5"/>
                          </div>
                          <div>
                            <div className="text-teal-600">補貼月數</div>
                            <NI value={Number(o.rentSubsidy.months)||0}
                              onChange={v => sP({...p, owners: p.owners.map(x => x.id === o.id ? {...x, rentSubsidy: {...(x.rentSubsidy||{}), months: Math.round(Number(v)||0)}} : x)})}
                              step={1} className="w-full mt-0.5"/>
                          </div>
                          <div className="col-span-2 text-teal-700 font-bold">
                            合計：{fmt((Number(o.rentSubsidy.monthly)||0) * (Number(o.rentSubsidy.months)||0))} 萬
                            {!!o.invest && <span className="ml-1 text-[9px] text-amber-600 font-normal">（出資中，不計入損益）</span>}
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* 💰 出資承擔成本（B 模式） */}
                  {(() => {
                    const csh = o.costBearing || {};
                    const hasAny = Object.values(csh).some(v => Number(v) > 0);
                    const expanded = !!o._expandCost || hasAny;
                    // 用 costItems 估算建商完整成本 (與 cS 函式一致)
                    const _ci = getCostItems(p);
                    const _cci = getCustomCostItems(p);
                    const _builderArea = dr.totalArea * dr.builderRatio;
                    const _shB = _builderArea * dr.weightedUP + (dr.salesMix.parkTotalSales||0) * dr.builderRatio;
                    const _cf = (_ci.co?.mode === "perPing") ? (Number(_ci.co.value)||0) * dr.totalArea : dr.totalArea * (p.cC || 0);
                    const _intr = (dr.landValue*p.lLTV*p.lLR*p.dur/12 + _cf*p.cLTV*p.cLR*p.dur/12)/2;
                    const _ctx = { sales: _shB, totalArea: dr.totalArea, totalCost: _cf };
                    const builderFullEst = {
                      co: calcCostItemValue(_ci.co, _ctx),
                      de: calcCostItemValue(_ci.de, _ctx),
                      ad: calcCostItemValue(_ci.ad, _ctx),
                      tx: calcCostItemValue(_ci.tx, _ctx),
                      mg: calcCostItemValue(_ci.mg, _ctx),
                      am: calcCostItemValue(_ci.am, _ctx),
                      it: _intr
                    };
                    if (_ci.co && _ci.co.mode === "perPing") builderFullEst.co = (Number(_ci.co.value)||0) * dr.totalArea;
                    // 自訂項目加入
                    _cci.forEach(c => {
                      builderFullEst["cu_" + c.id] = calcCostItemValue(c, _ctx);
                    });
                    // 項目列表 (標準 7 + 自訂)
                    const COST_ITEMS = [
                      {k:"co", l:STD_COST_LABELS.co, color:"text-rose-700"},
                      {k:"de", l:STD_COST_LABELS.de, color:"text-violet-700"},
                      {k:"ad", l:STD_COST_LABELS.ad, color:"text-amber-700"},
                      {k:"tx", l:STD_COST_LABELS.tx, color:"text-amber-700"},
                      {k:"mg", l:STD_COST_LABELS.mg, color:"text-emerald-700"},
                      {k:"am", l:STD_COST_LABELS.am, color:"text-emerald-700"},
                      {k:"it", l:STD_COST_LABELS.it, color:"text-slate-700"},
                      ..._cci.map(c => ({k:"cu_"+c.id, l:c.label||"自訂", color:"text-emerald-700", isCustom:true}))
                    ];
                    const totalBear = COST_ITEMS.reduce((a,ci) => a + (builderFullEst[ci.k]||0) * (Number(csh[ci.k])||0), 0);
                    return (
                      <div className="mt-2 border-t border-sky-200 pt-2">
                        <button onClick={() => updOwner(o.id, "_expandCost", !expanded)}
                          className="w-full flex items-center justify-between text-[11px] font-bold text-emerald-700 hover:text-emerald-900">
                          <span className="inline-flex items-center gap-1.5"><Icon name="wallet" size={12}/> 出資承擔成本{hasAny && <span className="ml-2 text-[9px] bg-amber-200 text-amber-800 px-1 py-0.5 rounded">B 模式</span>}</span>
                          <span className="text-emerald-500">{expanded ? "▾ 收合" : "▸ 展開"}</span>
                        </button>
                        {expanded && (
                          <div className="mt-2 space-y-1.5 bg-white rounded-lg p-2 border border-sky-100">
                            <div className="text-[10px] text-slate-500 italic mb-1">
                              勾選地主要承擔的建商成本項目與比例（0~100%）。地主承擔的金額會自動從建商成本扣除、加到地主成本中。金額以基準售價 {p.uP}/造價 {p.cC} 萬估算。
                            </div>
                            <div className="grid grid-cols-12 gap-1 items-center text-[9px] text-slate-400 px-1 pb-1 border-b">
                              <span className="col-span-2">項目</span>
                              <span className="col-span-2 text-right">全案金額</span>
                              <span className="col-span-5 text-center">承擔比例</span>
                              <span className="col-span-3 text-right">承擔金額</span>
                            </div>
                            {COST_ITEMS.map(ci => {
                              const v = Number(csh[ci.k]) || 0;
                              const fullAmt = builderFullEst[ci.k] || 0;
                              const bearAmt = fullAmt * v;
                              return (
                                <div key={ci.k} className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                  <span className={"col-span-2 font-bold "+ci.color}>{ci.l}</span>
                                  <span className="col-span-2 text-right font-mono text-slate-500">{fmt(fullAmt)}</span>
                                  <div className="col-span-5 flex items-center gap-1">
                                    <input type="range" min="0" max="1" step="0.005" value={v}
                                      onChange={e => updOwner(o.id, "costBearing", {...csh, [ci.k]: Number(e.target.value)})}
                                      className="flex-1"/>
                                    <PctInput value={v}
                                      onChange={nv => updOwner(o.id, "costBearing", {...csh, [ci.k]: nv})}
                                      className="w-16 text-right border rounded px-1 py-0.5 text-[10px]"/>
                                    <span className="text-[9px] text-slate-400">%</span>
                                  </div>
                                  <span className={"col-span-3 text-right font-mono font-bold "+(bearAmt>0?"text-amber-700":"text-slate-300")}>{fmt(bearAmt)}</span>
                                </div>
                              );
                            })}
                            <div className="grid grid-cols-12 gap-1 items-center text-[10px] pt-1 mt-1 border-t bg-amber-50 -mx-2 px-2 py-1 rounded-b">
                              <span className="col-span-7 font-bold text-amber-800">合計地主額外出資</span>
                              <span className="col-span-5 text-right font-mono font-black text-amber-800">{fmt(totalBear)} 萬</span>
                            </div>
                            {hasAny && (
                              <button onClick={() => updOwner(o.id, "costBearing", {})}
                                className="mt-1 text-[10px] text-rose-500 hover:text-rose-700">
                                ↻ 全部歸零（回復純參與分配 A 模式）
                              </button>
                            )}

                            {/* 🏦 地主融資 (新, 用於計算 ROI 與 ROE 區別) */}
                            <div className="mt-3 pt-3 border-t-2 border-dashed border-slate-300">
                              {(() => {
                                const fin = o.financing || {enabled:false, amount:0, rate:3.0, durationMonths:84};
                                const updFin = (k, v) => updOwner(o.id, "financing", {...fin, [k]: v});
                                return (
                                  <>
                                    <div className="flex items-center justify-between mb-2">
                                      <div className="text-[11px] font-bold text-emerald-700 flex items-center gap-1">
                                        <Icon name="building" size={12}/> 地主融資 (向銀行借款承擔出資)
                                      </div>
                                      <label className="flex items-center gap-1 text-[10px] cursor-pointer">
                                        <input type="checkbox" checked={fin.enabled} onChange={e=>updFin("enabled", e.target.checked)}
                                               className="w-3 h-3"/>
                                        <span className="text-slate-600">啟用</span>
                                      </label>
                                    </div>
                                    {fin.enabled && (
                                      <div className="bg-sky-50/50 rounded p-2 space-y-1 border border-sky-200">
                                        <div className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                          <span className="col-span-4 text-slate-600">融資金額</span>
                                          <NI value={Number(fin.amount)||0} onChange={v=>updFin("amount", v)} step={100} className="col-span-5 text-xs"/>
                                          <span className="col-span-3 text-slate-400 text-right">萬</span>
                                        </div>
                                        <div className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                          <span className="col-span-4 text-slate-600">年利率</span>
                                          <NI value={Number(fin.rate)||0} onChange={v=>updFin("rate", v)} step={0.25} className="col-span-5 text-xs"/>
                                          <span className="col-span-3 text-slate-400 text-right">%/年</span>
                                        </div>
                                        <div className="grid grid-cols-12 gap-1 items-center text-[10px]">
                                          <span className="col-span-4 text-slate-600">融資期間</span>
                                          <NI value={Number(fin.durationMonths)||0} onChange={v=>updFin("durationMonths", v)} step={6} className="col-span-5 text-xs"/>
                                          <span className="col-span-3 text-slate-400 text-right">月</span>
                                        </div>
                                        <div className="pt-1 mt-1 border-t border-sky-200 text-[10px] space-y-0.5">
                                          {(() => {
                                            const fa = Number(fin.amount) || 0;
                                            const fr = (Number(fin.rate) || 0) / 100;
                                            const fm = Number(fin.durationMonths) || 0;
                                            const interest = fa * fr * (fm/12) / 2;
                                            return (
                                              <>
                                                <div className="flex justify-between">
                                                  <span className="text-slate-600">預估利息支出</span>
                                                  <span className="font-mono text-rose-700">-{fmt(interest)} 萬</span>
                                                </div>
                                                <div className="text-[9px] text-slate-400 italic">
                                                  簡單利息: 金額 × 利率 × 年數 ÷ 2 (假設線性還本)
                                                </div>
                                              </>
                                            );
                                          })()}
                                        </div>
                                        <button onClick={()=>updOwner(o.id, "financing", {enabled:false, amount:0, rate:3.0, durationMonths:84})}
                                                className="text-[10px] text-rose-500 hover:text-rose-700">
                                          ↻ 關閉並歸零
                                        </button>
                                      </div>
                                    )}
                                    {!fin.enabled && (
                                      <div className="text-[10px] text-slate-400 italic">
                                        勾選「啟用」後可填入向銀行融資的金額，將計入土地貸款 (ll) 並從自有資金 (eq) 扣除。
                                        利息成本會自動加到地主成本中。
                                      </div>
                                    )}
                                  </>
                                );
                              })()}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                  {/* 自 v130: 土地價值認列 — 移出出資承擔, 與其同位階, 可收納 */}
                  {(() => {
                    const expandedLand = !!o._expandLand;
                    const lv = o.landValuation || { mode: "book" };
                    let _lm = lv.mode || "book"; if (_lm === "appraisal") _lm = "announced";
                    const _used = getOwnerLandValue(p, dr, o);
                    return (
                      <div className="mt-2 border-t border-sky-200 pt-2">
                        <button onClick={() => updOwner(o.id, "_expandLand", !expandedLand)}
                          className="w-full flex items-center justify-between text-[11px] font-bold text-emerald-700 hover:text-emerald-900">
                          <span className="inline-flex items-center gap-1.5"><Icon name="square-stack" size={12}/> 土地價值認列
                            <span className="ml-2 text-[9px] bg-emerald-100 text-emerald-800 px-1 py-0.5 rounded">{landValuationLabel(_lm)} {fmt(_used)} 萬</span>
                          </span>
                          <span className="text-emerald-500">{expandedLand ? "▾ 收合" : "▸ 展開"}</span>
                        </button>
                        {expandedLand && (
                          <LandValuationSection
                            valuation={o.landValuation}
                            ownerKey={o.id}
                            ownerName={o.name}
                            p={p} dr={dr}
                            onUpdate={(newLv)=>updOwner(o.id, "landValuation", newLv)}
                          />
                        )}
                      </div>
                    );
                  })()}
                  {/* 自 v112: 地主自由組合分回摺疊 */}
                  {renderShareComp("owner_"+o.id, o.ratio, !!o._expandComp, (v)=>updOwner(o.id, "_expandComp", v))}
                </div>
              );
            })}

            <div className="text-[10px] text-slate-500 italic bg-slate-50 rounded-lg px-3 py-2 border border-slate-200">
              ℹ️ 所有權人的新增與命名請至「一、土地資料 → 表 2 基地所有權人權屬概況表」操作。此處的地主清單由表 2 自動帶入，僅能設定分回比例、費率與出資。
            </div>

            {/* 加總驗證 */}
            <div className="mt-2 p-2 bg-amber-50 rounded text-[11px] border border-amber-200 flex justify-between">
              <span className="text-amber-700">面積分回合計</span>
              <span className="font-mono font-bold text-amber-800">
                {fmt((dr.shareInfo||[]).reduce((a,x)=>a+x.finalArea,0), 2)} / {fmt(dr.totalArea, 2)} 坪
              </span>
            </div>
          </div>}
        </div>
        {p.jb && <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div>
            <div className="text-xs font-bold text-slate-500 mb-2">費率（地主端）</div>
            {F({l:"廣告銷售費率", f:"oAdR", step:0.005})}{F({l:"稅雜費率", f:"oTxR", step:0.005})}{F({l:"物管費率", f:"oMgR", step:0.001})}
            <div className="mt-2 text-[10px] text-slate-500 italic bg-slate-50 rounded p-2 border border-slate-200">
              ℹ️ 土地增值稅已整合至「七、經營分析」的土地稅制設定 (依新/舊制自動計算)。
            </div>
          </div>
          <div>
            <div className="text-xs font-bold text-slate-500 mb-2 inline-flex items-center gap-1.5"><Icon name="scroll" size={12}/> 契稅 <ExtLink href="https://www.etax.nat.gov.tw/etwmain/etw158w/53">財政部驗證</ExtLink></div>
            <div className="bg-slate-50 rounded-xl p-3 border space-y-2">
              <div className="flex items-center justify-between"><span className="text-[11px]">類型</span><SO v={p.deedType} fn={v=>up("deedType",v)} opts={DEED_TYPES.map(d=>({v:d.k,l:d.l+(d.r*100)+"%"}))} className="w-28 text-xs"/></div>
              <div className="flex items-center justify-between"><span className="text-[11px]">房屋評定現值</span><NI value={p.deedHouseVal} onChange={v=>up("deedHouseVal",v)} className="w-20 text-xs"/></div>
            </div>
            <div className="mt-2 bg-violet-50 rounded-xl p-3 border border-violet-200">
              <div className="flex justify-between text-[11px]"><span>稅率</span><span className="font-bold">{dr.deedCalc.label} {(dr.deedCalc.rate*100)}%</span></div>
              <div className="border-t mt-1 pt-1 flex justify-between"><span className="font-bold text-violet-700">應繳契稅</span><span className="font-black text-violet-800">{fmt(dr.deedCalc.tax)} 萬</span></div>
            </div>
          </div>
        </div>}
      </Card>
    </div>
  );
}

function BonusPctSelect({val, onChange, max}) {
  const isPresetMatch = BONUS_PCT_OPTS.some(o => o.v === val && o.v > 0);
  const [showCustom, setShowCustom] = useState(!isPresetMatch && val !== 0);
  const handleSelect = (e) => {
    const v = parseFloat(e.target.value);
    if (v === -1) { setShowCustom(true); }
    else { setShowCustom(false); onChange(v); }
  };
  const selectVal = showCustom ? -1 : val;
  return (
    <div className="flex items-center gap-1">
      <select value={selectVal} onChange={handleSelect}
        className="px-1.5 py-0.5 text-[11px] border border-sky-300 rounded bg-sky-50 text-emerald-900 font-semibold focus:outline-none focus:ring-1 focus:ring-sky-400">
        {BONUS_PCT_OPTS.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
      {showCustom && <NI value={val} onChange={onChange} max={max||100} step={1} className="w-14 text-center"/>}
      <span className="text-[10px] text-slate-400">%</span>
    </div>
  );
}

/* ════════════════════════════════════════
   自 v176: 表2 持分列 獨立元件 HoldingRow
   把整個 <tr> 抽成元件，讓 React 穩定追蹤每列生命週期
   LVTCell 在 HoldingRow 內部，不受其他列 re-render 影響
════════════════════════════════════════ */
function HoldingRow({ h, p, sP, dr, apiClient }) {
  const {useState, useEffect} = React;

  const land = (p.lands || []).find(l => l.sec === h.sec && l.num === h.num);
  const _effRatio = (typeof dr.effectiveRatio === "number") ? dr.effectiveRatio : 1;
  const shareM2   = land ? (land.m2 || 0) * (h.share || 0) * _effRatio : 0;
  const sharePing = +(shareM2 * 0.3025).toFixed(2);
  const shareValue = land ? (land.m2 || 0) * (land.announcedValuePerM2 || 0) * (h.share || 0) * _effRatio / 10000 : 0;
  let landFar = 0;
  if (land && !land.isNonBuildable) {
    if (land.far != null && land.far !== "") { landFar = land.far / 100; }
    else { const zi = gzi(land.city || p.city, land.zone || p.zone); landFar = zi.f || 0; }
  }
  const farWeighted = sharePing * landFar;

  const updHolding = (k, v) => sP({...p, ownerHoldings: p.ownerHoldings.map(x => x.id === h.id ? {...x, [k]: v} : x)});

  const onSelectOwner = (val) => {
    if (val === "__new__") {
      const nm = (window.prompt("新增所有權人名稱:", "") || "").trim();
      if (!nm) return;
      const exist = (p.owners || []).find(o => o.name === nm);
      const newOwner = exist || {id: Date.now()+Math.random(), name: nm, ratio: 0, invest: false,
        feeEnabled:{ad:true,tx:true,mg:true}, costBearing:{de:0,co:0,ad:0,tx:0,mg:0,am:0,it:0},
        financing:{enabled:false, amount:0, rate:3.0, durationMonths:84},
        rentSubsidy:{enabled:false, monthly:0, months:0},
        lvtExemptOnExchange:false, lvtDiscountOnDisposal:false};
      sP({...p, jb: true, owners: exist ? p.owners : [...(p.owners||[]), newOwner],
        ownerHoldings: p.ownerHoldings.map(x => x.id === h.id ? {...x, ownerId: newOwner.id} : x)});
    } else if (val === "builder") {
      updHolding("ownerId", "builder");
    } else {
      sP({...p, jb: true, ownerHoldings: p.ownerHoldings.map(x => x.id === h.id ? {...x, ownerId: val} : x)});
    }
  };
  const renameOwner = () => {
    if (h.ownerId === "builder") return;
    const owner = (p.owners||[]).find(o => o.id === h.ownerId);
    const nm = (window.prompt("修改所有權人名稱:", owner ? owner.name : "") || "").trim();
    if (!nm) return;
    sP({...p, owners: p.owners.map(o => o.id === h.ownerId ? {...o, name: nm} : o)});
  };

  const ownerName = h.ownerId === "builder" ? "建商"
    : ((p.owners||[]).find(o => o.id === h.ownerId)?.name || "(未知)");

  return (
    <tr key={h.id} className="border-b border-slate-100 hover:bg-violet-50/30">
      <td className="px-1 py-1">
        <div className="flex items-center gap-0.5">
          <select value={h.ownerId} onChange={e => onSelectOwner(e.target.value)}
            className="w-24 px-1 py-0.5 border rounded bg-white text-[11px] font-bold text-slate-700">
            <option value="builder">建商</option>
            {(p.owners || []).map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
            <option value="__new__">➕ 新增所有權人</option>
          </select>
          {h.ownerId !== "builder" && (
            <button onClick={renameOwner} title="改名" className="px-1 text-slate-400 hover:text-violet-600">
              <Icon name="pencil" size={11}/>
            </button>
          )}
        </div>
      </td>
      <td className="px-1 py-1">
        <select value={h.sec} onChange={e => {
          const sel = e.target.value;
          const newNum = (p.lands.filter(l => l.sec === sel)[0]?.num) || "";
          sP({...p, ownerHoldings: p.ownerHoldings.map(x => x.id === h.id ? {...x, sec: sel, num: newNum} : x)});
        }} className="w-16 px-1 py-0.5 border rounded bg-white text-[11px]">
          {Array.from(new Set(p.lands.map(l => l.sec))).map(s => <option key={s} value={s}>{s || "(空)"}</option>)}
        </select>
      </td>
      <td className="px-1 py-1">
        <select value={h.num} onChange={e => updHolding("num", e.target.value)}
          className="w-16 px-1 py-0.5 border rounded bg-white text-[11px]">
          {p.lands.filter(l => l.sec === h.sec).map(l => <option key={l.id} value={l.num}>{l.num || "(空)"}</option>)}
        </select>
      </td>
      <td className="px-1 py-1 text-right">
        <NIpct value={(h.share || 0) * 100} onChange={v => updHolding("share", v / 100)} step={0.1} className="w-20"/>
      </td>
      <td className="px-1 py-1 text-right font-mono text-slate-700">{fmt2(shareM2)}</td>
      <td className="px-1 py-1 text-right font-mono text-slate-700">{fmt2(sharePing)}</td>
      <td className="px-1 py-1 text-right font-mono font-bold text-violet-700">{fmt2(shareValue)}</td>
      <td className="px-1 py-1 text-right font-mono font-bold text-emerald-700">{fmt2(farWeighted)}</td>
      <LVTCell h={h} sP={sP} apiClient={apiClient} lands={p.lands}/>
      <td className="px-1 py-1 text-center">
        <button onClick={() => sP({...p, ownerHoldings: p.ownerHoldings.filter(x => x.id !== h.id)})}
          className="px-1.5 py-0.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded inline-flex items-center">
          <Icon name="x" size={12}/>
        </button>
      </td>
    </tr>
  );
}
// 自 v183: LVTCell — 完全自管理
// lvtOrigVal 也移入本地管理，徹底解決 onBlur+onClick 同 cycle 的 stale state 問題
function LVTCell({ h, sP, apiClient, lands }) {
  const {useState, useEffect, useRef} = React;
  const hId = h.id;

  // ── 全部本地 state ──
  const [draftOV, setDraftOV] = useState(String(h.lvtOrigVal > 0 ? h.lvtOrigVal : ""));
  const [draftY,  setDraftY]  = useState(h.landAcquireYearROC > 0 ? String(h.landAcquireYearROC) : "");
  const [draftM,  setDraftM]  = useState(h.landAcquireMonth   > 0 ? String(h.landAcquireMonth)   : "");
  const [localTax, setLocalTax] = useState(h.lvtTaxResult);
  const [querying, setQuerying] = useState(false);

  // ref 追蹤最新值（cleanup 用）
  const ovRef  = useRef(draftOV);
  const yRef   = useRef(draftY);
  const mRef   = useRef(draftM);
  const taxRef = useRef(localTax);
  useEffect(() => { ovRef.current  = draftOV;  }, [draftOV]);
  useEffect(() => { yRef.current   = draftY;   }, [draftY]);
  useEffect(() => { mRef.current   = draftM;   }, [draftM]);
  useEffect(() => { taxRef.current = localTax; }, [localTax]);

  // cleanup：unmount 時一次寫回所有欄位（functional updater，永遠基於最新 state）
  useEffect(() => {
    return () => {
      const ov  = parseFloat(ovRef.current)  || 0;
      const yr  = parseInt(yRef.current, 10) || 0;
      const mo  = Math.max(1, Math.min(12, parseInt(mRef.current, 10) || 1));
      const tax = taxRef.current;
      sP(prev => {
        const h0 = prev.ownerHoldings.find(x => x.id === hId);
        if (!h0) return prev;
        const patch = {};
        if (ov  !== (h0.lvtOrigVal          || 0)) patch.lvtOrigVal          = ov;
        if (yr  !== (h0.landAcquireYearROC  || 0)) patch.landAcquireYearROC  = yr;
        if (mo  !== (h0.landAcquireMonth    || 1)) patch.landAcquireMonth    = mo;
        if (tax !== h0.lvtTaxResult)               patch.lvtTaxResult         = tax;
        if (!Object.keys(patch).length) return prev;
        return { ...prev, ownerHoldings: prev.ownerHoldings.map(x => x.id === hId ? {...x, ...patch} : x) };
      });
    };
  }, []);

  // 切換持分時重置
  useEffect(() => {
    setDraftOV(h.lvtOrigVal > 0 ? String(h.lvtOrigVal) : "");
    setDraftY(h.landAcquireYearROC > 0 ? String(h.landAcquireYearROC) : "");
    setDraftM(h.landAcquireMonth   > 0 ? String(h.landAcquireMonth)   : "");
    setLocalTax(h.lvtTaxResult);
  }, [h.id]);

  const yr        = parseInt(draftY, 10) || 0;
  const isOld     = yr > 0 && yr < 105;
  const hasResult = localTax != null;

  // 自 v193: 主動 commit（onBlur），不再只依賴 unmount cleanup
  //   根因：LVTCell 只在 HoldingRow unmount 時才觸發 cleanup 寫回，
  //   但一般操作（填完直接存檔/切Tab不刪列）並不會讓它 unmount，導致月份等欄位填了卻沒存到
  const commitField = (key, draftVal, parser) => {
    const v = parser(draftVal);
    sP(prev => {
      const h0 = prev.ownerHoldings.find(x => x.id === hId);
      if (!h0 || v === (h0[key] ?? (key === "landAcquireMonth" ? 1 : 0))) return prev;
      return { ...prev, ownerHoldings: prev.ownerHoldings.map(x => x.id === hId ? {...x, [key]: v} : x) };
    });
  };
  const commitOV = () => commitField("lvtOrigVal", draftOV, v => parseFloat(v) || 0);
  const commitY  = () => commitField("landAcquireYearROC", draftY, v => parseInt(v, 10) || 0);
  const commitM  = () => commitField("landAcquireMonth", draftM, v => Math.max(1, Math.min(12, parseInt(v, 10) || 1)));

  const doQuery = async () => {
    const finalOV = parseFloat(draftOV) || 0;
    const finalYr = parseInt(draftY, 10) || 0;
    const finalMo = Math.max(1, Math.min(12, parseInt(draftM, 10) || 1));
    // 直接讀本地 draft，完全不依賴父元件 state
    if (!finalOV) { alert("請先填寫「原規定地價」"); return; }
    if (!finalYr) { alert("請先填寫「取得年月 (民國)」"); return; }
    const land = (lands || []).find(l => l.sec === h.sec && l.num === h.num);
    if (!land)                     { alert("找不到對應的表1土地資料"); return; }
    if (!land.announcedValuePerM2) { alert("表1未填「公告現值 (元/m²)」"); return; }
    if (!land.m2)                  { alert("表1未填面積"); return; }
    setQuerying(true);
    try {
      const r = await apiClient.queryLandTax({
        year: finalYr, month: finalMo,
        curr_val: String(land.announcedValuePerM2),
        orig_val: String(finalOV),
        area: String(land.m2),
        land_type: String(h.lvtLandType || "1"),
        share: String(h.share)
      });
      const taxWan = +((Number(r.param5) || 0) / 10000).toFixed(2);
      setLocalTax(taxWan);
      // 查詢成功立即寫回（functional updater，安全）
      sP(prev => ({ ...prev, ownerHoldings: prev.ownerHoldings.map(x =>
        x.id === hId ? {...x, lvtTaxResult: taxWan} : x) }));
      alert(`✓ ${h.sec}/${h.num} 土增稅查詢完成：${taxWan.toFixed(2)} 萬`);
    } catch (err) {
      alert("查詢失敗: " + err.message);
    } finally {
      setQuerying(false);
    }
  };

  return (
    <React.Fragment>
      {/* 原規定地價（移入 LVTCell 完全本地管理）*/}
      <td className="px-1 py-1 text-right">
        <input type="text" inputMode="numeric" placeholder="0"
          value={draftOV}
          onChange={e => setDraftOV(e.target.value)}
          onBlur={commitOV}
          className="w-20 text-[10px] text-right px-1 py-0.5 border border-sky-300 rounded bg-sky-50"/>
      </td>
      {/* 取得年月 */}
      <td className="px-1 py-1">
        <div className="flex items-center gap-0.5">
          <input type="text" inputMode="numeric" placeholder="年"
            value={draftY} onChange={e => setDraftY(e.target.value)}
            onBlur={commitY}
            className="w-12 text-[10px] text-center px-1 py-0.5 border border-sky-300 rounded bg-sky-50"/>
          <span className="text-[9px] text-slate-400">/</span>
          <input type="text" inputMode="numeric" placeholder="月"
            value={draftM} onChange={e => setDraftM(e.target.value)}
            onBlur={commitM}
            className="w-9 text-[10px] text-center px-1 py-0.5 border border-sky-300 rounded bg-sky-50"/>
        </div>
      </td>
      {/* 稅制/土增稅 */}
      <td className="px-1 py-1 text-center">
        <div style={{display: isOld ? "block" : "none"}} className="space-y-0.5">
          <span className="text-[9px] px-1 py-0.5 rounded bg-amber-100 text-amber-700 font-bold">舊制</span>
          <div>
            <div style={{display: hasResult ? "block" : "none"}} className="text-[10px] font-mono text-amber-800 font-bold">
              {hasResult ? Number(localTax).toFixed(2) : ""}
              <button onClick={doQuery} disabled={querying}
                className="ml-1 text-sky-500 hover:text-sky-700" title="重新查詢">
                <Icon name={querying ? "loader" : "refresh-cw"} size={9}/>
              </button>
            </div>
            <button onClick={doQuery} disabled={querying}
              style={{display: hasResult ? "none" : "inline-flex"}}
              className="text-[9px] px-1.5 py-0.5 bg-sky-600 hover:bg-sky-700 text-white rounded items-center gap-0.5">
              <Icon name="search" size={10}/>{querying ? "查詢中…" : "查詢"}
            </button>
          </div>
        </div>
        <span style={{display: isOld ? "none" : "inline"}}
          className="text-[9px] px-1 py-0.5 rounded bg-emerald-100 text-emerald-700 font-bold">新制自動</span>
      </td>
    </React.Fragment>
  );
}
/* ════════════════════════════════════════
   TAB 6: 建築規劃 (面積計算精算)
   v10:
   - 土地清冊 m² primary, 坪 自動換算 (×0.3025)
   - 建蔽率/容積率 預設繼承 zone (顯示淡色字), 手動輸入則覆寫
   - 容積獎勵階層化, 高雄厝為勾選項之一
   - 每個公式結果可手動覆寫 (☐ → 編輯框 / ↻)
   - 13~15 增加 透天住宅 勾選 (車位 44m² + 可選擇納入可銷)
════════════════════════════════════════ */
function T6({p, sP}) {
  const dr = calcDerived(p);
  const ar = dr.areaResult;
  const ac = p.areaCalc || {};
  const mo = ac.manualOverride || {};
  const up = (f, v) => sP({...p, [f]: v});
  const upAC = (k, v) => sP({...p, areaCalc: {...ac, [k]: v}});
  const updLand = (id, k, v) => sP({...p, lands: p.lands.map(l => l.id===id ? {...l,[k]:v} : l)});

  /* 手動覆寫 helpers */
  const isOver = (k) => mo[k] !== undefined && mo[k] !== null && mo[k] !== "";
  const setOver = (k, v) => sP({...p, areaCalc: {...ac, manualOverride: {...mo, [k]: v}}});
  const clrOver = (k) => {
    const nm = {...mo}; delete nm[k];
    sP({...p, areaCalc: {...ac, manualOverride: nm}});
  };

  /* 容積獎勵 */
  const toggleBI = (k, on) => {
    const nb = {...p.bo};
    if (on) nb[k] = true; else delete nb[k];
    sP({...p, bo: nb});
  };
  const setBIPct = (k, v) => sP({...p, bop: {...p.bop, [k]: v}});
  const addCustomBonus = () => sP({...p, bonusCustom: [...(p.bonusCustom||[]), {id:uid(), name:"自訂獎勵", pct:10, isTOD:false}]});
  const updCustom = (id, k, v) => sP({...p, bonusCustom: (p.bonusCustom||[]).map(c => c.id===id ? {...c,[k]:v} : c)});
  const delCustom = (id) => sP({...p, bonusCustom: (p.bonusCustom||[]).filter(c => c.id!==id)});

  /* Row 元件已搬到模組頂層 (AreaRow, 避免每次 render 重建導致 input 掉 focus); 此處備好其 closure 依賴 */
  const rowCtx = {isOver, mo, setOver, clrOver};

  /* zone 預設顯示提示 */
  const zoneNote = <span className="text-[10px] text-slate-400 italic">加權繼承基準: 建蔽率 {((ar.zoneBCR||0)*100).toFixed(1)}% / 容積率 {((ar.zoneFAR||0)*100).toFixed(1)}%</span>;

  return (
    <div className="space-y-4">
      {/* 啟用開關 */}
      <Card title="建築規劃精算開關" accent="bg-sky-700" icon="settings">
        <Chk ck={!!ac.enable} onChange={v=>upAC("enable", v)}
          l="啟用此分頁精算結果作為總銷面積來源"
          inline={false}
          sub="勾選後，T1 基本假設、損益分析、現金流、敏感度都會使用以下計算的『總銷面積』、『戶數』、『車位』數值"/>
        {ac.enable && <div className="mt-2 p-2 bg-emerald-50 rounded-lg border border-emerald-200 text-[11px] text-emerald-700 inline-flex items-center gap-1">
          <Icon name="check" size={12}/> 已啟用 — 修改下方任何欄位將即時影響全系統計算
        </div>}
        <div className="mt-3 pt-3 border-t">
          <div className="text-[11px] text-slate-500 mb-1 font-bold inline-flex items-center gap-1.5"><Icon name="ruler" size={11}/> 損益分析建築工程造價公式</div>
          <div className="p-2 bg-slate-50 rounded text-[11px] text-slate-700 font-mono">
            cf = 總銷面積 × 各方案造價
          </div>
          <div className="mt-1 text-[10px] text-slate-400">
            合建情況下，建商出資蓋全棟，造價成本以全案總銷面積為計算基準（與膨脹係數無關）
          </div>
        </div>
      </Card>

      {/* 1. 基地面積 */}
      <Card title="① 基地面積" accent="bg-slate-700" icon="map-pin">
        <div className="text-[10px] text-slate-400 mb-2 italic">提示：{zoneNote}。每筆建蔽率/容積率留白 = 採用本區預設值；輸入數字則覆寫</div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-100 text-slate-600">
                <th className="py-2 px-2 text-left">土地名稱</th>
                <th className="py-2 px-2 text-right">m²</th>
                <th className="py-2 px-2 text-right">坪 (自動)</th>
                <th className="py-2 px-2 text-right">建蔽率(%)</th>
                <th className="py-2 px-2 text-right">容積率(%)</th>
              </tr>
            </thead>
            <tbody>
              {p.lands.map(l => {
                const m2v = l.m2 || 0;
                const pingv = +(m2v * 0.3025).toFixed(2);
                const bcrEmpty = l.bcr === null || l.bcr === undefined || l.bcr === "";
                const farEmpty = l.far === null || l.far === undefined || l.far === "";
                return (
                  <tr key={l.id} className="border-b hover:bg-sky-50/40">
                    <td className="py-1.5 px-2 text-slate-700">{l.name}</td>
                    <td className="py-1.5 px-2 text-right">
                      <NI value={m2v}
                        onChange={v => sP({...p, lands: p.lands.map(x => x.id===l.id ? {...x, m2:v, area:+(v*0.3025).toFixed(2)} : x)})}
                        step={0.01} className="w-24 text-right"/>
                    </td>
                    <td className="py-1.5 px-2 text-right">
                      <span className="px-2 py-1 bg-slate-100 rounded text-slate-700 font-mono font-semibold">{fmt(pingv,2)}</span>
                    </td>
                    <td className="py-1.5 px-2 text-right">
                      <input type="number" step="1"
                        value={bcrEmpty ? "" : l.bcr}
                        placeholder={String(((ar.zoneBCR||0)*100).toFixed(0))}
                        onChange={e => updLand(l.id, "bcr", e.target.value === "" ? null : parseFloat(e.target.value))}
                        className={"field-sizing-content w-full w-20 text-right px-2 py-1 border rounded text-sm "+(bcrEmpty?"text-slate-400 italic bg-slate-50":"text-slate-700 bg-white")}/>
                    </td>
                    <td className="py-1.5 px-2 text-right">
                      <input type="number" step="1"
                        value={farEmpty ? "" : l.far}
                        placeholder={String(((ar.zoneFAR||0)*100).toFixed(0))}
                        onChange={e => updLand(l.id, "far", e.target.value === "" ? null : parseFloat(e.target.value))}
                        className={"field-sizing-content w-full w-20 text-right px-2 py-1 border rounded text-sm "+(farEmpty?"text-slate-400 italic bg-slate-50":"text-slate-700 bg-white")}/>
                    </td>
                  </tr>
                );
              })}
              <tr className="bg-amber-50 border-t-2 border-amber-300 font-bold">
                <td className="py-2 px-2 text-amber-800">合計</td>
                <td className="py-2 px-2 text-right text-amber-800 font-mono">{fmt(ar.site_total_m2,2)} m²</td>
                <td className="py-2 px-2 text-right text-amber-800 font-mono">{fmt(ar.site_total,2)} 坪</td>
                <td colSpan={2} className="py-2 px-2 text-right text-[10px] text-amber-700">平均 BCR {(ar.avg_bcr*100).toFixed(2)}% / FAR {(ar.avg_far*100).toFixed(2)}%</td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>

      {/* 2. 允建建築面積 */}
      <Card title="② 允建建築面積 (建蔽率)" accent="bg-slate-700">
        <div className="space-y-1 mb-2">
          {ar.bcrRows.map((r,i) => (
            <div key={i} className="flex items-center justify-between text-[12px] px-2 py-1 bg-slate-50 rounded">
              <span className="text-slate-600">{r.name}: {fmt(r.area,2)} × {r.bcr}%{r.inherited && <span className="ml-1 text-[9px] text-slate-400">(繼承)</span>}</span>
              <span className="font-mono font-semibold">{fmt(r.result, 2)} 坪</span>
            </div>
          ))}
        </div>
        <AreaRow ctx={rowCtx} k="bcr_total" label="允建建築合計" formula={`Σ(基地 × 建蔽率)`} result={ar.bcr_total} accent="gold"/>

        <div className="mt-3 p-3 bg-sky-50 rounded-lg border border-sky-200">
          <Chk ck={!!ac.useOrigCap} onChange={v=>upAC("useOrigCap",v)} l="使用原始容積 × 倍數作為 ⑤ Σ FA (取代基準 + 獎勵)"/>
          {ac.useOrigCap && (
            <div className="mt-2 grid grid-cols-2 gap-2">
              <div className="flex items-center gap-1">
                <span className="text-[11px] text-slate-600">原始容積面積</span>
                <NI value={ac.origCapArea||0} onChange={v=>upAC("origCapArea",v)} className="w-24"/>
                <span className="text-[10px] text-slate-400">坪</span>
              </div>
              <div className="flex items-center gap-2 flex-wrap">
                <label className="text-[11px] flex items-center gap-1"><input type="radio" checked={ac.origCapMult===1.15} onChange={()=>upAC("origCapMult",1.15)}/> ×1.15</label>
                <label className="text-[11px] flex items-center gap-1"><input type="radio" checked={ac.origCapMult===1.2} onChange={()=>upAC("origCapMult",1.2)}/> ×1.2</label>
                <label className="text-[11px] flex items-center gap-1"><input type="radio" checked={ac.origCapMult===1.3} onChange={()=>upAC("origCapMult",1.3)}/> ×1.3</label>
              </div>
              <div className="col-span-2 mt-1 p-2 bg-white rounded border text-[12px]">
                結果: {fmt(ac.origCapArea||0)} × {ac.origCapMult} = <span className="font-bold text-amber-700">{fmt(ar.origResult,2)} 坪</span>
                <span className="ml-2 text-[10px] text-emerald-700">→ 已自動覆寫 ⑤ Σ FA</span>

        </div>

      <Card title="③ 基準容積面積 (FA)" accent="bg-slate-700" className={ac.useOrigCap ? "opacity-50" : ""}>
        {ac.useOrigCap && (
          <div className="mb-2 p-2 bg-amber-50 border border-amber-200 rounded text-[10px] text-amber-800">

          </div>

        <div className="space-y-1 mb-2">
          {ar.farRows.map((r,i) => (
            <div key={i} className="flex items-center justify-between text-[12px] px-2 py-1 bg-slate-50 rounded">
              <span className="text-slate-600">{r.name}: {fmt(r.area,2)} × {(r.far/100).toFixed(2)} ({r.far}%){r.inherited && <span className="ml-1 text-[9px] text-slate-400">(繼承)</span>}</span>
              <span className="font-mono font-semibold">{fmt(r.result, 2)} 坪</span>
            </div>
          ))}

        <AreaRow ctx={rowCtx} k="fa_total" label="基準容積合計 FA" formula="Σ(基地 × 容積率)" result={ar.fa_total} accent="gold"/>

      {/* 4. 容積獎勵 (階層化) */}
      <Card title="④ 容積獎勵" accent="bg-violet-700" icon="trophy" className={ac.useOrigCap ? "opacity-50" : ""}>
        {ac.useOrigCap && (
          <div className="mb-2 p-2 bg-amber-50 border border-amber-200 rounded text-[10px] text-amber-800">
            ⚠️ 已啟用「原始容積 × 倍數」, 此區數值<b>不計入 ⑤ Σ FA</b> (僅供參考)
          </div>
        )}
        <div className="text-[11px] text-slate-500 mb-3">勾選獎勵項目並設定 %；子項目縮排顯示，需父項勾選後才會列入計算。<span className="text-violet-600 font-bold">若父項下有任一子項已勾選 → 父項的 % 將自動 = Σ 子項加總 (父項 % 變不可手動調整)</span>。高雄厝勾選後啟用 ⑨A/⑨B 計算。</div>

        <div className="space-y-1.5">
          {BI.map(item => {
            const on = !!p.bo[item.k];
            const isChild = !!item.parent;
            const parentOn = !isChild || !!p.bo[item.parent];
            const isKH = item.special === "kh";
            const hasChildren = !isChild && ar.childSum && ar.childSum[item.k] !== undefined;
            // 顯示用 %
            const effectivePct = hasChildren
              ? ar.childSum[item.k]
              : ((p.bop && p.bop[item.k] !== undefined && p.bop[item.k] !== null) ? p.bop[item.k] : item.mx);
            return (
              <div key={item.k}
                className={"rounded-lg border p-2 " +
                  (on?(isKH?"border-amber-300 bg-amber-50":"border-violet-300 bg-violet-50"):"border-slate-200") +
                  (isChild?" ml-6":"") +
                  (isChild && !parentOn?" opacity-50":"")}>
                <div className="flex items-center justify-between gap-2">
                  <Chk ck={on}
                    onChange={v => toggleBI(item.k, v)}
                    disabled={isChild && !parentOn}
                    l={<span className={isChild?"text-[12px]":"font-semibold"}>{item.l.trim()}{isKH && " 🌴"}</span>}
                    inline={false}
                    sub={<span className="text-[10px]">{item.ds} {!["dangold","urban","transfer"].includes(item.k) && <span className="text-slate-400">(上限 {item.mx}%)</span>}</span>}/>
                  {on && parentOn && (
                    <div className="flex items-center gap-2 ml-2 shrink-0">
                      {hasChildren ? (
                        <div className="flex items-center gap-1 px-2 py-0.5 bg-violet-100 rounded border border-violet-300">
                          <span className="text-[10px] text-violet-500">= Σ 子項</span>
                          <span className="text-sm font-black text-violet-800">{effectivePct}%</span>

                    </div>

            );

/* ════════════════════════════════════════
   TAB 7: 經營分析 (不動產處分效益 / 長期持有)
════════════════════════════════════════ */
function T7({p, sP}) {
  const dr = calcDerived(p);
  const cb = p.compBenefit || {};
  const ce = calcCompBenefit(p, dr);
  const [showCostDetail, setShowCostDetail] = useState(false);
  const upCB = (k, v) => sP({...p, compBenefit: {...cb, [k]: v}});
  const upRent = (k, v) => sP({...p, compBenefit: {...cb, rent: {...(cb.rent||{}), [k]: v}}});
  const upBiz = (k, v) => sP({...p, compBenefit: {...cb, business: {...(cb.business||{}), [k]: v}}});
  const upPD = (k, v) => sP({...p, compBenefit: {...cb, partialDispose: {...(cb.partialDispose||{}), [k]: v}}});
  // ── 多筆處分 helpers ──
  const updDisposal = (id, k, v) => {
    const list = (cb.disposals || []).map(d => d.id === id ? {...d, [k]: v} : d);
    sP({...p, compBenefit: {...cb, disposals: list}});
  };
  const addDisposal = () => {
    const list = cb.disposals || [];
    const maxId = list.reduce((a,d) => Math.max(a, d.id||0), 0);
    const newD = {id: maxId+1, label: `第${list.length+1}筆`, year: 2030, month: 6, area: 0, price: 0, enabled: true};
    sP({...p, compBenefit: {...cb, disposals: [...list, newD]}});
  };
  const delDisposal = (id) => {
    const list = (cb.disposals || []).filter(d => d.id !== id);
    sP({...p, compBenefit: {...cb, disposals: list.length>0 ? list : [{id:1, label:"完工出售", year:2028, month:6, area:0, price:0, enabled:true}]}});
  };


  const mode = cb.mode || "single";
  const isOwner = (ce.myRole || "").startsWith("owner_");
  const isSingle = mode === "single";

  // 自 v66: viewTab 控制 UI 顯示哪個區塊 (處分/長持/容移)
  // 自 v83: single 已廢棄, viewTab 只有 "longHold" 或 "vol"
  // 自 v86: 廢棄 viewTab, 改為單一視圖 + 容移勾選展開
  const isVolTab = false;      // v86: 永遠 false, 容移作為主視圖內的勾選區
  const setView = () => {};    // v86: 廢棄 setView, 保留空函式避免引用錯誤
  // volTransfer 操作 helpers
  const upVT = (k, v) => sP({...p, compBenefit: {...cb, volTransfer: {...(cb.volTransfer||{}), [k]: v}}});
  const addVTCost = () => {
    const list = (cb.volTransfer?.extraCosts || []);
    const maxId = list.reduce((a,c) => Math.max(a, c.id||0), 0);
    upVT("extraCosts", [...list, {id: maxId+1, label: "", amount: 0}]);
  };
  const updVTCost = (id, k, v) => {

                  <div className="text-sm font-bold text-emerald-900 inline-flex items-center gap-1.5"><Icon name="scroll" size={13}/> 啟用容積移轉</div>
                  <div className="text-[10px] text-emerald-700">
                    自 v221 起，容移淨收益不再自動計入損益分析/最優化的合計，改在「損益分析」頁面
                    「容積移轉情境模擬」面板單獨勾選查看，不會污染其他情境或最優化結果。
                  </div>
                </div>
              </label>
              {vt.enabled && (
                <div className="mt-3 pt-3 border-t border-sky-200 space-y-2">
                  {/* v86 廢棄: subMode radio (純粹 vs 結合) — 改由「使用者是否設定蓋房」自動決定 */}
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-[11px] font-bold text-sky-800">收益分配給建商</span>
                    <NI value={Math.round((Number(vtCfg.builderShareRatio)||0)*1000)/10} onChange={v=>upVT("builderShareRatio", (Number(v)||0)/100)} step={10} className="w-20 text-center"/>

                  </div>
                </div>

            </div>

            {/* v86 廢棄: 「請啟用上方開關」提示 — 因為現在容移是勾選式, 沒啟用就摺疊起來 */}

            {vt.enabled && (<>
              {/* 收益基礎 */}
              <div className="bg-white rounded-2xl border shadow-sm p-4">
                <div className="text-sm font-bold text-emerald-800 mb-3 inline-flex items-center gap-1.5"><Icon name="dollar-sign" size={13}/> 收益基礎</div>
                <div className="space-y-3">
                  <div className="flex items-center justify-between gap-2 flex-wrap">
                    <div className="text-[11px] text-slate-600">分析地主公告總值
                      {vt.isOverridden
                        ? <span className="ml-1 text-[10px] text-violet-600 font-bold">(手動覆寫)</span>
                        : <span className="ml-1 text-[10px] text-slate-400">(自動帶, 來自表 2 我的持分)</span>}
                    </div>
                    <div className="flex items-center gap-1">
                      {vt.isOverridden ? (
                        <NI value={Number(vtCfg.announcedValueOverride)||0} onChange={v=>upVT("announcedValueOverride", v)} step={100} className="w-28 text-right"/>

                      <button onClick={()=>upVT("announcedValueOverride", vt.isOverridden ? null : vt.announcedAuto)}

                        className={"px-2 py-1 text-[10px] font-bold rounded border "+(vt.isOverridden?"bg-slate-100 text-slate-600 border-slate-300":"bg-violet-50 text-violet-700 border-violet-300 hover:bg-violet-100")}>
                        {vt.isOverridden ? "↻ 自動" : "📝 覆寫"}
                      </button>
                    </div>
                  </div>
                  <div className="flex items-center justify-between gap-2">
                    <div className="text-[11px] text-slate-600">容積買賣比例 (佔公告總值)</div>
                    <div className="flex items-center gap-1">
                      <NI value={Number(vtCfg.pricePct)||0} onChange={v=>upVT("pricePct", v)} step={10} className="w-20 text-right"/>
                      <span className="text-[10px] text-slate-400">%</span>
                    </div>
                  </div>
                  <div className="bg-sky-50 rounded-lg p-3 border border-sky-200 flex items-center justify-between">
                    <div className="text-[11px] text-emerald-700 font-bold">容積出售收入</div>
                    <div className="font-mono font-black text-emerald-800 text-lg">{fmt(vt.autoRevenue, 0)} 萬</div>
                  </div>
                </div>
              </div>

              {/* 額外成本 */}
              <div className="bg-white rounded-2xl border shadow-sm p-4">
                <div className="text-sm font-bold text-rose-700 mb-2 inline-flex items-center gap-1.5"><Icon name="minus-circle" size={13}/> 額外成本 (例: 仲介費 / 地政規費 / 古蹟維護費)</div>
                {(vtCfg.extraCosts || []).length === 0 && (
                  <div className="text-[11px] text-slate-400 italic py-2">尚無項目, 按下方「+ 新增成本」開始添加</div>
                )}
                {(vtCfg.extraCosts || []).map(c => (
                  <div key={c.id} className="flex items-center gap-2 mb-2">
                    <input type="text" value={c.label || ""} onChange={e=>updVTCost(c.id, "label", e.target.value)}
                      placeholder="項目名稱 (例: 仲介費)"
                      className="flex-1 text-xs px-2 py-1 border rounded bg-slate-50"/>
                    <NI value={Number(c.amount)||0} onChange={v=>updVTCost(c.id, "amount", v)} step={10} className="w-24 text-right"/>
                    <span className="text-[10px] text-slate-400">萬</span>
                    <button onClick={()=>delVTCost(c.id)} className="px-2 py-1 bg-rose-500 hover:bg-rose-600 text-white text-[10px] font-bold rounded">✕</button>
                  </div>
                ))}
                <button onClick={addVTCost} className="px-3 py-1 bg-rose-100 hover:bg-rose-200 text-rose-700 text-[11px] font-bold rounded border border-rose-300">+ 新增成本</button>
                <div className="mt-2 pt-2 border-t border-slate-200 flex justify-between text-[12px]">
                  <span className="text-rose-700 font-bold">成本小計</span>
                  <span className="font-mono font-bold text-rose-800">{fmt(vt.totalCosts, 0)} 萬</span>
                </div>
              </div>

              {/* 額外收益 */}
              <div className="bg-white rounded-2xl border shadow-sm p-4">
                <div className="text-sm font-bold text-emerald-700 mb-2 inline-flex items-center gap-1.5"><Icon name="plus-circle" size={13}/> 額外收益 (例: 既有建築租金 / 出售)</div>
                {(vtCfg.extraRevenues || []).length === 0 && (
                  <div className="text-[11px] text-slate-400 italic py-2">尚無項目, 按下方「+ 新增收益」開始添加</div>
                )}
                {(vtCfg.extraRevenues || []).map(c => (
                  <div key={c.id} className="flex items-center gap-2 mb-2">
                    <input type="text" value={c.label || ""} onChange={e=>updVTRev(c.id, "label", e.target.value)}

                      className="flex-1 text-xs px-2 py-1 border rounded bg-slate-50"/>
                    <NI value={Number(c.amount)||0} onChange={v=>updVTRev(c.id, "amount", v)} step={10} className="w-24 text-right"/>
                    <span className="text-[10px] text-slate-400">萬</span>
                    <button onClick={()=>delVTRev(c.id)} className="px-2 py-1 bg-rose-500 hover:bg-rose-600 text-white text-[10px] font-bold rounded">✕</button>
                  </div>
                ))}
                <button onClick={addVTRev} className="px-3 py-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-[11px] font-bold rounded border border-emerald-300">+ 新增收益</button>
                <div className="mt-2 pt-2 border-t border-slate-200 flex justify-between text-[12px]">
                  <span className="text-emerald-700 font-bold">收益小計</span>
                  <span className="font-mono font-bold text-emerald-800">{fmt(vt.totalRevenues, 0)} 萬</span>
                </div>
              </div>

              {/* 淨收益 */}
              <div className="bg-gradient-to-r from-sky-50 to-cyan-100 rounded-2xl border-2 border-sky-400 p-4">
                <div className="text-[11px] text-emerald-700 mb-1">淨收益 (情境模擬)</div>
                <div className={"text-3xl font-black font-mono "+(vt.netProfit>=0?"text-emerald-800":"text-rose-700")}>
                  {fmt(vt.netProfit, 0)} 萬
                </div>
                <div className="text-[10px] text-slate-600 mt-1">
                  = 容積出售 ({fmt(vt.autoRevenue, 0)}) + 收益 ({fmt(vt.totalRevenues, 0)}) − 成本 ({fmt(vt.totalCosts, 0)})
                </div>
                <div className="text-[10px] text-amber-700 mt-2 bg-amber-50 rounded p-1.5 border border-amber-200">
                  <Icon name="info" size={11} className="inline mr-1"/> 公保地容積移轉 (即捐贈公保地) 依土地稅法為免稅, 不計土增稅。
                </div>
                {vt.includeInT8 && (
                  <div className="mt-2 text-[11px] text-emerald-700 font-bold bg-white/50 rounded p-1.5 border border-sky-300">
                    ✓ 此淨收益已計入「投資綜合報告 (T8)」
                  </div>
                )}
              </div>
            </>)}
          </div>

      })()}

      {/* ─── 選單一：不動產處分效益 ─── */}
      {!isVolTab && isSingle && <>
        {/* 自 v67: single 模式也加取得日 UI */}
        <div className="bg-white rounded-2xl border shadow-sm p-4">
          <div className="text-xs font-bold text-slate-500 mb-2 inline-flex items-center gap-1.5"><Icon name="calendar" size={12}/> 取得日期 (房地合一稅持有年期計算基準)</div>
          <div className="flex items-center gap-2 flex-wrap">
            <YearSel v={ce.acqYear} onChange={v=>upCB("acquireYear",v)}/>
            <MonSel v={ce.acqMonth} onChange={v=>upCB("acquireMonth",v)}/>
            {ce.acqAuto
              ? <span className="text-[10px] bg-sky-100 text-emerald-700 px-2 py-0.5 rounded">自動 (預設用交屋日; 若無則用銷售時程最後一期)</span>
              : <>
                <span className="text-[10px] bg-rose-100 text-rose-700 px-2 py-0.5 rounded">手動覆寫</span>
                <button onClick={()=>{upCB("acquireYear",0); upCB("acquireMonth",0);}} className="text-rose-400 hover:text-rose-600 text-xs">↻ 還原自動</button>
              </>}
            <span className="text-[10px] text-slate-400 ml-auto">處分日 = 取得日 + {ce.holdYears} 年 (持有年期)</span>
          </div>
        </div>
        <div className="bg-white rounded-2xl border shadow-sm p-4">
          <div className="text-sm font-bold text-emerald-800 mb-3 inline-flex items-center gap-1.5"><Icon name="tag" size={13}/> 不動產處分效益</div>

          <div className="grid grid-cols-3 gap-2 mb-3 text-xs">
            <div className="bg-emerald-50 rounded p-2 border border-emerald-200">
              <div className="text-emerald-600">取回總銷額</div>
              <div className="font-mono font-bold text-emerald-800">{fmt(ce.mySalesAmount)} 萬</div>
            </div>
            <button onClick={()=>setShowCostDetail(!showCostDetail)}
              className={"text-left rounded p-2 border transition "+(showCostDetail?"bg-rose-100 border-rose-300":"bg-rose-50 border-rose-200 hover:border-rose-400")}>
              <div className="text-rose-600 flex items-center justify-between">
                <span>負擔成本</span>
                <span className="text-[10px] text-rose-500">{showCostDetail?"▾ 收合":"▸ 明細"}</span>
              </div>
              <div className="font-mono font-bold text-rose-800">-{fmt(ce.myTotalCost)} 萬</div>
            </button>
            <div className="bg-slate-50 rounded p-2 border border-slate-200">
              <div className="text-slate-600">土地價值認列 ({ce.landLabel})</div>
              <div className="font-mono font-bold text-slate-800">-{fmt(ce.landValue)} 萬</div>
            </div>
          </div>

          {/* 負擔成本明細 */}
          {showCostDetail && ce.myCs && (() => {
            const COST_DEF = [
              {k:"de", l:"開發設計費",   group:"build"},
              {k:"co", l:"建築工程造價", group:"build"},
              {k:"ad", l:"廣告銷售費",   group:"sale"},
              {k:"tx", l:"稅雜費",       group:"sale"},
              {k:"mg", l:"物管費",       group:"sale"},
              {k:"am", l:"管銷費用",     group:"build"},
              {k:"it", l:"利息",         group:"build"},
              {k:"lt", l:"土地增值稅",   group:"tax"},
              {k:"lex", l:"土增稅(抵付)", group:"tax"},   // 自 v204: 互易稅，純合建移轉給建商部分
              {k:"dd", l:"契稅",         group:"tax"}
            ];
            // 自 v207: 租金補貼改為獨立收入(otherIncome)，不再混進 myCs 成本物件；
            //   不再「抵減成本合計」，改為獨立顯示（避免tc被污染成負數）
            const _rentSubAmt = Number(ce.myCs.otherIncome) || 0;
            const groupColor = {build:"text-amber-700", sale:"text-emerald-700", tax:"text-rose-700"};
            const groupLabel = {build:"建商側 (出資承擔)", sale:"地主端銷售費", tax:"法定稅費"};
            const grouped = {build:[], sale:[], tax:[]};
            COST_DEF.forEach(c => {
              const v = ce.myCs[c.k] || 0;
              if (v > 0) grouped[c.group].push({...c, v});
            });
            return (
              <div className="mb-3 p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs">
                <div className="font-bold text-slate-700 mb-2 inline-flex items-center gap-1.5"><Icon name="clipboard" size={13}/> 負擔成本明細</div>
                {["sale","build","tax"].map(g => {
                  const items = grouped[g];
                  if (items.length === 0) return null;
                  const sum = items.reduce((a,b)=>a+b.v, 0);
                  return (
                    <div key={g} className="mb-2 pb-2 border-b border-slate-200 last:border-b-0 last:pb-0 last:mb-0">
                      <div className={"text-[10px] font-bold mb-1 "+groupColor[g]}>{groupLabel[g]}</div>
                      {items.map(it => (
                        <div key={it.k} className="flex items-center justify-between py-0.5">
                          <span className="text-slate-600 pl-2">└ {it.l}</span>
                          <span className="font-mono text-slate-800">-{fmt(it.v)} 萬</span>
                        </div>
                      ))}
                      <div className="flex items-center justify-between pt-1 mt-1 border-t border-dashed border-slate-300">
                        <span className={"font-bold "+groupColor[g]}>小計</span>
                        <span className={"font-mono font-bold "+groupColor[g]}>-{fmt(sum)} 萬</span>
                      </div>
                    </div>
                  );
                })}
                <div className="flex items-center justify-between pt-2 mt-1 border-t-2 border-rose-300">
                  <span className="font-bold text-rose-700">負擔成本合計</span>
                  <span className="font-mono font-black text-rose-700 text-base">-{fmt(ce.myTotalCost)} 萬</span>
                </div>
                {_rentSubAmt > 0 && (
                  <div className="flex items-center justify-between pt-1 mt-1 border-t border-dashed border-teal-300">
                    <span className="font-bold text-teal-700">租金補貼(收入，獨立計入損益，不影響上方成本合計)</span>
                    <span className="font-mono font-bold text-teal-700">+{fmt(_rentSubAmt)} 萬</span>
                  </div>
                )}
              </div>
            );
          })()}

          {/* 土地價值認列方式 */}
          <div className="bg-sky-50 rounded-lg p-3 border border-sky-200 mb-3">
            <div className="text-xs font-bold text-emerald-800 mb-2">土地價值認列方式 (三選一)</div>
            <div className="space-y-1.5">
              <label className="flex items-center justify-between p-2 bg-white rounded border hover:bg-sky-50 cursor-pointer">
                <div className="flex items-center gap-2">
                  <input type="radio" name="landMode" checked={ce.landMode==="appraisal"} onChange={()=>upCB("landValuationMode","appraisal")}/>
                  <span className="text-xs font-bold text-slate-700">a. 鑑價總值</span>
                  <span className="text-[10px] text-slate-400">(自動帶入)</span>
                </div>
                <span className="text-sm font-mono font-bold text-slate-700">{fmt(dr.landValue)} 萬</span>
              </label>
              <label className="flex items-center justify-between p-2 bg-white rounded border hover:bg-sky-50 cursor-pointer">
                <div className="flex items-center gap-2">
                  <input type="radio" name="landMode" checked={ce.landMode==="book"} onChange={()=>upCB("landValuationMode","book")}/>
                  <span className="text-xs font-bold text-slate-700">b. 帳面現值</span>
                </div>
                <div className="flex items-center gap-1">
                  <NI value={cb.landBookValue||0} onChange={v=>upCB("landBookValue",v)} className="w-28" disabled={ce.landMode!=="book"}/>
                  <span className="text-[10px] text-slate-400">萬</span>
                </div>
              </label>
              <label className="flex items-center justify-between p-2 bg-white rounded border hover:bg-sky-50 cursor-pointer">
                <div className="flex items-center gap-2">
                  <input type="radio" name="landMode" checked={ce.landMode==="acquired"} onChange={()=>upCB("landValuationMode","acquired")}/>
                  <span className="text-xs font-bold text-slate-700">c. 取得價值</span>
                </div>
                <div className="flex items-center gap-1">
                  <NI value={cb.landAcquiredValue||0} onChange={v=>upCB("landAcquiredValue",v)} className="w-28" disabled={ce.landMode!=="acquired"}/>
                  <span className="text-[10px] text-slate-400">萬</span>
                </div>
              </label>
            </div>
          </div>

          {/* 房地合一稅試算 */}
          {TaxBlock({holdY:ce.holdYears, taxableBase:ce.single.taxableBase, taxInfo:ce.single.taxInfo})}

          {/* 效益總額 */}
          <div className="mt-3 grid grid-cols-2 gap-3">
            <div className="bg-emerald-50 rounded-lg p-3 border-2 border-emerald-200">
              <div className="text-[11px] text-emerald-600">處分淨利 (稅前)</div>
              <div className={"text-xl font-black font-mono "+(ce.single.grossProfit>=0?"text-emerald-800":"text-rose-700")}>{fmt(ce.single.grossProfit)} 萬</div>
              <div className="text-[10px] text-slate-400">= 總銷 − 負擔成本 − 土地價值</div>
            </div>
            <div className="bg-amber-100 rounded-lg p-3 border-2 border-amber-400">
              <div className="text-[11px] text-amber-700">處分淨利 (稅後)</div>
              <div className={"text-2xl font-black font-mono "+(ce.single.netProfit>=0?"text-amber-900":"text-rose-700")}>{fmt(ce.single.netProfit)} 萬</div>
              <div className="text-[10px] text-amber-700">年化 {fmt(ce.single.annual)} 萬/年 (÷ {ce.holdYears} 年)</div>
            </div>
          </div>
        </div>
      </>}

      {/* ─── 選單二：長期持有不動產效益 ─── */}
      {!isVolTab && !isSingle && <>
        {/* 互斥警示 */}
        {ce.longHold.areaConflict && (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 flex items-start gap-2">
            <Icon name="alert-triangle" size={20} className="text-amber-600"/>
            <div className="text-xs text-amber-800">
              <div className="font-bold">三塊面積加總 {fmt(ce.longHold.sumRaw, 2)} 坪 &gt; 分回面積 {fmt(ce.myArea, 2)} 坪</div>
              <div>已自動按比例縮減 (縮減係數 {(ce.longHold.scale*100).toFixed(1)}%)，您仍可手動調整。</div>
            </div>
          </div>
        )}

        {/* 取得日期 (用於房地合一稅持有年期計算) */}
        <div className="bg-white rounded-2xl border shadow-sm p-4">
          <div className="text-xs font-bold text-slate-500 mb-2 inline-flex items-center gap-1.5"><Icon name="calendar" size={12}/> 取得日期 (房地合一稅持有年期計算基準)</div>
          <div className="flex items-center gap-2 flex-wrap">
            <YearSel v={ce.acqYear} onChange={v=>upCB("acquireYear",v)}/>
            <MonSel v={ce.acqMonth} onChange={v=>upCB("acquireMonth",v)}/>
            {ce.acqAuto
              ? <span className="text-[10px] bg-sky-100 text-emerald-700 px-2 py-0.5 rounded">自動 (預設用交屋日; 若無則用銷售時程最後一期)</span>
              : <>
                <span className="text-[10px] bg-rose-100 text-rose-700 px-2 py-0.5 rounded">手動覆寫</span>
                <button onClick={()=>{upCB("acquireYear",0); upCB("acquireMonth",0);}} className="text-rose-400 hover:text-rose-600 text-xs">↻ 還原自動</button>
              </>}
            <span className="text-[10px] text-slate-400 ml-auto">每筆處分將以「處分日期 − 取得日期」自動計算持有年期</span>
          </div>
        </div>

        {/* 區塊1: 不動產處分（多筆） */}
        <div className="bg-white rounded-2xl border shadow-sm p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-sm font-bold text-emerald-800">① 不動產處分 (可多筆)</div>
            <div className="flex items-center gap-2">
              <span className="text-[10px] text-slate-500">合計處分面積 {fmt(ce.longHold.pd_sumArea,2)} 坪 · 總銷 {fmt(ce.longHold.pd_sumRevenue)} 萬</span>
            </div>
          </div>

          <div className="space-y-3">
            {ce.longHold.disposals.map((d, idx) => (
              <div key={d.id} className={"rounded-xl border-2 p-3 "+(d.enabled?"bg-emerald-50/50 border-emerald-200":"bg-slate-50 border-slate-200 opacity-70")}>
                {/* 標題列 */}
                <div className="flex items-center gap-2 mb-2 flex-wrap">
                  <input type="checkbox" checked={d.enabled} onChange={e=>updDisposal(d.id, "enabled", e.target.checked)} className="w-4 h-4"/>
                  <input type="text" value={d.label} onChange={e=>updDisposal(d.id, "label", e.target.value)}
                    className="font-semibold text-sm text-emerald-800 bg-transparent border-b w-24 focus:outline-none"/>
                  <span className="text-[10px] text-slate-500">處分日期</span>

// 雙滑桿即時對照: 售價 ± 造價 兩個獨立滑桿, 即時顯示對應淨利、IRR
function SliderPlayground({p, dr, basePrice, basePerPing, baseCost, baseProfit, baseDevOnlyProfit, baseIRR, includeLongHold}) {
  const [priceDelta, setPriceDelta] = useState(0);
  const [costDelta, setCostDelta] = useState(0);

  // 即時計算 (拖滑桿時)
  const result = useMemo(() => {
    const ci = getCostItems(p);
    const newCo = {...(ci.co || {}), value: (Number(ci.co?.value) || 0) * (1 + costDelta/100)};
    const priceFactor = 1 + priceDelta/100;
    const adjustCB = (cb) => {
      if (!cb || !cb.disposals) return cb;
      return {...cb, disposals: cb.disposals.map(d => ({...d, price: (Number(d.price)||0) * priceFactor}))};
    };
    const pAdj = {...p,
      uP: basePrice * priceFactor,
      cC: (p.cC || 0) * (1 + costDelta/100),
      costItems: {...ci, co: newCo},
      compBenefit: adjustCB(p.compBenefit)
    };
    const drAdj = calcDerived(pAdj);
    const snap = calcT8Snapshot(pAdj, drAdj);
    return snap;
  }, [priceDelta, costDelta, p]);

  // 取對應淨利 (依模式)
  const curProfit = includeLongHold ? result.totalProfit : result.devOnlyProfit;
  const curBaseProfit = includeLongHold ? baseProfit : baseDevOnlyProfit;
  const curIRR = result.irr;
  const profitDelta = curBaseProfit !== 0 ? ((curProfit - curBaseProfit) / Math.abs(curBaseProfit)) * 100 : 0;
  const irrDelta = baseIRR != null && curIRR != null ? (curIRR - baseIRR) * 100 : null;
  const newPrice = basePrice * (1 + priceDelta/100);
  const newCostPerPing = basePerPing * (1 + costDelta/100);

  // 色彩判斷
  const profitColor = curProfit < 0 ? "text-rose-700 bg-rose-50"
                    : curProfit < curBaseProfit * 0.5 ? "text-amber-700 bg-amber-50"
                    : curProfit < curBaseProfit ? "text-amber-700 bg-amber-50"
                    : "text-emerald-700 bg-emerald-50";
  const irrColor = curIRR == null ? "text-slate-400 bg-slate-50"
                 : curIRR < 0 ? "text-rose-700 bg-rose-50"
                 : curIRR < 0.05 ? "text-amber-700 bg-amber-50"
                 : curIRR < 0.10 ? "text-amber-700 bg-amber-50"
                 : "text-emerald-700 bg-emerald-50";

  return (
    <div className="space-y-3">
      {/* 售價滑桿 */}
      <div>
        <div className="flex items-center justify-between mb-1">
          <span className="text-xs font-bold text-slate-700 inline-flex items-center gap-1.5"><Icon name="trending-up" size={12}/> 售價變動</span>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500">當前:</span>
            <span className="font-mono font-bold text-emerald-700 text-sm">{newPrice.toFixed(2)} 萬/坪</span>
            <span className={"text-[11px] font-mono font-bold px-1.5 py-0.5 rounded "+(priceDelta>=0?"text-emerald-700 bg-emerald-100":"text-rose-700 bg-rose-100")}>
              {priceDelta>0?"+":""}{priceDelta.toFixed(1)}%
            </span>
          </div>
        </div>
        <input type="range" min="-50" max="50" step="0.5" value={priceDelta}
          onChange={e => setPriceDelta(parseFloat(e.target.value))}
          className="w-full accent-emerald-500"/>
        <div className="flex justify-between text-[9px] text-slate-400">
          <span>-50%</span>
          <span className="text-emerald-600 font-bold">基準 ({basePrice.toFixed(2)})</span>
          <span>+50%</span>
        </div>
      </div>

      {/* 造價滑桿 */}
      <div>
        <div className="flex items-center justify-between mb-1">
          <span className="text-xs font-bold text-slate-700 inline-flex items-center gap-1.5"><Icon name="hammer" size={12}/> 造價變動</span>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500">當前:</span>
            <span className="font-mono font-bold text-emerald-700 text-sm">{newCostPerPing.toFixed(2)} 萬/坪</span>
            <span className={"text-[11px] font-mono font-bold px-1.5 py-0.5 rounded "+(costDelta<=0?"text-emerald-700 bg-emerald-100":"text-rose-700 bg-rose-100")}>
              {costDelta>0?"+":""}{costDelta.toFixed(1)}%
            </span>
          </div>
        </div>
        <input type="range" min="-50" max="50" step="0.5" value={costDelta}
          onChange={e => setCostDelta(parseFloat(e.target.value))}
          className="w-full accent-sky-500"/>
        <div className="flex justify-between text-[9px] text-slate-400">
          <span>-50%</span>
          <span className="text-emerald-600 font-bold">基準 ({basePerPing.toFixed(2)})</span>
          <span>+50%</span>
        </div>
      </div>

      {/* 即時結果 */}
      <div className="grid grid-cols-2 gap-2 pt-2 border-t-2 border-rose-200">
        <div className={"rounded-lg p-2 border "+profitColor}>
          <div className="text-[10px] font-bold opacity-70">{includeLongHold ? "整體淨利" : "純開發淨利"}</div>
          <div className="font-mono font-black text-sm">{fmt(curProfit)} 萬</div>
          <div className="text-[9px] opacity-60">
            基準: {fmt(curBaseProfit)} | 變動: {profitDelta>0?"+":""}{profitDelta.toFixed(1)}%
          </div>
        </div>
        <div className={"rounded-lg p-2 border "+irrColor}>
          <div className="text-[10px] font-bold opacity-70">IRR</div>
          <div className="font-mono font-black text-sm">{curIRR == null ? "—" : (curIRR*100).toFixed(2)+"%"}</div>
          <div className="text-[9px] opacity-60">
            基準: {baseIRR == null ? "—" : (baseIRR*100).toFixed(2)+"%"}
            {irrDelta != null && <span> | {irrDelta>0?"+":""}{irrDelta.toFixed(2)}pp</span>}
          </div>
        </div>
      </div>

      {/* 快速重設 */}
      <div className="flex items-center justify-center gap-2">
        <button onClick={() => {setPriceDelta(0); setCostDelta(0);}}
          className="text-[10px] text-slate-500 hover:text-slate-800 underline">
          ↻ 重設為基準
        </button>
        <span className="text-[10px] text-slate-300">|</span>
        <button onClick={() => {setPriceDelta(-10); setCostDelta(10);}}
          className="text-[10px] text-rose-600 hover:text-rose-800 underline inline-flex items-center gap-1">
          <Icon name="alert-triangle" size={11}/> 悲觀情境 (-10% / +10%)
        </button>
        <span className="text-[10px] text-slate-300">|</span>
        <button onClick={() => {setPriceDelta(10); setCostDelta(-10);}}
          className="text-[10px] text-emerald-600 hover:text-emerald-800 underline inline-flex items-center gap-1">
          <Icon name="sparkles" size={11}/> 樂觀情境 (+10% / -10%)
        </button>
      </div>

      {/* 提示 */}
      {curProfit < 0 && (
        <div className="text-[10px] text-rose-700 bg-rose-50 rounded p-2 border border-rose-200 inline-flex items-start gap-1">
          <Icon name="alert-triangle" size={11} className="mt-0.5"/>
          <span><strong>當前條件下，{includeLongHold ? "整體" : "純開發"}淨利已為負</strong> (虧損 {fmt(Math.abs(curProfit))} 萬)。試著拖回基準或調整變動幅度。</span>
        </div>
      )}
      {curProfit >= 0 && curBaseProfit > 0 && curProfit < curBaseProfit * 0.2 && (
        <div className="text-[10px] text-amber-700 bg-amber-50 rounded p-2 border border-amber-200 inline-flex items-start gap-1">
          <Icon name="alert-triangle" size={11} className="mt-0.5"/>
          <span><strong>淨利已大幅縮水</strong>，當前 {fmt(curProfit)} 萬 (僅基準的 {(curProfit/curBaseProfit*100).toFixed(0)}%)。</span>
        </div>
      )}
    </div>
  );
}

          <div className="bg-gradient-to-br from-sky-50 to-sky-100 rounded-xl p-4 border-2 border-sky-400 shadow-sm">
            <div className="text-[11px] text-emerald-700 font-bold flex items-center gap-1">
              <span className="bg-sky-500 text-white px-1.5 py-0.5 rounded text-[9px]">ROI</span>
              總投入報酬率
            </div>
            <div className={"text-3xl font-black font-mono mt-1 "+((snap.burdenCost+snap.ll+snap.cl)>0?(snap.roi>=0?"text-emerald-700":"text-rose-700"):"text-slate-400")}>

            </div>
            <div className="text-[10px] text-slate-500">淨利 / 總成本 (含融資)</div>
          </div>
          <div className="bg-gradient-to-br from-violet-50 to-violet-100 rounded-xl p-4 border-2 border-violet-400 shadow-sm">
            <div className="text-[11px] text-violet-700 font-bold flex items-center gap-1">
              <span className="bg-violet-500 text-white px-1.5 py-0.5 rounded text-[9px]">ROE</span>

            </div>
            <div className={"text-3xl font-black font-mono mt-1 "+(snap.eq>0?(snap.roe>=0?"text-violet-700":"text-rose-700"):"text-slate-400")}>

            <div className="text-[10px] text-slate-500">淨利 / 自有資金</div>

        </div>

        {/* 第二排: NPV / 還本期數 / Cap Rate */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
          <div className="bg-gradient-to-br from-sky-50 to-sky-100 rounded-xl p-3 border-2 border-sky-300">
            <div className="text-[10px] text-emerald-700 font-bold">NPV</div>
            <div className={"text-xl font-black font-mono "+(snap.npv>=0?"text-emerald-700":"text-rose-700")}>{fmt(snap.npv)}</div>
            <div className="text-[9px] text-slate-400">萬 (r={(snap.discountRate*100).toFixed(1)}%)</div>
          </div>
          <div className="bg-gradient-to-br from-amber-50 to-amber-100 rounded-xl p-3 border-2 border-amber-300">
            <div className="text-[10px] text-amber-700 font-bold">還本期數</div>

          • <strong>ROI</strong> 整段期間「淨利 ÷ 總成本(含融資)」(全案資金效率)<br/>
          • <strong>ROE</strong> 整段期間「淨利 ÷ 自有資金」(含槓桿後的股東報酬)<br/>
          • <strong>Cap Rate</strong> 標準資本化率 = 純租金 ÷ 殘餘物業 (不含營業)<br/>
          • <strong>營業收益率</strong> 同 Cap Rate 算法，但分子是營業收益<br/>

          • <strong>早期回收率 (10 年)</strong> 前 10 年「累計現金流入」÷「總投入」, 越高表示中期變現能力越強<br/>
          • <strong>現金流多樣性</strong> 1 − 最大收入源佔比 (0=單一來源, 越高越分散越穩健)
        </div>
      </div>

      {/* ─── 區塊 3: 整合損益表 ─── */}
      <div className="bg-white rounded-2xl border shadow-sm p-4">
        <div className="text-sm font-bold text-slate-700 mb-3 inline-flex items-center gap-1.5"><Icon name="clipboard" size={13}/> 整合損益表 (多期合併)</div>
        <table className="w-full text-xs">
          <thead>

                <tr>

                <tr>
                  <td className="py-1 px-2 pl-6 text-slate-600">租金收入</td>
                  <td className="text-right font-mono">—</td>
                  <td className="text-right font-mono">{fmt(snap.ce.longHold.rent.total)}</td>
                  <td className="text-right font-mono font-bold">{fmt(snap.ce.longHold.rent.total)}</td>
                </tr>
                <tr>
                  <td className="py-1 px-2 pl-6 text-slate-600">營業收入</td>
                  <td className="text-right font-mono">—</td>
                  <td className="text-right font-mono">{fmt(snap.ce.longHold.business.total)}</td>
                  <td className="text-right font-mono font-bold">{fmt(snap.ce.longHold.business.total)}</td>

            <tr className="border-t border-slate-200">
              <td className="py-1 px-2 font-bold text-slate-700">收入合計</td>

            <tr className="bg-amber-50/50 mt-2">

              <td className="text-right font-mono">—</td>

            <tr>
              <td className="py-1 px-2 pl-6 text-slate-600">契稅</td>
